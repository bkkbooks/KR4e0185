body:
  text: 遵巖集卷十五明王慎中撰墓表處士陳東莊公暨配黎氏墓表南海處士陳公名濓有德而夀其在毅皇帝朝令天下入粟實邊酬以冠服翁首應令入粟而不肯冠服有司以令格強與之翁乃冠服嘉靖改元優詔養老而翁已年七十已上有行義受冠帶復其家厚給酒肉綿帛如詔旨既老且榮為州鄉長者其家又殖而孫子蕃茂姻壻盡得名家子尚書湛甘泉公道德問學為一代宗工呼翁為舅翁配黎氏與翁偕老娛嬉一門之內和氣旁皇翁不惜以錢豫貧人而好教人以善黎氏能諭其意而力佐之鄉人無親疏長少咸嘆陳翁夫妻兩人之賢而重歆其福然翁自少時始脫丱童即遘家禍同里鍾姓者興巨獄以搆陳氏獄事初起如燎揚于原勢不可嚮翁挺身就逮誓不以難蒙父兄父兄愛翁不忍又患其少弱不能與仇為理公不為止榜笞楚毒甘若食飴繫獄十餘年無幾微悔沮色為同繫者所覘同繫故仇猶嘉翁之義而伏其壯竟得理出方翁繫獄自謂不出父兄竭力營救雖冀其出然不計何時故翁在獄屢以意告父兄使辭黎氏之婚父兄然其意辭之黎氏黎氏父母亦然所辭且為其女謀别選所歸黎氏矢死自決曰以身許人當其有難而背之不義出不出未可知不冀其出而先以不出絶之非人所為吾有俟之而已翁既出而黎氏歸翁嗟乎此兩人者其於為義可謂堅苦卓偉矣豫觀先王制為少儀教子弟之少者使修其職以事父兄其詳在於撰杖屨扱帚箕奉席執几帶觽佩礪極卑而甚勞以為少者之事足以能此而已至於蹈義發憤赴難而不悔禦侮而能勝非童子職也魯人欲勿殤童汪踦而仲尼以為可也君父之難又何擇焉兵刑之死其死一也翁之不死固有命焉若翁之事是先王所不敢責世之子弟而孔子深以為難者也在於婚禮納幣有吉日而壻之父母死猶以不得嗣為兄弟使妁致命禮之教人非為偽也有其辭之則女家亦有可許者矣父母之喪其節也有數其擇也有期先王謹婚之時而重於廢人之道猶有辭之之禮焉推此義求之則壻有陷辟之凶縲絏之免無期而襟帨之申難俟其不得嗣為兄弟宜先王之所許也而黎氏之志如此豈不尤可以為難哉嗟夫使世之男女皆如陳翁夫妻兩人則豈有擇便苟活後君親之患與夫中道相棄婚姻之道缺而夫婦之恩薄者哉豫謬以文名當世好求當世行事之可列者見於豫文使不泯沒陳翁兩人之事固豫所欲著而請豫文者又翁之孫泉州通守陳君也君以文章為吏其政事不俗而有名士賢人之風顧獨深好豫文豫既雅慕陳君於陳君所欲誠不敢愛顧豫所能獨有文字而君所欲又在乎此故為之論著其祖父母之行使歸刻石表之墓上以慰其顯祖之思焉河南參政劉涵江墓表嗚呼豫何忍表劉涵江公墓哉辛丑嵗豫與公同罷河南參政豫方倨侮自恣馳書於公約遊淇水王屋太少二室武當山相擕而歸公艴然徑歸且報書曰君報罷猶出內批孰不知為權重人所為如吾誰當為明者吾歸矣不能從君遊且宦其土方見罷而又往遊焉得毋太作意乎豫時已至淇上倣徉百泉蘇門之間愧公之言徑趨安陽訪故學士崔後渠先生談數日亦遂歸不復至孟門洛陽矣嗟乎公達人也既已罷矣何必使人知其為誰所為者而公報豫書其言如彼公平生約己守官儉薄瘠苦獨蹈人所難要欲以見於世而今猥與不肖同罷宜其不能忘也嗚呼悲夫豫何忍表公墓哉然公已沒世豫卒以悲故不為文誰當明公者豫又何得不表公墓也劉氏故莆之涵頭人祖均長仕元為漳浦縣尉因家之當文廟時有仕為宿州知州名觀者有能吏名實公髙祖再傳為封南京禮部郎中公淵公之父也郎中公娶封宜人周氏公名友仁字是成原所由徙故號涵江以示不忘其始以正德甲戌進士始授南京戶部主事轉禮部主客郎中遷知黃州府以母喪去職起為衡州以材調廣州遷湖廣布政司左參政遭郎中公憂起復為浙江右參政調河南參政撫民南陽其為戶部嘗監淮安𣙜稅及持節往使湖廣理賦督發其滯逋以填京庾𣙜稅故毛細易汙為之者往往矯厲苛核皎其迹以冀自免督賦所臨遇皆藩郡大吏至者輒弛懈不欲急懼見為觸公在淮安尤簡易與商為便督賦故嚴密遏剔滲匿不以藩郡尊巨為忌二事以集竟免汗迹亦卒未嘗有所觸黃州江漢經流之衝民蹙政煩前守日夜治文書應賔客寢食不得休衡州在山谷深奧處田野饒足郡中常暇豫因習為偷公兩易其俗為張置為黃州政每間尋周瑜破曹孟德故處酌酒弔之與客泛舟婆娑甚適日與諸生考論術業第其得失奬飭之文用大振比公去而以文奮為時名流者項背相踵皆公所教士也衡州置郡南嶽之下顧未嘗一遊而設約束布條教起民之窳雖在郡日少恩施未洽而精采有加焉湖廣浙江參政主督版册財計而南陽主撫民公為之皆有體人謂治版册財計宜為米鹽公獨疏目濶節顧絶無漏失撫流逋多以寬捨致安集而稽察誅賞公用之不少貸唐鄧之間益用和懷其所治各有以自得如此而其尤難在廣州嶺南土廣民衆莫如廣州且據會省部使者藩臬監司所治人性各殊難於齊調郡於其時賢貴人在朝最有權望鄉里多附麗之者強則折而弱則靡公持其間而免焉蓋其尤難也公平生亷謹自好居官所至不以細加毫毛或苟而有取其於人不為苟豫性尤濶直朴率無機數曲節既無以買名譽寄援汲而居官輒得賢聲官輒起由其亷謹不取雖有憎怒者不能加點而然也然在浙江為言者所論在河南未幾卒以罷歸則以寡聘遺簡迎將雖其亷謹而終不足以勝憎怒者之勢也嗚呼其可歎也夫公沒二年既葬其子祥鸛持其族昆約齋中丞公之狀與林二山中丞公之銘謁豫曰願有以明先君者豫主廣東辛卯試事公屬在廣州共事院中留都主客為郎覽壁中陷記摩挲題名得講其風美最後同為河南參政又同罷也其言宜可信於是為表於其墓曰有以自待者必不託於人於人無所託則其享於世者亦不能遂彼所謂自待者皆矯強鷙卓恃已而卑物竒迹以驚衆其不能遂意於世固其自待者所自召與公誠無所託於人而任質徑情貌恂而詞愊非期與人為異有所戰薄於才騖聲角之場者所遇竟若此何也豈材與不材之間固其所難處耶然公終始所尚無少異而始見為賢終以得罷豫又以感夫世尚之變蓋三十餘年之間而仕者見容之難易其可覩矣張毅齋先生墓表議國之大事而處其禍之必至幸則其議行而國享於安而其處之也為不中之言不幸則事及於禍而其言中蒙國之大難而矢其身之必捐幸則其難濟而身獲其利而其矢之也為不踐之盟不幸則身及於難而其盟踐前識足以決議而節不副竒節足以殉身而識不豫此力之不可兩能者也有兩能者矣職及於議而不當蒙難之役則思復濟以死而無由身從於難而不在揆議之列則欲先關其忠而不得此又其事之不必兼盡者也若夫始及於議卒蒙其難至于言中而盟踐其亦仕者之不幸矣以其不為徒死而可以有傳於世則人猶將幸之仕於人國者至以此幸其傳亦可悲夫其人雖幸而其國有大不幸由其國敗君出故彼有以著節而成其名也國大不幸而死者以其自不幸為人幸之死者有知決不以人之幸自幸矣身之不幸而大幸在國卓然效死之節獨以國完君復而掩其名使人不得以傳其幸之於不幸之中宜若又不幸焉惟其大幸之有所存死者之心宜不以為不幸也正統己巳嵗值也先犯塞權璫王振實倡親征之計以誤廟謀車駕戒發備百官以從而刑部之屬以主事張公塘應詔公首率同曹具疏極諫萬乘不可輕動而深斥近姦獻計之非其言甚危卒不見省則慷慨從行不處家事而去家人固問曰君出與出君入與入何問焉師次居庸時倉卒出師士無宿備而紀律尤不整公䇿其必敗三疏請還軍為權璫所沮不報及土木而難作車駕蒙塵公乃誓不獨入遂死之已而氊裘悔禍化逆為順羣執羈絏御銜􅀢奉車駕還都鸞鈴不爽節鋈靷無脫者而國勢尊鞏曽靡障陴戍壘之隳蓋國之大幸也嗟乎公始議見沮而後六師輕出師已出而再議見沮而後輕入彼地方事之未然其慮審而憂深而言詘於不省使晉臣慶鄭懷違諌廢卜之怨且快於君止以實其言而公之在仕黽勉職業守潔而行髙仕十三年猶為主事而髙爵厚祿以寵於朝者何限使衛之士大夫當之必有使鶴之詬公獨踐必死之盟畢其身以殉所事之重不為苟道以求全嗚呼可謂烈矣然亦何其不幸也以彼其烈而人之幸公而傳之者當與庾珉王雋辛賔李若水同其傳然今之講慕公者自不得以與四人者同談而他日之記者亦不當與四人者同書則以國完君復列其事無所當而名因為之掩也公之存不為晉臣衛人之詬而一意於國死而不泯誠知國完君復方且慊其期於安國之本懷與存君之初志烏以名不得列於昔之死君者之間為不幸哉噫此公之心也公沒百年某始從公之族孫鄮西君謙得聞其事相與歔欷慨嘆想見其烈而余又有感也豫嘗好觀國朝故事竊窺英廟實録載扈從死事之臣已遺公名所謂事烈而其名掩為不得與昔之死君者同書耳其事固當書也孰知其身死而事不存已不得在史氏記則其名殆將沒矣此吾黨之所宜圖也於是張君出故都憲王節齋公小傳以示豫曰傳以藏之家墓上有石不可以不識也蓋公沒既久而其子撫州推官圭始斂衣冠而葬焉濁墨形魄公既決棄不復顧懷齒髮骼胔化為朔陲之驚塵以從飄風其混於沙礫委蔓草而啖烏鳶皆非公所恨惜其魂氣之清英昭爽必且飛揚悽愴眷故都而棲舊里附衣冠之潔莊而常遨遊於鄮山甬水之側則亦何以異於全歸而深藏於此年運而往木拱且抱虆葛施石而狐兔穴室牧豎樵子頑懵不靈將有箕踞嘷跳於其上而睨草木以為薪槱之資胡以嚴往烈而象幽光寧獨其家孫子之戚且愧而已惟刻詞于石以表於其阡庶其免夫豫謂公之魂氣既常棲遊於兹阡土魍木夔猶知呵庇崇護而不敢狎而永免於岡陀石泐之患然以其烈如此而事已不在史氏記才及百年而昧陋如某者非張君以告則莫由聞而藏衣冠之域又當絶去城郭在遼墟榛莽之間鄉里後生與四方之遊客有講古尚友之好者入其境登其山而不知有斯人之墓忽焉過之而不致其肅則無以告之者之罪也至於時移事改此石幸不顛踣或不幸而仆猶不為風霜之所剝蝕訪古之士或得之於蒙薈蔽翳之中模而傳之復出於人間雖史氏所不記而一旦震耀喧詫播為竒聞異迹卒可以補其遺而終以不沒於後則吾黨之所圖庶不為無益於是為撮其事而論其意書以授鄮西君使歸刻焉而表於其墓林履坦處士墓表士之篤行敦常不斁其性全其所受之懿以自淑而沒其身卒以所處卑約無所聞於人者多矣其心之憾與不憾蓋有異焉有以淑其身而亦有所冀於外與待於後於其無聞憾可知也不冀於外無待於後暗然以自淑不知有聞之可矜而奚憾於無聞誠於此無憾而後可信其為善之足於性足於性而為善則其所為有以得其性而止耳非有過制之行離倫之迹以動耀視聽而驚傳詫也蓋吾門人林松喬年之父履坦翁諱玖字文玉者世居潮之揭陽生而才諝以習藝而戰於章縫繩尺之場可以得志而不樂為也文墨諷詠以自娛而已其心力智䇿與市人計舉廢而算贏縮足以牟巨取羡而不屑為也衣食不逆為量殺以自給而已其信義情欵以連結羣伍平決紛鬭足以雄長為衆仗任聚徒送黨而不願為也恱色柔聲諭人於不爭以自安而已故其居世常樂而無可憂畏之機其與人常親而無可忿怨之境而欲名一節一行之竒以矜道説則翁之所為若此宜其歿久而尚未有聞也此所謂含和葆光畸於人而全乎天者彼一節一行之竒其矯咈之偽刻畫之勞方為天之僇民然言者往往喜述彼而忽此此吾所以為翁表其墓也翁雖無所待於後有喬年為子其所待者逺矣喬年砥淬名行以進士兩宰巨邑専以仁愛亷決為民不求乎上以獵時譽其鬱積久矣進為通顯以承寵褒貤翁尊榮且有日翁之天且將不純而畸淆於人乎吾及翁未受寵命之日為此文以表焉蓋猶純乎天而未雜於人也故表之曰履坦林處士之墓林母謝孺人墓表孺人潮州揭陽故處士林翁某之妻而今龍溪尹松喬年君之母也龍溪君始以進士分邑蘭溪為政方得民而以孺人之喪去邑邑民攀慕知不可留則請其鄉之大老章朴菴尚書公志孺人之葬以慰林君且以為報林君既以禮襄孺人之事與處士合窆起復為龍溪以書至清源山中屬豫表處士孺人之墓豫遜不敢當顧與林君之誼不淺不終得辭乃為處士墓表而復書龍溪曰喬年方以才亷為縣進顯於世之日邇矣宜得受賜於上以儀章褒寵賁先人幽宫而撰德序事可以屬當世貴重有力之人故缺其一以俟喬年他日得意而為之非吾獨靳於孺人也喬年書來數四曰受上賜以為亡親榮松不能無冀然即得之猶外物也當世有力之文松度終不能得而亦不願得之也惟君子之言可以信於人而使後不泯是松所以致孝於親之大望而先生其何以距焉嗟夫時所為愜於志美於觀而可以寵其父母者可知已而喬年所存如此其趣好固大異於時足以推見孺人之教已豫益愧其所以請者辭益固而喬年之請益勤乃問孺人之所以得諡者云孺人養其舅姑孝自其始見廟至於既沒遇其杯棬杖几而不敢褻而嵗時之享奠必飭必豐如其生而饋之食也事其夫敬自其既反馬至於稱未亡人見其書册琴瑟必思而哀而不以燕私之邪氣亂焉遺言傳訓奉以周旋以約其身及泉而語其夫色無怍也其教諸子嚴自其能言食食至於就傅給其衣食必以節視其課業必以數其學者從仕其不學者持家一言一事之失不以既長且貴貸呵撻而惟恐其子一日之即於淫以貽父辱也蓋其所以為婦為妻為母者無一不出於隂教之正而終始如一日可謂貞且恆矣於是宗黨姻屬之賢者考德論行最其美之凡而諡之如此豫惟古者易名之禮蓋上之人以施諸其臣以勸士而崇教而施諸婦人者非君夫人不在是也近世乃有士大夫自相與表其人之賢而不遇相率諡之以明尊慕要以稱於朋友問學之間而已於禮既不合而事亦不多見惟婦人之諡家而用之不以為非自內教不行女史職廢婦人之美固世所不講而今之易名其俗又如此則諡之施於其人固非考德論行之所存也豫懼世之視恆貞孺人猥以家用之俗忽之忽其諡而因以不知其人則內教何所視焉故特著其諡之核於德者以為表而使龍溪君刻之於墓封郎中鄭殖菴公暨配伍宜人墓表往豫謫倅常州今戶部郎中鄭君汝德為縣於無錫余以事至縣縣人言其尹不多抶人檟朴棲於廊間庭中諍詞常空矣尹故早起晏休無朝夕變細民一物之餽不敢至其室豫既善鄭君得其言於縣人私以為君藉且勉卒之君謂豫曰此非普之賢維吾父母之教始吾至縣頗嫉民之不如法者杖之患其不痛吾親聞之輒戒曰夫孰非人之肌膚痛在人之肌膚而心不少動何其忍也且民不如法教之可耳烏在杖之痛乎吾以親在邸數入內問省輒止之曰堂上須臾不坐縣官庭中門外之人積矣有裹飯繭足而來者卒不得見縣官腹枵然而徒反事安得不滯而下之情安得盡也吳中人士最善治珍巧飲食一日有士持餉以見吾受而進焉問何所從得此非舍中具也吾以實對且曰是士人可與禮接兒為親故受之耳終不肯嘗曰吾家故疏糲今每食有魚肉蔬豉口甚甘之此非所常食當不甘也固勸之乃言曰非吾不甘顧而為縣於此乃以親故受餽縣固無他士人乎是可以禮接孰非可以禮接者而胡以拒其他民將覘意伺間有獻備味當漸廣而雖不受彼已費矣吾終不食此以杜其後蓋普之能不以刑毒其民而知勤於政慎於取與非敢自賢實重吾親之訓勉而不墜云爾越嵗余有山東督學之行過縣問起居鄭君曰歸矣始吾親之來非以就吾養蓋以視吾為政既以兒為可教也遂去不復可留曰海濵之廬將穢田園其萊矣吾少所治習其勞而安焉糞除藝植還吾舊事豈以而為吏輒忘故所業苟耽微俸之養遽渝吾樂之常哉蓋鄭君之父母所以自安其身與諭其子者其言如此鄭君既以賢進顯於世為郎尚書省天子嘉之若曰維吾有才臣能其官其封鄭普父某為郎中母伍氏為宜人吏部司封郎中行其事久之鄭君喪其父未畢喪又喪其母其銘父葬得故少司徒顧公新山為之而張司馬半洲公為母銘蓋鄭君自力於世以褒顯其親又託不泯於名卿之言足以酬劬燾之恩而慰其無窮之情事矣猶哭而告余曰願有以表二親余既得其安身諭子之詳可記也而與鄭君相好久益深其胡可辭乃為表於其墓曰是為封南京戶部郎中鄭公之墓字曰某號曰殖菴配曰伍宜人方孺人劉氏墓表孺人劉氏桐城方一田先生舟與濟配也先生以風致韻度自髙不屑仕進囂然老於田野之間賦詩鼓琴為樂非獨知義處命能勝其慕榮嗜利之心亦孺人之左右順輔有以和其志而不撓其所樂也仙􅀈莊者皖城之佳處其田原可耕而不豐而林壑深迥幽茂有可采茹登矚以為隱者之適先生愛焉謀於內而卜居之計定孺人之智以為無可耕之田必且營於他則為離本而近浮而其土過豐又將以厚殖而易邇於富也故以是決先生之居而盡其智於所耕之田嵗嵗課其入以為出出不濫而積常有餘以佐先生之力使得肆於林壑之觀遊至其有餘之積日益多往往有所施舍貸豫其薄厚多少有節而各得其宜使其所振足以為恩而先生得不病於多財先生之詩每篇出輒與唐名家爭其工巧字書之法在晉人鍾王間矣非其不纍於內有以専一其精神發舒其意氣胡以及此婦之於夫有順承之義而已才足以助之則其難矣至於智足以知其夫而與之同其趣好蓋其又難也孺人晚見其子克登第內外之人莫不以寵榮為孺人喜孺人曽不色動而心獨喜自念曰先生雖隱非絶意於世者是子為繼其父之志矣而所以告內外之人云吾所謂榮者是子好修慕學當不失令名蓋所以知其子又若此孺人於為女為婦為母莫不盡其道其端慤施於閨幃詳節細行甚多而不可備列銘孺人之葬者已志其事之凡及夫生卒系世孫子以掩諸幽某故不復具其事而特著其所知之至為孺人之尤難者以表之以授其子西川君克使歸刻焉婦人以行事為內以所知為外書於內者既以藏於坎中而著其外者宜揭之墓上前川張翁墓表凡以師儒之官來教於吾之郡邑者多與余遊而德化教諭張東豐君為最賢相見不能常心殊相得也一日謁余意慘容蹙若欲有請而不能出其語知其有所求於豫也問之輒拜曰豫先人墓上有石必子為表而不敢必得豫諾之閲再嵗君每以事至郡言不及他豫筆猶未屬君雖知豫不誑意顧汲汲若不可得者嗟乎以豫之慢足以明君其於發揚先人之善篤也歸善有張氏當宋之季徙自南雄曰發者實始徙六世至祐經入我明族彌煩傳志剛義宗文秉而生翁名廣明字子昭娶黎氏文秉沒七月而翁生稍長知慕其父前母兄某亦早世子及孫皆孤門戶幾替翁事母陳氏甚孝內具甘肥外營什一感刻自厲必大其門戶曰使人知孤子侍寡母而克有立如我者則世無懈人墜家耳非我徒衒其能欲為門戶寵也自是資産豐殖譽望蔚起布衣匹夫而有士者之風貴人之氣唇吻開閉色笑背向輒為人輕重其敦族睦里先務事實族人有田勢家欲奪之憚翁請以百金為夀祈勿預而已翁曰此宗人事必吾所預也使吾受金而復預事則不直麾之竟預其事田得不奪宗人利焉里有蜃蠯鹺鹵之區所入不資瀕海寥逺猾者據而有之翁證圖考版質以簡書徴還里人且為之隄頽闢荒區以奧稱正德己卯庚辰之間盜連嵗竊發民遁竄無寧迹翁倡義閲集丁壯練習使鄉人治生作息如常日曰盜至則禦之屢竄自驚非安計也盜卒不敢犯力足以安利其人事實既著勸誘繩約繼之故莫不服恱其能為人輕重非智籠氣駕使然諸子業儒皆有文教其兄之孤子若孫如己所出孤子若孫有文如其諸子張氏為歸善名家翁為鄉偉人邑大夫或延至縣舍與為禮咨事問俗必盡所謀時有裨益出入縣門及往來道中人多標識之曰豐園張翁也翁世居豐園後築室邑中闢戶面龍川波澄如練晴光映帶坐對愛樂至忘世故晚以前川釣叟自號以戊子十月二十一日卒明年十二月二十三日葬於平山髙橋子四人長仕文邑博君也仕魁仕科仕業皆庠生夫起替立隆化儉趨富繁盛於孤露之餘宴佚於艱瘁之後少有才智而知勤勵者多能致之以風槩勝冗棼墾治田宅而不鄙以禮義飭豪舉應赴緩急而不賊此其才智有過人者如張翁是也髙橋之藏岡隴秀堅而松柏茂好尚與斯文俱久哉德慶州學正陳南川先生墓表豫未識陳南川先生而表其墓上之石以曽廓齋之狀也廓齋有道之士一語不妄而狀南川之賢甚悉是其可表先生名朝器字時用漳州漳平人也少讀書性頴甚不以敏為嬉矻矻忩几間貫心誦數倍鈍者之勞治一經専熟其文默舉不失一字同輩目其腹為經囊纍以文試優等為學官弟子最髙第漳平俗淳文物未振先生不獨優於邑諸督學憲臣竒先生不在龍溪諸邑子後也屢失於有司竟以貢上春官或勸入成均以需銓選先生自以經明欲與士者共習之不樂為吏也始授新興訓導考績擢融縣教諭復擢德慶州學正三方皆僻陋士鮮有聞先生橫經講席發揚宗旨人人駭所未聞雖甚遐昧亦欣喜來聽尤善以情欵接遇諸生久之加親凡宦其地者莫不愁險惡歎荒寂先生居之常有可樂部使者督學憲臣亷其實輒檄有司奬寵加禮顯示激勸褒以美詞多不可殫舉大要以為能立師道也仕二十餘年不離於學其所居學不過嶺外百粵之地故訓迪雖勤而發聞者少使在中州華盛之方其所造成當不可量然三方士者知經之當習而文之不可不熟由先生也晚謝官歸治生有法不為多機而生息日益墾田築室具精其能堂搆災播之務宜日不足而每有暇與耆舊飲酒嘯歌又若無事或疑先生専經而兼長生産作業者先生謂之曰夫經者豈誠使人窘約拙憨之物哉顧人所以仰事俯育養生送死之術皆從經出而讀者不解故世目經生為窮人耳吾教三方未嘗不周諸生之情而知其緩急職不得及於政矣而有司之政所不能及於頑民者吾嘗往諭之而百年不可致之逋梗一日而歸命於有司此皆經之用也於是疑者始歡然解安常盡分以天年終嗚呼可謂賢矣先生之子天台尹茂芝君早嵗向道常學於湛甘泉公之門將葬乞銘於陳見吾先生而屬豫表於墓上其世系傳承生卒嵗月子孫男女嫁娶聘許兆域原里志既具矣豫獨愛廓齋狀末所謂漳平之俗謹送終之禮而忽垂逺之文云者而知天台君圖所以不朽其親有古士者稱親之善之義非庶人之孝所及也故為約其事行之詳論其意而表之陸義姑姊表昔聶政之姊不惜一死以顯其弟之名觀者莫不感動欷歔謂其姊亦賢女也人皆以為能知弟之心而與之同其慷慨屈原之姊嬃罵其弟以忠見放世或以嬋媛為不知正則者豫謂女嬃之罵非反也乃合也彼蓋深嫉上官大夫子蘭之徒蔽賢讒正交賊其君以忠為邪使原至於顛沛羈離而不得容怨懟感憤無所自解而託於誶詈其弟猶云是孰使汝至此極者而汝胡為其如此也蓋忿之甚傷之至而豈以其弟為不當然耶豫於陸義姑姊之事益有感云陸義姑姊者長洲陸浚明之姊也陸君以譴居夷而其妻沒在吳有二男女子方幼若不得育亦且死矣義姑姊舍其家以來為陸君育其男女子竟得不夭死漸長矣又為教以男女所有事陸君量移過家悼其妻之亡而哀子之無所恃也欲不行義姑姊又勉使行而居陸君之室撫其男女猶前日陸君伉直不偶於時竟謝歸始得自有其子而義姑姊復其家吳人覽其事而義之以為猶古魯義姑姊也故名之曰陸義姑姊而陸君尤悲其以譴故纍其姊事之如母終其身以明德之難報自為之傳以顯之使聞於無窮方陸君為諌官好言事言皆犯當時所忌人噤不敢出口者而論柄臣姦利誣罔罪大宜用四罪之討言尤危壯故得譴最重謫置夷徼義姑姊蓋嘉其弟之能以直守職不有其官而已亦不有其家以輔之示與之同其慷慨而所以寓其怨懟感憤之意猶曰是孰為此虐者播棄諫臣使不得保其妻撫其子而吾一婦人者與之孑孑而周旋也其致疾於用事之臣意尤深且切焉正與楚女嬃詈弟同意陸君幸不以諌死耳使其不幸宜不惜一死以發明其弟之志深井里之殉又不足為者此婦人之立節善道好古人大義而有天下之憂者非徒有天性之愛於其兄弟急難之頃而已豫謂陸君之傳非隱其姊蓋嫌於自著故獨反覆於其恩勤男女子之德詳焉豫特表而出之輔陸君之傳以行於以風世垂教豈淺也哉遵巖集卷十五

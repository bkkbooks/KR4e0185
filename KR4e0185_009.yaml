body:
  text: 遵巖集卷九明王慎中撰序孔孟圖譜序孔孟圖譜會稽季明德先生所編緝也其書據漢太史公史記宋司馬氏通鑑劉氏外紀邵氏皇極經世書吕氏大事記金氏通鑑前編近世王氏續大事記潘氏孔子通紀益以春秋內外傳戰國䇿禮記家語孔叢子諸書參考互證𣙜核行事差次歲年櫛比杼緯詳且確矣其所是正諸家之異同一以論語孟子二書為主故雖生乎數千歲之逺而鑿鑿乎自信其不謬也於是轍環歷聘車軌所至之國邦君遇合與夫公卿大夫之交際寓主以至或人隱士之覯接其仕止違姤去處淹速辭受徑遜問答屈信來往疏數容拒嚴碩常變隆汚險易舒戒其迹莫不可考如從及門之徒躬總轡問津之役而託後車之傳也聖賢憂樂之微術好惡之大端形於遊世與人之頃而世道得失人情美惡因可以推見是書之有功來者已不為小然一行一事皆聖賢精神之所寄如昭昭之莫非天容光之照尤足以見日月之明者則在觀者潛心焉先生之書固述焉而不論而序次有倫屬比不失自可以開誘學者而發其獨悟之智也其功又何如哉某既獲預論訂僣加折衷於其間先生因使序之夫自堯舜以降至仲尼其間迭興繼作蓋不止一聖也仲尼獨為萬世仁義禮樂之主天下莫不以為師何也闢室作壇設科以來四方之士講習於二水之濵復偕之周流四方隨地而講因講以擇士至於從者三千而不以為多前此有之乎未之有也以為不得位而可以如此則舜嘗側微矣禹之未興臯陶之未舉伊尹在畎畝説築傅巖之野固匹夫而有聖人之學者也皆不知以此學聚四方之士而與之共為至仲尼而始有之也且非獨其門人子弟而後為此學也舉一世之人莫不使之共學故上則見其邦君中則交其公卿大夫下則進其凡民如耦耕荷蓧之丈人拿舟之漁父闕黨互鄉之童子皆有意焉固非必人人之必能為此學也遇其邦君卿大夫而得一二人焉而學明於上矣遇其民之父兄子弟而得一二人焉而學明於下矣啓發引掖之誠行於問聘交際之所及溫良恭儉讓之所顯形光輝充塞時出之見動洋溢之聲名在鄉滿鄉在國滿國所接莫非人則亦莫非學矣其接莫非學則人亦莫非其徒矣非必三千之羣乃為共學之士也其時上焉者雖有當年莫能窮纍世莫能殫之疑下焉者雖有四體不勤五穀不分栖栖為佞之誚而興起信從之風默孚遍鼓於一世又以俟乎百世之下之有興者天地之常人物之命資以長存而久明二儀之燾載三光之照臨五氣四時之推行代序含生肖翹百嘉萬品之倫並育無害至於今不廢豈曰其微言傳諸其逺大訓垂於六經之為功哉史遷之智不足以及此謂去來列國皆以求仕至姦七十二君而不用始敘書傳禮記刪詩正樂序易彖繫象説卦文言而作春秋也其所知如此則所記事迹歲年之訛誣烏足深論哉後世傳習其説以周流之迹必於一遇其君冀得一國一家之政而行之也既無所遇而後返在陳之歎固道不行而思歸也盍歸乎來之思豈為是哉蓋求士於四方未有過於在門狂簡之諸賢而此學所託以不泯者不越於吾黨矣仲尼所以卓出前世繼作之聖而世為天下師者其道如此當其時未嘗一日不與人接不暇有安暖之席固以是為易天下之道也觀此圖者以此意求之則聖人之精神庶幾潛心而可得而其與人好惡之端遊世憂樂之術尤可以悟其深矣孟子學孔子者也舍是亦將何以求之耶大學衍義補序宋儒真文忠公著大學衍義所以效於納誨進規非釋經本旨也故相丘文莊公以真氏書有格致誠正修齊之目而無治平二者疑於國與天下之事有未備也採輯為書名之曰衍義補書凡百十有九目為卷百有五十其詳且多殆十倍於真氏衍義一書屢有表出之者故不止為讀書甲乙之記至我祖宗則嘗揭之廡壁讀之經筵其言雖不效於當時幸而得章明大行於後世文莊之書獻於孝廟覽而嘉納焉制詔禮部刋布其書亦身見其言之行矣二書簡要繁雜著述之旨固有差别其竭生平好問之力持以效之所事之君則用意一也書皆有善本而獨行今建州本合梓以行之則吉三泉侍御按閩所為刻也始大學雜戴記篇中僅出秦火列於博士所立之經士者誦習以為傳記而己未巨明也有宋大儒程氏特表章之而後讀者知其為聖學之真傳淳熙大儒朱氏為其章句彌尊明矣至真氏推衍則以為君天下者考德揆治之成書致主之忠發於立言之卓誠可謂有功於斯文顧其大指要為據依聖言以闡繹其輔理啓心之藴而程氏所云初學入德之門朱氏謂其古者教人之法乃是書宗旨歸趣也夫學之為王者事其已久矣唐虞夏商周之盛帝顯王記者皆言其有所受學之人如君疇務成昭成伯子西王國諸所稱各從其代而實以氏名雖不必其然而堯舜禹湯文武之自有其學則有必然者孟軻氏約其世數五百年而一興伊尹萊朱太公望散宜生之儔猶見其君之所聞者而得之成湯文武之學有可言者矣况於堯舜乎由堯舜而上聞之太昊軒轅氏又可知矣王者必有事於學而學之必出於王者故大學者帝王之學也孟氏分别堯舜湯武性之反之之殊自明物察倫歷舉其事至於不泄不忘猶未及其相授之學也惟是篇所述於帝王之學微旨全體明且偹矣由堯舜至於湯武性反雖殊而親民以明其德而止於至善則列聖相傳之學之真祕也其書嘗顯言而詳列之矣曰克明峻德曰顧諟天之明命曰日日新曰克明德曰緝熙敬止曰作新民蓋帝堯湯文之學之為大學也家國天下盡乎民矣老老長長恤孤以仁讓之誠心而興其孝弟慈之恆性親之亦盡乎民矣由其檢之於一身之動有所謂修而親愛賤惡畏敬哀矜敖惰之用有以宰之而非徇乎人也而心之正形於是矣由其通之乎一心之感有所謂正而忿懥好樂憂患恐懼之一無所有而皆中乎節也而意之誠管乎是矣心之有覺謂之意好惡之靈炯然長存而昭乎無蔽不少昧於幾希微眇之中而知之致止是矣物至知致而好惡形由好惡之真幾以形於物外者有節內者不誘是物之自至而非至於物也故未嘗不喜怒憂懼而漠然其無有也未嘗不親愛賤惡畏敬哀矜敖惰而確然其不混而有主也著乎心動乎身應感之所成莫不有物為焉而不執也接焉而不留也而物之格在是矣是之謂意誠而心謂之正身謂之修矣而天下國家無不得其理矣此之謂明明德此之謂止至善而堯舜禹湯文武性反之學歸是矣真氏以為非孔氏之私言猶以是為孔子之言惟前聖之學有合乎其言者而知其非私也非吾之所聞之謂也故以為有治之序有學之本故以堯典臯謨伊訓思齊之詩先焉而以為此其規模之不異而斷其為君天下者之律令格例也尤非吾之所聞之謂也曰大學之為帝王之學則然矣胄子之學於國學者將不得與於此乎曰其書亦言之矣自天子以至於庶人一是皆以修身為本孰為胄子而不得與於此學乎胄子之學固天子之所教而胄子者學乎天子之學者也五品之人倫民孰不遜於其間而勞來匡直輔翼振德之放勳之教也是皆學乎堯舜之學也以其學之精且一如此今乃析為之目泛取前言以證之廣引往事以博之其亦有益於發明乎夫舉天下之賾且動而有所不貫則不得謂之一而於中亦未精矣璣衡歷象五玉三帛六律五聲十二章之繪何者非一日二日之幾之物矢謨賡歌巧言讒説之辨亮采惠迪象恭孔壬之揆惇允難堲行乎典禮命討為物多矣皆不作於好惡而有以飾其喜怒憂懼親愛賤惡畏敬哀矜敖惰之用而以施於天下國家則亦何言之不可察何事之不可鏡觀况其所引取上下千餘年之間君臣行事之迹卿士大夫之諍救論列繫乎治亂興衰之大端而善惡得失之鑒以眀豈非君天下者之所當知而有志於輔理啓心者得以參稽而並識之其助豈小哉由是以論則衍義補之所采輯視真氏書雖病於繁雜固真氏之志而其書亦其法也侍御言君方有輔理啓心之責志慕前修欲以其書見之於立朝又思廣其惠與天下有志者共焉宜其加意於斯刻也君所刻有四書集注性理全書通鑑全編皆有益於講學成材之具刻成而某適在武夷山中建州守程侯秀民實與侍御君同志而尤勞於諸書校讐之役故使某序之固陋僣越無所逃罪曾南豐文粹序無錫安生如石刻南豐曾氏文粹成屬某為序而重以武進唐太史順之同安洪郎中朝選二君之書以勉焉豫惟曽氏之文至矣當其時王震序之已無能有益於發眀晚宋及元序者頗多而其言愈下豫何敢任焉唐君以文名世洪君與之上下其學文亦日有名而二君見勉之勤如此豈有他哉亦慨斯文之既墜而欲眀其説於世也故不揆而序之曰極盛之世學術眀於人人風俗一出乎道德而文行於其間自銘器賦物聘好贈處答問辨説之所撰述與夫陳謨矢訓作命敷誥施於君臣政事之際自閨詠巷謠託興蟲鳥極命草木之詩與夫作為雅頌奏之郊廟朝廷薦告盛美諷諭監戒以為右神眀動民物之用其小大雖殊其本於學術而足以發揮乎道德其意未嘗異也士生其時蓋未有不能為言其才或不能有以言而於人之能言固未嘗不能知其意文之行於其時為通志成務賢不肖愚知共有之能而不為專長一人獨名一家之具噫何其盛也周衰學廢能言之士始出於才由其言以考於道德則有所不至故或駁焉而不醇或曲焉而不該其背而違之者又多有焉以彼生於衰世各以其所見為學蔽於其所尚溺於其所習不能正反而旁通然發而為文皆以道其中之所欲言非掠取於外藻飾而離其本者故其蔽溺之情亦不能掩於詞而不醇不該之病所由以見而蕩然無所可尚未有所習者徒以其魁博誕縱之力攘竊於外其文亦且怪竒瑰美足以誇駭世之耳目道德之意不能入焉而果於叛去以其非出於中之所為言則亦無可見之情而何足以議於醇駁該曲之際由三代以降士之能為文莫盛於西漢徒取之於外而足以悅世之耳目者枚乘公孫宏嚴助朱買臣谷永司馬相如之屬而相如為之尤能道其中之所欲言而不能免於蔽者賈誼董仲舒司馬遷劉向揚雄之屬而雄其最也於是之時豈獨學失其統而不能一哉文之不一其患若此其不能為言者既莫之能知由其不知之衆則為之而能者又益以鮮矣四海之廣千嵗之久生人之多而専其所長以自名其家者於其間數人而已道德之意猶因以載焉而傳於不泯雖其專長而獨名為有愧於盛世既衰之後士之能此豈不難哉由西漢而下莫盛於有宋慶歷嘉祐之間而傑然自名其家者南豐曽氏也觀其書知其於為文良有意乎折衷諸子之同異會通於聖人之旨以反溺去蔽而思出於道德信乎能道其中之所欲言而不醇不該之蔽亦已少矣視古之能言庶幾無愧非徒賢於後世之士而已推其所行之逺宜與詩書之作者並天地無窮而與之俱久然至於今日知好之者已鮮是可慨也蓋此道不眀士之才庶可以有言矣而病於法之難入困於義之難精決焉而放於妄以苟自便而幸人之相與為惑其才不足以有言則愧其不能矯為之説誣焉以自髙而掩其不能之愧以為是不足為也其弊於今為甚則是書尤不可不章顯於時顧豫之陋安能使人人知好之而序之云然蓋以致豫之所感焉耳薛文清公全集序學術不出於孔氏之宗失其統而為學者其端有二曰俗與禪方七十子既喪大義已乖之後浸尋且千年之間士之為學者病於俗耳最後乃有釋氏之學蕭梁以來遡祖為宗其説寢盛學為士而溺於禪遂多有之心通性達廓然外遺乎有物之纍而洞然內觀於未形之本則孔門之所謂廣大髙明其旨亦何以異其疑慮融釋靈幾照灼雨施雲行則草木畢遂天虛淵定而飛潛自形自謂妙得乎姬易大雅之微傳常足以闢夫執器滯言之陋以為擬議矜綴似而非真誦説詁解多而迷始也然以其擺落形迹以為無方體捨棄文義以為黜聰明蕩然無復可守之矩度而遊移茫昧徒有不可測之言反易為浮誕惰縱者之所托故儒者尤患之不顧執器滯言之譏而辨爭於毫髮幾希之際感切殷勤至於詞費氣殫如有宋朱晦菴氏之學是已朱氏之學直推遡於河南程氏而接其傳然於程門髙弟吕遊楊謝之賢猶冒然顯斥其淫於老佛不少假也同時所友善莫如吕陸二氏兄弟其於子靜子約之學尤詆誹之不遺餘力謂其竊近似之言文異端之説蒿然竭其悼閔距遏之心寧守其陋而不能以相易蓋患其惑世誣民而學術之流愈放矣河東薛文清先生以正學名本朝自我眀有國使士者尊朱氏以一學術偉人碩士彬彬繼出未有卓然以正學名者至先生始巍然為道德禮義之學之首觀其遺言之載於讀書録者誠有意乎性命之傳而不敢為荒忽虛幻陷於徑悟躐造之非一文一義潛思力索有待旦忘食之勤階循等歷次第不越多其聞見而後守以卓約自其修之身以行之家國天下者踐彛常之篤而間軌式之密庸言細行不忽卑邇充其祗畏檢勑之常心無一發口舉足入於非禮豈不以形迹可略而品節將由以不存文義少踈則條理或因之無辨耶其端士則敦世教倡厲聖學以興起來者確然獨守乎朱氏之宗執器滯言之譏固非先生之所恤且將持是以為間先聖之道之具而防夫浮誕惰縱之末放也故其作為文字亦必謹於體裁審於撰類發揮有闡乎物倫詠歌有娛乎情性雖不為無益之作而皆有所據依原本以不背作者之法亦其學之所守然也知者觀之固知其為道德之言而亦有道德之能言者也誠有德矣亦何事於言未有有德而不能言者近世乃有詭於知道而不能為文顧謂不足為也其弊將使道與文為二物亦可患也侍御趙玉泉君取先生之文與讀書録並刻之為全集以惠學者良有意哉滸南胡君繼趙公按閩中覽其刻曰是本朝之學而吾鄉之先正也吾讀其書而講其道久矣喜趙君之所為有合於志而謂某宜序之於是乎書夏津縣志序代易愧虛先生作余往時讀書見顓孫氏所舉楚令尹子文之已令尹必以舊政告新令尹而夫子許其為忠竊獨以為此亦恆人之所能而君子之細事以子張之賢過推慕之乃欲擬之於仁雖夫子之不許而亦以為忠蓋嘗所未喻也比余為令于夏津而知之矣始余至夏津其大者欲知民之性以制寬猛之常别土之利以經出入之法察俗之尚以節豐儉之中而山川之理經界之限壤地之生風氣之習貢賦之入莫之有徴至於道路之往來市井之集散宫室之興壞溝塗之通塞所以盡人之情而極事之變曾吏於是土而施設有益於民與夫不善而遺後之患足以示勸戒而繫人心之好惡者皆漫不可考蓋為之數月而茫然顧以為簿書之煩密圖籍之散逸可以檢括而推長老之覩記後生之傳聞可以訪詢而得於是敝其神於按核之詳易其心於延咨之數暇則出行原野次舍山林川澤原闕二十三行刻蔡虛齋太極圖解序代易愧虛先生作道之在於世也猶行地之水乎源出於一而其流必分至其流之委也必合而後有所止然則是水也雖其流之逺而不可量極其所謂源者固未嘗變也今學道者棄委而不循而必源之得勢固無有以委之去源之逺也疑源之不在於是而以為有二水焉亦不察之過也載道莫偹於經易者五經之源也羲文周孔之相承源所從來至一而無二也由漢逮宋為易之言者無慮百家殊途異𣲖其分多矣最後乃有濂溪周氏伊川程氏考亭朱氏之學合異為同統殊歸一卒極於羲文周孔之旨醇如也士之有志於易而欲眀羲文周孔之言者不盡心於朱子之學其何所循沿以上遡乎朱子之於易究圖書之微旨會易傳之奧義以統承乎易卦生爻之初所謂委之合而止者固在是矣嗟乎今之治易者何其衆也於朱子之學莫能專而精焉將何以論於畫卦生爻之初而明羲文周孔之言哉肆我蔡虛齋先生天挺其資神授之識卓然有追前開後之志沉涵浸漬乎義理之中而分拆解剝乎文字之際窮其平生之力而無須臾之暇盡心於朱子之學者我朝一人而已蓋朱氏之盡心於孔子無所不該而於易為大故虛齋之盡心於朱子亦無所不究而於易為深此圖之解推衍圖書探索卦疇入於精微而極乎廣大孜孜然惟委之循沿而不止源之既得矣時中少而知學即逰先生之門士之在門者以百數先生獨加器待以為可語以斯言忘其顓愚黽勉朝夕雖於精藴未能庶幾隱詞顯義聞之於進見而繹之於退私者蓋亦有年天喪斯文梁木其壞時中獨抱遺編不敢棄頽而無所啓發遂終於顓愚之人大負先生往日之所待每一臨文展卷未嘗不愧悚隕越如不能生顧今日就荒落恐終已矣惟先生之學著而為書既已家挾而人誦之此編乃其著述之大者士或以無所資於時文莫肯盡心故時中刻而傳之以與同志者共且僣述其概以告之使知斯道之委蓋在於此嗟乎學者果有志於羲文周孔之言以得其源者其無忽焉而不盡心哉浩然堂問答序浩然堂者羅一峯先生書院堂名也書院以祠先生而待學者堂之命名蓋推仰先生之能養浩然之正氣且以示來學使知所尚也書院之創實聶雙江公以侍御按閩憲使郭淺齋公協議而趣成之是時聘王一􅋯先生張淨峯公主教事學者彬彬興起向風豫在官聞之慕焉比罷歸走拜先生之祠思與學者逰而生徒散佚棟宇亦就墮圮堂左有淨峯公所為記石巋然在讀之使人有省也學之難興而勝集樂聚之不可常良有足歎者壬子春督學憲使朱鎮山公來試士公立教於道藝本末知所輕重其學講於雙江東郭南野諸先生間極有源委校文之暇輒進諸士以學而一峯先生又公之鄉先正也故留意於斯院之廢興親率師生謁祠修敬然後出坐堂中為諸生講微言要義紬繹闡揚竟日而罷聽者忘疲莫不知正學之可為矣公敕約諸士共學其中又為推擇師儒中之最賢者華亭唐次梁君俾專主教事唐君既賢而奉朱公之教尤謹士皆敬其所業羣居相樂視向日興起之風有加豫以病自痼未能往遊其間而欣喜嘉慕之情竊有加於昔矣久之友人有以答問一册示豫乃唐君作也閲之終編則見其於天人理氣之端性情動靜之藴義利邪正之界鬼神死生之機禮樂和序之制以至上世經綸之迹人事應感之故莫不及焉每一發論亹亹數百言斐然有章雖諸生俯首忩几矻矻治經義者使各出所長猶未能及一二而君所言繁悉該貫卓越諸生所問之表信乎學足以為人師而膺朱公之推擇無愧也豫屢從唐君往來見其意氣之髙趨尚之正明於可否愼於辭受其才周於事而行率乎禮故律生徒以嚴而不為虐事上官以謹而不為諂誠知君之所處以為師儒之賢莫君若也而未知其學之所及如此益可以為賢矣前乎此堂之聚其所講習問難宜必有及乎此未有著而為書者則此編之刻非但諸生得以人人挾觀傳講而廣唐君之教亦可以存今日之聚之樂使不泯於後而興起來者於無窮也許大正張存昭諸友來乞序豫固樂為唐君言者况諸友之請哉故序名筆私抄序臨川曾元山公按閩之暇閲境內圖籍取其詩文之有關於風教者命吏抄焉自唐宋及我明前後作者若干人凡得詩文若干篇名之曰名筆私抄公既自為之引以見其所取之意間遣使至清源山中以其編示某曰其為我序之公所以按閩防範嚴密裁斷峻飭有法家之長而氣度深宏體要簡正有儒者之風閩人歷數御史按治之賢者莫公若也意其操三尺以繩一方之枉邪而激揚百職之濁清以六條決事幽無遁照巨不失姦宜其精乎法家之所治而胡藹然有儒者之風也及觀是編則知公之學自有所在而法家之長皆出於儒學之用非如世之明察剛決徒有政事之才者比也閩事之載於編中者大則山川之表會州野之分畫官府之建置學校之興修祠祀之秩文而橋梁溝塗臺亭館囿郵舍障戍廥庾之細皆作者榷揚發揮之所及蓋一方之政俗在焉風氣之淳薄吏治之汙隆民生之休戚地方之舒急財計之詘盈人材之盛衰防禁之完窳何者不入於公之心臨之再期見於豫奪勸戒之際其亦詳且勞矣作者之所悼傷譏刺則公之所戒而奪者也其讃誦倡明則公之所勸而豫者也作者之所載若有以發公之智而公之所治若有以得作者之情公之治非有所資於諸文而作者之文不可謂無待於公是編之抄非直適暇裕之頃博閲旁採有簿牒之餘力以廣涉泛娛煩倦而已也抑公所抄雖取其有係於政俗之教者先後七八百年之間閲採略偹而於學術源流傳承之統尤致意焉蓋楊羅朱李四先生之言雖其非為閩事而發者不在是編而尊尚推明之意將以見夫同時與後來諸人之作皆嘗有得於是而必為四先生之學之所不廢故得以其因閩事而作之文並録而存焉可謂多而不失其統雜而猶折以衷又非苟為好悅而已也某既廢無所用獨好觀古人之言窺其大義微意之所在而多用以資為詞章方追悔其所為求將有進於是者而暗弱未能也因觀是編竊有感焉遂序之以寄吾志且復於公以為何如也張文僖公詠史詩序自詩亡春秋作之言咄於孟子學者始知春秋為繼詩而作王道既衰政熄澤竭而性情之正不復見於歌誦吟諷之間則褒善貶惡以存王道而使人心民彛不至熄竭無遺春秋不可以無作矣夫詩之為教主於誦美刺非導善禁邪其義與春秋之褒貶不異惟其發於情性本於倫常永言嗟嘆而下因以寓見乎風俗上因以指陳乎政理感動興起意味有餘而勸戒已著蓋盛時治古之史而春秋之文雖史其與人為善而使惡者不得肆猶衰世之詩與春秋之後代有史家其文則史而所取非春秋之義矣其不足使人止邪而向善有可慨者於是之時有能追上古永言之遺風得其不泯之意所謂誦美刺非以勸戒為教者施之於史家之所記即事以成章託聲以形事委曲宛轉文彩彰施而節奏宣朗使歌之者可以上下數百載之間如貢俗之所採觀風之所陳奮廉敬忠惠之心而懲淫放叛戾之志豈不有助於名教而為後世不可缺之言耶豫常從張侯谷泉所得見其祖故宗伯文僖公詠史詩一編其詞致莊重音旨和暢不為險怪苦刻則熙朝館閣之聲而指事寓教則意有獨至非徒役神於觚翰逰戲如詩人所長工於藻繢物態嘲謔景光以資玩適而已蓋近世不可缺之言也觀其綜核臧否得失之歸推原成壞理亂之故確而不苛深而不察然後形容以闡其體狀斷其制以正其條理上下數百載之間枚舉件係僅數百十而君臣事迹亦概見矣其事則史之事其言則詩而其主於為教則春秋所取之義孰謂絶筆之後殆二千年而詩之既亡其不泯之意所謂使人興正術而創佚思者反有存焉吾是以知詩之入不可以終亡也好惡大端惟其出於學問講習之正則一言之微亦可不倍於經而有得於孔氏之旨豈苟然哉公由掄魁仕為翰林以潤色論思為職雖尊為宗伯當隆盛之朝主於禮樂文章以其不至於相未及斷國之政而澤未加乎生民即其考古論世是非好惡之嚴如此使其得政用之以致主謀國盡所以為臣者必有能充其所以是非乎古之人者矣公著作甚多某獨因是編而論之故序之如此云兩廣總制軍門志序帝王以無外為治聲名政教思際乎天地之所燾持而猶病於力之所不得致禹征有苖南仲召虎平江漢皆在荆徐之間則百粵之逺又可知也惟其懷之以德畫為荒服文告所及而已後世力或足以致之而德下衰故秦出五軍以開南粵其人皆入叢薄中與禽獸處莫肯為秦由始皇之心利粵之犀象珠璣意不在民也斥地闢壤斯漢唐之君之所用心其意雖不出於利之外亦非純乎德故或畔或服不恆厥性由三代以還得南粵者惟漢文帝降附尉他近於帝王之德而經制未偹兩伏波將軍之師誅伐蕩定功已髙於帝王然元朔建武之君猶出於廣土之意宜其民不恆於服而輒繼以畔蓋五嶺所表荆揚之餘域為德之所懷而力有所不得致者三代以前是也後雖力足以致而不純於德其迭有畔服之迹則漢唐之事可睹已吳晉不奄北土有事於南服尤勤以其偏安之統其事雖勤而不足多述有宋之南亦猶是矣我眀啓土二廣嶺南之間治教與中州比虞周之所不能致漢唐之所不能懷兼制而得之於乎盛矣始遣都御史巡撫二廣並置或置罷不常其以總制重其權兼撫二廣而開府於梧州則純皇帝朝所命都御史韓公雍始也自是以為成制而授鉞體勢之隆崇賜履疆圻之遐廣視前世置尉建牧五管立使之制有加兵農吏士庶政所出實總文武之揆而當陳常詰戎以垂本朝德懷力致久大之圖其經略施設為事非一今都御史栝州應警菴公始自為志是書既成而有眀至德大功自聳出漢唐追駕乎虞周之際蓋所以能服百粵而無畔志由不利其上之物有以懷之而戡遏攘拓之方其力至矣則虞周以來嶺海之間未有此書也昔漢馬伏波平反側二條駁漢越異律與為約束駱越人奉為馬將軍故事李衛公慰撫嶺南所至震威武示禮義民遵其法不敢倍而步隲吕岱陶璜為吳晉宣力交廣績效尤著惜其不能為書載而行之後世亦其勞烈雖壯而風猷未裕與然文淵藥師立功於草創而步吕諸人僅為偏安之國之勳臣使誠有其書猶不足行於逺也公以文武全材鎮臨斯土有功於嶺海不啻兼是數子之勞烈而籌謀綏馭之暇智足以及此書其風猷逺矣且當有明德懷力致之熙運以顯白其書遭遇之盛又非偶然也益贊於禹數言存于虞書江漢常武二詩列之大雅虞周之美在焉簡册寥寥詞約而義古公所為書事詳文繁古今不同可知也於以載有明之美而可行於後則雖詳且繁其義固詩書之所稱烏在文之同不同耶某特論其所係之大者為序以推尚是書於漢唐之前蓋非虞周之間不能有也若其書之發凡記事可以見公功業之所在與學術之所至觀者當自得之唐荆川文集序吳之有文學舊矣諸樊為國斷髮之治未變蓋方甚陋而公子札已能盡通易書詩禮樂六藝之文以觀於中國則名卿碩士有愧於其所知悅其説之博雅而慕之如不及孔子教於洙泗來四方之學者則言偃踰江蹈淮而往遊焉卒以文學列於大賢之科南方之精華為之盡發而孔氏之道資其言之有文以行於逺至於今為烈蓋其盛如此畫長江大湖以為國方地千餘里林麓川澤之美殆不可數而光英沖粹之所漸涵磅礴於其間二人而已雖其甚盛而亦豈非難哉吾於二人讀其書觀其言尚而友之而庶幾知其人於今所見而及與之為友又得一人焉毗陵唐應德也君於學蓋所謂得其精華其於言可謂有文而必行於逺者也其文具在學者苟讀焉而思思焉而有以得之則知其心之所通於季札孰為淺深言之所成於子遊孰為先後有不可得而辨者矣君仕為翰林編修復為太子司諫皆以守道直已之志棄去不啻敝屣有吳公子輕千乘之國之節其文之以禮樂得言氏之傳而廉隅操行必謹於一介之取豫剛果自斷不可以威武利祿誘屈也尤足以闢夫偷懦憚事無廉恥而嗜飲食之誚上下二千有餘嵗之間吾謂吳有文學三人焉不為過也季札之生其國雖尚陋先君端委之遺教猶存而子遊得仲尼為之依歸其成此非難也唐君獨起於千載之後追二人者而與之並豈不為尤難哉君行年四十其學將進而不止其為文將日益富而且精豫之所見如此已可傳也無錫安生如石子介慕君之學得其所為詩文彚而刻之以與同好者共安生之趣尚如此豈凡人之所及哉張淨峯公文集序伊尹周公不作而功烈德義不出於學術春秋以降叔向子産臧文仲士會蘧伯玉趙武之徒卓然為列國之名卿材大夫其於聖賢之學藐乎未之有聞管夷吾晏嬰在諸子間為獨盛各以其學為書殆將抗伊周以自立顧溺於功利之習隱微元本之地失其操柄決裂王道之全體而支出於霸卒為學術無窮之禍雖盛於諸子而其庳逾甚矣君子之學考正於王道而後純不純於王道未有能特立於世者也賈誼董仲舒皆知推明王道而純駁判矣當時言者一以為伊管一以為遊夏可謂微窺其純駁之所在然右才左德之弊亦已見自是以後輔佐興王彌綸太平之才無代不有鮮不慙德於斯文惟諸葛孔明以命世英偉之資扶衰撥亂經營於離散壞缺之餘不為隨俗以苟功名庶幾於王道矣而學不純師申韓之嗜或乖其寧靜致逺之言致使後之為書者以兵法詭其傳亦其不純之弊有以取之與典禮服刑其秩敘命討舉推而原之於天視聽言貌動於人事應感之用而命之曰上帝相協隂隲之錫疇帝王之學粹然一本於道而已不得與之如此其不雜也幡然興於有莘之野使一世之君民必為堯舜其行事著明矣而言之精者猶能垂之為訓制作禮樂膺戎狄驅猛獸皇皇東山之征保孺子負扆臨諸侯以寧周家之百姓而詩書易周官諸篇其言且數萬非其文之不泯其道存焉耳春秋以降諸君子其不得與於此也宜哉蓋豫觀御史中丞張淨峯公文集歎絶學之在此而慨其道之不大行然其功烈之震曜德義之章明則卓然一出於學術矣公仕雖尊顯然不得在朝廷常握節鉞以征伐戎夷為事荆粵滇蜀窮四履之所至禹益之所徐俟而後格方叔召虎所為聲罪致討而後服以威以懷倍有其勞而並著其績東馳𤏡道西控象郡兼東西二方之南延袤數千里之間皆諸葛武侯瘽瘁僅平之地謂公為今之武侯非與自詭管樂宜非公本志之所存也公之學上據六籍旁括百氏流略泛該而本統不紊細而不可不陳者數粗而不可不守者法詳講而精擇博取而約受折衷諸儒之傳貫穿歷代之變意不能匿乎其言而名必適乎其義支詞曲説不擯自黜叔末之制踵襲寡陋溯推沿别究極源𣲖知古人之治必可施於今信乎能考正於王道者矣蓋武侯之學究於用矣而當衰運崩折之餘其時不逢施之卒不究公之生有其時矣而不得立於朝其道亦卒不究於用皆今昔之大慨也公平生嗜書自少至老未嘗一日舍書以間其在兵間卷不去手潛思力索彌久不倦與獨觀大意所讀之方異矣故能篤信固守不為異術小道所亂而免於不純之弊也就其文觀之氣象宏裕而激發時見法度謹嚴而豪縱有餘如山嶽之為重河海之為涵出雲興雨姿態百變怒浪悠波伏起靡常使人喜探樂玩而阻髙逗深又足驚悼憚畏自失其所觀也觀其文亦庶幾得其所以為人與公之弟户部君維直氏刻公斯文於家而謂豫序之夫功烈德義難以兼有文章此公之獨盛於今人也文之合乎道而功烈德義由是以出尤公之所以為盛也豫故特著之以待讀斯集者考論焉明水文集序陽明先生倡道東南江西之士從之獨多最賢而能得其傳亦不數人臨川明水陳公其一也數人皆先後起家進士通籍於朝公以守官不回失權力意其得譴最重失位最蚤間關逺戍久而僅釋築室明水山中習其所傳以興起學者所言非一其著為古文詞積日既久遂成卷帙友人董君兆時丞建州因刻以行之同志而使某序之隂陽行乎兩間肖形離色於其中各資是氣以自成清英醇秀人獨得之強力之所可至智慧之所可通深入淵泉峻極窮昊夫孰不能至於道而蔽缺畔拘乖其所能散裂於形器名數之煩勞匱乎技能事功之淺畫宫而苟處多岐而競馳其不能至於道由春秋以來患之矣天下之人不能生而有聞而卒得預於聞者有為之先而倡之也師授講習在宋洛閩為盛實繼鄒魯有作蓋自托於先者之後不敢墜絶其緒且以待來世之冀有聞者非苟為師弟子之號以相驁飾而已然怪而疑之固衆矣惟其疑之而始信怪之而始安然後能篤於信安之而不遷彼終於怪且疑者雖衆而亦莫之惑誤沮塞也方陽明之倡於東南也怪疑之衆甚於洛閩之際惟公與數人慕悅而勇從之合一世以咻數人之所是卒能以數人而勝一世之所非其志可謂卓而其功可謂勤矣天地所以設位寒暑日月所以變通著明而不息以流江河以峙山嶽以蕃育庶物可以神存而不可以意測可以心傳而不可以語授此君所為聞於師而發揮誦繹於朋友之宗統也二帝三皇之經綸典章損益舉廢措正而施行講之不可不明也閨婦野人之歌朝廷郊廟之奏怨譏嗟歎規誨形容徴風化而本德業五霸之所爭名卿列大夫之所圖揆騁騖以及後世君臣之迹臧否得失可以推見治亂考古而鑑今思之不可不正辨之不可不詳也草木蟲魚鳥獸之形鍾鼎琴瑟佩冕車裳函矢之器師旅徒役財計播種之事歷官星翁稗官野記正名百物之所該悉泛涉而約取擇之不可不審也孰非宗統之條理曲折而紛紛者以近於異學咻之謂其妙已粗物內究而外遺目擊端拱而曰已存矣是豈知君之所得於傳者夫已誠妙矣何物非精未有內通而外不舉者也顧有嘵然疑其為異而果於詆之不亦悖哉惟其學之不謬故著為古文詞吟咏性情敷揚事理莫不有古作者之法雖宗統指授謹守師傳步步趨趨如恐或失而見於文詞之間則自有機杼未嘗規規倣合形似而以為傳也此其所以為明水之文與吾所謂數公故宗伯歐陽南野文莊公今司馬聶雙江公司成鄒東廓公給事魏水洲公與公其最著於師門者也三公得位行道洛閩門中為王遵叟朱光庭楊中立劉晦伯李心傳矣惟公與水洲公廢謫禁錮與馬伸魏掞之蔡元定同其蹤迹然學者推慕二公不後於三公由其學術之同而不得以名位與之也某生也後猶獲夤緣侍教門下故於董君之役不能辭而愧於言之不足以發之也同志君子尚正之云爾虞山奏議序論列諫諍之風西漢為盛而賈誼劉向獨冠於廷然誼猶有䇿士俠夸之氣而向憂深慮至剴然出於惇厚諄復故讀誼之書蹈轢揮斥恢偉浩博驟若不知其所統而倫中體達條貫具偹有非向之所及然挾持所有睢盱一世傲乎其無足當意至於譏切世主犯至尊之威以快其論議氣勢之所極而發其辨其害於古者進言之理亦不為少而向無是也豈獨其才使然哉亦其年方壯憂患事變之嘗試更閲猶淺而剛心猛氣未能以自伏也如向之於是深矣故誼當盡下之朝而不能自試其學向生於諱諫之季雖其不默而尚不至於不容亦其修術之異所致然也苟二子者易君而事之向豈有不盡之憂誼之獲罪受譴當不可測寧復長沙嘉惠之能承也夫欲以其言決一時之利害得失使必出於吾之所為處已疑於掩在列之功形衆人之不能其大者乃當奪其君之所便強其所不欲而次及於將相之拜免君子小人之進退使其懇然動於忠篤憂愛之純如有所不得已猶懼不合而雜之以矜長濟辨之誇習宜其有所不合也果具有合而亦豈為盡於心哉以誼之才而其患若此蓋進言之術之難也况於後世之士哉以吾所見陳虞山公奏議何其有向之心也蓋公於入仕其時已至而世故物情之攬採練緝既熟且審矣其狷節勤行苦刻其身以逰世如煆金於冶漚菅於流鼓爍濯擇窮水火之力至於殽稗之不存而後已故芑藿之羮綈綌之服貴久而不變誠以為甘且吉而無勉強勵迫之意既躬蹈人之所難其持論主諫常依於平而有忠厚之風至其有所劘刺繩彈一本於誠心坦切非樂於攻惡發慝以見謂為直觀其言知其心之所存如此也公仕於仁聖之朝所言率已施行視向之自竭於其君而棄不見省拂塞顚擠以鬱其志其心相近而所遇逺矣某始仕年方少也學不足以達古今之變不自知其妄躁而好談天下之事盛溢之氣方若百川灌河涯涘未形漂浮而不適所歸宜其見擯於絳灌之伍獨公辱有以取之至於今日而後能知公之所以為言者其中之所存為有向之心也公年躋八十無復有意於時精神卓然立於物表而憂盛世危治朝之臆惓惓不怠其與豫往來書具在尤可以知公之心雖其老而無所用而不為衰改嗚呼兹豫之所以謂其近漢之劉向也與胡公平寇奏議序嗟乎天之於民孰謂果不仁哉以比嵗吳越之寇觀之山原厭人之肉川谷流人之血萬室之邑千家之聚生育長養於其中華膴繁盛一旦蕩為丘墟者不知其幾彼蒼然者是果何心其亦不仁甚矣然禦亂之材已生於其時如中丞梅林胡公者卒能為東南定數嵗之亂蓋天所預擬以待今日非無意而生斯人也孰謂果不仁哉人知胡公成功之偉而不知皇矣眀眀之顧眷然有屬公特代天以逭其終不忍斬絶民命之責耳人物盛衰消息之數天亦有所不能違惟其生才以擬其後為可見其心而勝人之力亦卒有定矣豫之論如此而友人宰仁和許君子衡以所刻公平寇諸疏示余山中且曰必得一言序之夫兵之為術倐陽忽隂出幽入眀動於天上而泯其運之樞發於地中而閉其往之門當其決幾於心而授算以行雖腹心爪牙之士奔走蹤指之下不能自愛其力而亦不測其所示之方蓋其謀之而得為之而成至於計俘執訊之日見其得之成之之效而其所以謀之為之之神在公尚不能自言况於奏報章疏仰有祇嚴威睿之體而下有牽制格例之文循守憲牒遷就吏議非但嫌於自敘功庸其心有所不敢盡而用司存復逆之式以發揮操縱張弛之機權於詞亦有所窮而不得騁且夫用間出餌合於古之所謂竒者妙用長䇿正在於此而最為吏議之所抵牾又烏得形容其倣佛耶後有欲窺公善師之䇿而求觀於斯刻恐無以異於諸邉帥閫凱捷之章而亦安能如公今日得之成之之神如此哉故以文帝之世寬法弛禁號為仁明之朝而魏尚上功幕府級少不合卒格於吏而上不能知也奏報之艱非徒今日患之矣趙充國老將知兵其在金城圖上方略所陳便宜尚涉瞶悶不發人意帝下其䇿公卿是非者半固意見之異亦兵勝之術書之於簡有不盡明也惟其深思逺慮主於為國立長久之利不急邉功不徇廷議為有古名將之風後人猶得因其言而知之觀斯刻者其尚别有以求之庶幾得公出謀發慮之一二乎士君子當事成功世多目以臨職黽勉因時乘便偶然致之而已英雄豪傑之士見逺知微而絶羣之氣鷹舉虎視己與凡人逈别顧庸庸不能識之耳素養前講無事而常為有事之備遇險而竒見應變而智出豈偶然哉聞公早嵗即留意於兵在臺時方國家間暇仕者多以豐裕為樂公獨有隱憂預計今日之功信非偶然致之而已公嘗於衡嶽武當山中逄異人所授語皆祕要謂公當以百險中立功取名豫得之荆川先生云當不謬也豫謂公之生乃天所擬以待今日之變豈虛言哉故書以遺許君使刻之為奏議序全懿堂集序詩國風列婦人女子之事詳矣抱節自誓者共姬之外無聞焉其言動有法篤於禮而合乎道者多公侯卿大夫之妃方王道之行修其內教至於漸漬成俗居能佐其夫子言行不失法度則遇變全節者宜其多矣仲尼刪詩何所存之略也豈女婦所難而可傳者在於好禮聞道而全節自誓乃其固然耶王道行內教修化流而俗成託於公侯卿大夫之家其禮義之積非一日是其好禮聞道者猶可能也然詩人歌以為美國史從而序之肄於樂官以為世風仲尼著之以為經萬世不可廢也世教下衰自士大夫賢者尚恨於道之不聞况於閭閻之間婦人女子者哉當教衰之時長育閭閻之間稟女婦之生而有聞道好禮之實是古之公侯大夫之妻之所難能而學士大夫之所不可及也推古詩人史氏之義宜其正色書之而咏歌嗟歎之不足而仲尼之所務白也豫讀全懿堂集蓋歎諸先生所以歌序陳母都氏者有周人之風其於仲尼之教為不畔矣偹觀夫人言行之詳無一不合於道蓋其天性有聞而非教之所成也觀者髙其節悲其志而忽於言行則於觀夫人為不詳夫人之子忠甫君信道力學至孝終慕泣而示豫以是編既卒觀因為論著之如此湯公家集序余昔備員禮部祠曹主事最後稍遷吏部司封郎中祠曹職主大臣祭葬褒諡之典而司封職議贈録之恩大臣以天年終者則有司以訃而其妻子自陳乞祈恩者為多事下二部二曹職之故凡死者之功狀名行皆得預聞而論之祭與葬載在制令有品級等差凡訃至者各以其階得之至於諡以易其名贈以榮其終蔭以録其後三者則不可以易得吏部禮部尚書𣙜核死者勳賢名績表表可告於上者然後請之或請而輒報罷者又十二三此其大致也自余叨歷二曹前後僅六年耳而四方大臣訃至者不下數十人噫何其多也中間勳賢名績赫然著於世為國家寵重不獨以其官尊顯蓋十數人焉余每與寮長二道之未嘗不掩泣長歎也蓋所謂大臣者皆以踐敡之久積纍之深以成其名樹其望致位尊顯可謂偉然一時之盛而宛然以死是可歎也况夫所謂勳賢名績赫然著者或小用而終屯或避讒而自引或難合而易退其去而老於家也縉紳咸倚以為重幸其未死而冀其復收主上好賢求舊將旦暮召而起之以共理興化而乃一朝忽然其可悲悼豈一人生死之間耶嗚呼若故大理卿沂樂湯公者非所謂勳賢名績赫然著者耶公之操行修潔純懿足以當史氏之議而無所愧其中外之勞伐若寵以榮贈而恤敘其後昆亦有以稱之而不為浮直以一眚被廢妻子倣徨不敢以聞於朝非惟不得其不可易得者而祭與葬之合於令制者亦不蒙秋毫之恩是不為尤可歎耶公之位不滿其德用未究其所長評刑部之獄一不當主上不勝慎刑好生之仁以為失職怒而黜之固非有大過得罪於上也當時與公同以獄事被譴大臣不下數十人主上仁聖慈明惜老成棄舊過蓋十數人者已録用其一二無所疑滯然則公之始終固已暴於上心亦旦暮將召而起之者而今不幸死也豈非命耶公之孫世賢集公所為詩文若干卷將梓以藏於家余受而讀之因謂世賢曰夫公之赫然著者固不待文而存也然公肆其平生之餘力以發於聲律文字之間又深厚有體而極其思則斯集也世將寶而傳之豈特可藏之家而已哉惟公之存不假於文故余敘公之集亦不詳於文而戚戚於人之云亡庶後之有志之士欲論世尚賢者於斯言有考焉且以致豫之所感云耳杭雙溪詩集序自豫結髮登朝則知有所謂杭雙溪公矣去年秋謫判常州謁公於義興之第因拿舟泛東溪訪張公善權二洞由西溪泛舟而旋於時山明氣肅霜落水清相與把酒賦詩以為至樂始余以公年髙長者意其倦於杖屨之勞然公顧健步善升足之履也無所擇而其移若翔據髙臨下慿曠以望逺指顧揮斥蓋察見秋毫之末而接乎飛翼之所入其髙談濶辨扣之而應酌之而不竭若鐘發而泉出也豫乃歎曰公真所謂仙人耶何其氣厚而神完也夫昔之為詩者莫不憂幽怫鬱滑和搖精至於嘔肝喪魄猶不能工今公之神氣其厚且完如是乃以能詩成名於今豈不難哉公曰夫所能詩者豈誠使人攻苦勞極至此哉亦各隨其才量之所得而發之於性動於其中觸於其外固有不得不然者耳故吾之於詩少而習焉久而專焉老而篤焉然足以為吾樂而不能為吾困也因出其集若干卷示豫曰君其為我敘之夫以豫慕公名積於十年之久一見之未能今乃得從數日之逰與聞一言之教又得讀其詩而託姓名焉豈非豫之大願哉豫初入縣至宜興入其境顧而美之曰此非吳地與何其風物氣象不類吳中也及縱而逰之益以得其美焉其山水之勝者往往幽邃而曠逺明秀而淨深至於草木泉石亦皆發色含氣而有餘光與夫澶曼綺美腴衍而澤麗者大不同焉豫愛而異之意必有魁竒特拔之人應而出者以鍾其美而圖牒所志祇著其為幽人隱士棲遁之所宜豫疑而不能察也及讀公之詩乃欣然得曰所謂魁竒而特拔者其固在此也夫公之詩雖製裁錯出律調不同歸之嚴整雅健體髙而意正音舒而節越有前世作者之風無有乎嬛媚之習粉澤之飾艷妻蕩子冶逰淫託之思不干於中誦其詩不知其為人亦可想見其為美士君子也此豈可以強而致哉蓋其所鍾者粹而所用者𢎞故能成其名而無所汩亂於神氣豈與畸窮憔悴之士同日而談耶敬皇帝時治化熙洽士大夫子以名行相髙天下敦龎無事士者樂於間暇而有和平之風故得大肆於文學其時北地中原江左卓然名家殆數十人江左則徐迪功郎禎卿顧中丞公璘與公為三人迪功仕宦最窮而早死二公獨老而大成享遐齡至大官巋焉為江左風流之宗其清德偉望宜於表民用世雖退而老於家將必有待而起何其盛也豫自毗陵入為留都户部員外郎持謁通於顧公一見而歡因以論公之詩之言質之顧公曰是也遂書以復於公為雙溪詩集序鳥鼠山人小集序昔季札觀周樂至於秦風知其聲之夏也卜其將大歎其為周之舊其大也已信於他日矣然觀車粼駟鐡小戎無衣之詩蓋戰鬪殺代之習胡云周之舊也彼皆負堅操鋭之人發乎性情播為音節莫不有賢士名卿之風於此見文王周公之化之逺而詩之為教亦𢎞矣至於專精果毅敏於有為而不偷則深厚之水土不為無助自秦之大也邠岐豐鎬之間率謂之秦而故名秦者則西傾朱圉之所表汧渭之水之所從流也由周以來至於今涵育震發宜不陋於非子秦仲之時而風未有聞於中土某蓋疑焉乃今得讀中丞可泉公之詩中丞於詩甚宏深某不能測窺而知其為周之遺也深厚之意於是乎生用其專精果毅之力致之於學漸服文王周公之教文以澤其質律以諧其音彬彬乎何聲之富也夫風者物之所由動也故或萃或散故有衆人之風關乎一國亦有一國之風繫於一人以衆人繫一國者其觀也於人其卜也於國以一國繫一人者其觀也於國其卜也於人今有欲知秦中之盛且美者舍是詩其何觀而公之位望行業將益光顯於時以昌大其聲也必於是乎卜之某南方之鄙人也不足與於大風之觀竊嘗從事先王之教學周之文而得其所遺蓋歎周道之不亡者微矣俗學溺焉而不談談者又陋於為詩曰無與於斯文也嗚乎其不達於先王之教周之所遺者宜乎微矣於讀公之詩幸周風之猶有存故本而言之以廣學者田間集序豪巂俶儻之士勇於蹈古人之竒節而忽於習未學之細行世之論者以繁細為賢員規方矩引度繩墨則彼不能周折約束於其中何者其心有所好而氣有所挾也以其不習於細也蒙世之論批抉排斥至失其所然且不悔不為奪其所好沮其所挾如是而後謂之豪巂俶儻之士豫往時聞濟南劉函山先生者豪巂俶儻人也其逰於世之迹則屢擯而稍進一進而輒斥豫謂其於未學之行未習也及熟於濟上之相見先生固務立大節而亦不忽乎細然竟以見斥豈非其細者不勝其竒乎好而不得泄則怨挾而無所試則怒怨與怒交於中於是有刺譏之微言憤懟之大聲亦其勢之所然豪儻失志者往往蹈此終為學者所持以固其論有所長者固有所短與劉先生田間之詩又何其平也酬酢斯人鏤琢羣品以發其藻達其思不為疾世誚俗之言遊於顯者而非有羡也與庸衆伍而不為流也怒怨之氣不姦於聲甚哉聲之出乎心而不可矯也寶所好以足已則不必有泄而心廣忘所挾以順物則無庸於試而氣和豫於讀是詩也知其必有所以出之者矣衡門之下考槃在澗皆賢者不得志於時獨處而嘆已之詩也和平之聲今可誦而繹也彼不云乎永矢弗告嗚呼彼其足以自樂者不欲為人告也而又何怨與怒焉故豫讀是詩也將問函山之樂如何其毋靳焉而不吾告也黃曉江文集序三代而下世何其多佚才也方世之盛人不慕為士為之者修於庠序賔於司徒論於司馬冡宰詔焉王者必得而用之故才與賢者必興於在位而不遇之歎不作於其時後世人莫不有好功名之心而為士者始多為之多則其修之不至詖窳濫竊之弊出於其間而賢不肖才否之辨不明於是有才且賢而終不遇者以其聰眀才智不可苟同於凡人斂置其扶世救物之憂退焉而自佚則有所不釋於中見於言語文字以諭志意達性情非汲汲期其言之行於逺也而義理載以行焉雖欲不逺不可得也次焉者亦且以其不樂之心發憤於意氣陳古諷今傷事感物殫擬議之工而偹形容之變如近世騷人才士所為言亦其聰明才智之所至也自科目用人士無他途以發身舉一世聰明才智併力於此以伸其好功名之心為士之衆莫甚於今日蓋已薦於有司從宦得位而沉於卑冗困於斥竄終老且死猶謂之不遇若吾友黃君應初卒無所合於有司以儒衣自老可謂不遇之尤者也君聰眀才智絶出同羣每試有司輒異之君以科目之學為不足好且惡夫修者之不至而偷為詖窳濫竊之儒恥與之羣也長揖謝有司棄庠序之籍拂衣入山中然則君之不興於位非不遇也自舍以去人不得而用之也豫謂之不遇者以其果才且賢而老於野言之也君既入山遂與俗逺蕭然自放於丘壑水木之間孤髙介持酬接幾絶而形容朴野流俗頗以為怪君益自得也既死胠其篋得詩歌雜文數十篇皆有可喜以其聰明才智之異使發憤而工為之視近世騷人文士未知孰髙下也然君自舍而去無不樂之感以搖撼其心精神間暇而志意宏肆未嘗顓顓期以言語文字聞於人也故所作不多以其行髙而節介鷙傑之氣終不能掩於言讀之者自見其竒竒怪怪離塵出囂非齷齪拘謹鍊字句摸體法者所可及也是雖不與發憤工為之者競其所立而亦不為無得於載義理以行其言者之歸趣也雖傳以示同好可也豈直其家子弟宜藏之而已君弟潨清與子樗仲好學勤行不替父兄之志潨清尤才而有文皆偉然名家子也豫為之序使其子弟刻君之文傳之同好正不在以多為貴也君名淑清别號曉江與豫交最善方謀銘君之葬而先序其文顧洞陽詩集序剛柔舒促淫濫泰約之變人之性術情好動於其中而美惡之形成矣因形以有聲而得失邪正之言所由以出人之居處有養而踐履有習拘焉而不備則於物之變有所未嘗性情之動亦曲而不中羮藜含糗者固不可語膏粱之豐旨而飫於珍滋之豢者亦豈知蔬茹之為甘櫛風沐雨勞筋憊骨之夫孰知廣厦細氊安坐徐行之為適而雍容都雅墮弛其四體者與之談郊野道塗勤動之故則不省其為何佚樂憂勤之境士大夫居養踐習之所閲蓋有終身由於此而不適乎彼者矣故人之為言其出於剛悍苛促困濫苦約而無聊者必其閲於憂勤之所為而狎於佚樂之習養者常柔騖舒漫泰肆淫靡而不知節如是者莫審於詩久矣夫和平之聲不聞於時而士大夫之能美其言者少也毗陵無錫顧洞陽公好為詩其學於古無所不窺而皆以資為詩詩日益工好日益篤雖晚而不倦積日之多其詩至千餘篇可謂富矣約乎禮而不迫優於興而不放文質相宣華實各得誦其詩不知其用意立法之至者亦悅其有和平之聲洋洋乎其可愛玩而咏歎也公所居天下所稱華潤膴厚處也故宦家而先世獨贏於財士之起粳糲奮蓬藿惡陋鄙朴而崛興者非公儔也仕為行人為郎為郡守以至外臺副使彌尊顯矣其為行人以諌忤康陵繫詔獄杖之闕下僅而不死為郡始為泉州起復為虔州皆限帶嶺海荒阻險側﨑嶇而詰曲又儉窳鹵確仕所不樂往為副使乃在珠崖大海島上亂巨浸犯驚濤而後至其境毒霧盲風炎癘怪棼之聚故漢所棄地也身外迹逺有蠻夷雜俗之治事機合遝而禍變反覆畏讒慮患焦仡造次而不得休其嘗乎憂勤之變熟矣生於佚樂而行乎憂勤所養不以勝其所習而所習有以充其所養宜其為言之美如此蓋性情之效而非鎔鑄意義雕琢句律之所及也世有履憂勤而悴瘠都佚樂而宴偷其性情不中甚矣顧妄意於公之為言又烏可以為美乎公守泉時豫新以迎婚乞歸及侍公公詔以詩豫方讀李杜詩未熟也公數數談建安正始之風豫退而購魏晉人詩讀之然以尚少不能解其旨未敢有所請今乃得閲其集而序之信乎公詩之美蓋有得於魏晉也豫序公詩獨論其情性之效以著其所以能為美者非苟然也然豫固所謂履憂勤而悴瘠者雖能知公之詩而尤愧恨於不可及也巖居稿序巖居稿者吾同年無錫鴻山華君子潛罷翰林家居所著詩也丙戌賜第當今上圖治之始方招延茂異思與翊贊鴻猷黼黻大業之意甚盛於是選其雋彥養之館中得二十人蓋其慎也子潛與姑蘇陸浚明袁永之檇李屠文升在選中尤以才名最於同館皆吳人也會大臣異意正邪相軋之機未決朝議靡所定館中所養並除他官無復留者浚明永之又以譴謫久廢而子潛與文升最後乃由郎中改授修撰陸袁二君廢既久著書益多君與屠君以文學進用清顯為上左右顧問講讀之臣復善為詩歌而吳中之才雖或廢或用要為有盛名於時然文升竟以疾自免君亦繼以讒貶自疏迄休詞學之士反錮於右文之朝良有不可知者昔之以才困者往往挾持所能之過慿恃傲睨以干世怒而犯神之所忌故不有忤於人則必有畸於天而諸君無是也君尤沖雅惠良不以才智先物厚自處而薄責人有君子長者之風而亦以不容嗚呼其尤不可知也夫永之文升既長逝惟君與陸君在耳國論方明論思潤色之託宜無踰君當有圖及此者而君所為詩顧灑然自立於塵壒情纍之表意象之超越音奏之淒清不受垢氛而獨契溟涬若木居草茹服食導練淪隱聲迹者之所為言非世人語也豈其果於自廢不難與世絶無復有意於世用昔日急君上憂民物之志悔其非計而翊贊黼黻之盛如浮漚噩夢永棄而不顧耶嗚呼人方有意於君而君乃自絶於人其為皭潔肥遁而不汚乎抑亦懷竒抱珍足已自好怨而不怒也豫知是詩之妙含藻發擅長而成名其所以自悅者固其所以自窮與雖然士之得志於仕顯融尊貴者未嘗一日無於世而半語片言合乎古而可傳之人者不輕使有之也君雖以詩自窮其又何憾民物之事功惟其無意於為之迫之而後起為之而必成逃世自足者人將求之而有心於干世者不得也君豈終窮者哉豫既為此序遂書一通以貽陸君共評之當以豫為知言也陳少華詩集序由漢而下為詩者多矣其人大扺陵夸恣傲睥睨倨虐挾能盛氣遌衆物而犯一世或放浪詼譎剽輕不根喜自佚肆脫去繩束而為慢侮世皆可狎而於人無足嚴其憂愁狹迫悶憤無聊天地若無所容而人不可與偶好為不平誚刺多怨而善悲故能設竒託怪鈎深抉隱窮四時之變而引萬物之類作為語言以道人情之所欲寫而不能本有而不得以已者其詩之工往往極其至焉雖其詩之工然亦以傲虐慢侮怨悲誚刺負世之纍有其才者固不免有其病與余少而喜為詩以為文之窮情極變引物連類指近而寓逺陳顯而寄微足以感人動物詠其所志者莫善於詩其好之甚專治之甚勤自顧其睢盱齷齪謹繩墨而蹈規矩於詩人之病不一似之宜其不能工也人各有所受不能相襲勉而為之卑氣駑質間心緩性震掉而排擊之非其所習終不似也故亦卒莫能工之乃今讀陳少華君之詩心有異焉君簡重修潔禔肅寬穆步趨衣冠頎然成德君子也於人無所不愛敬發慮出政以臨其民尤恐傷之有仁人之風於詩人之病非惟不似之乃薄不為也其詩之工蓋余所謂窮情極變引物連類善言其志而足以感人動物者也如余之愚苟無其病則於為詩不能副其勤而足其所好猶復貪暴強勉幾幸似之終以不習而自止非能薄不為也余誠愚不足論然觀昔之為詩者皆雄偉恢宏絶倫特出之材猶不免有其病而僅能名其詩以見於世陳君獨兩得之豈非難哉余既盡讀陳君之詩因論而序之以志吾愧且使學者知世之為詩者固有無其病而成其材如陳君者也碧梧軒詩集序不得志於時而寄於詩以宣其怨忿而道其不平之思蓋多有其人矣所謂不得志者豈以貧賤之故也材不足以用於世而沮於貧賤宜也又何怨焉才足以用於世賤且貧焉其怨也宜也言之所寄必出於不平煙雲水石蟲魚鳥獸草木之見皆可怒之物寫而為詩皆不樂之旨是其人於中雖未宏而亦其情之所不免與淮府儀賔上海李君士達蓋士之不得志者豫從其子博士榕得請其詩讀之所謂碧梧軒集者也君於詩獨沖融寬暇而有和平之想豈其狎於王門之貴富漸染華靡玩習宴偷忘其所欲用於世者而魁傑崛宕之氣揉磨鑠革至於化盡無所復存其怨耶將其安於時之不可冀命之無所復為放其志於事物之外以自釋而平其心也不得志於世者於有可冀之中猶萬有一焉終不以為不可復為輟其冀之之心而渙然以釋也今之婚於宗室之屬者則絶其入仕之途而欲有為於世者非入仕則無所用其才君所遇既若此矣雖欲不放焉以自釋又可得乎不得志而賤且貧焉其迹足以自髙隱約枯稿偃蹇以見其齟齬忤觸而泄越其芒角其怨宜未甚今見謂不得志而亦為名寵命數之所羈絡入與庸庸者伍而出無以自别於繁奢附倚者之徒其為鬱鬱而不可以居殆有甚於貧且賤焉之所處君亦何以自釋而能平也嗟乎今之託婚於宗室之家者相娛以佚樂競為綺艷膴腆而患於不足狗馬子女之養畢給而喜爾君獨深沉寂寞畜其氣苦其思以託於煙雲水石蟲魚鳥獸草木之間極其陶冶雕鏤之力與寒士爭其尺寸如恐不及是其心必大有所不釋於貴富之養憤悶鬱積決焉而肆於此也孰謂君之心果能渙然以平而其詩詞雖不怒蓋其怨之所存者尤深矣豫既觀其詩卒編因序以發之而以授博士君博士以醇學篤行為鄉國善士而困於有司竟以一經教授尤所謂不得志者其天性獨至得吾之文必將泫然出涕不能自勝以為知其父之志者莫豫若也讀碧梧軒之詩者觀於吾文庶有以得李氏父子云沈青門詩集序往余聞沈青門於顧東橋公談之不置以為江湖詩人第一流也出其詩卷觀之卷中既多佳句又工為行草書相與覽賞加歎久之而罷知公不妄譽人也是時青門詩名已盛士大夫折節下之或忘形迹與締交盟且滿海內豫始從顧公所知之豫則陋矣轉徙宦迹數年斥歸閩海上無由一見其人今年冬君裹糧南行踰嶺逰武夷度三江入清源訪豫草堂彼此如舊相識豫所以歡然於傾蓋之頃以在金陵顧公所閲詩卷也君顧謂斯行獨有意於豫再見則出其集曰吾詩非得遵巖一言未敢以示人人嗟乎豫喜覯君方窺其笈冀見一二而恐不可得乃辱不請而盡得之駢珠編玉奪目駭視酬接之不暇連數旦夜不廢而後帙窮何其快也夫江湖之人羈窮自放出於無聊不繫之迹抉斥物彚忤觸景光舂撞其鈎棘之腑腸擅極工苦驚人口頰而施諸廟朝則見為瑣迫傷劌而不可居觀君樂府古詞雜詠遊適之作近於工者之詞其所處固然也至於覽觀京都恭覩今上制度禮樂之巨盛擬為應制之篇形容功德頌美托華麗而有則誇而不浮與學士達官雍容司存蹈巍要而毗清切者競其體況豈才之兼者固不以所處自為限局與錢塘繁富明麗江南一都會也君生其土而故少司寇省菴公之季子也習其家學資聞廣益窺國家之光而講中外政俗之變亹亹有倫非生於窘窶崛側者比也則其長於彼而且兼乎此有不足異也豫獨有異焉君恂恂恭敕風致藹然其所為邊關諸詩意氣激發溢於聲律之外如彈鋏欲邀公子之車欵户必得美人之首攝衣從虛左之迎猶餘矜色持槃招他人以歃徐出謾言又如睨柱秦庭不辭碎首燕市擊笻髮上衝冠使人讀之馮軾而有擊轂之爭隱几而有按劒之怒抑又何也豈其濩落無用雖託以為佚而雄心俠氣猶不能自釋時時見於此耶窮者之於詩雖腑腸鈎棘以艱拂工苦擅能亦資磊砢骯髒之氣以昌其詞一日有引而置之在位投筆而起不難立當世之竒功君知已盈海內徒以為詩人而已無復有意引君者而君亦且病矣斯落落磊砢者將何所泄越其亦日磨嵗鑠歸於漸化已矣豫敘君詩既論其所長以啓衆人之好又慨其昔壯而今憊也丁戊山人詩集序列莊之書往往稱巢由善卷子州支父石户之農逃堯避舜視帝位若凂已觀者皆以為寓言非事實至近世隱逸髙尚名流如仲長子光臺孝威何子平嚴光莊遵梁鴻之儔班班見於傳記不以為無是人也豈不以天下之富貴為大物重器而疑其所稱之誕也一芥之不忍與珍萬鎰百朋者同吝簞食豆羮之甘其叨嗜殆有過於五鼎八簋之厚饗九重之尊固一命之積也彼能遺世上之榮利而不顧雖以辭天下可也胡必近世髙士之有而莊列所稱之人之非有耶之人者所為惡彼而樂此豈誠較清濁潔穢於外物而為棄取哉亦愛其身之至嗇精葆神不欲以所養之重勞於事機役於名法為人而喪己也彼知有天下而喪己之為可惡故與之以天下而不樂亦未知夫有天下而不與者其已固常存焦然為天下而窅然喪之者乎此巢由之徒所以為髙而不得與於堯舜之教也后世髙尚之儔情之所出或異乎是擇所處之喧寂以為清濁計所享之醲泊以為潔穢故棄彼而取此是不獨其所逃之世非唐虞而逃者之人已難侔髙於箕潁矣雖然滔滔者皆是也而有若人出其間不亦謂之髙士而可傳哉丁戊山人傅君汝舟閩之侯官人也其才智文采足以得意於仕進獨舍去而不好其舍之盡至於鄉井屋廬不復可居而妻孥不足畜也斯人也倘有意乎列莊所稱之人之所葆乎其亦慕近世髙士較外物之清濁而為棄取也髙士之迹一也其才志所存非一也亦有才足有為志欲為之屈於不可為斂焉而藏之也君所為慕於其人之迹吾知之矣其所存於迹者疑未有以處之也由君之詩觀之知有所處矣夫舉一世之榮利無足好而區區吟咏之工不能忘君誠欲求斯名於翰墨之場哉亦其才志所斂不可終藏而見之於此也且夫焦然為之而常窅然喪之何必有天下者也有一家之臣妾至於為邑為國其道均有在於是者君之所好既在於道矣其迹乃若此其於化人之宫猶朝至而夕去之也余未及識君而南衡童君好言傅丁戊之為人又刻其詩傳之南衡與君謂之同好偃然有一國之臣妾而焦然為之君不以病南衡而南衡亦不以慙君則於余之所謂其必有以證之矣因南衡索序丁戊詩略發其端非以招丁戊也陸龍津詩集序維揚陸君龍津少以異質有文名每出語輒驚其先生長老治舉子業煜然著於一時有司試士君即收其最等人謂陸君俯拾場屋俊選如地芥耳君顧不樂為舉子業曰是拘曲繳繞者不足為獨好為詩陸氏世有詩人以其學傳於家君與諸父昆弟相唱和長篇短什易詞險語更往迭來江左諸謝羣阮風流不足多也君詩益工文日益不著有司至試者鮮復録君同輩見其如此亦易視之君獨自得視衆人以舉業浮詞獵取聲利者泊然如無也不少摧其意其好詩益酷晚乃從一官捧檄書行數千里為人之佐頺然處郡幕中上官大吏皆所謂以舉子業得名據尊踐嚴君方當趨走伏謁跪拜逡巡手板顛倒色沮氣屏得無悔前之為乎昔唐以詩賦取士士既以詩賦收其科發身乃有增治經術者方今號為黜詩賦尊經術士亦必以經術收其科發身然後習為詩賦其輕重不同亦制使之然也然必收其科發身後習為詩賦者乃可以鈎譽射聲為世所述其不能收其科者雖善為詩賦世亦莫賞也君之為幕職不以卑冗逆自貶薄修飭振迅趨功急事鋭而不躁上官大吏所以接遇任使之者異於他職彼所以待之異者誠以君為能官而已豈知其善為詩若此哉君既不悔其前之好自喜其詩益甚雖在卑冗煩苦簿牒之頃行役之次濡毫伸紙脰引吻決鳴聲嗚嗚從吏走卒為之驚顧不曉為何篇斷句落輒復自喜一日持其稿抵余曰先生其為我評之觀君之意豈非有感於世之莫知而獨有望於余乎余早嵗溺於文詞氣盛志強勇於自信往往為倫輩言詩妄肆雌黃旁視他人皆若無有今方自創氣銷志弛見人所作輒茫然却顧知不能及况如君詩之善者哉身廢名辱雖能知君之詩胡能為輕重君顧獨深望余也余既嘉其好又愧其意也讀其詩卒編遂序而歸之朱碧潭詩序詩人朱碧潭君汶以名家子少從父薄逰往來荆湖豫章泛洞庭彭蠡九江之間衝簸波濤以為壯也登匡廬山逰赤壁覽古名賢栖遁嘯咏之迹有發其志遂學為詩耽酒自放當其酣嬉顛倒笑呼歡適以詩為娛顧謂人莫能知我人亦皆易之無以為意者其詩不行於時屋壁户牖題墨皆滿塗汚淋漓以詫家人婦子而已貧不自謀家人誚之曰何物可憎徒涴墻户曽不可食其為畫餅耶取筆硯投擲之欲以怒君冀他有所為君不為怒亦不變也一日郡守出教訪所謂朱詩人碧潭者吏人持教喧問市中莫識謂誰久乃知其為君也吏人至門強君入謁君衣褐衣窄褎而長裾濶步趨府守下與為禮君無所不敢當長揖上坐君所居西郊僻處田坳林麓之交終日無人迹守獨出訪之老亭數椽欹傾植竹撑柱坐守其下突煙晝濕旋拾櫧葉煨火燒筍煮茗以飲守皂𨽻忍飢詬罵門外君若不聞於是朱詩人之名譁於郡中其詩稍稍傳於人口然坐以匹夫交邦君指目者衆訕疾蜂起而守所以禮君如彼其隆又不為能詩故守父故與君之父有道路之雅以講好而報舊德耳君詩雖由此聞於人人猶不知重其詩覆用為謗嗚呼可謂窮矣凡世之有好於物者必有深中其欲而大愜於心其求之而得得之而樂雖生死不能易而豈有所計於外詩之不足賈於時以受資而取寵君誠知之矣苦為閉關吟諷凍餓衰沮而不厭其好在此也人之不知重其詩烏足以撓其氣而變其所業哉君嘗謁豫懷詩數十首為贄色卑而詞欵大指自喜所長不病人之不知而惟欲得余一言以為信也豈其刻腸鏤肺酷於所嗜雖無所計於外而猶不能忘意於區區之名耶嗟乎此固君之所以為好也君既死豫故特序其詩而行之庶以不孤其意豈以豫文為足以重君之詩於身後哉五子詩集序詩之為道誠深而其事則微矣櫛字訂句協比聲律使其詞有足玩音有可諷亦事之微者也宜非人之所難至然名公大人有鴻烈偉業章施當世者嘗患不能往往竭其生平之勤爭工拙於片言隻韻之間不克快其所欲而野夫田父閨人孽女縱其貪慕憂思之所感託類切物以咏歌其志時輒造於精微蓋其道之深者寓於天地之間動於人心觸於物變雖其轉喉掉吻衝口肆意而欣戚促舒中挑外引每與深者值嗟乎是亦怪矣其事之微雖當世烜赫巨力之人不可以徒得其道之深則匹夫匹婦不勞而獲焉茲詩之道所以為深而其事亦卒不得謂之微也豫性喜為詩幸其才不合於世齟齬以窮事功無所表見又天誘其靈異於匹夫匹婦之愚於其道之深偶有所明間獨好採風謡俚誦察見真機以考俗化而驗性情而田野閨壼之聲未見有值於道如古國風所列豈其流行於天地之間者未嘗泯滅其動於人而觸於外者則有時而絶耶意必有竒節怪行慷慨磊砢之士不涉聲華隱於酒奕混於屠釣忿懟傲睨相與作為語言嘲侮風月雕繢草木以泄其氣而樂其心則不泯之道將於斯人乎寄以存乃今得所謂溫陵詩社五子之詩讀之五子者各有竒節怪行既無所用於時而一其力於此互相呌呼唱和以為極歡旁觀皆笑為狂謬甚或加指斥五子獨喜自得不顧也豫讀其詩愛其於道之深者有值焉居常所意不謂一旦得見其人而又出於同里歎此道之將絶而僅有寄於斯人也欲以其事之微者語之使畢其力以追古作者之盛五子不豫疑也豫今所讀詩皆五子初作已可愛悅如此誠畢其力不怠以輟其能追古作者而侔其盛豫亦不五子疑也豫雖不合於世猶出近名寵稍汚利祿直以早廢因得久窮尚冀斯道有成如五子之窮特甚豫安能極其所至哉然豫又以悲夫五子者之果無用於世而徒以事之微者成其名也丁酉山東序齒録後序丁酉山東諸士既舉於鄉相與序齒而合燕焉志好於録以示不忘禮也諸生奉而見豫請序其後豫進而告之曰昔唐虞之世嶽牧布列著濟濟之美有服在僚莫非亮采浚明之賢然崇伯以嗣興之迹加於舊耄立乎九官之表向之僉詞而舉其父者咸詘於其下孔子教於洙泗之間四方學者齗齗如也蓋身通六藝者七十人於時顔回為最少孔子獨推許之嘗欲貶己以為之宰雖七十子者亦瞪乎其後遜焉而不敢伍同門之士第其德行言語政事文學以自科别則回為之首豈是齒也非所以議於道德學問之間耶舜之譽禹也明其不矜不伐之實以為特懋回亦退然如愚以若無若虛見贊於友彼嶽牧之長者勸於取善日宣日嚴而由賜師商之徒惟聖人之篤信與共學舍其驕吝故虞廷之治謂之至和孔門之學謂之大同而禹顔之德謂之至讓其先人也以修己其足已也以下人德之多寡勉而相師年之長少忘而相友是聖賢之學而古之道也古之告人者誘其所未至而不襲其所已知是以能開導而增益士之以文薦於有司則固有名籍矣二三子知文者之可資以進身而不足以立己故略有司之籍從鄉黨之倫其長者褎然於其前而不為亢少者頺然在後而無毫髮凌蹈之心斯足以明序敦好矣豫復以齒讓之説襲之毋乃非古之所以告人乎二三子以進則仕以退則學無有息也故稱禹顔以命之庶乎有以發志而增益其材也當仁不讓於師二三子必有好學篤志聞道而先吾者吾方且攝衣以從其後河南庚子鄉試録序序曰賢材之興孰非由上之所作哉蓋觀於此方人士之盛而知之矣今河南所履之域則商之舊墟與周之新邑在焉方殷之末民化於紂亳相千里之間皆為頑民武王以羣后之師濟於孟津為牧野之陳會旦而商郊清明其後嘗衰矣宣王中起則自濟之洛狩於圃田以至敖山而朝諸侯故周之盛時人才衆多詩人歌之藹藹王多吉人生甫及申維周之翰之詩列之於雅以著中興得人之功雖其仁澤之厚道化之深積漸所致然君子所過固有以化人者禮教修於戈甲之中聲名動於車服之表宜其昏者以明衰者以起而成有周之隆也自宋之季豫州久汙於冦不見王者之物已數百年我高皇帝以神武啓運再造區寰由大河以北皆命將略定豫州獨勤大輅之臨指顧畫遣而天下大定矣當其時閉塞方久遽覩聖人之作歡鬯鼓舞如蟄斯震淫昏鄙倍之俗其去也忽焉蹈習於仁義發形於禮樂出而副上之求堪世之用者宜其衆也今天子建中下民以道術陶成一世德意感孚固已不大聲色而儀型遍於四方頃者孝思永念展謁寢園道所往返皆出豫州之境九州之廣生民之衆引領舉踵欲見無從而車馬之音羽旄之美中州之人獨得於見聞昔東都之狩人覩其堅好之車調齊之馬嗟歎而頌之曰是大成之君子不可名言其德惟其有聞而已也是知吾君之旗色鸞聲昭回嗈噦皆所以改新中州之耳目而聳其震曜之氣誘其濯磨之心濟濟多士之生有不思奮共臣同於惟天子使之願哉凡天子之行無非事者陳詩納價合瑞審量養老助農以觀好惡出誅賞其大者乃在於敷奏明揚故甫草之役非徒以同馬選徒記所謂射而取士者謂是行也今論選之典適應其期必有異材孕嶽而降如詩人所稱為申為甫所以鳴中興之盛則諸士之進固關於王者之大政以明吾君之行之有事非獨為三嵗而比之常典已也蓋賢才之興由於上之所作及其成也則上之治常因以明而其名常因以行此蒸民嵩髙之所以為宣王之美也夫士能興於聖人之化以自成其材又以其材見於用而名於世使欲頌吾君修道致治之美者於此乎徴而某也實始進之豈不與有幸與福建己酉鄉試録序猗與盛哉道化人文之美由陶唐以來而復有今日之盛也某蓋以閩粵之士觀之昔聖人南面而聽天下向明以為治光被昭格固四出而旁及當其所面之方照燭休爽尤為焜顯而欲考其德之明者亦於其方之最逺而著者以為徴故書頌放勳之大至於海隅日出罔不率俾而所謂如天之蕩蕩者於是乎倣佛而可名由堯以降莫如文王之純以不在其位而德不顯然其顯於四方者獨著於南故汝墳江沱之風為周之盛然則歷古帝王之德其盛也必究於南而其極盛也必際於最逺詩書所稱可覩已閩越之方在南最逺大海之隅日所從出處也意其荒陋幽側無以望中國之昭回今其文之可見者宣耀炳朗發揮乎詩書禮樂之精宣鬯乎仁義道德之輝蔚然治世之能言由其言以論其志皆有用於世者也堯之光於海隅也黎獻共惟帝臣文王之風被於南國田間椓杙之夫且與公侯匹體而同心人材之生可為世用而莫不志於用世是其所以為盛之實也故某直以此方之士之文而知今日之盛為由陶唐以來而一再有也豈不信哉我皇上一德執中建維皇之極陶成羣品覆育萬彚蓋秉周文之純而嗣陶堯之統其德之及於四表如日月之照臨而其所面之方獨切於光華閩粵之士宜其莫不為材也昔周德之衰則荆舒吳越之間猶為詩人之所膺春秋之所外雖當孔孟之時而以文學名者於吳惟一言偃學於中國者於楚惟一陳良况於峻嶺限隔之表大海之隅日所從出處耶閩粵於其時宜其荒陋幽側而無所聞於策也今兹之美若此然則此方之士豈能自為材耶凡士之生雖不繫於地而亦以邇為貴豪傑之興固無所待於上尤願於得所事而快於利見以彼偃良之賢得及江漢汝墳之風其為公侯之好仇心腹豈直兔罝野人之比乎以其不遇徒為季世下土之賢而已諸士雖生於最逺猶當聖人所面之方復能以材自顯使欲求今日之德之盛於此乎徴蓋已幸矣其尤幸者以皇上之為君而士之顯於其世者預於見知之傳刑乎譽髦之化則藹藹濟濟皆媚于之吉人以寧之多士也豈如言偃陳良獨為季世下土之賢而已哉諸士其能以無願乎否則直凡民之不如耳有文王以為君而士者不知自異於凡民其能以無愧乎故某於序是録也為諸士告焉福建乙卯鄉試録序微妙隱密而速天下之感者道也自昔帝王鼓舞萬品動之於無所為而變之以不可知則俄頃之間而存者自神矣至其立教作則以一道德正學術使人士敏迪而好修非積漸持久不能致也在易之恆曰聖人久於其道而天下化成聖人之為天下豈徒恃夫所以一道德正學術之具循守不懈以為久哉其微妙隱密鼓舞以盡神者常存乎其間其久也乃所以行乎其速者而天下固已化成矣棫朴之雅曰周王壽考遐不作人蓋言久也其思齋之卒章曰古人之無斁譽髦斯士言其所以為久也夫秉不顯之命而篤不已之純儲精垂思淵靖宥勿之中而終始貫徹蟠髙際厚於無窮亹亹勉勉若弗遑乎夙夜故名之曰無斁而為周王之壽考也士之有譽於當世非苟然矣肆我皇上膺天歷數光嗣列聖大統建立斯道於穆清之上渾乎噩哉其不可得而名也感孚興起一世之髦士風行海流旁格四達速焉而不待疾三十四年之間仁昭義立禮陶樂淑裁成嘉育之無已其道久矣雖閩中最阻且逺而成材衆多不後上國士之能言者郁郁乎茂華實之體總事辭之經可謂炳蔚之人文也賁不云乎觀乎人文以化成天下夫化成之效徴於人文而人文之可觀由於久道之聖人信乎今日諸士之文之美厥有自哉蓋昔者帝王稱事功則以能用人才與圖治為極盛語教化則以能教人才使成德為綦隆然或用之非其所自教而教之者或弗及於用則兼盛與隆尚其闕諸皇上躬道化以教天下之才思皇濟濟大小咸就斫雕擇採而有餘如棫朴芃芃薪之槱之而無不可今者蒸進之羣髦與由今以往庠序涵濡片善寸長莫非道化所成之物也每三嵗而一比之敷求於陋仄隱約之下布之庶位俾各適其大小之用極盛綦隆雖古帝王何以尚諸夫勤於教人者勞也佚於圖任是以勞致佚之道也諸士行且用於世惟不違靜言敬事自獻翼為明聽交敕時幾之訓則左右先後奔走禦侮為有人斯文王之所以寧而佚以享成之休其道由是矣御史與某等方籍是以修臣職而報上之賜諸士其可不懋哉故序以侈諸士所遭之幸而因以朂之云陳氏族譜序大哉聖人之德何其流遠而能被也豫觀左氏春秋至於楚復陳田氏專齊之際蓋知之矣夫靈公之淫虐懷公之昏亂宜足以隕世絶祊然莊王重違一言去疾欲和諸國而午吳遂仍百乘之邦田完畸嶇竄逃之臣束身入少皥之墟桓公禮而命之惟恐不及辭爵而爵至及其後嗣漸持大政謀國而國得夫以史氏之論能推德於百祀之先而卜之者占已定昌於五世之後然則午吳敬仲固已篤基於積厚之豫而承服於時際之期豈芈旅之所能滅申叔時之所能興小白之所能爵而平仲之所能謀哉是知大舜之德其流逺而能被如此善乎史趙之言曰盛德必祀而知陳之未亡可謂篤論君子也而又卜其世數則近於瞽師之業矣夫媯越不能免之於楚而陳子復得之於齊史趙之言不已荒乎蓋亦近於古矣嗟乎以舜之德而不能使商均及其身以有天下而胡滿能得之於周室之封靈公閔公據國而失之成子乃能興於異姓之域然則聖人之德受祚於天者固萬世如一日而迎休倡咎後世各以類修事之得失顧不以人哉今户部郎中陳君輖發於神明之胄績業勤行自致其身於世其材具德美足以躋崇登顯若操契在手數齒而責償也君筮仕佐郡以致秉國之賦敦慤敏給仁心為質運知無方德以濟其才恕以𢎞其察然乃加意於人倫為譜以明其世以合其族而又慎於系續考其所知以著於信而不為誣皆不畔於聖人之教盛德之所從事也吾非瞽史不能為興廢之占然明於君子之論有德則興當在於此他日君訪於歷山之陽濼水之隂有治詹尹之術者操莛以問之其所以卜陳氏之昌當不在五世之遙矣方氏族譜序士大夫仕於時智足以濟於事情足以周於物雖其疏且衆而力足以及之與之同其吉凶之患退而考其行於家則有其同姓之親而恩禮有所不能及者豈其性之不至哉咎生於知之不逺不能原其所從生則其先世之名字爵諡年輩卒葬有茫然不能言况於追其不泯之魂魄精氣於𡨕漠之表以及其所欲慈之子孫其分布蕃庶能否不相逮憂喜禍福之殊宜其有所不及也已降之世常有康濟之功而鮮惇敘之化士之生於其世不憂乎民物勞烈之難而病於宗親誼行之不足嗟乎近者不親不敢及逺而士大夫所及之反若此宜思所以易之矣欲易之未有急於知其祖之為可務者也族之有譜蓋昔人所以推本由生綴屬方來而所以言其祖者其術莫審於是而士大夫多忽焉則其於祖也不能知固宜皖城天柱峯之下蓋方氏之所居其族指最繁而獨以同姓有恩禮著於郡中為名門以吾所知能有以及其宗人而使之知以恩禮相聯序者吾同年方君克也君嘗示豫以所為方氏族譜觀其書知其心於所從生最隆不以其泯然既亡且逺而遂與之俱息故其載之之詳繫之之久一指掌而死者若臨於其上陟降於其左右生者之長幼若同堂而處比肩接膝而坐行拜起於跬武一席之間油然之意可以觸目而興也君之所以能及其宗人而使之各有恩禮者非以有此具也耶君始宰貴溪桐鄉兩縣今為守於泉州百里千里之地有民而治之其慈愛忠利之心愷悌嘉樂之政不啻父母之於子如君所及之逺可謂由近者之親其施之有本而出之不倍者矣嗟乎世之士大夫於同姓之親有所未至而智慮情欵足以及於人其意氣之盛才力之偉有可喜耳豈所謂康濟之功哉由其施之無其本故也由譜之亡而惇敘之美不見於俗此士大夫之所易知也由譜之亡則無可本以為施至其勤於民物者而不足以為當世之勞烈則士大夫之所難知也是豈可以忽哉故豫序方氏之譜云然庶有當世之志者有興於方君而知譜之不可忽也談氏族譜序有世數之殫而無原本之忘者族也故親有盡服有免而宗未嘗無别是以君子小人之澤論世則皆有斬枝分𣲖出不可勝窮而本於因生所賜之姓則統合緒貫猶水與木雖其分且出而其為斯水之𣲖斯木之枝固整然而不可亂也其為小人與則力分之卑與情思之薄宜其世斬而澤亦熄矣由君子為之則豈以世數之久而忘其所以為宗者哉前世家尚譜牒名閥著姓必有家譜至其世儒有以譜名學者蓋去古既逺收族之教漸失而上率下綴使亡者常存疏者猶戚其具亦恃此也其睦敘惇至篤天常而厚倫紀非君子不能存是心而亦非君子之力不能有此具也無錫之有談氏舊矣世有存譜至先生始修之立法詳而著例嚴有宗道焉今中丞十山公復加裁正潤飭而譜法無遺憾矣所謂力足以具而心有以存君子之所尚也公修行積庸以顯於世方有社稷生民之事業所以施於家者其用意獨至如此可謂本末不悖近逺兼舉非今之君子所能及也故猥以序譜委豫豫觀其譜既嘉慕公為不可及又有羡焉氏之得於始授者以國以邑所謂胙之土而後有足以系其所生之賜姓實為最初而獨貴至於字諡地鄉相承轉命則逾多逾卑而離姓彌逺矣談之為郯蓋以國得氏方其以子列爵見於春秋者能知上古官名見師於仲尼由其先少昊之後歷世有國而亦世能言帝王之制其氏已為最初且貴矣而與談均以國得氏者其後多改徙貿置以唐虞之尊陳宋晉魯之望而地淆人冒雖氏仍其名而已不得其所以為姓矣惟談之後無地同而淆人奪而冒者由少昊以至於今一日也以其初且貴而的然可據如此蓋氏之存於今之獨正者也神明之胄其澤長延如濟之為源或伏或微必見且行不放乎海不已其至於今日而有十山公之盛固宜傳曰公侯之後必復其本公當之矣而談氏之子姓其將益有興者乎序以俟之南昌二溪萬氏族譜序萬楓潭先生譜其族原所始徙自鄱陽當宋之盛時而詳其事則自有元以及我明之世蓋信其所知而不為誣也譜成念族姓之繁不可家藏人挾則必有不得見譜而忘其所從來與所由分者多矣非所以厚敦睦而興禮義也刻以為編使人得有其譜而為氏之子孫雖世世逾多無有不能知其祖者此先生之大功於萬氏也其所自序則退托其成譜之勞而推本於父桂亭公祖慕筠公與西族松竹主人警齋二公又先生之孝之讓也刻成題曰南昌二溪萬氏族譜南昌著其邑也二溪則其居地之號也由鄱陽以來南昌卜東西二溪而宅之故南昌有東西溪萬氏而一祖也先生之學方行於時進用顯融以施及天下固有日矣宜其志存乎事功心營於民物而所以貽厥宗謀以為禮義興起之本者其用意至而為力勤如此是可謂難矣二溪之族以萬為氏萬盈數也命物之多以萬為凡遡凡之始以一為首由一而下分布衍别於其間不知其幾而後至於萬反而歸之歸萬於千歸千於百歸百於十而一者敻然獨立於其初明者觀之非獨有斯一也而後得至於萬而兹萬之多莫非一者所析之位苟悉乎眀者之所觀良可命萬為一故雖多而不迷其統彌逺而不失其宗二溪之子孫殆數十百推其盛之所極不究於萬不止使皆知遡一而求之則禮義之行不待教誡期約而自勸矣由是一祖也以有萬其子孫此其係乎天者固先生之所望而非其所能為也使是有萬子孫也而皆知有其祖在乎人人之篤倫敘而厚恩紀此固人之所宜為而先生之所欲與族人勉之者也倫篤恩厚則人將有必於天而天且不違乎人其為繩繩振振而至於萬又出於人之所能為也吾由此以知二溪之族之盛果不至於萬不止也先生乞序於豫久未有以復也請以是復於先生其以豫言為可哉易經存疑序今日取士之制使士必盡出於經術而患學不純師經説無所統一人人得竭其所見而異端並起於其間欲一以折衷之則無可取正非所以一道德而同問學故使治經者一以宋儒朱考亭先生之説為宗上之所取士之所以取於上師之所教弟子所以傳於師其説皆必出於是上之所以取而不出於是猶變禮易樂叛於時王之法也無所逃當世之責師弟子之所習而不出於是其罪若偽符節尺量之罪也徇於路者得而譏之行之幾二百年海內同風不講於朱氏之説不名為士以其行之之專信之之衆名為士者宜莫不能為朱氏學然能通其意以自行其言蓋亦鮮矣一有能通其意者出其間則其言之載於書為世所須急如符節尺量之須於用也上之於士日有以取之師弟子相與語於孰業於庠序不得一日廢宜其須之急也故士往往有焦苦其心靡弊其精神極己之所至以務出乎人之所未詣期言之行以售世之所須其書亦往往而著也自朱氏之學行學其學焉者以為時之所以取於我者以此將以決賢科取世資非是説無由也其勞心憊神以行其言者以為售世之須之其而已而豈為有得於朱氏哉然則其尚之雖篤治之雖攻講訓專精而論議據守質其所以為學其淺焉者苟以修遵制之陋業而深焉者勉以鈎崇正之猥譽其於朱氏之學猶為茫然以思懵然以讀而已蓋豫所見林次崖先生所為易經存疑信於朱氏深矣先生之業固以從今之制其為書足以資世之所須至其篤信妙契慨然於聖人之學以為可以明既晦而接不傳前乎有言者至於此而不可加後乎有作者考乎此而不能易是先生所以獨尊於朱氏者也學者讀其書由吾之説而求之則不忽乎先生之用心矣先生以直道為大理守理斷獄歷忤權勢其謫為欽州稍敘遷為廣東僉事議取交趾具有謀略雖不用而其志甚壯易之為書於人事靡不畢備其大者尤在於折獄用師先生蓋不為徒講於易之文矣故豫序其書而併著之云耳易經紀成序古之得罪於君已失其位而尤不絶其官以摧苦戮辱之者必得險惡罙邈之地如韓退之陽山柳子厚栁州歐陽永叔夷陵是其地如彼其人亦皆顓昧椎魯鳥􅛺而獸獝莫可與語者如對木石之居而從毛羽之羣退之在陽山僅一區册文采材質未有以動人者而數與之遊不忍舍去子厚永叔得吳武陵狂生田畫秀才皆客遊之士其拘陋寡獨若此宜乎人之不樂而謫居之所以為困也方其時誠得地不惡其人有可與語者又當負慝含瑕畏譏防患晦其迹惟恐不幽閉其聲惟恐人之聞也安能與其人相講以樂以廣其學而昌其説耶以三君子之所處有以知吾三洲章君之樂也君以名御史在職過直不為有勢者所容奪其職責授推官蓋所以摧苦而戮辱之也而君所得郡乃在莆陽莆陽文獻為嶺外最盛處觀中州不啻加之其人皆可與語者其秀者尤好學而多文而君所以出非有罪過獲譴於上不待深畏謹防以自閉匿君於經無所不學而獨深於易莆陽之士於經無所不習而獨缺於易君乃樂以其所得為莆士講以補其缺君既與有勢者相失特困之嚴久不為徙於是所以為莆士講者得專以熟士之聞其講者亦洽以固其旨趣融通而文理成就非獨苟補其缺以其全經方與其素習而舊有聞者頡頏而起而未知其先後也方有勢者以事出君意君且不得其官有不安之心而無以自樂其愛君者方且為君有失而孰知其卒有以明其學以廣誦訓而成材美而收士作人之效從容於文法體勢之表若斯其盛哉君於是所得多矣夫豈有所失哉三君子於所貶地皆未有以教其人其地之人又以逺陋不足以知君子而陽山栁州夷陵至今猶道三君子者其風聲氣概久而不泯也今君既有以教莆之士士皆好學而多文能言其君子而兹經之明日伸月引君之所道説於莆者其有已哉義則序永嘉項甌東先生取本朝會試及兩京十三省鄉試諸録四書程式之義擇其文詞之美而義不詭於傳注者凡數十篇評而著之凡作者之意所以然與其體之所宜爾疏剔闡發爛然可覩義之為文其言不踰數百而其首末具有定法宜無所藏其變由先生之評觀之則其正反開闔抑揚唱諾順逆周折騁控張歙其變不窮而文之情狀極矣不徒使觀者悟而知向思焉而有獲而作者亦復躍然自失能自為文而不能自言其文之為如此也噫何其精也其文如此而其義歸於不背儒先之訓解以達乎聖賢之旨而可以為治此業者之法故名其編曰義則先生之學最為明於朱氏之説而得乎孔孟之所以言者其為舉子業洗刷凡近探抉宎奧宜所為程文以式後生而其所守職事與試事不相直不得用其文於程式其所自為文學者别傳之耳先生所至於職事之外輒有以教學者而黃生日煦孫生振宗實始從授此編而卒業焉二生以呈郡博士紀君博士以呈郡侯方西川公曰不當使治此業者人挾一編耶於是義則之編刻成豫覽其書而序之曰射御小藝也而泰豆甘繩以名其身而傳後世由得其理也其視䘖轡弓矢若被服之具食飲之器而省釋於百步之正先後乎二十四蹄之間若食飲而被服故可以閲壯老而不厭事物之萬方列乎前而不為之變而衡靷之工苦馬之駑駿弓矢筋角笴鏃之良惡端袤可以手揣而知目逆而辨也其語人者法也而所以能得其理者惟精者然後得之彼所以習其徒於足目使之行乎獨木之塗承乎牽挺之椎而驂騑不陳於側侯鵠不設於前蓋其未撫六馬而所以馳之者已具於足未揖二耦而所以中之者已存於目故能總驂騑而不亂當侯鵠而不失是編也亦先生之所以語人者也是不亦題工苦駑駿之書而紀良惡端袤之䇿耶尤在乎精者自得之耳然吾聞齊扁之為輪也行年七十而不舍椎鑿其得之於心而應之於手非輪也道也故其老於斫輪而不名為藝有精於是編者既得之矣尤宜以是觀之嗚呼是椎鑿也偃師精之以為淫巧而齊扁以為道故吾序是編既患學者之不能精而尤患其徒精也嗚呼此不亦先生之心哉萃英録序文藝之名何從生哉成之則置之下而無可處之位遊之則殿乎末而無可先之等執之有其器陳之有其數孰不出於道哉而為道之器也孰不有其義哉而為義之數也是所謂藝者也文之為藝何居蔽於其實而溺於其名於是學者以其治於文者為藝而世之相目於藝也以文夫所為教士以文而還以論而取之者何哉為其通乎道者之能得其意明其義者之能識其情由是以其所得者而為言言雖不足以盡而要意之所存也以其所識者而為詞詞雖有所不該而要情之攸見也易之筮占詩之歌詠禮樂之襲禓升降搏拊擊戞孰非學者之所治然而精之者以為史善之者以為工而習之者顧不越乎童子之所舞宗祝之所辨惟通乎道而明乎義者乃稱其為士今使為士者人占一經責之以求通其意復試之以文觀其所以言其意者之何如所以教之以其為士者也實之不察學者顧以其為士者之業同於工史之所攻童子宗祝之所執彼其潛深於象形之表而參伍乎節度之間正衡乎胸臆之中而潤色於毫芒之末自以為巧之適而技之得也嗚呼其為之如此吾將被之以藝之名而彼不得辭彼之被是名者猶且忘其所當辭以為是固然而方且患於不得不亦怪耶實之不知而惟名之循者之過也嗚呼其力之動其智之專其成之甚難其卒列於斯道之位則黜之於下而無所避之其失之固久而亦可以有變矣豫間從吾郡侯程習齋公所得見所謂萃英録者蓋侯所輯興化泉州二郡諸生之文而皆督學周石崖公所取士也觀其富而且美有以知其鼓動成就之速而選能鑑别之明也公以才學名一世來為督學於閩閩士既已迎為公伏而公之至期命之旨潤澤好尚之端風迅莫不愛願而悅安之其論於文尤精如是宜乎程侯之愛其所取而欲傳之也以豫所見泉州之士其取者不敢自矜而以自勉其不取者爽然自失而無退尤以一郡而他郡可知也必公所以當其心者有道不徒校之之詳題之之確而然也士於斯時其告之宜不難而變之有可冀故豫樂為之序著夫文之所以為教其實有在以發學者之蔽而有變乎其失之舊也則不以文蒙藝之名由吾之説而明由石崖公之教而行易學經義考最録序昔宋王荆公改科舉法以經義易詞賦其意蓋將興正學以成實材而當其身已有秀才變為學究之歎元祐諸公深究其弊欲反其所建置然止於兼復詞賦而經義卒不能罷也方經義未行大儒程純公看詳學制其説固有不謀於荆公而微合者經義造士意良美矣惟公力能行之而竟以自悔其不足以造士之效又可覩也元祐諸公於熙豐之議非盡排黜不止而於取士顧踵其所自悔之法豈其果不可變與行之既久碩人秀士往往出於其間而其為法之弊日以益甚如淳熙大儒朱文公貢舉私議斥其為經學之賊文字之妖與夫賊中之賊妖中之妖者是尚得謂之治經學作文字也哉然上以此取士士以此應之文公亦由此以出同時如張南軒吕東萊陸象山陳止齋諸先生莫不由之而吕陳二先生尤號為舉業傑工所至居官任職或退而家居猶以此教授其徒是雖不為經賊文妖然亦豈能有所改革其體與其意哉是以文公私議雖於時制之弊斥之之甚至其所自為議亦不能大異而亟反之也今日經義所謂各依章句必守家法者已稍合於私議之旨而學術之卑人材之下又有甚於宋時之所患者豈法固無有善與不善而在於人之為之如何耶余往備員禮曹預聞當時教學取士大指嘗佐禮官原本上意作為訓詞以戒曉風諭天下學者其後視學山東其於興正學成實材竊有志焉顧其志有餘而力不足又不得久於其職雖其不足者亦有所不得盡每心愧之豫觀私議其於治經作文固有所科條潤飾以為淑勸之具其本在於遴選實有道德之人以專教導而余非其人也憶在辛卯歲授命往柄嶺南試事便道之家其時潘朴溪先生為督學使者而章戒菴徐少湖二先生以臺官館職謫為建劍兩郡推官並以文學奬誨生徒二先生皆實有道德者也閩士變動興起之盛莫踰於朴溪為督學時其美不獨在經學文字間也今興化節推章三洲君遷迹與二先生同職事分守之外於學蓋惓惓焉謂莆多士甲於全閩而易學獨鮮遂出所學以教之日課月校勃興蹶長因裒其文以考其業之成蓋其信慕之至故其習者之衆進者之敏如此也今章君方佐莆而吾同年南昌熊愚山先生實來督學於閩閩之士不其幸而莆之士不其尤幸與夫不越乎治經作文之業而可以致興正學成實材之效不至變為學究如荆公所歎其治經術者通古今議論者知本原如文公所期豫將有望於閩之士矣其最先而獨盛者必在莆也時文之行於世觀者徒以為希世決科之物苟足以剽剟附離為徼得之計而已宜其術之卑材之下也故豫論之特詳使學者知其所係之重無但以希世決科之物視之庶乎其有益也雙節册序絃歌詩書之教不設於閨幃而婦人之智無稱於問學講習之間然嚮善蹈美敦行不怠以修所性之倫非智足以及之則不能以有明而決其所往故潰防斁常之內多見於人世其有傑然卓異克修內教者皆性而能明之而非明之所助也夫其墐耳藩目窒機竇而塗偽孔顓顓之固芚芚之良不涉畔羡之途而獨全其所秉之醇懿寧獨無賴於明蓋出於未有所知之助也故其志行貞履契神明而質天地有士者智及之所不能其反視而深愧之者又多有矣智之果不足貴有如此夫西蜀內江蕭氏一門陳李二母之節有為著其行事傳於人人閩士轉相傳覽吾因得見焉蓋所謂性而能之者與夫二母所以自修其教於內以全人道之常既以遺耳目之覩聞誘於神聰天明而行其醇懿之秉况於事迹之流布名氏之招揭尤不足以淆其顓顓芚芚之初而薦紳先生方始昌言而侈述之惟恐名氏招揭之不崇事迹流布之不逺不亦異耶豫謂耳習目愒之聞見固不得謂之真知而未能有助於敦行者之所性然圖史鑑戎之迹諷詠美刺之言以漸次復熟人之視聽乃古人之所不廢而因以警發其將散之顓顓回斡其已去之芚芚率得免於潰斁其所助亦不鮮於世二母之節果不可不使無傳於人人然則妙繪事之形容寫之圖册極永言之節奏被之聲詩史不停模瞽不絶誦使家習而人傳之猶病其不廣而烏足以為異斯册所著夫猶有古之遺薦紳先生其亦不為彌於文而枝於言矣夫不由所知之助以正其行成其名而其行又足以禆教輔俗而發他人之所知二母之事其可敬也夫其可以論而序之也夫題海上膚功卷後余所作凱歌十二首乃古鐃歌騎吹曲之餘音節粗厲意氣殺伐方搜獮講閲討軍實而陳武事之時急笛清笳鞞鼓交相吹而奏之亦足以盛介胄之氣而充揚戎伍之色容若夫諸生之什則古之學者遊於庠序觀飲至獻馘之成作為歌誦以侈其盛蓋雅聲也以置其間厥甚不類諸生多辱與豫遊者必欲書之然仲尼刪詩而秦人駟鐡小戎無衣之詩與列國之風並存惟其出於性情而有合乎禮義則或為怒猛或為寬柔皆足以被之絃歌而有以動人者然則置余之作其間亦不為不可有善觀者當不以諸生之雅而棄余之厲而憲使柯公方兼總文武之事以為職雍容禮樂之談而常有嚴戒軍旅之備其於是詩攬取而雜用之軍中樂作神間意暇徐而聽焉介胄之士徒資以盛氣而發容公之所聽必有以見其怒而不失節者則余之厲要歸於雅而已既書是詩遂序於其後遵巖集卷九

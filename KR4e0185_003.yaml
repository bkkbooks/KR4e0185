body:
  text: 遵巖集巻三眀王慎中撰五言律詩辛卯元日二首居正王凝命履端帝發祥光華開上日玉帛走羣方蓂莢符堯録卿歌睹舜章青裳臨左个天子在明堂候轉三陽泰天周一紀分緯纒占聚景日表應重輪建寅夏時歴王正魯史文鴻恩將瑞氣四國奉歡欣送吕思抑户部之淮上三首詔使發河陽仙郎惜署香家臨京口郡節建海陵倉冰后過全魯花時到下相蒼蒼葭菼外明月定相望相見仍愁逺臨分益思親亦多傾盖者誰是聽琴人駿骨何當市明珠且自珍翻飛未可料將子暫風塵憐君宦隠處淮水日悠悠橘刺青書幌濤聲散郡樓元王餘館榭閼伯故林丘更有山阿賞還因桂樹留南郊夏行二首路轉妨旌折橋平度馬齊風花一水静烟栁萬家迷目極心逾逺朋高酒共攜前尋還有徑應是武陵谿物色繁初夏行行野望新村沙平送騎峰照逺明人出谷闗幽事看雲減病身傳心同志者行樂及芳辰張氏園庄宴集二首地僻軒初集芳林賞不違杯傳浮蟻泛席換落花依凭檻千山出開籠一鶴飛莫言耽燕佚得笑百年稀展席臨水曲移樽對苑沙翠分縈沼竹香到圍欄花歌轉遊魚出舞嬌輕燕斜髙懐猶未歇亭樹已昏鴉天壇郭道士院軒蓋凌晨集盤觴此地賒蘂雲鮮五色瑤草粲三花篁桂清仙院蓬壺接帝家晚聞鳳吹咽疑度赤城霞秋祀太學視宰廩滌俅俅潔爐烟冉冉升視燎晨舉火司濯晝行冰衡楅犧人警鸞刀膳宰能齋心嚴祗役共祀在眀馨宿澤上人房投宿依山刹禪扉隠隠開清齋宜鳥語坐定見僧回竹動名香散鐘鳴清梵來因嗟在人世擾擾逐浮埃翠華巖振䇿凌絶巘尋幽到翠華昔聞晤真者曽此煉丹砂洞口液鍾乳崖隂燦寶花坐看天路近鸞思極烟霞即席賦送張子使邊四首奉使星辰逺行邊道路賒十旬常霧雨千里但風沙燧火防秋警旌旗閃日斜壯遊元夙志公出已忘家張已去都下而擕内適至邊報真聞汝國荒猶未休賑輸堠吏急節制大臣留蒿藋時能給干戈不自謀杞人有浩歎尊酒豈銷憂寨險屯仍廢軍懸鎮亦孤隂風連大漠平莽静方隅曠野惟多壘元戎盡剖符看君經畧者早上伏羌圖漢世窮源使明時足餉臣黄河喧夜渡荒戍斷行人寶鋏飛邊月征衣帶朔塵悲歌暮相對慷慨一傷神郊興二首四月西郊路物華浄客心遊情㑹滄海舉目見髙岑麥秀平分隴蘭榮弱冒潯登髙宜有賦况值暮鴉吟河曲孤村抱峯迴細路連飢鶯啼古寺浴鳥下晴川跡已市朝逺心將雲水𤣥真遊乖良晤心賞自悠然寺宿二首杖䇿吾來此幽棲亦自娯劇傷時序晚静得琴尊俱山抱畫簾入雲開紫閣孤無營禪共寂不寢鶴相呼古寺依山寂停鞍對暮花霜鐘歸院鶴風柝集城鴉楓落猶秋色菊殘有嵗華山僧誰解汝吾分已塵沙圓静寺二首身病登山健寺幽引興長聽鶯過别院歇馬傍疎塘竹散晴窻影花飄晚檻香髙遊有如此誰肯戀紳裳仄徑垂蘿宻髙崖蔦葛長疎槐隂玉宇尺鯉躍金塘入殿齋僧禮開軒到妙香亦知絶地迥朱霧細沾裳通真觀桂闕晞青嶂花宫入紫雲金箱丹訣秘瑤界洞簫聞石髓融融液爐烟裊裊薰須逢緱城鶴接翼去人羣宿通恵寺寶地開龍象珠光布法筵風凝祗樹雪日麗梵花烟塵跡山將逺禪心月共𤣥淹留愛風景瀟洒夜分眠再至功徳寺與張水部偕二首路諳能自至僧狎不須猜蔓藤猶覆院萋草已侵臺竹憐獨宿處花為再看來與君同避地得笑且銜杯舊宿春初轉今來節載隂風烟殊嵗色雲物異登臨問松懐繫馬開閣戀披襟奔命兼行樂攜遊倍賞心登陂羅閣閣峻看天墮湖平益勢孤風簾齊鐸響雲磴拂衣趨指顧極空濶風烟乍有無青眸依落日縹緲入皇都香山寺留題釋宗林房二首香山覽勝到絶徑捫蘿登眺迥雲烟異天低風露凝地幽防俗客清論接髙僧朱纓自不謝福地何當仍逺公違俗久清刹倚山巔抗宇承青靄開軒俯碧泉無生空萬刼習静定諸天長嘯逢顔色新詩與爾傳山寺聞丘集齋下吏之報漢柱峩冠吏眀廷簮筆臣醻恩搴黼衮抗疏逆龍鱗鄒子拘幽日賈生痛哭辰小臣元觸冒天子自英神病中黄制科眀舉招不赴賦謝兼柬張諸暨故人憐寂寞約我共襟期蘭席開玉樹桂醑泛金巵剡溪虚雪棹鳬舄阻雲逵頽卧幽齋裏春草長離思栁湖亭讌遊二首亭子水中洲蘭槳美載浮鷗翻當吹篴魚眺近垂鈎折藕憐絲細探蓴愛乳流更言明月好中夜尚淹留積水漾虚臺芳筵鏡裏開魚驚壺矢躍雲逐瑟絃迴遲月燒紅燭臨波洗緑杯不辭湛樂久未卜再能來春雪左順門侯牘柬龔内翰二首北地春仍雪西山曉出雲烟霏交彩仗風引裊爐薰蛟掌飛瓊箾鳳池碎玉紋菟園搦彤管詞翰正思君鳴舄趨丹禁飄飄雪灑衣樓雲低殿黒城旭弄墀輝玉樹光初亂瑶花濕不稀侍臣迓清切沾珮啓黄扉隆福寺與諸友人夜談因雨假宿三首揚子談𤣥處問奇䇿騎過浮烟榮苑樹驟雨長窻蘿小隠情如此大觀道若何芳春䬃欲暮莫自怨蹉跎憐君避世者習静碧雲隈遂有何顒興翻為孺子來譚經玉塵落倚瑟錦絃開夜深還說劍急雨助悲哀春隂侵几杖夜雨静琴觴虚院疏風入迴廊隠霧長坐淹髙士榻眠擬定禪床不染神俱爽無言意已忘送許進士應元知泰安州三首才子初為政青春獨領州禮壇遺夾谷封社舊姑尤岱岳標方望長河背郭流無因贈魯縞為爾賦齊謳髙才美少年為吏即神仙入境花迎綬行春雨映旃漢時供奉邑魯國謝歸田化理今良牧何須倚昔賢一顧小天下巍然登泰山日晞渤澥谷風起穆陵闗石室金書閟陽厓玉碣刋今皇功徳盛東道預脩壇送曽汝誠給事使邊四首馬嘶栁帳前使者欲行邊揷羽黄金弭擐纓白玉鞭飛雲迷夜月積雪凍晨天燕將聞書泣君看魯仲連太白壓遼城天狼照北平君王親用武節帥奉専征問罪馳軺入觀兵攬轡行當今將士怒歸及凱歌聲授律及今時邀勳合有期漁陽新戍守涿鹿舊興師西日河冰坼北風邊草衰蘆笳聲四起漢使也應悲慷慨一丈夫兹行君豈徒指揮調敝卒談笑靖邊隅古塞開新欵全軍奏凱俘歸來謝天子得似傅甘無七夕效梁體靈駕中霄㑹明河一水遥緩波通聚語流月鑒離標環珮香風散綺羅絳雨消微歡還復罷枉用鵲為橋夀毛礪菴閣老七十三首八座尚書貴三長太史賢履聲霄漢上彩筆衮衣前日月憂時鬢風雲應夀編翩翩東海鶴來往紫芝田岡鳳輝難集坰麟跡自閑道聞姑射後身退五湖間春洞桃花實秋山桂樹斑岱宗東魯望巉絶更誰攀十地丹丘合三山碧海望𤣥夷授玉笈王母奉金觴杖屨東山社松筠緑野堂蒼生懸謝傅何日賁雲章南苑三首别館南城邐離宫左掖通標形霄漢上動景雲霞中雨知清道潤草為望恩豐上林徒欲賦才謝長卿雄城闕鬰崔嵬行遊信美哉栢圍春殿長荷匝午亭開複道玉繩隠河流銀漢迴忽然異人世不覺在蓬萊懸榜儼列仙通波繞御川雲疑駐鼎地風想鼓鐘年嵌壑雲烟變連甍氣候偏即看避暑處何似漢甘泉帝幸南苑三首豫遊萬乘動慈恱兩宫和龍旂赤日轉鳳輦翠雲過暑避更衣殿春生浴鏡河千秋長奉夀歡樂豈云多在囿靈臺啓横汾離館開周王非獨樂漢武自雄材雨灑乘陽蹕山含進夀杯此時瞻華盖拙疾謝嚴枚天蹕應時康御筵矚苑芳開山金作嵌截海玉為塘睿跡元遊物王心亦戒荒離眀相見日長養遂南方題孫宫允園亭用馬司業韻三首敞閣偏臨壑幽林復帶波葉繁棲鳳竹蔓結偃虬蘿吳樹三春暗江濤八月多更憐垂釣處鳬鶩静烟簑湘北藝蘭畹淮南叢桂山芳名誰並美詞客自髙閒斸石璚為乳飡芝玉作顔蓬壺如可涉他日許同攀避地歌招隠耽幽此卜居詞華二陸後形勝六朝餘山鬼窺青管江妃扈赤書悠然東壁下宛掛兩銀魚送人尹南海昔日勾漏令尋仙亦繫官一紆青墨綬長就紫金丹君適朱方吏相期白日翰他時雙賜履遲爾五雲端送人尹錢塘二首王喬葉縣去仙令意悠哉舄向雲間下琴於江上開潮回宋帝國山坼越王臺枳棘淹文羽君非百里才佳麗古越州髙峯湖水頭去為百里宰兼得六橋遊陶栁縈芳甸潘花匝綺洲期君東道主吾欲柁南舟懐曾給事李郎中二子同時得罪被逮感事已難堪懐賢更可歎憂來自不寐熱至亦忘寒欲棄班生筆深慚梅福冠同心忠信者一旦涉波瀾偶懐愁緒亂無端人情急似湍孤根元有植枉道亦何難獨酌不成醉强歌聊自寛世無知心者應謂予不諼濟上懐曽李二子辛卯之秋予與二子同有典文之命聫舟濟上投分託契自謂百年不圖事變囱囱予承嚴竄二子亦同日下獄感今懐昔情如之何往嵗榮持節濟水照斷金事乖成泛梗景是觸沾襟梁獄書難達湘流賦易沉銜恩將得罪均是表同心舟經下邳風波已習慣忽爾自淒其壯志逢兹地古人難可期橋邊黄石在日後素心知俯仰無窮意如何不令悲夀蔡霞山先生早向天台隠尋仙度石梁瀑泉晞墨髮巖窟得丹方養性芝苓古問年松樹蒼赤城霞色滿長為薦瑶觴淮口停舟淮口望千里暮雲收白浪浮山出黄河入海流淵中蛟比室島上玉為樓未即乘桴去難稱是好遊寶應湖夜泛四顧但蒼蒼天低湖水長烟分微有樹火滅逺聞榔興雲連海岫望斗指呉鄉今日乘槎客猶如到漢傍廣陵二首隋室多巡幸驕奢覽壯圖開天崇綺構截海定雄都緑水流城闕朱樓夾路衢繁華何處所墟社只平蕪前王聞失國游客欲陳風樓觀飛雲裏旌旗耀海中一時歌舞散千載市朝空獨有青天月曾經照舊宫聞笛何人吹玉笛偏遺怨聲來楚地已衰栁呉山盡落梅不堪曽憭慄况值獨徘徊胡必羌城下能令壯士哀詠署中墻下葵花兹葵敷正色韡韡比兼金細蘂盈方寸脩莖聳直尋成隂徒衛足背日枉傾心猶有孤根在蓬蒿何太侵仲冬朔日江行心想定何依揺揺共席飛壯圖驚節變直道與時違跡比虞翻是才方賈誼非精誠嗟靡託捐珮侍江妃贈人號罾浦家臨罾浦上垂老學為漁鷗鷺親長往菰蒲伴隠居持竿求竹直選石愛潭虚不曉任公意應言在得魚送人成均卒業還郴州慕道不辭逺為儒能固窮言觀中國學師事大江公逆旅蓬生鬢歸程草暗空眀時莫徒老千禄在書中挽王尚書夫人歸葬軿車出國門歸葬廣陵原逝水年光盡重泉白日昏鏡留將擬貌琴在與招䰟不解尚書恨將朝無贈言過梁宅之為郎日故居草暗蟲聲滿閒庭菊自芳人同川上去書向壁中蔵廁隅經置筆墻隙舊偷光相憶成今古如何不永傷春日永寧寺山亭顧中丞招遊烟曉雨初晞亭皋春日輝相從窮宴賞一倍惜芳菲柔草纔勝藉新條恰掛衣謝公方愛客日暮不言歸病後偶爾出郭忽看栁葉長何言已春深因思閉户久却悔逃人心草色遥迷徑杏花稍變林欲酬過去賞一日一來尋天界寺後山獨遊緑葉暗花枝鶯鳴新栁時偶隨芳草興遂與白雲期探徑非人到穿林有鳥窺行逢桃樹下路口使心疑吿中送顧膳部赴臬山東幽居當嵗晏無那送君行留滯嗟身世蹉跎念友生似兹往來際轉見别離情拙筆歸耕晚髙才早勒名齋居柬劉比部叔正落月曙窻虚幽人好静居官無公務擾意與世情疎出户霜塗屋垂幃草上除同聲雖可恱異舍欲何如訪陳石亭遂初齋中賦贈先生大隠者在世自如遺樂道尚𤣥白持心不磷緇閒門無客候幽幌對花垂好我忘年少但言相見遲秋日登鷄鳴寺閣寄友人峻閣暮躋攀凉風振客顔青天湖外盡平野雨中閒鳥度孤雲去人隨落葉還如何屬延竚伐木響空山題顧中丞載酒亭寂寞千年後今逢尚白人官非十載滯宅是一區貧酒癖著書富奇多問客頻空令好𤣥者懐徳不能鄰詠虚谷别業髙士尚𤣥虚因從山腹居石泉留洗藥帶草備蔵書合道遊空寂修心返太初翻嫌鄭氏谷烏用世名愚寄顧瓊州副使不見經時久相思越徼深簿書勞吏道猿鳥亂人心地瘴應親酒官髙秖好唫亦知浮海樂難忘客愁侵贈唐太史養疾寺居五首誰道金門貴來叅寶地禪院香燃緑桂池色汎青蓮毒龍降沼底善虎戲牀前更有天花落飛來遶法筵期君物外蹤解牿蹔相從簷際飛輕靄城隅見逺峯行唫循軟草趺坐䕃長松已是如愚者何須谷口逢託身翔鳳陛别業寄龍宫遐心存市裏幽跡似丘中掛塵小山桂披襟大地風安知館中史不是河上公如何天上貴别有世中情舍己皈慈法齋心託化城雲衣披籜粉風色泛松聲紛紛車馬路誰識有南榮齋中遂偃仰卧疾即林阿鳥來窺散帙龍起聽商歌僧為翻經難人非問病過此時方戰勝玉體合如何題司封榮養卷才子為郎地髙堂慶有餘侍飡退食後問寢倒衣初露為推恩渥日因至愛舒板輿官舍裏天性樂何如周隠君榮夀巻明時胡在野懐寶欲迷邦麋鹿居為伍雲松對與雙吉星輝上象湛露接西江晚節逢恩幸身過壠上龎王氏榮夀巻老向明時隠梁鴻與孟光賃傭身不似舉案徳相方彩誥雙綸寵華堂四髮蒼斑衣稱上夀嵗嵗紫霞觴哭呉懋獻進士久不克葬寂寞百年身桐棺三寸貧歸程魂作旅寄處燐為隣行哭悲妻子㝠心托友人薤歌嗟路絶欲唱又無因訪空同先生故宅久欲求遺草今來訪故廬北窻存卧席東壁有蔵書墨沼春苔長琴臺夜月虚年年桂花發人擬子雲居題石氏世恩堂漢朝宗孝謹明代故家存業有遺風舊恩從得姓蕃裳衣陳寢室喬木䕃髙門孫子何多美家傳詩禮言訪顧東橋聶村山庄先生躬學稼鷄犬數家村種樹因山性穿池得水源槿籬晴雨長麥壠午風翻四體不勤者兹聞農圃言天寧寺杖䇿青山半遥遥聞梵鐘古松經㡬臘虚殿掩千峯佛現瞻龍象僧行印虎踪回心思止託歸路到來傭場中翫月同顧東橋陳石亭二公野興夜邀懽閒場十畝寛微風來席上眀月出雲端幽姿澹水木逺景含峯巒滿天同一色無似此中看禮部祈雪致齋予以在吿弗預柬同曹諸君二首群賢深秉禮禋祓為祈年陪徳尚書後脩心太古前𤣥思通混漠髙韻比神仙齋祭迎祥處靈壇意肅然曽是天心逺如何冬令乖治神修禱祀格帝戒明齋華省寒隂静層城夕氣佳誰知陋巷裏𤣥黙與君皆冬至大祀齋居霜清天漢沉月白古松隂虚獨看燈静齋明愛夜深勞生因息妄倦客蹔安心屢從郊雍駕飄淪底似今將至豫章道中作風波晨暮淹復畏簡書嚴坎水嗟行險離方苦觸炎為儒心未效從政事難兼苟且狥微禄聊因免負擔立秋日發南浦舟中作火伏金當令流光不肯居天髙爽氣外葉下凉風初山覿忻明秀江行愛廣虚聊因文牘暇稍復省篇書哭薛西原二首今年嵗在辰亳上客星淪為蝶真今夣猶龍定宿身圖書空滿篋几閣已侵塵憤極憑天問何心生此人造物意何如伊人果去諸寡妻司几奠門客檢圖書隣杵悲無相朋緦恨忍除百身知不贖空爾淚盈裾訪西原城南别業感泣二首堯時巢父隠遺跡蓽門幽泉石居成古烟花却帶秋魚來鳴瑟罷鳥去講筵留桑扈還真樂楊朱枉淚流數畝城南業依然二月春蟻蜂猶戀主花木總愁人洗藥流泉甃繙經供席陳西齋風自啓如意委牀塵訪蔡廣徳道卿未至州數里阻雨留宿田家草舍託荒陂瞑投不自知離心分雨夕同氣阻風期燭影坐中暗江城望處疑如何咫尺地猶自勞相思田家書事投贈蔡廣徳道卿行逢野父言情真語率然含生同草木盡力向園田禾黍冬棲畝牛羊夜被阡言終還百拜賴有長官賢桐川客舍風雨慘燈光無言坐北堂主人及中夜問我自何方名姓慚難吿衷懐暗獨蔵殷勤鷄黍恵欲去不能忘同蔡可泉出游山行紀興二首招攜樂友生恵我在山行縁崖歴窈窕傍磵鑒深清白雲輕首夏黄鳥恱初晴超忽㑹心處中林草木榮日出野烟輕流泉處處聲山苗經雨長澤雉感時鳴宻篠傍潭静疎花夾岸眀正宜吾與爾攜手此間行登横山頂上覽州城同蔡道卿歸翼帶殘霞山城晚氣佳鳴鷄聞四境翔雉遶千家碧樹州門静黄塵市裏譁愁心因縱目共有異鄉嗟山行於嵓谷間見人家山深交獸蹄往往見巢棲籬落蔵茅屋泉源灌稻畦蒭蕘不出户桃李自成蹊欲訪居人宿翻虞反路迷石溪寺䝉宻見山窮林迴忽路通燈懸千樹裏磬發片雲中猿嘯來叅定月眀出照空即將溪號虎與爾學雷宗竹山寺微鐘度青靄寺隠見遥岑香路入花嶼禪房開竹林泉流苔上冷山色樹中深吏道非𤣥理來兹生悔心宿茅山道院東樓飛構出空虚洪喬應比廬松風入夜肅凉露滿天疎酌酒和元氣焚香閱道書求仙雖未就性亦好樓居桐川境上與蔡道卿别攬袂黙相看愁雲慘别顔懽遊同逝水轍迹向空山分手徒留佩傷心未賜環風波慎自保當路少扳援同顧雍里訪劉函山郊行二首東郊芳草色一徑引征輿非為巡農務咸言訪隠居泉清新雨後山媚早烟初此意誰相㑹惟應君與予攜手有佳意逍遥恣逺尋循疆田事美出郭野情深日淺平郊色雲多叢薄隂前驅農不變為識上官心劉函山穫田庄居久不至城詩以問之二首聞君去不還種田因住山既為百口計兼得一身閒禾穂登塲上泉流激圃間誰知城郭裏幽興亦相闗鎌鳴秋穫急禾黍積如墉富向隣翁說穰因嘉嵗逢行園朝見汲歸舍午聞舂予將還壠畝先此問為農送周石崖給事治魯藩獄事還朝二首漢使持眀法周親感聖衷飲冰心對日偃草徳從風折獄片言下回天敷奏中不須焚文字梁牘一為空時軰讓才雄髙誼古人中陳詩傷魯道覽俗見齊風登岱諸山小探洙衆水通歸朝思獻納應有發宸聰劉函山田庄宴集同顧雍里三首言駕出尋君暫因屏世氛不忘鷄黍約解與麋鹿群比舎垂青栁前山起白雲相看同此趣無以仕農分白日永留懽田園勝事偏盤飡兼野䔩厨火雜村烟逸興看中聖髙談接上賢相忘賔主意留滯不言旋向晚西郊宻翛然野外秋土膏含雨潤山氣帶烟流故道牛羊反前林鳥雀投猶言明月好其奈促鳴騶晚行趙家圍川廣片帆懸輕霞欲暮天蓼花明逺岸蘆葉隠低田風起青蘋上雲歸白鳥前元多山水意對此自悠然舟中夜坐蘭舟凌浩渺水色暗連天宴坐深眀燭遥情寄簡編箑閒知爽入膏續悟更延感候傷羇思勞歌中自宣彭蠡湖蒼蒼彭蠡緑大水屬時秋逺勢長天接搖波元氣浮數州居下浸千嶼出中流桂棹蘭為楫吾將恣逺遊宿湖中蒼茫烟景晦舟楫自如家宿處隨鷗鳥秋初惜月華遥心連浦鴈歸夢滯江花為客誰知者疎燈水一涯饒州公署蕭條人吏散孤坐發深思草色新凉重蟬聲落日悲言忘觀物處心静閉門時道在無形累求閒翻自嗤署中讀書雨散空堂静褰簾微月初古人聊取對塵事自相疎曲几螢光映殘編蠧跡餘不縁嫌簿領飾律用經書南康公署城荒民俗簡理事日恒餘寂寂公門静蒼蒼髙樹疎庭隂深晝晚山氣淡秋初跡有浮名累心空自宴如南康公署十五夜月迢迢三五夜江郡影星河積水生凉氣空齋興晤歌心微千念寂室淺一燈多不酌盈樽酒其如月出何十六夜月今夕月如何山風江水波升輪依嶽頂流鑑度簷阿光射棲烏起寒牽鳴鴈過紛紛羇客感來委此宵多檢荒行田野中秋巡躬適野不給愧民康甞饁知非㫖觀塲愁大荒行間除茂草息處就隂棠老稚無驚避吾來省爾方靈溪觀自憐何所為無事亦囱囱混俗因知性過時始養䝉石池涵谷水山徑滿松風欲悟觀心理桃花㡬樹紅白鹿洞見張東沙壁上留題登髙能賦者到處有新詩草木留光寵雲峯發詠思䕶持山鬼力指說野僧知大賢難繼作吟玩但嗟咨遊白鹿洞歸道中作巖壑變隂晴歸途風物清斜陽銜絶壁微雨過髙城草動含秋意蟲鳴急暮聲明朝勞簿領應自想兹行開先寺龍池千盤轉石林碧磵帶雲深空谷逃人足澄潭湛我心分流常活活積氣自隂隂一濯清凉水都忘名跡侵酌開先寺泉源出迷窮處何年流至今分來青竹細汲去白雲深香共曇花散凉疑覺露侵已知無内熱且復一瓢斟東橋顧公巡撫湖南行部至衡州縱遊南岳某聞而慕之二首中丞行問俗南岳待題文草木巡遊發江山覽顧分奠椒祠赤帝指竹弔湘君霜氣凌朱火千峯紫翠紛好遊晚益耽身到楚天南勝跡摩崖刻奇文覽記探髙僧留與偈野客偶成談更有名書寫蔵山副石函東橋公既登衡山集所制作成帙名曰登衡小記逺辱寄示時予適行部南康受而讀之有張孟陽之思登髙能作賦大雅感予襟氣敵衡山峻思涵楚水深覽圖乖往跡諷詠發馳心猶因廬阜對稍緩四愁唫曉發建昌侵曉戒征衣嚴城未啓扉鳴騶遥即路徒御静相依歴歴星初散塗塗霧稍稀身隨車轍轉心事悵多違宿武陽驛同陸毅齋憲使天秋風雨急山驛易黄昏疲馬依殘櫪衰楊蔽舊門沾塗憐潔服舉火愧空飡稍緩孤生感幸䝉終夕言徳興縣晚發黄栢渡遲陸憲使旌騎叅差發思君不得俱應同殘月影只隔碧山呼雜樹臨溪口停車向路隅舟人催早涉不識我心須徳興縣八月十五夜月簡陸毅齋使君夜久雨聲歇微微簷影過攬衣聊出户飛鏡掛明河庭隘留光少林疎見影多非因清晤闋何以發予歌遊梅巖洞有仙人井竈田爐丹室之類松老白雲遮仙人亦有家鷄飛殘砥鼎玉化遍成沙石上烟霞古爐中日月賒暫來還出去䝉笑洞前花宿武陽民家一室疎燈夕百思擾客懐草蟲鳴暗壁槐雨滴隂堦狥禄今謀拙躬耕始願乖病身應自計歸去守荆柴滕王閣前王歡賞地棟宇已成空惟有西山色還將舊日同夷猶臨短檻感歎對長風世事囱囱裏江流自向東滕王閣再作偶為逢迎出聊因一振衣鳬鷗閑泛泛島嶼逺微微芳草前人路寒潭落日暉西山舊時雨還向捲簾飛薛家樓髙樓頻徙倚白日滿山寒霜落章江淺雲收楚地寛鴈聲深坐思草色起憂端擾擾城闉内還從静處看由撫州之建昌道中宿山寺客行亦已倦息足擇山深月色空香徑清宵宿道林蒼松多古意流水有餘音釋子一相偶聊忘生滅心再出武陽宿前民家秋原衰草遍投館日黄昏駑馬知徑道空山向舊門農人依鳥隼吏卒偶鷄豚坐席無争者猶慚道未尊丹霞觀閑行隨鶴引不覺入雲深幽壑絶來跡桃花開滿林山香知藥草谷響識靈禽欲問採芝老人間不可尋信州皇華亭誰識悠悠意寒流對寂寥閒禽遵水曲過棹入風謡細雨青山映繁霜赤岸凋門前來往路坐使嵗時銷信州登城樓樓髙身出地稍見山川遥飛鳥青天廣平蕪白露凋孤雲歸滿岫千畝長秋苖周覽乘時暇忻兹土俗饒訪黄九潭太史留贈問君胡在野遺世自經營一㕓依水築百畝決泉畊移竹供魚釣栽梧待鳳鳴深源終不起其奈此蒼生芝山亭亭子倚岧嶤幽意坐終朝逺水孤帆滯長天一鳥遥叢紅霜樹葉片白楚江潮浩蕩煙波去徒思蘭桂橈寄胡始興折腰不能去悲汝愧陶潜古意時人背髙才下位淹貲微數口餓客久二毛添但遣孤根在還因雨露沾過寧庶人故陽春宫邪陌轉城闉重門曲水濵人談亡國地花發舊宫春珮冷空梁月歌銷積棟塵堪悲當日事議讞帝家親滕王閣獨坐吏跡苦拘急幽期與賞違江頭時獨往閣上每忘歸綠水流垂幔白雲落振衣秖縁機未息猶使鳥驚飛南昌有湖水流城中㑹府屬當其左每晨趨府行於湖上執事倉卒無遊觀之致不逺人家路湖平水且清涵虚浮萬井倒影浸層城垂栁堤邊映輕鷗波上眀可憐趨府去日日傍湖行哭陳石亭樂道方遊世胡為遽不留重泉獨往路天上正成樓載酒將何問遺書不可求堪悲江左地一旦絶風流豐城縣感張雷得劍之事作昔人求寶劍絶識理無違此地聞言是今來滿目非空餘埋後土不見斗間輝神物終難測知從何處飛送劉西坡後再至滕王閣賦此奉寄蒼山西面色髙閣逺含風舊賞人何在今來事不同帆飛江路永鴈呌楚天空徒把盈樽酒因書寄浙東賦得豐城劍贈李古冲之滇南豐城埋匹劍水土養金精九地深蔵鍔千年始發鉶在天生斗氣出匣作龍鳴志士腰間佩偏令萬里輕遊紫雲菴至上中化成寺山中獨行遲同遊薛陳二子閑行隨去跡獨往昧前期流水時相引空山只自知香煙松際裊暗雪竹間滋兀坐探林晚中心有所思發東林寺登廬山絶頂還過寺中留止年來知静理在世比虚舟偶此同生滅因之任去留色空廬阜起禪定虎溪流已矣東林社長廊槲葉秋徳安公署雨中書荒齋掩夕景倦跡苦淹留細雨同寒意空山向暮愁逢迎還自懶鞭撻底増憂抱此微軀病何能為世謀蔣雙橋方伯行部徳安予適以事至而公已發南康走筆奉柬離抱易為感復此芳春時雜英委閒地好鳥弄髙枝坐惜歡言阻空令淑景移方聞整駕去惆悵予來遲徳安雨晴書懐日出照空林堦前流水音訟庭鳴鳥恱書几落花深遥憶故園草萋萋何處尋堪悲貪寸祿虚擲此光隂書懐答彭石屋已悔為人學還因世網留行雲時出岫逝水偶成流事簡知無術交疎悟寡儔方將齊外物竊比我蒙周徳安道中書事百室山中邑觀風見俗淳土膏時雨發田事暮春新鳥雀鳴争食鷄豚性近人前驅行且緩方此問農民由徳安去廬山只一舍而予以事趨省不果再往憶在南康郡一拜匡廬君濯纓瀑泉水長笑石耳聞正擬佳遊再其如塵事紛去茲知不逺空返欲何云聞蟬隂氣南方早聞蟬三月中聲微猶隠樹咽短不從風亭館人初散園林花頓空羇遊濶行樂亦自惜春終雨晴西齋期薛廣文仲常雨餘春閣冷初日麗髙臺薄宦勞趨走佳賔濶往來苔生將被徑花隕欲成堆此際心如結非君誰為開觀陳兵憲射夫君文且武置酒更張侯弓彎孤月滿箭去一星流廣野三軍覩空天百鳥愁眼看中自激青管更堪投詠雨中庭樹庭前嘉樹色獨向雨中榮脉脉全根本欣欣見性情烟深因洗翠風至自成聲方惜一暴少難為萌蘖生行園時雨資生養行園覽衆芳鳴鳩盈畝緑翻蝶遶籬香抱甕將根沃植楥助蔓長不窺今已久豈為下帷妨登江州城從中丞王公雨餘草木新節鉞寵行巡飛雉隨騘轉啼鶯喚隼頻軍容觀楚卒國姓記江人清霜飄大路萬里静纎塵豐城縣長至日嵗晏勤王事鄉心擾客居閉闗當此令行路欲馬如江浄霜飛後城開日出初署齋頻眺望雲物正堪書至日慮囚憲府呈方􅴓庄潘壺南二臬使立㦸府門清持書人吏盈平持三尺反助取一陽生布令逢周正援經覽吕刑恠來霜氣重騘馬在江城九江夜雨示薛廣文稍稍空堂暮覊心自不聊疎燈生寂寞寒雨對蕭條木落嵗將晏鴻鳴江正遥清揚居室逺誰與永今宵建昌日暮舉火于豐安堠亭與邑博陳嘉賔談斜日堠亭隂兹言在野深臨飡因忘肉獨酌更知心道與中人語身宜下位沉昔賢傷不遇非獨子如今陳子文行並脩而為有司所失久伏儒官故歎其屈陳州道中同胡叅知作宛轉陳郊路株林碧樹盈中天炎日盛向夕雨雲生共酌清泉飲相從大道行才微慙負乘將子載同征項城道中與叅知並馬芳郊聫騎出錦轡結同心屢截清溪渡時穿緑樹林覽觀乘時暇笑語避人深職事多離濶貪兹共寸隂予以事由陳趨項周梅崖參知方自項還皆以夜行造次相逢頃刻而去多事窮奔走幽襟待細論如何逢路側還向夜中分色笑匆匆接清言悄悄聞勞生元易感况復覩離羣五月五日浴起作芳蘭浮小鼎燃用桂為薪初暖聞盈室微和接澡身形骸元土木時節且槃巾雖然新浴後未振故衣塵夀方隠君方本新安世族今為臨清人豪宕去鄉井高門衞水頭太和莊叟馬生事計然舟齒髮占難老琴觴愜好遊陶然天地内得性閱春秋遵巖集巻三

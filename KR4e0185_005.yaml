body:
  text: 遵巖集巻五明王慎中撰五言排律聖誕前期一日寓直客部同屠儀制郎中詩以柬之瑞氣滿南宫星河渺渺空千廬翊警衛萬國奉朝宗蹕路風先净帷張月自通雲當極北曜宿及霄中謬籍叨分直仙郎嘉自公何其頻視夜彼美切循躬秉燭晤言乆焚香宴坐同岡陵徒欲祝巴里愧難工何人嗣周雅待爾振王風屠郎中儀部署館新成賦題九韻仙吏日攸寧華館肅虚清地是君王賜材兼將作營象維扶棟宇納景敞軒楹北斗掛簷迥西山對坐明迎秋朱火變當晝白雲生為沼滋魚藻䟽畦長鹿苹唯寅皇振采多暇鳥求聲琴與商歌合詩將起草成何言堪野獲蘭省待嘉名伯氏曽漸溪先生奉使冊靖江王敬上四十四韻漢將標南紀周王暨外埏黄支開象郡赤社直牛纒濰水扶桑表鬱林滄海邊霜清八桂瘴嵐結九疑烟立壁攢青蓋飛峰削紫蓮伏波盤荔峽羅閣瞰梧川光色美如此珍竒産固然軌苞輸御府貢篚達郊鄽經野襟交廣肇封俯栁全授圭羅赭組分土胙炎天玉葉枝璀璨銀潢派接連維城宗子令開國大君專帶礪河山固金湯磐石堅瞻依一萬里屏翰二千年惇族紆宸眷建侯展睿權文閶簇仗啟廣樂鼓鏞闐貝闕丹霞裊銅樓霽景鮮冠裳趨濟濟纓􅀈萃翾翾節捧星辰上制傳象緯前瑶函藏寶冊金櫃閟琳編翠琯祥雲抱紫泥卿日懸皇華十道出司諫一身遷螭筆暫須輟龍顔夢尚牽蘭坰張祖晏桐柱奏離絃雪送燕闗騎春催楚蠡船異花紛拂䌫怪鳥噦迎旃廬霍行堪結巫衡覧更便槎搖弱水影旌颺閬風顛列洞宻猩語諸蠻解漢言岡巒眺邈邈原薄驟駪駪篁竹啼猿合石楠蹻􅚦縁輶軒駢入境劍舄忽登仙聖主威光近明王禮數䖍遐荒憲命播藩域寵靈宣晝向日邊接昏從花下旋墀迎珠躡履裾曵􅀈平氊淮國讌㳺洽梁園詞藻傳觀風行問俗訪古重懷賢帝子蒼梧些湘妃澧浦篇堯山澆桂酒舜廟擷芳筌逢鶴還珠洞尋砂勾漏泉豈云奔命逺宜是勝遊偏謝客唫應遍仲宣賦可鐫茫茫五嶺外何日使星還上外祖李竹坡先生致尚寶政二十四韻國運開貞泰今王禮舊耆頒旌招野伏驚代擅雄姿邦俊推公望朝章屬令儀丘樊馳束帛海嶠動綸絲玉署初移寵金扉後命貽西垣瞻日殿内闕切雲司雨露青㝠潤弁纓象緯疑秪言翔岳鷟詎意曵塗龜道大經狥禄幾先果避時竟忘魏闕眷不廢考槃詞臨組惟三揖封章懇一辭皇心揆赤悃温詔下彤墀計决羣賢早名髙一代垂滄波薄赤紱黄髪狎青鷖棲谷情自得還山跡信追直嗤少室出誰賦北山移蔦户琴書暇筠莊歳月遲江天疏逺目花鳥怯新詩傲世南陽蠖尋仙綺里芝瑶蘭湘畹紉玉樹謝庭枝峻節元齊杜養真亦尋雌登龍漢士慕歌鳯楚狂悲尚想篇翰接終虚几杖隨因風敷此曲遥望碧雲涯天津覽海登髙以望逺窮髪此天池滉漾迷三島鴻蒙辨四維浮波極地際蕩景𦕈雲涯日月懸孤嶼江河灌漏巵直將天作畔聊取漢為湄恨鳥啣枝沒摶鵬蹋翅垂乗桴傷孔志摛賦慕班詞衆水朝宗去何時一似之舟中行路難如此嗟子何滯違朝征沙鴈引晚泊渚鳬依席勢乗風駛棹謳撃汰飛濟深揚桂枻厲險戒袽衣冐沚葭侵露縁崕栁礙暉波文明夕照水色長寒威逺火㸔還滅孤烟廹已㣲勞歌徒自奏惆悵未言歸發東昌道中寄酬㓂太守舟行聊騁望天宇曠㣲㣲河曲囘隄勢川明泳日暉通波連井邑平壤畫封圻亭皋千里衍墟市百家稀玉堰龍蛇蟄金郊草木腓獵騎呼鷹去漁簑罷釣歸夷猶雖有適徙倚欲何依山嵬瞻岱近天逺望畿非禀訓亨重坎悼心未息機故人相念者為見斷蓬飛始至畱都户部作謫籍復收掄天心為洗寃榮枯元有分憂喜自何門器小乖通理才㣲誤再論未能思舊過轉使愧新恩秩蕞堪安拙官貧足避喧不知都邑異但覺省闈尊質是砆慚玉班非鷺接鵷鴻棲猶得桷羊觸戒臨籓薪積宜先賤舌柔悟後存為㸔桃李下成徑亦無言户部攝篆作握蘭叨入省愧此大夫紳周時官主地漢室署名民已是為郎乆翻疑從事新掌邦三壤賦奏計四方人無術䟽泉布何能學算緡迂疎下吏怪懶慢上官嗔治牘難稱敏趨期常苦頻非闗王事急祇是早閒身户部寓直作凉月静髙松華扉掩幾重沈㝠遺吏道恬曠絶人蹤宴坐時聞桂行吟暗度蛩漏聲風易斷山翠露偏濃襥被同今宿含香異昔逢覊違雲卧性病損世交容擇木難如鳥潜泥不是龍千門分曙裡猶記聽朝鐘題雙橋别業為倪考功大夫賦石橋人不到雲水自為家峰勢低窻入溪流向峽斜田園三戸闢草木四時華拂席殘雲戀垂帷白日賖穴開成鳳羽畹藝茁蘭芽振鷺天庭後鷗飛多少耶送項膳部遷之出守臨川翩翩五馬貴盡頌用賢宜辭省蘭俱逺之官鶴與隨行春時擁馭坐嘯書垂帷山遶右軍宅天清内史池名將先輩掩政起後人思他日徴良吏看君第一碑寄贈李邦良應聘修兩浙志霸王開列國牛女直揚州興廢傷千古人文著九流才髙宜可作衆體莫能讐赫矣䧺圖地居然載筆遊賛詞無下士舘榖有諸侯跡訪虞廵始書從越絶修勞思應夙夜託志在春秋成將藏禹穴待取好書求閒居寂寞棲窮巷蕭條獨揜門機忘親散帙交息絶華軒隠几非遵孟閒居已勝潘幽蘭充士佩好鳥與人言有飯時餐菊無憂不為萱陸沉同蠖屈泥辱異龍蟠倦禽知反宿落葉豈歸根懶拙從吾好惟思守故園閒居對雨作閉門亦已静零雨亦凄情暎牖増寒色鳴除急暮聲亂雲時聚散淺溜漫縱横濕突烟難起荒庭草欲生端居觀大化抱膝絶㣲營自顧貧非病堪嗟學代耕方慚聞道晚始悟視名輕終當謝人世偃息返柴荆同陳石亭太僕訪顧東橋山庄因縱遊山寺承徐九峰道人見問遂以貽之端居不自適訪隠出郊原一路通樵徑千山揜蓽門披雲開竹院斸石採苓根農事興南畆漁歌到北軒聞鐘尋逺寺憇杖眺孤邨虎守林中卧猿参講後言巗花難辨色谷水不知源因愧㣲官傲彌欽至道尊君將聞好事書此一同論夏日田家首夏新晴後田家事事宜耘耔知土性老少話天時野飯初登麥家資在種葵燎原延暮燒築圃待秋菑谷鳥臨耕勸蹲䲭往餉持相逢矜力作不識但蚩蚩觀周明堂故基在泰山下帝行先出震茲土表青陽對岳朝羣后膺符築九房隂陽隨向背天地象圓方環水形裁璧疏窻色順鄉時廵春首幸景側晝偏長禮樂承三統華夷奉一王經年宏構冺易姓故基荒難覩周人制徒聞王者堂基崇占積厚隅廣卜圗昌禾黍榮為壠牛羊踐作場竚瞻停服馬不至感鳴凰勿須傷已毁布政俟今皇題賓野堂贈胡竹亭司㓂芳村帶近郭大老此安居闢户延遥巘為園激淺渠虚亭修竹拂曲沼小萍舒閣庋恩存詔門懸予告輿家中婚嫁畢世上是非疎日抱藥邊甕時巾花外車燃燈親把筆抽牘自藏書揮金宴閭里何似漢廷疏題泮東書屋贈萬治齋中丞巷陋因仁里隣芳接泮宫幽貞存士業恬素作民風自適藏修理寧謀結搆工材完兼善斵石宻復加礱草木終朝静圖書積歳充觀物唯戸内覩聖即墻東經幄芹香入墨池璧水通青衿時晤語章句滿專攻跡掃柴扉闔心精牖漏空無為一室老柱石正須公宿上清道院稅駕遵山麓爰得老氏宫入門聞芬馥行徑恱青䓤靈草色難辨幽禽聲不同泉流瑶砌上池照綺楹東菓藥榮冬日松筠含夜風輕雲拂修棟皓月澄髙空晏然諷道語心悟一窻中永願託兹土餘生於此終芝山屠東崕招遊平旦何所適我友恵嘉招因輟几中牘言揚塵外鏕解紳掛庭柯躡蹻窮山椒霜後千林肅氛收四野遙坐来生氣象對酒息紛囂鴻雁飛寥廓葭菼變蕭條目騁天地廣心清草木凋佳景貴良晤非君誰見要皇帝察宗室子弟之賢孝者制為訓辭以美之且以為教也而崑崙公以孝受褒叅政某来使河南獲聞其事賦是紀之有美稱公姓承華自本支生身忘寵禄愉色恱嚴慈樂備無聲聽居防履險危藥嗤許子誤羮笑穎人推飲食温良善晨昏居起宜橘踰淮水熟笋送雪林滋取器遵親滌縫衣學稚嬉秉彛齊一介受福冠諸姬褒詔天閽出修文史筆摛琅函周國耀綸綍大梁垂傴僂循墻走尊崇結閣貽来旬叨佐岳采誦慶宗儀贈鄉飲酒衆賓張張履石翁壽七十有五有司請為鄉飲酒禮上賓鄉人皆慶某為賦十二韻詠一時政俗之美以為翁賀皇家文盛日海㝢澤熈辰遵讓興東序迎陽及上春三衣參舊禮八簋備常珍象璧池形鑿鳴鼉鼓奏振若翁躋保艾末俗見含淳抱甕除機械為樗逭斧斤全真同楚老忘力比堯民齒號邦人父賢充國子賓衣裳明主賜几杖列侯陳有祝寧憂鯁無諐可飫醇威儀終秩秩觀聽自欣欣在燕非毛髪能將義接人送梁宅之葬寒郊暮雨濕来送故人行死生奄異域歌笑不同情虛位將筵列求神把酒傾縞衣非結綬白馬為悲鳴栁聚車容設蒿虞曲挽驚重泉無返路九地有佳城司馬書猶在中郎女未成休論身後事空有世間名此日金蘭斷何時玉樹榮莫邪長閟矣光氣罷千星張浄峰兩廣功成復命提督湖蜀三省平蠻軍事賦贈二十韻漢室預三傑宗門挺再生書仍橋畔得籌即幄中成混闢鍾靈異掀騰出衆驚踐敡初詰屈際合果昭亨禮樂真謀帥詩書可用兵地奄羲叔宅機握伏波營郡有前朝棄城多故尉争按圖徴土貢内面奉王正文武扶今主韜鈐付夏卿忽移無棣履往致有苗征不改登壇禮親提賜劍名兢業方受脤節制更持衡大事精魂壯微軀感激輕軍容下瀨整殺氣渡瀘横威已諸酋憺師兼長子貞居然收上䇿坐見静南荆崩角雕題拜飛星露布行禽蒐休義憤草偃服夷情國倚安危算人推儒術英千官陪飲至好及上林鶯送林退齋中丞巡撫湖廣時方有征苗之役張浄峰公往為總督故末及之江漢流南紀衡疑極帝巡肇州荆最逺列國楚難馴分鎮由来重仗材此日真威清霜簡峻寵建隼旟新儒學今乘勢朝廷正用人憂勞陶甓設瀟洒庾樓親執法兼移俗治軍更訓民百城迎按節二列喜行春太平多釁日小醜未康辰問罪揚旗正觀兵授鉞頻壺頭屯組練夏口逼棼塵㓙吉資竒算安危倚大臣寧論權獨任還以徳為隣賛禹公如益唯須舞七旬寄贈李三州中丞公征蠻十五韻國有鬼方伐公膺神武求心勞邊圉計義副廟堂憂參伍㸔窺敵淵闐起壯猷善師遺下䇿决勝得前籌狼角芒初長龍標祲欲收蛇蟠竒布陣虎旅誓同仇賈勇皆超距先登自挾輈氣將忠憤作誅靡歲旬留螳背當車奮魚鬐入釡逰殷紅塗草木惨黯變川丘止殺嚴申令貪功怒未休搗巢妖箐浄洗刃惡腥流築觀崇岡勢囘軍小海謳文儒兼武備道氣出隂謀磨壁題華界投戈憬衆酋如何論鉅盛方叔再興周寄壽顧洞陽二十韻明時方貴齒令徳復推賢華胄承源遠髙門積慶延羽儀塵埃表神觀泬㵳先茨墅寧逑道樓居即是仙枕藏鴻寶訣幾契漆園編𤣥鶴元長算靈椿本大年蕭疎霜髪凛綽約雪膚鮮金重腰能勝膳珍腹每便生平閒㸃檢心事絶疪愪指屈讒誣盡眼㸔權勢顚降祥真有在受氣果能全孫曽森玉立軒冕㑹蟬聯難老由和萃尊鈐羡福駢典墳晩好甚池舘野情偏勁力徴書法精心入詠篇鳥花愁品藻金石盛鎪鐫尺牘人懷去佳章客誦傳瞳方微露角背繭欲生綿喬衆仍茵鼎園黄却邑鄽他年輪璧聘更老帝筵前寄壽華補菴十韻間氣合調鼎中年遂掛冠沉思存竹素神授得金丹谿谷叅𤣥理丘園縱大觀開池馴浴鵠剪圃毓芳蘭鄴架頻經閲陶琴不在彈形全糧可弭事省夢常安算甲天行遍孤辰夏日曼籧心應已化椿頌自多懽炰鳯琱盤重流霞玉琖寛遥知賓客盛桂氣集門闌附五言絶句夏日病居雜興十首我病如草木夏日益以長不向本根誅何由柯葉穰空室寂無人幽襟坐自整吾心已不疑何用論弓影四體不可風多汗常如沐却妬西園裏凉飈振佳木寥寥誰與論悄悄自懷恐他日理韋帶知當移㡬孔雙眼如深谷顴峰為髙㟁撫鏡不欲窺自怪非吾面種藥元因疾疾如藥草驕壞欄除藥本與疾兩逍遥家人迎醫至與語岐黄事答言君已知揮手請相避十旬九不飡氣息微微續豈必覓仙方即此堪避榖一巻黄庭經藏在枕頭裏因病少静清聊得刋數字素約山中僧来期不煩訂今来問法門果識余非病遵巖集巻五

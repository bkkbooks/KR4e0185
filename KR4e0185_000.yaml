body:
  text: 遵巖集别集類五明提要臣等謹案遵巖集二十四巻眀王慎中撰慎中字道思晉江人嘉靖丙戌進士官至河南布政司参政事跡具眀史文苑傳正嘉之際北地信陽聲華藉甚教天下無讀唐以後書然七子之學得於詩者較深得於文者頗淺故其詩能自成家而古文則鉤章棘句剽襲秦漠之面目遂成偽體史稱慎中為文初亦髙談秦漢謂東京以下無可取已而悟歐曽作文之法乃盡焚舊作一意師仿尤得力於曽鞏唐順之初不服其説乆乃變而從之壯年廢業益肆力於文演迤詳贍卓然成家與順之齊名天下稱之曰王唐李攀龍王世貞力排之卒不能掩也其詩則初為藻艶之格歸田以後又雜入講學之語頺然自放亦與順之相似朱彛尊眀詩綜乃謂其五言文理精宻嗣響顔謝而論者輙言文勝於詩未為知音今考集中五言如逰西山普光寺睡起登金山逰大眀湖諸篇固皆邃穆簡逺七言如每夜猿聲如舎裏四時山色在城中萬井遥分初日下羣山微見逺煙中琴聲初歇月掛樹蓮唱㣲聞風滿川亦頗有風調然綜其全集之詩與文相較則淺深髙下自不能掩文勝之論殆不盡誣彛尊之論不揣本而齊其末矣慎中集舊有玩芳堂摘稿遵巖家居諸刻率雜以少作是本乃隆慶辛未慎中子同康及壻莊國禎稍為芟削重鋟較為精整云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a34a677af84bb2a4aa616eaee484100071fb14d6e023027e5d050a62c4341aca

body:
  text: 遵巖集巻二眀王慎中撰七言古詩春隂長句次李司封古冲韻冬令春行節序殊衝泥立馬歎窮途勞思江國傷蕙杜旅食京華改柞榆碧動沙光歸雪篠青殘雨色入平蕪閨人弱線脩春服禁草徐風揺夕鋪暖閣遷鶯稀逢友定巢新燕故將雛西風爽氣來天地北闕浮雲定有無世事自憐隨省騎吏情真擬問漁徒燕城物候催遊子伏枕閉門肺病蘇功徳寺我昔已聞功徳寺山遊日暮行始至舊栽松栢森成行庭空寥戾鶴孤唳巍碑古趺苔半封上有金鐫䕶勑字巖巒長圍龍虎宫棟宇猶帶金銀氣老僧吿我昔年事令我感歎長欷歔宣宗昔日盛行遊四海晏然邊塵收鑿嵌構宇俯喬嶽穿池引水開滄流慈雲覆頂翔赤鳳靈山繞勢蟠青虬萬乘時來過雷電郊原旖旎閃黄斿御前一一侍玉女鳴璫曳珮凌清秋危閣蹙㳫象緯逼長廊丹碧辰星留綺繡㕘錯開荷芰華芝翠葆翼龍舟汾水具茨存至理國有元氣敷皇猷靈湫龍去已茫然此地即看非昔年繡野平原芊草合御堤曲圮洑波濺誦經釋子四五侣法皷振響揚芳烟梧月落梁净梵色松風撼户韻清絃吁嗟陵谷須臾改何况世事多變遷君不見素旗䬃䬃下靈車神來應與群帝俱玉殿金燈夜有無送陸毅齋守撫州薊門二月芳草深君侯兩服驟駸駸英寮飲餞開蓀宴如澠之酒攅華簮柔楊青青不受折欲别不别愁人心長風漫度青驪歌林端黄鳥聲相和憶昨與子諧嬿婉瓊樓珠宿森騈羅翠帳晴吟紫芝苑芳郊曉並玉花珂天地百年交不足弟兄四海懽如何聖朝禮樂興㝢縣尚書曹中皆妙選楚璧朝揚畫省輝岐鵷暮翥文閶絢専對清綰赤銀章獨誦榮登黄金殿九夷七戎同文軌四門萬里秩賔獻茂辰相見眼盡青展采振藻何英靈握中一尺𤣥璆璞腰間雜佩蒼龍精角巾往往探奇字曲几時時問譯經揮翰彈碁樂未極縱酒憂天常不醒金谿之城半山谷君也分符下南國雲間初賜五馬車風裏遥飛雙霞舄修途不礙驊騮驅丹心終見豚魚格吹枯噓朽回昭融芟鋤要使雷霆擊人生聚散何能常一旦繾綣成參商賢豪得路各努力同心豈必俱同行醉餘拂拭操珠徽回飈倐忽髙雲翔桂槳夜發遲冰泮蘭珮春生去路香君不見匡廬峰洞庭水巨靈􅏭嵲東南峙汯波簸蕩絶塵滓潢汚㟝嶁徒為爾丈夫意氣亦若此送張以學尹諸暨張郎衝星辭燕闕素紕朱芾過我别頭上峩冠髙切雲腰間長劍光照雪自言將下扶餘邦鑑湖天迴雲霧光王喬鳧舄青霞去宓子珠絃白日揚感君别促傷㑹希羽觴桂酒傳若飛鳴鳥在林求其友征馬出門不斷嘶丈夫抱璞不自衒燕石竟迷鄭客盼朱瑟工操不受竽眀珠暗投反按劍世路衣狗蒼黄分天風摶翮浩蕩變竹林不遲彩鷮馴枳棘難淹文鵷絢君去飄颻碧海春予住栖栖錦里塵扁舟為過剡溪曲定憶當時皷柁人題王給事南庄乃翁詩巻南極徵君長濩落獨傍雲峰結茅屋白日滄浪唯嘯歌青天翠壁聊躑躅一從雲掩少微星綺幌蕭蕭虚素楹秋風出户猿孤咽落月在梁鶴自驚惟有南庄椅桐樹香葉年年雛鵷翥贈丘集齋侍御督南畿學繡衣使者復欲東朱軒露冕驂青驄絲鞚游環玉宛轉文韉刻鐙金玲瓏刷足朝辭燕甸雪嬌嘶曉度潞河風潞河春風萬楊樹塲藿離離維不住桐柱調促聲正悲桂醑杯乾日空暮西臺纓舄切雲日珪魄環村君第一觸邪嵬稱獬豸冠持橐雄簮螭頭筆素擬勛業青㝠上九闗虎豹晝相向夷龍許已真自知堯舜匡君誰能讓萬言未獻賈山疏七貴争避桓典路對酒長懐杞國憂扣閽每值丞卿怒憐予滯淫獨繫官與君歡覯常問𤣥鐙月秋看琴觴接雨雪不嗟徒馬煩投分結契為弟兄開襟促膝頻相仍長風吹蓬無定蹤彩鷁縹緲之金陵金陵自古稱佳麗霧矗雷濤蟠王氣髙皇提劍造天功奠域肇封彌萬禩玉京龍虎互盤結貝闕星辰森虧蔽浩蕩人文中宇殊赫赩聲名南州㑹王阮風流今尚存陸謝詞華異代繼紫薇飄飄下丹勑鸞翔鳳翥無儔匹錦繡山河揚幰行烟花甸服懸鑒入奎宿當宵垂象輝劍光貫斗連牛拂漢南獨步鮮克企披華啓秀徒為爾百朋濟濟詠菁莪干溪粲粲繁桃李弔古髙吟六苑春朦遊清飲三江水臨岐贈别何所歎贈子雜珮雙琅玕揚波激瀾窮溟涬挽頽障倒迴真源莫教琳球羨希絶要與鍾鼎齊㠝岏郊遊道中風寒甚風寒瑟瑟吹我襟馬尾直竪蹄難任前瞻功徳寺名物色杳還顧靈蔵寺名鐘聲深萬山松桂凄凄落更有飢鴉啼樕槲僕夫威遲號無衣客子蕭騷戀行樂雙榮夀歌為龔内翰賦南極之星應夀貞拱辰映斗精熒熒老人朅來瑞瑶京驂虬翳鳳閬風行琪林璚海娯長生紫誥煌煌迴鸞光玉堂仙子雲錦裳合歡獻夀樂哉康登山險絶已非人境遂賦遊仙招隠之歌遊仙歌今我忽兮不樂駕言遊兮名山陟巖岫兮崆嵑躡絶頂兮㠝岏烟霏霏兮雲在下信斯美兮非人寰山中之人兮冰雪顔沆瀣飲兮瓊膏飡神炯炯兮霍耀膚綽約兮流素丹糝瑶蘂兮翳文芝餌五术兮珮華菅駟玉虬兮馭鳧鷖鳳凰翼盖兮翔文鸞宓妃嬋媛兮后乘豐隆屏翳兮鬰以承鑾紛飄颻兮下御倐往來兮山之間闢天閽兮延予啓玉粲兮嫣然導予兮元秘授予兮靈詮揖洪厓兮為侣快執袂兮偓佺朅浩蕩兮髙舉極𤣥圃兮閬顛超溟涬兮若視遺龍蠖兮空筌招隠歌有一美人兮山之幽構雲阿兮建霞斿結蘭篁兮桂橑雧荃紉兮擷荷裘壑岝峉兮嵣嶱路逶邐兮阻修迴素湍兮百折激清籟兮靈湫紛異卉兮冬榮枯木鬰兮枝相樛流雲屯兮飛盖潄瀏泉兮琳璆飄風赴兮層曲薜荔曳兮堂之坳鳥在户兮嚶嚶鹿鳴除兮呦呦嘷虎豹兮晝夜群鹿豕兮遨遊捐余珮兮河干緤余馬兮椒丘懐少室兮真隠慕谷口兮靈修嗤簮笏兮徽纒託泉石兮好仇永從之兮不返與達士兮為儔秋夜篇繁宿依天夜未央皦月垂影鑒我床厲風舉帷露沾裳惝怳不寐循東廂哀鴈流影之何方攬衣屏立以徬徨明鐙熒熒爛夕堂朱絃泠泠揮素商美人對之心不忘不覺北斗低西方繁銷芬歇誰能常努力懋徳競流光䗲蛄在户啼未安庭鶴警露當夕寒草木變衰凋玉顔畹有蕙兮臯有蘭霜黄沙白日摧殘含姱抱郁只自歎盈盈織女濯雙蛾駟虬襄蜺揚孅婀牽牛耿耿阻明河河深欲濟水増波望而弗覯時匪多追歎戚别涕若沱壯遊篇贈莊君采捧郊詔入蜀南風其徐大火流飛鴻鳴鳥聲相求勸君置節且莫歎聽我撫觴歌壯遊六轡如絲子所持壯遊萬里自兹始聖皇穆穆開虞聰昭代濟濟崇周禮天眀地察隆祀典睦族展親敦令豈玉牒千年奉至尊金章八道馳行使黄封朝下明光宫輶軒夕度瀘溝水益州鳥道接秦川隴坂縁雲髙揷天辨方藩肇蚕樷域經野星分井鬼躔駟馬橋連清渭曲太白標絶峨眉顛洶淙巖石互盪潏懸梯斷棧相鈎連丞相廟深老栢裂子雲亭古蒼苔芊此去先登泰華峰巨靈屭贔與天通滄波夜瀉魚龍静薜荔秋封鳥鼠空百年闗頭長濤浪九折盤西多雨風始信猿聲墮客淚遥憐巴唱引行艟皇皇帝命遐荒歡朱門香裊輕烟寒捧詔日髙紫氣繞上殿風引鳴珂珊蜀王秉禮拜手讀谿老喧呼扶杖看過秦論擬觀風著劒閣銘應覽勝刋迴舟好過灧澦堆巫峽秋濤日夜來瀟湘竹宻湖光動濯錦帆張江色開作賦還投汨羅畔題詩許上望鄉臺蒼梧氣逺不可呌白帝城孤空自哀君不見成都當時羨相如諭蜀文髙輝駟車子長歴覽浮湘水歸來乃有石室居故知壯士之志在四方睢睢盱盱户庭不出非丈夫方塘子自矜意氣彌宇宙天路雲逵不足登要使聲華滿人口秖今天子勤延竚持歸報答何所有去住萍蹤豈足知我歌壯遊君莫疑河西歌送崔副使屯田甘肅漢家四葉當用武南威百粤北平虜候月九天出斾旌揚塵萬里鳴鞞皷斥境先闢新秦中畧地還臨舊幕下王幕以南冦不來邊臣主議開河西兼符使者乘軺出兩道將軍揷羽齊築堠列亭過谷蠡建旄授節戍渠犂渾耶納欵壯邊衞大宛銜恩輸國質天馬效鳴上苑驂眩人貢伎中軍戲烏孫乞為塞外藩單于長失右方臂河南五郡富且雄控扼婼羌攘犬戎生兒十嵗能騎馬選士千屯皆引弓逺卻匈奴深避帳覽威諸域畢承風葡萄移種入蘭殿苜蓿連隂接桂宫博望鑿空要上賞貳師善戰啓侯封武帝居然𢎞茂畧秦皇不得誇奇功原野蕭條年代改昔時亭障依然在崙頭田官沒草萊宻須征旅愁闗壘天驕遊獵蔽隂山誘罕邀遮蟠瀚海丈夫報主兼立名慷慨辭君塞上行屬國應瞻都䕶節居延再起受降城歸來拜手見天子成功元是一書生古從軍行送陳中丞出塞漢家闗塞盡黄雲置壘張亭逈不分乘月長遮奪朔地防秋未解戍邊軍征戍年年長城下旗旐紛紛大朔野邊騎朝騰萬里昏燧烟夕起群峯赭𤣥漠警急傳消息單于屯在居胥北颯㳫風翻瀚海波隂沉雪晦天山色檄書揷羽疾流星將軍膏劍事戎行芒動九斿新拜將符飛五道遍徵兵宣威校獵長楊館勞率親臨細栁營六郡良家善騎射三河俠少本忘生鳴笳遥向金微道蹀馬誓貪銕勒銘遊擊更畨驃騎伍奇邀偏領輕車部武陽壯嵗慣殺人去病辭家専報主七尺湛盧勒宿揮千重渠答雜沙注左賢諸落發烏孫前軍轉戰越樓蘭蛇蟠結陣祲氛黒虎哮合圍日暈寒一生酬遇便輕敵百死樹勲不避難隴水分愁晝夜咽鄉心盡望闗山月煮糜時斧黒河冰卧毳尚濺朱輪血狼塞蕭條蘆管悲鸞閨迢逓帛書絶軍中苦樂只自知戎衣第問所從誰天子憂勤思振旅丈人行險用貞師旄頭蝕應平戎日燕頷封當破敵時但決幃中千里勝不妨代北六月歸潞河客舍别蔡刑部道卿問子留京者胡亦戒遄征吿言將辭汝恨恨難為情亦知終逺别且復稍同行行行並馬遵長路兩兩開襟叙衷素日上將中不自知隴危却下無傍顧祇疑郊苑共遨遊歴逺探幽始一休神爽翻思是送别垂鞭不語但含愁愁來心亂不能守見說能消惟有酒脫衣蹔就黄公壚缷却金鞍繫高栁紛紜吐論各輸心偏袒狂呼齊拍手海上三山不足求人間萬事寧復有逸興空多苦量微玉壺小酌持半巵强飲難成千日醉離歌又動兩岐悲風塵詎料㡬時合只得相寛言暫别舉袖未分淚已零登車欲去神俱越人生聚散比浮萍萍葉猶看結蔕游豈謂平生吾與子盡逢風漂與波流大道傍邊楊栁垂何人送客不攀枝愁絲慘葉堪沾袂去後依然風任吹願子貞心勿如此芳盟常保嵗寒期鳴鴈篇寄陳約之太史兼呈唐應徳陳允和二兄約之賦予南竄為上林鴈之詩予感其意適見斯鳥遂成短章因以為報云耳寒空歴歴夜星稀旅鴈酸嘶何處歸霜清露白聞聲急河廣江上恨力微本謂候時依煖去何言中路失羣飛羣飛超忽闗山迥祗抱離心獨耿耿每向天邊泣字文却從月下疑弓影孤鳴如和隴頭唫單棲不殊澤畔醒遷客飄揺靡定居麃麃雨雪賦其虚此時遥聽人何似避地翻傷鳥不如回首瑶池霄漢傍頡頏玉羽泛清凉南北欲知悲喜地但看風失與雲翔聽琴篇客有善鼓琴者為予操屈原之曲感不自勝因以成詠昔傳子春技彈絲聖入耳一曲作人情七絃發妙理美人擕琴升我床閑心敏手亦如此弄奇赴㑹若有神朱繩玉軫臨風倚始作懐沙縱九歌却調哀郢傷千里卑張應節發清商促越更趨引流徵楚水看流㩎指間江風忽奏揮絃裏棲鳥知聲中夜翔潜魚激響凌波起四郊隕葉紛紛下浮雲辭天月在野瑶徽半拂復中操宫聲少間羽聲寫山鬼依微薜荔裳宓妃窈窕螭蜺駕舊聞騷些已澘澘對此離憂遂不堪本聽幽音容易感復兼放迹自曽諳姱志千秋同夏沔愁心一夕到湘潭恨恨懐荃零淚雨沾襟不為雍門談河上遇風齊郊烈烈大風起走石揚塵一萬里始見蓬蓬生北海忽簸三江振東岱乍似軍裝赴敵塲旋疑天馬奮龍驤鳴籟颼飀四野聞愁雲晻翳一朝昏能吹朔雪凍寒空更逐飛沙巻斷蓬飛廉鼔怒陽侯出萬舶千艘静不發餘皇玉軸彩蜺翻横海琱旂翠蛟掣中流激勢水増波岸上但呼無渡河桂枻蘭槳徒悵望河深難濟欲如何將至東昌寄宼太守未菴兼柬包䝉泉節推旅客羈傷憑寓目東濟榮河漸衍沃禮樂猶存魯國風魚畋本負齊甿俗専城太守舊懐思佐理包何新相知遥憐比璧光輝地正是雙刀宰割時故人相别經五春臨當再見反傷神預恐風波易暌闋况陳委曲重酸辛以兹盈盈數里間將前還却轉愁人寄語風流賢五馬行春暫輟一娯賔清源别張近溪侍御賦贈君才磊磊稱時英山東七郡蚤知名才雄本自宜高薦况是明時矜豪彦胡為一棄便沉淪有似驊騮棲畝畔憶昨乘驄遊宛洛驕嘶被顧待丹轂途間遥認五花毛臺裏合推千里足仰揖群公盡整纓平交七貴争酬玉可憐光寵不相待世事悠悠須臾改今日面情昔不同昔時歡結今何在浮沉薄俗難重陳骯髒壯懐勿用悔鬂上漸生白雪霜手中且有黄金罍但聽悲傷歌北邙便輕偪側蹈東海贈張東沙臨清兵備憶昔相逢傷草草如今再見忻懐抱坐來秖是玉山凝立談便託金蘭好君年方壯已髙位鬢髮如雲施緑黛朝日輝光照綬衣外臺意氣從軒盖諸侯列郡望風裁將校分營備皂臺髙牙獵獵朱旗建潭府森森畫㦸開治兵能訓常多暇出衆英才稱大雅雖然授節統軍容却擅落毫増紙價七言破的罷彎弧五采文成纔調馬對座芳香振蕙襟垂帷紛郁極書林共言為政兼儒術復有尋仙出世心莫用酬君慚楚璧幸須恵我比南金沛公歌沛公尺劍應金符指顧便成大丈夫誅項滅秦若風雨定都列壤成規模横行海内已威加反過枌榆駐翠華戎服七年歸故里瑶圖六合化為家連營繚繞雜帷宫喧引傳觀井閈空争看今日炎精帝乃是當時隆準公始識好施非落魄誰言亡命有成功小往大來矜得志感今懐昔張髙㑹拆牲釃酒象川丘考皷撞鐘震天地泗亭舊長親掃除邑社健兒俯伏拜白衣且盡故人懽黄屋亦知天子貴非徒寛法滌秦餘更普殊恩洽里閭錫爵分榮千級羨優施賜復百年除地轉天旋回警蹕沛上父老皆如失已戴鴻私振萬春難留龍馭更一日壯心慷慨悲還喜大風飛揚帝歌起千人齊唱萬人和蜚聲翻入彩雲裏旭日祁祁照四方本從暘谷發輝光六龍整駕中天去此地猶能戀太陽過彭城作陁靡郊原極望平踟蹰立馬客心驚疎墩蕪沒項王國煙草凄迷亞父城春去秋來經㡬度霸業雄圖不可覩臺在已無戯馬人濉流猶記敗軍處髙陵深谷在翻覆世事回還難定測昔日東歸着錦衣今人但見繁蒿棘蕭壘隂隂苦霧封桓山烈烈動悲風英雄百戰終歸盡轉覺身名祇夣中蔵書萬巻樓歌為維揚葛子東賦廣陵葛子真磊落大笑時人寶珠玉先世遺金盡買書篝籯祇與韋編博善蔵選地起髙樓樓上陳施盈萬軸錯置方隅皆滿床臚分甲乙為題櫝趙卿如見應驚歎楚史多知猶未讀開牖晴朝雲色鮮垂帷深夜藜光燭已看收拾遍人間更說討論窮士族漢室古文壊壁餘晋代穿塋出竹書學士睢盱嗟未覩儒生誦守愧空虚何言散失千年後獨在君家完古初南京正月十五夜歌貞寅當夏建獻嵗属秦正物候知陽長風光見太平太平歌舞早春天正是月華三五圓初晴宿雨山川麗乍拂和風草木鮮元夕燈火耀焜煌山川草木借輝光抽英錯采皆新製競巧矜妍各擅塲萬户千門綴列星三條七市爛縱横熻熠九微金作椀瞵􅀈五色錦為棚却見眀河流下地真教皎月讓華燈燃春火樹紛無數臨水樓臺映㡬層連驂方軫動如雷已拚暮出曙翻迴盡着綺羅邀月住競將絲管喚花開並攜穠李輕車去暗度芳蘭接袂來蹴踏泥途成繡埒喧闐石路漲紅埃宛轉西橋復南陌冶意艷情歡不足少年塲上鬬豪奢公子羣中争結束博戲千回土比錢妖淫百態人如玉彩雲飛過逈看粧香霧微傳遥辨曲别有高門與深院帟障横施簾半捲晉室風流王謝家漢廷驕貴金張館靚姝鳴瑟洞房清上客綴珠茵坐滿徧持絳蠟代薪槱覆引長江添酒琖舊京繁盛一翻新年年行樂帝城春合聲願借更籌緩游宴只愁清夜晨沉沉清夜樂耽耽桂輪西墮日東含北斗城中洛陽道遊人思殺是江南春晴出遊永寧寺同顧東橋陳石亭羅印岡三公作金陵自昔多才雄聲名今日數三公前賢千載見標格雅道一旦振頽風往往結遊方駕出盡言都邑為之空才宜大用身未衰謝榮蔑世如脫遺懽趣不令兒軰覺幽盟每共髙僧期二毛從他𤣥鬢改兩屐長使青山隨翻嗤往古無達者苦欲留名身後知何况金錢與簮組纒牽糞穢夫何為將棊賭墅不清曠攜妓登山非放浪祗好𤣥言與新詩形骸各殊同所尚春半江城猶滯隂出門不樂愁人心青天歛霞雲散雨特與大士抒煩襟亭臯開霽迎飛盖林麓獻春非一態長江静浪助澄心列岫争趍不敢背草木向人如有情輝光眼見當筵倍舉手揮雲便退飛送目不着微隂碍長歌招鶴鶴下來把酒酬花花為開松濤鳴籟當皷瑟嬌鶯度曲勸行杯壯懐俯仰悲今昔此地曽經玉作臺風流同調不同日嘗聞謝尚邀彦伯當時人人畏少年却延狂生為上客竹林蕪没三逕荒留與後人尋今蹟靈雪篇上湛甘泉費鍾石二公時久無雪禮部祈雪雪降江静復川眀榮光滿帝京是日年祥發皚皚飛素雪繽紛素雪應祈興慘淡𤣥隂萬里凝瑟瑟初看先集霰峨峨旋見已成冰輕飛急灑亂霏霏楚水呉山尤自宜大路樓臺争改色層城宫闕轉生姿翻時似浣紅塵陌舞處偏迷白玉墀凌空遥曳雜風飄委谷填丘積不消昔望兼時將度嵗今看合夜并連朝為慶經冬方入地誰言上世不封條覩瑞懽歌何所致春卿秉禮崇禋祀同雲聚景禱前生赤日韜光齋後避共言六律失天司賴有秩宗能感帝秩宗美徳合純精並操聫輝雪比清姑聖相逢曾問道海神出見盡知名如鹽持調商家鼎願糝梅實作和羮送文夀承還姑蘇聞子扁舟將逺適令我幽居心不懌豈無白下諸貴遊不及呉門一佳客斗酒相逢何草草不語但持歸去好挾䇿恥為三上書拂衣欲就五湖老江湖春漲桃花水一路烟波通故里到處難辭解榻迎及家好是秋風起送儀部二寅長充選送貴嬪使春風澹蕩江如綺樓船一道通易水近川花栁盡容華為過佳人若桃李節旄前路光輝擁受詔採擇復充送合相當知偃月形問祥應有懐日夣君王正在栢梁臺歡進千年紫玉杯太史占天先入奏二星遥扈四星來松江莫生逺來見訪比歸賦贈文采翩翩正少年機雲以後又生賢已見馳聲嵩洛下却來又眺楚江邊扁舟泊近西淮栁客舍時沽南市酒路菓紛投駿馬前山衣寄喚新鶯後風流絶世美何如一片瑶枝出樹初畫舫夜吟令客駐練裙畫卧有人書敝刺蒙茸懐袖裏入門相訪眉間喜非才逺謝漢中郎率爾為君行倒屣吿中送顧儀部伯從僉憲齊東因柬臬臺二三故人江雲横雨暗春天萬户朝開凝碧烟行子出門何意氣輝光馬上揖金鞭白門楊栁風吹發荏苒柔條不受折雨餘帶濕如沾淚總為遊人傷離别春愁何處最闗情多病思鄉失友生草色芊眠迷大路川原迢逓阻嚴程遥知稷下非談辯不記墻東隠姓名送呉文選純叔歸養乃父閣老白樓公相門才子勝前韋一日思親千里歸不隨禁闥鵷鴻侣翻逐呉門烏鳥飛傾都冠盖悵追扳陌上征人盡羨還逺岫停雲看正白飄花㸃袖喜成斑芝蘭㑹恱桑榆景髙堂晝日偏能永魚美來從舊乞湖蓴香侍進經調鼎行樂江山橋梓春翛然老少離風塵紛紛世上多父子得似君家有㡬人春日同李司業愚谷劉刑部範東宴陳太僕石亭馬通政西𤣥于顧中丞東橋之瞻辰堂兼送蔣南冷太僕渡江三月江城桃李華隂隂楊栁緑蔵鴉懐春正少淹留處卜夜無過大隠家大隠城中不上闗忘形取醉禁言還簮合應占星是徳顔頽好似玉為山一堂賔主盡風流奉夀千金白璧酬蘭室香兼清論發花枝色上勸杯浮繁絃急柱催深酌雅調離聲相間作他日席上無車公縱有琴尊知不樂送謝應午侍御還朝秦淮水上石頭城楊栁枝繁暗囀鶯正寵輝光休故里無那夙夜念王程出門抗手凜生風錦綺江山離恨中衣上落花來㸃繡波間飛鷁為驚驄今時侍從似君稀衆望應言赴闕遲中臺盡待將輪揜左个深嘉槖筆隨明世行蔵各自安非才欲進也知難歸耕已製芙蓉服獨立遥看獬豸冠題謝御史所蔵水仙花障子是徐子仁所寫二月春猶寒名花不得看何意氷玉姿生君屏障間徐生善藝為時絶圖黄㸃白意中設㡬人入室誤聞香滿座尋芳將向折可憐花貌類仙人更詫妙工能寫真緑葉無風長不動幽英含氣四時新覆朶雲來行雨前結根石是浣沙年丹青粉黛俱難别但道相逢洛水邊李司業見遺廬山諸作述懐奉柬嘗慕當年李謫仙謫仙新詩解倒懸獨在人羣無所好塵埃回首傷懐抱憂來祇恐白髮先有時夣入南康道羨君盤游窮妙真覧君詞句何清新莫言今古不相接今見前賢讓後人送嚴介溪冢宰考績入覲建章朝謁曉蹌蹌天子垂衣正萬方勅引鴻臚宣特進留省尚書來展覲重瞳日月屢回看兩班文武盡榮觀奏記不須書手版承恩再賛拜朝冠三年居守有功勳宴勞親聞便殿言紸纊聽階知舊履尚方出守副新尊眀良㑹合似今稀天上委蛇㡬日歸北闕正宜操斗柄東人空自望裳衣澠池歌七雄割據相併吞一為横散一從親從主鷄連交戴趙衡言虎視獨推秦遊士東馳劍属環行人西使車方軌約為好㑹兩國歡道里中分期澠水折俎如山酒滿池談笑尊前釁孽起霸氣猶尋奪璧仇争心更抱皷琴恥相如按劍奮中酒指叱雄秦如畜狗秦固闗中二百雄趙亦山東六龍首金城甲卒不足憑頸血濺衣翻覆手捧盤請擊為西聲片語生風才脫口秦王遜謝稱寡人擊缶逡巡惟恐後滿壇將相驚相顧失色䘮精皆反走歸來數嵗閉函闗强趙有人未可取李伯材出示所蔵沈石田畫鷄戯題奉贈恠底丹青含象變幻出翰音棲匹練距設微黄如介金毛施五采雲錦爛令人白日誤蒼蠅不見眀星將舞劍此物雖微徳非一紛紛家畜安能匹閑心不狎鵞鶩喧潔性寧謀蟲蟻食主人懐徳何所似風雨瀟瀟鳴不已待唱曾充上國賔含香獨擅中朝美邇來抱朴學雌伏虚驕氣盡形如木豪華已厭俠塲鬬㐫吉羞憑蠻風卜茅堂壁立獨懸之形神相得長昏夙江州陳兵憲公招飲演武臺軍中奏樂作横吹曲舉坐聞之莫不心壯予本懦夫激而為詩諸水流天險兹邦據上游清時偃兵甲下秩叨燕遊臺榭敞高原遥臨芳物繁殘花飛廣陌垂栁静轅門轅門春色四山通置酒憑春賞未窮衆樂雜陳極窈窕忽驚横吹滿軍中浮雲遽離高空去草木飄颻江起風急語蕭條聞出塞大聲振動作平戎一堂壯士皆怒目書生撫席亦填胸曲半拂衣投筯起雄心横發不能終題畫四首平溪如席淡不流返照入水水光浮清暉細動蘼蕪岸香氣遥聞杜若洲木葉微脫丹崖爽漁唱時來草閣幽虚無剡曲芳蘭夕彷彿湘潭斑竹秋書巻軒窻臨欲暮為愛清凉忘歸去繡壁崚増森恠立虬松夭矯相攫執脩髯怒甲争奮躍洒淅疑乘風雨入蔦蘿蒙宻晝長隂雲氣淋漓晴亦濕複磵兼蔵嵌竇深空林恍聽翻濤急在谷幽人不可招白日此中容易匿深林㡬百轉碧樹層層開繁隂幽黯處往往聲喧豗掛泉拖匹練忽縮復陡見樛枝礙白雨噴擊如飛霰蒼苔徑滑隂厓悄烟際凄迷行人小疎簾曲几半埋雲坐覺㝠心凄物表和風稍吹衣杖䇿散緩步蔵舸識迴汀懸橋知逺渡栁外風映霞隄邊草侵路陂塘隨地廣野色遇成趣越水千名說鑑湖凌波虎阜勝呉都依稀似向圖中見不是江南此景無題便面小景手中素幅不盈咫風水凄迷千萬里遥出層岑毫末間稍分斷岸微茫裏雲在青天長不巻烟光乍起看還逺照影匡廬疊嶂開蒼蒼彭蠡蒹葭晚曽因為吏客江舟日日長江門外流開圖彷彿如在眼使我遐意凌滄洲送徐山人還貴溪兼柬江午坡先生徐生之來江公所遣也午坡盛稱徐生之術而予不能知獨愛徐生之為人因與之遊比歸為賦七言長詩三十句午坡頗溺堪輿之學故末以為諷幽憂抱疾衡門裏陋巷單棲枯槁士絶無好事致朋來何處飄颻逺遊子面上驚看烟水容口中愛說山川理跪進玉盤雙鯉魚中有一尺故人書故人久擅青囊業却謂徐生我不如每接言談聞要妙欲傳心法恨空虚浩蕩流波山崱屴徜徉攜手日探陟飢來舉火石頭餐倦後横肱林下息水若紛披怨狀窮山精逃遁知情得極目鄉闗去路賒登髙遥指亂峰遮已是閑雲長出岫忽見春風翻念家馬足行隨閩地草鷄鳴夢到楚天花傳心無侣但空還用盡腰間沽酒錢歸見故人論作客首應問我索居篇為言平子善風術何似揚雄獨草𤣥送俞虚江守備汀漳黒面趫拳少有髭平生自許一男兒腰間寶鞘龍泉動匣裏奇韜鬼谷窺直向大師談節制誓將微命奮偏禆論兵慷慨推黄石獻計昻蔵伏赤墀九重覽奏頗嗟異七貴傳聞争致遺共恠南人諳戰陣復驚勇士識書詩授綏金殿承恩出躍馬沙塲效死馳曽把隂謀干將略更抽櫜鞬解重圍好親險阨行邊界每望煙烽逐敵騎未快雄心滅北狄還膺大斾鎮東夷營開百粤雲横帳戍壓千山鳥度陴堠嶺天寒游激肅軍城月静鼓笳悲講戎當使同蛇擊羣盗真看似獸獮劈畫岡巒成壁壘指揮草木變旌旗英威未說封侯志感激須酬國士知題月中丹桂圖生綃半幅呉霜冷拂盡微塵秋水净展向髙堂驟駭神忽覩青天墮飛鏡䀜霍瑶光初出奩四壁澄瑩揺不定輾輪乍見海中行濯魄真看地底迸金波千頃浸玻瓈銀漢一泓垂素綆結質團圞亦不虧佳期三五四時正中有輪囷一樹木布葉葳蕤柯詰曲扶疎礙景小霏微旖旎漏眀頻照燭根折只容顧兎蔵枝繁獨覆姮娥宿飄英落葉細生姿一一黄金散為粟蕭森影裏似聞香的皪光中遥辨緑畫棟雕楹結綺簷坐來渾是在虚涵白日都迷羲伯馭䦨宵底用燭龍銜清輝鑒人毛髮竪仙芬染斷體膚凡廣寒不覺身曾到蟾宫虚疑手可探世聞墨妙有如此題句聊為未見談伯母顔孺人七十夀嵗在戊申月逢七由朔至十加二日吾家華堂敞髙筵平旦訢訢孫子集杯盤紛錯具㫖珍人各有持供其職羅跪再拜次第陳奉充孺人腹中實一觴一箸和氣蒸歡溢堂除難具悉從子慎中前致詞今年孺人年七十齒堅腹健頭髮蒼炯炯兩眸如㸃漆懿慈本自協天休以徳召祥理可必嘉慶請從今嵗始遐齡長駐蒼山色嵗嵗來陳此日觴孺人不老從子耋訪呉泉賔先生山居失路曽識髙人棲隠處碧林斜帶芳村路本期屢訪恣遊盤不謂今來重迷誤野橋横坼亂行潦疎林鳴蟬秋欲老始躡鶴蹤半沒泥却尋樵徑時埋草非闗涉歴記途差自是幽貞隔世涯賴有山前新漲水微紅流出磵中花翁賛畫思誠從元戎張浄峰公西征武陵蠻壯夫怒眦仰天號咆哮驚走兒女曹隆腫自矜頷下肉昻蔵屢盼手中刀居常樂禍占星氣出門正值太白髙馬首裝成酬恩顧戚戚闗山遥即路鳶影站波江沸湯銅標表界天撐柱慷慨身過頭痛溪入險欲覓功成處凱旋揚斾向城闕長安道上笳聲發人生得意此最歡取印封侯猶細屑䇿勲莫恠狗功卑縱指元因漢一傑病中同年江于春見訪喜而有感蒙翳城西開一室主人况復長衰疾商歌欲出聲不揚舉足將行脛無力賔位坐使苔蘚侵阼階漸向蓬蒿沒兒扶跰􅓷為爾興知爾元非車馬客我今已見貌如翁恠爾猶能鬢似漆朽廢本令顔色醜光輝應為意氣得吿言數嵗滯風塵蹜足低頭常偪側赤驥引衡鹽滿箱雕鷹在籠鍜六翮手扳逡巡效趨走壯志摧蔵誰復識清濁未容與世昏見人每露眼中白時事蒼茫心死灰胡為錯驚毛髮黒爾曹困頓不自煎内鞬外韄形體澤我痾雖憊神來守俗目徒看柴骨瘠微爾何由覩徳機豈謂泥塗皆棄物大樽浮湖亦有用枋榆飛鷃真堪適投杖逍遥遂縱歌主人不病何須䇿送江少峯年兄兼寄江貞齋學士及午坡提學窮年易感復多悲却向尊前對别離遶郭青山日欲暮嚴風錦樹嵗將辭人情乖錯今可見陵谷深危起當面鏌鎁為鈍鉛刀銛蕕蕙同蔵朱紫亂髙才尚爾困塵勞鄙夫豈悔長貧賤書成本待副名山舌在猶堪叩險闗鐘鼎可銘聊睨取竹素游園非徒閒窮達雖殊各有用寧須慘戚凋朱顔白雲飄浮飛鳥舉倐忽之并難久聚十年晤合始如今斯須立談又當去有酒未傾意自酸况憶杯中舊儔侣金門學士躓讒㸃繡服儒臣遭中傷寂寂魚書常不達輝輝棣蕚逺相望君歸為向二難說親見尸公鷄滿鄉小樓閒望酬邱少泉見寄鄙夫元是一慵者晨起櫛巾猶不把外户長闗謝往來小樓曠望任疎野山形迫若几前生江水遥如窻際瀉樹木揺落霜氣中簷甍虧蔽青天下北睇千峯通鳥路岡巒連亘莽迴互直看烟靄渺迷間知是故人棲隠處寓目本為蕩情志却因懐人結幽思正同槁木無起予忽枉璚瑰逢來使山遊晚宿石室遲洪芳洲不至衆壑生烟日欲低探幽力盡尚攀躋松風數里聽海湧徑盤谷轉行屢迷鐘聲出岫遥知處閒鶴引步因尋蹊修柯鬰鬰閉𤣥室流水淙淙灌藥畦竹下微塵浄如掃窻間巧鳥矜善啼奇雲翕赩千般氣恠石崚嶒百丈梯住處每留聊自恱可人不在與誰攜丹經誦遍山初夕緑桂香浮月滿蹊中夜收心偏愛静平生謀隠此堪棲行窺石洞逢真髓只恐君來已作泥題北塢精舍寄贈蔡克銘先生樗楊蔽户薜縁墻半塢依微聊可蔵闢牖恥同鑿甕陋覆椽戯作刈茅荒盆池湛湛偏涵色庭草萋萋自有芳蟠礴雖無林谷美栖遲也覺壑丘長主人未識平生意獨抱遺經心力費沿泝宓姬後與先攻求詁訓同兼異寧思世上逐繁華尚向齋中勤寤寐似戀楹軒寡出門頗遭親友嘲忘事揚雄嗜酒且好書愛君僻性亦復如蘭罇滿處開緗帙芸篋香邊貯麯車流俗妄輕何足問襟期遥合每相於題詩一寫塢中趣不見莫令佳事疎送裴質齋掌教東風吹春滿南國陌頭楊栁黄金色祗言佳氣正娯人何意離尊當送客鄙夫談道泉山隂廣文來講裴與林林友昨去灘江側君今往適潭水潯不因繾綣難分手自惜向誰開此口欲别逡巡杯水間送君轉使憶林友題溪洲别業贈羅生希晦孤洲宛在水中央中有伊人一草堂四遶波瀾絶徑術獨開户牖假滄浪時時雨㸃霑春巻往往灘聲聒夜床寂寞垂帷心自適最憐地與人間隔毎看草木無俗容久對鳬鷗盡相識霧裏豹蔵已澤文鷇中鵠養將成翮撲几繁香杜若秋侵裳濕氣素烟浮晶熒曽照香藜火揺曳嘗親桂樹舟白露霜時葭菼勁思君徒欲泝清流觀詹範川大書歌詹侯清晨登我堂手攜大軸墨淋浪直木屈鐵相撐拄展舒未畢神開張猛虎峥嶸龍爪利左拏右攫思復翔一波如拳勒盈尺竪戈撆趯掣電光璚瑰側剉金斜鑿銳鋒斫劍星耀芒華嵩擲石壓虎窟衡霍興雲起蛟鄉䀜霅紛披驚變態一手真看百體蔵如知胷含山海氣鬰勃憤盈不可當細書瑣屑何由泄故作大畫森横床激射幽隂竦毛髮妍姿宛轉迴春陽想見迴腕乍伸縮墨池驟涸筆行杠看君筆勢有如此前掩崔杜後張王數仞髙墻連幅縑素不足滿君之塗洒宜治磨崖千丈壁立摩穹蒼宴洪鄭川公席上贈歌我生多病守蓬蒿固陋自知亦自鄙窮年不往富奢招沉㝠坐興時乖觝西第召賔各選英南陌輳輪若馳水驚座孟公非所長袁盎浮沉敢相齒酒肉啜噉真細事小人徒飽信堪恥世俗本自重徴呼病夫可用見輕毁登堂今日為公懽斟酌豈謀口腹美長者固然謬好賢通家烏取文繁侈豆簞正可示嘉慈乃復開筵置清醴刲羊列俎吿積鮮旋結魚罶罩魴鱧菰菌流丹每溜匙雕胡柔滑雜香􅀈手持匕筯勸我嘗當饋屢興辭不止薄劣猥慙飲食豐尫羸忽為甘肥起敬恭百拜飫良温側弁傞傞古所試豈有軒車唶里閭更無都雅華簮履聊因杯酌存此風一使鄉人知酒禮飲中醉歌題贈李東甲東甲先生愛静便辭官正及未衰年忘機不賭圍棊墅好飲多開種术田每誇妙得閑中坐更詫無如醉後眠子夜絃歌娛客處一春風雨養花天紅英漸委蒼苔上白雪來侵絲鬢邊世態無端争夣裏人生何事勝樽前送李邑博望山先生問君何所望征營復彷彿有時思入重泉下有時魂遊九天上若滅若沒不可方或有或無難為狀不為攅靄黛千峯不為停烟青萬嶂只為可仰一髙山寢食如遺心靡他躊躇四顧如有喪朝夕不見魂蕩蕩朝不見山夕不見山黛峰青嶂千萬般日日在眼前曽不解君顔朝兮望山夕兮望精神注想他物不能干忽己置身髙山側寧須登頓勞攀援朝也見山夕也見山魁岸氣勢静重儀形終日對羮墻間世人愛山只是山如君望山豈徒然為君題作望山篇留與象郡人間傳放歌行送將樂張丞漢室材雄數武皇躬履豐盈海㝢康萬户千門不足御超然思舉雲中裳桂宫蘭殿營未巳更起通天造栢梁雙擢金莖逼霄漢髙髙脩掌承天漿蓬萊三山恍可到燕齊迂恠争言方神人東岱見巨跡王母西池親捧觴但得仙靈長不死真棄萬乘如敝屣好方少君前覆車五利將軍後執軌銅池三秀表奇祥瑞麟天馬來吿祉武安門下多腹心畯良盡集平津邸南陽孔僅故賈人卜式田間牧竪子自售召見驚嗟晚髙議朝堂發唇齒莫言往代不可攀莫歎微軀難上天虎豹守闗排闥入探珠須泳睡龍淵堂堂張丞六尺身胡為落落在風塵意氣揚鞭跨馬去如君豈是沉埋人題水心漫湖圖水心居士心如水結廬獨在水中沚浮鯈浴鷺與和光簡帙沉㝠欣妙理枕席長涵烟雨飛蒹葭影拂窻户裏四涯望斷絶來徑碧波澹蕩滌氛滓漫湖逸人最清曠一生浪跡五湖上陶朱曽挾西子遊欲躡奇蹤慕閒放荷葉時穿菱女舟釣絲或偶漁父榜糞土黄金不足營胸懐坐失具區壯蕭蕭尺幅誰為揮依微逺意出新機水中之廬湖外枻客来覽素壁不辨是耶非遵巖集巻二

body:
  text: 遵巖集卷十一明王慎中撰序陳見菴公榮奬序有自勵之守而無求知之心士之有恥者能之有兼衆之功而無上人之志斯近於君子之所養矣世下俗失仕者榮外徇物忘可貴之在已至有喪其所守而矯飾詭冒以干當世之名自勵而不求知者吾見亦罕矣一事易能也一職易修也所長未稱其事所業未副其職已囂然矜炫謂人莫能加也蓋君子之道於今殆將亡矣器大則所受者多力巨則所持者重以鍾釜較融鬲所容之數固有間矣執鍾釜以測江海鍾釜之挹勺有盡而江海之藏無窮力之於持亦猶是也鼇戴駏負相去何啻千萬而厚地之載無遺物使人之所養如地之為厚而江海之為深則何當世之功不可成其既成也又何功之足有而猶有以功上人之志哉泊然無所存於中而歉然若不足於外人之知與不知漠乎無以入其心而動之而又何求焉然非其有恥之素自守之篤亦烏能充廣涵積以愜其器而厚其力耶是知世之仕者陷於輕淺而不足於受持由知恥者鮮矣陳見菴君為潮州節推以刑為職其事則帝王之所慎君子之所盡心也君為之能使法比不繁情獄相麗庭無寃號愁歎之聲而几無滯積宿留之牘郡人稱平焉至其勞勩之所殫竭舉一郡之政皆由君之猷而得有功蓋其所長兼人不獨守職稱事勉為人之所能而已而君沖退自損若無若虛推美以鳴謙掩惡而善貸雖有褊心忮行者不得施於君也上之人廉其賢嘉奬之檄交至君未嘗有意於上之知也絶去嗜欲菲陋一身之養以行於妻子室人不以貧謫君也邸閣如空舍而僮奴多菜色人見其刻苦以為不堪君居之甚安在於不蹈其平生之所恥而已而非以是為可以致譽於人也充君之志深厚其養將為地之載為江海之受當世之功無不可成而兼舉一郡之功又奚足為君道哉海陽尹李君士彬貽書清源山中乞文為君贈以君嘗因督視鹺政廉而不取受中丞王印岩公之奬也豫聞君之賢稔遂不辭而樂序之黃邑博月溪先生奬勵序凡命之曰官而有籍於仕皆必有職而師儒列其間問其籍則仕問其名則官問其職則不可得而舉曰是以道教人者也微而不可知者道也默化漸成不可驟見而急數者教也是豈獨為之者難而欲論其為之者之賢與否宜亦莫難焉今之列籍而仕者其寵數名秩莫師為卑凡仕而有職往往得以其尊臨之體勢程督節文遇接方當與有職而卑者均其繁細而沮屈羡援之間失其所重以徇之蓋不為少矣故其道不立而師儒賢否之論顧為一時之所忽謂其於官成吏計之得失不為繫也其論彌輕其道益以不立於此豗壞玩窳之久欲冇興於其間非好學尚志之君子何以振焉吾邑博士得黃月溪君為之君最明三禮學解剝鑽究盡得其義復長於文始仕為陽朔訓導當路悅其文甚薦入場屋遂甲其科其文傳於百粵象郡人士皆退伏自恧以黃君為不可及其來晉江所謂文學之邑非若百粵之陋諸生事其師久之皆以君之學為可師求其傳於百粵之文誦以為法君又溫粹修雅不以所能加人沖然在諸生上偲偲若不足士益加親君之所以教人者由今之法而無變其術雖未能出於道而所與相勉明於一堂固道之事也所謂向學而有志殆君是矣是時陳侍御少嶽公持使者之節按閩中公於百務綜核不僣尤不敢忽師儒之卑以為不繫於論而察之詳焉以故知君特書其美昭示之於羣師儒之間以為君寵君能善其官陳公不失所論是皆可以為難矣夫謹於自立不藉知乎人而苟以汲汲於外此君子所以自信其內也與人同其耳目徴其是非以自決此君子將以考其所立而要以不誣其內也將決是非於內以為信莫若賢者之論一時使者之賢莫陳公若也豫於是因陳公之知君以為君信豈為苟徇乎名而諸生之欲以為其師賀又烏為虛用其情也哉遂書以為序衛萬户侯汪君奬勵序漳州衛指揮使汪君莊甫侍御傅近山壻也侍御立朝有才名為臺僚之望其臧否關當世之論不以情蔽其所論之公顧常重汪君之才以為武辨絶出一時莫及也監司部使者來閩無不與侍御相雅侍御絶不以其壻為寄監司部使者行部至漳不知汪指揮壻於侍御而但知漳州衛有才指揮曰汪某也汪君藻飾磨淬翹然求脫於介胄頑粗之習露其鋒頴華采以才自售監司部使者所以器任接遇之異於諸武人汪君常恐當路知為為誰館甥則器任接遇為有所緣而不明為才以為大恥故極意含閉不藉聲於侍御監司部使者有終不知其為侍御之甥或久之别以他故知終不出於汪君而監司部使者與侍御爾我漠然無所交為賜當路自以察其屬論才而汪君亦自以其才受察也流俗之失請寄得行於任使之間既潰而不可止武人尤為猥冗易見賤忽非有附麗不足以有立汪君獨能奮於此時昭宣其任使之光明不為請寄所溷豈不難哉君視漳州衛篆所轄禆校吏伍以數千人其威果足以起懦嬉而寬怛足以拊凋瘼能聲發聞為部使者金雙渠公所察檄而奬之人莫不為汪君榮禆校吏伍交欲侈其事盛其物以為賀以請於君君尤掩匿斂避不肻當也余觀今之武人鮮不以有寄為藉至其接遇任使之偶得於上喜詡夸大不知所以自持而忘其見藉之愧君所立若此矣其所得於上宜可擅之以為功張之以為華乃獨退然自失不敢以此驁禆校吏伍之上而安受其請豈不尤為難哉汪君之所立殆近於士者歟士之雅於汪君者龍溪庠生陳君輩不逺數舍來為君乞文豫久未及為閲嵗而鄉進士李君復為此文來速豫不能知汪君而聞於陳李二君如此其何以辭侍御於豫又雅也樂其有才館甥又嘉當路之察其屬既公且明不以猥冗忽人而使汪君有以自見也遂為之序贈郡博紀瑤山先生榮奬序舉百吏榮辱之柄寄於一人是非之口由是以決臧否之論積功罪之案而黜陟之典亦將於是焉稽國家置御史分察諸路畀之之柄如此其嚴以肅法守而起治功也由百吏與御史言之均是人也均為吏也猶然其有所好則知是之戚然其有所惡則知非之我與彼亦足以紛然交相是非而已然惟御史之所是非者得以榮辱乎人而為其所是非者方且自以為我榮我辱也不亦可怪也哉夫所謂是非者豈誠御史一人之口之所能為邪國家制柄以授之使其奉公論以明王法其所謂是非必其所宜是非者也如是而是之則足以榮人非之則足以辱人無可怪也宜也所謂奉公論而明王法非賢者孰能之乎然而御史不皆賢也吾懼夫一人者之是非之果不足以為人榮辱也果賢矣然而於是非猶有得失焉吾又懼夫其人者之為其所是非之果不足以自為榮辱也是乎人者與是於人者之欲皆賢也豈不可以為難矣哉永豐紀瑤山君懷負所學不樂為縣乞為泉州儒學教授豫與之遊而知其賢也竊心自相語上之人欲有所是於諸學官宜莫如紀君已而御史何古林君檄至奬百吏之賢者而諸學官中最首紀君豫不矜所意之中而深嘉兩賢相遇之盛也君之學廣博浩肆無所不究而深於義理元本經訓不為俗儒其文詞之煒煜條教之詳飾皆君之餘也豫與君遊久而所知始深何君徒以體勢臨之其於君宜未洽不知何從得之也何君於此豈不為尤賢哉何君得君以明其所是之得君得何君以蒙其所是之榮交相濟以成此美者也諸生請文於豫以為君贈豫既雅遊於君何君又豫門人也樂是二君者之相遇故不辭而序之云爾南安邑丞馬應橋君榮奬序欲知吏之才否觀乎民情而已其民詠歌之祝願之如恐一日不在其上也吾雖不知其人足以謂之才吏矣夫苟疾怨之詛詈之惟恐一日之在其上也吾雖不知其人足以謂之不才吏矣民之於好惡也若觀火然是吏之才否不難知也今之為吏者其卑冗莫甚於邑之丞佐操柄不足以效其能處勢不足以成其名忽於上而侮於下其積固久非一日也民之於好惡也固明然亦視柄而動觀勢而興大吏據危勢而擅巨柄政之良惡其於利病乎民也著民之好惡以酬其良惡也亦明而易知卑官冗吏其處勢操柄若彼雖有才者習於素悔之民其得詠歌祝願之好為尤難然則今之卑吏苟有為民之所詠歌祝願者其人不尤才於大吏乎豫間居畎畝吏之才否之論非豫任也然而知南安馬丞之才者以民之情也豫不能知馬丞之為吏而知馬丞之得民馬丞以才受奬於部使者南安之民莫不為馬丞欣喜鼓舞者尤欲請豫文以為馬丞重豫悔未能而民之不得請者若有所望而不及豫察其意於馬丞之好甚篤也豫既以此知馬丞馬丞攝篆安溪安溪之民幸其得之也如有所求而獲又來請於豫豫辭以病民之請者方竭蹶而趨重纍而至囂乎其未己也嗟乎馬丞之操柄處勢非有加乎他人也其得民之詠歌祝願獨加乎他人也豫廢且暗亦能以此而決馬丞之果為才吏矣豫誠廢且暗然在畎畝之中竊憤吏之無良而悲斯民之不告也有得民之吏如馬丞方將明其説以伸其人毋使其汩於卑冗徒為世所忽而困於無聞也况安溪之民來請之勤哉林龍湖先生受奬序嘉靖甲辰春髙御史按閩竣事以禮奬待按屬諸吏之賢者而吾郡司訓林龍湖先生在奬中其詞曰篤慕古之志勤潤身之學蓋非溢語也髙公持憲嚴峻任已而猜人其所取人必由已是於先生當必有以取之然不知其果能深識先生否也若其詞則近之矣其所奬人非一不知其皆如先生否也然其奬先生則得之矣先生之僚與諸生之侍先生者樂先生之見知於上也徵余文以發之余謂諸生曰諸君謂先生為何如人也皆進曰先生以道為學以聖人為師者也余作而曰諸君既知先生矣而猶假余文以為賀豈其長於知先生而暗於事先生耶夫所謂學道而有得者益之而不加益損之而不加損得志則大行不得志則獨行以其所得者內也今方以一人之奬雎雎盱盱羣焉而喜且以為先生賀母乃非所以事先生乎且使世如唐虞三代度德而受任量賢而命官德成者上藝成者下賢者在位能者在職則先生之德之賢固當居上而在位矣顧乃斂德以處下僚而藝成者得據尊以論之抑賢以司散職而能名者得操勢以役之是不亦傎上下之序而悖取豫之常乎而何足以為先生賀諸生復進而言曰諸生侍先生不足以知先生之學之所至蓋沖然如水之善下順流而不盈浩乎如春陽之溫被物而不留其與人也篤而不外飾以為親其事上也敬而不貌恭以為悅藝成者既上矣烏得恃德而傲之非惟莫之傲且誠而事之矣能名者既在位矣烏得挾賢而藐之非惟不敢藐且安而為之役矣是先生之所以安於土而素其位之行也今是奬也而莫之受是立異也是過矯也先生固不為也外受矣而中心有不受焉是挾賢也是恃德也先生尤不為也諸生以為先生於是奬也則誠受之矣知先生者莫若子請無辭文焉子然其言乃次其言而序之尹艮齋公奬異序凡有可言者必待乎能言而能言者尤必得夫可言者而為之言然後其言信苟欲信其言則得夫可言者豈不急於待乎能言者哉余少不知道而喜為文辭竊好言之名於世世之有待乎能言之事往往見於余言而吾郡邑之大夫功烈操行卓偉明著可言者宜不少獨少見於余言余之有事於四方也賢大夫之在郡者或不及知其知之或已舍此而去不知而強為之言則誣已去而追為之言則矯余之不得有言於諸賢大夫者豈不亦有所可恨哉而心欲為之言恐以終不得言為恨者尤莫如今艮齋尹公夫所謂能言者非徒善其文辭而已是非好惡信乎古而合乎道不徇時為取舍也余嘗持此以講當世之人其好古而守道者莫尹公若也古之道勞乎民而不謀於利慎於職而不愛其力故其敏於從事憊筋苦骨啓處之不皇而不敢有怨其約於奉身惡衣菲食妻子無以自贍而不敢自悔若尹公者其豈有愧於此道乎公淡泊自守無境內之交邸閣肅然閉關固鐍餽問不至其門常饜藜羮糒飯衣不文繡在郡久之移孥還家嘗退食獨處蕭條環堵如僧舍郵亭一物無有終日不聞人聲早起晏罷急上之令而振民之功雖祁寒甚暑矻矻不廢據案而輟餐對牒而假寐其勤至矣而不思自休蓋嘗歎北門北山之賢者貴為大夫而居處之艱至於室人交謫而不知所濟經營之勞至於盡瘁鞅掌而靡事不為以公視之蓋何如也然彼兩賢者咨嗟怨憤咎乎人而責乎天雖其從事之敏奉身之約而不見其心之所安公誠發於中持之不變未嘗有幾微怠悔之意其去北山北門之大夫逺矣此余所以好公而欲為之言也而惠安尹何君謁余曰公以賢受知於部使者檄公之賢以寵公於郡有司之間曰此廉勤之吏也夫廉者是余所謂勞乎民而不謀其利者也勤者是余所謂慎於職而不愛其力者也余之取舍知信乎古而已使公之賢不聞於上余方據古而信之其聞於上者又章章如是公之效見於事者久而賢著於聞者彰將去此而踐休顯也余既息乎四方之事知公於在郡而及其未去雖無何君之請猶將勉為之言况其請之勤哉是以備而序之苟有未知公者觀於余言則可信矣通守少華陳侯榮奬序道無所不通而事各有所宜自智效一官材宅一命等而上之至於任天下之重而撫四海之衆其心思之所措耳目之所營皆必有事析之有其緒而置之有其方論之有其數而課之有其績故夫推讞辨折聽詞稽貌而為刑獄訓輯整齊除器比伍而為甲兵嬴縮舉廢節量出入而為金穀施之有可揆之物責之有可紀之功則莫不謂之事然而有所以為之者矣其主之有本其推之有權動於幾微之際者不可知而著於應感之變者難以指喻是其所以為之者所謂無所不通者也其事冝其道不能通是為吏之守也其事宜其道通是君子之用也如是而聽詞稽貌除器比伍節量出入則可以為治刑獄甲兵金穀者也然而或進於君子之用或不越乎為吏之守豈非其為事者同而其所以為事者有不得而同耶嗟乎今之為吏者有宜於事以善其守罕矣君子之道孰從而進之今之察舉乎為吏者有核於事而辨其守亦罕矣有進於君子之道者亦孰從而知之以君子之道之難進而進於君子之道者之難知則今參知梁公之奬别駕陳侯何其兩遇而相得也侯為通守於吾土固以金榖之事制其職侯非獨宜其事蓋能通乎道者也且夫斂之而數盈戒之而期致是善於為吏者之所能也盈其數而民不匱致其期而下不勤非為吏者之所能而君子之道之所及也陳侯之治金榖其事則為吏之職其道則君子之學也君子之用於世行不得過物而賈其長思不得越職而獻其功陳侯之受奬於上也則宜以治金榖而已而梁公之所以奬侯者非直以金穀而已也其詞也寵之以為吏之守其知也察之以君子之心修乎下者非有援於上照於上者不至失乎下如二公者之兩遇而相得顧不盛與夫侯之善於職人之所知也上之以侯善其職而奬之亦人之所知也善於職者進乎道奬之者知其進乎道非豫莫之知也故因郡邑儒之來請文也而論之如此南安令唐婁江公奬勵序徵為令者之美於民其歌詠蹈舞翕然戴之如或恐失吾知其賢也徵為令者之美於上其褒異嘉嘆隤然任之不復有間吾知其賢也民之得失有常而上之好惡靡定執其有常之機以求得民而應靡定之好惡於是有違咈抵忤藂在上之猜忿以危其躬而後可以不得罪於民是則為民所歌詠蹈舞者未必皆得嘉異於上也徴於民者存乎我可以無所不得徵於上者存乎人有遇不遇於其間寧獨如此而已夫所謂民者固亦上之民也不得於上而後可以得民則其形勢之所格禦文法之所拘攣不得於己者必多其及於民者亦鮮矣以其如此為令者蓋有以明其苦刻卓鷙以犯上而要民之集其及民也鮮而取譽也著吾將何徵焉又非獨然也夫所謂上者固亦民之長也皆長之而皆治之德之不一心之不孚精神之乖隔而意氣之背馳徒持其苦刻卓鷙以為明己之地而自鮮其及民之澤烏云有不遇實為令者之未至焉爾蓋有處其至而幸其遇如吾唐婁江君之在南安豈非吾之所徵而慕者哉君為南安好以德化摩揉其民導之於相收養必以本業教之以為父子兄弟必於孝弟忠信其倚刑辟以為威事鉤箝以見察者曽不一出於政而未嘗有不得之伏漏失之科由其剛決明晢發於仁義故慈祥而不為弛修潔而不為迂用其求瘼去害之誠以開籌畫起事功而百里之封情偽赴於一堂千年之利計慮始於今日民之歌詠蹈舞洋溢旁皇芻蕘行路之謳謠可采而記也君之為吏有以得民如此尤不自伐其治而思與守長同心合德勞之獨任而事出於交修力之専成而謀本於叶贊其惻怛懇至方將融乖隔為和同反背馳為推挽而守泉州者又方侯西川純德君子也虛心盡下而恭己以責成泯然遺去知名勇功之纍獨執體要以先一時之有司推其意將使不職者奮悖德者興而况於南安之賢上下之間相與交勉如家人父子不知有形勢之拘間文法之牽繫君於是益得殫其力而不愛其勞其惠民之事甚多其最巨者履田度地以平一邑之虛稅跋跂阻深﨑嶇迫厄靡朝靡夕茇草而舍槖餱而餐而不以為疾侯為之出教下南安若曰盛明之治九牧率屬以阜其民太守牧也得率列邑之屬以共阜民而南安之令克副攸率求民之康太守雖愧蒙成實嘉與共享平理賢令宜思所以休節勤苦益宣令猷以終民惠一教之褒何足以為君榮而心孚德一之意藹然可見何其盛也縣之不得於郡而有志之士慨於澤之難究功之難成其已久矣君之所遇可不為幸與為令者之於上其自為有未至則幸與不幸之論不得施於其間惟其自處至矣而不得於上然後可以致憾於所遇今君之所遇若此故豫於其僚之來請文而特論其所處之至以明其所遇之幸而徵君之美蓋亦君之志也是為序贈二尹晴崖張君奬勵序流品之論豈足以定任官之法而盡人才之用哉雍容端拱資談辨以養華貴其論固足以行矣綜實課效使功能與位分相稱則登冗録而抱不遇之嘆者豈少哉積習相沿久不能變豈不以是法誠不足以盡才而得之者固十七八矣循易守之法以格少失之才雖知其不遇而亦莫之如何胥吏他途之士所以絶望於今世也名相列卿良牧賢守宰如蕭黃張趙韓尹之儔載於前史不可勝紀賤如虎圈嗇夫代刑獄錢穀之對甚悉至使絳侯內慚自退丙相見為憂邊思職越廷臣受褒實以易置近邊不任守長之策非嘔茵小吏發之慮不及是何佐史之才之多也漢事猶云逺耳地閥品望相髙矜美長誇至陳隋之際極矣孫伏伽張玄素猶得顯於唐今之循守格法者胡不取前事觀之縱未能破折拘繳以盡天下之長惟稍加甄敘於其間所謂失之十二三者拔其尤異而用焉使斯途之士猶有蹊入康莊並步疾驅之望不至錮為小徑榛蕪茅塞如近世格法之甚於以責功興事其補豈小哉將樂丞張君發身書佐限以品目固流外之名籍也其辨敏肅給通練世務濟以聞見之該習詞采之敷潤則吳下佳士也在邑磨淬自奮曰昔人所謂丞不負豫猶以士籍居之者况豫居此又何負哉可苟然頽冗以負丞乎孜孜旦夕條悉職事所宜舉不一遺失雖力去惰屈之習亦不敢為亢厲矯異少踰禮分值邑令缺以君攝之則悉令之職而舉其事若己所職不幸攝而過有所為亦不玩攝而偷焉不為也邑人始固疑君未必能其官及暏其出政之善持身之謹歡然悅之加以嚴畏其為士者莫不為君傾盡其所業之美而安意以君為長也當路器其才甚然所為盡其用者又徒使之隨計入奉將異物之貢於闕庭得不負算召譴而已其奔走道路之勞頓謁候閶闔之微密有人所不能堪者中丞阮公特下檄書敘能第勤以示褒勸而邑之羣士致其邑長張君二溪之意來徵豫文以為君榮聞君從事於今都督陸東湖公左右尤以才見寵陸公掌國環列實兼心膂股肱之寄義得薦揚幽側顧使君為丞豈抑畏引避之過耶君今將上計入京師陸公必不使之還為丞矣君其將如孫伏伽張玄素之所遭乎未可知也然玄素以太宗廷詰其為刑部令史時事至銜愧不自勝而伏伽對人輒言舊事絶不為隱二人皆名臣而孫之坦露視張所處為優矣君如得志為伏伽之不怍則彌佳耳豫重張令之請而嘉羣士之意序以歸之俾書以為君贈送謝夢鄰大尹罷歸序仕於州縣守職而以功獲罪愛身而以理受惡者蓋有其故矣嘵嘵皎皎好為危激震耀以鬻長伐異而見謂難能立鵠以來射建鼓而招擊上之人不忍其下而出於勝之故其嘵嘵皎皎以自見者乃所以自敗而貽缺汙也其不然則不幸處非其地腴邑名區蕃阜麗都物産之富被服謡俗人所愛悅足以起誅責而召徵求上意之不副亦所以賈禍仕之患此者而欲以功見賞以理得譽蓋亦難矣謝君夢鄰為永春所謂守職愛身者也而以劾罷去君謹畏醇深言若不出口內自修敕絶不為表飾峭露以不堪其上永春又僻陋險逼據羣山之中虎豹之虞瘴癘之毒非有珍物竒産有他侈羡以搖撼人之耳目而君乃用以得劾嗟乎仕者欲以功名理行尊其身而發其志亦何所望而勸以效於斯時乎君蕭然邸舍無妻子之奉脫粟之飯芑藿之羮人不堪其寡約而君甚安之方聞報罷束書册禇衣裘不滿四五篋蒼頭奴兩人踽踽然行如羈人窮旅見者不知其為宦歸也君行乃因友人謁余曰某罷去甚恨如得先生一言雖去不恨矣嗟乎在勢處顯之人力足以變置白黑當時所倚以決賢不肖為吏者之所輻輳奔走而求之幾幸一語之得失以為榮辱君既無求於彼而乃有意於余文豈以余為足以重君哉昔之廉士仁人苦思勤行坎坷瀹躓窮於一時而因君子之言以白於世蓋多有之此豈余任而何足以副君之所勉哉毋亦以其戅愚孤特觸忤權近以取廢棄有與君類者遂以好其人而思得其言耶世之所趨在勢處顯之人君顧獨好愚戅孤特枯稿離羣之道喜其無用之空言趨舍好惡傎悖如此用是以得罷亦其宜也雖然信於已者不苟同於俗得於內者無所待於外君之趨舍好惡其亦有以獨得而自信也夫則余言又何能為君重哉送都指揮俞君志輔序生當封萬戶侯死當以革裹尸此古之英雄貪名殉節者所為慷慨而自許也其生以封侯為悅不惜一死以求侯既得侯矣又烏能死哉狗馬實於外廄玉帛羡於內府子女聲色之美充於下陳耳目之好既以給矣口體之養既以備矣患日之不足而已又烏能死哉非獨然也其始所為犯難而忘死者志固不在死而在侯也然而有死者矣所謂以此始終者其事有所不免而豈其所自許者然哉慷慨之士不絶於世矜奮而自許吾將何以信之曰其事有在乎犯難而志不存於求侯者吾將以是而信之矣自國家以武舉求天下之虎臣幾百年而吾泉州未有應者吾友俞君志輔奮然而出以百戶中其科居常作止動息與兵為徒擊劍馳槊適於持捶之嬉關弓舍矢狎於投礫之娛擐甲戴胄而踞鞍馬若袵枕席而便紈綺也其為千戶於金門為守備都指揮於汀漳所至與士卒同甘苦㸑無精稻厨無庋肉而營伍之井匽庾竈必善具拊循勞勉人人必至惟恐傷之其誠心惻怛發於中而周於外不徒色之仁詞之厚而已豫見其所為嘗駁之曰所為大將者視方略計數如何烏在自操凶器與卒伍爭技而較勇則是身不勝衣射不穿札者不得將上軍而冠征南歟號令明而威嚴致則市召烏合之夫可使前死必人人得其心而後與之蹈白刃彼行厨棄粱肉而士有飢色者非漢之名將哉君所以復豫則謂凡吾所為必始於盡已不習其事而苟據其權不得其心而欲用其力吾以為於已不盡故不為也今使方略計數明矣而且習兵事號令威嚴振矣而又得士心不尤為兼備而無患哉且古之不夙習兵而堪將不素養士而立勳者推轂而出鑿凶門而前行其權得以斬艾磔裂人而無所制於法故能以威使衆而可以有功今將無殺人之權而制之者多又將率之而與之共死苟為不素畜其心則有渙然而走耳士誠與我而自不習其事悍然率而為之先是委虎以肉也吾雖不愛死乃當以不習兵死哉以其所言考其所為豈果以狗馬玉帛聲色子女易其志耶吾信君之能死也以此今僨軍亡將之釁屢見於邊上方聞鼓鼙而思將帥行且召君必不愛髙爵以酬立功之臣君既習兵而素拊士所向宜無不成功君固當侯而無所致其死吾之説將不驗吾誠信君而人將不信吾之言人固不吾信而吾尤自信其信之也不忘於君之為僉書都指揮於廣東也序以為贈贈趙千戶序異時武人之容冠豭冠佩魚服短後之衣撫劍而語難飲酒呶號視直而不能側聲髙而不能下手足之力有餘健而不可制則蹴踘蹶張投石超距以泄其悁急而宣其氣卑躬俯首靦顔笑而柔聲音飄紳襜袂與人為俯仰非其事也永寧衛右所千戶趙君伯齡世武人宜有其容以吾所見皆反之何也異時武人其容如彼其所為亦且暴戻恣睢忿忮所至輒批搏人以自快嗜財悅色則攫取挾狎而無所憚時平久而文法行往往見為背惡上之人輒操文法以困苦戮辱之於是武人之容為世大詬不思其為則非而其容則是彼其懲之之過而蘄以自免輒改其容以趨媚於世而求容乎上雖其進退蹈舞不驚人之耳目而矯強果奮之氣無復異時之效不亦可患也與且其容非矣而其所為亦卒不能大變於其舊是兩失之也伯齡細謹自飭以恩意拊士卒如恐有傷尤廉於財貧而不侵乎下其所為是矣豫獨怪其容之反也豈非思自表見以趨世而冀上之用乎然竟落落在羣伍中無以自異事任不及而材勇無所試飲酒不得醉醉亦不敢狂語徒飄紳襜袂與人為俯仰以銷沮其氣良可悲也文法之盛背惡者不得肆而斂飭者亦無以自異將使武人何所視哉吾甚患之故有以贈趙君送贊畫陳百戶序善騎者不忘馳善射者不忘彀彼其體習於銜轡玦彇之具而心悅乎磬控縱送之能使其約束委頓於衢巷里門曲囏而局蹐不出一室目窮於前堵而足極乎四隅越月踰時而不得一逞則倜然而不樂故見平岡峻坂則思介馬而驟見廣場易圃則思決拾而起有其技者固喜利其用也勇敢武毅之士矜鬬樂戰按劍而語喜難而幸危聽鼓鼙而意奮撫介胄而色厲居間無事常有死封疆之心今將使之酣豢於甕盎盆缶之門據妻抱子以老而溘然盡一息於床簀之上宜其有所不樂也泉州衛百戶陳君經綸毅然有勇武人也百戶固小校而泉州又內地君雖矜鬬樂戰而無所用其勇一日以事至都下自言於兵部乞𨽻兩廣軍門為贊畫官軍門所轄五管巗洞牙踞蠻徭雜種之所蕃育人質而獸知挺挺呼嘯所在而有無日不用兵君之好勇而得𨽻於此此亦騎者之平岡峻坂射者之廣場易圃也有間習之技而得便利之地心動於鼓鼙之歡氣盈於介胄之肅何其壯也然亦可謂樂矣君為此乞固死是求計反顧而慮還踵豈君所以求往之志哉然今司馬中丞張淨峰公實為兩廣總制吾聞張公在鎮經文緯武以仁義行師既以擇其大憝巨酋之不可化服者搜剃而誅斬之其可以化服者皆以人畜之不絶以獸雍容尊俎而偃戈休甲訖威聲於四遐君誠矜鬪樂戰而寇發益稀兵不輒出雖時有所用其勇而已不愜其矜樂之志矣張公於用兵每以律授將佐不得越教誡違期約妄有所事常節其黷而養其鋭不以窮武力為功用能軍無躁敗賊無濫殺君誠好勇其有所用之亦且善勝而完歸又安所得死矣君於此毋乃有不樂哉夫所為寢食不忘死者壯士之志也將死之求求死而不得則為之不樂母乃過於壯而苟蹈一夫之勇歟豫既壯君往得其地而又幸其所事之得人勇有所用而死之無所也為序以送之無使其過於壯而有所不樂也送都閫唐見榕之任貴州序天下之安危異勢而武事因時以為重輕方其重也智勇有所用則好功喜事者樂於得為及其不用而見輕則優遊揖讓不待材智勇力可以偷愒日月而無他憂雖其所處有能與不能之别而皆謂之易處惟夫安平無事而有不測之危既不可以苟居竊食以幸無憂而智勇之用常患於上格旁沮而有墮觸讒飢罣罹繩網之防而欲以武事求見於其時者為處於天下之至難方用其智勇於有事之際審計決機制勝敵愾昭乎有可紀之績而安平無事其於折衝精神銷弭萌孽亦不為無所資於智勇彼偷日月以幸無憂者狃習時安之弊然也今天下之勢可謂至安矣土宇之廣生聚之蕃彌天極地雖遐僻險絶如貴州古所不得有者亦置守設尉以居內地而兵戎備禦總以都指揮使司之尊蓋侔於古者開閫建節授斧鉞使専征伐之寄也俗恬民嬉之久戈鈍甲朽弓弛其韔矢插於服以都指揮攝使於斯司者舍其桓桓﨣﨣而習為濟濟蹌蹌之容文法之無議儀節之可選而以為賢矣故受之者無患於難為兵部亦不難於與之吾獨以為今猶有難者有安形而危機已伏乎其間非晏然竊食苟居之時也唐見榕君由汀漳守備擢為貴州都指揮僉事其司事唐君知謹職守慎名法斷齗乎檢約其身斷可不挂於吏議其文采之華暢器識之妙敏以自藻潤藩飭有足愛悅良可稱賢於今而有餘君之自處其欲為于于而居泄泄而食則亦可以幸日月而無他憂誠思其難而恥為苟且竊也則折衝之威銷弭之術有資於智勇為不少矣潛深參伍則不為狙獝之機果毅奮揚而不為頑粗之技此善用智勇者也君誠能此則不測之危默消坐鎮於隱伏之中不至於有事無復可紀之迹而與世為安雖謹畏於文法雍容於儀節從藩臬大夫出入諷議之餘所謂智不得而有名勇不得而有功而豈為苟且竊也哉鄉縉紳先生嘉唐君之能自致其身於顯榮喜兵部之用材重為貴州大閫得人賀也交欲有以贈君豫於君尤雅也故為之序雙壽寓祝序士持所學以從仕內有行己之恥外有守官之防勉仁蹈義而思廣聞譽施身之美其視膏粱文繡誠何物也故弊輿馬惡衣食以勤斯民之政確乎不以不義之得易其所願之介其道固當然也以是道事親果能以必合乎哉有羊續之母然後可以遂懸魚之清有吳祐之母然後可以獻衣囊之諫持己之所貴將使父母與之同而無間是賢者之所難冀而事之至不可常者也果其不合知不可舍所貴以苟庭闈之歡則有自決其志悍然顓行疆閉而不顧耳豈士之所樂哉子知所以自貴父母知貴其子之貴兩得而俱安自人生之大樂也吾於肅菴君見之君為晉江躬仁義之實以循其身動而加乎民非其所自修者不出也從仕三年貧約如一日其為羊續吳祐不愧有加焉豫固疑其無以為逺致髙堂之奉而恐其親之不能無不悅也然聞譽之出於吾民者洋溢流行達乎曹鄆之交如溫陵之境內翁聞之而喜入以告內太孺人與翁相對皆喜方且課童治耕訓婢執枲登其田畝阡原之所納以供朝夕豐不為侈儉不為吝天機不誘於耳日之交陶然自得南北之陌東西之鄰有盛車騎從僮奴喧赫過市側睨傍窺而不敢指歌鍾笙竽遞奏繁會致賔客而迷昏旭翁與太孺人視之若無所覩而漠然不以聽也豫以是知翁夫婦之髙尚非徒能貴其子之所貴而固有以自貴者子之所願有以順親之心父母之所安有以發子之志是則非朱君之能為子而實翁與太孺人之為父母有以成是子也豫始重朱君以賢如是今而後知君之賢之不足為難而翁與太孺人之知有以自貴誠世俗所希有而絶出也豫始愛朱君能合乎親免於悍然決志有顓行不顧之纍以其為幸之大今而後知君之所以能為仁義以致聞譽之美皆父母之教之而不足言也邑之秀民獲事朱君之賢知君之於孝甚篤也欲有以為其二親之壽而以請於豫蓋古者介壽之儀與物在乎撰食為酒考擊鼓鐘以備樂藉飭筐篚以薦侑既逺莫之致而末乎其所以為翁祝故言翁之所以自貴者見於文使持以獻朱君過家登堂為翁太孺人介無疆之壽壽項鶴山老先生序道之在於人其精可以攝身而其餘可以為人古之得道者取其幾希倣佛之要養其神氣以全其形魄而自貴於物而土苴之所斥棄粳粃之所漏佚猶足以為天下國家而其為之也亦無所甚愛其所以能及乎天下國家非命寵莫為之藩飭非爵名莫為之嚴威則其所以為人者固道之餘而必託於物外之貴而後可以有所及事有謬適時有然不然每難冀於必獲雖其獲所託而所以為之者宜有設張之機圖慮之用雖其土苴粳粃之棄佚而不能無損於其身如拔一毫於四體之間損之甚微而亦其體之一毫以其為之既有所損而託之又不可冀故學道者常以為愛而不肯以其身為天下獨收其精以自攝茹百物之英華而吐其精循四氣之沖和而違其沴固鄞鄂之藏滋胎胚之朕密焉而不出顧其多積而不施孤居而鮮偶無以為人而不能極其道之餘亦有所不樂於其志夫充其餘者既以有損而不恬専其精者猶為弗樂而未愈不亦為道之難與以豫所聞永嘉鶴山之下蓋有隱君子焉參知項喬遷之之父封主事項公是也公廓落魁偉蹈藉忠信而被服剛決始有意於天下國家矣時之不然事之當謬乃斂而自珍取道之精以內攝貴其身於萬物之上而以其志委其子遷之君以行於天下國家蓋公之於道其精者既足以得於己而其餘亦有以為人而不待其身之自為有所及而無所損含其醇懿載其欣通以逰世完於德而還乎天古之所謂得道者其幾矣道之所以細命寵卑爵名外之而不有者惡其曲求而幸取以害於性尤患其為之之勞不能無費於所葆之重苟其來加之益無所與於己可以安受而不惡其受之也無膺於其責無任於其憂可以長保而無患則其卑且細亦精者之土苴粳粃而非為道者之所辭公既以遷之之賢傳其志復以遷之之貴尊其身而染於外物之榮華都其命寵而不以為贊藩飭之資據其爵名而不以為章嚴威之具掇其尊而捨其責挹其榮而遺其憂其所樂者外而所以樂之非外也性之於物內外相合而輕重各適則分齊不爽於以養身可以順無涯之生而不傷公之為道専其精而不廢其餘足於性而猶兼取於物信其所履之全而得之造物者厚將以後天地而論算輔四時而凋三光有可期矣蓋道者非徒以保年而保年以不老者必出於有道豫知公有道者也故有以期公壽壽龍溪劉老先生序享其所當得而據其所可安而後為之樂遁世髙尚之人友泉石而侣糜鹿寂寞枯稿之與居支離擁腫之為使既以逺世之紛麗頽然自放以足其好於寬間之鄉峩冠長紳之大夫章甫逢掖之儒講禮容修縟節侈其詞辨談説雜陳交進於其前以祝其慶而禱其壽履如世之所以奉膏粱文繡之君子力有所被而事有所濟然者此豈其所享所據之宜哉方將以此藻潤其憔悴振發其沈冥以謂容節可以娛耳目詞説可以康志意幾以篤其慶而增益其壽履以彼所好之逺而所尚之髙必且管然而笑曽不足以一動其聽而少入於目也而潮陽諸大夫儒生所以為龍溪先生壽者何也先生有子景韶成甫君以進士為潮陽令奉先生之教以施於政寬恕開敏善其政以宜於人民父人之父子人之子如宓子賤之為單父者其所被者廣而所濟者溥矣舉一邑之父子莫不以龍溪先生為大父也盛容節以答發祥之元飭詞説以鋪移理之功其物之具備乃其享之所當得其文之光華乃其據之所可安先生於此宜無所不樂也膏粱文繡之君子都世之繁膴踐危涉患之機多故厚於生而歉於志髙尚遁世之人志無所不得常隱約焦急而嗇於外養以苦其生故莊生之論以恬愈為不可兼欲全天年以極壽命之數者必恬與愈相滋而後為養之備龍溪先生既以髙其迹於一世之外自足其所好憔悴沉冥以恬其心益之以具修之物光華之文以為身愈而無所不宜恬愈相養而內外無所害全其天年以極壽命之數於無疆必在先生也夫必在先生也夫壽程母楊太宜人序代顧新山司徒作嘗讀詩見魯人之頌僖公侈為敷揚而工極藻飭以述其休美祈其福澤者其詞爛然文矣其歸獨致意於壽母蓋國人之所以願其君者必上及於母而後為愛之至且夫考鍾慶之原而得其所自生論成善之功而歸於所由致不獨發乎情而固己合於禮矣而其詞旨所存有以約其侈之凡而核其工之質者蔽之以宜大夫士庶之一言而已大夫庶士不勝乎國人之衆而通國之人不及乎大夫庶士之賢惟其宜於大夫庶士而後國人之祝其壽母不為野於情而侫於禮茲其所以為詩人之善頌也歟推此義以施之今則吾泉州之大夫士之壽楊太宜人於古蓋有合矣太宜人吾郡侯程習齋公母也侯為泉州適當嵗艱民散之際憔悴枯稿待昭蘇之急潤跳梁嘯警需摧廓之嚴威侯既振其飢乏阜其生息幼者育而老者逸駧馬之藏未足喻其蕃厚也而後選其壯者用之以有事於兵向之呼集於溟漲之波橫行於緑林之聚剗削驅除一旦而盡革如食椹之梟化為好音乃始雍容絃誦敦琢子弟之才使講道德而陳禮樂藻茒之長於泮水者可采而樂也於焉飲酒於焉色笑曽不為湛而皆所以為教人心悅頌聲起思所以祝侯者而知本其所自邦人以請於大夫庶士而大夫庶士則謂老而好禮者莫豫若也豫老矣不足以為邦人之望而好禮則有之夫受天子之命長治一邦有人民社稷而得設其政教其土則國其分則君也邦人願侯而頌之而及其母於禮固宜故豫推魯人之頌之義以卒大夫庶士之請以順邦人之願所愧老矣而辭不文祝龍母黃太安人壽序禮之有祝其近於偽與福澤休吉得乎天者不可易而賦於命者莫之致今將以其歸美之譽媚順之忱求合乎勿莫茫昧之間以致誠於此而錫祐於彼若要之而可獲取之以往畀也果且以為然乎哉然且為之不亦殆於偽與愛樂尊戴其人也則必有願之之心有願之之心則必有祝之之文祝之生於願之願之生於愛樂尊戴之故先生為之立其禮以著教而達人之情而豈以為偽哉俗降禮失祝之義不行於世而人間稱壽之儀猶存古者致祝之意且其備文縟而講容盛於古有加焉雖其已多於儀然而人子以奉其親與夫交遊戚屬以奉其子之親亦所以敦人倫而厚民風誠加於古而不為過也然有不出於愛樂尊戴之情本無是願而侈為其祝冒焉以施諸其親而苟焉以媚其子者其失古之意不亦逺於禮之失而僅有存者人間稱壽之祝而其失又若此如漳州龍溪士民之祝龍母黃太安人其禮之意豈非古者之僅存而曠見於今也太安人教其子龍南岡君以才學為名法從伉直忤時遭謫轉徙不悔其志量移丞郡奉母之教以其所學用之於政以及其民其民愛樂尊戴之矣相與謀曰郡丞之賢太安人之教也烏有父其子而不大母其母哉則相與語曰太安人吾之大母也烏有為其孫子而不知祝大母壽哉於是合詞請於龍溪尹林君以來乞文蓋今之祝者為其族屬與其姻戚交遊各以其情之所及篤其子以奉其親其黨有所専其數有所儉己為可以敦人倫而厚風俗而猶有於祝則然而愛樂尊戴則不然者今將合一國之人以奉其親其情至而詞信願之之誠而祝之之公非徒於今為盛殆將在古而曠見也古之為祝者以著教而達情於禮則然而非必以為有益於願也今合一國之人之歡以為祝洋溢周浹導和迓祉於以祈無疆而錫難老蓋必有益矣太夫人之壽寧復有涯豫為此文豈以為媚郡丞君而已壽蔡鶴峰先生序年之所以貴於人者何哉為其得以彌所受之性進修之功日有所底以考見不病於年數之不足而無以自充也蓋孔子欲加五十以學易苟不至於五十則未得以無過矣蘧伯玉行年六十而化苟不至於六十則不至於化矣其生常存而功得以常用故尺寸之隂如珍萬鎰之璧而為君子之所以貴年者也而人之所以貴君子之年者亦以此故五十而無大過則孔子之五十也六十而化則蘧伯玉之六十也别聲被色分味辨臭以盡耳目口鼻之能而充天地所委之形貌不怍於志而浩然有以塞於兩間名之曰君子之年而晝夜日月之所見伏寒暑四時之所來往載之於躬曉然其若昏旦之作息動靜之慘舒年數彌髙而益以為可貴蓋道德不一學問不明之後人之能永年以厚生者常不絶於世而不出於學問以進其道德則亦無可貴之年故眉龎顛白隤然其修齡者徒可以享子弟之養而不足以為朋友之嚴事勤服於是稱壽致祝僅為家人父子閭里孝愛之末儀而無所用之於道德問學交為愛敬之際其可以有感也夫吾所為文以壽者龍溪蔡鶴峰先生友朋之所嚴事勤服惟恐不得為其子弟而聲慕氣接於千里之外猶知講承懋勉以自奮於下風蓋先生之學粹然一出於道其學既明其德既成而年亦已髙矣所謂充其天地之形而稱其為君子之年先生蓋庶幾焉是嵗十月八日為先生誕晨蓋年七十有一矣門人弟子與夫交遊慕接之在於聲氣之餘者舉以為先生祝而某尤奮在下風思為弟子而不可得也故獨見於文蓋君子之自貴其年者為其加以年數則可以內省其非也由其能化則可以思齊其益也故樂是人之長有年也而願之非徒知貴之焉而已爾故某為此文以道諸君之意而致祝於先生蓋異乎閭里子弟姻賔之為鄉之長老者壽此所謂交為愛敬之行於道德問學之間者也先生其尚益自貴焉而久為友朋之所嚴事祗服也哉夀陳靜軒翁序古之享年而居其鄉者其嵗時之樂共其鼎俎尊豆必足於口調其聲色容氣必悅於心撰其冠履几杖必適於體是子孫族姓之所以致其孝也在豳風之詩曰為此春酒以介眉壽朋酒斯饗曰殺羔羊是也行焉而不敢並其武居焉而不敢躋其位立焉而不敢抗其等肅其賔客則有容備其徒御則有數發其歌舞則有器多其獻酢則有侑是鄉人子弟之所以致其敬也在行葦之詩曰酌以大斗以祈黃耇是也子孫族姓之所孝是老者之獲安於家也鄉人子弟之所敬是老者之獲安於鄉也此猶為以年不遺者耳若夫酒正共其酒稿人共其食羅氏共其鳩外饔共其割烹樂師共其歌舞之事春夏秋冬有其時深燕縞玄有其衣燕射食饗有其禮是老者之尊於學者也非有孔昭之德音無斁之令儀則不在是蓋老者獲尊於學而其德行著矣非徒以年不見遺而受其子孫與鄉人子弟之孝敬而已養老之禮廢而今之所謂稱壽之儀者其父兄髙年則子孫與其鄉人子弟率以其始誕之日具酒食召賔客酌而獻焉獻而祝焉以祈無疆而答罔極是雖不盡合於古其亦殺羔羊酌大斗之意也養老禮廢而父兄髙年獲享其子孫與鄉人子弟稱壽之樂者蓋亦鮮矣况獲尊於學乎吾所為文者乃南海隱君子陳靜軒先生而郡邑師儒黃君紹文林君一星輩所為請文以壽之者也老者獲尊於學已不可見於今之時况於異鄉之學乃知尊之者乎閩廣相去殆千餘里靜翁暗然退藏含真履吉以山水自娛而與木石鹿豕為友非有名位氣勢足以動人而風聲精采溢於家族播於閭里至使四遐之境知其姓名是豈徒以年不遺者哉靜軒之德於是可以觀矣靜軒之鄉蓋亦有學得無有慕黃林二君之風而知尊靜翁者邑之俊秀必有肆席授几陳衣操杖羣然而從伏承下風欲乞一言而懼不可冀環膠庠而外望者當如堵墻莫不油然生其孝悌之意惜余居也逺不及周旋阼序之間一見其盛故為是文以倡之壽蔡逸翁七十序鼇江以東里居聚落之巨而名者莫如束石大海在其南豫嘗一再至焉登髙原以望大浸之茫然目之所望極矣而不知其涯際之所窮空水混涵於迷眇浩漫之鄉隱隱若有所覿意其為方丈蓬萊閬風之神山記所稱仙人不老而長存者必多往來其間而吾不得一遇焉為之徘徊容與神煩志倦而有遺意既望而休訪吾蔡逸翁於其廬修髯龎眉廣顙豐頰目視不流而丰神四溢舉趾甚重而步履若翔為之起敬而驚嘆曰斯非其里之人歟而胡其非里之人也問翁之所以能然者何術而然翁不言也觀於其堂杖几巾履之置有位播灑未嘗勤而塵壒鮮至也觀於其圃草木蔬窳之樹有列糞溉不待力而滋長有加也雞鶩之食飲牛羊之出入不失其節而各適其時蕃息馴狎可閲而數而畜字之事擾牧之宜未嘗親也豫於是逌然而寤是所謂純其意而不廢乎物神摯而形不勞事起而械不作行於無為託乎不得已與世芚芚於人溷溷獨保所有漠然以固存者乎然則所謂神仙者何必在大海窮髮絶域望而不得見之中所謂不老長存者何必遺世羽化辟穀形解虛無不可究詰之人蓋即吾所登之堂所踐之圃而方丈蓬萊閬風已宛然而在即吾所訪覩其不為里之人者固真所謂仙人歟是嵗九月十七日為逸翁初度其子迋用民望之友與姻戚之雅者羣然集於其堂祝翁之壽而請文於某夫翁之所保既已漠然遺世之所有區區語言之工道説藻潤何足以為公歡所謂真仙人者存齡儲算方與川偕至與日並升極乎天地而無疆而奚待於羣然多儀之祝然方且觴焉以致祝文焉以盡飭兹亦所謂純於意而不廢乎物者耶寄壽唐有懷先生序語齒於上下之間交有尚焉尚其在上則曰公曰君尚其在下則曰老曰叟當其為君公而齒足尚則貴有所不與當其為叟老而齒足尚則雖賤而無所詘此古道也尚齒之儀以祝為文以養為物皆情之所至也然祝頌之文常施於貴其於老而居下者在養以珍嘉可享之物蓋其儀之伸於愛敬各有所用其為加尚於齒則貴賤一也其祝也非媚而説之也有可則而事者焉其食也非恤而恩之也有可憲而師者焉故語齒於上下之間而有足尚而德存乎其中矣是以貴為之掩而賤有所必隆也在上下而有齒者意其不乏於古惟其可尚之有所存是以詩書無得而多稱焉尚之曰君而有稱者莫如衛武公尚之曰叟而有稱者自華封麥丘絳縣三數人之外不得苟以老名也武公之聖固無所愧於下然欲退而從鄉先生長老几杖安車遊宴之衎樂而有所不能三老之髙固無所羡於上然欲進而據公卿大夫寵數事業之崇顯而有所不可得齒之在於上世而有可尚者得人之難既如彼其於所享之宜而取數之寡又若此某於是益有慕於唐有懷公矣公毗陵世家代有顯人非有泥塗之辱起家守信陽州復守永州府得千里之地而長治之以君之政教施其境內金錫圭璧之德加乎民至於久而不可諼申謝舊土疑山湘水襟帶之邦歌舞其治洋洋如也及其解印謝事休於百瀆之上遺前日之榮膴而盡屏身外之紛華田夫樵子相偶為徒雖唐堯在上齊威為國曾不得一見之行年七十而貌愈悅聰明有加於昔德如武公而有其所不能髙如華封麥丘絳縣老人而行其所不得行其所不得而棄之為其所不能而安之人之尚公者一以為君公則不專於貴一以為叟老則固未嘗辱於賤也邦人子弟交欲祝且養焉以致其敬愛皓顛鮐背隤然泯其上下之所處而忘年數之不足古之有德而齒足尚者莫如公取數之多也某以通家子逺在下風不得從子弟祝養之從而特序其盛以寓欣慕之意云祝郡侯方西川公壽序國人愛願其君祝焉以致其情古之道也祝之之辭必於壽焉致意詩人所稱曰遐不壽考曰眉壽無疆見於古者厥惟舊矣彼得有其國而其人以為君此禮之所宜有也施之於今有合乎哉今之為史而其義近古之有土者惟郡守邑令有民與社類所謂諸侯大夫之得為其國家者也雖不得有其民然所以長治拊安之其政與權殆有君之義焉如是而愛願之則祝焉以致其情此禮之有合也桐城方侯西川為泉州吾民之所愛願私相與語幸其有君如此者環所治七邑之人莫不皆然其欲祝侯之壽乞於其色之大夫汪君瑀而來請於某使善為祝辭則安溪之民也夫勤其事而安其佚我者之報布其利而享其厚我者之奉吏與民交相為賜上下兩易以治夫苟足以相酬則上焉者泰然受民之愛願無所不敢當也其民亦且愛願之矣侯之為郡勞己以為民而未嘗煩之使之報我以佚也嗇身以惠下而未嘗費之使之奉我以厚也民之愛願之宜其如子之於父母侯猶且歉然若不能當蓋古之有道仁人其用心行事常出於是宜其愛助於天篤慶集祥眉壽無害以副邑民歸祝之情而不為虛也古之有其國者享年彌多則施澤彌久民之祝之雖誠出於心猶為有所賴於其利與勞欲其久於為政而永有以賜我也今之為吏有褒進明陟之法長治拊安之績既著則有陟而之他矣民之祝之尤為無所私賴出於愛願之至視古之義殆有加焉而豫文之以此詞可以無愧於詩人之所稱矣侯之必得其壽也益有可信夫是嵗庚戌侯年六十初度之辰九月二十九日也壽梁鑑亭翁封君老先生序華膴之盛與枯稿之癯相議而世鮮兼有之樂彼其經營於物內棲宅乎世表耽巖谷者固以市朝為溷濁悅鍾鼎者亦以草莽為吝固其理宜也寧獨處地之然勢不得易而相為亦其稟材與命有制之者不使兼有其享耶今之以其子貴受恩於朝而列於名寵之數者命之曰封官無所勞於事而有其榮居不出於土而名姓通於天子有籍於中書殆吾所謂兼之者矣是命之所子而處地之然也又有材之論焉今夫與之以一成之地十室之衆而不能治顓顓然一草野無能之人耳顧托於無所勞於事而其瑣智之所知近慮之所謀不出乎閭井細屑之務置之一丘一壑之間而志有不存况其未嘗在丘壑耶如是者恐不足以自免於溷濁之議而胡可以譏鐘鼎之士吾所謂兼之者將取材焉如是則歸以兼有之樂而不為虛蓋聞滇南蒼山黑水之間有隱君子曰梁鑑亭翁者少而治周孔之業挾册講頌慨然有當世之志嘗一遊庠序稍出其藝以用於課試之場而同遊之徒無敢抗旌前行者談古以御今成敗治忽之故如端拜而議具非不足用力非不足以進也囂然舍去自放於山水誓終老焉同遊之徒出己下者往往以藝得志翁不顧也及其子梁心泉君舉進士為郎官以其官封翁翁束書擕劍去鄉而逺適攬荆楚江漢之大勢縱洛汴趙魏之壯觀至於京師以如都邑規模之雄巨朝廟器數之文明躬詣闕庭蹈舞拜賜徐反其鄉然後遺章服之寵適泉石之娛求鴻寶祕訣黃庭內經妙解而勤修之不輕為人語也吾所論於材者若翁兼之矣究翁之所解修將窮天門地户之開闢取日精月華以吞吐乘不載之馭遊無垠之野與造物為徒而享年之多自其解修之緒效世之康疆逢吉之祝良不足以疑啓於翁之側也心泉君訪豫草堂拜且言曰繫官於此去吾親甚逺而世物之華膴舉不足以得吾親歡惟名人之文其所欲也將以歲八月二十日吾親之誕辰馳為獻焉某非能為文而君謂翁待以此歡故序以為翁壽奉賀王間齊老先生壽九十序天地醇龎沖粹之氣必鍾於人物以其絪緼之妙變合之難人物之得於是氣每間值而僅有其值而有之者非徒性情功用有以大異乎人與物而形幹體質亦且敦厚貞固久立而長存彼紛紜雜揉並生其間者常易於變滅而不得與之同其長久氣之鍾於物而物之得值乎氣者在山為喬嶽在木為松柏大雅詩人將言人生福德之盛博取於物以為况特舉南山松柏與日月之升恆為並夫他物之崇者不免於騫崩其茂者不能以相承惟南山松柏則不然此則物之異乎在物者也是氣鍾於人為仁人君子其凝重靜止無造作之勞如髙山喬嶽之為尊其堅貞渾確無華飭之巧如松柏之為操如是者豈獨其修為存主大過乎人哉其於永命享年之道亦有非人所能及矣某所見今之仁人有間齋王翁焉翁自為士讀書至孔門言仁之旨深玩熟講誠有意乎其為之故於聖賢之言無所不盡心而尤盡心於論語也於論語之言無所不玩講而獨有契於告樊遲之三言嘗謂是三言聖人可以盡性衆人可以盡分吾上不敢語聖下未忍同於衆人力行是三者終其身而不變不倦焉其庶可以為今之仁人與故其居躬立己由壯至老未嘗見其怠傲燕僻之容其處人接物自家以達於鄉國必竭情獻誠而偷薄害忮之機不一出焉環翁之居而聚者長少欣欣然一以為父兄一以為師保親之則不敢狎敬焉而不忍疏若翁受氣於天地果值其醇龎沖粹有以獨異乎人視彼􅀈輕矯揉多為造作以自炫浮誇藻澤務於潤飾以為工真如培塿拳石之於喬嶽繁卉夭草之於松柏也某壯嵗嘗獲見翁知其居處之恭執事之敬與人之忠而信其為仁人也十五六年之間屢得見焉而知翁之所為恭敬與忠者不少倦且變也今之仁人非翁而誰是嵗八月二十九日為翁初度之辰於是翁行年九十矣翁受氣既異則永命享年敦厚貞固久立而長存宜如南山之壽松柏之茂而某敢以是二物為翁祝以附大雅詩人之義壽童南衡老先生序分以畀人而已未嘗不有附以益彼而此未嘗不多是治之出於道者也道之精以治身其緒餘以為天下國家終日為之而未嘗為天下國家無所不可及而毫髮無損於其身所畀益乎人者無一不出於己而此之有且多者固自若也得此以為上黃帝是已故窅然遺其天下而天下大治得此以為下庚桑子是已故居畏壘之墟而年谷熟物不疵札今夫樊然以愁恐其心而謖謖然以役其四體而曰將以為人津潤之沾溉者勺涓而膏液之漏巵也江海珍瑰之投遺者塵粟而寶藏之毀櫝也丘山不亦去道之逺而藏身之非固也哉千里之國之疆亦廣矣四境之人亦衆矣上焉視天下則不足下焉視一壘之居則有餘將以畀且益乎人而能無損於身非得道之至胡以及此南衡先生生乎會稽名山水之間獨涵沖融醇秀之氣以誘其靈覺蚤知向道勤修而敏悟觀於有欲之徼而躡乎若存之根守乎知雄之溪而復其去雕之朴蓋與軒轅氏異世而同師如造廣成之室而得乎順風之所聞吳山浙水之鄉羣然親而事之如畏壘之人之欲爼豆庚桑楚而卒不可得也其為泉州四境之所際千里而儉自先生之為之天時則有行矣祥序丕凝而不禨日月星晨則有象矣光華之埀乎下加顯草木禽獸固有生矣隕黃殰殈之災忽然如失臣妾之劃然智者效其職其芚然愚者不敢愛其力觀於四境之內不知孰為之分而莫不有誰使之附而莫不多先生方且葆和含光閉乎無楗之門行於不去之塗存乎我者愈有而彌多耳目方應之而精不搖手足方營之而形不困先生所得之真殆將進於至人歟一日南安尹蕭君過豫請所以壽先生曰誕日將臨矣豫謂先生之道已進於忘己將後天地而不老仰閲三光之幾凋而俯觀桑田滄海之屢變於前吾與若不足以測其算之所極而何能為先生祝先生尚無嗇其緒餘以為天下御軒后以逰襄城之野行七聖之逺途臻一世於華胥之俗吾亦蓬乎其為杓之人長託畏壘之鄰比食熟谷而混於無疵之一物不亦嘉乎請以是為先生祝壽丹臺吳翁序養生之大方有道有術道所以為恬也術所以為愈也恬而不愈雖志悅於內而和不足以葆其外愈而不恬則氣循於外而中未有以久其存所謂道者非以其不私形軀與人同體而我無所獨利之謂與翕合太和𨗳練元氣使疵癘無所薄而疾疹不得作吝惜形軀如珍圭璧而寶蓍蔡適得於己而不可以與人術之謂是矣山澤之蒙侗木石之瘠枯叩噓呼吸吐故納新熊鳥引而龜蛇蟄其術足以藏身而漠然不以物嬰己塊處株居無滲泄之潤以及人其道非也如是者永年於寂寞荒昧之墟為木為石而已雖壽而不稱於世誦法詩書佩服仁義思以其道同物揭揭然以儒自命蓋多其人矣占畢簡册勞其口耳節文聲容束其筋骸往往柴形而火色其道未至而於術已疏有稱於世而不得其壽信乎恬愈相養者之難也嶺南韶郡英德吳丹臺翁今安溪博士吳寧靜君之父也其聰明靈秀不滑汩於塵俗之壒垢而亦不以命儒揭揭者之業役口耳而窘筋骸又不欲為木為石自泯於無稱而苟為蒙侗枯瘠之壽故留神於黃帝岐伯之書內觀五臟九竅息之所起脈之所經窮微眇於未朕而遡源本於無始至於百體四肢榮流衛行意使而機轉如臂運指而腓隨足雖山澤自藏者所得之術不能加也心存兼濟而樂在於與人共利老長稚幼苟有以六氣七情之沴傷其生者皆引以為己傷乃始烹煉金石㕮咀草木品酌佐使之宜調胹剛柔之性畜百中之方以待求者至則與之與之則必有功善貸而不取其資多施而不責其報英德之人因翁得不以沴傷其生不知幾何人矣其道不私而其術有以及人所謂恬愈相養者非翁之謂與夫欲生人之生而自不能善其生者未有能生人者也故翁之道由術而通兼是二者以永年儒者愧其術而山澤之癯慚其道世之得壽而有可稱者莫翁若也寧靜君繫官庠序求歸而不得旦夕以親為念於是邑之弟子寓圖於英德以祝翁壽以慰其師之心而羣來乞序於豫遂為之序壽封君蓮溪田先生序今上在位踰三十六年天下方樂有道之長朝廷之上尤以恬晏豐豫為太平極治之嘉會天子端拱深居養玄默致虛靜以納和介嘏而頌萬壽難老之祥十有餘年之間郡公卿士咸喜自得謂仕於化國而遊仁壽之域其樂熙熙如登春臺所以祝聖人之壽者其儀孔多而誠悃特至是時春官實司其禮而燕山廷翰適為郎於禮部草具儀節陳飭器數勞忱備著蓋躬際休美而受上之好賜甚渥可謂盛矣君以望資髙拜廣東布政司參議職當宣布天子綏逺厚下德意推之政事以幸百粵之氓尊髙年養黃耉使老老之風達於嶺海雖遐荒絶陬亦熙熙然如京師之樂而後為能明將上指敷錫在下而化國之長日不特在朝廷也君過家覲省尊甫封君蓮溪翁翁年甫六十君拜慶於堂俯而興思曰人道之重莫君親若矣楊也幸遭明時有列於朝預在廷羣工之末獲祝聖人壽且以職司獨效其勞其又幸矣今也蒙恩之官便道獲拜其親不又其幸歟夫將宣布有道福民之澤以老嶺海之長老而老吾之老以為之先其亦可乎乃以是嵗五月某日之吉稱觴于堂盛上壽之儀而乞言於某曰非得斯文也楊將無以悅吾親於是姻友某某輩相繼來速某竊謂天子之恩君臣厚矣而尤厚於在廷之臣廷臣之尊者多已不及其親之存駢蕃膴腆之寵錫徒受以逸樂其軀而已君雖未得預於尊者恩厚之數然有親而壽之其樂有倍於逸其身者矣蓮溪翁向所以教之以移忠者既得以獻之於天子今也持其所受於上者歸以為蓮溪翁悅出有以顯親之教而入也能顯君之賜豈非人道之極歡臣子之備美哉蓋聞今上嚴畏純一竭內心之誠以昭受上帝而對越神靈之貺佑如響答聲禱之則必應故能納和介嘏其與天明天旦相為遊衍出王萬壽之祥不待羣祝而自臻也廷臣近光化訓必有能參同德於密勿契合之表者矣逺臣庶民宜未有能與於斯也蓮溪翁專精恪謹以上天為不可欺而羣神皆不可褻也夙興虔恭至夜而不敢怠一舉事一發言必告之於神神亦往鑒其意而孚之若相告語豈非不詔而興於上之教者耶吾知翁之所以受福於神而承寵於君者交益而未艾而廷翰君之為其親悅尚有進於今日者序以張之併以為俟侯梅峰翁壽序嘉靖一十八年十月望日南安侯梅峰翁生七十矣同姓子弟與夫外姻賔友鄉閭之長幼咸以壽為翁祝而請豫文者則其姻李顓輩而因吾外弟陳子和以來子和在翁外姻之卑屬而特為翁所愛者也故其請尤勤豫謂子和若輩所以致愛敬於尊長者竭其誠心以願之則又治其酒食之美以進焉飾其筐篚以侑之作其鐘鼓以衎之以安其口體而樂其志意斯亦可矣而必以豫文何哉蓋翁雖伏處田野不以文見其身其于詩書之言皆能習而通焉挾册吟誦與儒生無異其閲史最詳談其行事名迹亹亹不休至與人論難往復處其可否有條貫也故于文知貴之而尤知貴賢者之文而姻戚之欲悅翁之心以祝其算以為幣帛之奉將金石之考擊皆末也神氣之在於人患其難全而亦不欲其無所用故詩書之士既苦其泄越而不全田野之老又牿於顓固而不用如是者豈獨其性智有不足哉其於永年之理亦有所偏而不得遂其宜也侯翁既不以文見其身全其神氣老於田野之生業其於詩書之言泛涉而嬉獵焉以免於顓固之陋揆以永年之理翁於所取為兼而不偏矣其享壽冝也子和輩求其心之所悅者之在乎此請而得焉以致之於翁蓋豫之文非有幣帛黼黻玄黃之章金革鏗鍧鞺􅝅之節然適投乎翁心之所欲而知貴者於是焉而設之以筐篚奏之以鐘鼓則其所飾者皆足以為侑所作者皆足以為衎宜有以樂翁之志意而增益其無疆之算而李顓輩致祝之誠豈不得哉故諾其請而為之序壽蔡太夫人序吾友蔡君道卿督學嶺南奉其母太夫人以往道卿出與諸生言學以道德性命之微要奬掖髦碩羣趨朋至教法昌行而光華宣暢有先生之尊入侍髙堂侯承起居進退唯諾掬溜播灑躬勞事而執細物屬然若不及有子弟之勤諸生之學於道卿者悅其事親之實而信其所以為言太夫人之居於彼也樂其所以教人而安其所以事我心彌康而體彌平貌之癯者日以益腴星星之髮為之改黑不徒忘其非土之思而亦油然不知年數之邁也是嵗道卿遷浙江參政得以便道過家某以通家子入謁覩太夫人之貌之腴而髮之反黑也問道卿之所以為養者蓋藥洲之館督學憲臣所居在焉池有可釣之鯈鱅原有可擷之筍藿倚樊之椒負墻之桂糅以為芳辛而調其滑鮮於是乎取之非有烹羔擊豕炮鱉膾鯉備極珍滋之饗也誦先王之書略舉其義以訓其文時人之言語近世之詠歌雜陳間諷以娛於耳而鏗鍧哇咬之聲音無有也竒石嘉卉列於館之左右御而觀之指其名而辨其品談其所從出與所由致之以為目玩而蹈舞妖姣之采色無有也然而太夫人之神日以益凝而目視加明耳聽加聰口腹日以益充朝夕之食飲加進也余退而告夫與道卿友者相與講太夫人之賢蓋其所以安樂其耳目口腹者逺去世情而獨出乎至性天常之間為能有以樂其子之樂也是月十四日為太夫人誕辰於是謀所以為太夫人壽者莫不欲推剝肥牽網擉鮮裸飪薌胹膏撰五味之珍以為饌撞鐘擊鼓絃瓠桐篠繁單和會進以窈窕蹈奏應節備音聲采色之美以為樂以順適太夫人之口腹耳目而康其心以介無疆之算則又相與言曰太夫人所以安其子之養忘其年數而聰明疆溢四體和平其效如此其必有不極味而珍不備聲色而樂而可以為太夫人壽者乃來委某以文是亦道卿所以為養之志也楊母劉太安人七十壽序楊文貞公以相業名三朝其世澤家法之貽于後逺矣贈考功梨山教授公承之以詩書禮義飭己誨人功業名位雖祖孫不侔而家法之傳不替有加焉甚哉佐其內者之難為賢也而劉太安人實配梨山公非獨志喻行偶相勉以勩也且有以輔其所不及而效諫救於閫奧𡨕渺之中猗與賢哉由其所自出論之劉氏世以科第為邑舊閥而鐵心僉憲公之子七星先生安人之父也鐵心風節髙一時七星舉神童弱冠為鄉進士有文行世故安人自幼至長耳目視聽非古圖史針訓不接於見聞也淑性慧資得於天賦而循約於姆方漸習於保誨非一日之積矣宜其嬪於名門而能以德與行蚤嵗為賢婦中年為令妻今老矣巋然以慈教為嚴母而壼範內則具善完懿藹著休稱昭在邦族發聞於海內縉紳士大夫之間莫不知有泰和楊母太安人之賢矣是嵗太安人年七十五月十九日誕辰其子武東君載鳴捧量移之檄過家為太安人壽邵武太守羅兩華公遣使至清源山中屬某為文閩地遐陋某又賤廢然亦知有太安人者也世之所謂能事其親者莫不以外物之厚為可悅而親之所以安其子亦以厚外物之享為吾樂惟其親之所安在此則子之所以為事者徒足於嗜欲而觭缺于義理亦為有以宜親之心而可以謂之世俗之孝若其子之好禮向道思以義理為悅者而非親心之所冝則雖免於流俗之譏而未足以致門內之和猶為之不能事其親云爾惟親之與子相喻於義理為所處之盛而實為人世所遭之難蓋關雎雞鳴之叶不歌於房中而女教放失婦人之喻義理者尤為不可得見如太安人之為母所以教武東君於為士時已一出於立身講學之大端至其從之官舍在登州則勉以􅖤刑以貧為有得在京師則勉以進賢退不肖不以貶斥為辱夫世之所謂外物之美者可知已而太安人以貧為得以失官為榮蓋知夫謀於利者必怍於義固於權者必屈於識故其所安者在此而不在彼也武東君為子則誠知所以為事者矣使太安人之心之所安不在乎此亦何以樂其志意康其居起而為娛老介壽之侑哉君之所遭可謂盛矣此歸拜髙堂瞻覲慈顏融融泄泄之氣溢於眉目孫曽羣從繞膝鄉人子弟在阼序之間芳旨陳前衎以鐘鼓出豫文為太安人頌宜莞爾頷之於以佐君觴祝之餘歡亦邵武太守千里之情也壽易太夫人九十序易太夫人以令善懋閫儀為鄉人大母於今年九十矣太夫人長子愧虛先生德學為一時所宗事太夫人孝謹棄官歸養婆娑泉石之間以人倫為悅先生行年七十蒼眉皓鬢可以杖於國中矣其奉庭闈之歡起居扶持嚴於為子弟時率二弟時興時學朝夕謀所以安太夫人者往往執其勞役治其細物以躬自勤為至樂不使弟代之也太夫人年彌髙體彌健視聽聰明加於昔時室中之事有當自為不肯以屬卑幼其神思記注而儀節該悉有女婦所不能者先生出為鄉人父而入有子弟之樂孝謹家法名於郡中先生之友多鄉之賢達長者並有父之望於鄉以其與先生友皆母事太夫人而鄉之才子弟多以父事先生者又事太夫人如大母一時孝弟之風行於家達於鄉由太夫人之髙年備福其風大著而久洽方先王盛時養老之政行國中無見遺之年非獨鄉之人能老其鄉之老而其家子弟皆無不自老其老後世政失俗微寧獨老者不得為鄉人所事而已雖其子弟有不能老其家之老者矣而太夫人所享如此蓋政俗微失之際獨於易氏之門追存治古之風豈不盛哉然古之子弟知自老其老要其政有以篤之使隆觀之使厚而未必其子之果能賢也彼老於其子弟之老者雖得其所養而未必其氣昌神裕康疆逢吉而無患也太夫人年髙而體健猶能執女婦之所治陶然宴豫於閨闥尊受子姓撰具侍娛之安而先生又賢也是其所享有治古之老不能兼得而備有者豈不為尤盛哉某在諸子弟中最為不才而以父事先生之日久當太夫人九十行年十二月二日誕辰之慶既從鄉之長者旅進百拜以祝太夫人無疆之算後見之於文以發明其盛諸長者以某之言為然遂書以為祝壽序丘中丞夫人六十壽序豫于集齋仕學之輩皆後而公辱與之為友公之政業學術髙朗膚敏隨施輒效所至有述而其竒節之所震曜醇行之所優悉動乎朝著敦於家族躬人之所不能豫心服且愧焉公間謂豫曰恆言學弛於內嬿仕敗於室謫豫所以得有立而無歉於為人者有內友之助也豫心識之時竊有以考質訪驗之知公所為豫語其內者信也久之遂託為婚姻則家人脯修之問常相及而公之夫人之賢知之備矣凡女婦有助於其夫者必其夫之才有不足以公之英偉傑特在交遊寮寀鮮有能佐下風而獨有得於夫人可謂難矣凡能助夫者其恩禮所及施於宗族鄉黨則有之而朝廷之謨議四方之經營非婦人才智所及也夫人事英偉傑特之君子而施於朝廷之上四方之廣厥有助焉又可謂難矣以公之言與豫之所知則夫人之賢有不可以事舉而名稱要為行誼才智克對君子而與之並賢歟故公之存天下之人慕聲光而效趨走可謂甚盛夫人之志不為之泰其御家防身斬然有常也及公不存孰不謂繁華盡去門户改觀而夫人之志不為之餒所以御家防身如一日公之遺光流風猶存四方賢者時時寓候起居宗族鄉黨嚴夫人之繩捨而誦夫人之惠恤不異於公之存也其所長有助於公之身而持公之身後至使光輝不磨風烈無替其難又有甚焉雖公之賢所賴於內友信有加而無疆與是嵗嘉靖戊午七月八日為夫人設帨初度之辰於是年六十矣其子維禎維栻欲獻一觴為髙堂介壽宗族鄉黨之賢而知夫人與其嚴且誦者皆欲以為夫人祝二子跽於堂下以請夫人曰中丞公而存吾猶不欲侈然受子之獻况公之不存乎兒子猶不欲受況受宗族鄉黨之長幼尊卑之祝乎二子不得命皇皇以告豫謀其宜否曰如先生以為宜將固以請豫謂子之事親道固大矣知年而喜斯情之至也喜而欲有獻獻而以為祝禮之所由生也是稱壽亦人子之孝也思中丞公之故而拒子之請夫人所以教孝也順其子之情使展其一事之孝而因圖所以思中丞公之大者亦所以教孝也二子其行之夫人殆將許焉若夫宗族鄉黨之祝則固非子之所能致而亦非夫人之所得拒者又何謀焉二子再以請而後得命於是復以告豫曰因先生之謀而後得請敢乞言於先生以為壽吾母將且大悅而安我之所獻矣豫不得辭而鄉之士南宫之彥庠序之秀偕以言見屬遂見於序李母金氏七十壽序西方之法豈獨可行於其國而已充其清淨無欲之真心慈悲善救之本性貫通乎日用應感之間則有夫婦母子之倫亦足以默存其教而積善召祥之福動於人事孚乎物理而家庭翕聚之樂服食滋殖之政何啻天堂陟生繞以香花之奉飾以珍寶之供之為芳美華貴也哉西方之聖莫盛於瞿曇而天方以西之域身毒天竺之派别自有其法蓋出於瞿曇而少異其清淨慈悲主於修治惡業以精進善慧則一而已亦一方之聖也入中國已非一日雖傳之者無如佛氏之徒之盛然佛氏之徒已偽售飾習而為茲方聖人之教者猶不逺其祖持法守戒顧嚴於為佛氏者安得以其異於吾儒而盡訾棄之耶金夫人者庠生李君一林約甫之母也幼習兹方之教知以不貪不殺為戒而天性所稟最有善根獨能守其戒不壞故其在家為女稱孝及婦于李翁事舅姑能敬而敏佐夫子以勤儉起其家而以懿惠接姻黨懷藏獲藹然有賢名於李氏之門翁雖棄夫人以去夫人能持其家授約甫君以尺度謹禮而惇誼稱鄉善士李氏卓為泉之名家約甫尤念母氏之恩思所以盡罔極之報孝養偹至夫人髙年彌康享其子之養可以千百嵗如一日可謂福矣一念清淨真體完明百行之吉皆由是出以之致諸福之物如持劵取負非僥幸得之也西方之法何嘗無助於人倫世教顧欲區區誦守固陋以非正法擯之盍觀於夫人之所處而有寤乎某舅氏李小坡兄弟與吾弟性中皆遊於約甫君最厚而嘗拜夫人於堂也夫人是嵗七十九月二十二日其誕辰也故集合姻戚友朋以是日登堂舉一觴祝夫人之壽而請賀言於豫因書以授之使為軸張於髙堂以助約甫君悅親之歡而愧於言之不文也賀黃母蔣氏壽序是嵗嘉靖乙卯冬十月八日門人黃君大本之母蔣設悅之辰也凡與黃君友者皆學問之士相與謀所以為蔣母壽者而來請文其所為説曰凡族戚鄉黨之為人父母壽者其所以為儀筐篚之將玄黃黼黻之煌煌也蔣母自失其所天而育大本之孤以自存也疏衣菲裳屏去華麗靡紛之飾拮據卒瘏朝夕不懈所以被其躬者取足禦寒而已是不足為蔣母將也其所以為飲食則牢醴肴核肥鮮甘旨充於品爼樽籩之奉者也蔣母專居自約茹淡食糲㸑無炊精而閣不庋肉非力不能具味也將以苦其口腹以明嘗蘖丸膽之志故處人之所不能堪而常安是飲食之美不足以為奉矣其所以為歌舞則姣曼嫫姝彰采施色繁節竒態以和桐篠鐘缶之聲為可娛也蔣母言不聞於屏外而視不踰閾憂思之篤不忘平心終其身聞樂未嘗樂而所以防間其耳目使不邇於非禮者蓋未嘗有樂之及聞也是尤不足以為娛矣故凡世之所以為壽而可以盡其情物者皆不足為蔣母悅惟得君子之言以張之其可哉余謂是則可矣然蔣母之年未六十也其壽未涯也稍需其可請者則又曰蔣母之節完且著矣國家旌表之制必年踰五十而後與之謂夫貞以立節者年至於是則無邪之行底終而有恆之志可信矣蔣母之節宜旌五十之期已踰蔣母獨自斂抑不欲其子求聞之有司黃君恬然內修竭志於善養忘他慕而輕外物以奉母之教而力為善也不以聞之有司而有司亦莫之聞也故吾黨將以同然羣志登堂稱壽代有司修問之文又得一言以明之視臺臣核疏之華未知孰為輕重也余謂是吾黨之責也遂見於文以副諸君今日之請而且以為他日使有司聞之以舉制令旌表之端云奉賀蔡太夫人七十壽序中丞蔡可泉公以留院重臣專制長江備守戎政其經略敉定周於天塹洪流之上下而倉卒禦遏島夷之狂謀兼有海上之勞言者不察以為無功天子為解職事以待推核將以明中丞之功而使言者自愧其失也公欣然還里曰克亷念母久矣茲得暫解以歸覲斯固上之大恩亦適得言者之助也太夫人於公之歸喜動顔色謂其子曰而不自言其功則不直言功則非遜與其為直也寧遜而其安意侍我世豈終而舍哉公侍太夫人朝夕左右甚適治其魚菽醪酏以進而退饜其餃甘於祿食鐘鼎之豐抱衽請趾授几問向扶持居起以筋力為恭均子弟之勤而執臧獲之細追視建牙設纛乘輿從徒顧為佚也是嵗四月十四日太夫人誕辰行年七十矣當庚戌嵗太夫人年六十有六公以參知浙江行省過家奉觴上壽今閲四嵗名位之華事業之茂光顯於前矣而太夫人齒髮堅好耳目聰明不少減於其舊是日益盛上壽之儀母慈子孝其樂融泄鄊士大夫胄子之彥庠序襟佩之英與夫閭里父老子弟旄倪長少之羣莫不為公稱慶縟文繁節侑以筐篚奏以鼓鐘期以為太夫人歡而佐中丞頌禱之忱煌煌如也衎衎如也人子之欲歡其親力足以自竭而誼足以得人者近世士大夫隨其分位所致然未有如公之盛者也夫不以解職為戚而以得侍其親為悅可謂篤天性而忘外物固公之所至而猶人之所能也能安其子之志而樂其養不以功之不白為憾且教之以勿自言功太夫人之識於是乎加人數等矣其受縉紳章縫父老子弟之祝宜也人子之賢且貴者思以積庸纍勤而介祜祉增年算於其親非惟其修飭行義踐致休顯之為可樂至其智慮殫於所職而勞不敘民物被其兼澤而恩無稱尤為神之所聽而可以責酬於勿莫不見之中公功在海上鬱而不白復躬為含晦退而自厚以樂於天性之間所以介太夫人之福而增遐算於無窮於理不為誣也歐君德深洪君世珍遊於公最雅實倡諸胄子登堂具觴為夫人壽來請文慎中於太夫人通家子也樂附諸君之後敬以是為祝南澗徐老先生官邸就養序仕不主乎己而主乎親此天性之至之所能也養不主乎子而主乎己非盛德之至不能也士之仕也秩祿之寵存乎目前而名勢之榮誘於他日不以其身之便賴其官而惟以得事其親為悅者吾嘗謂不可見其人而於今見之開化徐君是也徐君奉其父南澗先生以令甌寧不知有人民社稷之貴而樂於得事其親可謂篤於天性行人之所難矣而先生之所以樂其子之養者如何也先生心撫乎四海之內而欲足於一區之間慮貫乎百世之後而功密於一息之頃足之所蹈目之所及無非斯土固不知太末之為吾鄊建州之為他國又不知甌寧之為邑治其子之為官於斯而吾之為其子奉以來也邸舍之深嚴不異乎逆旅郵館之閲宿郛郭之浩穰不異乎巖穴溪谷之幽栖蓋其所自樂者充於中而不係乎外之物故士民之欲見者未嘗不可得見又不可得而妄見也其見之也非以洽流俗之歡其不可妄見也亦非以示形迹之介蓋有道存焉故士民之加敬愛於先生其知之者以為信己之守其不知者以為全子之名先生之聞之也啞然以笑謂不知者之度我固深而知者之譽我亦疏焉而不精也養不主乎子而主乎己其道如是盛德之至如先生可以為天下之父矣先生少而勤行壯而向道踰疆艾而益進垂老安焉而不倦年幾九十精神盈溢氣舒而體愈吾知其不在於鼎簋匕筯之奉之養矣甌寧君志業敏茂功名將益顯秩祿之來山增川至而不可禦是皆不足以發先生之一盼其所主乎己者閲百嵗而如旦夜也某生晚而地逺不及見先生諸生之從豫遊者近出甌寧君門下為道其所以然故序以為先生贈以寓致區區仰慕之私云范母易氏貞節序昔夏侯令女不忍曺文叔之死誓以節自終為曹氏婦而迫於父母至於割截鬒髮刖劓耳鼻然後免乎見奪嗟夫彼其愛不出於烈行令名而苟以保家室之歡為不失生子者之大願如是而為人父母兄弟固亦鄙矣獨怪令女之節其英爽足以激發來世而不能喻當時之親其悃懇足以悲感仇懟而不見信同體之人豈其慷慨迫臆獨立不悶有以自持而誠心精意伏潛著隱尚有所未至歟夫髮斷耳刖形已毁矣彼區區之愛其女者猶欲修其已毁之形而飭之取其必守之節而奪之豈非其無苟他之志而猶有可惑之容耶故使父母疑其容而兼失其心令女亦知以容自纍也故其計出於殘膚傷體而後得免嗚呼可以為難矣然其志靡他而容至於召疑是其所為苟難者亦所以為未至也令女之事余每以是悲之乃今得見節婦易氏益因以有感云始易氏之歸於范氏而其夫君錫早死又無子以為養也其舅姑固以為不能終為范氏婦欲再圖其所居易氏賦柏舟之詩以死自誓其兄易愧虛先生與其夫弟范玉泉君者友也先生以責其友范君以諫其父而易氏之志得以不奪無殘膚傷體之痛而志喻於內外之親孝養慈育偹有令善余是以知易氏之節非徒慷慨迫臆足以自持而精意誠心獨有至者蓋其所守與令女同而其所得則令女有不及也嗟乎閨閣惟第潛移默感其欷歔慨嘆有出乎情有循乎禮義其劈摽哭泣有動於欲有激於倫常其然其否隙露端引如鼓室中之鐘聲音不能匿笑貌不能藏兄不得以苟信其弟母不得以苟信其子而舅姑顧得以苟信其婦哉後世之士好以苟難為賢震異尚刻之行駭於聽而怵於視易至於冇述精誠篤至窮微徹幽非知德者不能辨也故豫序易氏之節與令女論而著之使世之士知其志靡他不愧於令女而其行之難者乃在此而不在彼也裴母周氏貞節序古載籍可見其辨於婦人女子之事莫詩詳矣事之大者宜莫如節禮所謂一醮不改名之曰信是為婦德而所以事人者也今考其詩以節著者共薑一人而已詩之所載自芼蘋湘藻求桑采蕨抱衾宜鴈雜佩畜旨敬一職而勤細事既皆録於師氏仲尼存之以為教不宜詳小而顧略於大豈詩之所載皆婦人之能言者其以節自全者或偶不能言師氏無從采而仲尼亦不得而存之歟至於春秋所書終始全節不失婦道者惟紀伯姬又何其靳也豈其書法與詩不同閭閻井邑民庶之事不從於赴告雖欲書之而有不得歟然諸侯公卿夫人有家國之佐範於禮而約於訓尤宜有以自全而其可書之靳如此况於民庶之末哉而彼生於教民俗刑之時其有節與敬職而勤事者宜無不能言又不宜其偶不能言者即為有節也由是以推而節之難全也益可見矣以彼世之盛若此而世之後者可知矣中國若此而地之逺者又可知矣吾所為序者始興裴母周氏蓋婦人之有節者也觀其不二其心於生死存亡之變而確然以禮自防皎白完善終免於凌暴點汙之患力撫其子督使有立門户起而宗祊延亦其才足以輔其心而能然歟以時之今地之逺而其人若此豈不尤為難哉吾蓋有感矣夫詩之於民庶得詳矣其有節而可載者以不能言而不與存春秋所書不必其能為言也又以民庶之賤而不得列則彼婦人之有節而幸生於詩書春秋之時猶有不遇之恨也而仲尼之於是書其於欲搜著內美以顯垂隂教之意其亦不能無憾矣乎吾之於周氏其敢謂使之無不遇哉然而闡發幽側以輔翼世教固將學於仲尼者也方求夫事之可載者使見於文安得以其生之微而廢之吾之為此序其亦竊有取乎仲尼之旨而周氏之果不為不遇也節婦何氏敦奬序凡有淑美卓傑之迹而著以為世勸其明有衆人之論其嚴有君子之書而其榮有王者之制王者之制與衆人之論有得有失每為勝負而君子者常持所書以低昻於其間是非出乎衆人豫奪作於王者美刺之權則君子之所有事也蓋有苟獲王者之制而違衆人之論則君子刺之以救衆人之所負雖其苟獲有不為榮者焉蓋有同得乎衆人之論而不蒙王者之制則君子美之以助衆人之所勝雖其不蒙有不為不榮者焉其論是其制奪其論非其制豫是論之公而制之私也故君子得以美其所奪而刺其所豫有制之公而亦不得豫其所是焉則君子蓋嘆之乃從而美之如吾友王思順之母何氏豈非吾之所嘆者乎婦有不幸其夫死而不忍死其夫育其遺孤養其父母完其身以歸見死者而心不怍是淑美之德而卓傑之行也國家有旌節之典載在令制以待四方之以其事來請而豫之然其制令曰必年踰五十王母之節皎然白著而年未五十以卒吏於是土者莫不聞其節其為是土之民者莫不以王母之節聞而亦莫之請也夫有淑德卓行足為世勸而不得著以勸於世者制不設於上而論不行於下也上無其制下之論誠行不得強而為之下無其論上之制誠設烏乎知而取之旌節之典制之所載也王母之節論之所同與也然以年不及令而不得請豈非制之公而衆論之是亦有不得豫之者乎此君子之所為嘆而郡侯邑大夫所為致禮而敦奬也君子之書於是乎不可不行於其間矣王者之制有可以化裁而衆人之論必至於磨滅化裁者不可知而磨滅者可坐而計其不化裁乎而論存也固可以勸於世其化裁乎而論不存也則世之欲勸者尤病之如是而君子之書蓋不可以已矣豫非敢謂君子而王母之節宜著於世以為勸衆人之論有時而泯泯無聞辭乎君子之名使淑德卓行不著而世無所勸則亦吾黨之罪焉故為之書曰何氏晉江人生十七而嫁為鄉進士王忠先生妻嫁七年而先生歿其子天錫君尚在腹中何氏知以大義自斷不為迫抑推決急於一殉以絶先生後而待天錫之生含哀致毁以禮自防無一發齒舉足之過以敗其志先生復生質之不慚其言動有法事舅姑孝敬愛子能訓之以義具有令德而其節尤著鄉人莫不稱為王節婦云贈韋孝子序寡婦之子非有見焉弗與為友果其以迹為嫌如言禮家所云耶必不然也由王政所施之義推之則寡者方與孤獨而鰥者先在賑收救助之數由君子之心行之則廣其同體之愛以急無告為之周旋維護其所生宜加隆於不孤之子也今乃以其母之無夫也而嫌焉而不敢友其未有見之子豈先王設教之旨哉夫嫌之為義有存於禮者謹男女之别明內外授受之儀蓋自有節而豈以寡者之家為不可入也且人子之能有見者何從修哉必有師友之益以資開發輔植立而後可以有見於世也今必俟其見而後友之則為子於寡母之懷者非生而有知凡待教而善須友而有成者終不得有友也其果近於人情哉先王之教未嘗不欲人之子皆有成而尤望於寡者之子之至蓋其失嚴父之訓無所視稟而易惰非峻為之警則無以發其志而以仁孝之情求之則其母子相依之間上靡有怙外何所從其哀思於煢疚勤瘁於囏厄宜痛有以懲毖其精神剋艾其意氣而感發於修為視有怙之子當百倍焉顧不能勇於自立而藐無善狀能聲可稱於人斯亦不足友也已其言蓋曰為寡母之子而不能自力以有聞則君子之所棄矣斯義也固若責之過偹其為深憫重恤乎斯人之子顧為獨至也此設教之旨也吾持是以論於今尤不敢忽乎斯人而於鄉獨得韋君君之母早寡專一室以幽居偹嘗百瘁貞心匪石彌堅而不可轉君感母之苦也矢必為君子一跬步一發語而不敢忘母朝夕乎左右之養而視聽於形聲之微蓋無可違之志亦靡有不用之勞矣宗族鄉黨皆以君為孝子不間於彼此之口觀君所以謹四體之保至於夙興夜寐不徑不遊凜乎臨淵履氷之懼也思檢其言行之過則不敢慢惡於人嚴輿臺如賔煦稚狂若長者而傲言侮行不敢出於口而設於躬也斯亦可謂自力而能以善聞者矣吾方敬而事之而奚友之足云抑又有感矣古之所謂見者皆必有顯名盛位焉蓋士修於家君必求之求則無不得者而命數及之故得以兼名位而稱有見也後世忽士而不求閭巷隱約自修有老死於簷戶奧漏之下而已故以君之自力克敦天地之經以立百行之本而不免為鄉里窮人亦其所處之時然也時之既降則徒知顯名盛位之為見而見之在於自修力為善者有莫知之矣故豫特著之文以為君贈使人知古之設禮者所望於寡者之子之至其義如此又以知所謂見者其實不在彼而在此也送葉生士直還吳序古者人子之養其親也其節至繁而其事至勞寢起坐袵溫凊向趾之適其宜紛帨刀礪鐫燧針管槃之偹其用肉魚棗栗桃柤脫作新撰膽鑽之辨其治饘酏酒醴芼羮燂湯潘浙免莞脂憜之悉其物其朝夕之勤則蚤作晏息而不得休其視聽之專一則無聲無形而耳目將營之其亦為繁且勞矣又當從事於學出與其鄉之俊選相羣而樂以嵗時朝其長老鄉大夫習其射饗燕食以知上功尊齒之教詩書禮樂之術順四時而歌誦蹈舞之其所遊居進退不於孰序則於學不在國中則在郊既入而為其繁節勞事以左右於父母之養出而從事於學其趨術博而用功多又如此其為養也非獨少時然也至於壯而已老而孝敬不敢衰其為學也非獨其長時然也自其幼學就傅而居宿已離於幃闥宜乎其不能兩得而兼至也然古之制無越鄉之業其子弟未嘗離父兄之側其父兄之貴而命於朝者亦為仕於其鄉耳子弟之孝而能養材而好學者入則悅其親出則敬其師而樂其朋其力足以兩得其情無有不至也今之為仕無在其鄉者父兄苟不仕而使子弟學焉則有躡負笈裹糧而馳四方常有不得養其父母之嘆其仕而子弟從之則往往視其仕國之人如異域之不可以目接而面覯也深居簡出匿崇嚴而守空虛雖左右之養得矣而常苦於學之難兼彼其學而廢養者固不養之責耳其養而不得兼於學者豈非時習之失拘曲之説勝而大公之道微耶余用是有慕於葉生矣葉生吳人也其尊翁素峰公始仕為泉州節推而生來省於郡邸公之為郡不以拘文曲法自蔽其刑既明其令既行則進邑士之聰明材敏有志於學者語之以禮樂之事道德之言士之聞其語雖感動興發大小異等然睹於至意而漸於大和莫不欣欣然如弟子之立於嚴師明傅之前而不知其為吏於吾土也公亦喜其教之著而人之從乃使其子出見鄉縉紳先生暇則與諸士遊談詩問禮考德正業不在乎術序黨庠之間而有藏修遊息之益亦可為兩得而兼至矣古人兩得之者以父兄之仕之在其鄉也葉生遊於他邦舉養與學而兼至焉信乎人之樂有賢父兄也哉公既命生以歸奉丘廟戒日將行矣諸士謀所以贈之而來請於豫夫生辭親而歸既息乎就養之勤無繁節勞事以役其形氣則於為學功宜益専他日德行成而聞名達泉之士將有望其聲光思從之遊而不可得若是雖不朝夕乎親之側其於為養也大矣生乎勉之哉送詩人沈青門序詩人之不偶者有性靈觸發之能而無物役拘糾之害此天民之佚樂者矣其視富貴之人宜如檻狙牢豕閔然於中而不足近名器寵數俗所謂尊華者皆瓦礫塗炭瑣屑而朽穢也然豫觀唐世詩人不偶者顧不以謁貴者為戒呈卷投軸左睨右矚幾幸一遇如秦關燕壁遊説之客結軫馳叩朝失於此而暮冀乎彼皇皇然其有所迫而不得休吾未見其能樂也其時公卿得以薦士節鎮得以辟官故不偶之詩人雖其失意於場屋而多僥幸於薦辟斯人也之與顯者遊固其詞藝矜美相為標致而藉援恃力之圖為不淺矣彼顯者皆有才學詞章名一時其吟詠風格非出不偶者下也顧能不愛屈己以成不偶者之名如張燕公之於孟浩然賀監之於李白栁子厚之於符載杜牧之於張仲吉殆不可勝舉以斯論之唐世詩人淪落江湖者未可為貴而諸顯者能成人之名其道有足尚矣近世風騷將絶江湖之上有能為詩歌視唐世難得何啻千百而一二也而士大夫取髙資都盛位蓋有不能為詩者以顯者所少在此而江湖之士難得又如彼相求之迹固當在此而不當在彼矣且此之與彼遊也無薦引之門無辟用之途彼亦無所藉恃於此而倡和往反之間果相矜於藝而非有皇皇之冀矣江湖淪落之人誠可大貴於今之時而士大夫往往不知所以成其名以自附於唐之顯者豈不過哉錢塘青門山人沈仕江湖之能詩者也自壯而強行遊四方多與富貴之人逰其能屈己以成青門之名宜必有之吾未之及知而知青門無所藉恃於諸顯者以其來遊閩中之迹推見之也青門入閩枲袍布衾從一僮黧面而微跛踽踽然憊也唐之以詩謁顯者一見則欲廢其半餉之享輟其一姬之資如執劵責負傲然必得何至如青門之憊也豫用是知今之顯者之所以遇江湖淪落之人矣豫間居寂寞絶意當世好事之徒顧辱青門枉與之遊豫之不能有益於青門可知矣獨不難屈己以為之重而又非有文章之名也雖俯躬匍匐胡能增昻青門之錙銖為青門計當且改圖庶幾有偶也青門顧謂豫曰斯行遇公歸亦將終隱矣不復有望於餘人也斯言其為謾邪其非謾也則青門之踽踽南行而窮宜矣古有得人一雙之璧百鎰之金盼若毫毛惟以一言之知為重此豪士佳公子之所為非所以施之今也青門行四方受雙璧百鎰於人宜不少矣今乃持嶺外迂廢無用之人一紙之序以歸曰可以終隱也青門雖自不為謾世其不有以為謾者乎是可笑也周蓮坡公榮封序迹混而人殊庸者之所忽而智者之所明也今夫材不試於事而虛有其職之號食不及其祿而遙有其秩之寵上之人無所擇而畀之以為是其子若孫所得之職之秩而還以與其祖父無所費吾之器與名而可以為其人之榮也下之人不必量而受之以為是吾之子若孫所得之職之秩而推以及吾之為祖父者非有待於賢且能而可以安享乎上之賜也是今之所謂封官者也且夫不試於事而不食其祿者豈必皆無能之人哉蓋有懷藏道德重其身而不出遺逸於世而不憫者矣亦有挾長負竒屢姦於時而不一遇齟齬坎􅀈無所發憤而斂志以窮者矣重其身者無所慕於外非虛職遙秩所得而榮之也斂志以窮者志在於效長見竒而不肯以虛職遙秩自樂為榮者也然而上之人以是畀之則不得辭故有召之而不至官之而不屈而無有封之而不受者是懷藏道德與挾長負竒之人苟有其子若孫所得職秩推以及之則無異於無能之人之所蒙者也此非所謂其迹混而非常人之所能知者耶吳郡崑山周蓮坡公其子大理君為興化知府天子加其久勞於外善於持身謹法以仁其民也優以褒典授公以其子官以慰其子之勤而且以為寵焉於是公亦為興化府知府尊於家公之夫人晏氏尊為恭人鄉人無不為公與夫人榮者公方淡乎其深藏沖乎其善下守其履素之原而忘夫外來之益重圭纍組之華其躬曽不加於草衣芰裳之陋雕轂文茵之愈其體不以易乎穴居石臥之顓而漠然不知名寵之貴錫貺之羡也豈非其志欲以有為不以虛得其職秩為榮而其自樂之道有不得而榮之者耶雖然所謂有道者不敢過於自肆而傲上之賜有志者善於繼之有人而不必其身之自為公烏得無以為榮乎哉公之所以為榮者如是是所以為殊於人也興化君之僚郡丞吳君節推章君嚴事其長之賢本其所自而幸其所蒙之盛也欲有以贈公而余為之序如此公其不以余為庸人之知哉其以余之言謂有以明之哉送間寂海上人序佛氏見距於儒非以其好廣大宫室珍美服食聚不耕之身而為放恣如近世所名學佛之徒也殫力於性地會精於心源謂之髙大微眇而毫髮千里之間此其所以為吾儒距者也近世名徒於佛者何如哉惟其宫室服食之知而隈下惰窳無復小慧他能以為放恣矣士之名儒者猶睢雎盱盱詞費氣盛以距佛為功是佛之得距於儒既非其所以取距而儒之力距乎佛尤失其所以為距矣不亦謬而可笑哉其間固有屏絶聲色禁耳目之邪淡節臭味裁口腹之欲約身勞體以自苦刻居無尋丈之安而行有山跋谷涉之勤屬屬然奉其教之所謂戒者以求别於其徒士者且以為世所難得交禮而多譽之彼亦以此自賢沾然內勝謂足以抗吾道而存其教如吾所見漳州開元間寂上人智海殆庶幾其人矣佛之為言固存於其經以大小分教乘而明聖賢之差别則守戒不失蹈人之所極難猶不足語於下乘之數蓋自東土所傳離祖而為宗者未可望其門墻視彼迦葉以下二十七人一鐙之照西土相續如其經所稱云者又未知羊牛之車相去如何耳充吾儒之所距則摩竭掩室片詞俱泯之旨乃足以深攻細折而與之較同異於毫髮之間如上人所守非獨其教之末亦吾道之所不足致距也上人於佛氏之經該誦而精講良亦勤且博矣其言固在苟求之而思思之而得究其所主將必有以抗吾道而特存吾方距之不暇而暇與之逰哉上人勉之然吾亦懼夫所以自為者不至他日復見上人無所操以為息邪放淫之本力不足以有距而卒為上人之道所抗也吾與上人交當勉之送章心壺序豫間居抱疾凡吾土之名能醫與以醫行過吾土豫未嘗不致而見之各售其方藥餌雜投徒以豫腹為試方之壑童子疲於取火束火之役蠁莙之臭達於墻戶查滓之棄餘積若小丘而豫疾如故醫者方且援證古經陳説素難上言天和隂陽六氣之宜下言血脈虛實寒暖五臟九竅之變惟恐不終售其方而僥幸萬一冀其試之獲中也豫既困於藥稍謝諸醫疏食飲水聊以永日自是雖不敢倦於致醫而良以藥為戒矣一日客有言餘姚章心壺之醫者因致而與之談未即叩其術非不欲叩也蓋將齋心澡慮修其誠心以待他日再見而後請焉又將節宣起居從容旬日庶幾脈安於體使之一診而可得其要也章君坐久鑑豫之色遽言曰公之疾將愈矣可以勿藥矣吾方非不良不復為公出矣繼此數相見縱談當世之故與其平生逰寓風土人情之美惡其於該涉藝能辨訂器物形證而品别之往往有可聽者未嘗為豫言六氣五臟九竅如他醫所云云也豫疾亦日日有間君雖未嘗引以為己功察其意似隂以豫疾間自負也豈其使豫一見而有齋澡修誠之心與其數見而泛及傍綜世故形品之談皆攻療輔燮之所存而所謂藥物者不在草木金石之性味治法者不在烹煎㕮咀之劑量耶於乎君之醫果有以異於豫往時之所致者雖日與君處不厭也而君揖豫將歸矣豫疾果日益有間方謀裹糧逺遊訪良友於吳越之間倘與君遇尚當叩君為豫二鑑其色究斯疾之根本伏藏消長分數如何也遵巖集卷十一

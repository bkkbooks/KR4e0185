body:
  text: 遵巖集巻十八明王慎中撰祭文祭汪石潭公文代九卿作維公晬是淑精東南之美在類别丰居羣殊趾驟曠道林沿藝水既涉其津亦亢其坻鏡流趨風傾彼庶士稽訓先民效思行止望達承塵希景耀晷厲節懐瑜茂猷祕􅉅為時律魁禔禔其履蹈榮惟恭㒺有攸訾孰撓孰澄不濁不湜惠心鬯物沖質㑹㫖豁喻披雲淳同飲醴艮胟飭躬奉以終始在昔登明遂載厥聲有萃斯彦莫之與京迺躡清華于帝之庭擢芳景福振翼承明辟彼皇鳥肅肅斯征在虞翻飛于周雝鳴何食非竹何飲非霙衆羽競鶩枳集笯登翩翩五采覽輝後興武皇之季艱我天造大辰䁆精熒惑習耀藹藹曼著淈淫揚澆公於其時不戁不恌龢奏濡行約軌矩蹈迨其暨矣先笑後咷獨公完譽民之攸效黃圖闗啟光宅昌暉帝命惟嘉為璋為珪售經黼座珥管彤幃太宰作貳珩芾逮輝贊禆廟謨上有道揆體鑒摛朗運斤而揮迺進秩宗士志共熙媚于神人禋祓具徽大議在廷岳立山巍禍苟則免福回可㡬公擇其間弗羡弗威英英鳯舉㝠㝠鴻飛如彼迅矢決自張機禠組一朝其甘若飴十畝之間桂枝連踡巫咸所隣左右洪韓班豹押旟文螭扈閔俯藻綠渚仰䕃陽巒樹之香草芳與風宣鶴鳴九皋其音戾天甿之望之如潦赴川甿望維何云于東山庶曰無疚邦有人焉胡天弗弔降此鞠殃古亦有言人之云亡士殞龜策國菑棟梁百身莫贖羣慮惝慌道信運屈用厄名張烏知他日孰存孰亡論歸于世魂返于鄉緘詞告哀昭鑒不爽祭王少山尊翁封君文庚寅八月之望王友志達以書來訃曰不弔孤遘戾於天降割於予先人嬛嬛在疚痛何可言年家子某迺瓣香清酧南望伸哀遂為文告于可蘭封君老先生之靈曰嗚呼惟公明明懿誼先民之舊怡心率物毖事肇基惇友恤匱展旅周㡬維其德矣亦孔之遺亦既有之愛而知勞造之無斁敇以不佻鴻飛憲署鸞峙民曹維其教矣亦孔之昭約已違辰安貞肥遯擷蘅掔莽桂芬蘭紉賁于丘園不競不震維其哲矣亦孔之順身之不顯光被昌暉帝命載錫寵誥相輝有峩其冠有斐其衣維其貺矣伊教之綏軒車結駟髙門有伉繄蘭繄玉楚楚翔翔既庶且碩曰裕而康維其嘏矣伊德之祥明眸𤣥鬒葆光頥精日養日恬攸于攸寧作賓于鄉為鄉之刑維其考矣伊哲之承嗚呼惟公敦時令美以迓繁禧宜熾而臧篤右命之弗圖弗慮迺喪迺悲聞訃思赴撫義衷欷蠲告斯將昭格不遲祭謝汝湖侍郎乃堂文代胡可泉作嗚呼夫人世多夫婦乃生乃死人莫知之滅没帷笫美惟夫人榮哀備矣自昔考祥曰視其履閾中之修聞乎邦里如斯美報獲匪云侈蚤喪所天稱未亡人弔形依景有此寡身逝者如作斯言可申文正惟兄方念宗祀因心則友弗子其子厥子之賢為今學士令德克孝謂夫人母崇以嘉名介之繁祉豈初不育乃報之以某辱交學士館僚伊雅生乎可拜沒哭禮也椒藻維馨敢薦于野祭翟都憲乃堂文繄碩人之毓質兮夙秉懿于中閨閑保氏之勗育兮婉姆訓之所詒厥相攸既獲樂兮偶令德而作儀象㡬望於易爻兮媲樛木於周詩介和祉以發祥兮篤生此岐嶷鳯振輝以嗚岡兮驥驤首而騁逵問亹亹而宣逮兮陟崇階之巍巍祿及養而色愉兮鼎七九以前施匪㫖甘之足娯兮又懐之以嘉辭口若一以播美兮曰有母以成之齊湘夏之願祝兮指西王母以為期胡大命之有極兮考厥終而受遺靡朝夕以扶䕶兮魂不害而東歸洞庭波而起風兮天吳矯而扈惟厯襄鄧之脩路兮人罷市而弔祠備哀榮於生死兮信純嘏而曷悲祭侍御李寓山乃堂文丁酉十一月十八日吳郡李母太夫人之訃至山東其子侍御寓山君躃踊號呼受節與符以還于上曰臣松不幸有母之喪不能終使事百爾官政棄不省視跣而南奔某等備員藩臬辱有一日之誼宜有薦奠以致一哀侍御君痛甚而奔之疾也故弗及薦越次年戊戌正月某日乃得再拜遣使走于呉下具牲與酒就太夫人之位而祭焉乃告之以文曰古所謂為母之慈而義者雖思其子之甚必能忍受而勉以事君之勤人子之賢而考者雖迫於君命之嚴而不能一日忘其將養之情於驅馳經營之頃故鴇羽之詩憂王事之靡盬而嘆將母之不遑夫欲將其母而阻於未竣之事而不害為人子之孝陟岵之詩母嗟其子之行役而勉之以尚慎旃哉猶來無止蓋曰其事人之不可不謹且言歸之有日不得以念母之故而輟其共事之勤也母之慈而知義若此彼為子者外有君命之嚴而内有母教之義亦安得不抑情以徇於尊者之事乎始某等受事於侍御之臺蓋旅進而見者數矣侍御君南向望母色慘詞蹙若不能一日居於其職而太夫人之訃卒至侍御君之悲寧有極耶然揆之詩人之義則侍御君之所遭亦古之賢大夫而任使者之所有而太夫人之所不憾者也考終之不為死而有後之不為亡太夫人其又何憾焉某等敬緘此詞既以侑太夫人且以慰侍御君之悲祭張掌科乃尊文生甬東之故氏木在門而維喬抱遺經而獨究聲發聞之四遥析疑義於羣䝉靡廢夕與怠朝玉在珉而弗售光揜抑以終韜身不獲而後遺業厥子之能紹矯鴻羽以漸序皇駿而錫褒雖屈名乃享實穫如種之可要諒之死而無憾神天行其逍遥禮重喪而致哭庶斯文之可招哭盧裕齋文賤官卑吏世所謂困辱也材宜居天下之顯而望足以致天下之尊猶栖栖然懐一方之印食五品之祿雖非世之賤官卑吏然亦為困辱矣其才宜居顯其望足以致尊而不免於困辱則必有所以為之者權臣竊命而恣行細人挾數而微中是其所以為之者尊顯困辱皆自外至者也士之所以立已而行於世者固有可以自恃而無待於外誠如是則其視尊顯也果不足樂而其在困辱也不能使憂蓋至於此則權細之人終不能以得志於賢者何也能賤其身而不能賤其心能卑其位而不能卑其名也若先生者所以自立豈權細之人所能得志也壽雖不從外至然有命焉非已所得與者先生於勢位尊顯卑賤之際既有以待之矣其視生死也亦若勢位而已矣吾輩乃惋悼悲嘆而不已誠有所怨於天而尤於人毋乃非先生之意乎有肉在俎有酒在樽官守有次不能臨先生之喪而哭焉先生其來飲食之否祭劉長史文博藝多材知畧敢武皆世之所貴尚也然伍被羊勝以材藝禍梁枚赫周丘以畧武亂衡山豈非守藩之度在於懐德而為相者不樂有其此長也耶先生質直而寡於材藝豪曠而不為知武於世所貴尚者若有所不及然而奉法遵職王宫之中大治優游寵錫以長有其福雖遭值大王仁孝恭順事得其主而先生之為相不近禍以致亂亦足多矣先生之歿也王人班禭而下賵岳牧致悼而臨哀所以勤乎人者如此亦足以明其生之為榮而旅櫬言歸有令子之孝扶服將䕶魂也憑依無所震恐又何恨乎他鄉某等辱與令子誼有世講異於凡民之有喪而官守拘戀有所不得致其情故申之以此詞而侑之以廣牡清酒靈其鑒之祭張封君文嗚呼一氣生人分殊惟萬壽夭富貴榮辱貧賤安困樂憂福與禍患或相什伯倍蓰無算稽實論報曰由凶善嗚呼封君於此數端若擇而取何福不集靡患不去彼天弗僭惟善人與今兹大歸厥貽斯美是曰令終孰云非祉敢告公靈兼解令子祭潘封君文戊戌冬十月六日婺源潘補菴先生之訃至江西其子叅知薦叔君行部在建昌聞之置案牘棄吏卒晝夜東奔至藩臬之僚郡邑之屬不得弔慰吏民鮮知者其友王某自九江歸不及送越嵗己亥正月之望始得寓詞遣人就補菴先生之位而告焉其詞曰嗚呼先生有表式王朝之節而勸率止及於鄉有澤潤生民之仁而敦睦止行於族有旁周庶物之智而綜理止施於家故不及當身以用於世行其學而有子以顯其志述其事某始仕容臺兹叅牧省皆辱與令子為僚令子之學宗宋朱子而得其真言為法程動中儀矩某雖貌友而心實師之夫有韋齋然後有晦菴此某所以推遡本源私致慕於先生而㡬萬一請見於他日不謂遽爾不留使令子呼號跣走奪予所師而去也觴酒豆肉向風寓奠身雖不往而意固已馳矣且因令子之孝以告先生其享之否祭大寧薛居士文嗚呼先生以振古之才拔俗之氣超覽之識精覃之思初為文章踔絶奔鷙出入莊騷荀卿左氏浸滛二都班書馬記沈涵渟蓄蓄極而肆如彼長江秋水時至百川灌之沛然橫潰千里萬態浩不可制觀者阻喪魂掉心悸晚究道真飲食知味本根獨榮枝葉俱瘁覽盡羣經一言有契往古來今上天下地心潛將測乃蟠乃際著號大寧厥以明志竒節清修洽聞博藝皆事之餘匪必匪意我生自閩先後殊輩願言有懐道逺莫致先生於我曾不遐遺過採虚稱謂可與議面目未交神情已詣睠焉懐之已踰五䙫豈謂入邑先生予棄登堂顧曕徒肅虚位無窮之思潸然出涕㝠漠有神知我來此宗儒祠告文夫子既歿詩書禮樂易春秋之文嘗所刪定述作者班班具存門人復記其所與弟子問答彚而為書皆行於世儒者乃謂夫子歿而微言絶蓋書雖存而所以言者則不可得而傳矣其所謂絶不虚言也千載之下乃有王先生者心領神悟於聖逺之時使絶者復續其功偉矣謂先生之學不於所存之書得之也則先生之遺書可考而知皆得之於書也謂書之足以發先生之學也則千載之間讀誦而講習之者不知㡬人專門名家殆數千百而獨先生得之嗚呼先生之於夫子之言蓋得其所以言者矣聖人之所以言者不外于吾心之所同然求之吾心而有以自信焉則書雖不存而夫子之言亦不絶也況其言之載于書者班班存乎今學者不能内信其心自得于已割裂於章句之末矯揉於形迹之似皆棄於先生者也某早無師傳為學已晚不揆固陋竊嘗盡心於先生之遺言豈敢謂能得其所以言哉惟知求之心而庶㡬有以自信耳分部江州睹先生之祠巍然于過化之地神爽昭嚴儼若一日不勝願學之志僭告斯文祭魯府紀善丘勿齋公文嗚呼惟公沖夷之性閎廓之度醇懿之脩恬愉之趣渾然天禀履之若素忮求兩舍以與物遇能者挾藝遭黜如失公富所挾不卑閒秩起家一經師儒是職循循誘人靡懐懟屈懦衰不戒苟得如濡公日未昃善持末路帝眷宗播擇使往輔解組而去曾不返顧孰云一官進退非難公於所處義命攸闗進無繋吝退不盤桓循心而蹈於世相安制廪之薄惟儒官獨予匱急困迺性所欲門人之貧與我共祿宗親有饑待我出穀司成先正曰汝吾徒羲文之畫陳邵之圖俗學鹵莽不味其腴吾說在此惟與汝俱大理名卿呼公惟伯曰蚤克樹有與之植臺有風猷邑有惠澤揆自推功伯勉之力公於先人十年以長晚忘其齒友于之行竹林逸遊曲水嘉宴先後嘯歌誰謔且衍先人季女公之冡孫託以姻婭情好彌敦四域之闉郭南維隅其室匪邇過逢劇劬藐余小子執役實從几席杖履安老之供側聆教言寛中祥外載色載笑以為提誨天降戾虐先人捐館公來弔賻繼以慰勉閔予垢柴責云勿死摧裂之餘音猶存耳倚廬而哀久弗我顧始聞遘疾箸觴鮮御走侍安否拜伏床栘問少差與以首頷之退謁公嗣告言後事嵗時所制誠信以俟答謂勿然氣定神閒藥物輔良終愈且還訃辭忽至驚詫嗟咨扶服往哭堂已施帷貴富壽康考終好德古命曰福公已兼有葆和以居乗化而盡既謂安常亦名處順某想慕儀則噭噭而隨不達於命維誼之悲載肉在俎挹酒注巵公其來哉跪侑此辭祭丘檢齋文士於斯人何如可命其業維經其本維行俗衰道降士失操柄口耳之間數尺以徑入此出彼塗說道聽割裂剽掠經為竊阱是用夸毗猥卑不競惟君發憤深思究竟圖畫開始宓神姬聖傳疏沿流周精程正上窺下攬日以夜併飲食忘味亦忘温淸奥義難晰疑詞莫訂宿師所鐫講說紛評至君而明抉剔包并謹守一門不岐他徑寧獨經明其行亦稱約繩畫矩足靡殊騁守瓶括囊言無擇病斂束筋骸翼翼其敬端拱斯翔俯也折罄人所不堪我㒺弗勝奚斯末品髙明介姓無敢或慢初終不更其貌之恭非以㡬倖其言之温非以為佞内修于家尤至者性父恱子賢弟戴兄令紜紜薄俗足使衡鏡君於為士蓋躬其盛如彼席珍宜在嘉聘徒韞在櫝光以自暎澤宫貢士晚以君應典教蘇學前有安定思樂泮水可以游泳青青者衿以共絃詠其施則微其道之慶宜久其施為青衿幸胡然一疾千里歸襯含不及視斂不及贈為此奠文握筆淚迸祭都憲丘集齋文天於生材付與甚艱既其付之成不倐然歴多年所始練而完惟公卓犖若性能焉早脩敏習在少不遷擺棄踐涉趠詣涯巔厥材之用亦有微權蹷之踣之俾毖以全困而後作庶免迷顛惟公亨達意得且便衷自神誘沛乎行川若執規矩周折惟旋先帝武宗收士不試蓋有所待待今皇帝帝初臨軒首賜之第濟濟三百孰為魁壘世所屈指數人而已公列其間有光無愧謂天所生先帝所遺宜佐今皇躋升至治孰意數人中路遭躓公雖未逢猶敡在位士心咸屬曉夕以冀宜握政樞宜陪國議盡究其材以振斯世其數人者尚有未死或待公興因公而起我與公游常勉以此公讓不當以明讓退我知公懐所負在是公材過人千里一騁在觚有稜在錐有穎庸庸之流噤不能逞闗口失聲俯其項領比益含藏閴乎休靚畛域難窮為陂萬頃瑕累可匿表玉之聖隠納垢疾山藪斯盛欲量所蓄豆鍾何竟惟我知之每見増敬謂可和齊賢否不競謂可調柔頑戾使聽多事之時難持之柄期迄有庸微是曷勝嘗笑謂公髙位來速匪敢戲謾蓋以此卜洎其偉儀山貌電目非知德者亦為公祝何言一旦氣息不屬約束四體屏焉就木堂堂岳立忽爾摧剝海内英游應相弔哭況我於公相知自夙晚契益敦兒女交託視公之瞑有淚如簇此淚何為孰知我悲謂我悲者婚姻之私誰無婚姻則情之宜其情而已曷謂曰知惟我之哭獨殊乎兹公所挾持不在尋尺與世豪傑期通膽膈齪齪者訾非公之戚豪傑知之公以為適公業既崇公譽亦赫然訾公者猶恐不克有我知公公瞑宜懌為此哀章以侑酧滴祭楊利約秀才文吾友楊君一魯之亡予哭之既哀每臨其喪則哀不能止不敢往臨者久之喪且三月几筵將徹矣乃始抒哀為文陳果核肴酒以薦而告之以文曰甚哉君之不可以死而遽死也君少時即才雄於同游之間而亦以取忌世方大驚其文而竊訾其人甚哉世之多蔽也論文不惟其據經合道而以其雕詞繪句為工論人不惟其好古砥行而以趨時合變為賢君且以其大驚者自喜而以其竊訾者自疑自予之得與君友既熟其為文又詳其為人乃始喟然謂君曰君之為人果不可訾而其為文乃不足驚也然世之多蔽如此宜其見訾而取驚也君乃以其自喜者自悔其自疑者自信又不以其自信者自多不以其自悔者自止脩其為人而盡反其所為文蓋數十年之間其為人之好古砥行者愈篤而將成其為文亦且據經合道而大異於昔甚哉君之材志之難也世之學者以一人之譽而矜且怠者多矣一人之毁而畏且沮者多矣君之為文衆人之所驚然且不矜不怠而知變焉君之為人衆人之所訾然且不畏不沮而加勉焉此予所以慕君而欲引君於道也君亦方有意於予言而天遽奪之使去可不痛哉然君之為人既無可訾而其文已足驚其又奚憾窮達之感脩短之悲不足為言之矣祭李抑齋乃堂文觀海而知河觀岳而知崑崙蓋本其所自也某等不及識夫人而知夫人之子夫人有子二人皆賢有文譬之天球和璧襲美室中豐楠文梓重英林麓然非其有之則亦何以似之哉方夫人守約食貧教二子而俟其成也不以二子之淹晦坎躓為憂亦不以是為子之過蓋知其材之必有遇也及其發跡奮身自致通顯夫人不以是為子之幸蓋知其材之足以得之也長子憲副君以直道正學忤勢違時失驗封而出察沅湘方有兵事夫人能以為喜力勉其往而不許其迎與次子居于家蓋知次子之能養以慰其兄而不欲以仰事之勤累其子於官次使得畢力於王事以靖冦而息民也夫人於窮達得失家國輕重之間為有獨見而素計其識有過人者二子之賢信乎其有所自也某等辱交令子夫人之存有可拜之誼沒而哭之於禮為宜陳牲縮酒既碩且潔而侑之以此詞祭李筠溪夫人文㑹奠代作人生有女有不為婦為婦衆矣有不為母為母已難況於為祖方其為祖其身既老有姑可事舉世所少其備此者曰福與壽不問可知己為兼有其夫貴乎其否與賢猶不能必事之難全蓋禀不齊勢使之然有如夫人全此具美人蘄于天欲其有此萃于夫人靡遺憾已祥不虚集必有致之惟德召祥乃理之宜夫人之德欲考而知於誰其徵蓋觀於兹某等與僉憲公接雅縉紳友誼周洽内訃之聞宜有弔唁牲酒既潔侑以此文祭何親家母孺人劉氏文何在晉邑是為舊家隠樂田園不雜以他邁德之種本而未華其積孔厚發之必奢爰及今日揚芬舒葩詩詠緜緜有同瓞𤓰猗與碩人惠淑靜嘉相夫敏事黜其驕夸夫歿不惰老如幼髽以勞自勝維思無邪教其子孫詩蘖書芽日滋月益長發増加子孝孫才暮年婆娑厥安伊何重較之車原有秔稌池有鯉鯊豐豆潔杯物時且佳宜享眉壽受祉茂遐今考以終大耋之嗟靈之順婦實吾女弟佐夫誨子克踵姑美閑其内則施及外事秩秩有序俾姑燕喜今其逝矣惟婦與子哀毁不迷終事中禮某等有母之喪聞訃涕泗在几筵側弗及奔視荒帛清酒久始克致匪情不足禮則有制撰詞侑奠庶㡬鑒只遵巖集巻十八

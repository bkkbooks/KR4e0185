body:
  text: 遵巖集巻十二明王慎中撰誌銘封通政司通政谿橋王公墓誌銘温州永嘉英橋之王氏有老而號谿橋翁者生為鄉人所榮而交慕之沒相與哀之而祭之於其社翁嘗以兩子武庫君司成君貴褒為封君人不稱其爵命而稱其居盖以徳掩其貴也谿橋未為翁所治潦水鍾之浸為廣斥過者不睨翁獨售焉斬藋菼決垢汚作室於其間時猶貧也而繩板之所樹引尋尺之所圖度深廣而髙衍或疑其壤之不吉以為翁憂又有笑其側者曰胡所取財而室巨如是其為築於道傍爾矣翁聞不顧治之不倦今之藋菼變為翬革之華垢汚變為堊磩之美而位置觚隅滿其繩板之所至尋尺之所揆無少缺失器幣服物僮指玩植以充備其中亦稱向之憂且笑者或已不及見而使他人追訾其愚其及見者皆自悔責其識事之近量人之淺而益以翁為不可及也始喪其父翁早孤而家又貧也奉母周氏兼畜諸弟經營毛宻母常足甘㫖而諸弟衣食甚均其意氣暇裕無纎細苦急之態遇有當費曽不恡情力亦副之於人無所忤而當有勢者在前亦漠然無所詘愧也其後富貴矣足以放其慾以夸世駕俗見謂得意顧獨悃愊自好不以侈張具取娯快故輕糜貨用其遇物尤醇與敵以下為鈞情慤而貌恂非繆為恭愿買童兒口吻收不驕之聲而内存矜喜有不能制時肆發而竊露者也其和氣内溢老而彌盛目光㸌熻深夜廣坐烱然與炬相射鬚眉龎皓顔如渥丹觀者皆驚為神綽意曠度濟以温色亹亹談辯間出於嘲謔絲竹雜作嘈啁喧耳聴受有節賞工摘誤與少年好事均其精谿橋之居既大翁以徳齒為人所尊事媚愛往者輻輳門無停客舉盡賔際宴游之洽微時所識有所不給咸以翁為歸施貸賑䘏不自為量歌舞其徳所在有之故其厯年滋多備生人之歡嘉而不得者不以為怨翁既富貴尤念其所自曰微先人積徳以遺我胡以及此始祖某髙祖某𦵏久矣墓茀不治惻然追新之治其曾祖珙祖毓之墓尤嚴而割田以入大宗之祠必選其腴美諸費甚鉅曾不以一銖髮歛其族人盖其行誼篤厚如此嘉靖丙申七月二十二日卒去生景泰庚午閲八十七年矣卒之日弔者數千人哭無不盡哀者其仲子國子祭酒激以聞于上為賜祭𦵏寵之以閔其孝公名鈺字九思封通政司通政卒之年十二月某日伯子澈與弟激沛卜吉于先域半山之原而與恭人張氏合𦵏焉恭人故相張文忠公孚敬之女兄徳夀配翁有孫五人叔樊叔程為國子生叔果叔杲鄉貢士叔本庠生可以知為善者之所享也𦵏之日鄉人相率祖奠于途引柩而泣者數百人紼長數十尋不勝執己𦵏則相與歛錢為祠繪像祀焉蜡饗賽饋必俎豆之期於久而不廢盖英橋隣壤之五都瀕海而居其土積鹵其業宜鹽故置場名永嘉以榷之其民籍皆繫於竈嵗賦鹽入廩轉餉塞上徵其力之所出而不責其非有而近嵗有司重以折色之徵推膚剥髄不能充也公謂竈地半坼於海民輸其有已不贍而重以折色是責米於盆缶鑊釜之間非其出也為書具言竈民所以窮迫不堪重賦之狀甚明切以上于朝天子覽而憫之下其書浙東均折色於諸縣之不為竈籍者五都之竈民得以不徙死故其𦵏五都之民送之尤悲挽柩行者累踵駢肩恐不得負紼為恨又無以自慰而圖祀之於社以記不忘嗟夫士有當勢得位力足以施於民而卒無一善狀其生為人所詬嫉至於死猶追數其過以咎之何限其不足懐於人泯然以死而人不知者又不知幾何人翁無尺寸之柄而沒有以得民如此不獨其行誼之厚其材亦有以踰人者是可銘也翁之伯子武庫君不逺千里寓書於予曰先人之𦵏圖所以告諸幽者非得能言而可信於後之君子不敢以託故𦵏既久而未有所託今敬以託子矣武庫君之賢而多與海内之名公雅故所以重其親之終事而其請銘之言如此予其可辭銘曰深坎而周封以為之宫其蔵之宻其樹之崇千百嵗之後過者必恭相栢與松周府儀賔郭公配保昌郡君墓誌銘郡君朝列大夫周府儀賔郭公昂之妻陜西副使鳳翺湖州府同知鳳儀之母鎮國将軍子之女汝陽恭僖王之孫周定王之曽孫而髙皇帝之𤣥孫生於成化庚寅六月三日卒於嘉靖庚子七月十八日享年七十有一訃聞禮部以請上賜祭𦵏如制皇后皇太子並憫悼遣祭於夀福榮哀備矣而郡丞君悲不能自釋謂宜有以垂久逺而不忘者以慰無窮之情事乃來乞銘郭固名家郡丞君有聞於時力足以得顯人大官之文而來請於余是其趣必有所存也乃為掇其事行而志之云郡君勤儉静肅慈而能訓雖稟女質而有男子之識尤精計畫其於度財任力敏甚菹芼泲涚臡胖醯醓紃絍繅緝耘穫豢字為生之事莫不明習而察歸郭氏不數嵗而郭為鉅家名於大梁僮婢數百指使之各當其能與盡其力無得無功而食果蔬粟麥之入羨溢蹈藉無莖蓏秉穂之遺為人所私亦無腐敗於莒庾而棄者其貴而多材如是然不以是驕其夫在夫前語不揚聲唇無反者復能本夫之意其舅姑所進衣服飲食必得其飢飽寒暖之宜朝列公倜儻好議論文史交游半於城中餽贈宴享之禮無失而公不知其費所出又不敢私以己意掠恩沽美有所貸予間則益為公市膴厚田園卜㕓宅廣樹畜以娛其志而課二子讀書常衣以布衣食以菲食曰非不能美好若輩口體顧無益於發志進業而足以長過耳二子起進士為官皆以修潔聞於人盖教所素成亦知其母之志不樂以他物養也郡君於宗室女屬輩為尊門既顯大春秋髙同姓外姻之游者益衆嵗時慶問長幼尊卑來㑹冠舄楚楚填溢閨闥郡君顔如渥丹齒健而目清應接有則老而不惰怡如也大梁人傳説以為榮其相語尊者願其婦卑者願其母皆欲如郡君兩子在職並先後奏疏乞謝職歸侍父母詔可之已而憲副君與朝列公相繼殁哭之既哀而郡丞君奉郡君之教治其喪𦵏有禮郡君漸衰厭事郡丞君視飡嘗藥旦夕不去於側母子之間慈孝備至尤以家法為大梁所推不獨其富厚榮達云郡君二子長憲副次郡丞女三人長適林紀次適麻冕生次適典儀尹復春孫五人東南中西朔東早卒中舉人南西朔皆郡學生女孫五人曾孫三人坦増墉曽孫女三人郡丞君以是年十二月二十四日啟朝列公之兆而祔焉銘曰婉彼碩人容徳具美不言在昔齊姜宋子曰圖爾家朝列維士修于閨中有聞邦里其聞維何維夫游且歌曰妻之以子曰有母優學而仕既相既誨實受多祉終老無斁克令厥始執是閫儀梁人所視本盛追興功存郭氏琢銘㝠墟以詒不毁李母純懿孺人秦氏墓誌銘嘉靖二十一年二月十日李母純懿孺人秦氏卒年九十有三子若孫若曽孫與其婦扶杖勝衰哭于帷堂而東西列者百五十餘人女子適人而攜其子若孫來臨者稱是若孫曾之親戚所嘗往來之黨尊事敬業之大夫士弔者以數千孺人之存以嵗時受其子若孫曽及諸婦之夀女子與其夫及其男女亦來㑹大車肥馬塞巷陌裘帶纓絇充溢堂上堂廣百餘步至不能容閨中步揺翬翟垂揥懸瑱巧麗之紅實筐布篚繅繡為藉以獻酒芬殽潔迭承第進為孺人歡孺人以尊卑大小序而接之腹堅齒健飲㫖嚼嘉人莫不自喜謂為得孺人之歡如是者餘三十年自郭邑郊聚老少賢不肖傳説嗟歎為不可及或仰天誦禱以願其母至有咨怨吁欷恨其母之不然以咎夫天之不均秦孺人之名人人莫不聞嗚呼盛矣孺人泉州衛千户傑之女嫁為恪菴李公瑄之妻恪菴不問劑劵而貲日進不知饋遺之費而交游益親鄉人之飢與疫者資恪菴之藥與粟以濟以善聞於鄉然恪菴稱於人曰是吾妻之助恪菴殁諸子孫之為士者其學専其材成為他業者其生事辦皆曰吾祖母之教盖孺人之子孫蕃矣買田作室督任條置以篤其生者甚均且至而有矩法孺人坐堂上以色笑開示所好惡其執絲枲撰酒食之治女事者常若孺人之臨其室其省種穫力賦税之治男事者常若孺人之臨其家誦詩讀書則古稱先尊師樂羣者常若孺人之臨其塾其政不肅而齊其教不怒而威所統彌衆所及彌精而所處彌適其材稟神識盖天得之也母于李氏七十餘年劬躬約已累仁勤行以大李氏之世其事甚衆不可悉書余所論其凡而又特著其事之大者初李氏族大無譜孺人命諸孫之賢而有文者士絢士章士黙士弼士𢎞撰論世次聘邑名士沈亨纂而成之復以意授士絢等定為家範數十條勒之祠堂子孫朔望展謁讀家範一通以戒焉李氏子孫不忘其先油然興其惇睦之愛由孺人也俗降教失士大夫因陋守近能言其祖者鮮矣孺人之志宏逺如此觀其大其細可知也士絢等述孺人之行來請曰吾祖母之存知書喜文章於人之賢否尤有辨别而嚮意賢者今其𦵏得先生銘之是祖母之志也故為論而銘之使其子孫得以二十二年癸卯二月初十日啟恪菴之墓而合𦵏焉孺人子孫既多男女嫁娶名氏具其家譜及鄉進士君之狀兹不著銘曰曰氏自秦栢翳云裔始有好馬國于汧渭仲奮佐周禮樂肇賜有非冉祖及孔之門漢彭晉起綰璽乗軒統卒一旅徂閩之昆厥根既逺枝條芬敷爰生賢淑令族攸符稟女之身材也維夫為婦能恭為母能慈匪曰恭只其家由治匪曰慈只訓督寔師克篤其慶以昌李宗作之自我亦享在躬斵石刻銘壺儀是崇户部主事周蹟山公墓誌銘士有奮微起陋立人本朝沾一命之寄無當世之責而懷憂世之心無正君之任而愧衮職之闕亦其志然也然而慮過其身之所居言踰其位之所守則有思出其位行越其思之説出而攻之慮過其身慮未遂而身逢其殃言踰其位言不行而位貽其危則有徒喪其身無益於君之説羣而誚之夫使身違其責而皆逃其憂位非其任而並諱其言猶有當責受任者也若夫畏逢殃為不濟而全其身懼貽危為無禆而固其位則是莫有憂與言之者矣彼為思出其位無益於君之説者豈誠其心之所然哉陰持全身固位之私計而陽為是説以自解脱耳議論不明於世而節義不立於朝其失盖由此夫君仕為户部主事在朝六品官耳督儲視榷有可舉之職㑹計當出納平防範謹勾稽詳君既能其職矣而憂盛世危聖主蒿目怛中常若一日不能安食而居於位者其志然也君以言獲罪偶斃杖下其心固能不悔也君天也安所逃之受死如受命為東西南北之行亦事之所不得逃者也而余有以知君之無悔者君居家孝與兄弟友與人交信而能敬為户部始監草場繼督徳州倉儲最後榷崇文門商税皆利權易染君絶無所近如置玉涅中漸而不入其白皜如也菲衣糲食挾冊吟誦不安舊聞思廣所業於世之賢人志士口講神注雖不能盡交意常以為向而謹趨捨慎操術卓然必為君子矣其應詔一疏冀以微誠感悟非為求死也主上怒其越職過直薄撻示儆非欲其死也而君不幸死盖命也使其杖而不死其憂當益切其言且益多必不為少挫以敗其志或守封疆備障圉患至禍及必能以身殉職不苟免以幸其身此余所以知君之心而斷其無悔於當日之死也君姓周名天佐字宇弼泉州晉江人嘉靖乙未進士娶吳氏女三人以兄天正之子日暹為後上疏逮杖之日為辛丑五月六日下詔獄兩夕卒五月八日也距生正徳辛未二月一日為年三十一耳其仕不久其年不永其學専鋭而方進其行勤修而日敏進而未見其止勉而不及至於成獨其志皎然可知也憶君喪歸時余友人毘陵唐君順之寓書於余曰不可使周君無傳子以文名世周君又鄉人也子必勉之余奉唐君之教不敢失而君之父封主事公琅以狀委余曰貧不能𦵏亡子賴諸當路之賻與縉紳之遺買地後市之里寳盖山之麓穿壙堅宻将以是嵗甲辰十一月十五日𦵏矣願有誌余不敢辭予惟唐君之不欲君無傳也亦偉其言而哀其死也余誌君之墓獨論其志詳焉庶世之求君者不徒偉其一疏而哀其一死也然以余文之陋如此知不足副唐君貽書相勉之意而有孤封主事公之託矣其何以慰君於地下耶銘曰以為如是而可以死耶非君憂主之意以為不可以死耶亦所以明為臣之義以一死為足傳耶則君之好修不止於是以為不足傳耶則大節已昭然而若此朱液妻陳氏墓誌銘朱君液之妻陳氏謚淑静澹齋先生之長女也澹齋名尚謙以名儒隠居自晦一發齒舉足不苟教其家有法淑静為女其父之教不煩朱君之父軫亦以名儒為學者師教其家有法淑静為婦於舅之志無違者朱君俊爽有竒志欲以文學拓跡淑静夙暮修飾以佐其夫甚備未嘗自以為勤朱君志與命仇學久不遇困而自悔淑静善慰之未嘗幾微憤怨望其夫也久不舉子力勸朱君買妾以輔寢廣嗣朱君感其賢又年尚少也不忍至婉曲通誠懇於夫之兄弟使諭其夫而朱君竟不忍淑静竟以無子卒予室澹齋先生次女故熟與朱君游而聞淑静之賢是宜貴且夀而多男子也然卒以窮約無子早世澹齋先生盖甚悲之而朱君以志其壙屬予抆涕言曰淑静非宜窮約無子早世者也是不穀之不徳獲譴于天使淑静不得貴且夀而多男子也雖其行施於家室不足暴著於人人然賢而無命有足悲者不穀無以慰其亡敢圖不泯於大君子彼其存亦知賢人之言之為可貴庶其有以慰也以澹齋之悲而朱君之請之勤予不得辭也為之銘曰生於丙寅年十二月二十一日卒於辛丑正月九日𦵏於甲辰正月十日山曰石壁坐辛向乙是謂淑静陳氏之室處士易直王翁墓誌銘王氏家族雍睦之盛在成化𢎞治之間某曾大父時事也曽大父兄弟八人皆同祖其六人年齒差池並時六人者剛柔寛急不盡同並以材畧行誼為鄉長者鄉人曲直長短不相下得六人者一言以為平姻黨吉㐫大㑹無六人者在愧不為重也王氏為安平右門所從來久矣易直翁所謂八人也當事持家後六人而有六人之風接其聲迹不替某生晩猶及見翁時年十四五稍有識頗知諸父先生行事而翁於諸族子中獨愛某以為賢謂必有立某少一庸兒耳不知翁何所别而賢之今幸有立益能講知諸父先生行事而翁又所及見翁之𦵏某宜為銘翁名瑞字廷怡别號易直髙祖公諱子元曽祖徳軒公諱廷中父信齋公名澄堅取蔡氏無子翁與兄珍皆出側室陳氏翁生十二嵗信齋公以賈客死吳中盡亡其金環堵蕭然兄弟兩人與二母相依為命備嘗艱厄稍長即自奮曰不可當吾身而廢先人之業茹麄衣惡拾棄掇殘卒能移縮就餘以寡為多賈行吳中尋父故游處以不泯其志翁所挾貲於諸賈中為最下然温郁可近貌悦色恭言語煦煦其和襲人臨財有信若秋霜吳中髙其為人愛而任焉諸挾髙貲者顧不得與翁齒縉紳士夫南北行過吳中翁得皆與其賢者接同賈者常尾翁後附名刺中因以求通揖讓進止視翁每招賢者游指斥山壑談説光景亹亹與賢者往反成其為賔主諸賈黙然引爵執筯竟日徒飽而已退則相目推翁以為能王賈之名在吳中頗盛然貲不大進最後傾貲懷珍貨買巨舶浮海踔東甌亂明州以濟将赴臨安為邏卒所邀貲沒之盡然翁所懷貨皆非令所禁邏卒為暴勒沒之耳或勸翁胡不自白於官翁曰所為行賈者固為求利亦以遨跡肆意也使吾囚垢以乞貨不如徜徉徒手而行耳且吾年亦衰矣浮游江湖意倦殊思歸吾将返矣吾長子讀書為士将託以其志次子從吾行雖少而材可付以其業吾其返矣㑹翁長子亦奔急至吳中翁乃返至家三月而病作竟不起嗚呼其於行休之際亦不為苟然矣始某大父確軒公自安平徙居入郡城課先吏部大夫以儒業翁即遣長子水心先生與先大夫同學兩人者並以文薦為學官弟子王氏詩書由先大夫與水心先生始王氏子孫日蕃而詩書之業益衍且多者惟公與確軒公之後耳他公之後終不若也於此觀之翁之志亦畧可觀矣翁長子宦邑庠生明經有行屢試不售所謂水心先生者也次子寳所謂少而材能繼父之業者也翁歿後數年次子賈大進廓增溢羨為安平鉅家地下有知當為撫掌大喜翁喪母盡哀養嫡不殊已出事兄順奉寡姊有恩禮遇宗人盡其情欵有族黨之行二子肖之家富而無異財衣食豐約出入勞逸甚均某嘗嘉歎之嗚呼此非所謂為善之報耶公娶陳氏今年七十有六康强無恙二子謹奉焉以稟家政女五人適王文大陳世住楊伯元陳丕雍陳自謹孫男徽言娶黄僉事鰲之女徽猷郡庠生徽謨俱娶蔡氏孫女三人長適龔俸次適伍倫修次未許人皆宦出徽典聘陳氏徽音徽謙孫女二人皆寳出翁生成化乙酉六月二十三日戌時卒於嘉靖丙戌二月三日酉時享年六十有二以甲辰十二月二十日𦵏于五都葛林口山坐坤而向艮徽謨早卒附壙于墓之東銘曰佳哉葛林之原龍翔虎蹲馴伏而掀鶱有丘隆如中出而短此名為尊水流其前若之與𤣥繄孝子之所卜兮曰吉徳之攸安我銘其藏其永勿遷石母洪孺人墓誌銘石君華嶽申卿謀𦵏其父潛軒先生能得貴溪江午坡公以達之銘可以𦵏矣而以其嫡母洪孺人之銘委予予謝不敢午坡公以才名雄海内予所畏也乃使執筆頡頑其間不亦冒非任而忘所畏乎申卿再拜言曰知我者於海内惟午坡公於家惟先生今父母終事不得一言是無以明不肖之受知於先生也潜軒公非華嶽與弟喬嵩無以衍石氏非孺人無以有嶽等孺人之徳在嶽等與所自出之母其功在潜軒公與石氏之宗先矣孺人殁華嶽僅七齡已知哀思哭泣今長矣不至無知識飲食坐起未嘗不思思未嘗不涕出華嶽雖六七齡孺人已預待之云異日當如何今尚如此也無以報重賜慰遐靈惟使其氏行一挂名賢之筆庶其有以慰也華嶽亦藉以為報矣予愧不敢當而不忍辭其意予觀風人所詠葛藟勉治服之儉巻耳明審官之志蘋蘩敬祀事之修而其徳在於闗雎盖其反側憂思求窈窕之女以佐君子為之琴瑟鐘鼓以樂之所謂不淫於色無傷善之心是為婦人之徳而首他行也江沱之媵有不以之悲小星之御有宵征之勞然以際後悔之恩沾在公之惠猶歌之以為美而刪詩者列之二南亦足知有徳之難也世衰俗失教不及於婦人有如孺人絶去妬媢歛己専居以安諸侍之筦簟使薦君子蒸和委順卒見詵繩雖位分儀等與風人所詠不同亦嫓有其徳矣他行不著固可知其兼之也如孺人之徳而使當上世之生逢能言之媛必有播於聲歌而垂之無窮既其不遇則亦安可使之不一出於予之筆也哉孺人生成化己丑四月二日生五十二嵗而殁為正徳庚辰八月十四日殁十八年而𦵏為嘉靖乙巳正月十二日銘曰毓名族翳洪氏家仙嶺越百禩父敦素雄于里選所歸石之子恭為名敬夫字蚤業儒晩不仕家既落中復起衎其遊居無悔胡能然内佐以饋職共絶惰侈仁且惠克具美榷厥最不妬忌蕃他出覆由已逝不泯受多祉子華嶽譽髦士如圭璧礱四邸繅藴藏待薦侑喬與嵩孫齔齒梧竹間鸞鵠跱椒條逺初聊耳考吉卜辰良只從其夫令終始鏤貞珉告勿毁世嚚昏尚視此張母黄夫人墓誌銘故樂平尹張南溪公文應既歿祀於學官而鄉之子弟謁其家廟之寢因得拜公之配黄夫人於時年六十有八矣色莊氣淳容止不瞶語某曰南溪公平生所友慕惟王一臞先生所敬事惟李尚寳公耳今得與王先生偕祀知其歆也但愧先於尚寳耳尚寳公名源世所尊稱竹坡先生曾銘南溪公之𦵏者也已而李公亦祀於學某閒居以其所學於古者時時為人講説夫人長子達甫君好聴其説夫人聞之悦勉使與余游無倦自余為人言學大䝉羣口訕笑多名為士者彼誠鄙薄顓陋不能通其意也而夫人知以勉其子夫與當世之賢者相尚以義而與其為學者相講以古皆有偉丈夫之所蔽而夫人所以助其夫督其子者如此豈婦人之智所及哉達甫與弟厚甫並以文材知名達甫猶為學官弟子厚甫僅舉於鄉人皆歎其屈夫人不以閔其子盖知其足以有立而必有待也二子常以不給於養為戚夫人顧謂曰吾從而父為令力足以得財而以貧終其身是吾安而父之介也今乃以養故戚而輩耶居常儉衣菲食以自勤如舊處約絶不以撓意遇其有時人方以急來歸己者輒為之出至無所餘其後不復銜以為徳也接撫内外宗姻之屬無老少親疎不違於禮而恩意有加其懇惻咻喣於人如恐不及而歛飭端一動有儀法雖懷附依戴未嘗不式其肅也南溪公沒持其家法益篤老而不懈女子適人多顯者所出男子日以盛長夫人以慈誨為之尊不獨其齒分然也愛其庶子天紀甚曰是其母異而子少吾愛之宜加於南溪公之在乃如公之在耳嘉靖二十四年十二月己酉屬疾候者環侍夫人力視之曰時至當去徒哭無益其為送我耶嗚呼何其明於志而不亂於終也盖年七十有一卒之明年十二月其子将奉以祔于姑而合南溪公之域窆焉哭而拜語予曰天衢天叙不肖謹身力學庶不殞先孺人之教顧窮阨坎躓未有以顯先孺人也惟孺人之行宜有以述以其存勉不肖以聴先生之説今其𦵏知欲得先生之文也某游于達甫兄弟而聞夫人之賢詳矣於法應銘其可辭銘曰寳林之岡賢人所藏惟其配之其徳與方筍江潘翁暨配方氏墓誌銘翁潘姓名泗徳教其字娶方氏髙祖仲弦曾祖文顯祖永貴父世瞻皆不仕世瞻生子四人其季翁也翁生於成化丙申生六十有三年而卒為嘉靖戊戌方氏後翁二年生而先翁五年卒則為成化戊戌與嘉靖癸巳也子二人實寛實早卒而有子女各一人寛六子三女子皆使讀書其長者多為學官子弟潘氏之世将益大竭力盡志卜地甚吉作竁甚固以𦵏父母者寛也𦵏之日為嘉靖丙午九月二十八日墓在南安縣二十都月半山之原坐戌而向辰未𦵏前一月寛持吾友尤見洲君狀且介尤君來乞銘予少時與實同學舍從師雖未定交然追奇其才而早死意常悲之潘氏之世既大子女聘嫁皆名家與予家相聨綴呼為姻戚寛能卑身蹈禮以見於予其詞甚愿而怛惻予固不能辭而寛之詞有及其兄實者曰以亡兄之志使其在必得志力足以累公今雖已死使其有知亦必以是累公也予聞而益悲益不得辭而翁有二女其一以歸陳紫峯先生琛之介子紫峯以徳學自髙於俗寡好顧甚好翁不獨為姻婭故使紫峯先生在固當銘翁是翁終必得名筆𦵏也予文烏能固辭既志之如此併為論而銘之銘曰予觀世之有家而興者莫不有賢夫婦焉盖鮮有偏舉而能獨成者也若潘翁與其妻方氏亦其人已翁性坦夷喜施而方氏警慧度事出費翁善為不疑方氏巧於前億其於一家之治相勞於初而偕享於末兩勩以積而並食其報如藨蓘之必獲崇比先俟而後收不爽厥謀良亦賢哉且非獨兼舉又有相濟之功焉夫嗇而無散則人莫之附然多與而不節将有難繼之憂好猜而不情則人莫之任然過信而無權将有易欺之患而潘氏夫婦各致其長以力於生宜其少敗而終成也是二人凡民也其用之一家小道也以予論之如此豈不有可觀者哉淑閒吳氏墓誌銘嗟乎世衰倫廢而兄弟之恩缺人各有心彼此乖向如張騂角之弓翩其相反豈獨其人之罪哉亦敗於室中之多搆蔽於惑而害其好也雖以姜肱之篤行繆肜之至性猶不能無畏於是况他人乎以吾所見鄉人兄弟之篤如尤懷璞公琮與其弟璋衰世之僅得者也今得其子麒述其母淑閒吳氏之事行而知尤公能友於其弟盖有所助云淑閒尤公室也善順其夫曾不以意志相違異非徒色語無忤而已尤公兄弟共炊而食自勞其身轉貨浮巨海出東方歐駱鄮甬之墟授弟其柄使握家政淑閒盡歛公所轉贏金與他財物置篋緘以一鑰持鑰牡畀娌氏使恣出入不問其何所為也方其豐時一門衣食饒沃獨儉已為倡不以共財故有所溢費以自快其後尤公轉貨漸折家無所入益困淑閒未嘗貌愠或追過豐時誰所出入有不實也故尤公於兄弟之好終其身不敗淑閒尤能事其姑而迎其夫之意自買妾以侑其寢生子麟撫之如麒麒於某友也故知其母之善確而不誣於其𦵏來乞銘義不能辭况其善可銘也乃諾而銘之淑閒生成化丙申年七月初三日卒嘉靖壬寅年十一月初五日年六十有七而以丙午年七月二十八日祔于尤公之兆其子孫生出兆域背向吾友莊君采志懷璞公之𦵏具矣銘曰分割以為能家離間以為善内教不行於中閨習久昏於此世胡不視乎斯人庶有泚而知悔我銘其幽其貽其誨冠帶散官涂翁墓誌銘由臨漳門西出曰筍江闤比闠聨突烟起於屋霤東西行者騎躡蹄輿戛轂有橋翼然横江如垂虹飲漢縱東西以達其興圮繫人利病可覩也每橋圮首事鳩財以佐官召役使圮者治行者不病役訖螭拏龜蹲載穹碣以記不忘鐫題石後曰倡義董役耆老某則涂慄齋翁紹也嵗饑人餓瘠道死官為勸分聚米煑粥活之出米多受奨則又涂翁也縣官度經費不足懸格募人出錢計其多寡予散官大小以酬之人皆惜錢莫肯應格佐縣官勇赴不吝出錢多得予散官七品給賜冠衣以别鄉人則又涂翁也翁本由貧起富以嗇發貲度事出費不妄捐一介至所當為能不嗇如此戎籍有涂伯堅者不知誰姓户已絶名猶繫籍中仇人指以誣翁之族曰是為伯堅之涂當勾丁應籍以從伍族人咋齒彈指相視莫知所為翁跳身獨出鳴于官仇故勁敵不肯服淹三嵗乃決費至數百金族人未嘗捐銖髮其不嗇於所當為此尤著可記也晩嵗自營𦵏地于槐市山之原或謂翁康彊無艾胡遽謀此子孫多而材何至自為此翁應之曰恒言人生百嵗然世何嘗見百嵗人即百嵗亦必死吾之為此非憂子孫不能𦵏我所以曉世之不知命者自是盡棄生事以産業分其子留田數畝衣食其中節縮移用寛然有餘意怡如也老而耳目聰明形氣不倦比卒猶炯然悦豫無呻呼砭餌沉綿枕席之苦茲所謂以天年終者予嘗與其孫思謙游思謙來乞予銘以𦵏曰吾祖也賢翁之子淳孫謹夫復因友人求通於予來趣銘曰吾父祖也賢其急於不泯其親而知所託以盡其無己之情事世之庸子頑孫視之良愧翁可為不沒矣予既不忍拒淳等之意而翁之賢有可思者故諾其請銘曰時所謂富者以纎細致鉅羡深有味於細也有寧死不苟擲一錢又握利權久目營足赴惟恐有失如沃漆染膩終身不能釋去貧苦日長而富者患嵗之促聞人言死掩耳不肯聴翁皆反之兹其所以為賢與廣東巡檢涂静軒墓誌銘予一日從游野外至窰市登所謂槐市山者岡盤隴逗茂林繁薄之間有城佳哉後墓而前廬直欵其扄入門門内闉外植石為表題曰涂慄齋翁夀域洎子静軒公之壙涉堂厯階主人深衣練冠而出揖乃予嘗所與游涂君思謙益夫也予曰君之親𦵏耶乃倚墓廬而居也益夫曰未也吾祖卜此以待曰樂哉斯丘冢子吾甚愛之又長也不宜逺我死則淵也從我冢婦朱氏從吾妻𦵏焉淵先人之諱而號静軒者也先人殁十年矣以吾祖之命不敢他𦵏以吾祖之存而不忍前𦵏也謙也聞之未𦵏服不變而吾祖之存也故為是衣冠以處手植墓木日䕶月撫見其茂長躬治堂寢朝糞夕除勿使穢蔓所以用勞於吾祖而致哀於亡父也且亡父之志有甚足悲者父少魁岸負竒氣不樂為齊氓期以功名自顯閉户讀誦窮日夜不輟至懸髮屋梁以警睡其自苦如此然輒試輒黜慚沮發憤怒罵擲研裂巻棄去從掾史得一官為廣東梁家沙巡檢戴冠束帶歸拜親於庭下意殊歉吾祖望見冠衣儼然官人也為發笑見齒父始稍降慚憤曰亦足博吾親一笑矣其為梁家沙及再除神安鎮譏禦非常之外不邏索人一錢曰小官何足為名聊以明吾本志俛而就此者不樂為齊氓耳非汩卑冗以牟纎細者也晩學為詩不甚求工解亦以自别他掾事刀筆而不曉文墨者尤破去岸幅好傾盡與人為歡若恐人知其為是官然此其足悲也予重益夫之詞有禮而能言其父别去踰年而益夫衰衣俟門容蹙詞哀拜而不起曰吾祖與父今将同歸於此土矣吾父之志不能以儒業顯卒由掾途知其抱慚憤以至沒也思謙不肖又無以發先人之志而慰地下之知惟得大人君子書其姓名納之幽為足以塞其慙而蠲其憤日夜念此至熟必以累先生矣且辱志吾祖之𦵏敢并請予不得辭乃一日而銘涂氏父子兩世銘曰瞻彼墓矣其侐而碩形魄沈墨維此之宅瞻彼廬矣既靚且蠁魂氣清楊兹游之鄉神之游斯父前子随坐耶立耶僾乎有儀其呼其唯豈曰無知式燕爾後惟慈及孝藨蓘寔勤滅裂匪報視此銘詞不尚有詔居易黄處士墓誌銘公名鍠字允諧别號居易少嘗有志於仕矣故以舉子業游邑庠其業不以趨時而以適已進退得失不攖於心卒以棄去見者謂為鈍惰困於材力而自止不知其好有所不存也所居不離家室而非溺於内行不越市肆而無所求於外世之所謂聲名勢柄通顯芬華瘽身殫力争攫惟恐不獲決性命而不止者皆無意於其間頽然自放以酒為娛足以畢一日而已日畢一日以至于老族姓尊卑長少鄉人貴賤賢不肖與之偕無不盡意有酒必請公飲飲必為之醉醉中無僣忒之容游誕之語容益醇語益真以酒飲公者見其如此以為意愜曰與人接而無有一人怨斁亦無刺刺娓娓為厚者於機變權數漠如也予嘗愛莊生醉者堕車而神不傷之説然彼所謂全於酒者喻也如王無功阮嗣宗之流誠所謂以酒自全者彼猶有所托以逃其跡而混其不能平之心如韓退之所論非真有得於酒者也以其材氣之竒傑文采之超卓有聞於後有逃世之名而亦有敗俗之誚公渾然愉恬不斵其真名誚兩泯麴蘖之㫖真為我得豈不全與彼奇傑超卓者又何羨也然使公之才氣文采有以自振必且騖於世之所争而天者且不得全是則人之所不足於公者乃公之所不欲也公姓黄氏其始祖真為元司令自朔漠來籍於泉州之南安縣髙祖妃保曾祖光生皆不仕父傳為寳州判官公其第五子也娶王氏某之姑先公卒吾弟惟中銘其墓繼娶余氏亦先卒再娶許氏有子六人苞苗蕚蓮藻荇女三人苞蓮蚤卒苞娶趙生守敬蕚娶潘生守禮繼娶洪生守貞守大女長適張視次適陳拱宿三適蒋廷塤皆王氏出苗娶陳生守謙繼娶徐蓮娶王無子側室陳氏出藻聘蔡荇未冠繼室許氏出生成化戊戌正月十六日卒嘉靖乙巳八月初一日而以丁未十一月十四日偕王孺人𦵏于二十一都王山之原而余氏合焉銘曰來則寓名於生去則取號於死有所謂寄於此者方歸於彼胡去之悲而來之喜惟其生之不憂庶其死之無悔雙泉處士楊君墓誌銘君諱希憲字思狷其卒且𦵏而君之配石氏先卒𦵏于縣之塘尾山至是合焉君有子四人賢而知學者曰春芳纉芳皆庠生與余游将乞銘以𦵏君卒嘉靖丁未正月五日𦵏之日為三月九日几筵之奠未徹也二生乃屬其叔思和君來道其乞銘之意甚悲余方以不知死者為解比往弔二生頓顙於筵側久而後起哭而言曰微先生之銘孤等其無以𦵏吾父余為之傷許之於喪次歸而按思和君之狀與余所聞不謬可信也君性豪爽敏辨有口居衆人中遇有所談衆人方諠君談脱口諠者驟息以其善適機綮人莫能易也君敏如是顧善為韜藏周慎不欲以所長加人楊姓著於州而君父楓山公為徳國左相君固不為張出入居處絶去宦家藩飾宅臨通衢車馬填軋獨宴處一室往來徵游紛華漠如也相國公在官所宅門長閉升其堂闃若無人或竊從户隙窺之徒見一榻偃仰旁無侍者以此終日晚營楓山别業俟相國公倦歸屋宇締搆整而不麗草木藝植有列日游其間與人益疎而庭内事無纎鉅皆出意畫錙銖不漏一布袍數十年非敝不改為食未嘗肉也菲惡非徒為愛其微㫖要以貽後圖永使不近於靡敗肉食帛衣古所以奉髙年輔體悦口之具雖庶人得享之而不為踰也君既老猶然諸子竊制美饌輕裘敬進之固屏不御曰吾性固然至其資諸子游學交聘之費與接賔客治祭享未嘗不豐其好義急困時有所捐予不為齪齪顧吝有世之富者不能為也其自言性固然固性然耶昔相國公以經學名一時蔡虚齋先生髙弟數人其一曰楊孟洪是也君既以疾不能讀父書居常愧焉因以父書授四子而二生獨賢能讀相國公書君益資遣使就時師之能為虚齋學者二生文聲日起學官髙第弟子名二生君意不能無望二生宦達當身見之以為榮然知其有時亦不戚戚也二生所為屬銘於余其意不能無恨不及當君之身宦達痛無以顯其父而欲有所託也然君行年六十四而有四子二女四孫長子三子二生也次子庭實末子庭楠雖不讀相國公書並謹愿有家法壻孫振宗邑庠生名與二生埒王夢周宦家子居人世而情事如此其卒宜無不滿意而思和君而速銘又謂余曰兄陳宜人所出麟母王宜人兄繼母也兄事之如實出兄愛麟如實同出今其死不獨麟有喪兄之愛王宜人尤抱亡子之悼也嗚呼君於内行如是尤宜銘銘曰盈以為虧損為益維天之常百不失去盈之損君之徳厥後将大斯勿惑有如不信考此刻陳澹齋先生墓誌銘陳氏有姓於晉江自其曾祖順從外家徙通州而籍於泉州衛其始著籍從所壻之家為武氏順子二人長成由千户累起戰功為都指揮僉事次忠以文學髙等為學官弟子忠生錢塘教諭恪軒公寧勉義有徳為賢師儒歿後諸生思其教請祀於學教諭公生歸安知縣朴齋公及先生歸安公與先生始反其姓之本為陳氏陳氏雖徙未逺都指揮公以壯畧英特開閫全閩錢塘與歸安公及先生以儒業禔身教家陳氏遂望於泉陳姓行方新人稱之未習泉人口熟猶多言武氏云陳之為泉望不獨門閥尤以兄弟友愛名其家公從歸安公學事以父師終其身歸安公先五齡耳齒髮差池斑白相亞於行則随於坐則侍唯諾肅如也聲柔氣下竟日不見齒進退視所謂不敢以意主久速見者始怪為矯已見其造次無變迄老如一日感慕以為不可能嗟嘆内愧而已趨其兄之事必在己先視其兄子之疾休必在兄後佐其兄治嫂與姪之𦵏謀吉卜善必勝於自𦵏其妻歸安公罷歸善殖産貲髙郡中先生舍内常空甔儲瓶蓄蕭然自足無幾微望其兄兄亦樂其弟之甘貧不益以財以慁其趣時人兩賢之事母張孺人尤謹旦暮起居之適衣薄厚寒暖飲食温凊多少所宜以志逆為之節無一失所欲每察色笑得意向不待聲之及母固愛少而先生尤懽其心嘗潛行覘先生爨廩庖庫欲得其所不足以謂其兄先生輙曉所行行輙從曲為有餘以示無所急孺人竟不得所言事姊如兄喪之哀甚竭其情嵗時甥祭其母先生當期而往久之無所解兩女弟皆為士人妻愛其士人如弟先生既好學二士人皆有文而又女弟夫也相與懇欵特至偲偲怡怡有知其為兄弟之姻者怪其似朋友但知其為朋友之好者又怪其似兄弟也諸甥皆才事其舅加於母之存二士人皆繼室嵗中之先生之家十九而一之繼室之家盖先生所以感之歸安公生徒數十人多異才先生常以文最其列器於兄甚同學咸伏無譽弟之嫌累試有司無所合頽然在後生間頗不樂而值東宫霈澤賜諸學官弟子髙等屢試不第者冠服復其身先生欣然曰時方違我我且舍時栖栖乎何為榮君之賜而老焉其可也遂蹈舞受詔拜賜歸安公勉之不能止既隠不復著賜服婆娑巾屨歸安公每命之服先生曰負恃所有而不榮君賜是士也驕吾不敢果以為榮而忘吾故毋乃陋乎歸安公嘉歎之先生於兄有違者勉之使不冠服而冠服既命之冠服而不冠服然兄不以為違也先生闇然修飭無事皎皎襮衍之為光暉内映於世之紛華澹如也故以澹名其齋家人未嘗聞疾聲呵譴不至於臧獲謀於人不隠所長施於人有不答不責其稱與人交能敬久不為衰才智出己下者尤貶己下之其有顯者不為曲降有所求也為善以足其性而已深自覆匿惟恐有知其學深於古其才足以有為於世世皆莫之知惟孝弟之行以其積而不可掩雖重為覆匿卒徹於聞昔孔子論士以宗黨稱孝弟者為次然列士之品三而是為之次顧不難與先生才守既以不遇又匿不自著某獨述其孝弟有聞者以志先生之終嗟乎是亦孔子之所謂士矣不亦難哉先生名尚謙字正夫配莊氏生子諤娶傅氏生子元孫女二人長適朱液次歸某封恭人劉氏生子詵娶侯氏生子英孫妾劉氏生子詢女二人適庠生林益明其一尚幼生於成化癸夘十一月十二日卒於嘉靖甲辰二月二十三日以丁未十一月二十五日𦵏於三十二都徐倉里之原某為之銘銘曰有衣於此褧其表而繡其内觀之者以為無有而知之者以為晦其可得而晦者晦矣其不可得而晦者益章於外惟其晦之而益章斯吾銘之不愧莊孺人墓誌銘澹齋陳先生之配静順莊孺人以正徳丁丑九月八日卒年三十有二嘉靖壬辰日長至澹齋厝之東郊皇山至是其子諤啟封奉而合澹齋之域𦵏焉莊氏之先有官少師名夏者以文學論議出入兩制為宋名臣始自永春徙晉江賜第建坊御書其額曰名從今其坊圮而故宅猶存人目其家不曰宅而曰府以尊異之世次冠紳承代不絶於宋元間入國朝贈文林郎大理評事公士明孺人髙祖也廣西按察司僉事公琛曾祖也徳慶州判官公楷祖也安陸縣知縣公熙父也莊氏世詩書安陸公清約恬慤立家有禮孺人習其教不近於驕華其歸澹齋井臼饎焬滌浣之事必親不以生於貴憚苦不堪也慧敏足以輔家政澹齋内外事謀於室嘗獲顧未嘗自以為儀有所適主可否取與也於内外事微夫之命不敢行澹齋性孝而母張孺人嚴孺人在姑左右聲色無所違姑悦其敬順謂子之能夫也勉而事我久之益篤未有難者悦甚曰是婦之孝也其性與及其卒夫哀其無助姑哀其無以事我者哭之甚悲澹齋求續室事者於媒氏必問曰如莊孺人孝謹乃可求久之卒無能如孺人者澹齋竟以無室終其身澹齋之不室非以為思也然以求其似者而至於不得有室則孺人之賢有可思也澹齋嘗為某言昔先大夫以某之名通於陳以求婚澹齋謀諸孺人曰觀王先生之端亮明剴必能教子其子必材澹齋決於其口而以次女許焉盖先大夫與澹齋友孺人竊從屏間聴其談辯知之耳其慧敏足以有輔推此可觀也今其女以夫貴屢封為恭人而孺人不及見已孺人當𦵏吾恭人以足疾卧不能與祖奠流涕沾枕席頓首於褥間以屬予曰其為吾母銘予壻於陳聞孺人之言信可銘不獨以吾恭人之痛也銘曰不偕老以穀而同穴以宿穀之短而宿之長彌百世以偕藏魂乎寧此其勿傷王室顧氏墓誌銘吾季父少渠公持家甚宻家人於事不白不得行雖細碎亦然某以諸子從容侍公問曰大人不勞乎公愀然曰惡有不勞顧久習亦忘矣然孰使吾如此習者因泫然垂泣曰而叔母之在吾日與相好者遊越宿踰時而不還而門户啟閉不失節臧獲有職不惰食親賔嵗時吉㐫之好問贈賻輕重豐儉莫為之制輒得吾意客在堂當為酒饌與樂吾坐不起語傳入内頃之具治客必樂而後去有内如是吾雖欲習於勞惡乎而習之今雖欲不習惡得而不習因指其室謂某吾與之作是室也所知者材木之美惡工力之怠勤而錢米出入之數勿庸知也嗟乎孰使吾如此習者而惡得不念吾又有愧焉始吾為舉子業功倍而事左志苦而命仇吾方恚必有美詞吾且倦必有戒語吾為之慰且激恚不至怒倦不至廢今吾老而休矣其殁雖久慰激之言猶可記愧負其意也盖吾叔母殁二十五年其子敬中始克贊吾季父治域於錢埔山之原而卜嘉靖丁未十二月十四之吉以𦵏涕泣請曰母殁於癸未五月初七日敬中生五年耳既不能知母之事行學而未成干時而不遇又未有以為母榮敬中其為不孝人矣吾兄其哀之使吾母有聞也叔母之殁予亦少然以季父之言如此夫其佐夫之家而其出用當於事勉夫之學而其處義徇乎命不謂賢而可銘乎叔母出顧氏十七而歸吾季父經三十三而卒今少司徒顧新山公實其伯父宜得其重以為藏老不志少尊不志卑禮也於是司徒公為告土以奠其窆而某銘其藏銘曰其夫之思其子之材姪也銘之無年乎奚哀遵巖集巻十二

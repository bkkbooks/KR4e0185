body:
  text: 遵巖集巻一眀王慎中撰五言古詩郊工頌成也上親定南北郊之祀乃於國陽建南郊皇皇乎一代之盛觀王者之大制也作頌成二首於辟翼承序祗徳鑒昊蒼觀文釐元命造哲煥令章諍臣秉周禮納議光文昌經始揆皇覽測臬即靈壤巍基摩地軸層構羅天綱營陔三奇積疏陛四維張象形以剏䂓效運故乘陽躨跜白虎守蚴蟉青龍翔宅嶽既崒崒偵河亦湯湯縣圃激神嶽蓬壷峙中央啓度非近算祖烈今有光道存羲軒始典迪夷龍襄維新𢎞有謐作固亘無疆康哉宜有詠聖謨始我皇運開信景鑠符臻鋪洪勳重役不成日功資神理存周畿儉千里兹土直離分無閭控東户河菑浸南垠星辰上伾仡日月旁薄噴中天鬰嶽立遥望似雲屯滌室承東序營奥敞以温跂革錯綺繡𢎞敷郁鴻紛晶晶列疎櫺將將伉髙門勾陳翼紫宫廣袤綖周垣清澂集陽宅神居軼埃氛瓌瑋増殊觀招掲賁徽文恒滹鞏靈構萬祀永無淪烜烜作者聖率土奉大君習儀異典也南郊工就冬至四日上親勤玉輅習郊禮于壇上威儀卒度周折咸中小臣從觀其美作異典芝壇歛浮景休氣郁招清晨旭流翠葆泰風颺華旌飛龍麗重霄蕤綏在天庭式禮紆皇步篤恭軫聖情几几磩承舄亭亭雲耀紘秉離臨日鑒乘乾健天行升崇儼帝對納陛惕凌兢周折並圓方興俛以屏營萬舞羅臯帗廣樂敶咸莖度以哲罔忒文用道自𢎞卒事秩無諐百辟具維刑亹亹不顯徳千載揚徽稱觀牲令儀也先郊半月奉常奏省牲上親至犧牲所觀牲焉所以重祭敬祀率百司潔蠲也作令儀眡滌周恭祀卜吉漢迓釐於皇寔秉塞中孚格無知三時既不諐六獸濯以孶靈場翼帝圉御廩仡周圻充人共繫芻司牧肅來思大犉沃在滌羊豕盈郊坻革鹿既麌麌罝兎亦綏綏降觀移玉輅赫赫交龍旂宰夫脫柢楅典祝奏牷犧牲具靡瘯蠡肱麾咸甡滋展省帝匪康普存占在兹肆將貴備物和豫肇禋祠致齋明禋也郊祀前三日百官朝服聽誓戒於朝堂上乃齋於文華之殿百司各齋於公所作眀禋孚先啓元祀緼豫肅郊禋澄魂愉靚宫貶御抑尚珍沆瀣羞瓊飡蘭蓀靡文茵赫矣渙王絲咨爾天邑臣受戒鬰雲㑹祗詔燦星陳少宰職糾度宗伯蒞其勤秉徳思無射效衷慮自淳修服天閽側濯已咸池津禁闈穆𤣥軌省署洽清芬齋心賛皇徳率以見明神演樂恭命也郊祀已定禮官奏雅樂未恊上乃召張鶚使典樂且出内蔵金鐘玉磬使考校其聲禮官率奉常詣神樂觀演之小臣與焉作恭命至樂由陽作出豫肇聲元盡美嫓虞箾大雅廢復傳設業崇繁㑹樹羽列肆懸執翿俁碩人子野備伶官諧鳳鳴嶰管希聲韻朱絃始作若猋赴間奏似珠連升歌六義繹吹律八風旋靁鼔徹靈響雲和發徽彈陳佾奕星敷舞兆郁雲駢信詘五節㑹終始九變還微生屬休運肅詔濫朝冠審音徳叙辯晞綴景勳宣愧乏延州聽謬厠洞庭觀圜丘肇祀也長至日上御法駕臨于齋宫至期舉大祀焉聖容穆穆天神來格於與休哉作肇祀二首天閶直夜啓大輅下嶕嶢繁星燦芝盖劍珮一何炤前旌龍虎㑹後御鸞鳯交城人淵伐鼔砰鍧殷鏞鞀珠黄熉紫幄玉英流長旓𤣥㝠承靈蹕百祇欣來朝川后供眀水壁壘司庭燎圜壇槩上當泰乙光招搖百辟㑹有繹芾舄萃門臯穆穆天子徳欽欽肇眀郊禮成百代始律動三辰昭雲亭陋前觀虞柴兹晨紹練日候有望隂紀回微陽重輪暉紫極五雲昭靈光元后臨瑶宇庶靈紛翺翔繡裳彰黼黻委珮逓琚璜丹醴液泰尊潔粢維徳香灌流秬鬯㫖燔達蘅桂芳中庭羅廣佾雅奏諧夏英瞻昊四邸奠鈞天六變張佳色翔卿靄休氣鬰穹蒼旭卉仰信對􅂒迡斯孔享委祉答成祀丕顯况皇章頒赦大賚也郊祀畢上坐殿堂布赦于四方所以敷陽徳廣天貺以對天下之望也作大賚黄雲擁赤縣朱宫貞瑶光聖皇揚天恵布赦坐眀堂茂辰湛汪澤育物以順鄉黼黻摛宸藻紫泥從天降解作敷元化在宥喜萬邦舍逆失前禽刑厝釋桁楊黄暉鑒日竁祥飈颺𤣥方肆眚存虞典祝網侔殷湯神州鬰佳氣函夏欣乘陽幽崖無匿景槁壤有靈滂祲氛一以盪休祐駢來禳駘蕩奉帝則極地頌時康大宴慶成也初大宴舉於正月上已定郊乃以是日行宴饗焉皇恩流衍神人歡鬯禮于此乎終矣作慶成卿日曜貝闕彤霞䕃琱階執瑁來萬國祀成祝元禧設樂羅廣殿肆筵臨華墀我客戾有容庶僚咸格兹蘭席紛並坐鳴珮何委蛇俎折不虚歸杯行豈愬遲烝殽詠既飽酌巵歌于胥金石逓間作笙簧翕中暉行雲赴迅節麗舞從風飛下堂集象鞮樂闋竚宸晞鎬飲叶在藻佳宴厭露斯式衍光有孚終宴敬令儀何以效微衷率賦定爾詞秋祀先師恭述二首維馨歆嵗事有侐恭眀神豐功報宜重孔祀典尤敦眀眀天子命宣哲恊欽文咨惟百工長曰予克宅臣攝事昭我將奏假具惟寅庶僚既濟濟多士亦振振肆佾表殷薦大烹羞眀禋格思儼無斁仰止儀自遵大哉聖人徳展為帝者賓繁宿夕杓轉皓月璇穹明庭燎晰有煇灌芬鬰以升廣牡敶孔碩嘉盛登維馨清齊盈金彞和羮薦玉鉶皇皇旄帗列鏘鏘磬筦鳴脩容羅萬舞雅奏宣九成展禮式不諐於赫神具寧飄颻紛來宗對越儼相仍伊嘏錫𤣥漠王國斯克生良時嘉宴㑹賦公讌也良時嘉宴㑹乃在君子堂流雲承芝檻蘭幙徐風揚軒盖矚華景倬彼璠璵璋賓筵秩有懽具響臻時英中坐交鳴珮微賤慚所將玉醽泛雲罍珍羞充貟方蕙盤不餕歸康爵盈且翔馳光一何速曜靈忽西蔵遺志屬蘭晷瑶膏燦何長駢興瞻具美既醉穆令章顯允哲人徳樂只期之綱欽賢符姬旦式衎遵無荒福履永所綏百嵗垂芬芳遊西山二首良辰戾首夏肅軫遊西山山形何崒嵂洲渚亘相綿奔湍既下赴危峰亦上干􅞛谺石洞窈迤邐飛梁懸朱葩晞暘谷翠羽䕃隂巒閟室象霞構疏甍憑風騫抗宇凌層基列檻俯流泉好鳥揚幽音弱蕖濯清漣豈惟耽逺遊因兹達大觀拾乳歴窱􅌄擷芳陵㠝岏渟渟出磵淙靄靄冒隴烟水碧間清藻靈飇茁瑶菅履險神彌豁入幽情更延隠巖懐子真蹈海期仲連遺形九州外栖迹萬象顛崇深惟素秉神理迷真詮遊心迓沖漠斯道庶不諼鴟夷從左蠡康樂慕東甌屐冺無續蹤舟沉誰溯流至人與物化曲工逐時謀疑冰哂夏蟲將隨汗漫遊蜿蟺既沿澗崎嶇復經丘振袂陟危巘解纓濯澄洲石滑時藉蘭巖蹇或搴樛文芝榮華巔秀頴蔽平疇縁葉藂成帟潄泉戛如璆霏霏雲出岫淅淅飇扶輈㫖酒盈瑶巵臨風自獻醻身已塵象超心與灝氣游緬懐羽化客髙舉不可留精揺生乃勞慾淺道則脩簪紱為鞿縲撫己竟誰尤登真覺寺浮圖寶塔抜地躋蛟龍互拏攫層級凌虚空危磴盤屈曲上之逼星緯下則俯原壑超升曠我懐頻憩知足弱赤日耀珠光靈飇響金鐸身髙萬象出眺迥二儀廓蒼然見秦趙微茫辨渭洛風驅燕色來山川翠參錯飛鳥足下度歸雲衣前落避喧得勝因了淨無真着福庭如可留吾將從𤣥鶴普光寺睡起群動各有營蹙蹙不得息嗟哉尺蠖徒煩蹇牽物役豈謂塵中姿還寄雲外跡古刹絶浮氛法堂鮮來客首夏澹新凉偃卧不知夕覺來盼髙峯近逺各異色草搖席下芳筠散尊中碧鳥語無俗音泉潄皆洌泎俛仰愜幽賞去矣從所適登金山口絶頂二首峥嶸峙西隅其名金山口拱勢凌玉泉分宗自天夀捐騎朅獨往宛轉携良友攀石足猶滑捫蘿蓧在手回望目轉眴前首步逾陡及其登層顛諸峯宛相就􅐑峞各殊狀羅列若拱繡皛皛天宇濶俯之何所有入河湧我前落日在吾右微微見樓閣脈脈分隴畝時惟仲冬交衆壑已衰朽雖乏芬華敷彌増嶙峋鬬天風䬃然下飄颻吹衣袖丹霞翼素裾白雲生左肘遺形身已􅋖得意豈在酒兹山非吾土石室何當構神靈忌窮討蒼茫立難久地紀控西界靈山亘北甸足弱步屢憩崖峭石猶踐枝樛乃能援葛脆不可挽當其意象開豈復慮絶蹇瞻峰皆峛崺陟磵數迴緬稍覺天地寛即看雲烟變石竇枝自榮林罅雪尚泫興濶無近尋登髙有逺見周圻矗五雲易水濺一線微茫燕趙區歴歴皆可辯長嘯發靈籟倦坐石苔蘚氛垢苟不嬰沉慮斯可遣十二夜月清甚與張子同翫感述高旻蕩浮翳仲冬淑氣清凉夜何未央憩坐臨前楹舒景揚雲端皓魄委廣庭灝英鮮瑶席華彩鑒雕櫺稍稍風露重微微河漢眀眷兹天宇寛展讌諧芳朋撫景遺俗迫即事寡氛嬰豈惟祛煩積亦以湛心靈戒盈君子徳和光達士情葆曜貞有孚養晦善自名贈翁仁夫司𣙜河西四首洵彼南海英識子良在蚤抗志程令猷興文振華藻結誼值休運投分輸明抱浮嵗奄四踰世故多紛擾騏驥鳴櫪間康瓠以為寶撫事增慷慨沉思亂如搗思搗予何為遲子音與徽昔子當北翔予方滯南陲薊野鬰緜邈荆岑相蔽虧去住猶短蓬相失忽若遺朅來同朝侍永願承光儀光儀慰深衷聚散㑹有渝條風熙自南王事遑啓居揚斾首朔郊結軫臨廣衢惻愴杯酒間擥袪一踟蹰豈曰無居士非子誰為愉流塵奄忽至服馬遄馳驅馳驅越河梁河梁何活活霮䨴浮雲興淅瀝悲風發出門慎自愛志士忍飢渇遺欲有貞心秉義無回節臨岐申贈章聊以慰契濶贈潘樸溪督學閩州勉勉周王造耿命亮八荒賁文敷月􅙡離暉監朱方眷兹容臺彦作人東海疆卿雲耀紫霄受詔下承眀位以名教超道宜譽髦望閩陬詎匪逖多士良云皇祁祁白晳集濟濟青衿翔􅘱好易誖訛紛豗乃厥張亮美哲人徳樂只斯且光徽文蔚追琢修矩穆圭璋秉塞視不恌登明業自將撥予渥嘉好贈子愧周行上已日遊大慧寺后山二首三月三日英寮展迅薄言命駕遵彼西郊于時柔陽布和群芳微疎城烟初歛坰風來徐蘭若象雲而結構崗巒㧞地而輪囷遂乃促膝振衣蕩志盈瞻或拂石以嘯歌或憑軒而徙倚絃管迭御羽觴無數雖節謝詠歸而體侔齊物昔右軍興歎於蘭亭河陽發詠於金谷盖感茂辰之難并悵淑晤之易違也予猥以樗誕獲從群公率賦短章詞固蕪劣於以述兹要來未為詭於致乎雅性遺生迫微尚在幽深聫珂遵城隩肅軫逗河隂春氣柔且嘉明霽曠遥尋白日麗黄隰恵飇蕩芳林况此中園丘不異西山岑縈阜上巖嵌攅石下虧嶔覽物易成趣即景紆登臨陟峻或拆秀乘風時披襟目施晞陽葩耳夷恱候禽留連塵外侣放浪阿中吟寢痾悵在昨真藴愜自今良時展芳宴乃在西坰囿珍木敷丹霞翔雲冠篁竹柔條紛葳蕤揚蕚隨風郁命酌臨疏檻改席俯岑蕚徽絲啓麗節簧筦逓間作烝殽歸不餘馳爵無虚復式敖懽具美迨辰曠行樂不顧好無荒但恐沉曜速神往物俱捐形遺思自豁令儀欽末要脩矩誓逺服題陳棟堂詩巻幽人寔坦坦深心耽𤣥素久稅箕潁田亦結商丘侣疏池涌文瀾茂林挺喬樹丹榮彤霞敷繁隂鮮飈貯眷此商櫟姿復愜濠梁趣放志遺塵蒙葆光湛淳慮飄颻扣角吟駘蕩乘烟步丘壑有信美紛囂豈予慕得真故後悴鑒止隨淵注達生取自適永與智者晤題鈐山堂鈐山一何峻其下迴秀江洪瀾萃浟湙聳觀鬰崆峒蟠勢既麗廣降神奥且彰渟淵渙躍虬崇巒毓儀凰文羽覽輝集神躅應運驤黼黻摛宸藻絲綸賁天章迢迢美人居髙遐播烈芳阜址俯碧流抗基憑層岡面岑迅鴻赴榮巘儼鵷蹌嵐翠代堊黝璿源濬圓方白雲當户生蘭蕙盈中堂逺色映華薄清音逓璆璜懿此丘壑姿美哉輪奐張信矣翬革㑹諶兹締造艱湘臣蹇好姱衞公貴苟完承雲結桂橑納景豁芝欒疏繚停夏霰温房液冬烟修宇敞楚望鞏構永南觀畹卉貝殄嘉遥芬隨風宣藝荃先鳴鴂列椅竢翔鸞潜鱗濯素波激瀾汎粼粼九花赩陽室隂隅涌琳泉瑶瑟依綺幌書史充文軒雲霏應序改緇滓坐相捐靈集名與俱景異致自𤣥應龍時興雨澤豹終還山送王在菴之江西伯夷惡一世季與鄉人皆君行慕往聖其為栁下儕至和以飲人順物無安排豈乏涇渭判頽然冺岸崖揆予拙直姿涉世寡所諧烏足濫交籍守官幸見偕貌殊同胸腑言合外形骸大道固難聞眀誼良可懐肅肅簡書畏裾袂臨當乖清霜變濼水落葉流長淮扁舟方大江𣺌望不可涯興言託短章投贈愧瓊瑰章江校士六月十七夜月有作因示諸屬日入群動息予亦遂休兹稍喜喧濁屏徙步臨前墀仰見明月出忽與心賞期湛曠神俱王虚眀意自宜況逢時雨霽宿潤含華滋品物各懐榮因得静中窺始寤𤣥寂理寧為躁競知亦有盈樽酒屢進不一持非為莫與同真賞豈因之浮凉却煩暑明月流下地清輝濯雨餘皓質離雲際行失衆星光鑒徹繁隂蔽宴坐及宵分徙倚不能寐欣兹吏牘闋久已塵營棄淡泊道心生簡編非我累豈乏校藝長方慚作人智群司肅從事謬以斯文寄如何朂周行勿云在下位題憲長竇公所蔵張平山畫居然不出門滿目望巖巒噴泉疑夏冷茂草若冬温石罅樹根裂壑底湍流奔飛雲窮昏曉依依在楹軒兩翁形貌詭御氣而長存不老驚世古無言知道尊徒令好静者入室思尋源安知尺幅上墨妙能使然新理西齋竇晴山顧雍里二僚見過二首新理西齋居欲便微疾養未能形支離且免事鞅掌榮階雖接聫下秩自閒冗興至多往來情忘無少長愧乏盈尊招恵䝉芳駕枉展席隠蓬中開襟當月上清言屢獻酬永此良夜賞引領見眀月遥從東方吐團團清漢懸隠隠髙城度素節已輕飇新凉稍多露蒼然林外山含景美遐顧情忘澹空明形骸息喧鶩從容攜手懽開奬同心晤耽翫不知晏爾我自成趣送劉方伯入覲皇圖尊中宅江漢宗海水萬國若川奔滔滔流不止列藩海岱表作牧方千里既奄伯禽封亦踐太公履尊親與尚功治人臻至理述職固遵期報政亦嗣美㑹朝四門闢天王正負扆班位首東方群后何濟濟聰明極遐廣垂衣穆恭已頒瑞冒分圭褒賢書賜璽天問如從容念此東人子劉函山招遊大明湖輕舟恣所往適趣何必深居然在城郭而得混魚禽翠岫逺銜席緑波清照襟明湖既得性芳嵗亦娯心暮景媚涵水春風吹滿林岸木稍變色汀草微生隂浩蕩紛言笑滿盈逓酌斟不能日日至勿云樂太湛遊大明湖晚至北極廟登覽春城足遐觀攜手復嘉客欲極髙深趣停橈理輕䇿林木飛鳥還蒼茫烟景夕反照射巖丹遥空帶水碧山色晦彌明人聲喧更寂燈火起閭閻漁樵散原澤當歌浩思盈對酒沉憂釋不知驩娯滯天表生皓魄悔志早受天刑拘遂耽人爵貴强學思干名樂仕忘竊位結交託時豪然諾重盟誓祇好朋友懽拙為妻子計約遊見星趍赴急若飇至掉舌常屈人扼腕獨憤世出言譏王公慕達不事事傲睨多脫畧嘲慢無嚴志輒希孔門狂自比周士肆擇術謬毫髮千里遂不啻反躬盡愆尤考古何乖異多忤豈通方易盈知小器不聞長者言下流良足畏行魏縣境中聞縣尹魏君為政之善魏君適以事他出不及相見作此貽之天風吹枯蓬我行何悠緬已盡前梁墟還趍故鄴甸物色含人情游目皆可見馬首猶此疆彼界遥將辨芳村鷄犬聞微術牛羊踐桑棗原上繁麻麥野中遍生厚地力墾令簡人心勸田閭事耕牧老少樂熙晏觀俗感予心為邦美時彦不覩瓊樹枝空看花滿縣再至魏縣而魏尹未還賦此奉寄兼以為謝行役不遑安飄飄同逆旅晨發旰未休僕夫譙相語旱氣起煩雲驕塵長新暑素衣已盡化揮汗欲成雨名城暮自投倦翼非斯舉邑吏忽來趍司門不吾禦隂沉華館静鵲巢俟鳩處坐享庖廩供水火求輒與竊食慚本心愛此民性古再至已如歸轉憶東道主貴溪贈江貞齋學士跂予懐夙心願言見君子抱此未能降光儀違覯止祗役出名邑及君在桑梓攝衣升髙堂弭駕依仁里蘭室盈芬芳下風吐詞㫖敷文比霞郁馳辯若流水大智問下愚冲襟忘末齒謏聞謬見推狂言不予鄙昔人傾盖談今日諧斯理新知信可樂投分從兹始遊白鹿洞素嬰丘壑情况稟英賢想寤寐懸宿心遊盤得兹賞重隂始晦蒙杲杲旋開朗攬勝據巉巖探奇歴榛莽境閑百慮空意愜二儀廣野色浄巾衣秋容成物象菊含露下英泉作山中響柔葉稍朝零剛條非夏長景光易流徙今古同俛仰躊躇悵回軫何時還獨往白鹿洞書院昔賢敦雅尚設教託靈壤妙得髙深理非闗山水賞道因名勝尊神以流行養時去跡空留風存化猶廣宏基茂草餘巍構浮雲上無事鳥頻飛有懐予獨訪林芳鬰紛敷庭木自成長泉石有餘清絃歌輒遺響川水逝如斯山形高可仰徘徊西日斜惆悵前人往六合亭亭宇憑虚空結構出妙境攀援藉葛藟毫末凌光景豁達四天通夷猶雙目騁雲生當正襟風起吹方領泉脉散千峯湖波澄萬頃烟霏自開歛魚鳥各翔泳即事天機深忘言外物屏始知世上日不比山中永髙美亭懐徐少湖林麓莽蒼蒼亭幽人獨上縈迴瞰巖岫沃衍觀田壤嘉卉散異芳珍叢發新爽微隂益峯髙始霽壯泉響跡羨魚鳥聞心忻草木長不諧意所欽終未極兹賞徳興縣公署開門日無事蒼然嵐氣入瀑泉流向城山鳥鳴在邑公室剪茅茨土階無等級閑曠慚使職淳質見民習几案簿書空輿臺端拱立馳驅何以慰時雨潤原隰遊麻姑山雲出本無心擇棲多奇巘類予慕真勝涉趣不知逺初縁碧澗行㡬傍丹崖轉林追去虎蹤蹬躡飛猿踐泉流逓淺深巖谷變隂顯濆瀑遇留憩石床時仰偃桂芳洞裏秋霞映山中晚探異尋前期入幽忘後反神遊力不悁理愜情俱遣天路如可梯欲以微官免仙都觀吾生罔象求飄忽御冷風舉足踐元氣天門見開通美哉不死庭觀闕何嚴崇琪樹敷珍葉虚空出蘃宫仙人初降止鸞鶴紛來同赬霞晃裾袂二曜眀兩瞳玉體垂一臂接我游髙空手授𤣥簡文跪讀未及終倐值衝焱過吹墮緑雲中恍若形骸䘮俄頃還舊躬因思在人世擾擾如鼠蟲仙都觀午食世人安美食日日事甘芳豈識有真士飡和吸瓊漿珍肥祇腥臭粱稻如糟糠未能絶世縁形為調饑妨雖不貪外味猶欲飽中腸炊烟借丹竈載匕升石牀兹愧小人腹難期辟穀方贈饒州張明府汝思出守君建侯來旬予濫使相逢職事頃獲展平生契輿誦聞載途成功皆可記愛人百骸勞折獄一言費田野鮮諍畝公庭無留事鄱水郡前清芝山郊外翠全牛目已空害馬心能制庇善如鷇養去邪類獸薙特立好奇節平施忘小恵既多忤俗情復少恱人智迂謬同素心感慨興昔志雖匪觀風者庶以吿在位饒州閱武贈屠兵備桓桓使者居扼楚復持越割鎮山水邦並提虎龍節廟畫用老成戎機資明哲指揮不須臾頓使精采别好整兼多暇教民方大閱中軍靁鼓動前表帛旌掲馳驅馬足齊坐作人聲絶草木助行威魚鳥皆成列千屯知擊刺四境無盗竊風静鯨鯢波氛收豺虎穴從容尊俎間談笑外衝折予本好奇䇿當歌生壯烈餘干道中寄懐江午坡僉憲湖水日夜緑輕舟隨泝沿肅肅賔鴻羽命侣悲楚天征人正盈抱坐使憂思牽所思何為者我友阻良縁昔望濶音容㡬經芳嵗捐緘素詞難極馳情間山川今來接面目曽不須臾間四體為人役從事嗟獨賢倉卒執杯酒沾唇不下咽新篇何由覿妙理未及詮宿懐如糾結待子解其纏乍見翻違去持此竟莫宣寄江少峯評事少峯見枉贈章聊爾奉答兼申後期相期千載餘忽覩一言合玉振發芳詞銀鉤灑妙札枉擲重兼金舒巻常在榻把玩再三過離思千萬雜征途日向西撫景嵗將匝舊酒憶宵持新裾遲春拉莫言緩報章髙韻難為答曉發南康簡書委陋躬徂鞅戒侵旦徒御帶寒色初鷄響空館城魚鑰聲開郊隼旟彩散明月稍低山疎星猶在漢蝝息方自蔵棲禽亦未囀因兹風物情彌切勞生嘆宿東林夜月等是諸峯裏到此居然别蓮池鑒浄心竹徑踈𤣥髪前嶺斂浮雲中天吐華月輪浸千流满鏡懸萬景滅魄豈縁朔生光非從夜發仰視歩庭中一與山僧説侯民部靜溪招遊甘棠湖陪憲使管復齋諸公積雨夏隂生瀰漫湖水遍悔為一室拘幸逢方舟宴逺嶼微出江雜芳正盈甸沿流始泝洄逗浦更遊衍樹色逐橈迴波容隨望變放情魚鳥間景昃不知晏雲氣輕嘉體蘭觴易酬獻一杯己可歡况以偶時彦宿東林寺雨税駕託精廬入門微雨作稍聞響前山還看度髙閣霏霏雜桂烟瑟瑟寒風鐸潤益香水生散為諸花落過林悟本空行天覺無著能令執熱人歊鬱忽如濯聞移官報至示舍弟道原孱䝉自弱齡幸禀嚴慈誨束髪通朝籍辭親千里外猥持小器資不克大車載好近為善名頻復多言悔求全易生毁過渉因罹害虎尾獲安寧鷄鳴興怨艾浮雲始悟輕遲日深知愛將乞簮笏投歸奉垂堂誡矢志未及伸新恩來至再金馬忽奔投九重羽檄逮渥哉寵命臨敢云稍懈怠題朱文學萬峯讀書所築室向深山群峯莽迴互紛紜不可選舉萬當盈數甕牖嵐氣蒸桑樞流水注一室豈不拘所欣在竹素圖書左右陳日與前人晤上窺乾坤倪下覽霸王騖胸臆恣鑚搜仡仡窮昏曙形遺同槁木意豁懽披霧此樂將永年終身堪閉户時人那得知頗用譏顓固宿靈源禪院拘拘有妄身一一不能捨形骸自束縛日使道心寡偶同片雲閒得此憩蘭若奇峯千萬疊一𣲖飛泉灑颯颯天風來松聲如雨下㝠濛衾幬深烟靄翠盈把不滅慧燈懸照兹四體假始知房闥卧息偃類奔馬誓欲託名山於焉投静者荒茅便可芟無為俟聊且洪芳洲養疾山中恵訪草堂因而留館裊裊桂樹枝凉風日將變生色難久留華光苦流轉夫君如不來何以慰偃蹇今夕良何夕悠然適我願片雲本在山出岫亦游衍吾園雖蕪沒物氣皆疎逺以兹城郭深豈必山林善開軒散煩促憑楹息步踐新飇起草頭白月浮池面蕭間秋正初徙倚夜方半君自所好殊疵吝何足眷談十山年兄枉訪叙舊卒然述懐因以為贈釋褐記叨宴曲江栁初緑吾鬢矜似鴉君顔正丹渥日月何其駛崩迫類轉轂薾疾屏郊居蓬藋森成束何意擁傳榮翻然賁愚谷鷄犬疑組纓騶呵恐僮僕相見若新懽握手競瞻矚容色已非故交態猶在目開口長河傾稍稍悉胸腹駭甚遊世機追數畏途躅功業存憂患形迹混寵辱南徙邇璚島西行窮涪蜀由來材具大細巨無不足多閱時務深涉險道情熟行年未清艾令徳懋前朂披晤解悁勤側聽知藴蓄踟蹰嵗寒心繾綣問幽獨文囿可戲娛䇿勲在簡牘鳧鶴有短長勿用强斷續君其茂竹帛吾當守松菊送談十山公廣東左轄文昌星象動移轄向百粤國事倚財用天心生俊傑盛年好䇿勲陳力在髙列閭里苦疲瘵軍須復匱竭時變資兼濟權機難預設恢宏文武姿出入霸王說髙屋建瓴水何當喻敏決千牛解崇朝硎刃猶新發受才正爾殊處地值方蹶瓊海揚沸湯桂嶺長蛇穴五材誰去兵峒箐常流血負弩煩諸侯行路多持鐵官邪乏糾摘綱條日隤缺一岳勢已尊四維賴手挈豈徒酌泉心不愧飲冰節妙畧神弛張坐制蠻夷謁丈夫異草木身名惡澌滅功烈勇自致金石窮冶伐餘事取富貴斗印肘間紲請看嵗荏苒容易凋華髮遵巖集卷一

body:
  text: 遵巖集巻二十三明王慎中撰書與鄭環浦久不奉見亦遂不得承貽教區區向往之念深矣一旦使至獲領尊札喜可知也教言大指嚴於名實之間如兄所謂務實勝者矣一時尚言之風宜不謂兄所滿況於詞章又所謂言之華者宜其盡投烈火而無所愛也弟因此言亦竊有悟矣習氣已重未能遽除時時誦兄之札以自戒庶其漸損耳紀山先生愛吾之文自其所好之過非吾之文果有可好也兄亦何用問焉何日獲侍左右得質所欲言與朱祗齋久别幸得奉見慰浣罔喻然公歸思方急不能一縶白駒為信宿之留欵聞緒論以開蔽陋以袪憂寂用為缺然耳公充飬深厚以道自信不為榮寵闗情淹滯遲鈍益見闇然内脩之實頽俗競躁之中得公表厲之亦是一時碩果也非佞非佞家慶雖樂而王事有程早晩當促裝所有寄舍弟家報僭以附從者行李知通家之慶不以為凟也與江午坡書一踈問久矣若甚闕然徒有此心而已聞兄家居行峻跡髙皎然塵埃之外寡與人接既為潔浄如此其所得宜有過人者僕甚欲聞之也僕嘗愛漢人不夷不惠可否之間之論伯夷之隘至於舉世可惡栁下惠之不恭則鄉人無不可狎此於人已之間尚不能無失惟持其間而已耳故僕之所處固不能盡與鄉人偕而亦不見甚有可去之人此吾之所志也以彼二子所造之至猶不免有隘與不恭之弊吾之頑鄙乃欲兼用其長兩去其短宜其各無所得清和之名交失而隘與不恭之訕並集於身也然吾終不敢以此悔其所志惟當咎其脩之不勤踐之未實而益勉以求成耳僕所處得失如此聊舉以告以當面質兄必有以教我也居閒讀書觀古人之言得其用心之所存恍然若與其人並世而生同席而議决然不敢狥近儒之是而阿流俗之好此率難以具於書且亦知非兄之所欲急聞者其作為文字法度規矩一不敢背於古而卒歸於自為其言此在前世為公共之物而在今日亦為不傳之秘欲以語人都無曉者尤思與兄道之昨因幸晤令兄少峰先生稍進其説屬其歸以相告以求有合吾文尚未錄往而洪君之作為之先洪君之文固僕所畏以為不可及而於古有合者也兄若有契於洪君吾之文當繼往如其不然則當藏之以待他人矣中泗草堂尚缺文字緣未明泗字之義此小節曽略評之少峯以告肯聴否無限欲言何由得悉其二文字之學已是吾輩第二義此義亦復不明則真可惜此一生聰明矣向在薌溪舟上廬岳寺中與兄所談雖不䝉全契亦已半合盖云文論未然而詩評良是不知别嵗十年舊説在兄胸中曽得全契否石生往謁所持僕文字頗多倘出觀之以為何如也弟近来詩律益下恐不但未然者難契而所謂良是者亦且不合矣如何如何中泗草堂詩石君督促甚急然欲作數句可人語非迫迫所可得故賦詩一首以為寄盖石君相督之言云不得詩無以藉手見師門其勤如此觀石君此意不獨事兄之嚴待僕良自不淺今亦勉副其意使藉手往見者其詩之陋乃若彼信可愧也弟病體近嵗覺漸蠲減非藥餌之力惟於起居食息間用工夫故日見得益耳比得唐荆川書盖與洪芳洲君有武夷之約期吾往㑹之於幔亭雲谷之間倘此期果遂便可訪兄為鵞湖之㑹矣事雖未諧談及亦自増意氣也石君志行識趣極不辱師門相見知甚喜恨不及與席聴所言也與江少峯書一以僕思見兄知兄亦欲見僕然僕蹤跡不礙自可行遊而兄守官有次難以自便是吾二人之不得相兼其責在僕也況莆中良友相知本自不少不徒見兄因得他訪豈不為樂顧坐守一室失此勝晤捧札慨然祗用増歎耳九鯉麥科尤名竒絶不徒訪晤庶得覧觀興言及此身住心馳尚冀因兄在彼誘我佚興逭此惰誚也俟努力圗之伏讀閩游雜詠雄調麗藻蕩耀心目底滯閉塞之久忽焉開發何快如之過南平縣一首直與古人並驅叙情陳事軼宕古雅少陵昌黎未分髙下也觀競渡末聮書坊避暑禪寺頸聫託意婉曲造語工鍊唐元白集中亦是佳句矣武夷山歌直以信州龍虎山相匹云無間然恐不得為定論兄信州人過占地位便欲吾閩武夷與貴鄉龍虎同價耶呵呵投檄徑去之説終涉過髙恐此意横胸中觸事易露接見監司撫臨吏民或不免有作意處便是此一語作種子故長枝葉也僕未見兄輙妄有論本緣相愛又恃相知得盡其説倘所億不中則失言之咎在僕更為幸也有便不吝見示為望午坡兄聞已有二子更復何求中泗草堂不知作何面勢景象尚缺一賦也秉燭草草其二一見之歡何物可喻惟有昔人披雲霧而覩青天之説庶彷彿此晤耳恨公尚帶宦氣匆匆而去使我無以為懽情不能制遂見於詩策勲竹素之林固是僕事雖知其妄而不可輕自菲棄公則宜宣力清時未得輙言巻懐之計也贈意既具詩中比不復煩悉然公論詩取與猶有與僕乖異者如昨所舉唐詩一聫以為小兒强作觧事則吾兩詩之粗陋又何足以入於目而諷於口耶唐君於詩深矣尚䝉小兒之譏吾又安能作大人口語也或者取與之乖顧以僕所作者為可亦未可知然吾方决是非於公而為乖異如此雖謬䝉見可僕亦何以自信矣歸見午坡賢弟家庭細談之有所契合可以見示如其未了亦望勿惜往返也所云近作賦一首古詩十篇及壼公山羣公和編均欲得觀之當勿愛也與熊南沙一時同朝數子僕所得與以文學意氣相周旋者今皆以罪譴廢放或為吏議所格罷甚或夭死不存也天於此輩人豈都無意右之抑其人皆以聰明才敏盜竊天機播弄造物自當得罰耶諸子中聰明才敏尤最者宜莫如南沙宜其有此不肖極為駑下不能有所賊害於天機造物而亦謬與諸子同過有可愧者不肖罷歸遭罰尤惨先君不幸捐舘舍使不得數月為飬㷀㷀幾殞僅襄大事稍復脩魂魄苟求存活而室人化去今以癯然疚疾之軀上事老母下撫弱子室中無相甚苦勞乏區區之心方欲竭其天之所以與我之聰明穿穴簡冊簒取其所藏畜以為盜竊天機播弄造物之魁傑而無所畏第以㓙釁仍嬰精力凋耗雖欲自竭而有所不能矣柰何柰何已不能為猶願兄之為之惟駑力自勉以副不肖之望閩蜀相隔真如各天相聞極難但使此心常如昔日則越在各天亦若比鄰而處同席而談矣與劉白川書一因潮中諸友請文之故而得與賢者具姓名遂為未見之莫逆此尤竒特事也僕雖鄙陋其與人不敢苟然務廣而不求自信既與執事為友尤欲得執事為政守身及民之實以信其心而定交而吾之所得聞者皆言執事守身有法及民有恩卓乎一時有司為政之善者矣以此益喜自信願附於賢者之交第愧其鄙陋不得當也環山樓記謬辱逺戒不敢以不能辭春初值老母體不康朝夕侍湯藥不得近書冊況能搦管為文乎春盡老母幸平復稍得自休而百十間所壅廢酬應之事俱當積於此月償荅尤為不給其於此記心雖至而力誠有所不専故尤不足觀其何以副逺戒之意甚可愧也區區之心思一擔簦往訪羅浮韓祠之間以與賢者㳺而滿其定交之願勢復未能徒抱恨於無窮耳何如其二某不揣竊有志於古人之道而學其學既為其學則其於言也亦必合乎古而不敢苟此某之志也中間為世故之所移奪其守不堅而其志亦因之不篤其於古人之學為之既不至其後復為家變之所割傷盖収召魂魄招還視息之餘而精力凋耗十殆七八雖有篤志而力又不逮矣行年四十而未有聞此某之所大懼也學既不至益不能慎其所發以飬其深其言念有餘雖其意度㫖趣往往與古人合然學之不至則其所以為言者亦非矣欲悔不為以厚其飬而潛其深而習氣未除時復為人牽引不得自己且其所好在此亦有不能自己者良用自愧以其有合於古故大駭於今即此可悔之文其不為世之訕笑而詆棄者鮮矣不知執事何以獨好之而必欲得之也豈非有厭俗追古之心苟欲取其近於古者以自輔耶此某所以愧其不足不敢遽當執事之重而又樂執事之髙雅而不能自外也某雖篤於自信不以今人之駭嘆而有所變而樂與人有明之心豈無汲汲於共此者乎此所以值執事之髙雅不知其為幸遽以其不足之所得當執事来意之重而不辭也與項甌東僕所遣人還自三山得奉荅書甚慰方遣人時正與洪君語度其不及不意及也而公於治行匆匆之際復教詳至如此不但仰感情誼之殷又以竊知有道者所飬從容暇豫終身無造次之時與所謂前定而不困者固此事也来教所云孔老異同而為文者不當雜出於老子而當一於孔氏之言其所及孔氏之得失雖未得其精要而欲學者一於此而不出入於彼義則正矣老氏得失今未暇荅公書本非為老氏發故亦不必荅也惟所以論為文者其義雖正而於識不為達也文之為道固博取而曲陳惟其所以取之者雖博而未嘗不㑹於吾之極故謂之約其陳之雖曲而其義有中則曲而不為雜南人周任之言每舉於孔子以孔子之聖豈不足以矢口為言而於前人之言時有舉焉所舉有前人之言而其意則吾之所欲言者矣龍子公明儀之言往往迭見於孟子而陽虎之暴其言亦有可以發者老氏之賢固加於周任公明儀龍子而南人之陋陽虎之暴又不論矣惟其有取於老氏而皆出於孔子此所以為學孔子者之為文者也今稱述必在乎經援引必則古先王如書生科舉之文者豈不為正而豈可以為文而亦豈可以謂之知道者哉有甚似而實非有太反而正合非獨文然凡人之事業功行皆若此矣非公之明何以語此義則序已付黄生入梓矣先此呈覧僕於此亦自謂不為苟言者公得無又以其雜出於莊周而病之耶有以見教毋惜便風千萬之望與程習齋某廢棄之跡只宜屏蔵加以駁謬之學乖忤之氣尤不當出與人接而數年之間貪侍大賢之教不能自隠又辱公不以為不肖而知之深待之隆此皆他人所曲求詭望而不可得於大賢者而遽以施於不肖之身若傲然當之髙自蔵閉是為自取踈外而孤大賢之知之待以此益不能自隠雖數年游處談語之頻皆以道義學問相切劘絶未嘗以絲髮之私干於門下可以内省而無愧然蹤跡往来混於塵俗他人之不諒者宜其不能信吾二人者之無私與私求也然此亦何足置之意中自今以後僕亦終自隠而不復與衆人同隊而趨出亦出入亦入也無限之懐臨别亦道不盡今於書問之間益不能具矣惟駑力自勉以副兩地相期之意云耳與萬鹿園久不奉聞想企未嘗去晨夕從舍弟處轉収得公詩教𤣥悟深造正不當以律調之作論之然律調亦自成章也聞善權精舍之築頗費道力公於世已可無住豈復為一丘之美繋止耶未得往游其間深用増歎有何題目欲作文字可以見示當為作之不徒留名山亦將以語言華美助道人作一叚㑹供也僕今嵗正月八日室人捐袵席而去弱子幼女惨然失恃而老母年力就髙無可佐執仰事之勞日月雖已流易而撫物觸事尤増酸楚滅情之學真是空説到頭始知其不然閒時讀莊子見其所記妻死據牀鼔盆而歌雖病其放於禮而亦以為達以今思之彼乃甚不能遣者而姑託於放以自觧耳其為悲傷無乃過於慟哭者乎業縁不斷貪愛種種家事猶有難處者坐此不能出門行脚未是髙僧以吾所累若此正自不可及況復可望公上乘真詮耶明年圖襄室人之事正欲走力往江西迓魏山人偶得友人報云渠方㳺淮上計其往依公兼以術行耳望即為語之令速入閩更勿轉逰他方其入閩所過處亦須囑令勿因滯留也此舉塟妻則自蔵亦具一舉两得矣長子年已十四三四年間可以有室倘能持家吾亦將出從公逰也尚平雖髙然五岳之行亦必待婚嫁既畢然則吾之遊亦未為晩而其所以為累者亦未為非人情與魏山人来公必有示我望詳切鎸誨併有近刻何道門秘藏諸篇吾真欲讀之也紙外無限馳心與周澱山曾於三洲公處見公致仕移及手唘深服髙志逺識而三洲公猶深為地方計慮以為一日不可無公僕以為一日業其官則子其民如果欲去則固有志安得為二三子者患於無君而遂輟其志哉觀公移文頗有懟語僕不以為然也公在莆且三年餘何嘗有不得志之政不如心之事今豈不得其官而去耶如以為不知我者公之為政如是豈期人人之悦者想已定計於早惟當守此意而不悔耳豈其今日始見有不合而乃欲去耶賢者之出處固當决於心而不必因於事也不知三洲與部使者所論如何如部使者所自為計只有留公一着公如决去恐不免遣一力持疏入京也如有疏入京則忿懟之意不必設於詞尤為賢者之舉矣愚見如此不敢不為公盡也值三洲使人去迫倚几潦畧尚圖續布然大㫖如此也與安膠陽承不逺三千餘里特使見存屬以文字之事其意良厚而誼亦甚髙自度非鄙陋所當䝉也久留来使意欲從容旬日勉竭思慮於文或有可觀者今乃若此又悔不如早落筆免淹使者兹乃重増一愧矣請文厚儀謹以奉還僕非為亷也平生門户甚寛於辭受之際不能為狷尋常交際如今人所謂接以禮者猶多受之況於請文之禮固未嘗辭也而乃介於膠陽數千里惓惓命使之所委者乎凡僕所謂受其請文之禮者皆為其父祖大事或自名其堂室而乞記之類僕為之文則為有寵於其人之先與其身故不可不受之以副其誠而不宜為拒也若膠陽所請序乃有宋曽南豊與今唐荆川兩先生之文此吾黨之同願斯文之義舉僕於此道非但有勉又最留意苟得聞之欣喜滿意將為同好致謝於膠陽今乃以作序之故受禮非獨無復亷隅且是都不有意氣也幸鍳此心請勿訝其為拒又請勿譽其不取文粹刻本甚精足以知博雅好事之所用心其中尚有訛字暇日得荆川先生一閲正之更無憾矣荆川集刻成併文粹肯多寄數十部不必甚佳紙但多取數部盖欲廣惠海濱士人使讀之倘讀之者多得有知焉則於膠陽刻書之本心為得而其功不小也末由相見欽企髙風情與簡馳與張考堂正擬遣力與執事相聞而郡中人還自三山復収得佳札藹然情誼彌見深切鄙人苐有感念而已至於相推褒之言踰真溢美又増愧也平生無他所長獨於讀書觀理少有用心處毎誦古人之言即能以意喻神領得其所以為言者不待傳註訓釋而後通也至其所喻領又有非傳註所及者稍出以語人輙䝉詆誚非直時俗講習已錮不可遽諭亦學問未至根本尚淺不足以信其言也詆誚既多流行漸廣遂為人所指目今已絶不敢出此語特時為人作古文字及與後生庠序之士談舉業而已而此門户途路本不好開不易行坐是亦召人之嫉忌然吾以為舍此又無可與伍者今當刳心離形使智故盡去能與鹿豕逰而木石居則可以自驗其徳之進而於世忌不待避而自無矣尚望賢者有以警發我勿以久不相見而棄之也時事漸艱願賢努力自愛進為於世以副吾黨之望荅宋仲石一昨承枉訪草堂責以論文之益荒陋何足以副髙雅而誘於盛徳冲虛之下輙忘其陋妄有所論豈能有益於髙明而徒以自見其妄耳然使僕得盡其妄而公之髙雅益著是僕之論議雖無益於所質之義而獨以其傲然草堂無能之身發明邦君篤學好問之雅則不為無助耳惜無筆力述此若見之文字他日亦可備草堂一故事也公别後與逺客談契濶至夜分而罷晨起又荅同年江少峯遣書來問簡中有詩一帙乃其自著者随為覧過輙評以復其人既去值體力稍倦據几而卧家人呼食方寤於中庸要説未及觀而公之教至即此亦足以見下問之勤而僕好學之不篤也可毁之論自貶太過今人有一言半語之長便自矜喜惟恐人不見知公所著已成一書且尤有資於後生講習之益顧過為謙退如此豈可及耶僕雖未觀其全然昨已對公讀其二章非未窺其美而妄䛕也草此奉復俟卒業有得再請教耳序文稿改削豈所敢當若即以尊文之意自加序次以二人所序相較以觀運筆之異同亦不敢辭弟數日領人文字不少有坐索刻期必得者若督迫應辦不前恐無餘興及此柰何柰何累辱降重不一往謝知公能相照於形迹之外耳二側聞榮拜膳部深為喜慰自侍公教每聞尊語云惟得一禮曹主事以為至願而恐不可得雖公謙言知出本心今既如所願僕最䝉公知愛者寧不為喜自此優㳺清暇益勉所學僕向者所望於公以古人之正傳當世之大用皆可坐進矣其日閲報二喜併得以道原為儀制故也儀制固清曹僕豈敢以吾弟得近清華為喜以其得與公為寮為喜也公之愛我始以吾弟故而終之知我實不由於弟今公之教我弟也當以我故然及其相勉以進相與以樂也又自有味而不以我為兄故矣僕之喜如此宜公所信公既自喜又當為我喜也芳洲愛公信公可謂至矣此行倘當路有意大賢留置北曹或得為禮部則公與吾弟之喜又何可量而僕當得三喜矣僕絶不敢作京貴交㳺書於公不免有此此恐後不敢再通惟寄聲吾弟致意公欲知我亦從吾弟處問之可矣别後作得文數篇皆不為苟尤為芳洲所印可因寫稿以去公如欲見就芳洲取觀之詩漫錄一巻往覧此非尊意所欲得者然僕既以文字為公所推因之締好則亦當備此於左右耳三唐婁江相見想握手之歡若有所獲在外鄰邑相與盡心於民立朝同列相與盡心於國精神交為激發而職業交為講磨此乃相厚之誼無間之知而欵洽情好之愛又非僕所以望二公也更推此意以友吾弟道原則尤僕分外之望矣朱尹誠心惻怛愛民如子守己如處女盡修公之美政述追徳意吾心何幸豈武林一見之頃以舊告新其益如此可以見公之忠矣唐婁江極愛朱尹而尤服其簡重大抵人之語黙要為稟於所性而亦各適其可不必専以寡言為有飬然欲取人之善以捄己之偏則朱尹之簡亦公之所當知也向承見諭以不宜遽不相問感於髙情不能自己而相問又不敢徒為禮數候寒温之言此僕之心也惓惓如何可悉與陸貞山秦㕘知君轉示兄所貽手教及所著書諸制作文字何啻拱璧貫蠙一朝併得也覧之累旬日靡旦夕心神開發既仰所學之正為言之妙又感雅誼不相棄遺盖真以某為可共此論者故不逺數千里見貽不待請而得之也何幸何幸即欲奉報以所屬義姑姊文字未就併問候之啟亦成稽慢然心未嘗一日不在左右也觀兄文力真可並驅兩漢矣猶若不忘乎近時李空同康對山之所為者何也弟才質駑下近學六經兩漢而力有不能及然竊自謂非近時流習所能惑矣兄以此論見接故敢略及之所註荀卿子甚欲得觀之而濯纓亭筆記於兄文中見其人疑必苦學而有獨得之見也倘肯以著草見寄併戴氏記亦寄一部使得見之實所願也鄙序極知不副所屬然好題目往往難得佳文字自古憾之況如弟之駑下乎惟教之幸甚與夏松泉自公入踐台階鄙人竊用欣祝公之心吾知之與人共為善不使有一物遺棄於生成之外而嘉與海内同享和平之福此公之心也以此心當大位宰制衆物而率勵羣工豈復有不得其所之人不得其宜之事哉此鄙人所為欣祝者也然卒之乃負一時之論而去豈公處位既髙所統益廣所接益衆自有難於調齊集合者而論者不能知之耶大抵當大位而處大事者其規模注措常非守一節而厲初志者所能知此古之大臣常病於立功之難而成名之不易也豈直公哉知公之心者誠莫如鄙人矣公年未髙志當益壯天下事尚須人為東山雖安宜以蒼生為念伏惟保重寢餗為天下安危之寄與章三洲書一使至領翰教極慰仰心新刻佳箑皆清貺也荒齋寂寞一旦増飾珎感珎感簡菴封君銘文温厚典則非顧君不能為而吾丈仁孝顯親之思亦可想見僕有薄田數畆在永春因稍識其縣之士友尚當持示之使知講聞令尉之美以廣吾丈不沒先徳之至情也清朝述遇冊觀其指事命題自是縉紳中佳話不待披圖流目閲其繢事之工已可愛慕嘆賞矣莆中名流必為吾文賦之乃以見委鄙人得無累吾丈之明僕亦安敢冒非其任以自取不揣之罪而遺莆賢之笑乎倘䝉矜察得免繼督千萬之幸二伏審去莆有期山城被命之圖果成一段故事莆中諸賢大夫士能禮其客而公又為佳客想必有左右相綏而授縶以縶其馬者賔主之美其情可慕惜予不預其間耳小詩二首聊以為贈雖詞句庸拙而感慨委曲以發明公之重者不可謂不至盖以見此行非所以處公雖遷猶屈而公獨能不以為意盖自信直道之不足以售於時而不以一官之冗為非拜上之賜其所以流滯不偶由世有相嫉者而所以致之由公好脩自見其美如女以色盛見妬而非身有其瑕也風人之義無以踰此第愧其詞不工終不足以言詩耳惟公採其義可也莆賢最多風雅之林也如出觀之或有明斯義者清朝述遇序尚未能就姑緩圖之寄莓厓兄書所説不詳公自有以勉之矣恐亦不由渠索性衣食迫人時或不待友朋强䀨當自行也至於僕近日所自得者書中略啟其端殊不及竟而在此與公相見僕亦初未嘗説公既未及聞又無因轉與莓崖説除是莓崖亦不欲聞如公則已如使莓崖果欲聞僕書既不竟而公又無可説真成兩地不斷心懸也與張纓泉僕向道有年静則考之古人方冊之上動則求之朋友應感之間於應感之間沛然而不碍然後考之於方冊者始卓然而無疑是以雖廢居無用分當與世顯者之聲跡絶而不敢頑然自閉非有慕於聲跡之顯實欲有以得之於應感庶幾其不碍也執事名位於今雖未顯然將日躋於顯矣僕乃不避通名姓於左右其心盖如此也奉見之間輙䝉執事雅有相與之意僕亦以此自信精神志意庶幾不近於邪而有以接於君子之交與不然執事非妄與人者而僕何以得此於執事也故與執事别以来未嘗不致懐仰而訊候不能數數則廢居之人之態當然耳兹乃特厪記存逺勤使者貶損華牋情好藹然極用感慰然不䝉教所以不及而謬以文字之能相奬僕極知平生學問不足而文字有餘此正枝葉勝本根之弊何執事猥以見取也倘不終棄尚冀正言鎸切使得聞所未聞勉其不足則為賜大矣使還瞻送心與之馳與屠石屋向者尊翁之訃偶從過客處聞之計其聞時尊翁捐館舍且將及期矣而僕始得聞之為之一慟不能自勝客恠以為矯而不知吾兩人者相與之情本與尋常交㳺不同也雖不能為位而哭追制緦服而數日之間以語妻子共増惨切今亡妻又為古人矣平生所期尊翁欲大有為於時彌綸康濟副四海之望而豈知其竟以一疾在告纒綿以至不起也嗚呼悲夫大事既襄想得吉壤誌坎表隧必皆得名筆甚欲一見之也臨書哽塞不悉所云與林觀頥僕所為文求合乎古而已初不求時人之知也然文字既出不免為時人見之則莫不以為迂腐朽爛羣譏而簇笑韓昌黎所謂直何用於今世者也不曉足下何所取而好之篤且過為推褒加之以所不當䝉非獨與我同好而已若將就僕而學為如是之文竊觀足下之意何其與時人異也僕廢於時久權力不足以助推挽品藻不足以濫吹噓足下非有所求於僕者也意者人情炫名而慕逺中無所得而苟恱其號耶觀足下之文已能不為時人之文矣宜於古知所用心者炫名慕逺不足以料足下也不惑於名無待於求足下扵僕之文誠好之耳今時所謂學官弟子攻所業以應有司之舉者舍可以得有司則不復過而問古之文非所以得於有司之具也足下獨為之於衆人不為之中其用意良異於時此僕所求於今之士欲引與共進而収以自輔者也足下乃不逺千里馳書見貽意勤而詞遜僕雖自知不足副足下之望亦安敢無以為答而孤重賜乎所為古文者非取其文詞不類於時其道乃古之道也古之道不謀祿利不希榮進足下所謂夢寐古人顧戚戚於既失汲汲於後獲何其與古之道異也足下之好古文直好其詞不類於時耳如是則其用意亦何以異於時故僕願足下姑置得失而専力於道苟於道有得雖不吾問足下將自得之僕將往求足下而告之不獨以有告且又將困足下而有所學僕又安敢傲然當足下之勤意遜詞而無所憚耶願足下勉之毋忽詩一首奉贈聊以報共好之雅雜文數篇皆偶有刻本其他未及錄非謂欲俟足下有得而後往也繼此有便毋惜惠音與黄明府久不得相問知賢非相忘顧為作宰多政所奪耳毎見當路輙好稱説吾子為人之賢此非思出其位而敢為故人㳺揚也知其人則愛之愛則欲其美且傳此古之道也僕雖力薄不敢當此任亦竊聞斯道矣此乃所以自盡其心而非與故人相為賜也當路往往言吾子好以自性格人以已意决事僕以此益信其賢大抵今之能自伸其志而不拘乎流俗者必見謂任已而乖人然此乃吾子之所以為不可及者也但人之所以短我者如此亦宜益求其不足者而加勉焉又不得直任以為是而盡付之不足䘏也揆情審分明勢謹禮愈精愈詳則志自無所撓而事亦無有不中節者矣此亦僕自附於古之道而欲加愛於吾子者也無因面論言不及悉惟以意亮之可也與歸善葉生野人幽居邈與世絶海内好事之士無為而至於敝廬吾子獨誤意見訪誠不知其何以得之也以吾子之才行遊海内盡交其名士大夫如不肖之陋尤不足以動其意而辱訪之也顧乃汲汲若此豈吾子之所取者博雖游其賢而於不肖者亦不棄之耶陟屺記文承何君屢相逼促何君與人之忠誠不可及第愧鄙文不足以副吾子之求而當何君之惓惓耳近世俗弊士無真識古學不傳滛蛙塞耳而僕獨以孱力振雅調於羣聾之間宜其不為世所悦也吾子辱訪而見委之誠能知其意而同其好耶抑亦姑狥其名而苟欲以為重也路逺無由面論聊及其略幸有以教之與林二山書一僕自束髪入仕即知仰公第賦分之薄無得見君子之幸及公以中丞撫治湖南以災沴自劾䟽下所司而僕方叨貳考功得見其疏伏讀歎服講於同曹之間激昻増氣而公方咈權臣之意又有讒人以私嫉公者為權臣所幸迎合意指僕雖不量其力而争之無能為也然區區之委心於公者盖已至矣但不敢以聞公度公亦無由知之也未幾僕亦為權臣所中謫出久之量叙稍遷卒以見罷廢處以来尤不能修交游之問而特申其區區之誠以通於公益不能矣比者家叔過莆述公惓惓鄙人之意甚雅乃知不獨僕致仰於公而公亦為有意於僕也以此自悔家居七年之間頑然自外不一通於君子甚可恨也家叔還時值某有亡室之䘮心緒苦惡今日月已除始得修其區區之誠以通門下惟公與而教之繼此尚當有請也二世上許多漏缺敝壊急須補塞整頓有人足以為之而顧使之久袖手以傍睨不知天意世道畢竟如何其終於此而已則吾不敢知如其不終於此則何不使其人早得為之乃欲待其時已過而力愈費何也不肖所以汲汲扵公之未起盖不能忘情於此豈以中丞為未尊自中丞以上尚有髙官之可榮而足為公重哉天下事但使當局而為之者與側坐而觀之者同心則無不愜人意不肖之談盖側坐而觀之者空談耳聊為公發之知不以為狂謬也向往之誠日來益切何由一見長者悉所欲言答鄒一山書一頃筆峯人去有短啟奉候兼復所諭今得楊姓者所持來教知前啟未達也開誦長篇何其贍麗雅濶之甚也陋目茒心但覺蕩動震駭何能為評耶大抵文字之事有約有放若約以法度則一字輕着不得若放而為之則無不可如意觀兄此詩殆有意於放正不當於字句得失論之也然古人有放者矣驟而讀之浩乎若不可詰徐䆒細玩乃無一語為恨此則真能放者吾輩未到彼岸尤須以法度自飾庶可無敗耳兄以為何如兄舊在湖湘所彚全唐詩選遺恨尤多當時得此書即閲之盡欲作一啟請質所疑值室人病未得屬筆今久不復憶併所欲論者忘矣偶因復兄談詩輙漫及之然兄既盡觀唐人諸名家又擇而取之如彼則於前賢制作之妙必已深契而博采其於或約或放固自有得區區之鄙又何足以薦一得於髙明哉據案潦草徒増狂僭之罪耳正與虚齋参知論欲其過莆勸兄促駕及時努力功名何用栖栖丘園為也倘出門有期可先見示當馳一力走送也二吳氏二子舍其母几筵之哭而求謁於人以為為母則朝夕之奠已曠矣使能得金而歸可復補乎以為為身則吾未聞舍母之殯而逺謀口腹於人者入門相見令人惻然悲尤赧然慙二生乃衣冠游學校者而所知若此豈不大可愧哉雖為貧所迫何至如此西川公尚在郡過三月而來豈為晩耶兄既不教之而又資之以啟來尤非吾所曉也故深喻而責之使即歸矣其所以求於西川者僕不免為之出口正使西川公果有意又不在二生之來不來也兄以為何如然吾能教之以禮而不能大有以助其費二生方急於費而未暇問禮則吾雖愛二生自附於以徳而彼豈能以吾為愛耶二生之知不知非吾所問惟吾所以愛之者自當如此耳兄以為何如頃専遣人往候想已見兄兹不他及惟復此一事云耳亮之教之與張浄峯書一與洪君同行故送公不能逺然雖逺亦終當一别意到正不在此也本擬作文贈公行不特徳業地望壓題而兹事体大亦復壓題故不果作謹賦長詩一首以見寄豈謂足以歌咏盛美嘗觀韓愈於裴晋公征蔡不作贈文要亦為題壓縮手不是偶不作也然裴公功成之日韓公猶在朝正典文字遂得鋪張其盛作為淮雅僕既廢無所用其文於朝廷然公功成之後僕尚當為公賦之雖制作明雅自有其人足以荐告郊廟傳之縉紳而吾之所賦或可備風謠樂府流播民間以諭閭巷口耳也公以為何如二度公至鎮且兩月矣握機運策將奏蕩平底定之績决無老費之患可知也僕無以助公然亦願聞所以籌於樽爼者之詳得抵掌談之以為快且抽思賦之使有傳耳舍弟近得書深欲公早成功歸立於朝此後生之心已知為天下屬望非一身之私望也洪舜臣已滿告赴銓意其賢必有知之者或留寘北部與道原相勉進修他日可為吾鄉冠冕而推明公之餘教使昌且盛有可頼者自可喜也僕今年遂四十往時悠悠然自計猶在四十之内覺尚有餘日以此自恃今忽過此便是侵老大境界始覺有可憂者平生不在此一路着脚則無復可説既由此一路而前却徊翔進寸退尺終復何日可至此道本逺而作此等行計他日安可自諉半路歇脚直是與不曽上路行一步者同科此所謂可憂者也惟公有以鞕督之自度雖未是見鞕影而馳之疾足猶為尚堪驅駕耳切望切望老親佳木不知取之廣西或就湖廣索之也謹此凟問併以為促幸勿忘王君便追寄之以此不能詳也三於郭博士處得觀所祭陳紫峯丘集齋二公之文知其决為公筆非門生屬吏之筆也公之學乾道淳熙間二三名儒之學也然二三名儒亦嘗力為嘉祐熙豊之文而終不逮公學其學而其文則嘉祐熈豊之文矣五管所治蠻夷軍旅之務雍容優暇大篇短章具有體意公之所飬為何如至於朋友之誼生死終始情文均至誠有道者之事也竹坡公銘文久望未䝉見寄豈不欲為之耶竹坡襟懐洒樂雖不如紫峯先生而謹禮循法踐履篤實或有過焉英敏明達足以為政若不及集齋君而恬靜無求於世寡惡集齋所愧也今於二公既有所慕亦有所取則如竹坡恐宜在慕取之間又重以與尊祖有登科之契誌塟之文非公誰託而公宜亦有意於斯也故某不敢請於他公而獨以累公幸終惠之紫峯先生傳此等文字必公為之乃有發明賤子冐然為之誠非其任然張生達甫云公頗訝其引論及公意若不懌者竊謂公深於文而明於知言决不作此見觧或者書生不曉公所論而失之耶文之有此體非賤子剏為前人之作多有論死者而及生者以交相重而致意焉公决不以其體為非是也如其意則賤子之智皆足以知其賢雖言其賢而其分數之嚴亦不敢苟至於公則所以歸重者特至盖非敢以鄙陋之言為足以相重實其區區之意存焉妄意此文於公當有契而不宜以為訝也有便不惜示及與蔡可泉使還得備詢太夫人福履佳勝極慰通家子弟之情所接手教雖不得聞校藝敷教之意然以意求之吾弟之操脩端懿材力開敏其於論文之精作人之雅必有過人者矣廣中文體如僕所見嶺南文錄可謂放失之甚比僕辛夘嵗所見大不同雖時變之失恐亦司柄者取與不𠂻之過上好下甚理亦固然文雖末技然人材美惡風俗盛衰舉係於此不得自為髙濶持重本輕末之説付之不足為意須明示好惡使士知變本末原非兩物豈有不能為文而可謂之為學者哉白沙先生後人聞甚凋替彼中不知有何書院賀給諫鄒翰林寄寓遷逐之跡尚有可訪者中離既沒崇山書院想益荒落宜留意興起以振来者歸向之心陳海涯先生向林龍湖所道甚悉鄉賢之舉不可不力為中離東莆想已舉矣如尚未也亦當在吾弟矣浄峯公尚未至當是代期尚緩索居苦無可與言者極遲其来庶有談論往来之樂然此公自信太過自立太堅而欲持吾不尊不信之説以易之恐未有合自當有一段不樂耳吾弟以為何如相見後有論更當相報也克齋兄為僚之懽觀法之益其樂可知暇中必多談我後便宜有示及與林巽峯今時才俊如林趨事立功未必乏人惟正學一脉出身承當下手理㑹者甚為寥濶有人勇往勉力為之如兄者又見擯於世竊料當事者之計必謂因時辨事目前取足自有其人而目為學者以迂濶若非當時所急不知此學不明雖有趨事立功之才亦是苟簡補塞豈能卓然有濟於用耶其見如彼則篤信好學者欲不擯於世而趨為之益不厭乃所以為學者且其修之於家而講於友朋之間開導感發使信之者衆傳之者昌其所及顧有過於用世之所獲又豈以此易彼乎聞兄家居講習益篤相去不數舍而未能往侍左右請其所聞是吾之自棄也今来嵗擬築一精舍於山間以聚二三有志之士欲走奉道誨因御兄以来髙擁臯比為二三子發明但恐所築未就而兄或將出耳此猶難必惟相訪一行可以自力期在春夏之間得遂兹懐不忍負也先此具候併告本意所欲質於兄者此未能悉均俟訪日備之海嶽講義欲乞一部併心得續記者俱欲見之與陳雙山向者張月洲君以不肖欺執事過承重問意義髙雅非所當又不敢自外輙有復於執事而因何元孝以達計不至浮沈也屬聞出守金華此名郡也有宋南渡而中原文獻之傳獨在此邦吕氏之道學唐氏之經濟陳氏之事功皆斐然自成昌其言而廣其徒至於何王金許一𣲖相傳承守不絶雖吾閩建州不能加也今其遺書世所未行與其舊跡人不及知者正可訪購講詢發潛徳於既幽起微言於將墜而非公之卓識茂學何能及此僕聞而竊願之久欲寄公請所願聞未得其便今得洪方洲君往特此奉聞洪君所造之深所飬之正非今人有也正當與公為友惜此君尚未得與君相見此行又非便道公亦無由見洪君然僕誦此君於公非如張月洲之以僕為欺也公尚圖與此君相見否則亦當相聞也月洲兄此来益就平實趣味深而其精力漸瘁不堪黽勉大有可念者大抵學者貴聞道則勇猛而非氣盛平妥而非力倦若未有所聞宜其氣盛則鋭而方乏穏實之趣至於克就平實之時其趣方露而鋭氣已銷矣此學者之大弊也公以為何如僕亦未有聞者此論只以自狀非為評張君也惟望公有以教之與鄭一齋處江湖而忘廟廊之志無用於時之人則然如僕等可也若公則當無日不以斯世斯民為念讀書著文彈琴詠歌皆所以飬徳熟仁而専其志以為他日輔世長民之用如徒謂以是自娯於閒廢之地則非公之所以自處矣世本急賢而此時尤宜急恐公亦不得晏然林泉為無事之人矣惟善自保愛以俟之吾之望也與筆峯宗兄書一嵗律聿新時序之速有可驚心事事不如本懐無時不恨悔而於嵗華代易之際尤屬心思耳嵗底承寄尊劄及大書值在墳所未嘗見其人不省其人直之海豐或即還莆也山中歸祗見華緘長跪發之緘開書見驟爾蛟龍蟠攫鸞鵠翔翥平生目中未嘗幾見此竒偉也今已摸勒入木巨㮄昭掲章縫聚觀心目忽新永作學宫傑異不朽之觀矣何時得致兄一游吾地使吾得率諸子弟之才而好學請公臨視其間視顔承詞有所感發興起覩其書而見其人不獨空為想像豈不尤可樂哉弟迫嵗苟襄亡室終事情況可知得地殊吉有足慰意本未嘗有意為亡人作文字第寫數語欲赴諸姻友之當來㑹塟者寫之不覺滿幅比幅滿時聊一讀之自是一篇文字雖傳之士友可也非徒可以示兒女子而已兄覽之以為何如室中乏人主持百務都荒深悔不早定續婚之計為誤非淺今訪一二有家法者得其女欲畧以日者吉㓙之議决之耳此兄所欲知也二新嵗擬遣力往候又欲俟兄有何婚議見示一併以為問坐是遷延遂未及遣不審道體春來何如也賤體一向苦椘盡是近死證候雖心懐憂恐然莫能曉其何故比来始覺得是脾間積聚老濕痰為害此痰既不敢吐又不敢下惟於飲食間做得工夫舊年斷肉只斷羊豕鷄餘肉未嘗斷也又一種海味都不禁更好食蝤蛭聞此物最生痰今春一法勑斷魚肉家人治飡更不以相餉矣庶新痰無所附以生老者亦當漸衰而化耳如此一年以後方欲斟酌一好方少資藥力佐助中氣使得完復目下尚未服藥也即此斷肉一事雖為却疾飬生之道莫此為上但吾輩從前在茸芬中饞了口吻一時難變淡薄若守得久當亦不覺難矣因説本身苦惱及此實欲為兄告也来三峯尚是一學者亹亹不竭皆經義理之談甚可敬也於兄亦甚知推重吾嘗告以好將莆中秀才經學校正一畨不知肯留意否遵巖集巻二十三

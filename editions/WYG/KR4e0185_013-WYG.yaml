body:
  text: 遵巖集巻十三明王慎中撰誌銘張禾山公墓誌銘予昔以試事使廣行掠清逺程鄉之疆問為邑可記為誰莫不曰正徳間張知縣賢莫能為其後予異其名記焉及以㕘議至江西入謁張公也貌莊而不矜笑語豁宕矩法肅如問所以治縣使後莫能為如何公答以心誠在民随事盡力耳其所為發擿伏隠撫兇誅憝方畧人驚為神遜不言也顧長者不敢質比訪其居環堵蕭然雖以貴體苦約如寒士遇鄉人恭而情素披見勉善諭非如己得失南昌人言鄉先生之賢又曰張公也予既閒居一日公之子祠部君自京師寓書山中曰先公将𦵏非先生銘不敢𦵏予發書涕出公其已矣聞訃不及㐫不能寓弔敬按其弟大理公鏊之狀叙而志之公名卿字敬之髙祖希孟曾祖簡明祖英賢世以愿朴濟至封主事公益喜儒業生公與弟鎰錢及大理公鏊張氏有姓於南昌徙自臨川百五十年無顯者及至以貴封其父記為主事教其弟與子皆貴大理公徳學為當代名卿能狀公之行事以傳子緯以問學清修為禮官有公輔之望又資二仲弟使各以其勞力取官南昌言氏族張氏在甲乙其前亢後貽由公力也公始為舉子學以講究歸趣為主文能達其所言而該洽羣書尤號贍博張東白先生一見其文異之曰英賢有後東白於公之祖友也督學邵二泉公試寘髙等辛酉舉于鄉為親謀禄以壬戌乙榜銓授岳州訓導正席講難士駭所未聞異舍及外庠士皆相戒來就張師講舍不能容作為講義使博寫轉相授其教不専為課尤約以禮法躬自為率及公門者多以知名擢知清逺縣清逺最號難治公至即罷絶餽例示不可撓剔求縣蠧弊盡得其根節穴竇芟伐掃窒豪胥黠吏咋舌不敢動厨傳不飾賔至使無饑而已賔亦知公在邑菲惡自苦不敢他望或有起敬者而三司公人往來多倚總督大臣中官勲貴之重狐託邀索過他邑張甚入清逺界加肅公以例給之公人亦自喜曰謹如例省費視舊十八民有賣子輸均平錢公出俸贖畀之罷其輸邑故置厰榷鹽奸商往往匿詭䂓利公受檄視榷與為期法毫髮不得漏羣訴臺史幾以撼公公不為變商卒不得售奸軍餉倍增興學教士奨誨有方每值倥偬其為諸士談經校藝輒盡所長觀者第見其暇豫是時盜起程鄉僣擬名號衆且數萬江西福建屬邑皆被燬掠大兵徂征俘獲日至而盜不衰都御史林公庭選議非得良令牧之相宜誅撫兵勤未巳乃奏易公程鄉清逺人争于督府奏下争莫能得怨歎自失公請督府罷兵從吏士數輩抵賊壘賊固聞公名不敢迫公開諭禍福設兩端如是則生全保有父母妻子不則戮死衆心動有泣者居數日賊魁鍾萬璉傅時玉饗公盛陳兵衛出所掠珍玩侑千金為夀公取珍玩碎之而麾其金曰若等方當為農生業顧懷寳以賈罪耶金可以買牛貿田器為衣食資若等宜自懷之賊相顧驚喜如獲賜公笑指諸兵衛目其魁曰陳此何為魁與其黨伏拜曰願如公教棄刃狼藉呼聲喧谿谷為留一月夷保隳障籍其丁壯老幼婦女四千人散遣之條畫使耕田築室各有寧宇邑目其民曰新民林公得報大喜謂諸司曰興師十萬不如易張令一符久之或有竊發發則以計縛之便得民户不夜閉省刑薄歛諸所綏附如清逺而誘督士者以問學尤加意雖新民子弟多彬彬向風矣以政最拜南京刑部主事厯員外郎中名法綜練明而能斷同官多從公咨議一時以為法師有大刑獄尚書非問張郎中莫能決而公遇事好諍剛侃不阿權貴無所得請積有忌者遂致其官歸空囊至家或為公不堪公慨然無愠容然公教一郡令二邑去皆見思尸祝不廢事在名宦之志即使都大位饕重禄尊顯膴厚而無稱於時所得孰為多少公性至孝自始學以至宦歸事封主事公及妣安人某氏随力豐歉養必竭情立家以清儉詳厚為法而婚喪𦵏祭必考於禮子弟遵之家法名於郡中年六十有七而殁子長統金鄉縣丞次綬太學生季祠部君也女適諶騰起王緝曾一鳴孫男女九人公之既歿大理公方以㕘知旬宣嶺南清逺程鄉之民羣走㕘知庭下問故舉聲哭退而哭於其祠盡哀祠部君始為主事聞訃於官岳州之士在都下㑹哭主事之筵人孰不死孰如公死而哀嗚呼是其可銘𦵏之日為嘉靖某年某月之吉壙在錦山之陽銘曰世降材難吏失職維縶手足窘徽纆寄權胥史若厮役居常茫不措一畫况仍凋荒乗盜賊有以口舌代芒鏑片言脱口萬甲釋呼還流亡起枯瘠生蕃殖阜出俄刻孰嫓厥績監在昔膠東渤海舍誰匹後欲論著存吏則有徴其不在斯石張孺人墓誌銘貞順孺人張氏趙府長史徐浯溪公榮之配也嘉靖甲辰六月二十日卒其子用賔以戊申十月十三日𦵏焉而與浯溪公合徐公有美才氣韻絶羣失當事者意由南京户部主事出為長史於趙府恚不欲往公之父長者愿而謹以問公是官吏部注擬誰與命者公曰固上命之耳父曰而欲不往得毋不足於上命耶公􅌶然行是時孺人屬疾薾然卧褥間度起無日能不以舅之言為病已尤力自忍約於隤綿憊苦之頃不使少見懼夫之行因已濡繫而不勇則為替父之教而斁上之命夫其無崇顯之可懷與膴厚之可賴而不肯以甚疾見危以濡其行誠知命之難廢而教之不可渝也汝墳大夫之妻貴為命婦而躬循防取薪之役非徒自執其勞将以明君子之賢而處勤勞之職為非其事知其君子甚勞猶以孔邇之父母致其敦勉之意欲其念之而無得罪雖出於憂思之深而所以勸勉之者如此其正後之講者欽其志逺而義髙以為杕杜言我心傷悲伯兮詠甘心首疾専於情感而乏徳義之誡序其詩者以為能閔其君子猶勉之以正也然而托伐枚以譏職斥如燬以詆政尚不能不為其君子怨而彼其别也靡甚危之疢而有既見之望而其思之猶匹於調饑由是以推而知孺人之行信可賢也浯溪公少有文早舉于鄉得第獨晩凡七上春官馳驅往來二十年間孺人多獨居無杕杜之傷伯兮之疾其於事上畜下男室女家為之具適其理敬而不葸慈而不狎侈不病財儉不侵禮非獨能勉其君子尤有以助之使無顧於後而樂於在外所以攝其君子而為於其家若出其意誠其自為之而皆無以易也嗚呼又可謂賢已某稚時實從浯溪公受春秋讀而與孺人之弟天衢天叙為友因得拜孺人之父母南溪公與黄太孺人孺人之子娶故尚寳李竹坡公女又吾母太宜人之妹也今其𦵏某宜為銘銘曰惟婦能閔其懷之恒猶列於詩以發乎情閔且能勉維徳之行厥勉其外孰治其内其明其翼儀徳克對有傾碩人其善靡悔最厥令美于風有光今其潜矣孰圖其彰嫓詩以傳有銘者藏贈惠州府推官李坦菴公墓誌銘今制封贈之典雖不間内外然從宦於外者十不能得一循沿以為故常仕者病焉近嵗建安李公黙為司封始議釐正外官滿考而功狀明著即以予之如京官於是得者十三四某待罪司封又申議行之益廣自余為司封未閲嵗而奏上外官之宜褒贈其親者殆數十人皆得報可始余申前議謂是亦所以答外臣之勞慰其為子孫之思而均天子之澤於無間顧未思其為親者之可封與贈如何也以今為吾友人李静甫君銘其父坦菴公之墓而有感焉夫因其子若孫之勞念而答之而以其子孫之官命其為祖父者烏有所擇於賢不肖要直以為恩耳盖亦有賢而可封與贈者焉固議者之所不及而制之所不得異也李公所謂賢而可贈者也嘉靖二十七年某月李君以惠州推官滿考上最考功署其考曰亷謹明恕司封得考功所核功狀奏以李仁父李弼贈惠州推官任氏封孺人制曰可於是距嘉靖十九年十一月二十六日公卒盖八年矣李君卜西安埔山之原以二十八年某月某日𦵏焉題其阡曰贈惠州府推官李公之墓而來乞銘墓之文李君始通仕籍佐郡理刑以亷明受寵為其親身後之榮某為銘不可不侈其盛以昭上賜而坦菴賢者也故既詳叙得贈之由而復志其所謂賢者公於治生常執義以馭利其斂發舉廢與人同計而所入獨薄盖義不為巧求險取不知者徒見謂計數不足公曉其然則推而委之於命以混於不知者不欲自章其為義不富也其用意如此雖其不足而好憫人之急其濟賙所及充其分之所止與財之所得為而已無越思也與鄉人居退然自約不敢以所能加人其開敏强幹亦莫能掩争者來就決面譙之以其非是卒不得怨而以事即謀者畫其然否授之後常中也所居面學宫每誡諸子曰室休庭立常有宫墻在目無待出門睹其巍煥然乃起敬也視諸子讀書旦夜課業必得其多寡生熟之數為喜怒勸董之節嗇口腹蔬食自充而已至其子所與游有文學氣誼交勉為益者輒自撰具食之如恐不飽不難為費也故其子皆才長惠州君也其次敬素貞業素與業皆為學官弟子公字世伯父崇景母丁氏皆早世公以孤幼起家竟致昌蕃教其子有成今其殁名在司封詞臣撰其美以賁之幽具有位之儀物以𦵏其亦可銘銘曰㓕裂之耕亦得其報匪狩匪田孰牂生奥勤修于㝠厥獲孔昭躬之未逢後則可要其要伊何君最臣考曰胡有子有生可教煌煌命章以錫以醻其殁雖逺俾克有耀維命不僣孰謁孰禱我銘斯幽維以為告池州知府曾慚溪公墓誌銘嘉靖七年徵天下推官知縣在職效著而資及者備臺諫之選殆百人而公名在十人之間比選為臺諫名在第二方是時治具恢張論議昌行有得人之譽公名冠其前居後者無敢鞅望不滿於時以順徳知縣徵廷授為禮科給事中公是也公曾姓名仲魁字斯達以嘉靖癸未進士領邑適嵗饑路有殍胔其救貸之法開廩發粟勸分平糶煑粥和藥皆人所能為而所出有濟餓者飽羸者起則公所獨能人有不能及也邑並山海之險宿偷蟠結穴深藪宻商旅晝梗民之畜􅀢不敢在野公蕩窟覆巢使民露積田間行者齎重物可以夜出其所為法在募精兵除戎器使謹候徼而已他邑莫不相效為之而賊發必得卒伍之勇用以得賊而不以虐民則公所獨能他邑莫曉何道致然公又濶舒自信非挾數舞智為開闔張歙如世所謂能者亦其坦闡真惻有以得人之力而盡人之情也民既安富乃為畫便興利使可垂久曰縣令數更人各有才吾不敢保後人不能易要當與民為百年之計耳其立社倉建社學所為歛散主鑰置籍與教之訓誦課業儀節具有條式今尚行於邑公於為政如此其在言路務在存體開誠不慕孑孑之行嘗謂今既未能曲盡孚信以冀感悟則大者固未可言而擿發小故攻訐細隠以賣直聲吾甚恥焉惟随事盡力不為無補耳其監在京庫局東南百物之貢角羽齒革錦綺繒纈粟米茶荈金漆蜃石充備尚方服器食飲好玩頒賜出於三農嬪婦之所生治虞衡林藪之所飭化皆竭人力之良而常主以内寺官府乖隔民輦輸入宫主者求賄無藝賄且半輸物公剔刷蠧本芽掎枿折省民賄以萬計主者夜懷金千突入謁祈少寛弛公正色曰吾以上聞者若死矣吾貸若死監法終不可弛也其人慚悚躍馬去退則涕泣私語曰曾給事貸吾死吾誠謬悖自今不洗手奉公所為法非人也始民以役當輸官貢皆相恐以破産則廣裒歛他户以充賄名為泛費公監之所省既多乃議今嵗所省泛費既難以却還他户役者免破産足矣而使以賄餘為家則主者亦不能平也乃徵其半入官而行下所司盡罷以後泛費其釐革弊事詳整有要皆以其事言今不具載此公所謂随事盡力者也方寺人懷金時若遽以聞寺人必得罪其黨必且深怒交怨謀所以相撓監法未必行而民未必得省也公能使己不汙人免於罪而事克集則孑孑者何所濟焉滿考拜禮科左給事中奉詔冊往使靖江王府册其王還朝遷嘉興府知府以母老乞終養上優許之母喪畢起復為池州郡介江而並畿内賔主厨傳與夫苞篚以交際畿貴常勉與江南諸大郡齒公憫郡瘠而民不堪一切罷之且自以老諫臣典郡當悉意圖民有以報塞義不欲専修文養交為自容稍革郡之舊事别置條法使可遵守而畿内諸新貴人頗相指目為迂濶而自尊大也㑹御史陳姓者以巡江嵗滿檄取紙筆費於池州公曰吾知為民太守不知為御史胥史也御史恚曰太守慢我上疏論公吏部持其論而論者方奏事至京師争之益力考功懼拂其意遂罷公以徇之盖公在郡十餘月耳臧否之論廢置之柄所以馭賢不肖而御史以自快其私吏部以徇人之私使其施於不肖猶害於政况其所論罷者乃賢也嗚呼可畏哉公既歸深簡自重罕與客接堂上絶無人跡賔座塵没寸許子姓嵗時起居中堂頷之而已監司郡邑大夫加禮慰問亦不報焚香讀書不求為精博聊以陶性間寫為詩亦不務工而趣致蕭雅冲然可誦雖獨居一室鄉人利病講畫周盡移書其長老知義者使率子弟随分為之要於俗化有助所及者小而其風誼逺矣三衢程侯為泉州雅以韻度自髙好賢有禮命駕訪公賦詩投贈顯相欽慕意屬有勵表公竟不至郡報謝程侯甚以為得也人士由是髙程侯而以為公榮公素多疾然歛飭莊欽無懈惰之容器宏神裕絶不見暴遽絞切其用意篤厚在人倫風教之間不為負於㝠㝠非貌為惇洽而情不至者也宜其見祐於神明故雖多疾而享年不淺以嘉靖戊申七月十七日卒年六十有八矣封孺人蔡氏先公卒竟不娶而以側室詹氏攝宗事女七人嫁黄彦欽陳敦豫李楠黄槐伍教申李維鉉陳選子宗孔卜以己酉十二月十九日奉公𦵏于蓮湖山之兆與蔡孺人合而來乞銘某大母公之姑也公少孤吾大父確軒公撫之猶子使與先大夫封吏部公同學猶兄弟也比公徵為給事中某方為郎同朝以職業名節相勉猶吾師也其罷歸吾已先罷公既寡與人交凡意所欲言於古人有所尚論或不樂於時事惟以告我又猶友也公少而力學壯而勤行老而加修臨沒而不亂可謂純心好善君子也公卒踰年而宗孔舉男此亦足以𦵏公矣銘曰視白以為黑題玉以為石處權履勢者不勝其私而決於欺昧之臆其本心露於微明安知不自悔愧而刻責彼秋浦之氓言固昭昭而不忒况為邑之所留已崇祀而血食退論行於家邦亦千口以若一伊蒼蠅之加㸃初何損於瑩質公平生之百休惟兹事以為惻故反覆於斯銘告𤣥堂若皎日庶乗化其無尤閲百年而寧魄林沙溪墓誌銘方晉江之盛有鄉先生曰顧新山公李竹坡公林沙溪公並以年徳化服于鄉顧公好急民之病上説下教有司有所訪政李公樂誘進後生奨人以文林公善以和飲人導俗於不争不治人過而常使知愧以自悔革三公所長不同皆有以善其鄉而所得各有至者顧公起廢厯官至户部侍郎而後致其事李公以尚寳卿就家起之終不出林公獨以為御史時有論事之眚持議者不觀其仁而誅其過公亦負瑕含慝恥為辨竟廢然以廢久善于鄉之日尤多得與二公參其功二公亦雅相引重視他人無如也李公既沒士無所宗顧公與公巋然並存有司尚得以諮其治俗猶有所愧頃顧公亡公亦相繼化去鄉之耄倪有哲有愚皆相吊以人之云亡盖知斯人之喪非夫人之為喪也公所以能愧人者出言醇簡必依於仁禮容莊而温竟日無惰氣迨老彌篤而事親孝不以貴弛其勞友諸弟以恩貫處熟游者莫知為有殊出居在市集未嘗齒物價於財漠如也其實行内修感動在言之前而意厚誼敦神情恬裕稱其為容也其所以廢由以御史按江西疏論宸庶人有孝行宜褒以勸時宸庶人方包逆謀多為不法而外飾小行以買名喪其親善哭聲動宫庭徒步送𦵏公謂是其謀不可測既難以輒發且可因其偽而與之使益為飾以自盖匿或不遂為逆即使為逆猶可少緩其發徐為之圖隂與都御史孫公籌所以遏折備防之術甚悉而僉以疏入公去江西未幾逆變作議者以疏為公罪其所為陰籌既甚秘人莫能知孫公以節死無復為上言故以坐廢公心事昭晰無有疑其朋者第斥為畏禍徇庶人之意以苟免也然公在江西抗法自嚴宸庶人侵之數矣卒不能得志公亦堅不為奪其跡最著而體大禮重者不以朝服謁不以朝禮見其子便殿曲宴不奉觴為夀論捄御史范輅被逮輅之逮宸庶人所中也畧以禮與事絀其邪心顯與為拂顧㡬以一疏免不待智者知其不出於此矣公始以乙丑進士發身即乞歸養逆瑾怒廢數年瑾敗而後得除為台州推官在台州執律例以拒監司不敢以獄比輕重徇大吏風㫖滿三嵗考勺天台國清寺山泉啜茗數杯而已未嘗携一長物還家正徳中年戚畹内侍多寵倖驕佚踰制靡有顧畏獨喜結言官有私與為好珎玩重賄無所愛公為御史閉闗掃軌無權貴之交門外悄然利慾刑禍易溺而多怵皆人所常患世常有慷慨蹈禍而不能自潔於利者至其清心淬行不為利溺宜非刑禍所可怵而屈也公於利若此豈以宸庶人之威武失其守苟為一疏以徇之哉公名潮字君信别號沙溪祖名金者來籍晉江自莆仙遊之沙溪徙公取所自遷為號實志不忘其始金傳四世至公之父名凱皆不顯而多有隠徳以發于公公生三十六年而為進士廢七年而始得仕仕八年而廢以善化于鄉三十餘年而終盖年八十有一康彊夀考有四子一女孫曾十三人皆習公之教孝謹不惰侈其才者知向學配夫人蔡氏有賢行佐公為學與入仕能以勤資其敏以食養其亷始終一於敬順無誶言疾色以犯公指知公欲悦繼母事姑彌謹撫諸幼叔甚慈比長皆為之娶而接其室甚睦以公愛其弟故夫人沒公遂不近媵侍所以致其思也公喜飲酒不為嗜味而嘗以寓意托興於人無狎而無不可親客或從公遊或樂致公至其家公皆不為忤神觀修朗儀矩肅然間出於諧讔自有名人長者之風凡預在席莫不躁釋暴馴充然心醉而自滿其有以愧人雖銜杯度曲之間尤有至者嘉靖庚戌八月公卒以十二月初一日𦵏喪三月而𦵏禮也公子𢎞宇𢎞建先卒存者𢎞智𢎞守實克謹其禮而嚴於大事其來請誌述公遺言曰微王道思之銘勿以我𦵏墓在南安縣福山之麓與蔡夫人同域公從仕日淺其志不大見於施為人以過廢惟化服于鄉其功有踰於在仕者之所獲其過公不欲自明所以必得予之文而後𦵏意良有在故予誌公之𦵏獨論其善鄉之功於公之過見其為仁者尤深切而諄復焉銘曰其為玉矣以繅藉而薦之廟中其瑕不掩斯表瑜之為美而斵者反是之指既不克薦櫝而藏之乃終以無毁玉固無意於為薦與藏人徒妄以為玉愠喜誠為玉者謀薦則斵而藏則全亮不為彼而為此丘母彭柔正孺人墓誌銘孺人始歸為丘履素翁之妻孤艱多故未知所以自存况其底成貽昌如何也比其卒而夀至於七十士之賢而有文者來哭其殯共議其誄徳之諡曰柔正其𦵏從夫之兆而其子賢賔皆材且有立有養中養誠養素養材為之孫孫之子從魯從周從文從禹從先從得有六人其女與子之女所適其夫曰杜彬王瑶林某王某陳某王廷紳王某皆在其日得嘉靖庚戌嵗正月初七日之吉嗚呼可謂備矣孺人於為女而其父愛之曰是子也孝其聞於族至疎逺而不間一口其歸於丘而其姑愛之曰是婦也孝其稱於内外迨老而不衰履素之存謂其妻則曰是能佐我所不及而不敢不敬其子思慕其母則曰母之畜我也慈而不弛其教至於内外之人及事孺人者皆曰其遇我有恩盖其行之備如此宜其能以髙年終而其卒其𦵏所享之備也某與孺人之子賔為友而養中養誠復學於吾門於其𦵏烏乎辭銘銘曰虹山斯原蟠礴以鴻龎里于其下生朴而熙荒獨姓者丘多男且俊良伊誰云出有母之厚祥厥貽孔厚長發未詎量刻銘納坎掩閉告幽茫兼俟來裔俾爾聴勿狂庠生杜純軒君暨男思恭婦謝氏墓誌銘夫文之施於志人之𦵏所以誄名徳善譔記功行告之幽㝠以章輔世教非徒徇子孫之哀慕而姑副其不得已之請而已其義不出於是而君子猶為之文者盖有閔悼㐫短矜惻淪喪明其人之不幸非出於不善之所致則惑於命而昧乎天者不縁以自託而為放而彼㐫短淪喪之人既無才能氣力之子姓足以為死者地而偶有婦人女子之賢者能自約於艱危顛隮之中卒以有立而克終其人之大事則君子尤悲之所以寵其死者以慰其婦人之有立亦文之義之所存也嗚呼此杜純軒君楷正夫與其子思恭之𦵏所以得見於予文歟君年二十八而亡思恭生六嵗耳思恭復以二十六嵗而亡有子四嵗竟殤而君之世絶於是方君少時自力為舉子學通毛詩大義為學官弟子其守身勤行歛然在人後然意不能無望進顯以一經起家也而遽天矣思恭知讀君之書而死彌早盖君之父子退慎儉節非有傲侈之過以傷其生也生於世之日淺雖未有積累之善以求福其處心措行未嘗干神明之譴而卒殄其世則所謂不幸者耳思恭之子既殤而世絶故君之父子與思恭之妻謝氏之喪纍然在殯久之而今始克襄其事於潘氏之手潘氏君之妻予所謂婦人之賢能自約而有立者也思恭之亡謝氏年二十耳能抱其㷀然之孤嬰矢不復貳雖孤已殤而不忘其矢固女子之貞而不惑亦由潘氏之守已不亂先示之倡而相依以存於義為易安也惜其年不永後思恭十年亦亡盖潘氏以一婦人處其夫與子與婦之變備極人生之毒痛而卒能有立信可賢也其将𦵏知來乞予之文而命其嗣孫之父思狷因莊君宇毅以來其知之所及又若此潘氏擇於所親之子曰學訓以奉思恭祀事而繼君之世學訓思狷之子也思恭有女一人潘氏為選所歸而得壻莊孚誠為顧新山司徒公之女所出實介思狷以乞文莊君者子也今其𦵏以學訓嗣子之孤告于祖赴于姻黨幼未能事事思狷頗佐潘氏執其勞役其乞文能得莊君介以來而道潘氏之志甚悲而有禮墓在鳳栖坑塔子山之原其日為嘉靖二十九年正月二十日而思恭四嵗之殤子克舉亦祔焉是可悲也銘曰奄然而早亡纍然其多喪黯然以同藏惟婦人之為襄嗟其永傷其有不傷有此銘章何誠軒暨孺人墓誌銘進士何君佩甫将𦵏其親謂予曰子路之剛而以貧為傷也豈誠累於外哉亦悲夫親之無以養而不得致其為子之情耳啜菽飲水以為歡仲尼教之云耳而豈能無以是為傷也琚之貧也無以養吾親今徒能為悦於𦵏誠何及哉悲哉琚之為人子也琚以為生也可娛死也何知誠得一釡三鼎以為養雖歛手足形而藏諸猶無恨焉耳而今何以為悦也琚亦何賴於他日之禄而仕之足慕哉予為之出涕不能勝嗟乎君之悲之動乎心而出於人倫也先王制禮盖有以祭以𦵏之所得為以逮人子之不及榮其親之存者豈皆以為死而無知而不足以為孝乎君勉之其所以為悦於既亡尚多乎哉君匍匐拜泣而不起曰是先生之勉吾云耳吾於養既無及矣𦵏而得君子之文其尚以有寵吾親以綏不孝之心而塞其無己之痛使琚猶有意於世是先生之賜也諾之而後起嗟乎吾未見人子之悲慕如何君者文其可辭君之父誠軒翁名聰字元敏娶教授梁珙之孫女生子琦及進士君翁始冠有室值父書齋公徳仁病􅂒盡耗其財問醫求餌家既空謀及簮珥梁孺人曽不吝意見色竭以繼焉朝夕扶持不離左右絶不得事生産作業而孺人自操井臼煑粥調藥面垢衣綻髮不加櫛翁起家以貧然性固澹於財窘陋麄薄有以自安懷嬰兒之心至長不堕壞市井商算詭秘狡譎角錐匕析毫毛攘便争利之機非獨不為本不知也持千百錢為資買賤賣貴以自給要以山谷闉郭來去為遨遊不汲汲權子母也同行有挾鉅資見翁誠質可任欲分資畀之與約入贏之要翁可以利其餘而畀資者因以得翁之力他同行者祈之不能得翁獨辭之曰吾自持錢得贏誠微然累寡而意輕今若受公託者雖不無少賴負責而心勞矣有買物者償過其直翁為分析曰此物直若干公所償太過其為惠我耶抑誤也還之或有以此兩事咎翁為愚翁歸語内梁孺人曰大人所為於志不累而毋欺其心於妾意亦然翁大笑取酒自酌亦酌以飲梁孺人曰是吾妻也閒則與一二耆舊相過禮徑言簡誼好尤敦語不及財也鄉黨子弟遨侈自放翁無意為疾亦未嘗正折之然見翁常自飭盖有以愧之梁孺人每指佩甫君謂翁此吾家富貴種也翁笑曰是固當然然孺人不樂目前而倚兒子自寛以俟後未為與我共適者孺人歛巾謝遇其乏時突烟不起兩人相對翁不以愧孺人孺人不以讓翁或得酒一瓶相酧唇咽僅霑而意氣各得已乃呼歌自謔曰富人有錢財勞苦不休欲如吾兩人清適半刻不可得要是彼人無福耳其誠質無偽而灑然有以自勝又若此昔所稱髙人逸士如龎徳公梁鴻夫妻皆能樂其貧龎公有田可耕翁固不及而梁鴻至為人鬻舂則甚於翁矣然彼兩賢者以有文學徳誼為世所尊禮遂有述於後翁以未嘗學問當時闇然為窮人今復無有知者佩甫君之悲宜在此而奚貧之為傷當翁之身已甘而樂之矣嗟夫君必欲得予之文而後塟固為是與翁以儋州同知公佑為祖母侯氏翁卒於嘉靖壬辰十一月後十六年丁未十二月而梁孺人卒琦亦繼亡女一人嫁黄日烈𦵏之日為嘉靖庚戌正月八日也而以琦祔焉佩甫君執喪過毁纍然僅勝衰既喪其妻顧氏聘吳氏未娶也室無相事而當内奉寡嫂某氏育其孤應年外治𦵏事卜域穿壙備極勞憊不知其身之病可謂能孝也已銘曰終棄者魄能游者魂深其竁而崇其墳築之之勞視之之勤孝子所以藏其親其義則云新㑹司訓純齋莊公暨孺人金氏屈氏墓誌銘嘉靖辛亥十二月二十九日青陽市莊儲侃偁兄弟𦵏其考新㑹儒學訓導純齋公三人者相謀而遣其季偁來謁銘曰偁兄弟慢𦵏非誠不肖不能襄事圖所以銘吾父者而不得以為猶勿𦵏也今得先生銘可以𦵏矣雖慢猶愈於不得銘云耳吾三人者之情事信可悲矣先生其閔之君之子國禎吾壻也能言其祖吾固知其可銘而君兄弟圖銘如此其慎且久也其又可辭公諱安期字際休又字静夫曽祖應元祖樑父宜傳世有隠徳而貲有餘以田園為業公早孤母林氏愛之不欲苦以課責公生而好書少與其兄昌期同學不課而勤其警解卓見常出兄上兄弟並遊學宫為一時髙第弟子方安陋守故之時士窘拘古義文不足發獨公恢放能自為言而濟以該涉士皆驚嗟以其故屢失有司公不為悔陋固之習因以有變莊氏之後子姓益好書而多妙敏開達之才今為郡文物巨家由公發之也儒官固卑訓導又非専官公在新㑹以身任教齊整科條鼓勵意氣常兼其長之勞而不見為侵品隲文字凡出公髙下其等諸生心悦無敢譁争與諸生講敷揚經㫖援據剖剥尤動人聴新㑹方有白沙先生之學士皆聞髙明之要然不敢忽公之言咸曰師命我矣善識士於未有聞而恤其私忘其禄之薄而為之士以此附其識鄧生文憲而䘏之備尤為新㑹人所稱鄧生由御史至郡守未嘗一日忘公也廣中監司無不知莊訓導賢公忽思歸以九年滿請老投牒而行禄餘得數十金不市廣物貯以一囊携歸授諸子戒勿營田宅惟以供具公之族弟教授未菴公榮知縣翠山公晉陽通判梅峰公琦知府青峰公科並有前修氣韻罷官清約長少相懽日携遊對酒遊不為逺取足易至具不為豐聊可娛一日而已嘗謂大鵬摶南溟斥鷃決起枋榆均是一適孰不羨漢二疏棄太子師傅捐數十斤金為髙吾官雖卑亦主教事金誠少非以不義得者今欲自况二疏如斥鷃之於大鵬者其可乎哉惑者多笑而智者以為知言公始娶貞淑金氏佐公為學官弟子時能不以私昵奪公好書之志年二十九而卒公常稱其賢而不永繼娶任只屈氏千户屈鑑之女佐公為學及相從於新㑹以勤儉飭内政公不内顧而事事辨治公性孝弟事母林孺人左右不違母性嚴而終身不甚怒事兄州判公如父分財取少任只能體夫所以悦母者養其姑而以敬謹事夫之嫂撫金氏之子與己子人不見其有異沒于官舍年六十公哭之尤痛而至於今莊氏子姓之及見任只與老臧宿獲語及任只無不悲念者公生天順戊寅五月初九日嘉靖癸未十月十一日卒年六十有八長子儲娶訓導王熺女女適通判朱鑅之子暢皆金氏出次侃娶知府謝光孫女次偁娶學録楊渤孫女女適司訓李宗魯之子逢春次適丁澗松皆屈氏出孫男女若干人曾孫男女若干人婚配皆名族儲等奉公與任只之柩𦵏于柯前山之原而啟金氏法雲山之厝遷以合焉國禎學於予予愛其才亦所謂妙敏開達者常語以學國禎往先得之以是知其有本於先世所聞也銘曰早知而晩成孰遇之恒大畜而小施繄繫其勢惟其厚積而徐發不在其身以祉其後之人徵仕郎致仕信陽州判官紫山丘君墓誌銘嘉靖癸夘年河南信陽州判官丘君禎致仕還家以舊屬故先候予予愧識幾不蚤為權力所逐切髙丘君之歸走賀焉君在信陽能以敏給佐其長州政賴君以濟者十九尤退自損挹不肯以為功事長無惰容屬邑宰貳能以禮遇之温然如主客而期㑹牒課當督趣不苟為懈弛以相徇信陽大州多士大夫覩君之文而飭有士者之風加敬悦不敢忽其俗濶達誕誇君以謹約誠慤涖之人人皆悦予以賑荒行部汝南凶札之後白骨蔽野人将殍者纍纍相屬營捄貸發日夜不給指畫以授屬吏使分地展力不患吏之不良君所分尤可以無患丘州判之譽藉藉上官多聞之者巡撫魏淺齋公憲副端虹川公並以威徳持大體下官不可以非才苟得一言之許君獨為二公所奨形諸牘加美詞焉藩臬諸大夫不以猥冗畜之非不得意於仕也而決然舍去予怪問之君曰處地卑非能以去就示峻邀名在州治民事上非有甚忤猶可偷禄而苟安顧心偶思歸便如心而行賴當路矜憐輒遂所乞耳予愛其言質不為矯矯其髙彌白益内自愧君事親養盡其誠喪致其哀天性最篤畜弟之孤均財猶已出與鄉族居善以睦恤相接赴急周困度其力之所至為之不為過恩以出於力之不堪其情之隆不肯愛其力而自不竭也行年六十有四嬰一疾竟以卒卒之日族人皆哀之鄉人莫不悼惜君字徳亨别號紫山髙祖江曾祖勤祖朝魁皆不仕至君以掾滿三考為泰陵衛經厯滿考得封其父元傑亦為衛經厯母熊氏為孺人妻蘇氏先卒贈孺人繼室曽氏封孺人有子六人雲衢雲漢雲程雲霄雲楷雲龍雲衢娶王氏繼娶葉氏雲漢娶林氏繼娶洪氏雲程娶蔡氏郡庠生蔡國重之女兄雲霄娶黄氏繼娶尤氏知縣尤復尤和姪女雲楷邑庠生娶林氏舉人林奇材之從妺雲龍未聘女三人長適按察司僉事丁儀姪游川次適金吾衛經厯許海子良臣三許徽州教授郭智子維藩未及笄而卒其男女九人皆二孺人出也孫男五人雲衢子宗藩宗澣宗泮雲漢子宗魯雲霄子宗相宗藩聘尤氏知縣尤烈姪女宗魯聘郡庠生賀朝相女俱未娶餘尚小女孫四人俱幼未行君生為𢎞治己酉九月之十六日卒為嘉靖壬子六月之十九日君在日卜墳塋五壙于普江縣三十三都龍首嶺之原坐辰向戍中𦵏君父介菴公右𦵏孺人熊氏左為君藏左䑀𦵏孺人蘇氏右䑀為孺人曽氏雲楷質敏向學年少已有文予甚器之能言君之行以來乞銘𦵏之日為嘉靖壬子十月之二十四日也銘曰抽黄對白曰文之巧題甲與乙為科之茂非徒膴仕崇秩階登級拾而若固有方且髙拱盱視抗論品目擯人以刀筆之猥苟俗之蔽失已久惟論行考實孰知夫兹無怍而彼有疚我名丘君維是之取静山黄公墓誌銘陽春天下所稱逺惡處也公為丞於其縣之樂安驛卑官也前是為之者率以不得職逃去或坐累死公為之非獨能舉其職餘力攝巡徼以什伍之法結其民使相收睦樂安宿偷舊宄知悔其不可為盜之在他境者終公在職六年不犯樂安行者不滯又資以無恐夫其任事溢乎職之所當効能踰其分之所守宜有機辨權數以巧迎而敏赴公顧恂恂質愊檏於貌而訥於言視其外一長無有也然則集事諭人信不在諞訿獧給之小智果有其質則如樂安之地之惡與其人之夷未嘗不可與處歟公有庶弟之忤又嘗為緦弟所訟皆非公之過為樂安與其人處而馴每嘆樂安之逺不為惡而追駭廷除之近有危機也然公撫其弟終始不失愛忤亦衰沮不與訟弟竟其獄卒歸於好鄉黨稱其友事父母孝居喪善哀弔者感動以為難盖有家門之實行焉與樂安之人處宜其馴也公姓黄名椿字仁卿始由光州之閩居晉江可知者四世髙祖原徳曽祖維清祖孟遂生湧娶栁氏公父母也公為掾史滿三考所事上官寛猛躁緩不同公事之一意不為窺合苟避每治文書白署上官輒署或不覆閲曰黄掾不欺我九年之間絶不䝉呵譴所治事務在為人寛比輕傳使依於平至有傳重比嚴人知非公為虐莫以為怨也其在留都滿考當還有同考鄉人者歿而身祼為周旋所以掩其身携櫬同行有患惡疾者附舟公不忍拒行死舟中病視其療死治其殮或以咎公始附不審公意獨得也公於他所為多類此公長子日煦向道力學為俗所非笑公益喜且勉焉明經有文而有司屢失之人皆以咎有司公顧督其子曰是爾之未至也日煦寓書樂安以乞歸為請公悠然意合曰兒子知我哉即日乞歸次子日煥實在邸御公以還兄弟相與為友家儉而理修先世之墓而後築室用公指也室成落之語在宴者曰吾嘗憂不得去陽春今得斃於斯寢足矣以己酉十二月二十七日卒距生甲辰年六十有六二子與公之配翁氏治喪衾棺循禮日煦娶鄭氏日煥娶郭氏一女歸謝誥孫男可培娶邑庠生顧原潔女後公二年夭可城聘舉人鄭一鳳女可堪聘鄭益修女可壃公命為日煥後聘進士尤烈女孫女長許莊以度次未許人墓在晉江縣四十一都古堂山以壬子年二月二十日𦵏予固尤為俗所笑者而日煦與予講甚篤故以𦵏銘屬某銘曰翁之所以爵於人者卑能浮其事勞過其禄良可苟居嘗食而靡罪愧繄天所以爵乎人者以其善不以其位則翁之所謂爵信人之所卑而天之所貴鄭海亭墓誌銘嘉靖壬辰進士待銓吏部凡若干人江南北巨縣以缺令告者數十縣之人仕都下各為其縣擇令交欲得鄭君而無錫有秦鳳山尚書與諸朝官顯者十數人竟為其縣得鄭君他縣不能得皆若有失無錫諸顯者與尚書公交相賀以得鄭君其時予方佐銓司以與無錫以鄭君受徳於其縣人無錫故名為富而多仕者為令者往往朘取殄用其財而逆以機數搆嫉士大夫君至按都鄙賦役之籍資以諏訪得其禮俗所由壞嘆曰兹邑生迫而歛重若此乃謬以富得名民方以媮侈遨佚招四方之目其奚以免因語民以奢敗儉存設陳得失禁戒明白發於惇惻自以裁貶一身服御為率至其張具上官館遇過客交際士大夫舉損於舊度豐約之中使財僅足以成禮而不為浮尤吝興作舍館舟輿苟有可因不妄變革曰勞民以悦人非吾心也既不匱財以傷民心始稍取境内一二巨室横放難諭者重寘之法以示威曰如是足以致刑矣一與民相安為寛平暇則與士大夫相賔接驩不失節士大夫憚以私溷君聴退敕其家亦莫敢有撓也客或見君坐縣堂從容不苛庭中常空異於東西行過縣所見怪胡能然君曰惟不擾人以自累耳君固精經學善為舉子業邑子多才而講習乖剌文不傳於經君為指授大義日開月益邑子咸知所以為文至今科目接跡猶出君門下士為多張運使公愷清徳純行一鄉耆望張給事選以直諫廢貧王進士問病免家居喜文學君敬事運使公與給事進士游加親貢士施子羽能詩老儒李黼工註詁皆優與為禮君與人無忤其温而有辨又不苟然也巡撫中丞部使者莅毘陵亷無錫治行為畿内最交薦之君性恬簡寡迎将又無錢治苞苴以買進秩滿僅得南京户部主事以去留都民曹事簡君益為深厚閉户讀書恥與嬛㨗之士競泊如也以其間為古文詞據理確質有儒術之體重自掩匿不求以名在職随事展力未嘗苟且而惡為皦皦維揚置分司榷舟有大小二闗舊嘗征之君往司榷謂某府史曰征利而為是鍼細髮宻雖取贏胡足貴通其小闗恣舟行莫誰何之榷計以足乃知諸為細宻者非専為國増計也積資員外郎郎中擢雲南府知府未赴郡以父喪歸喪免侍母不忍去左右居嵗餘母病卒始免父喪母勉之行君戀戀膝下竟得奉母之終君為户部以其官封父殖菴公元為户部員外郎母伍氏為太宜人在無錫迎父母就禄養治喪𦵏合禮於二親生卒具致其情克名為子服除赴銓驟感熱疾嘔血數斗醫莫曉所療旅卒都下實庚戌十月十日距生𢎞治己夘年五十有六耳君始至銓江南大郡交欲擇君而毘陵人以無錫治最故欲得之尤力聞其卒皆相弔君名普字汝徳籍于南安之郭前村其世近以鹿寮公為祖鹿寮生厚菴公傳剛齋公某履菴公某而至奉議公世未有顯而發於君君貌豐器度寛深心事明坦宜極夀貴詎遽是止知與不知咸加悼嘆喪過無錫士民走哭道踵相屬津衢咽塞舟厄不得行久之二子欲大封孺人楊氏出欲成女一人繼室封宜人李氏出欲大壻於副使陳瑞山公充邑弟子員能持家劬事卜滌陂龍塘山之原以𦵏遷楊孺人之厝合焉而以癸丑十二月某日之吉行事君固悦滌陂山水之佳卜從其志君為人外渾朴不立町畦而中斬然有限界色詞絶去誇汙擇處其中臨事酧物誠欵有足動人予嘗嘆世末難與成功髙患招忌卑患取侮每謂君持養濟其所稟兩去其患宜可游世遇合伸於獲用遽以是止甚以為君恨銘曰氣彊矣有悍而挫傷才給矣有流而難執不悍而亢是為彊之方不流而集是為給之立可以用之宜莫斯踰而卒不究於用吾不知所以為之吁陳母林夫人墓誌銘林夫人陳體受君道基之母封君北沙翁光節之妻也陳固同安大姓北沙翁當家中落而有室貿田以復祠屋空夫人之奩益之祠僅克復祠復而無所仰食夫人不以懟其夫井臼猥細手皸肌瘃惄然忍餒而謀夫之飲不敢不充其量恐其子以母累心分力於學常掩罄乏黽勉其間為夫納妾輒自勞以稍休之使安夫之寢或狎恩為倨不以微變容色有女育之如實已出翁剛而多怒夫人先後其意無所得怒久之怒益寡閨中訶詫驚遽之聲遂絶體受君為諸生文早有名有司未之求夫人不以過其子知其才之未迨乎時也及為進士業通顯矣夫人不以詫其子知其學之足以得之而事業之待於後者逺也從其子於嘉善之縣邸美水土物之鄉而户善織綉文錦夫人携閩海菹腊以往不欲多買市味身未嘗服浙中杼軸佳製也歸以去時之篋還里姥隣媪争走問怪曰母夫人從令子為官人謂若何而衣服囊如此乎姥或微語于列母夫人亦為亷耳盖以貧靳之也夫人聞之心益自得入門以子賀其夫曰兒子為縣能自貧而愛人請為公賀復謔曰吾攝父教子能為良吏公宜我謝翁媪俱下拜一笑已而泣數行下曰吾疾矣不免以死累公然命也兒子苦留吾邸第以思家諭之寔欲一見公而返骨於故土也恐兒子之棄官以從我故不使知其有疾耳未幾果以疾卒卒之日為嘉靖癸丑十月十五日距生成化丙午年六十八矣上方以諫官御史缺召嘉善君入試行至姑蘇訃至君號慟屢絶嘉善人驚相語吾賢母夫人死耶走哭於舟次道路相屬君受弔而不受賻曰敢以母死忽慈誨而辱其志也弔者不得致其情大哭而散君娶蔣氏於予有連其𦵏卜於晉江一都之科山貸於外氏之有力者而後具予亦助之其藏坐丑而向未規地穴竁皆翁自營手畫翁本曉堪輿家言故作而逢吉君将以是嵗十二月丁酉行事拜且哭謂予道基不恥受助於先生以謂以是𦵏吾母而地下之魄宜寧也賜猶有大於助者請以累先生子曰其銘也諾之拜起輟哭淚汩汩承睫不能收曰世所謂求仕謀禄無不欲致享其親而士當以官守甘約不辱其親為孝則於世之享猶不能厚也道基猶謂有所待於他日云耳誠知其不待雖以百里之儉猶足致吾母之享今其為小亷而薄親矣悼恨何及嗟乎君方其存也養之而安顧以既殁而薄之悔不亦篤於情而惑於義哉君淚乃止夫人有子三人長冕次復皆早世季嘉善君也孫一人金鼎聘南安庠生黄良煒之女女嫁同邑吳榮有子曰椿其去同安而僑於晉江夫人實與翁謀欲使其子便師友以廣學嘉善君治四經而後以一經起家果協始謀亦偉矣銘曰協浙之揚兮輿有板從子之樂兮其樂反反衣有繡兮食有珍洵美樂兮匪斯存樂子之樂兮厥貧猗嗟乎夫人益府典膳省菴黄君墓誌銘君名鷟字徳夫安溪人世居縣之長泰里㕘山祖廣奭生功養生春生而生君㕘山林麓豐茂原田膴潤其人多因山田之美自饒給不羨榮達故黄氏世久不顯君蚤孤比長知苦剋讀書向意仕進業通而數厄卒不得顯入貲為藩王府典膳待次益王府君既通儒業而襟韻閒曠行誼謹敕府中人皆異之以得君相賀世子賢而有文嘗引見君與為禮别於他僚間嘗從郡中文雅士人游縱觀仙都麻源探謝靈運所窮處摩挲顔魯公所為仙姑碑文不為窘齪其軰相目自以為不及次逺未可待請告府中人不欲其去君詞懇得請世子為餞贈親篆大書以賜焉至家族黨嘉君能自樹表見又皆相賀君益為族黨人談説當時制度他境謡俗及道途所厯風物登遊山水之勝勉子弟以就學攻文曰吾聊以遨遊適意此冠服何足為榮行棄之矣日以敦睦族人為事嵗時聚㑹酒香殽佳叙倫合情雍雍如也費無所惜細人耕君田者不敢以役畜之徵租嘗緩期有負常已之畢賦税外謹謹不一措足縣廨堂階汛除芳潔而静門無伍伯之跡嘉靖戊戌八月以疾卒族黨哭之皆哀距生𢎞治己未年僅四十子大本大任幼君之配蒋氏能劬飭育孤持其家不墜為二子娶婦嫁許五女適詹鳳翔林有棟金重宇徐𢎞讓李任春皆得所歸有棟知言性命之學而重宇能為文章佳士也大本才而有志友於有棟重宇俱為弟子員卜永安里宗教山之原塋壙以襄大事君其何憾君四嵗孤常自悲不得事父母又當嗣其從祖父外養祀事又自悲曰吾不得事吾父又不得祭吾父也於是竭情於嗣父之𦵏祭而事叔與兄極孝謹曰叔吾父之弟兄吾父之長子也事之盡力庶幾猶事吾父也大本将以癸丑十二月初十日襄事泣謂予曰吾父不欲冺冺為無能人不幸短世已矣不孝孤也弱其何以𦵏惟先生哀之予納拜而許之銘君重氣誼踐諾好施自奉纎嗇而知用財常行見橋圮途崩問其土人胡不梁而砥之人曰安所仰貲君曰於我乎取遂得君貲以濟銘曰生之促兮𦵏之遲有銘昭之其奚悲楊坦翁墓誌銘楊坦翁歿縉紳大夫士友往弔相屬巷人為諠徐少湖公寓帛助歛忘元相之重下賵匹夫固寵其子之才而䘏其㐫亦翁之髙有以得之其子士中謀𦵏士友為四出視地得吉鳳凰山之麓予聞往觀之小丘蔚然四下中髙拱以羣峰之秀大水流其前髙人遺魄非斯宅不足以藏之𦵏之日得嘉靖癸丑十月十日之吉去翁殁辛亥十月十一日兩期之問予每見士中未嘗一日有嘉容力貧以嚴其親之終故勞且久而後濟翁生而丰儀褒整神觀翛然有世外之氣多讀書不學為章句講解畧通大意泛涉藝術亦不求為精獨好老氏道家言其言神霄太清丹臺紫府自有君臣民物儀法與人間凡有不大懸殊事動在下徵聞于天其有愆釁癘札如得請于帝蠲貸湔滌化孽為祥如響答桴其應否在人尊信至不至嘗薄李少君新垣平諸昔燕秦海上之言不入道門而資為方終陷矯誣帝所不貰是時國家方修禱祠交接鬼神為民釐祝言科決者多得幸獲大貴顯備極尊寵翁謂此道其精以翕錬元形苴滓以救度塵世徼榮染權非道家所言故其治家接物一出於詳厚退慎諸所酧酢經營奉父母畜妻子賔際姻友踐微勤小要在累積功行以修陰㝠之徳晩益為洒落對碁飲酒悠然無忤或以為疑翁云仙家不禁酒奕中自有道機疑者皆解且嘆慕行年八十餘步輕視瞭膚瘠而貌澤每出行市㕓間望者以為仙人也自知年齡所至有神黙告之先處其死之日時炯然化去不為疾困良有得於老氏翁累功積行多可述其精者有在則積累者反畧功行道之所出也其畧也宜翁名某字某父璉榮母吳氏祖守恭曾祖朝諱髙祖世昌皆隠有行配陳氏淑敏而莊能劬事嗇生以佐公之髙育子又不以慈弛教先翁卒𦵏之于某山之麓子士亷郡學髙弟子次士中也文最有名舉于鄉能以翁聞于縉紳士夫至勤宰臣之賵翁之所保宜不如是而士中以是為孝季子士實女二人娶嫁皆名家孫男女十人翁遺言但得山水佳處藏我不必合祔士中奉焉而卜兹吉士中謂予曰吾翁之域先生往觀其竁俟志之而後掩予曰諾銘曰惟葆其光其神不亡不亡者游棄者垢糠斯銘不毁是為髙人之藏遵巖集巻十三

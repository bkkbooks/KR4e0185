body:
  text: 遵巖集巻七眀王愼中撰絶句七言送諸子興年兄由刑部郎中貶尉髙眀四首執法西曹觸漢章側身萬里竄窮荒聖主恩同雨露湛莫將三水擬三湘李白當年號謫仙西禦夜郎到日邊自古娥眉多賈妬直須秀句與人傳南中氣候無春冬椰葉藤梢嶂壑同壯髪三秋變嶺外鄉心一夜返江東積海􅉫天天倒流扶桑拂景漾西甌渡漢若逢機上女問他何事泣牽牛送程舜敷編脩坐謫髙凉三首雲聳炎峰峰萬盤烟浮瘴水水千灣南過蠻江莫作賦屈平當日不生還侍臣衮衮扈甘泉攀龍附鳯總神仙南中留滯河東賦直與風吹到九天疊嶂連山遇海隅茫茫雲氣接蒼梧排閽呌闢虞神館告予微臣罪有無河西阻雪懐江于順員外二首四野垂隂晝黯然朔風吹雪舞遙天不見玉人空悵望祇看瓊蘂比嬋娟楚客幽蘭儷妙曲風人麻服比明姿可憐澤畔行歌處不是山隂艤棹時滄洲道中寄蔡道卿二首𤣥鳥差池逝不還霜鴻回翅欲辭寒惟有濁河流向北憑將雙涙到桑乾泠泠風舉碧羅裳一曲焦桐月在牀寂歴寒波兼墜葉不知何處是瀟湘苕溪舟上懷蔡可泉岸花夾水備芳鮮愁思看時倍慘然幾欲將愁寄流水苕溪又不到桐川可泉有使送予至臨安遣歸使乎欲返太匆匆把筆裁書紙又窮此後相思無路覔祇應來往夢魂通逰少林寺四首三十六峰面面開分形殊態照香臺闕湧金銀拔地起風傳鐘磬出雲來滿目金光見聚沙香泉祇樹自交遮潭影長開千古月林芳分散四天花名嶽千峰錦繡圍中開寶地萬珠輝池涵徳水青蓮長嶺覆慈雲綵鷲飛蓮花梵宇逼諸天繡拱雕欄日月懸水作龍吟來學唄山如虎伏㑹叅禪初祖洞賦得四物㘙樹百文巖前無限樹繁條布葉備書經文字不立何所用空畱千載色青青石藤藤樹葱籠不記春孤根盤攫幹輪囷當年面壁因投杖化作龍形繞法身洞泉飛泉噴玉自潺潺本因無意出人間日夜流行尋大海依然不離此深山龕燈熒熒不㓕院前燈萬壑千巖一㸃眀為憫下方迷覺路長懸光景照羣生梅巖洞候陸使君不至詩以寓嘲一入深虚不自知泉流雲出世中迷行尋竈畔逢石髓欲待稽康已作泥送魏思說厯草衰木落故辭新寂寂幽居避世人只恐山中忘甲子題詩為報周王春至日寄彭石屋厯一陽回復氣還周消長知君已自由莫學秦人桃洞隱不知世上有春龝行署壁間見故太僕陳石亭先生畱題已矣斯人愴然􅋞涕凋落粉素墨淋漓銀鈎掛壁網逰絲池水難尋濡筆處循墻今讀古人詩曾汝誠目有羞眀之患走筆問之知君習静閉𤣥關兩目應無五色干好是懶為青白様紛紛濁世不須看宿貟通寺題壁終日匆匆意似猿髙齋一宿制驚奔白雲枕上醒魔力流水窻中浸夢魂聞原弟至武陽骨肉情深千里輕飛書忽報達江城開門待汝須臾頃起步幾回獨繞楹舎弟至邸是歳除日喜氣衝寒滿面開歳除不意汝真來長貧宦邸無餘物也有屠蘇柏葉杯除夕有感嵗去江城人未歸寥寥心事掩寒扉明朝一歲知何似三十年中已盡非元夕示舎弟道原百事嬰心感我生因耽寸禄竟無成行年三八仍過七歳月空多作爾兄春雪懐故園諸妹同舎弟作東風吹雪暮雲斜貧病經春苦憶家不詠撒鹽將栁絮猶看如玉暎荆花治園偶作隙地為園學種蔬帶經自灌更教鋤中心取適非謀食老圃堪言我不如摘蔬多病臞然野澤姿已甘蔬食與生宜萋萋葵樹欲教拔俸薄家無魯相資題桃花潭水别意巻暎水桃花千尺潭水涵花色轉看深争如門下尋師者臨别殷勤一片心觀江州諸生文示薛廣文仲常薛乆滯儒官因以為戯亦解嘲之類也湓城今日似髙唐綿駒一變曲洋洋他日欲誇稽古力定因門下有何湯宗室西亭折梅見寄漫賦此為謝冬盡梁園見早梅美人折贈數枝來應是同心遙托物細看芳㓗歳寒開病中辱西亭見問走筆奉柬伏枕綿綿朝復昏故人枉訊慰愁魂須知摩詰非嬰疾待子來叅不二門赴何實甫九日之招先期病作宿齋中漫題四首華山山下逺公房應有黄花待客香悵望雲烟空太息可堪明日是重陽徴選名歌閑且都繁聲緩節勸提壺不知病裏聞歌懶却道先生太性迂平生涓滴不濡膺也對青尊坐有情莫道先生不愛酒更無愛酒似先生居常愈疾少名藥只把看書當品嘗起索齋中無一巻因思閉目是竒方九日雨止力疾登萬石峰四首黄花似解喜人來作意生香泛酒杯風雨昨宵真錯惱今朝菊蕋為吹開亂石髙峰最上頭脫巾掛樹在清秋戴㡌盤旋尊爼畔孟嘉未可論風流最令人悲節是秋勸君莫作昔人愁手把蟹螯杯更滿世間萬事可長休雨罷天青山盡出登山勉強扶衰疾縱然不飲茱萸酒猶勝家中過九日過黄後溪江樓十首巍基孤起凌蒼巘巧構相扶瞰緑波列牖洞開掀玉宇踈簾髙捲近銀河綺疏窈窕栖雲氣珠綴玲瓏蕩水紋四序風光隨戸納千家烟火隔橋分危欄面面牖雙雙閒坐閒行總對江欵乃一聲何處發微風吹遇到南窻白浪如山潮擁來長江東去海門開天連極浦鳥飛盡日落空林船正囘環撑繡拱欺霞絢四出琱簷礙鳥飛日月升沉前後闥隂陽向背北南扉題鴂聲藏斑竹㟁揭車香滿白沙洲美人獨倚江樓暮渾似瀟湘木葉秋曲檻迴廊備四時曉烟夕月盡相宜羣山端為開圖障江水直堪變酒池水面層樓如湧出波心複磴若乗空玉醆傾殘人在鏡瑤琴鼔罷曲隨風陌上紛紛來往多樓中隠隠動笙歌行人囘首陌頭望天上人間若柰何崇山遙枕帶清流顯敞茲方信寡仇昔日仲宣徒作賦竟非吾土豈銷憂謝人恵木芙蓉栽翠榦分枝和露至芳根得土帶烟栽園池揺落秋風裏只待紅英暎水開挽王隱者溺水死鼔枻乗流一丈人入流不出返於真厭盡世間塵垢濁清川為濯去時身雨中憶張達甫卧疾從來多病少懽悰怪爾沉𡨕與我同最是病懐增惱處芭蕉葉在雨聲中雨中憶尤子偉卧疾二首風吹斜雨濕窻紗危坐惟看書滿家幽意須君來共對門前不見玉人車弓影心知已不疑淹旬伏枕更胡為此時何事偏相憶寒雨蕭蕭把酒宜與王介亭眀府覔桂花栽桂滿山中刈作薪小園難見一枝春河陽縣裏花無數寧惜餘芳及故人戱贈黄得山入山穫稻二首持䥥往刈稼如雲直與農夫割畆分倘遇龎眉荷蓧者應譏四體不曾勤山田多熟是新菑霜後正逢收穫期稼穡不為禾莫取知君未誦伐檀詩柬柯東墅長子娶婦生男有室更何求人序相催易白頭尚子男婚如已畢相擕可入名山逰寄厯與呉泉濵先生走筆戯柬周正厯中新改歳秦人洞裏不知年韶華荏苒看何處氣候分明是髩邊聞道原舎弟除武選二首日邊除命喜聞新愛弟為官消息真豈慕繁華輝棣蕚還期事業答楓宸宦籍爾今新典馬人情吾已任呼牛長公賦性元乖異用世還須讓子由寄道原弟二首承平耀徳武功卑共説觀兵屬此時談笑折衝尊俎上好將竒䇿賛攸司攻在心間真破敵籌於幄裏是銷兵勲名本屬文儒事莫遣人將白面輕題卧壺山人二首孤支白石為髙枕四剪青霞作幛帷歴選名山惟愛此更無飛夢到牀杝泉浸夢魂流百道鳥驚􅀈息呌千般莊生化蝶寜為適尚在人家枕席間平蠻凱歌十二首寄胡總制梅林公横海建牙雄節鎮伏波選卒冠軍名共看分閫詩書帥盡道中朝仁義兵函持穹土雖無外震擊雷霆自有權萬楫齊飛波瀰瀰三軍盡肅鼔淵淵砥平溟漲絶驚瀾宿怪消藏不敢干自是頑苖來送死况逢義武有除殘處置分明憑號令指麾妙宻握機權英威坐制踰千里醜種真疑動九天鮫島星羅猶掌上鯨波天浸只胷中籌畫險夷遙授算出師千里自臨戎義激諸軍奮怒肝蠻腰如草恣薅芟鯨鯢血變天池水日色殷紅照萬山善决竒謀成敗頃堅持大信賞罰間雲烟掃蕩歸虚壑草木昭囘窮髪山計日持糧竟㑹朝欃槍已報隕蛇矛摐金閲士蒐軍實我旅何曾損一毛百險行師曾入諫萬金收捷始相驚清笳急篴中流駛總是囘軍小海聲面縳蠻王就檻車垂頭畏死乞須臾自矜跋扈滄溟窄此日翻為釡底魚天王有道自垂衣坐付元臣稟廟機築觀分流諸島上直令日􅙡憺皇威當代㡬能生俊傑許身已可繫安危眀公何不登三事國勢終須賴四維寄本兵蘇舜澤公舜澤公以少司馬往總制宣大諸軍事時宣大有冦警至失大將朝議以為憂故輟公本兵以往予本懦夫聞而壯之為賦詩十章赤白囊封晝夜驚君王輟食詔論兵黄金殿裏畱身奏邊事艱難請自行國憂偏急在西師臣辱況當及此時受脤因言天下事治兵看勒日中期指揮號令動風雷禆校千羣竈下材雙轂流脂飛電迅至尊親降玉階推訓警疲駑成練卒招還擕散號全廂共言昔日亡軍地便是今畨破敵場諸邉誰最係安危不戰堪言是善師撫得降酋成骨肉懾教醜類識旌旗地形分畫防援速士氣清眀殺獲多驟變威靈加草木依然往日舊山河靈州城上月彎彎洗浄塵氛照漢關唱盡軍前横吹曲迴頭正見紇干山㑹獵常過髙闕道燒荒獨上單于臺王庭已徙逾南幕精細徤兒刺探來飛狐隁塞㳺兵撤倒馬重關壁戸開誰道山東惟出相如公文武是全材小醜厄年當北遁皇朝今日合中興凌烟閣上功臣數敕與畫工特地増寄翁司馬奪情總制易州十首漢室築壇求大將人人自詫得兵權廟謀知用詩書帥徴璽直教到海邊聖主宵衣念北陲微臣敢復顧親為登車慷慨雙行淚一為公家一為私手披荒土植松楸天使臨門不敢留同位如將襄大事九重誰復解殷憂光輝道路傳宣急一夕鋒車八九催帝眷真如失左右一程程報夏卿來象珥琱弓矢百盧千官立仗聽傳呼忽看宣付翁兵部百萬人中一丈夫赫赫威名古北平猶傳宣大舊中丞一從金榜承黄鉞驕子聞風已角崩火入咸陽五柞宫防邊還與漢年同將軍並拜誰真是看取營門細栁風借箸上前籌敵勢中人偷記畫成圖臨邊捷奏紛紛至按籍真如驗左符開府何曾忘倚廬西風灑泣墨衰疏功成第一朝天闕乞得身還經未除天為世難生英傑帝遣邊人識畧韜掃盡四郊防賊壘清夷天步静神皋寄大中丞思質王公十首時有冦警朝議以通州國儲所在根本大計而形勝實扼東南津㑹國之門户寄重地要急在得人因即州為鎮開府置中丞而公以侍御超拜良一時盛事云急警烽烟驚乍定新懽魚水契偏成一言悟主前人有不似今時值聖眀君王手弄中丞印四顧無人勝趙堯承恩佩出明光殿一日聲華動繞朝借籌席上談兵事聚米庭中筭敵情爰赫龍顔開霽色果知小醜不難平名姓榮看黄帕覆中人宣押到中書不許尋常依様敕分眀撰出帝親除繡斧獨當天上立牙門偏近日邊開誰知江左能文者掩盡山西出將材聨絡鈎陳翼紫樞崇墉複壁潞河隅隱然虎豹在山勢為有中丞仗節符燕地文皇定鼎州御溝分入潞河流扼要真堪門戸守計儲還副本根謀擾擾近郊别置屯防秋急在塞邊藩共言萬竈軍聲盛總為千倉國計尊雍奴諸水探源長遶帶漕渠壯帝鄉坐令洪流行軌道東南萬里引㠶檣許下偏資分鼎國關中徒饋割溝師請看今日逢全盛廥庾如山守四維唐有懐以九疑之茶分贈二首永州太守清於水囊攜芳茗擔還輕却分囊茗過閩嶺重儗千鈞未比情多病却無口腹營獨耽泉茗類頑僧走向北山汲深澗松月牎前自煬鐺唐翠軒於予南都漫稿自謂有契賦五言長詩一百五十字見投盛有所稱引予感其意作此答之自嗟風雅委荆榛毎有詩成不示人流水髙山如善聽朱絃寜惜為君陳靈源紫雲室贈静上人在世還隨出世縁相看去住兩超然山門相送無勞逺還擬來叅後乗禪洪芳洲相送至山魁客舎殷勤壺酒杖頭擕客舎墻邊梅一枝此後梅花應入夢分眀記得把君巵山魁途次與芳洲分手亦知隔歳還相見且忍茲晨暫别離紅樹滿林人黙黙青山斜照路遲遲小營道中寄洪芳洲獨上巾車有所思停雲却被疾風吹欲知别後還家意君到家時先已知至館視芳洲讀處因書所見二首齋閤本來無長物讀書人去各依然唯有一牀經坐處兩當自膝已皆穿渴鳥下來窺硯水㣲蟾初上照絃琴素題當几埃如墨知是㷊膏暎夜深贈寫神徐子美二首齪齪模形寜足貴區區謹貌亦非工看君用筆躊躇處都在一雙阿堵中紛紛人面各媸妍筆勢傳來畫宛然土木形骸常自笑因君描得也堪憐寄荔枝與呉泉濵聞君習静物都忘新得馴禽畜字方遣贈荒園紅荔子山中百鳥好來嘗與何他山期住靈源數日予偶以事先歸二首嘉諾本期山頂宿却尋歸路下黄昏風前巖草揶揄態媿面倉皇出洞門天邊斜日漸低山照見歸人影不閒舉首遙瞻峯頂寺禪凢只在轉身間城中懷何他山因寄之二首不向山中長作伴翻從城裏苦思君去畱遲速争多少為問峯頭一片雲千峰遙望碧嶙峋正憶繩牀偃卧人莫倚巖窻輕郡郭相看都未是閒身題陸心梅梅是錢塘小陸心終朝不見已傷神能令掌上孤標出賴有青門與寫真聞沈青門㳺跡至泉二首雲路𡨕𡨕一羽儀却尋佳樹集髙枝清源太守懸孤榻從此定因屢下之青門為郡矦童南衡之友故云聞道新詞三百首燕趙傳無一字訛閩中乆斷人逰跡嶺外今知子夜歌沈青門見訪二首翩翩公子似虞卿所至侯王虚左迎朱履錦貂全卸却獨欹髙幘問柴荆長揖未遑講主賔挽鬚顧笑有情親曽從巻裏看詩句已是摻祛識面人看青門畫漫題二首神搜物象鵰從兔手契心目鏑應弦吮墨含毫真畫史看君機用已詮禪黄粉丹青各未施觧衣盤礴欲何為袒跣狂呼驚急起傍人盡道長康癡青門有題寺壁戯柬之衛象題詩張璪畫二絶今看併在君莫須禪老嫌為疥一堊浮空掃斷雲送藥與青門二首靈草孤生萬仞山辛勤採掇出雲煙為憐詞客經時病倒與囊空不用錢長卧繩牀託滿宫病裏風流亦不同雙雙藥杵月中落併入經聲繞碧空贈陸心梅擺亂風煙不可禁紛紛紅紫自成林一登姑射逢仙質描盡人間濃艶心題鑑湖越水千名說鑑湖淩波虎阜勝呉都依稀似向圖中見不是江南此景無小庭芙蓉開殘柬林沙溪公過賞盡說看花愛盛時向闌幽意有誰知繁花落後孤英在風格如公相對宜訪柯東墅草堂以日暮迫事而返二首殘陽急堕孤峰外幽意未酬片語間惆悵浮生牽迫甚門前即是隱君山日斜相送出林丘笑我故為不少畱猶勝剡溪乗興者到門不見却囘舟冬日郊望二首長溪𣺌𣺌斷行舟惟見閒雲逐水流徙倚溪頭忘却去此心聊共水悠悠寒鴉飛盡暮天空繚繞川原晻靄中林葉如丹垂欲堕枝頭更起晩來風題黄秀才讀書處千峰亂石勢嶙峋黄葉堆中自托鄰莫向煙霞空自老公卿方用讀書人送夏中山歸九江問君家住廬山下數畆磽田聊可耕别來相思瀑布水夢飛時到九江城漳南山閒寂海上人開堂半嶺法力髙勝予頗資叅叩二首峻絶孤峰透步難黄龍三問是巖關繡鴛呈出針紋隱駿馬自驚鞭影間生如靈樹契冥符貶剥諸方没破除自笑欲談詞忽喪江州鈍置老尚書法通乆住半嶺歸天柱巖題二偈示之誰信活途在死門佛祖是寃也是親究義問禪元涉妄削金添得眼中塵執事既迷著理非欲從何處取真機太虚遼廓無邊際一任雲行與鳥飛法凝法純二行者從師閒寂結夏清源就半嶺落髮各與一偈歸呈閒寂印之世間萬法亦龜毛終臘還須剃㡬遭除是全身渾喪却從他頭上有垂毫辭家受具有何求一髮不容顱頂畱落了還生他日斷直須認取本來頭古樂府俠客行四首英英名姓滿咸秦然諾如山不顧身笑却朱家生季布猶煩緩頰說他人目懾荆卿非勇膽錐傷晉鄙可羞顔稜稜怒氣堂壇上頸血看濺十步間輘轢王侯氣若林片言不易萬黄金兩河南北人無數緩急惟當劇季心長安城中多車馬日暮相逢杜陵下半語未交意已傾餘人𤨏𤨏何為者結客少年塲行二首羞為里巷屠兒飲笑乞矦門廐養錢意氣相要俱有贈惟將寳鋏與金鞭埋名都市無人識誓死沙塲各自知一夜五原烽火急起從召募羽林兒隴頭水二首奮衿結束事從行只為邊功輕故鄉行到隴頭聽隴水一聲嗚咽一迴腸鳴聲如刃傷人耳寒色似氷鑑馬毛此日佳人垂淚憶不知身在隴山髙薊門行置酒軍中舞又歌雪花偏向薊門多醉來欲取平戎印報道天驕已請和凉州詞二首莽莽平沙鴈不飛馬頭誰復寄征衣欲看春色惟憑栁栁葉初青人已歸河西老卒不知秋獨倚營門望戍樓蘆管聲中千里月萬行征涙一時流少年行四首寳劒如霜拂陸離半酣調笑擁胡姬傍觀莫問心中事明日殺人應始知憑陵閭里恣驕横屠狗吹簫弟與兄探著赤丸先殺吏刀鐔帶血市中行紅塵一道見飛韁突入青樓倚象牀笑擲朱提如糞土博教紅粉片時粧百塲縱博百塲贏萬目窺覦萬目驚壚頭更醉須臾盡不賭金錢只賭名古意二首眀月弓弦鵲血調清霜劍鍔鷿膏銷掛箭須時聊在服歛芒未試且垂腰田竇傾移車轉轂蕭朱交結火飛烟揚雄只觧耽清净執㦸白頭草太𤣥塞下曲五首日落沙塲邉馬鳴蘆笳四起助悲聲春風不到黄花戍朔氣長懸白草城人烟斷絶惟看雪關月吹殘只有風遙指邊人獵近塞居延城北半天紅拂雲堆上望巖嶤火徧秋原白草燒數騎南來鳴鏑響邊人探是射生鵰邊庭日日老風沙更向樓頭聽曉笳莫恠壯夫容髩改白頭蘇武也思家層氷千尺壓崔嵬萬里寒隂凍不開回樂風髙終古在但看征戰幾人囘從軍行六首刁斗聲傳催蓐食挺戈躍馬過蕭關金瘡昨夜元戎吮為報閨人哭不還苦樂軍中日不同錦裘貂㡌自臨戎蒙茸介胄生蟣蝨老向邊庭未立功狼烟髙照羽飛書亭障迢迢塞草枯授鉞争看求大將勒兵誰為取髙奴畧地欲將青海隣新開邊境更名秦風沙塞上埋芳骨紅粉樓中憶逺人從軍須是問何從莫倚琱戈决䧟鋒貳師帳下分金劵猿臂將軍老不封邊塵蔽野飛無定半是征夫朽骨灰毎歳將軍臨大漠㡬時天子棄輪臺出塞曲五首雙轂親勞萬乘推琱鞍玉勒引良媒長驅直搗樓煩北有耳何由掩疾雷組練千重色似氷隴頭親見將星眀鳥蛇結陣雲横野貔虎連營月近城銅焦儆卒催先發玉斧分兵逐右賢苦戰三軍俱飲血誓將名姓勒燕然邀雋分追五單于干戈擾擾不勝俘生掠降戎偵􅀢幕啣枚一夜到狼胥關山何處不堪愁獵獵悲風塞草秋本倚功成憑箭鏃寜論情怨望刀頭入塞曲六首一箭穿雲敵騎亡牙旗駐磧受降王已勒禪文姑衍上更將露布達明光漢帝未央親定賞最竒深入是髙勲萬人膏血塗原草恩寵都歸霍冠軍巻斾風行掃北平鐃歌盡唱凱旋聲白䭾載甲三千萬無數降王繫一纓七寳粧鞍馬汗朱凱行身著賜貂褕幕南斥斷天驕帳闕下臨看日逐俘駝峰盤炙蒲蔔酒爛醉親霑陛賜恩金印纍纍懸肘後何言兵出是㓙門奪取祈連築漢臺敵人魄喪色如灰邊亭卧鼔休鞍馬每過山前慟哭囘烏夜啼銀漢微風月半隂輕羅繡幌麝烟沉栖烏不曉膓方斷故傍紗窻啼夜深銅雀妓囘檻曲檻若平生漳水東流日夜聲不識舞腰渾折盡西陵寂寞豈勝情眀妃曲二首君王無計慰銷兵借妄和戎講舅甥幸以香肌當破敵免傳玉貌只傾城掩抑琵琶馬上羞未搊玉指淚先流關月猶同邊地色朔風争似漢宫秋紫騮馬朱汗四垂碧玉蹄韁絲陡勒不勝嘶長安陌上催花雨萬樹紅英踏作泥青樓曲髙樓千尺碧雲齊楊栁枝枝到地垂落日少年來繫馬獨將肝膽與妖姬秋夜曲二首多情理素在幽房熨貼頻賡膏火光暗覺手中刀剪冷不知屋上有飛霜漫漫遙夕漏聲乾錦柱銀牀暎月彈不為幽思耽理曲分眀怕近綉衾單采蓮曲四首畫槳雙雙刺浪渾一江香水蕩心魂搴花綽約將侔色踏藕輕盈不損根荷珠覆手濺羅巾約腕眀璫扱袖頻並戯莫愁江堕日相將還待月迎人橋暎垂虹通宛轉波開眀鏡照娉婷風前一箭菱歌斷猶帶餘聲過别汀碧波湥廣愛迴塘窈窕芙蓉暎麗妝鳴楫流光開一道藂中驚起兩鴛鴦楊白花暎日因風斜處處穿簾栖箔亂紛紛忽觸美人遲暮感星星㸃上石榴裙江南㺯輕揺弱水沙棠楫横掛逰絲碧玉簮艶冶相邀春似海人間花景似江南春怨流塵寂寂網窻紗懶畫娥眉貼髩鴉春色不知人去逺也分紅蕋到庭花關山月二首青海風髙月出遲關山漠漠鴈飛時不寐征夫俱淚落何須更向曲中吹萬年眀月照霜天獨向望鄉臺畔圓共看氊裘嘶馬上應同閨被繡鴛邊巫山髙微流懸溜思鳴佩血染丹楓想濯裙十二峰頭自翠黛至今不斷雨將雲寄逺曲遼西遣戍未期回搗盡寒衣無寄媒砧響只憑風送去邊頭風又自西來折楊栁脉脉含情出洞房盈盈結腕約眀璫柔條冉冉難攀折弱指纎纎那忍忘七言四句樂府最愛中唐諸家為有風人之致慕而為之輙成百首既成自諷愧不近也惜其既多未能即棄今録數十首以寄宋膳部仲石先生居常自念朽廢無事作此無益徒費日力猶妄謂賢於飲酒博奕不知自有道者視之其為淫癖殆有甚於飲博之過乎良可愧也既以自儆請并示吾弟道原使務為有益勿效吾所為也附詞念奴嬌江州訪王行人精舎欲問幽人何處尋紫陌紅塵城市梧竹陰間見數畆芳園一泓流水室貯赬霞窻含繡嶺遙憶彼中是入門長揖只詫客何来此拂袖便據胡床滿目酧接有東西圖史噴玉鳴泉聲㶁㶁曾幾臨之洗耳栽菊待飡藝蘭充佩事事遺芳滓蹔然辭去即看咫尺千里滿庭芳王行人諸子孫出見賦贈垂領兩髦自綦雙絇滿庭玉樹輝光誦詩習禮橦布作衣裳應是藍田種玉琢許多珪珀璆琅令人嘆何物老嫗生此寜馨郎想當年生日曾試啼聲定不尋常嶄然露頭角恠底清揚休誇封胡羯末淮南後裔姓名芳君家住雖臨湓浦華胄也稱王洞庭春色秋後苦熱潄石礪牙枕流洗耳幽意甚深記郎曺朝謁紅塵撲火相門迎候赤日流金熨盡崚嶒嚴冷面向炎燠摧殘思不禁非本性但撦將手板擲下冠簮一從鑚名仕版謾狐鼠得計甘心笑權豪氣熖能焚玉石栖巢髙突燕雀將燖縱壑逰魚真得性鹿辭獲呼苹赴茂林瀟灑也任海焦礫爛難勝静襟燭影揺紅江州公署夜月作翠幙烟銷正虹斷雨聲初歇碧天如洗四無隂庭院人蹤絶坐見水晶宫闕俄湧出一輪眀月浮雲片片細㸃輕遮愈加清徹起步循除沾衣玉露蒼苔滑含情不語有誰知此際心如結静聽鐘鳴漏咽把闕滿江紅觀象戯作勁馬輕車衛嚴將分明部伍驚小院紛紜角逐軌蹄無數風雨崩騰呼吸頃烏蛇翕霍摧移處鬪危機剽忽斫休營邀歸路攻與守相制禦竒復正尤觝牾得失斯須變坐分勝負淝水三千能破敵昆陽百萬徒為虜却推枰一笑古来事只如許同前夏日書齋小睡作小午空齋簾鈎乍動微風透湘竹冷簟紋如縠尢宜清瘦鳥語呌殘恬不寤花隂過盡酣初就側綸巾掛枕半罥頭全承袖白羽扇未離手摇麈尾還在肘北窻人古也而今真又四體化為蝴蝶栩一生都付黄梁􅀈世人醒是夢却嘲余眠長晝水調歌頭春日觀田家感述蒼烟横廣野白水滿平川處處郊原雨足剛及暮春天生長元知土性種植無違農候老少盡依田塍笠童猶穉擕筐女正妍感吾生底覊束甚纒牽總為區區口腹一飽受人憐數畆隰田宜稻三徑荒園有竹何必大官錢幡然平子興去學有莘年沁園春首夏省耕緑野泉流青林白土布榖催耕正赤帝司天勾芒謝令㣲風送暖好雨新晴田鼓鼉鳴社尊牛飲朝趨南畆毎家傾縱目裏鱗編原陌綺散溝塍本来懶拙無能但覺心和與物都平况茇舎親時幽禽一囀油幢張處古木皆榮攘饁分嘗解衣行勞誰辯是方伯農甿看僕𨽻渾忘呼唱亦解人情㸃綘唇光澤道中憩古寺作門掩青山空庭竹影風長掃一溪斜繞水氣香花草木石幽殊禽鳥傳昏曉誰知道白雲鎻了也有人来到同前再賦滿院松風溜泉苔壁净如掃雲山繚繞一徑深春草洗却塵煩坐裏忘昏曉更何道浮生未了辭去終難到同前堠亭舉火徒御威遲愁如飛絮紛難掃思隨路繞滿目迷芳草乞火空村巖谷人家曉容易道一飡便了此路仍須到齊天樂送陳武舉鷄聲喔喔催難寢横戈況是危枕裹革雄心封泥偉畧肯近宴安毒酖英軀滿仞漫李廣多竒季心藉甚報效酬知腰間七尺寒光凛紫騮驕汗血浸市墟垂栁不顧嬌姬似錦六郡良家五原徤子結約好同襟袵頻摩雪刃待星歛欃妖障銷烽祲印紐盤螭在眀光醉飲同前送曽武舉廟堂北顧思安寢西戎亦未髙枕募勇懸金招才刻印志士誰甘懷酖關山百仞任隴水歌殘陽關唱甚馳心朔漠目光電火毛霜凛重涵氷耀波浸千金買馬裝出一團桃錦屬鞬魚腹帓􅙧象珥踞偃寜論茵袵何須血刃只喑啞生風指揮褰浸瀚海無邊斷單于馬飲洞庭春色端午日與客臨泛令節繁華少年逰冶都付馳波但對時佳興同人情話因物成趣與衆偕和笻竹綸巾隨處好况浯渡橋頭水正多須知道吾生行樂耳請勿言他方舟遲日徐動何用喚紅袖青娥有踈簾清簟瑶徽玉塵閒看鷗戯偶聽菱歌耳目塵煩渾洗盡敕到手行杯休放過傍人笑問平生斷飲此日微酡破陣子觀競渡作急勢争時澎湃平瀾擊處崔嵬正逺驚看龍乍起漸近㣲分鷁兩来逰人方滿崖進退斯須難失離合毫髮相乖聲竭還憑餘怒賈力盡猶能作氣催闕同前兩兩行舟遞出紛紛撃水先馳角進不辭鳴櫂疾患失惟防疊皷衰長雄偏乘危競跡浮漚共盡囂心落日俱微辛苦伏波下瀨戰喧赫龍驤南伐師筭来都霎時滿江紅春日雨中登樓作芳草連天登樓目不堪勾引隂漠漠逺山如近欲明還隠楊栁柔絲千萬縷染烟挼雨清無盡看紅英滿樹洗逾鮮胭脂潤馳驅驟流光勝柴門閉誰問訊感時兼傷病朱顔潜損本擬銷憂憑騁望畨因望裡増愁疢曲闌閒倚遍寂無言春應恨同前見落花作百舌催春山人聽慣都忘記時出戸有飛花㸃輕沾衣袂走覺西園紅艶蕚離披狼籍紛盈地尚枝頭半簇看垂落畱無計風吹起嬌還堕泥蹴後香猶細日暮兼横雨㡬禁凋瘁蜂蝶闌翻如共語欲辭却戀渾愁思燕来啣一片觸雕樑顛欲碎同前黄東石辭山西大叅賦此勉其出晉水閩山問何事偏鐘吾子要識蒼天為斯世付君材美壯志平生應不負明時有主方如此忍徘徊故里戀衡茅懷桑梓古冀域今殘矣全晉地民勞止正倚人整頓解懸思治六郡籍兵邊未静四郊多壘臣當恥豈啇量富貴效時情相嘵詭同前黄東石大叅辭官治園賦此嘲之妙畫雄籌不持去經營三晉何錯計歸占一畆為園旋墾薙穢施將擒虎手鋤荒使了游牛刃更踰涯可笑枉勞形空遺饉勻土脉知燥潤節人力明慢𦂳此事雖微漫偏欺疎俊偉幹元非嘗藿口榮名豈有畦蔬分我已稱老圃未容君輕来問水調歌頭春日病中春意撩人甚強半病中過當門五栁應變嫩條成脩柯芳草微微如縷黄鳥關關向巧寜管老維摩琴尊階前織睨睍枕邊歌眠挾冊吟擁被懶入魔經旬匝月髪亂廢櫛若逢科折簡隣家難致投刺填門不答坐此召譏訶不信先生病其柰世人何同前夏日病起行園伏枕不知乆起視後園行踟蹰滿目物色變態若為驚竹節過墻數尺藤蔓緑枝㡬丈不覺目前生黄鳥音已澁蜩嘒響皆盈聊植杖閒抱甕有餘清平生陶令曠達趣向涉園成潢􅕙萍浮戯鴨籬落蔬榮引蝶即事愜幽情莫遣兒童曉吾欲學於陵同前夏日課童治園外物都無累口腹豈為謀不勤四體恐被荷蓧丈人羞磽沃先明土性早晩尤宜氣候種植譜曽收甘苦分荼薺薰臭别荃蕕鑱柄銳臺笠博轆轤道雨沾烟沐日出而作入時休實顆元因枝王葉茂須從本壅此理黙堪搜老圃真吾矣只媿不如丘洞仙歌黄後溪招飲江樓陪黄東石浸天凉影見樓臺翻倒斜紅日低涵照怪魚行不度龍睡乍驚都錯訝人在水宫逰眺朱欄閒凭處淡霧疎烟千嶂飛青被籠罩似髙髻脩眉翠黛輕施遙相對無情更惱看如此溪山逅良儔却放絲樽停早花應笑驀山溪夜月移飲橋上碧天如水浸一輪明月暑氣驀消殘更江水涵空瑩徹河橋擕手清興有誰同蘇赤璧庾荆州許把襟期說天邊逺響知是漁歌發乍急復悠揚趂㣲風似往還㓕平生鐡笛掛肘不輕吹聊一弄兩三聲玉露森毛髪臨江仙飲罷歸来得病自嘲山澤臞儒枯到骨何曾大嚼深杯今朝伏枕不須猜蛇懸弓壁上羊過菜園来掩袂自譏還自解亦知口爽生災故人髙㑹喜追陪疾多寧為肉病至不關醅水龍吟一年佳節逢端午吾土隨風成俗貅塲剪栁龍舟競渡逰觀相屬巷斷居人嗔闐總在城隅江曲顧閒身處世隨冝消遣何當跡單形獨准辦扳邀騁逐戒家人買車脂轂維摩慣疾抱痾依舊蘭湯懶浴翠艾摇新丹榴吐艶空照杯緑却枉嗔線縷金絲宛轉把人纒束念奴嬌夏日過翠軒避暑作滿城煙火向何方逃遁歊煩毒熱却在人家藏此地森翠都無六月聳榿畱風抽篁結靄恍惚行林樾一畨新雨洗成藍影寒㓗坐令羽扇閒抛擲纎絺莫御衣冷思求褐赤脚層氷何用踏短壑青松休說百事無營千般不管只有書難撇從今借榻日擕數巻来閲减字木蘭花病中聞温古榕有疾作此奉訊閉門過夏落盡紅英空蹂籍却訊同心報道傷春思不禁相離㡬許寂寞多時違笑語可惜年光都為奄奄伏枕妨平生多病頗被親知憐蹭蹬此妙休傳不是同人莫與言閒情㓕盡恰似炎灰寒了燼只有情思收拾神靈總入詩踏莎行有自東湖折得荷花一枝來者以小瓶貯置書室終日坐對愛而賦之緑水揺空東湖㟁淺芙蓉㺯色晴霞暖一枝誰折到空齋香從十里分来逺花似多情於人眷眷不愁辭藕餘絲斷朱顔解自領薰風疎簾鎮日為髙捲同前綉幙堪圖玉壺宜貯尤須華舘深深處瓷罌甕牖小茅齋如何畱得傾城住雕飭都刋天然態度真成君子雙賓主閒心幽韻兩相看東湖不憶来時路臨江仙夜来秉燭觀一枝蓮賦向日名花看未足故將銀燭髙燒小屏隱映綘光揺微明如妬艶半暗益生嬌斗轉參横深院静佳人與永今宵爐煙細裊罩生綃無情空意惱不語自魂銷浪淘沙瓶中一枝蓮謝惜而賦之一片稍辭枝陡見離披凉風入戸遶床吹恰被輕塵相侮得飛涴紅姿三嗅獨愁思恨不開遲開遲也㑹有凋時急拾餘香三兩片與對金巵蝶戀花又賦小院朝来看索寞瓶水痕消花謝紅粧薄芳草飄零何處著香䰟撩亂無栖泊芳意香䰟應不惡總在東湖也到今時落落在空齋猶有託幽人肯把佳詞酢滿庭芳詠小院芙蓉題鴂新聲羣芳乍歇有誰獨殿秋容娟娟靚好一種木芙蓉色濯瑤霜發秀金風勁真態偏濃柴門閉蕭閒簾戸幽意對芳藂紛紛池舘地遮蹊倚徑笑日披風醉心與淫眼觸汙仙丰最是幽人共得托根喜在此庭中多情處酬將麗藻不在倒金鍾賣花聲諸公過賞芙蓉即席勸飲美酒斗十千更對花前芳樽肯放手中閒起舞酬花花不語似解人憐不醉莫言還請看枝閒已飄一片减嬋娟花落明年猶自好可惜朱顔好事近賀曽漸溪得孫瑞色滿庭前玉樹新開一葉和氣氤氲歳乆始向孫枝泄慶門種徳合生材定與凢兒别他日我来摩頂笑為太翁說歸朝懽月夜懷丘集齋不見髙人頻掛想况對花前明月上花香月色輳芳新髙人不見誰為賞豈少人来往輸心寫抱難為強月似多情兼作意故向愁時朗星低河淡天蕭爽入戸窺窻偏惹懩欲邀明月影成三手中無盞徒為兩亦有牀頭釀瑶瓶辜負金樽悵遶空階又行又坐草際喧蟲響西江月詠芙蓉雨中芙蓉急洒端為洗垢輕飄故為勻粧亭亭仙質占秋光掃盡妖淫儀狀弱骨凝寒益峭朱唇帶濕猶香神㳺夢作雨雲狂不到荆襄臺上月中芙蓉寳鏡香奩正展銀鈎簾幙初收佳人顧影愛嬌柔獨整紅籹新就皓魄團圞敵面金波㶑灔凝眸三星厯厯掛簷頭似惜芳期難又霧中芙蓉欲擬烏紗則淡將摸翠縠尤深重重裊裊罩清真别是一般風韻逺睇其如不的迫看又恐逢嗔盈盈脉脉好愁人秪隔些兒難近霜中芙蓉熻熠偏増淑態晶熒直逼明姿銀缸髙照最相宜撩得芳心難睡影閃虚疑態去光揺錯認嬌隨中宵魂蕩笑貪痴枉被無情勾引遵巖集巻七

body:
  text: 遵巖集巻二十一明王慎中撰書上李序菴閣老某生也晩竊聞長者之論由高帝文皇以後稱相業者莫盛於三楊三楊相宣宗值重熈累洽之運機務簡寡宸極優游然而三公猶且殫竭勞瘁若不暇給蓋制度禮文文貞擅其長而文敏或莫能賛兵旅將帥文敏騁其智而文定有所不及此亦足以明相業之難而國事之不易於獨任矣今明公為相雖遭時熈洽不殊先世然而主上鋭情政理宵旰厲精稽古禮文之事百爾具舉至於禦夷閲旅之略理財足國之方明刑詰姦之典莫不刮剔蒐獵極其樞機品式之周視三楊時益多故矣而公挺然以一身任之無不當於上心而協國是非惟其酬應之能給而從容鎮定安若無事之氣象滿於四海之視聽然則後乎此者欲論世尚賢則稱相業者又當不談三楊矣豈不盛哉豈不難哉古者三公並設無其人則不必備以明公一身而其輔主佐理之功章章若此信乎其不必備也儒者之論曰人主之職在論一相而已信乎其無待於多論相也某遷竄之餘不足以談當世之務念惟往日叨備末屬謬荷知遇實未敢忘長者之賜兹者承乏山東視學之職又辱汲引之大惠顧惟無可以報於門下而致其區區之虚詞蓋以求逭於情至而事不從之罪而公往者所以謬垂一日之知者固亦在乎此也不宣唁李序菴喪子側聞令子之訃不勝愴悼明公勤身社稷憂瘁白髪而乃以至情之痛割公腎腸天乎誠不可忱矣往時備員戸曹曾接令子同宷之末其冲和之德雅飭之行忘其家世之顯而不知身之為貴常退而誦其賢以為明公莫大之慶若以獲福得壽之常理論之則令子之美已足取必於天而况明公勲德旁作明昭固當千祿百福保佑申重不宜使公為相而有哭子之悲也天乎誠不可忱矣賢孫二玉其美無度此亦足以嗣令子而慰明公矣朝野倚仗之身幸為朝野保之伏惟裁情自珍不勝遐懇再上顧未齋某少無師承師心自用妄意於文藝之事自十八歲謬通仕籍即孳孳於觚翰方冊之間蓋勤思竭精者十有餘年徒知掇摭割裂以為多聞模效依倣以為近古如飲酒方醉呌呼喧呶自以為樂而不知醒者之笑於其側而哀之也溺而不止已成棄物天誘其衷不即淪陷二十八歲以來始盡取古聖賢經傳及有宋諸大儒之書閉門掃几伏而讀之論文繹義積以歲月忽然有得追思往日之謬其不見為大賢君子所棄而終於小人之歸者誠幸矣愧懼交集如不欲生乃盡棄前之所學潜心鑚研者又二年於此矣若使得當世之大賢君子養深學正為鉅儒宗如公者而事之質其所疑濯舊聞而開來益則於斯文或可庶幾而賦分蹇薄方操案牘以苟升斗之祿不得專一其思慮而瞻望明公相去之遠如泥塗雲霄邈不可即無復摳侍門䦨之日循心自歎知終不能以有成矣顧惟惓惓知所向方之心異於往日之狂愚兾公之見察而不敢自外故輙書其近日所為詩文二種數十首以獻於門下伏惟矜其志察其誠而是正之死且不朽上許冡宰某竊觀前史人才之近古者莫盛於宋宋世之盛者莫如韓范二公其得失鈞衡則朝廷以為輕重其往來邉圉則士卒以為安危相業人物為宋第一而二公之子忠彦純仁復以相業人物著勲當時垂名後世此兩氏父子固其一德相傳厥美世濟然而仁宗深仁厚澤所以培植成就之功良不可誣洪惟我朝孝宗皇帝茂德至治逺過宋仁而襄毅公當𢎞治之盛卓然為時名世在廷則宏弼亮之績在邉則著安攘之猷視忠獻文正無少愧讓篤生明公昆弟咸賢而貴為一代名門備有國家以來未有之盛事就官秩而論則所謂一門父子兄弟三為尚書者國朝未有也兄弟同時為兩部司徒者國朝以來未有也父子繼為冡宰者國朝以來未有也是三者皆焜燿隆顯世所稱卓絶希濶之事然鄙人之心則以為此未足以言許氏之盛蓋明公之德業功名已昭播於士林為世仰頼今者特荷上眷晋為冡宰受命方始益懋厥德將崇廣日躋施之無涯而傳之罔極宋之韓范父子人物相業之盛非惟莫能專且將貶而見讓焉夫由建國列署以來為冡宰者亦多矣而德業功名之有成後人所共知其人而不朽者不數人焉三王姚馬及襄毅公其選也夫以不朽者之難其人如此而明公父子遂處其二則其盛而可紀豈與前所稱三者之事同日而論其卓越希濶哉某外臣卑官也不足以談當世之務顧惟平日好古尚友之志竊覩明公一姓之美私有所慕而觀政刑曹曾備一日之屬附名年家又有百世之講是以敢進其説以代賀問之誠伏惟鑒之上嚴介谿宗伯嘗觀宋朝嘉祐治平之間稱為盛時謂諫官得職而人主能受言也今讀當時諸人彈事奏狀類多掇拾煩碎不關大體或抵摭大臣疑似之迹闇昧之事流游之言訐而發之以為無欺不避至有為誣與憤者而人主不為别白惟務含容大臣固不以煩言衰眷任諌官猶仍職守位不加斥罰而所謂大臣者亦以體貌自崇不為皦皦悻悻之節以争於上雖其政未合乎古而其氣象之廣大可謂上下兩得大小各盡者矣此其所以為盛與自嘉靖六七年以來臺諌之臣往往以言獲罪故人亦以言為諱而士夫之心亦深以為憂夫所謂言者豈必其皆中而無可罪然使人以是為諱則可憂矣伏見一二年間言者稍稍得進以為盛矣而乃有致疾於公者得無有掇拾抵摭之為耶是可駭也然主上不以是疑公士大夫不以是議公公亦不皦皦悻悻以争於上獨厚自引抑求去以明言者之無罪主上益信公之不嫌而重其任然則言者固宜亦諒公之無猜而平其心矣所謂上下兩得而大小俱盡者非今日與是以某不暇恨公之見誣而方幸斯時之為盛是公以一身受為理之惡而使天下之人曉然知主上有受言之美雖其不中而不譴則其有益於時而光顯主上之德豈有量耶伏願公益懋明德以喻於海内則主上之眷宜有隆無替言者之嘵嘵安知不反而為稱頌揄揚之舉耶某辱知教有年僣謂關憂喜於明公是以敢進其説惟我公必鑒而信之也與夏桂洲古所謂相天下者之盛德大業其效何如哉賢不肖各當其位材否各守其職意諭色授而人莫不自得而其精神之所鼓動聲氣之所嘘號亹亹然不敢有怠玩放縱之心常若有人臨督而程勸之於其間而莫知其所由此雖唐虞之治亦不過此故曰俊乂在官百僚師師又曰率作興事此其為德顧不盛為業顧不大哉今之在位者莫不曉然自知其才分之足以得之賢者固無不庸不肖者亦無所棄而賢不肖者莫不勉於在位思以自效而見於時以求用於上於是天下之事功興起震發無有不凝之績雖以某之不肖亦尚得以竊禄於時忘其才之不足以奮而日鰓鰓焉明公坐於廟廊垂紳正笏雍容宻勿而其鼓舞變化至於如此之廣古之德業何以加此上唐漁石尚書某少不知學徒有狂簡之志徑行㝠趨觸株抵埳失道知返又不得聞大人君子之論指其嚮往猶倀倀乎其莫之雖能追悼既往之愆而卒未有以迓方來之美甚用慚痛悲終棄於當世之大人君子以辜此生今舉朝野之士無智愚賢不肖莫不傳頌瞻仰曰當世大人君子惟婺州唐漁石公一人而已竊不量其不肖思欲一出門下以畢愚志分卑輩後莫由自致蓋常歎而自悲以為既知其人又及其時而卒不能致此志則是終見棄於大人君子而已不謂明公兼聽廣覧之下不遺猥鄙破流俗之謗議而察之毁言薫耳而不信誣詞盈牘而不眩遠地傳聞腐心刻骨繼之以涕不自知何所得此於門下也人莫親於母子而聽尚惑於三至之言况乎疎賤之身未嘗奉一日掬瀋加箒之役於門下而曠然察之若此骨肉之恩等之為薄也情至而事不從恐不免於小人之歸且因謬自喜以為自此或可望収於大人君子播其嘉惠指迷途而就大道謝昔者之悲以竟致其志則為幸孰大焉是以冐昧自通統辱裁察而進之伏俟下風上王浚川尚書某顓䝉孤陋百無所能顧獨有志於學然以其顓䝉孤陋也力不足以向往而耳目無所開啓十年於兹因故守舊無所加於少之錙銖不揣私心常願得事當世之大人君子一出其門承几席之末論以發䝉廣陋庶畢此志是以引領跂足欲自通於明公之門下者蓋蓄積於中乆矣反顧其顓䝉孤陋也宜無所受教於門下之餘席愧而不敢進中之所蓄積者藴而為憂悲往者得罪去國知必長棄永擯無復登朝之期於時而不冐昧一見焉是終不得見矣藴而為憂悲者又當成疢疾至於一旦填溝壑抱無窮之恨也故敢冐昧通謁門下反辱明公賜之坐而語之諄諄不以大官卑小吏不以前輩怠後生其所以慰藉而誨諭之者多聖賢之微言公之所獨得而某之所不能與者奉而辭去忘其謫竄之窮而慨然以得聞大人君子之論以淑此身以遂往志為莫大之賜也其慨然之時蓋謂繼是日有所得焉將忘其貴賤之跡長少之分而以聞於門下以求正也不揆其顓䝉孤陋也視昔無損復自愧其惰弱之甚絶不自通於蓄積之心視昔不懈而加耿耿尚有兾於後也日者受事東土則明公之流風遺教往往而存尋正學而追宗慕令修以勇紹復有昔日慨然之懐矣向者章邱杜生來致公所貽手教大集長跪拜貺展而讀之若侍几席之側以試事之不遑未能裁候兹乃稍休用敢齋心肅慮述其疎逺之狀愧仰之誠以幾幸門下之察而望終惠之與王順渠祭酒僕獲聞於君子長者之言心所願見者當世有四先生也河内何柏齋關中吕涇野呉下魏莊渠齊東則先生也往歲謫官毗陵稍遷留都故得謁涇野於官邸從莊渠於里居二先生不見鄙以不可有言垂賜誨諭至於惓惓中心竊幸因用自奮惟先生與柏齋公未償所願日者承乏東臬誠欲修敬求通庶幾君子一言之教而職事敦迫未展此懐欲拜書門下念惟身之未能先空言恐不足以干聽察而幾垂教因循至今末由自達又念守官有次既未得旦夕就見門下而日月其除歲將改矣不任其景企之心遂忘簡率遽以書先伏惟先生鑒其心之誠而略其跡之慢而有以教之尚圗奉見之日更質所聞以悉此心不宣上穆元菴太常先生當世之名儒也經淫傳癖周情孔思繭絲牛毛之功未知虚齋先生視先生何如也僕晩進末學未能窺先生之藴然一日從事於章句文義之間不知揣量願見門下而請益者其心未嘗自廢也日者承乏東臬思欲一見君子以遂本心而屬職事敦迫之際弗克如願欲拜書門下念身之未能先空言恐不足以干聽察而幾垂教因循至今末由自達又念守官有次既未得旦夕就見門下而日月其除歲將改也且辱長者之見先敢忘簡略僣以書聞伏惟先生鑒其心之誠而宥其跡之慢幸甚幸甚與葉洞菴給事往時同仕於朝雖不及接一日之懽然常於表著之位望見威儀私心起敬以為是足以當天子之嚴臣而先生竟以直道見斥斥而且廢縉紳之士所共嗟憤不俟僕此時瀆言之也樂道忘勢足已而無待於外則世之嗟憤者雖於情為正於事為義然亦豈為盡得先生之心哉天之生材實難其生之固必有以用之而棄材不用以逆天意則吾君相之責當必有以順天之意而慰人之望先生亦安能終焉宴息於洞菴之中也哉敬為世道望之久懐裁候因循至今心往跡疎伏在鑒原與謝與槐提學御史執事一時偉人也文學政事節行智識今之成名者或得其一而猶未至而執事皆優優乎兼之夫以執事之美之富如此宜乎雄視逺覧雖豪俊特拔之士尚未足以承交於下風况孤陋淺薄如不肖者豈宜扳望聲光然執事忘其身之富不察僕之為不肖而辱與之為友使僕亦自忘其身之孤陋而僣託於髙明騷人稱樂莫樂兮新相知其謂是矣日者赴臬齊東始知執事督視鹹政行部至齊而僕以淹跡故園無由侍往日之歡不勝追恨然執事之齒及不肖姓名者逢人輙致其情是執事未嘗一時而見忘也今之衰也乃有交道如執事而僕實當之豈敢但頌以為私德而不勉焉以相副哉山東聖賢之邦也其餘教遺風斬然不復可見甚可悼也不揣不肖思以變易其舊習興起其新志誠不量其力之所不及顧以為此心此理不殊古今則此學之明晦絶續其責固在吾人而非俗之不可變也側聞執事新受命於朝視京圻之學政不勝吾黨之幸古人稱建首善自京師始得執事為師鼓動變化其興也勃然僕之不肖亦將觀首善之風以自勉而布之齊魯之士也既辱相知又守職偶同有可督教時賜惠音此僕之大願也此僕之大幸也臨書嚮往與藍北泉御史先生天下之士也某自結髪入朝則知先生之名而願見焉以年之相後地之相去無由也日者叨命大邦行部東土正圗遵琅琊由莒即墨之郊以至海上求見先生而訪所謂牢山者竟為向導者所誤問途不審乖此本心不勝悵怏夫不肖雖末由躬謁先生然願見之誠固已積之數年而始僣通於一日也先生亦宜鑒予之誠而有以教之毋以其愚而不足與有言也不肖雖愚然所竊者大邦風教之責也先生毋亦為邦之士憂乎如此則先生當必有以慰予之所望者矣伏楮無任瞻切與姜艾峰御史往歲聚首京師過辱厚誼雅愛佩服難喻執事按節西行猶得時聞音徽兼承居起及不肖竄身南土跧伏冗宦不敢僣通名姓於交游是以無由繼其惓惓之私每引領北嚮未嘗不慨然興懐於昔遊也逺地閑僻無所聞知然執事之宦業光赫聲望崇隆著於臺端逮及下土雖以不肖之陋亦得聞而知之以慰其私甚幸甚幸日者受事東土猥䝉貶損牋教重以腆幣拜賜感誦知盛德之不忘於往日也祇謂東行有期得以攀望門䦨一盡平生是以不欲以空牘先之不揆賤事鞅掌由西徂東淹越旬朔至萊之日而執事已趨朝矣不勝慊恨兹以試事既畢乃敢齋心肅慮修誠門下伏惟鑒而原之不宣上魏莊渠公自得見君子以來廓若發䝉始知正學之有所在而此生之幾於虚過奉以周旋時有警省不敢䘮已於流俗之中溺志於技藝之末惟以聖賢之言維持此心雖自知茫無所得然循是不舎或猶有可就正於異時再見之日也思復德言想像道範下懐戀切朝夕靡怠悦而不繹知愧門下某死罪死罪與陳芹山久懐奉候不逢便者甚用濶然蘇學諭來始得備聞執事居起又知身教之所型範淵學之所漸涵人情大服士習向美足以知大賢之所作為非淺陋無得者所敢望僕聞之益知自愧亦因以黾勉承風將竊附於同志之末不揆甚矣蘇君之來出僕望外而入省之日以及卒事之後臺察藩臬諸公終始推其賢譽之不置僕深用自喜為平生同游之光且無謬舉以欺執事之咎甚幸甚幸執事教學並茂資地已崇固不得久為兩浙之崇統未即入登臺寺暫借東土一日使僕得奉教周旋則平生傾仰之懐足矣蘇君行迫屬當擾擾之際臨楮不備與張南墅日於欒東庒處聞執事旋節故園急欲致候居起而未有其便方懷惓惓而尊教先及無任浣慰僕受事大邦忽及一年矣苟且鹵莽於較量文藝之間曠越日月其於學校之政教化之實茫茫乎未之能舉也猶諉云日力有所未及然自揆其綿薄之所得雖有餘力而亦莫之能舉也甚愧甚懼執事辱在交游之中謬為見察者其可無所開導教戒之而第以部内使者之禮泛然待僕耶甚望甚望趨朝之節邂逅可逮尚圗披晤以盡耿耿使路阻修越江渉湖載離寒署想惟吉人所履明神茂相下情幸甚與張東州執事當世之偉人也鷹揚詞苑雄視髙舉足使羣羽畢伏衆喙咸戢然則今之蜚聲著藻斐然成名者尚不可以當執事之一顧而謭陋瑣蔑如僕乃辱見取焉何也讀行部見懐之詩推與過當良非所任不知其惡豈非情蔽於所愛耶大册見貽瓊瑰滿握瑩目怡神塵煩頓濯照乗之珠連城之璧烏足以言寶哉而黙無一言可以附李報礫投愧如之何從劉函山處誦彭彭者車之篇不謂古風既絶而頓續書中復記存賤子豈惟詞足以接古人之聲而交亦足以亢古人之誼何其盛也臨楮瞻切不盡與林希載戸部側聞榮拜民曹私心殊不能平以為方今士流文學操行如吾少峰者不能以一二數乃不得居侍從列要近而獨置之於此耶又念吾子精敏好學之志累於簿牒程課之間不得以專其力而一其思慮則欲一日脱去縣邑之繁冗宜無所計臺瑣省署之間也萬金之璧置之下邑之市委巷之肆顧者既少售之原闕裁候之敬不宣與呉用宣少參某初自束髪入朝百無所知幸得與君同曹而官因謬從游辱君不以其童子之何知棄遺之且惓惓垂教焉今雖不能有知䝉然如往日亦竊有一二之知則皆君之所教也安敢忘恨暌違之久無能質君以其所知而求進其所不知也每一念此慨然興懐聞君拜官湖省與柜山君同地而宦兩君之交豈非神之聽之使其中和且平哉余獨塊然守此無與為似何異幽谷之鳥嚶嚶其鳴乎在喬之友而莫得其聲之應也詩不云乎寧適不來微我有咎然則余之與君其跡之弗得合者固阻於勢之適然而區區之心君其勿之有咎焉可矣臨楮瞻切實勞我心别冊錄詩乃在留都所作身病志衰仕非其好故見之於聲者不可勉强君試觀之而知其無復騷人豪士之致矣時有便者不惜見報為幸與謝提學不肖苟畢東土試事方其視事之時猶能自强不見困病妄喜以為猶足以騐精力之未耗也日者火證大作頭暈耳鳴心忡忡然而不能定常若有物乃知昔者之勞久伏而盡發於是矣山東六郡耳已為困如此况如執事所督畿輔八郡之廣人士之衆視事又在不肖之後談笑而畢不煩餘力而畢事之後竊聞怡然休泰神力俱完足以見人之材量長短優劣相去遠矣如不肖之不敢望執事而去之逺固亦多端何止於此而已然於此亦足以觀矣本圗此月中稍稍整理規條與諸生共學而為病所困未能也如何如何向見運司中呈至公移知執事謬以志事見辱夫雍里之博雅好學執事託重焉是也如不肖者舊學既疎而謫宦以來益就荒落何足辱也屢見劉君問之云尚未就草統草脱之日執事裁斷潤色成編不肖僣引數言以發明執事之意附姓名而行於世則不敢辭且亦不虚執事之辱也若夫志之始終則固自知不足以與於斯文不敢妄承也相望伊邇思念實勞所得時惠教一二不勝大願復宗兵備龍門向專人裁候門下極為草鄙不敬反辱賜書答教拳􅈤之誼藹然可仰泉翁易測日在留都亦得受而卒業矣大抵宗祖程朱二氏之學而參酌用之固宜其説之明而理之正也觀者但知多遵用程學而不同於本義殊不知實從彼源流而稍派别耳然則以為背於朱學者不察者也僕苟且畢兹試事百凡踈略過失傳布必聞於君子之耳幸有以開示而教之尤為高雅之誼也與唐荆川側見尊公拜南曹郎之報甚喜使吾子隠不違親養不廢學非子之素志也夫而今乃遂也恨予不得在金陵而拘縶於此也令弟計已成婚田園饘粥之事亦不復以累子之力子其樂哉不審比來尊體病否何如何如子之寡欲省事以義理養心而病不愈者未之有也古稱戰勝者肥子已無用戰矣又何所得癯哉余居此碌碌殊愧吾子在菴君去諒能為一談之由今追昨其過惡之多不勝其可慚赧而悼恨今惟當常存此心益加警察使後之追今其可慚赧悼恨者漸加少庶久之不已少而漸少猶萬一可不至於為小人而已夫以余之誦習章句忽聞諸君之論其於聖賢之學亦能謬言其梗槩而竊知一二然自櫽括其行則未免於小人豈非其言為空言而知乃臆知也然則由是以知大學之所謂致知者信在内而不在外係於性而不係於物而龍谿君之言為益可信矣余力本弱資本下而子往往謬以為可進是非好而不知其惡毋亦誘而振之也乎益友離居弱力下質愈無所誘進而奮發吾子山中所得宜一一見示無為獨善在菴君誠良友去此大可悵恨占筆信率不盡此心與王方南郡伯違離台光奄忽踰歲而感念德誼依依如昨向者仗公之靈道路無恐以至歴下踐任之後遂及改歲凡百未暇修舉而賔興期近輙復行部而出矣始出之時大患薄力病質不足以堪此勞瘁或增他疾今考閱之事已十畢八九幸而不害殊用自喜恭惟政善民安心用以和身其逢吉遥審尊候萬福為慰秋仲當蒞事棘闈冬初又宜以入覲行頗有不遑之勤然畏此簡書諸侯所以朝於天子而述職者也惟下土之民為􅆙望耳聞通衢新亭竟成三鳳之名公之所以敬禮二子而施及不肖之身者真不可堪然僕向者之言亦自可采何終不見聽也前所樹立不足以當公之所表章後所勉䇿未必有以副公之所期待甚用愧懼然而深頌厚德勒之心中則所以自勉者自是益不敢不力矣使僕將不自力以負公猶有道卿之賢也小价南歸專為迎致室人東來未能辭絶此路聊復爾一介行李或有資於輿馬之費伏藉指揮皇恐皇恐臨書嚮往别狀更祈留神省察不宣與張少越推官向讀執事之文思見其人如隔世然卒獲覯止之願幸何如也向所以思見而不可得者固非特以其文由文以僣窺所藴謂其蓄積充養宜必有大過人者及乎既見也果慰其心之所思所謂蓄積之深而充養之粹卓乎有道君子也今人多以因文觀人為空言豈知言者哉且辱又臨下邦其蓄積之所發充養之所施將得以與被其澤而竊聞其風又大幸也向過東郡屬賤事方棘不得展此見賢之本心想亦鑒在髙明也价還特此申問居起不宣與胡節推側聞榮拜比部固喜大賢之登朝而私恨下邦之失恃也古者刑者民之司命執事既以公平之心明察之智司泉人之命而人人得其所以生則其為比部也固不習而已能且可以益大其施非止昔日之局於一郡而已也甚幸甚辛不肖受事東土以來幾及一歲碌碌無補於教化不足為執事言之也餘暑謝盡輕寒來歸想惟吉人所居明神茂相惟願益加頥䕶以副下情與陳棟塘夏間遣人至泉迎致室人東來曾附啓候門下不知公之以覲賀行也想不得於記室矣日者於郵筒中傳至公所貽翰教忽若從天而至長跪展緘讀之再四公之惓惓於不肖欲有其成而憂其不至誠所謂道誼之愛也自聞教以來益用講求體察於此心頗有獨覺其進者未有敢妄以語人又未得一見門下質其可否固當俟他日也使節往來於齊之疆而僕皆不能遣一介之役候於境上罪也何言然公之待僕固不以此區區者為敬慢也臨楮瞻切不勝耿耿與袁永之往從屠文升處得見君所為十懐四悼詩足稱作者矣今之為詩者何止千百人且各以自矜然實不得謂之作所謂作者蓋出於我而無所縁於人者也故予謂君之十四首者當之矣黄德兆處寄至連珠一冊受而讀之誠不讓於古人豈君之自譽哉夢逰岱宗歌亦從可泉公處取觀之此等題目予固謂必待君之大手筆然竊妄議此歌猶似為題目所伏矣以此見太山詩之難賦而余之瑣蔑其敢復有意於此題耶太山尚未之登即登亦不能有言也聞令子已青青者衿游於庠序亦足喜也君之内政曾有主之者否此乃義之所宜急圗既除服矣而弗議此則非予之所能知也聞泉公曾再遣人至呉否然余皆不及知故久未得候問足下非為簡也衡山先生王祿之君均乞為致意横塘新居所作必富盡録以惠我并懐悼十四首俱欲得之千萬勿惜紙墨向在留都曾以絹託壽承轉請衡山公冩南江圗幸為我一促成見寄莫大之惠也病體不佳宦况不足穢聞耳也不具與許龍石先生問學行誼為一時儒宗末學未能遽窺惟是緒餘之發為詞翰者長篇短章巨軸小冊所謂鏘金石而諧韶濩騫鸞鳯而攫龍蛇者足以驚動逺邇垂示今後僕亦時時得從士夫之逰竊見一二焉以願見之切固欲無介紹而求通不揆見接與否而冐昧以進也况於長者盛德不遺晩陋辱以書先有階可達乎事之不聞而身之多病因循不早其跡甚慢惟先生鑒其心而於跡略焉則繼此尚敢有請也臨書向往不任區區與陳約之得讀湖廣錄其二十篇之中詞致瓌竒文彩偉麗者數篇蓋超然而不同雖微吾子曉諭之予固亦能識其為名筆也是使秦漢之士復生授之以簡使為之亦若此而已而余私心所不足於子者惟第二問䇿指斥宋儒殊失其真且誣其書以為讀之令人眩瞀而不可信是子於此數子之書未嘗潜心以讀之也夫學未到彼則於其言宜未能知既未之知則其不信也亦宜但不宜以已之不信而遂斥立言者之非耳吾子材髙意廣卓越時流願稍自挹損盡心於宋人之學則其所就又當如何如予之不敏固知無所動於吾子之聽而抑其高志惟反求自得之日則其趣識自當不同耳便中幸有以教我與邱集齋病中得讀手教豁然開浣不覺疴之去於體也僕所與君書本出倉卒口占全無倫次且多直致之情豈可令他人見之以重予之不德也承教諄諄大意皆勉僕以聖賢之學欲其和以接物謙以持身朋友之誼無以加矣然僕竊窺尊意猶似未察予心之所處而循今時之流議也敖惰乖戾皆凶德也僕雖不肖然自稍知為學數年於此矣豈其謬迷已甚必欲蹈小人之凶德耶蓋孔子言和而不同易以謙為德之柄然則謙豈足恭苟悦之為而和乃合汙同流之行耶夫和有所不同而謙必可以自持若必欲徇今人之耳目諧世俗之口而以為謙與和吾恐其得罪於聖賢也且僕日夜自檢括其身往往徇人以非禮之恭而回心以從衆之所行而不敢矯之者不勝其多也中懷恐懼正患君子者責其不能秉禮由義不謂尚以不恭不和煩君之教詔也久之君當自知僕誠不敢為過甚之行也惟是學術踈淺工夫鹵莽志不足以起信而迹易至於招尤此則僕之所當益加體察修身以俟他日萬一之成而副吾兄惓惓盡規之誼者也近見管給諌奪俸之㫖料兄亦在其中薄祿見削知無以堪然猶無他譴是倚上藝也感慰感慰僕邇逼疾患尚未能出兀坐一室與圗書相對雖節序更新塊然無徵㑹宴飲之娱亦自有一叚趣味也臨楮嚮往良不可任遵巖集巻二十一

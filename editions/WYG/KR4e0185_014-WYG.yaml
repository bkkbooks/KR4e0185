body:
  text: 遵巖集巻十四明王慎中撰誌銘素隱處士詹翁暨李孺人合𦵏誌銘公諱禄字廷善自號素隱居士泉州安溪人開州同知公靖之第六子開州公以正統辛酉舉人尹廣昌九年擢開州亷惠得民以良吏祀于州學祖乾清曽祖貴庸髙祖進祺三世不顯其上世有以文學材行舉為同安安溪教諭而初祖清隱公敦仁尤有劳於邑殁而見靈有宋咸淳封靖惠侯建廟遵祀勑其額曰靈惠周顯徳中閩自為王清隱辟於閩王始議置小溪塲為縣令安溪也安溪為縣而清隱首為令方五代擾攘之際草剏建立經制粗備而拊循全安之邑既大治即謝去隱于崇信里之拂耳山其殁久而神非偶然也詹氏望於安溪非一日矣翁名家子有竒氣弱不好狎如老成開州公卒于官蕭然貧也母林太孺人扶䘮治塟生事百艱翁感母之劬棄舉子業専治家雖少能不愛其力而有揆物待人之信智清隠家佛耳山之多鄉村去邑治逺開州公旅櫬還郡因塟晉江之羅裳山翁啓林孺人曰便省墓而教諸子孫肄學莫如城居請勿以徙難母兄勉從之其後兄之子源以甲科為御史副使澄以貢為教諭弟之孫彬為鄉進士翁之次子洧以貢為髙要邑丞詹氏復蔚然望於城中翁之貽也翁以幼子任家奉母以佚遺其二兄使就學為弟子員既而兄早世弟嬰痼疾又為周旋其家政禦侮恢侵持緩赴急情欵殫竭力亦副之諸子姓憚而加慕事翁猶父副使公貴倨然獨為翁屈謖謖然恭也治生常以暇為整不役數設機意豁如也衣食取足自充無饕牟之慮國中邑宅郊外墓廬相次偕作扉靚牖侐階磩潔緻不豐巧而風致可恱翁在國郊相半以示達於死生之故而市塵不勝野韻也在國宅與二三耆叟為逸㑹詠風嘲月俛朝仰夕郊廬所伍山農海漁談桑麻鹽魚力作之勤相為勞苦穰賽灾禜觴酒豆肉巫舞覡祝均其憂樂年齡既邁而輩望彌尊鄉人無少長賢愚皆知有素隠翁始娶呉早夭再娶宜招李宜招屬漳州龍溪而與多鄉隣也李姓望於宜招故李孺人歸翁孺人性孝慎而刑于夫善執婦道事姑友妯娌上順下諧庭内無間言静而不媢置側室秦馬二氏以廣夫之御能以禮自約使代御於夫多子而育之甚均有鳲鳩之一故翁得頥適神志老而益康孺人亦以下原闕處士楊角山墓誌銘是嵗甲寅十二月二十四日戸部主事李君存孝将塟其父角山處士于髙魁山之原哭謂予曰傷哉纘之無以寧吾親於土中也勤苦一經以起其家未及以一官為親榮使其旅卒而不得視其含斂魂營營而不知所如往盡然徒生即欲自隕又慮非所以死也疑於處生死之間永抱憂悲閱祥禫而彌痛勉襄大事纘其可以死乎先生其謂若何先生若使吾親有以掩諸幽者纘猶未忍即死也惟仁人其哀之以貸吾死嗟乎李君孝思之篤而詞之窮也予何以辭李君以三禮試春官魁天下士晉江文學舊矣魁天下由李君始天下知李君之文必知有其親之教角山隠約閭巷一朝趯然逺出覽觀京都制度沿渉長淮大江之壯適游呉越觀其佳麗足以自廣即不容外有大故固當不免即不免何必守一室屋隅之下也士一日出所學通籍於君不得不與親逺不幸有大故宜其不得在側而君深引以為悲嗚呼篤哉由斯以言君之痛其可以平乎君方以文學事業進顯於世為其親光寵将逺且大豈以得一銘逭死而其詞如此可謂孝矣君復哭曰以不敏之文售有司固吾父之教又有遺厚焉吾父任質好義中心獨出於順祥充其心之所思莫非可急之人而處於卑約不能踰分域之外過有所用其力也顧力亦副其心矣故所儲不溢鍾釡而每能推於匱乏所履不越闤闠而常有救於緩急不敢以色詞加人而譬諷所及聽者嚴於呵責不肯以機數致人而坦露所懷親者固於拘維鬭攘方拏械穽潛張而驟解黙弭於微辯笑道之下者不知幾人修於𡨕𡨕不可見之間以畀不肖今日盖吾父積勤累善之遺也謂其積之而将享之遽以五十有八之年卒也此纘所為甚悲而姑以盡心於土中逭死責也纘又有請於先生吾楊姓也髙祖副曽祖宗彛祖貞世居安仁鄉之鈔舎村以力農本業自給吾父早孤而壻於陳城居也遂居於城之東隅陳母故李毅齋公某之甥也毅齋無子故吾父育於李而為之子禰李而妣陳鄉人之敬愛吾父者知為李角山翁而不知為楊也惟吾父始配陳母知之而繼室張氏謝氏與吾兄續亦不能知而纘獨知之今将題名於阡作主於廟惑於所稱之姓先生其謂之何予甞及接翁然其遊京師也送之郊觀翁先後無異容其微也不詘其子顯且貴也不矜殆有常吉人也李君自言其父之徳皆不為誣善信可銘也若夫宗之必有别異姓之不相為後也在禮記之矣李君雖欲狥翁之情其如禮何請志之曰楊角山處士之墓而銘之銘曰觀翁不取鈔村之田捐以與其弟兄所以専其情於育者之義也事李氏父母生死盡力亦足以明其不二於心而報育者之徳矣兹别其宗以反于楊維禮有攷匪倍輕忘翁其安乎即此山岡斯謂有子能善其親之藏安人王室端恵林氏墓誌銘林安人之塟也其夫王道原君相域于邑之下逢山治壙視役見星出入與其子均勞曰吾不得視其殮殯以王事也公之廢私久矣然何以釋吾情兹而不勞将何以用吾情卜日得是嵗甲寅十二月二十四日庚寅之吉行事道原予弟也拜且泣曰其哀惟中而銘吾妻始先大夫封吏部考功員外方渠公為叔子納婦盖安人也予適以主嶺南辛夘試事過家安人入門方渠公大恱謂某曰吾賢叔子决其必貴此女儀徳固當貴可與之齊矣道原學於予自少而言動有則在私宴無邪安人能不以惰媟見謫於夫荘慎有容家人竊伺莫得其幾微吾母太宜人總一門之政好自勞而以佚遺諸婦安人常先其姑承事趨動不敢以尊者之遺自荒吾室陳恭人温靚而葸在娣姒間每居弱處後安人遇之獨執退謹知其夫之事兄嚴而然也安人資慧敏綜時物揣求人情頗有役智而性剛卞以其夫恬毅逺俗不問生事乃益摧縮不敢見其能一切近利殖産之計斂置不用惟以儉菲自約而已内外事惟其夫之制莫適為可否復善含鎮忍事家人巨細得失鮮以聲色徴發人終不見其卞急也殂於淮上一女與二子同度同庥在側流涕長呼曰妾終不得侍姑太宜人一日之養耶身死不足恨而廢吾夫代養之命其何如呼天者屢之疾甚已瞶出誥軸付同度謹藏之曰與而父别於京師手以授我者庶而父知我者之不懈也檢槖中百五十金示女子與同度曰此而父斥賣屋馬合餘俸而具此将以為爾婚娶之貲勿以我後事費斂用舊衣可也是時同庥方六嵗抱之手中瞑而後舎之同度歸言一家尊卑聞之無不悲痛太宜人至為一慟幾絶也同度知盡費其金治斂殯奉櫬而返畢䘮當遣女同度發故笥呈太宜人狄冠之外蕭然簪珥數物衣皆敝暗予與季弟性中為之營辦而後女得歸於是家人知安人之在官能貧而不愠也道原顧垂泣謂予今之畜妻子者非必仕於朝有禄賜於君宜亦能使之温飽且佚吾再命於宦籍而室人終身食粗衣惡顛頓辛苦於邸舎道路以至死也吾其為不仁人耶吾思母之養不能釋位而退又不能御以如宦所徒輟吾妻以歸使其客死吾其為不徳人耶即令病時猶在邸醫藥有輔或可不死是吾貽安人以死也吾何以自逭於幽明之間嗟乎君之篤於痛而疚於思則誠厚矣若夫以亷貧不能豐其内為不仁以輟妻子之奉侍其母為不徳則非學於予者之所聞矣乃收涕而泣塟安人以其夫兵部武選主事之恩得命其後由儀部郎中轉尚寳司卿今以使命過家同度娶同邑四川右方伯黄葵峰公光昇之女女子嫁南安庠生潘志逺同度志逺各有女子一人安人皆不及見同庥聘建安故相楊文敏公之孫鄉進士華山君肇之女安人在官邸預議不狥女婦之見以逺聘為難亦其識之所至云方同度以䘮歸太宜人将返櫬于家而哭焉予為菆厝于先大夫東山塋兆永慕之精廬道原在京師聞之號哭拊擗以不託櫬於正寝為恨予貽書為言古者䘮車不入國凶事有進而無退往而不返之節且朝夕奠以几筵致生而奉之者在祔魂之帛棲神之主而非藏魄宜速掩之木之謂也道原乃愾然含恨而自慰兹就東山之廬啓菆而設栁禮也銘曰以琴瑟和御之燕好為後而以甘旨左右之娯侍為急此女婦之所難以名位修勅為可榮而不以貲畜腴潤為足賴則士者有不能而安人之知及之嗚呼其生而然其有所刑於家而然是皆可賢銘以昭之内懿有考其勿諼其視兹阡陳啓文墓誌銘安平於晉江為望里里之望姓可指屈者不數家東積慶坊之陳其一姓也陳氏有曰啟文字質義翁者以善聞里中其季子武勺壻於王氏吾姑也故其塟某為之銘翁卒於正徳癸酉嵗長子及孫相繼亡叔子武靖與武勺始力圖之故其塟緩翁生正統己巳時方朴略未習於聲華閭巷壯者暇日力修本業以養生送死為福不以治舉子學求進取為貴也翁少略渉書知大義而已故絶意於聲華之途而鄉里所謂善人者力不得以有為其為善僅充其心之所思而不能踰其分域之所不至也翁之父元泓頗蓄田以遺三子未有命戒以析而沒也二弟欲析之翁不能禁則使自選其善田而後已取之多荒瘠也盡一嵗荒者墾瘠者肥量田所入以為出久之有餘以其餘貲附宗人之敏者貿遷于外日滋月長翁不疑附者附者亦為翁盡里人共貲行貨多以凶終翁獨終善生既日裕自隠於心曰吾身所自出祖也身所由分族姓子孫也敬祖莫若豐祀愛族子孫莫若教以學乃自置祀田塾田曰吾以上竭敬思而下開詩書之業其心盡於此田矣友其二弟終始無間言事二姊老而彌篤嵗屢迎至其家進飲食以娯之每迎必數日浹月而後返曰無幾相見也出見鄉人恂恂謹愊不敢以色貌侮人與賤少者均禮加詘焉翁所為善不能踰分域故如此矣娶黄氏先卒生子武瑩武寧今亦已卒黄氏之塟翁自為壙志曰只志生卒年月塟地坐向及平生一二細行足矣無他善可以厪顯者之筆也其識又如此繼娶鄭氏生武靖武勺鄭氏後翁四十餘年卒為今甲寅十月武靖武勺始奉翁塟于安南縣蔡山之原與黄氏合而鄭氏同祔焉卜以十二月二十四日行事而來乞銘孫曽𤣥男子十四人多聘名家女翁塟雖緩而得銘翁又何憾銘曰承厥貽不墜其基復培以菑燾厥後既遺之有且示以守其終曰寧其藏孔固維我銘之維其子之故封文林郎監察御史鐵山公墓誌銘嘉靖乙夘十月九日劉君志仁塟其父封御史公于邑施山之陽與母葉太孺人之兆合而以志屬余曰非得子文孤将何以塟吾親始志仁君以松江知府俟調過家公促其出者數矣君濡戀不忍竟得奉公之終嗚呼孝哉公䘮於嘉靖甲寅九月其䘮鄉人争走哭哭多盡哀無逺不至肩踵摩接巷為之塞其存值公生辰姻黨隣里皆來夀焚香盥祝莫不願公百嵗其得榮哀于斯人予頗怪何道致是公貴且長矣與人彌恭色温詞至論事細析毫毛精中膏肓大黠小慧欲以情貌深厚盖其過非逢公皆剖露無所遁匿公既善得人隠曲又惻怛懇欵恥人之過樂其有善如己得失所譏斥奨許嚴於官府予奪人用勸沮於其言以故鄉人有相搆為虐者多自解去不至於有司雖富而御財有義往往所知縱弛以振業乏窮甞為衆人之母惡菲服食不邇於驕佚故多恱其富無怨妬者生死得人之哭祝其道由此可不謂偉丈夫所為哉貴富而為義勢便事易世之能知公者止是矣公未以子貴家中衰貲落矣隨力所及與人同勞逸甘苦一穪一盂遇有寒饑推共衣食微為匹夫能得人死力所至有附其赴人緩急風雨疾病期至不爽晷刻同安之俗在𢎞治正徳間以雄長俠武相夸尚其魁則聚徒衆置要約旅拒官府蒐𤨏細族則嚚訐健鬭視庭中牙䑕角雀勝者酒食鼓舞賀之耳公始好詩書士人語自悼幼孤老多難不習儒業獨發憤於其子志仁君才過人業既通聲聞日起公益延名師勝友厚與為禮非徒以廣其子之學亦欲風示里中知讀書可貴而弭筆探丸之不可為也處卑履約矯然有濟物變俗之志又其近於仁矣志仁君為御史疏諍廟議與小人獻諛侮禮者為異同章格不下數日或傳至家客多以禍不測為公憂公抗聲曰主聖臣直其何憂御史果不獲罪御史出為松江遣輿卒迎公客皆從㬰公以呉淞美水土多珍物宜往饜饗呉中民吏善事長官往使民吏一謁太守父逡巡跪拜足明得意也公曰使吾在兒子郡邸中且閉門杜徑民吏何由見面日買魚菜數錢併禁苦婦子僮奴口腹矣且使吾為饜家顧不足充吾慾耶客謝愧輿卒空返貽書松江勉以守官愛人而已其所以教子推此可知也公名恭字大受居鐵山之下故以為號曽祖雄正統間散家貲萬緡紏義誅劇賊賊焚其居與僮八人俱死官為祭斂鄉人哀而義之至今祖宏淵父朝權為學官弟子早世公獨與母王氏居比長娶葉贈太安人者也因奉母以僑于葉自力於㷀窶艱躓之中忍閔耐侮竭盡勞瘁以持其家待子有立計數明而識慮逺非偶然倖遘而有今日也年六十九繼室林氏男女皆出葉太安人長子存徳即松江君存業國子生女適蘇芾頌張銘郭顯有孫五人夢龍從龍邑學生如龍為龍起龍皆幼施山之兆公塟葉孺人所自卜堪輿家以為祥也存業與夢龍以松江君之命來速銘服麄容毁非乞銘之詞不出又足以知公之教也公孤時諸父弗友弱王母之寡謀殄其孤叵測屢矣公幼即多智能如母教指潛形謹跡不踐禍機昏夜出入自防飲食心動輙不茹竟免於害諸父知不可殄絶則漁奪其産耗之盡公泣謂母曰是物他日兒能自有之勿與争其僑于葉辟家禍也諸父竟以凶終諸孤淪落存者蕭然公洗沐拂拭之時其婚嫁為營貲産不尤人所難哉銘曰丘夷淵窴伏倚之質趨蹶徐行緩者乃疾謂天懵懵奪予凶吉如衡移權鈞得銖失維子能賢由義教出化虚為贏用儉節術彼𡨕弗窺傎其信詘闕觀于兹刻銘幽室封太安人慈儉程氏墓誌銘予弟道原好言一時名士賢大夫於鄉同榜中每譽陳思植君之為人言其才猷節槩能當人之所難充其所為禍患事變足倚也君罷官最早為廣東僉事好繩嶺南吏民以法由其母教以不可曲三尺阿比上下也嘉靖庚戌罷歸拜母笑曰吾所以教汝宜為好官然其術不可以久宦也術固當爾其勿悔善侍我左右我不汝疵咎也君娯侍方樂而其母於甲寅六月不幸移書道原言不得奉母太安人以終身而大父封主事公暮年有悼亡之痛詞旨酸楚如不欲生道原持示予予竊敬思植之孝而因知其有母之賢也君卜乙夘七月某日塟母走伻山中以竹溪林君所為狀乞銘其詞甚哀而有文予既因吾弟知閩有君又知君有母君復以銘母惟予宜也何以辭按狀安人諱粹然程氏父謨貲雄于鄉祖隨州知州亨有詩書之澤焉安人生巨家而澤固存頗聞圖史之訓戒笑語不妄静荘有儀入門而封主事公某之母與大母皆在二母材性不同安人事二母各得其意母李氏勤於事譽其婦曰無惰事大母蘇氏嚴於禮譽其婦曰無愆禮故其夫以善事父母聞其為夫育同祖之孤姑撫之猶子敬之固姑也方貧能使内外無菲缺而銖積寸累化約為豐不待其子之貴家駸駸起矣子貴禄入日有餘籌廢舉權贏詘其事纎密而不煩築室治田多而益辦主事公茹嘉服珍怡如也其子謝官亦有以為歸精敏有過人顧不以巧知見稱親屬長幼見謂有徳淑温孳孳然恩意接遇人有加也富而彌儉老而能勤勞於陳氏令善終始純備矣方安人舉僉事君年三十三矣又無他出獨子而晩顧子不以小慈敗義課督不少貸僉事君既賦材異人無滯課以煩師檟猶時時以小嬉閒惰受母訶撻也舉男雖晚僉事君早貴以工部虞衡之考得封御安人如官邸食四方水土腴美之物狄冠展衣榮於闕下都膴腆以閑其家剸剖綜覈頤使指授尊於内外族戚之間殆十五年所享顧大愈於早有子者亦其教有以篤斯慶歟僉事君名梧女四人適李魁商周竣夫蔡宇安李俊卿孫男一人主事公名之曰紹長孫女許王桂戸部主事健之子幼二人未許人其塟在八都蔡坡山之原安人居常好言古慷慨烈節事於今賢尤篤也僉事君𣙜木江陵時湖廣巡按御史按顯陵内臣不法事急反為所中逮繋赴詔獄安人問君是中御史者誰璫何許人也君答閩人也安人怒嚼齒吾閩何得有斯孽慎勿與之通顧御史以持憲蹈禍得微自沮悔耶君厚資御史赴逮之費歸為安人言無悔狀安人喜加他日昔怒始復嗚呼是可銘銘曰孰不有子孰不多有孰享其祿以昌于後亶斯令享自作之究傍羡側睨孰苟貴富庭特奥祥由牧與守著此銘詩以告他母嗚呼斯石其勿以朽封職方主事蔡梅園公墓誌銘武選郎中龍溪蔡君奔䘮過泉匍匐造予輙哭輙拜哭不起曰文也罪罰不得視父斂五内崩摧終無以自贖忍死治塟請求贖於君子至漳久之使來曰卜某里之原将以是嵗乙夘十二月某日襄事君方以文學操行有見於世所以自贖者逺矣奚所託於予文按狀公名廕字徳流别號梅園漳州南溪之蔡望於龍溪公之宗尤望於蔡然世未有顯以系傳逺族居繁為望爾祖某父宏安皆含和履厚自樂㕓田無聲華之慕故公少不習為士而禀知獨異軼宕多大言趯然有不安一室之志曰丈夫生欲何為而沒沒老環堵間為無能之人耶舉子業拘繞我固不樂學泛覽史傳頗談其成敗得失抵掌諠謔學書不能工曰吾不能為時書篆𨽻古體可學也無師授而偏嗜獨契晝坐夕卧畫被摸腹落紙輙喜他人評可否工拙不介也繪畫嬉渉為娯不入品目而往往有韻踰嶺遊呉越登虎丘呉山髙頂太湖鉅浸浙江驚潮駭目蕩心狂睨内釋絲竹妓女滿席意不在也久之還家母謝氏譙之曰而不工不農放浪遨跡終不謀家乎跽應曰致富之術在兒目盼手畫間第不樂為耳今知奉慈教矣因出子母錢若干籠百貨視時緩急人棄我取為𣙜間出竒變時急不趨人取不競卒以緩致急以棄徼取倍利蓰贏盡入公手諸同利者服其知而嫉能也曰蔡梅園命愈耳公聞笑曰是在計然䇿中非心通性靈不得也渠不達而羡我命宜其終不我若矣術既通時時有所寛捨求自逺於營財沒義之嫌精小兒醫為人治多不據方投藥焫艾火灼之十不失一有請必赴或以金謝公曰若視吾售醫者耶所以治此業而樂赴人之請者欲以多活捄為有濟於物也謝者愧拜而已三子伯宜季懷仲武選君也甞指仲子謂内嚴氏曰蔡氏之顯在是兒矣使伯季持家而課督仲子以學果舉進士選為翰林院庶吉士授兵部以其官封為職方主事嚴氏封太安人公雖意愜不負素所期亦不為溢喜蹈世人夸豔挾恃之過約敕子弟僮奴毋敢苦里中及溷官府請寄鄉人咸尊貌之不以榮貴故嗚呼賢哉公以嘉靖甲寅五月八日卒年七十三女三人嫁周某徐某劉某皆名家孫男七人始武選君以主事奉使過里為公夀里中人争持殽酒來賀公遍揖賀者曰公等請言乃公所以得賀乃公為若受殽酒客各進所言大抵多譽公善教樂施好義急困之報公不頷也最後有言公多活性命襁抱中嬰孺無横夭是所以有今日公頷之顧謂曰活人豈能多惟此心不負可與神明對耳客皆懽服於是盡謝諸殽酒而大置酒酌賀者里中人無不霑醉出門舉手嘆曰公真徳福人吾輩不及也庚戌嵗敵入邊犯内地京師憂甚公貽書武選君為言備禦防守大計以籠貨灼兒為况曰使籌勝决機如吾權百物廢舉帥布卒扼害險據形勢如吾審穴舉重而輕者赴攻本而標者從兵事不出此矣武選君佩其言施之謀議中微鉤要大司馬多資用之嗚呼公雖不顯其有濟於物又専在活數小兒之功耶是宜銘銘曰或逐其外而培其内以為神懟有葆其醇而抑不伸亦觭於人與人者偶惟公之有静撥其幽克對不負宜篤爾祐以昌于後中憲大夫雲南按察司副使楊西渠公墓誌銘西渠楊君名逢春字仁甫泉州同安人予舉乙酉榜同年友也由己丑進士授杭州府仁和縣令父䘮未至官服除為蘇州府崑山徴入授南京道御史出為廣東按察司僉事母䘮去職起復僉事為四川按察司擢湖廣布政司參議積資二十四年始為按察司副使未至雲南卒于參議之官舎年五十六卒之二年為嘉靖乙夘十二月十六日塟于邑之某山君居官竭心奉職凡職所當事事悉力從之事有犯忤人所縮首善避及勞險不可必濟偷則苟安君必引為己責曰職所有事也直前勇赴不反顧沮悔常為巧者所目君初不知久之或知亦不變也曰使衆人智而我為愚不亦可乎且使我不愚則意貳力分於事事亦不能如其職矣是吾正有賴於愚也又烏用去之崑山稱富縣前令多以富自没有能不沒於富而諸獻遺權力猶不敢裁罷君曰費人之財以買聲市恩而詭於不貪人之費斯孰執其咎一切罷之其政寛民急吏賦籍獄牒胥史不得竄手戸受賦重輕獄當决縱榜示出無不愜服不復求吏知權不在左右也撫按異意條教難遵君据理疏正當以理為君奪舊令最以故方伯慈谿楊子器公為賢至是有前後楊之稱盖以君繼方伯公也江南北諸郡邑以嵗時餽留臺為常君入臺餽不敢至曰是甞為崑山盡罷諸獻遺者不可溷也巡視江南北倉庾汰黜庸貪風采振竦所部廣屬吏滋多人人如君臨之在廣東分巡嶺南道疆界遐曠徭獞蕃育其中數為民患故嶺南兼有兵戎之寄法弛日久将玩卒惰賊白日剽通道行旅梗塞相為蒙蔽以苟嵗月而已君首舉綱維責郡縣以修政息民之要然後易置将領選卒訓練指授方略自是賊發輙得野聚荒村開戸而睡矣在蜀領璽書専以鹽屯為職最號煩劇利源所在豪右穴之君綜刷成額按籍考要年侵月虧瞭然可見偽巧無所飾課入日進時叙州戎縣都蠻畔殺略吏民長寧戎珙一路邊無居人監司相顧莫肯發口君獨抗言且設禦取之䇿撫按相與謀非楊僉事不能辦此㑹檄以都蠻之役委君君至益用耳目知蠻敢為不靖由屢撫養其驕桀之性非盡勦之後益不可為度險阨分兵四路約期進勦君復計蠻素以撫狃我若因而誘之宜必我狃得之易也陽撫其四鄉而以勦二鄉為師名果得四鄉最桀者四十人以來盡殱之用是兵入有功俘斬以千計湖廣分部潭邵之間戸多亡逃客戸据其田逋稅猶責主戸之存者故亡益多而逋殆不可校君為法使稅常附田以行田與稅不得相失而互為有無也平賦均役通滯節冗事集而令不煩其在職獨久復因暇日興起禮教訓勵生徒士奮於學者彬彬然盛矣所至盡心於職大較如此故其以憂去嶺南以遷官去蜀民皆若失所怙相與泣曰徭蠻復苦我矣其卒於湖廣民走哭相踵不絶䘮歸罷市舉聲以過䘮出境乃已君世不顯曽祖某祖某父某皆以謹朴守家君貴贈父為御史封母某氏為太孺人君天性孝友與弟逢陽終身不異財守官亷約所餘俸悉畀逢陽為家逢陽亦不敢私君之内子封孺人洪氏能無吝情一門友恭雍如也於交游篤久而不忘欽欽在鄉閭間敬老字幼不以貴倨有人所不能及也君在崑山邑有故相當國子弟僮奴暴里中君逮置之法移書都下懇惻侃切言以徳為愛之意故相報謝暴者終君之任益戢甞欲奉其父祀于鄉賢祠邑子論有異同君持之故相滋不恱然未甞敢短君也為御史值東宫備官僚時相引置私人物論大譁君首彈之相權寵方盛莫敢齒及上覽君疏嘉納為易置所引用者時相氣大沮欲中君以事而有所畏遂以僉事出君臺中在嶺南韶州守倚故相大為奸利不法事總制撫臣憚相權益優異之君白發其奸撫臣揺手君曰坐視民患不除不能一日安於位除患而以禍去心所安也撫臣内惡其言而奪於君之法韶守竟不免此皆其悉力於職人以為愚而君嘉為之者其在蜀都蠻之叛非君職也直以憤在職者偷事病民遂以身任之功成而賞不及反以得謗久而後白尤人所為愚者也然君仕雖不速化而正論常歸之使昌其年仕終當達視巧者遲速之間耳而遽止於此豈非命也夫子二人長士遷娶臨海尹林大樑之女次幼聘某女嫁某銘曰淑之湯湯下流長兮魂飛于上僾昭揚兮歸旐翻翻有攀傷兮復魂故丘固且良兮維呉與蜀嶺之陽兮山阻水逗莽異鄉兮尸祝報享酒牲芳兮胡必兹丘歸斯藏兮詩于墓門答精爽兮奉政大夫刑部郎中蒋悟菴公墓誌銘是嵗乙夘十二月六日奉政大夫刑部郎中悟菴塟其子郡庠生陞奉郭白峰公之狀來乞銘鄉先生家居能急人之病不愛勞勩求瘼捜隠籌所宜捄振出危苦語感動在位平鬭者曲直以情欵諭人於不争使直者得曲者亦不敢以為失若是者惟悟菴賢其没而上下之間無有能為强聒說教者予蒿目視人之病不能捄方追思公又烏辭銘按狀公名孔煬字君和正徳丁夘舉人登甲戌進士蒋氏自浙之長興縣徙閩國初編遣從軍故籍𨽻于衛其姓視他籍最著髙祖佛保曽祖遂祖道父文權以公貴贈奉直大夫南京戸部貟外郎母何氏封太宜人公生而敏明有識量比長益習億物揆事審而不煩方貧不足能以攻治課業之暇營父母之養常若有餘始仕為通州知州州繁庶甲畿郡材賦刑獄簿牒填委民吏仰視側睨公為之如素所熟㑹計贏縮節浮益虚財賦贍足宿府猾史無得竄其偷偽兩造至前情輙披露情得則稍薄其罪庭中諠呼稱平久之犴狴為空都憲重臣監察臺史相踵奏薦以公才可大任每行部未甞至通州曰有賢長吏治之矣賢聲出畿郡上尤加意學校表厲名教課諸生以業躬督勸之奨識髦俊後皆成大名如今少宗伯崔公桐大司徒馬公坤參知錢公嶫方伯陳公堯並所素課豫識士也将滿考奏績贈員外公訃至民㑹哭奔送殆空四境州有沙漲地宜田宣家唐家二壩宜隄公墾田築隄則漲有新畬防有淫水是一役而興二利也募民佃漲地收其直充役費役且舉聞訃封題募金以遺後人其盡心於民推此可知也去職蹟譽益白銓司遲其至将顯用之服除赴銓公謁而已不私候貴人之門竟以常調授南京戸部貟外郎積資遷郎中公靡事不周尤善財計司徒倚以為重賢聲又出留都郎曹上迨今上新政釐整弛敝㑹天下財賦獨以浙江江西蠧耗為多思得郎員才稱任使者一人司徒以公名上授璽書以徃公簡别屬吏分遣督逋自執要成以稽其惰敬晝夜蒐故牘得乾沒鉅贓株本則窮其節目枝尋條剥所得積逋溢於新賦謂藩臬諸司曰兹使也以督賦為功急則傷民緩則病國吾今所得財皆其已出於民而未入於國者賦集而民不擾庶於國有禆哉吾不敢以為功惟傷與病交免可以還報矣比反命入奏上嘉其功特賜褒美命吏部寵用之遂改授刑部郎中坐是取忌年四十失官知者嘅恨之既廢事何太宜人承顔順志服勤左右每食躬視和餁甞旨而後敬進之常自行㕑匽與竈養漿婦分役家人勞苦之公曰使堂上享之而甘吾獨惜此耶寒暑衣裳手振領循袪非潔新温輭不使近體衾枕舒拂夕以為常侍疾省藥物尤謹或終夕不寐與弟孔居不忍相逺罄宦金買田宅嵗贏月羨久益増廓折半均取不以尺寸自謀猶擇腴美以厚之愛弟之子廷均踰於愛陞也别置田七十石市屋五間資廷均為讀書費何宜人安樂之曰汝撫弟姪如此吾復何憂孝友之實播在閭里誦傳相嗟嘆以為不可能也其餘恩足以及族人赴急持危情與力偕至孤弱不能立貧無告咸賴公以不失所邦國稱睦焉嗟乎公仕則勤於民廢亦施於有家出處皆有所立名位不亨而心跡可述矣其又何憾配陳氏贈宜人繼鄭氏知府鄭公良佐之妹前卒無子繼呉氏封宜人子陞娶南安黄氏故通政黄公河清之姪女女三長適黄衷故教諭黄公逵之孫次適黄守吾知縣源之子三適黄思詔俱邑庠生孫男應録邑庠生聘御史洪君庭桂女次應銘孫女長適鄉進士鄭一鳳子材立次許參政黄公潤孫國俊以壬子十月卒距生丙午享年六十有七墓在西郊白塔山之原公所自卜也銘曰雲者為雨可以徧下土既族而風之方施而處其在乎水為澤而洿不為川與河浸也不多以行于家終樂且嘉塤奏則篪和有母者皤髪白而顔酡其委其蛇門内之實鄉人揚其華其又何嗟歸安斯原銘之使不磨胡榕溪暨李孺人誌銘友人胡子敬君禮為靖安教諭嘉靖壬子嵗乞于江西督學使者曰禮之父老矣為一邑之子弟而遺吾老何以為心詞迫容蹙使者鄭公以子弟不可一日去賢師乞再三四不許踰年癸丑二月其父榕溪翁卒訃至子敬號呼欲絶不敢怨使者而自悼不釋是嵗乙夘十二月十二日塟翁于晉江三十五都許内山之原以其壻江貴溪君之狀來請銘安溪著姓胡氏在甲乙始自光州入閩不詳其世世以朴約相傳正統間最以仗義好俠有名曰欽者能以其貲為善闕事天順戊寅嵗大饑出粟千石助賑上聞褒異賜以冠帶敕有司建亭旌之擇壻得蔡虚齋先生實識之於齠稚時而先生果以理學為一代名儒欽生英徳教諭諠與虚齋以内兄弟相資於問學有聲庠序貢授遂安訓導積勞擢英徳卒于官教諭公生翁名道字宗緒娶晉江南雄府經歴公英孫女李氏英徳公之殁翁千里扶櫬侍母陳太孺人能忍痛任勞役備極囏劇竟襄大事事母盡其力未甞業儒以其質性應物少則順悌長老至壯無違行强艾敦交睦與無失意於倫輩耄期撫接卑幼尤巽抑不惰天資近於善祥厚闓懌不踐凶機非講擇可否而自合也居郡城之衢鄰叟里子日相過逢舎中坐客無空日或一日不舎客則之他舎杯觴娯日不知闕也抱孫長息婚嫁有無茫若夢中事囊闕以急告倒囊與之比客至當具闕不問也孺人曲順其夫琴鼓瑟應好合雍如也翁喜謂所知曰使吾内有微忤亦安能樂如此耶子敬年十二三有美才試輙冠諸舊學老生屢失有司竟以貢起家翁終始不以喜愠關意襟度夷曠曽靡疑吝無筐篋錙銖之殖而有本原方寸之積所以貽後者不嗇矣翁生成化癸巳行年八十一孺人生成化甲午卒於嘉靖辛丑未塟也至是與翁合焉三子長禮靖安君娶教諭荘海之女繼白氏次麒娶知縣劉信之孫女次祐早卒女三人皆夭孫男一山一潮一崑一山聘司訓王甫政公之孫女孫女長適晉江薛應㑹次適貴溪知縣江萬仞次許晉江庠生蔡雲嶽次許安溪庠生唐音之子道一餘三人皆幼翁淳心質行永年令終絶惡斁於家邦老而益為人所願居常履順無竒也翁甞受安溪訓導周君某寓金一篋隣火翁適他出家人皇遽避火多所遺失寓篋獨無恙周訓導聞災拊心嘆曰亡吾金矣一日翁持故篋畀周曰金在此周驚喜如新獲以十金為謝翁艴然曰使吾為金獨不可利此一篋乎而受十金也周感服再拜斯亦竒矣銘曰轇轇者擾乎囂囂者矯乎决道之藩而騷性之徼於天之人小者乎復樸而去藻外黒而中皦謂翁之生也藐乎其原膴膴其坎窈窈歸斯藏者窅乎黄濵溪處士墓誌銘安溪參山黄生大本稚年而志學余嘉其志而許之游其愿而篤可教也余又因生以知黄君善繼君之先世皆不仕其父添養蚤世君少孤不克就學而所居有山水之美田園之饒守其恬質以隠家近桐溪臨水垂釣或放舟獨往縱意所如不復知有世上之榮身外之物也故自號曰濵溪黄生從余遊時傳其說歸與族人言參山固朴處族人多不為詩書語舉以黄生為笑君獨好聽其說久之則幡然謂黄生曰吾等僻處窮山耳目無所聞見徒竊活耳何由得見此人以發吾䝉也黄生以為言且期來見已而以母病未果來已而自以疾不果是嵗二月七日則黄生以君之訃來矣予聞而悲之而黄生復以君之塟告曰乞一言以志其藏葢君竟以無子死而其存則與嫡母林氏母方氏謀所以嗣其家者選於屬之最親而擇其愛者大任以為嗣書以遺其其妻莆氏曰我死則大任吾子也黄生慰之曰世父何遽謀至此姑自攝勿及此不祥語以自傷也今既卒而大任奉其治命以終三母之托故黄生為營其塟而圖所以不沒其人者以屬予曰是其生恱聞先生之說願出門下而未得者先生尚哀而許之以幸吾父於地下也余既知君之意如前所述而為君之子者又吾徒之弟大任也其可得辭君字士孝生四十有四嵗而殁殁之後一月而生女而以是年十二月十九日塟于其鄉員潭山之源嗚呼其可哀也夫然予觀世人老而無子者猶不知所以自决而卒制於他人之手繼嗣不定以敗其家而斁其祀者往往有之君獨能以盛年為逺計而其選擇之慎付受之明使狡焉思啟者不得揺乎其間亦有可賢者與銘曰禮之所出爰輔以律本人之情厥正而悉無嗣之凶有續其瓞非無倫序曰愛之必生而宜之其死也謐爾克有子在計早仡我銘其幽有如皦日處士順吾王公配龔孺人墓誌銘順吾翁之卒在嘉靖癸夘十二月其嫡長子綿緩前卒庶子績約紱縯皆弱且幼丙午四月配龔孺人亦卒乙夘正月二十五之吉四子與綿之遺孤孚中始克奉翁孺人祔于龍山考妣之兆四子已納室有子及綿緩之子有孫十二人孚中亦有子一人塟雖緩而周事合禮庶其無悔翁名陞字徳敡父瑟齋公瑞昌母蔡孺人大父義齋公永堅曽大父明軒公庭中皆以好義力善儀表一鄉世以為樂不慕榮進翁少而敏悟過人讀書不多誦數已熟久而不忘母患其弱以書為勞也讀輙禁之甞潛投里中學舎從師授書母輙遣人譙讓其師是欲殺吾兒耶里中師相戒莫受王生卒業故翁終不得以塲屋之業干有司性固好書史傳雜記稗諧小說汎覽多識其言體事切物而貫以義理遇人輙言之為父兄言慈友為子弟言孝恭援證宿事昔說聽者莫不竦喜講禮修儀居常矜整動敕約人以容節好入里中學舎問子弟所業而課之故里中後生遨手足䙝衣冠學舎子弟業鈍惰艱於應課者往往走匿里中凶吉有資於文詞如聘昏勸學奠死銘塟之作多以翁為屬善為七絃彈中年遊金陵以琴有聲士大夫交下之冀聞其音遇意無忤為鼓一再行而已秀目修髯資渾朴而有韻致解紛弭鬬不厭强聒說而罷者尤多郡縣知名常召見之言即為言孰利當興舉而不言其不善者前守四明屠東厓令山隂錢立齋兩公並優禮之屠公復加奨激畀以郡檄主一鄉之約翁納檄郡中為屠守言勸誘一鄉之長幼此未死老氓所宜盡心表率督勵則非所任守嘉歎之以為質而近厚也始蔡母禁翁讀書誠患其弱亦其家有餘衣食無覬於外安於分域之内以自足也翁不巧謀生晩而多子不無以家迫為戚賴其疏綽不急之度有以自寛亦甞追憾見禁其母不専於書而慨然有羡於榮貴之㑹也吁可念也龔孺人尤舒遲而無機祥懿之行周旋始終不憂不怒宜於一家與夫偕老而同徳翁雖隠約不顯然無害於性以全其天永居世之齡而久其善鄉之蹟又何憾羡於彼此也翁四女皆嫁名家子而仲女之夫黄物備博學有文詞以貢厯官為王府教授宜為銘翁之子孫謂某寔維持其家不負顧言之託必以見委是則何敢而銘其何可辭王氏有姓於安平所可知者元之将季自二十九郎三十一郎而至明軒公其逺不可詳也翁甞命某以訪譜之責從宦中外始得莆田王譜而通之其為晉江𣲖者二十九郎三十一郎之號灼然可據其他官行名號猶有不可質者故某與弟惟中與其族人參政鳳臺知縣一貫序宗盟而未即合譜不及以講于翁斯責未塞也王氏祠堂由翁倡為之制法有未備某方嗣為之墳兆之在東埔者某僣竭力其間以畢翁志是日銘翁之壙庶無愧於幽明銘曰於邦國可以有為而不得為於族欲以有為而不及為非智不足有物司之惟其繩矩於家牖携於鄉是亦謂為奚其為為而後謂之為封戸部主事南圃張公墓誌銘公名良寳初名文㑹字廷際泉州晉江人髙祖自牧公仲端由安溪徙郡城曽祖進修公宗應祖寛以鄉薦厯官終應天府學教授别號慎齋徳學為鄉之先正父仗義公秉徳嫡母何氏慎齋公為山東茌平教諭最善其邑人邵光禄公故為仗義公納其孫女是為公之生母慎齋於諸孫中尤器公授之帶一圍公裳一襲顯示屬意云此兒必興吾宗慎齋公久宦而貧公以經教童子自給劬學不廢旦夜博渉他書業成矣而屢躓於有司因改業以謀禄仕居家躬行孝弟率屬同姓大書忠孝勤儉于祠堂而梓慎齋公遺訓子姓人授一編子姓中少有過差輙舉祖訓以警勉之撫弟之子如己子推父之居以居之追逺之敬嚴於祀事每厥明少長未集公以衣冠拱立祀先之所畢祭而享厯厯舉某祖平生曰吾張氏以孝弟立家慎齋公益篤友于仗義公不替家法兄弟終身無間言念徳敦行吾與若等責也戒諭敦敦懇至羣從皆化之張氏一門尊卑殆百人雖析屋殊爨雍睦如一家泉人不知其孰為親疎也與鄉人處一以忠信為主而綜練世故洞悉人情鄉有鬭訟或官府不能平質公一言而解其誠心足以感之而明達能中人曲直機要曲者自為公屈盖未仕而率族睦里之行已施於有政矣年五十赴銓得呉江尉邑稱富劇公佐理有餘力邑長開州王公一以政委之王公受成而已邑以大治郡守天水胡可泉公英察難事倚公如左右手郡屬邑令皆甲第名流其所編徭冊民屢愬不能定胡公盡以託公比冊出無復愬者督賦不急不弛常先他邑辦集有巨姓逋租萬斛重賂求緩公麾去之治之益急舟運稛載一朝而逋畢輸以敏慎仁恕屢受臺奨而已於卑位不能薦之也髙御史世魁直諫忤旨就所部逮赴詔獄屬吏憚怯避去公獨周旋其間諸屬皆義而愧之在職滿考值仲子行吾君志選登己丑進士即棄官歸行吾尹諸暨及為戸部郎出知常州府政業卓異時論歸美之皆禀公之教也以行吾戸部主事之考得封甞一視行吾以下原闕久其祀行吾君迎其意以所分父田充慎齋公烝甞公甚恱之於母家尤篤往返京師必由陸至茌平謁邵氏家廟厚遺其子孫邵母諱日必屏居自傷淚蘇蘇下終老猶然徳履之劭重于鄉邦有司鄉飲酒禮延以大賔雖以貴夀盖尊其徳也平生無病忽遘疾家人請用禱禳公不許幼孫或誦論語禱爾于上下神祗以為諷公曰汝未讀下文邪病中聞壻之訃憂其女甚及女扶夫櫬至家相慰苦而公亦逝矣卒之前夕訣諸子孫皆立身守家大要言畢從容委化可謂考終矣為丙辰十一月九日也距生壬辰享年八十有五配薛氏封安人與公偕老長子志魁庠生先公卒娶諸葛氏次常州君也娶黄氏繼娶侯氏皆以夫貴為安人志騰娶黄氏志顒娶史氏志尹庠生娶林氏女適博白知縣李士絢孫男八人守質守為守臣俱庠生守介守孚守藩守教守嘉孫女十三人適許皆名家行吾君遵公之教友和諸弟誨誘子姓彬彬多盛材将益昌其世而公積慶詒謀之善彌逺而光矣以十二月十七日奉公塟于所治之藏而乞銘於某曰公遺命也銘曰棠隂之丘蟠糺其虬築之俅俅外曠而中幽生乎樂於斯死也藏於斯更千百世其勿休祥嘏是逑蔡母嘉柔孺人温氏墓誌銘王氏與蔡氏世姻子孫皆世以姑舅之講為兄弟兩家之好非一日矣吾先大夫與蔡宻齋公管闕輩兄弟也宻齋之子明達發達復呼予為兄故其塟母温孺人以銘墓之文為請而不當辭孺人歸宻齋公而其父略齋公泗為邑庠生居家好禮母呉氏性嚴孺人事舅姑無不當意閒居寡言若不甚慧臨事斬斬有條理臧獲經其指授則課計見效或不得命偶自為之輙缺敗妯娌有所營辦視其舉止赴之而已蔡氏族指繁諸婦多名閥或以門第矜倨孺人及孺人為婦久之賢聲聞於宗諸矜者顧媿敬孺人悔其初倨也家方起而宻齋公沒孺人年三十六耳三子皆幼當憂悲窘約之際撫孤持門户如秋葉融風凛凛将墜能維䕶其長子自達治宻齋之塟而乞銘於故給事史筍江公曰使賢人誌其藏吾夫子瞑目入土矣維是未亡人之責在三孤也未幾自達殀孺人哭之殆毁忍死自力雖衰而志不憒育二孤鞠瘁朝夕不以姑息妨督課拾掇細碎積贏致豐二子行貨呉越中貲殖殷起孺人亦病矣方篤召二子曰富不忘貧則富不入於貧矣慎無忘㷀㷀危困時也又曰吾起貧家最知貧家之急汝則割田數十畝待族人之飢者則我可以死矣二子就床下書佃名嵗得穀三十石曰義田孺人視書畢遂瞑實嘉靖甲辰嵗九月七日年六十有三今其子逡巡在鄉黨間斂退愞縮無敢有敖言侈行猶思母之訓也墓在三都張林山之原與宻齋異兆明達娶伍氏發達娶許氏皆未子明達女三人長適王繒次適參議伍公鎧之孫祖誨次許黄志淑發達女一人許黄士儼女三人適伍宗道柯理許釗墓坐夘向酉為七壙二子婦異日皆将祔焉塟之日為嘉靖丙辰年十二月二十一日銘曰儉能起其家之屯恵能恤其族之貧匪直也婦其才實夫猗嗟乎令人陳約齋處士暨鄭氏墓誌銘陳約齋君以嘉靖丁酉四月二十日卒年四十遺孤長者十嵗次未能言也将卒謂其室鄭氏曰勿遽塟我室謂君慮貧不即舉也君揺手曰第待之鄭不得終請已瞑越六月十九日鄭亦卒至是嘉靖丁巳十二月二十六日子長者始以丙辰進士塟其父母于邑之湖頭山周事飾禮人始曉君所為待也晉江有陳氏著矣逺祖孚中公好學能詩遭元季䘮亂仕不得志終同安恵安順昌三縣令入我明而章應公首膺進士科為郡衣冠之倡厯榆次繁峙安邑三縣丞以才亷召為禮部儀制主事太祖閱功狀大異之璽書褒美下本郡榜之里門以寵之焉榜猶藏于家永樂間道曽公以進士選為翰林庶吉士授雲南道御史澹于榮利乞為校官以名節終是為君之四世六世祖髙祖某曽祖某父某皆不仕母張氏早殁二兄曰謙曰恭相繼殁君獨力貧以奉母而撫幼弟任方弱年已勝壯子弟之責家最窮空自以門閱世舊所為自力於窘急以給朝夕雖備甞辛苦而不夷於市井溷鄙及渉事日更識恢知益人往往以事赴之不以昏夜風雨為辟忿戾方紏談啞渙折謬迷難諭指畫開暢門戸日尊忘其瘁替陳氏故里正所轄戸猥多强者難馭乏者難輯宗人屬君持役府縣每下追召徴率能使强者不叛乏者不逃賦集事辦縣官屢賞其能轄戸甚安之宗人咸喜舉酒屬之曰微吾子吾宗里正敗矣事有急時間出權數以濟或咎君以少欺君曰吾以濟事而不以舞人少欺何傷性倜儻善羣杯羮樽酒之聚謔洽洞欵人人如得醉飽大㑹廣坐得君以益懽每集君在後至者聞笑聲曰是約齋耶争先趨入少讀書不能多而札牘來往語言反復動有章采皆從耳剽得之其聰聞警解有過人者陳氏指最繁君年未盛已翹然為一姓之特亦其所自致然也然心顧獨善謹守禮法踐繩抱矩之行子幼已訓責有法進士君居身莊畏粥粥如恐墮足失口人謂不類其父不知遺教有存也每置子膝前語内曰此英物也踵諸父而起以嗣二祖之芳烈必有屬矣時君之從兄西郭君蕙以御史有名臺中所謂諸父也鄭氏婉嫕而静兩人氣度若不入而相友如賔終身無忤言違色絶不以貧故微懟其夫其竭意承順若恐傷之宛曲内至有賢婦人所難者進士君悲不得事其父母雖以顯塟悼恨刺心如不能生故以墓中之石托予曰将藉此以逭死予方不知所以生而能為君圖乎君學於舅氏鄉進士鄭君良璧超詣卓出文為諸生冠四方之士将知之而謂予獨知其文君之所以托余者過矣約齋君名寛字存太長子選進士君也次子㑹進士君娶李氏繼娶曽氏故嘉興府知府曽仲魁之季女㑹娶某氏君勇於為義故處約所勇者非不足著其最可著者嘉靖丙申丁酉連嵗大饑民飢多􅥌死君請縣發賑自實轄戸率之詣縣受粟槩量平均餓者得粟皆活嗟乎君所以有待而塟非徒知其子固有以自知也哉銘曰銘詞原闕贈刑部主事呉雙湖公配金安人墓碣銘夫踵躅而貴人之所同欲也而降之予奪制乎命象賢而肖人之所得為也而修之惰勉視其志然世常急於欲而後乎其所宜為至乃越力分以與有制者角盡棄職性而茫不加修或幸而遂其所欲墮盛斁美比比而是俗顧以為能似其先而世其家也其力為善而遇不顯者且歸以析薪弗荷之愧嗟乎成敗之論方眩而肖悖之實不明為子孫者忘所有事而自失者衆矣樂清呉雙湖公九仁字可為故尚書章恭毅公綸之孫而故方伯公元應之子也恭毅公忠義風烈巍然一代名臣而布政公亷直才敏為名宦後人肖之為尤難而雙湖以儒衣老死賤貧矣予獨以為肖子将以闢一時成敗之論之惑而使世之為子孫者知所職也公行篤言信不忍損直以狥物不憚矯俗以亢已以佞巧為穿窬之術以鄙吝為輿臺之行天資近厚主於易良遇事不可意人有不善輙面艴語怒若稜棘不可靡磊落濶視蕩無城府舉世何足闕逡巡不少爽絶不預人短長鄉隣闕其曲直不為嫌避買交市名心所深耻人以乏且急為告竭其力所及副之其性嗜義而自以賢哲之後知有重職而不敢惰棄故也少讀父書發憤致精師恱其専同輩畏其苦刻也宿說舊訓彊記熟思能演暢其旨為邑才弟子員文必傅經不喜為附枝蔓葉後進浮靡者每躐之公亦倦塲屋而謝去矣以其専苦用之於詩結社鴈宕山下搜竒抉勝琢雕倡和其句氷寒雪潔有騷人隠者之遺風稿至數百篇可傳也以公之好學使不自謝去於世之所欲者未必終不得之誠知重其常職而不以予於命者易之也然公自謝時今僉事君朝鳳方為弟子員公慨然曰吾祖父詩書之業有屬矣僉事君果以甲辰進士起家贈公以所得官為刑部主事於人之所欲亦烏為不得哉僉事君為進士使江西竣事不受一帕束手歸覲拜公於堂喜曰筮仕宜若此庶幾不辱為賢哲後矣然有進於此者兒子勉之公妻贈太安人金氏處州太平府訓導公核之女嫓徳于公公教子嚴安人能不以小慈敗其訓公疎於生事安人能不以欲富撓其髙事方伯公與姑蔡孺人孝敬無違治門内之政賔祭中禮衣食有節旁施下馭條法斬如也公晩自休窮山水之美以昌其詩由安人為之内也公以嘉靖丙午七月二十日卒而以戊申十月與安人合塟於馬家前山從先人之兆盖安人前公卒九年矣僉事君按閩使至清源山中以墓上之碣為請且叙其姓所由復曰呉氏台州仙居人也宋太師康肅公弗初為樂清尉弟荆從焉娶於北閣潘氏因家樂清是為北閣呉氏荆生芳大芳大生世簡簡生徳甫甫生日起起生開宗幼孤依母姨夫南閣章希恩以居長而從其姓仕元為徳清縣典史開宗生性性生新民新民生文寳尚書恭毅公之父也然方伯公皆與北閣呉氏叙宗而姓仍章氏以先世之恩未逺而不忍也顧其志存焉故吾先君以先志責朝鳳且幸通籍於朝而得請也今之為呉氏吾祖之志而先君之教也嗟夫是亦公之知所職以肖其先之事也銘曰顯顯尚書朝之大忠奮義狥國不有其躬所狥伊何庭有譸訌英廟狩還南内部封憸夫觀釁危及儲宫集議闕下千官震恫顧軀戀孥草仆隨風背汗胸顫莫敢異同噤不出聲喉咽有舂尚書其時儀部郎中義形於色叱闕疏入極諍闕龍敲榜鑽灼死靡悔恫三嵗纆拳肌瘡出蟲且登于天釋幽躋融守道匡時大節始終書于史氏跡名駿鴻孰是孫子不念休美胡以念之曰先是似胡以似之蹈仁服禮穹階峻秩有貽先耻公阨于遇而力為士我最公行是為肖子詩于隧石其永不毁附碑撫冦碑汀漳於閩為要郡上杭汀巖邑也邑溪南之鄉崇山造天牙錯距躍隴阪縁亘箐薄宻綿其民狎為非義獰噬狙攫席袵戈甲禦冦無時風氣所限非性故然長子育孫生蕃齒盛耳目習熟莫改厥徳少視其壯壯視其老蹲危逗幽迺為盜藪厥有治者不揆其性不閔其習盗視彼民忿獷堲凶攻撃剗鋤如農疾莠惟懼不殘民不見徳又弗儆威既狃於習且偷其生鴟張螳怒攘奮踉蹡吏既讐民民亦毒吏讐毒兩積交不得已於是溪南之民惡聲膠固歴彌年所湔滌無繇豈不悲哉嘉靖癸夘之嵗郡丞繆侯宗堯移攝事聞而嘆曰安有為吏而民寔讐在邑所治處溪之南而視若異壤民之不義惟為吏者之責吾将為溪南之民湔滌惡聲登濟維新偕之大道發教布令開以誠心民聞不疑選日戒徒往涖其鄉而教諭梁君彦錦寔贊繆侯之計而决其行乃與訓導郟君夔率學官弟子丘道充道南李如珠賴榮先從焉戎器不除卒旅不具雍雍翼翼冠盖斯戾魁首醜黨部勒有次稽首馬前爰崩厥角扶旄提倪觀于周道歡喜歌呼激越林莽昔為魁首今為長正昔為醜黨今為編氓刮瘢洗瘃復還骨肉撥霧掀曀再覩白日民視繆侯如出子寄孥久離乳哺一旦還歸婉戀膝下始識慈母民視梁君如騃童驕孺未識衣冠驟謁師傅拱揖歩趨盼顧驚喜吏既誠民民亦懷吏周行疆畎攷閱壁壘曰險爾平曰翳爾闢曰萊爾易迺犒牛酒迺給耒耜迺分麻縷迺置門塾男耘女織各得其業戸誦家吟知慕為士向之盗名棄去如脫溪南山川出垢遺濁光色發揚蒼蒼濯濯嗚呼是溪南也在昔若彼在今如此烏覩所謂習哉吏不能以誠撫民而惟頑之疾民之不得其性者可勝道耶梁君今為泉州南安令以繆侯撫冦之蹟告予曰願有記予不識繆侯而知梁君之言可信故特書之貽上杭之民使勒之石以昭不忘膚功遺愛碑蔣維業劉伯需踵門見予衣屨菲陋貌俚而視野予不知其何為來卒然言曰将有請予怪問之曰吾漳州龍溪大地里人也巖棲而隴耨作息在溪壑之間以其幽昧荒阻居之西圉常患盜焉苦之而不能禦是嵗八月汀漳守備俞公以督府之檄來徼盜盡得之吾等不忘其功将勒之石予曰守備逐盜而得盜職也若何石焉曰吾等深有不可忘者不獨以得盜也凡盜之攻奪吾聚落避之猶有可免哀之猶有可丐而吏士之逐盜至者進無可丐之門退無可避之路甚哉其莫之哀而不得也故未甞有得盜之功而重以播民之虐今俞守備之至吾地禁戒肅而約束明卒無敢喧于閭吾安吾栖而治吾耨作息循旦暮之候而不知兵之在吾境老稚嬉遊以閱俘馘之過而無變容驚已之虞畜之字於塒者可數而收葵之在園者莖葉無所損老詔其少尊語其卑不圖生身以來獲䝉此幸壺漿斗酒之饋却而不甞山織野繭之所治又不敢以獻相與鬱而不鬯謀所以報之其術無繇是以敢冒然而來請也二人者田野之人也其言質而慤予怪其知不忘俞公之徳而又知來請予之文孰謂野人而不知禮哉孰謂野人而不知好義哉吾何說以辭之哉遂次其語以畀之因名其石曰膚功遺愛使歸鐫之以旌俞君之伐以不孤二人之勤而慰大地里人之意俞君名大猷字志輔以泉州衛百戸由武舉厯陞為汀漳守備署都指揮僉事湖水利頌徳碑邑東南鄉之田皆仰水於湖其浸鉅而灌博者龜湖為最環湖而廬且萬家支村析聚櫛比袵聨總其鄉之名曰龜湖盖以湖名其鄉也寳盖金鞍玉屏諸山之水釃為四溪流入於湖瀕湖仰水之田度萬餘畝民䝉其利而不能知其始所由作惟畜泄之節淤决之禁昈列科條謂之塘規者知其始於宋蔡忠恵公襄守泉時所留也號湖以塘盖邑俗方言云湖水之利於田若是博故有隄以捍海堰以陻潦坊以瀦止庸以宣流而嚙淫潰泆之害必有資於人力嵗治月修然後無害水庸之啟閉有惰以妨時有奸以病衆而豪右之侵争狂狡之盜詭皆所以為湖之患其具不得不出於政刑所謂規者實於是取之由宋至今殆五百年守陂之夫雖具而官弗予直故守者常怠而廢事民以請於前守方公克視篆節推袁公世榮議協于民為請於部使者既許而二公去莫之行也屬南衡童公來守郡以事行治屬問民利病而龜湖首及焉民方欲言公顧就而問之於是有以前議得請為言者公即符下晉江無留牘又盡民之所言繙牘得為所増議塘規二十九條行之其鄉公善以寛碩接其民使樂於有為不待撻罰而相戒以率禁其勤也無斗酒尺帛之勞而自勸湖以無患比嵗薦登田入羡倍粟溢他鄉人皆以侯之福我也相與伐石勒公之徳且期以申敕是規之詳於不廢也觀古治民之利以循良見稱其善非一而水利之興脩為最鄴之白渠蜀之離堆楚之芍陂越之鑑湖尤其著者也作者非不欲為無窮之利而脩復之功每有待於後人盖民庶乖分世祀遷易則弊萌蠧穴伏於其間如芍陂作於孫叔敖至何武鄧艾劉頌魏欣趙軌厯數世皆以有功於陂為民所記而馬臻孟顗尤有記於越以鑑湖之功也觀其所為如伐木通榛以納衆流増闢水門益廣灌溉計功受分使大小勠力與夫禁民壅湖為田立水約以裁貪争皆於續規脗合盖古今異便而水利興脩之宜不越此也斯規之有裨於湖而不足恃以不廢法固有待乎人者故予特為記之非徒副民之請以述童侯之徳将以遺後之為政者於無窮云刻招魂章碑石泉之為郡東南履海延袤迤邐畫岸為疆如循衣裾縁岸曲折蟠屈人營其間以居對視列島隠見出沒烟濤雲浪間錯落若置碁聚塊皆蠻人邑國也無重關穹壁斷蹊絶坂之限舟浮水面負巨颿而行日可踔數百里島外諸國皆有竒産異物珍瓌怪詭邀利忘生之夫枕席大險以牟鉅贏故泉之盜患莫劇於海嘉靖二十二年夏五月盜犯深滬鎮深滬於縁岸之居聚人為衆而據地為固民相率紏義以禦之吾郡别駕陳侯少華方司郡徼督捕至海上聞深滬之民将率義禦賊檄而許之民既奮於義以相保聚比得侯命益堅且奮盜鬭不能勝獲其魁首殱其黨奪其舟兵盡島外諸蠻也吾民鬭而死者二人傷者亦若干人侯親為撫循勞定振䕶賙給民皆洗瘢刮瘃迅踊而起忘其為創也又哀死者之不幸為賦招魂二章以祭之民之鬭而不死與不在鬬而存者雖有智有愚於所賦之義或解或不解莫不感誦嗟嘆激於脾肺播於齒頰謂侯之能用我也自農不為兵而攻刺撃殺之事不任於民而死者又人之所甚愛難者其所難犯世之患盜者固以為無可用之民視盜之猖披潰决莫能措一籌其間其亦未覩今之事乎庠生陳邦竒深滬人也所謂智而能解其義者也将摹侯之賦刻諸堅石以繋其民不忘之思而乞記於予侯詩詞閎富妙麗絶出一時所為招魂之章酷似楚人當别行於風騷之塲予故不論而獨著其能用民以備禦者以授陳生使歸刻焉遵巖集巻十四

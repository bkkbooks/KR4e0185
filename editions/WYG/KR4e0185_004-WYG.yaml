body:
  text: 遵巖集巻四眀王慎中撰五言律詩送陳學顔辭親應舉却歛黄香扇行穿季子裘書將隨計吏富且謁諸侯舍館鳴鷄夣闗山呌狖愁眀珠光照乘莫向暗中求送謝生詵辭親應舉閩楚千餘里歸程草色通鄉人推射䇿嚴父教移忠問絹親闈裡題詩客路中漢庭方愛少去作一終童送陳邑博子秀才辭親還家成婚成器專攻玉傳經勝遺金日辭鱣館愛春動雀屏心執鴈將脩䞇求凰或弄琴遥知扇枕戀情不滯鴛衾春雨柬徐山人客居春風忽已滿客子亦何心雨長新蒭價泥荒車馬音閒堦侵草遍濕突起烟沉更有闗情樹窻前滴夜深丘少泉卧病山中作詩見貽用韻奉答兼以候之憐君卧病久枕上過芳春山色翻欺瘦鸎聲總喚嗔鵩占休臆對蛇壁易迷真學取無生理心中滅盡塵送李一泉往恵州推官懐牒持三尺分麾佐百城溪山輕瘴癘風氣就開明石埭由來美豐湖自昔清龍川經過處一弔尉佗營挽故石埭尹尤先生彭澤居官放黔婁謝仕貧松筠方傲晚草露忽輕晨喬舄長飛去潘花永不春祇餘琴調在空閉匣中塵柬程郡侯卧病二首求瘼何其急起居翻失常言多詢利病心苦犯温涼署牘將方檢尋醫與吏妨元元資卧理此地即淮陽交戰知曽勝胡為薾疾嬰違心牽赤紱勞已救蒼生舎晚榕隂暗樓昏蜃氣明抱痾因閉閤一使訟風清送黄南池歡遊不覺久相送忽成悲嶺外少來往年中畏别離更無叅𤣥理誰復賞新詩千里看明月應懸兩地思送李拙脩歸鄱陽二首拂衣從此去歸興一為談藥譜新將著農書舊所諳酬言持手麈晞髮廢頭簮相訪欲知處應之栁市南道氣如君盛心期與我談妻孥能共隠鷄犬亦相諳木榻坐花塢皮冠削竹簮蠡湖烟水滿更向蠡湖南唐婁江明府邀遊九日山同黄竹溪東石二公四首夫君善為政自鮮簿書情張幕人皆覩傳杯吏亦清花衝壺矢落雲逐舄絇生造次成遊賞應留此地名最有登臨賞兼之賢達俱落英粧藉草鳴鳥勸提壺古寺蔵林表輕霞暎海隅青春垂欲暮莫遣興情孤簮為襟期盍樽同名勝擕蔦烟隂白石花水漲清溪佳卉當春發嬌鸎近酒啼如何更辭飲斜景竹林西處室何其迫坐為城郭拘稍看山色遍頓使俗情無此地寧須買今茅即可誅且將狎鷗意暫爾伴飛鳬遊五老峰四首積有耽奇癖登山好問源不辭千嶂逈獨訪一峰尊飄袖連飛鳥攀蘿學掛􅆐纍纍岡阜起坐閱盡兒孫悠然獨抱此含意在乾坤陟險消多病尋真契寡言桂叢冬亦茂石室午方暾倚杖神凝處泉聲樹裏喧兹山尤物衆一一愜遊盤芝可充饑茹蒲堪結坐團題詩生葉大濯足有泉寒由來吾所愛欲道與人難歎息煩囂久幸然未白頭靈藥非難得名􅋖或可求金光叢裏暎玉乳石中流回首顧妻子真堪敝屣儔别業雜詩四首小築無餘地大觀别有天窻中含逺岫屋上響流泉髙咏時題葉閒情偶㺯絃興來何不可寧復惹牽纒山人向客歡此地日如年不悟幽閒永翻疑晷刻偏蕭條機事淺澹泊谷神全始信樵山頂爛柯非妄傳旭日照春山山春物色妍鳥聲多在竹花氣欲成烟薜長新脩路池深舊引泉佳時將静處人意自悠然孰知遺世念不在去人家徑任青苔占堦從碧草賒朝朝娛覽詠物物稱幽遐莫恠迷秦姓春來桃已華訪友人山房留題恠爾沉㝠甚時常出入稀以兹廬可愛肻使願空違隠几鳥啼急披襟風到微營營予亦厭將此共扃扉病中漫述二首一生十九病坐使廢居諸日日求醫術朝朝理藥書家人憂即死朋友恠何疎世情真已矣吾道竟焉如頗得病中趣未嘗苦不堪床頭看巻熟被上作書耽交息寧須請禪忘忽已叅何日稍能起門生擬舁籃病中柬可泉與可泉别久極思一見而病不能往情見乎詞末由披宿霧空此挹高風病意翻增劇交盟始信窮世情經歴後心事寂寥中知爾欲相見而今只一翁可泉相訪病不能見爾來歡晤少伏枕過馳駒有客方銜使多情顧病夫柴闗非固閉藜杖自難扶坐席何曽割終然出處殊友人下第還家西上又空返悲歌易水曛有司輕失士無路達眀君莫嘆家如磬還看鬢似雲南山當日霧猶可養奇文病中李君度見訪家僮絶不為通走筆柬之閉闗非為疾性本好沉㝠論學刋中說修形正内經訣從静者悟語忌俗人聽已戒應門畢君方來叩扃章二洲以侍御謫推興化府叙復揚州郡丞二首維揚風物好不比漢長沙半刺官雖冗量移渥已遐娥眉空賈妬白璧本無瑕好取原冠拂朝中待觸邪叙遷猶佐郡恠爾意能安秖有簿書急誰當禮數寛髙才宜見屈枉道亦何難雨露清時澤無為薄一官送宋仲石赴召二首洛陽橋外路萬里指長安舄向天中去琴留海上彈龜文頻撫劍羊角欲生冠相送情無已寧因感遺肝國興知有象君去莫傷違已設諌臣賞因徵良吏歸九閽非虎守五位見龍飛美錦今成製還堪補帝衣遊清源山二首取路非髙足入山力復餘所長元有適於計未為疎髙見羣生擾間看四體虚堪嗟二畝半促促邑中居城中長日望翹首起遊思如何咫尺地動以嵗年期忽覩草花喜終遭猿鳥疑眀歸應復望惆悵使顔衰清源山紫澤宫畏景在城市聊兹息茂隂攀躋不覺逺依止自知深石上消氛氣鐘前起悟心宿非如可謝卜築請從今上洞宴集二首千峰最髙頂上客敞芳筵心豁雲初散形忘酒易傳滄溟侔洞達城郭俯紛闐一與豪賢飲翛然病已捐憑髙張讌好嵐翠滿軒楹杯泛流霞氣絃含漱玉聲魂消遊目逺日入發談清情深寧在酒不醉自非情清源山獨行諸峰示同遊諸子二首洞壑杳氛氲中間紫翠分興來秖自得獨往有誰羣激射風前瀑孤髙天際雲心賞悠然㑹何由與客論人世多浮變髙山自蒼然因兹脩杖屨暫得解徽纒白石無塵滓青松有嵗年每逢偏逗歴佳處正難傳遊清源山同洪芳洲二首曰余懐素志將子有知音即兹山與水何必絃鳴琴捫蔦亦同榦酌泉時共斟無言徒脉脉相偶意彌深同病本相憐遊攜接勝縁短笻逓間執兩屐對分穿逢石呼俱坐探經覽共研不知形已黜目擊兩茫然園廬閒興積雨端居暇翛然愛一園菊如陶徑茂𤓰比邵畦繁暑退風歸樹秋深潦壊垣城中少閒客誰復到吾門題黄墩書屋贈陳玩潮四首疎林半畝分自築一經堂衣典充書購帷垂任圃荒諸生來卒業千里有持糧取適絃歌暇尤難忘嵗芳之子鶴鳴意行唫秖在隂四山低户入一徑隠花深蟲響長依砌鶴飛知返林一聽希瑟調自見卜居心微溪日自行蓬藋也難生不受故人薦欲成處士名環堦無惡草幽鳥有佳聲過爾輒難去貪兹養道情習懶非吾性胡為常閉門本嫌塵世事獨好古人言窻暗螢來照庭風葉自翻壯年在眀世慎莫苦辭喧蔡東洛夜坐共坐髙齋夜蕭然息衆喧月中星盡隠竹下露偏繁久厭時人語今逢長者言非因憐夙好何自顧柴門和呉岱麓通守秋夕有感之作髙才嬰世網懐抱曠難儔少輟簿書暇還悲時序秋朱絃徒自撫緑斚有誰留操觚娯永夕心跡見悠悠和胡雙華郡丞郡齋言懐見貽之作二首為郡多詩興髙人繼謝公民和官府簡花落訟庭空暮閣侵簷雨閒牀掩帙風此時鳴鶴意自與在隂同何事專城貴偏多懐土心題詩常對吏寄興在抽簮長物看青組幽期覽素琴愧持巴里曲欲緩越人唫郡侯方西川與錢塘縉上人雨中郡齋夜談走筆奉柬二首政理日清浄郡居類化城雲峰簾外變雨氣署前生淅瀝琴書潤蕭條几簟清夜深懸溜急法辯自同傾不為學無生心閒物自平髙僧輕逺至好雨正時行雲起兼慈色水流帶覺聲始知符竹貴元有錫緇情和呉通守夜月思鄉之作海邦亦共月何事憶荆扉偶見如環景能堪碎璧輝羇心因自感髙詠覺聲希莫自思鄉切還看承詔歸聞縉上人遊清源山髙僧真避俗為客也耽山路向樵人得身同錫杖閒泉源當夏冽蘚色閱年斑遙憶孤燈影留光萬壑間病中柬縉上人二首夏日多榮木凋傷感我生拘拘徒自笑炯炯欲何營已覺芝苓誤無由羽翰成三尸如可僇願假伏魔兵伏枕不知久庭柯緑已蒼以兹時序感頓覺圃農荒養性資琴瑟達生覽列莊今將未死骨齋沐付醫王送唐婁江赴召二首帝心嘉勞來户口不虚増負扆方思治璽書遂見徵簡求青𤨏入意氣皂囊勝莫倚鸞凰志今當作鷙鷹吏民看解印未去已堪思魚棄皆長尾花繁故暎枝攀途車屢滯出邸槖空垂欲佐薰絃曲一琴行復隨周石崖督學擢廣西叅知寄此送之二首在楚卿才盛如公更絶倫雲夢胸自有岣嶁氣常親陶鑄看多士綏懐託逺人九嶷遺跡古一為訪虞巡道術陳良是丘墳倚相親章縫探奥室文物起來塵變豹方成蔚靈蛇盡握珍還將今禮樂往靖桂嶷人元日訪青門月臺寺寓處坐談竟日無事縁長病似君在客邊椒花休頌酒柏樹共談禪嵗律風微覺人天語自𤣥香聞應有悟景昃未言旋元夕柬青門星宿爛山城人家正競燈微霜資照燭皓月見侵凌遇節心猶勝追懽病不能問君今夕興還似少年曾十六夜與青門談四面歌鐘起華燈爍月光栁梅微辨曲桃李窅凝粧誰向家中坐争看陌上狂獨餘吾與爾相對在僧房青門卧病走筆奉柬二首一户閉香林髙人此定心夜深童子睡庭際草蟲吟蓮界除腥氣珠光照瑩襟他人徒問疾吾識爾陸沉獨宿青蓮宇昏魔胡未降伏床迷界色稽首禮幡幢㝠力瞻燈影殊香到藥矼泠然醒睡頃微月在前窻青門將歸走筆奉留青門寓學上人精舍而與郡侯友也故詩援上人與郡侯以畱行二首如何好遊者歸興起秋風言踽初來欲隨東去鴻林居方得伴賔館遽愁空且伏狙猿性相從事逺公縱有思蓴興能忘伐木情垂簾常整暇下榻自髙清茉莉花初放荔枝寔漸成少須知臭味歸詫里人評雨中柬青門層城晦風雨穹宇迷昏朝隂翳方驕恣市廛乍泬寥九衢横潦溢千樹隕芳飄勞想伊人阻真如隔水遥送青門二首惆悵温陵酒與君不再持髙情隨地勝孤跡閉門思落日人方逺芳郊意自遲從兹三徑社吾亦懶吟詩林下非無客新詞誰與吟一朝風袂解千里暮雲深猿鳥娛征路荒茅掩故林殷勤題贈句聊欲比兼金題徐氏溪亭四首高亭虚出水結構若天成波蕩垂簾影窻留過艣聲樹低看岸逺風細覺湖平自有芳洲杜含滋日日生浯水日悠悠虚亭壓水頭棹歌喧極浦峰翠漾中流每夜偏多月長天只似秋更添幽事併繫栁木蘭舟飛鳥㸃青天驚魚跳錦川簷欄相照暎空水共澄鮮草際分皋陸烟中辨舸船有亭佳如此真覺主人賢善占風物勝心巧更多奇軒楹翻别製溪壑發幽姿眺迥開窻小臨清累石危城中池館盛坐使廢招隨題張封君南圃池亭四首卜築初掄地謀懽不計錢嵌巖驅到石漲沼引來泉花氣長薰酒禽聲每度絃温陵風日好更向此中偏别業借恩光臺池草木香玳梁棲燕子錦石戲鴛鴦荷宻魚難聚花繁鳥易蔵如何堪比勝金谷在河陽人寰開徑逺平地覆山危薜荔縁青壁芙蓉冒緑池嵐烟縈几席波影蕩簾帷更有封君樂千頭橘樹知愛兹城郭内丘壑趣留人曲徑泉流遍孤峰雨洗新藂篁寧受暑衆卉自知春好客常開宴髙軒來往頻送滕生還吳滕乃葉郡推之客不辭為客久所戀主人賢郡閤同蔬食歸囊倒俸錢嶺猿催去馬江月照鳴舷自說慙干謁家原有薄田挽楊翁已傳不死訣竟返無何鄉邦人來赴哭隠者去云亡乍見堂帷設應無隣杵相煉精成鶴化千嵗一歸翔挽黄母三十未亡人能甘集蓼辛歸逢地下靣不媿嫁時身閣閉窺帷月梁餘㸃鏡塵桮棬諸子廢口澤自如新挽貞恵王母許氏罔極嗟令婦斯人獨可欽茹荼明苦節對月比貞心養有潜移水生無强委禽堪悲川逝底别劍復相尋挽陳子貞秀才二首子淵稱短命汝復弗如回庭對曽聞禮公車未召才芳蘭翻自爇玉樹易先摧堪悲垂白父老有鄧攸哀皇天聞與善之子命何艱種苖徒見秀覆簣不成山賦鵩棲門外書螢戀案間遥知為蝶樂夢去竟忘還哭蔡從祖秀才早嵗承家學新文冠士流河東未獻賦地下忽長遊慈父傷蘭樹佳人詠柏舟千金聞買駿縱死也應收挽周蹟山周以諫杖死四首萬事真長已孤生敢自私批鱗當逆處收肉在寒時複衣仍赭服正寢託丹墀片玉今埋矣無因諫用尸牽裾難動聽攀檻竟徂生信是百年速須知一死榮雨揮行路涕風慘挽夫聲莫作逝川嘆能留不泯名玉碎姿猶潔蘭摧性亦芳歸根辭雨露埋質罷珪璋車飾看如栁山形見若堂只愁餘憤瀝燕地暑飛霜降魄兹鄉返精魂何所依芻靈疑榜吏幽域訝圜扉白日終無照青春更不歸天心垂涕泣寒雨載途飛陸檢校歸櫬作此送之陸揚州人只說宦遊好寧知客死哀衣重官長襚木美邑氓材山迥銘旌遶天長細雨來揚州生樂處今作鶴飛迴挽侍御粘滌樓公介節如絃直貞心比柏葱觸邪冠掛早諫獵草焚空几篋無長物田廬有素風至今漢庭上猶說避花騘挽王僉事二首防江千里險露冕百城開恵澤洪流逺狂瀾勁節迴世情方忌直天道亦妨才湖雨紛紛送荆人挽些哀近日看流軰似君操行稀守官遭吏議久宦有兒饑處室無長物附身惟故衣生平違握手沒後涕偏揮楊蓮渠先生移居長貧易徙家蓬轉類生涯隣壁燈堪借市帘酒好賒捲簾攜舊月帶石走孤花奥室知難入非闗隔絳紗挽徐宜人桃葉宜之子瓠犀詠碩人已無蕡實在空有褧衣新寶鑑誰臨匣羅巾自掩塵夫賢兼子肖入地也含嚬送杜松江先生之岷州肅藩教授不識岷州逺千峰費馬蹄濫觴江水小分首隴山低雪含盤古始路盡坎方倪王門裾曳樂應忘在天西挽許三浦辛苦三冬足奄驚萬事非途窮山子蹶斗暗莫耶飛返魄兹鄉降游魂何處歸心悲廣陵散無復鼓瑤徽挽蔡司成夫人丁氏二首桃葉宜家日摽梅育子時問來貯雜佩佐學喻機絲扇掩月臨匣衣蔵風舉帷蘋蘩今罷采空復澗濵滋偕老願嗟違兹辰遂並歸劒從泉底合燈向地中輝山雨沾容翣江霞變闕衣如雲車馬從其奈昔時非送蔡東洛赴銓改官二首寒氣驚嘶馬離人起戒晨清霜沾勁草修坂滅流塵為吏儒衣舊謝官行李貧長安留滯處當路欲何因不躭數斗米髙意似淵眀來往都乘化榮枯豈吝情雨中孤棹去膝上一琴横舉世知音少希絃何用聲送朱肖簡分得寸銅印新從片玉科平生優禮樂此去定絃歌嶺驛出門逺江帆破浪過縣人流散處還集日將多送比部史應之使還入京史以使事便道過家長子娶婦而太夫人褒封之典亦適至二首榮宦值眀時光華併遂私勞王欣有暇醮子慶多儀使節驚隣里天書寵恃慈一心知報主還闕自難遲想見燕京路秋風隨馬歸朝端須奉復即位待光輝入省名應盛趨班影乍稀鄙夫何所慕之子振音徽送龍南岡之貴州兵備僉事二首欲識宦遊壯須知王土遐鬼方曽伐國人跡比趨家梯路通酋賮刀耕履籍畬朝駹開莋盛今日未須誇繡斧乘朱輪要荒識使臣火雲千箐日花瘴四時春蠻語譯難曉夷心義可馴簡刑兼静武坐使逺人淳送王堣齋守贑州二首兩水流成贑圖經記郡名分符君出守共理帝憂氓好古今當用酬知在此行佩牛應賣盡駈向甫田耕露冕何其貴安車朱兩轓凋殘方待牧命數豈徒尊偃草知風尚烹魚悟政煩君心已如此相别更何言寄贈陳侍御按嶺南二首繡斧下青㝠共瞻執法星照人懸藻鏡游刃發新鉶令㨗風行草威疑蟄震霆炎流千載地一旦洗氛腥百粤叅殊俗六條握漢綱驄行真到海猿叫亦驚霜吏有捐黄綬人皆識皂囊仍聞攬轡暇搦管擅詞塲夀陳西軒令尹百事不闗身一心専養神看書多得意中酒是全真隂徳覘眉采夀徵卜耳輪門前五楊栁長閱嵗華新聞家兄途中得疾二首平日親庭側未曽曉出門如何逺遊興不記垂堂言藥物應難得醫方孰可論秖將愁與愧送目望賢昆逺道傳安否難知消息真思深翻惹惑望極轉傷神訪市將求卜行途屢問人莫言憂畏甚手足是天親莆陽龔生名應龍號潜于神龍神不測勿用為時屯沕穆形難偶深潜徳可論知機猶户坯好遯是泥蟠問易將因爾又忘得象言遵巖集巻四

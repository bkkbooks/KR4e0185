body:
  text: 遵巖集巻八明王慎中撰記明倫堂記堯舜在上設五品之教振民於飽煖之餘而免於禽獸之患三代循是以建學為之立其官師作其宫室辯其時物勅其條法甚修而綦隆而孟軻氏獨知其指曰所以明人倫也民之不可使知雖堯舜猶病之而其聰明彊敏有材智者傑然特出於衆人其材之成足以踐三才之道其過也至於殄行而驚世智之至足以察萬物之理其蔽也則必為邪說以誣民先王取而命之曰士而教之於學其所為教有可得言者矣縞收端冔鞞紳綦偪之飾而裼襲委垂之宜琮璜琚瑀齊夏和鸞之節而步趨周折之度豆籩簠簋鐘鼓管絃為之器而酬酢搏拊以為容典謨雅頌射御書數為之文而詠歌講誦以為業耳目足以極視備聴口與手足足以放言恣動然所以禁防而開發之者其為事詳而為物博如此至其所以為是詳且博者其跡可守而其妙不可為其形可名而其精不可言其通於天謂之命出乎命謂之性凝神於不見不聞之表黙化於無聲無臭之中形器俱泯而思為無所日改月新而不自知其所以然其於所謂父子君臣長幼夫婦朋友者顧若疎濶而不治簡畧而無當盖孔子教於洙泗之濵述聖道以善其人待来者所可聞者文章所雅言者詩書執禮所不可語人而以待中人以上者彬彬見於魯論所載顔曽冉閔之所答問曽不少及乎君臣父子長幼夫婦朋友之間而以孝為問者游夏二人而已先王所以造士孔子所以誨人其可言者如此烏在其為明倫耶是不可以不知也習其教而不知其所以教由是㑹其髙者以為發揮於性命而不悟其為人倫之本先王之道使其髙也而出於人倫是乃所以為異端而非所以為性命也守其卑者以為該貫乎事物而不察其為人倫之用先王之道使其卑也而外於人倫是乃所以為曲藝而非所以為事物也徳之不一俗之不同豈獨學者失其體用哉以子貢之賢當其未悟猶思托於事君事親以求息焉而少休乎為道為學之倦彼不知其所學者所以學為君臣父子夫婦長幼也大學之道極於齊家治國平天下而家國天下固非蠻貊之邦鳥獸之羣也必有人焉居其間非謂之君臣則謂之父子非謂之夫婦則謂之長幼朋友也人有心知志意之精主乎内有耳目手足之動行乎外非之於君臣則之於父子非之於夫婦則之於長幼朋友者也先王之教使之凝神黙化致其心知志意以善其内又為之設其文采備其容器制其度數使有以禁防開發謹其耳目手足以善其外其通於性命者行乎事物其由於事物者合乎性命其學於事物性命者貫乎人倫故其於家則父子親長幼序夫婦别其於國與天下則君臣義朋友信故無一命之爵無尺土之階而人物之性以盡齊家治國平天下之事畢得詖行邪說無由而作民生其時無復震驚誣惑之憂其於君臣父子長幼夫婦朋友雖有所不知而坦然由之是民之所以親也親而不能明民之所以為下也明之而使民親焉士之所以為上也泉之有學國家所建教學之法則命於天子其来非一日矣士之聰明彊敏能自致材智以見於世者往往由之以出而未有能得其所以教者郡侯俞公為政好以徳教撫循其民養其長老而訓其子弟惓惓於徳之不一俗之不同以為是有責乎為士者又不鄙之為不足與進且知其民之已信而可用也乃與僚属咨議叶謀撤明倫堂之舊而新之以與士者講習於斯堂而委記於余余謂古者立教其具誠設然所使長治之者皆賢卿大夫以其素講之學成徳之行倡導而鼓舞之其於化民成材尤易以侯之賢專有長治之任而斯堂之作及其政成民信之日士之興起發憤於斯時者宜益衆咸思捨舊棄故以聴侯之所為雖今之去古逺矣所以禁防開發之者其具難以一二追古而心知志意之精未有求於内而不得也得於内未有不得於外也學之則為士不學則為民上下之分可不勉歟興造之嵗月則始於壬寅七月己巳訖於十二月庚寅金取於幣之羨者其役鉅體大而費不及民工不踰時亦可書也侯名咨伯平湖人由工部郎中出為今官云夏津縣修學記夏津於山東為小邑賦入單儉疆理褊迫詩書禮樂之教缺然不興士無以成其聰明碩大之材然俗固專慤不雜重生而慎刑吾師易愧虚先生之令於是邑也力行節儉躬率以徳為之朞年民既觸其專慤之良相與馴習而恱安乃始謀所以昌明詩書禮樂之教顧惟國家造士之典邑立之學教之所出莫先乎是而學宫傾毁廟宇敝漶不足以居游息起瞻慕慨然有意於作新之事邑固儉迫難以驟役而大費經度盈縮議不煩於衆慮不動於民捐廩斥羨鳩工庀材舉之以次第遲之以嵗月明倫之堂先師之廟煥然改飭翼廟之廡側堂之齋環之為垣樹之為門與夫庖廩庫廐莫不畢治祭祀宴射之器稍以完善作啟聖祠以應新令拓立學舎若干間以待士之来止而修業者盖始於戊戌訖於己亥凡再閱嵗先生於夏津之士民教之欲以成其材愛之不欲傷其力故其籌之如此之勤而就之如此之徐也初余視山東學政先生告余以其本意比余再徙官来河南而先生始以書来述其所以而属余為記之余考在昔人材之盛俗化之隆莫如成周之世周之所以教人之法何其詳也自鄉射飲酒養老合樂以至勞農訊獄飲至獻馘之事無不在於學其術則順四時而使之絃歌蹈舞讀誦辯說習其筋骨於節度之中一其耳目於聲容之間開之盡其物而充之有以達其材防之多其途而養之有以全其性士之行修徳成而可以為世用非獨其質亦先王之所以教之有其具也今之立學其亦有先王之法也哉惟讀誦之存耳而使之作為文詞以徇程式而求合有司之尺寸則其所存者亦非矣宜乎古之君子有感於古今成材之難易也盖余聞之先王之道其立之也㣲其行之也著㣲者立於不可知之表嘗託於著者以行而著者所以行其所以立故雖煩且密而皆有以達人之材盡人之性惟其㣲故無得而加損而著者可以化裁而變革隆汚常因乎時之所宜寛猛常適乎人之所安先王之為此凡以禁過禦淫去昏撤蔽使人自得其心是以由其法者誦說諷詠則煥然博其理義之趣撃戛拊奏升降俯仰莫不油然長其莊敬歡愛之情盖其不慮之知無體之中無聲之和有以自得而然也及教之衰漸以放失學者昩其所立而惟著之習論說之詳聲容之盛益足以適性而叛道其守之愈嚴治之愈精乃所以為陷深而去逺老耼莊周之徒乃始以聖智禮樂為疵藝淫技澶漫摘僻以擢亂聰明滑性命攖人心之具如畢罝罾笱之足以亂鳥獸魚鱉於山澤然者其懲之雖過而學者之失性離道宜無所逃於彼之誚也方舜在深山之中鹿豕之與遊木石之與居豈有鐘鼓管籥玉帛俎豆之器簡册篇詠之文哉然舜用其與野人同者以為聖而莊周之所笑皆游夏之徒學於夫子而一再傳者也夫羣於鹿豕而不異野人者不失其為舜而誦法孔子被服周公之文者乃不免為莊氏之所笑學者亦可以反其本矣盖孔子戒小子以學詩可以興觀而羣且怨其實以之事父事君彼其諷詠而誦說者皆吾之性情也禮樂之實孟子嘗言之矣曰以節文而樂夫孝弟而已是所謂本而不可得損益者也嗟乎今之學者以為上之所以教我者非有先王之法也退而同於鄉人固已卑矣其有志者必欲反古之道謂不如是不足以為先王之法法未可復而身終於無成亦可謂蔽而不達矣故余於其請文而為之說使夏津之士姑後其所習先立其本以自得其心本之既立則其著者固可以化裁而變革且先王之法自是或因以可復焉無為自貶以同於鄉人空言而妄意乎古也龍溪縣修學記龍溪縣有學舊矣士日遊於其中忽覩其瓦墁磩甓題榮楶桷之堅好華絢化去腐缺黮䵝之陋如寔始作一旦躍然以喜益起其游歌講習之志者揭陽林君松為縣之時嘉靖二十六年也君以寛簡為治其本以不擾其出之於政不為緩弛而無制故其意能諭於民而亦不敢慢其令役之於可勞不待疾聲變色而趨之者敏士有其樂而厲已之毁不作於民於是士民相與謀而来乞記將以載林君之美於無窮余既不得辭則為誦所聞以告焉盖余聞之有生人之道而無司徒之教則衣煖食足而乃所以陷之於為禽獸故立之典常而設之以君臣父子夫婦兄弟朋友之名名者實之所居而義之所従出也故為之親義序别信之教使得其所以為君臣父子夫婦兄弟朋友者而器物度數容節之用於有事其變無窮而皆其所不可廢則為之制其器具其物差其度數飾其容節使有以應無窮而待夫人之有事其詳至於難勝而約其目於藝有六而已民生於其時自心之所知以及耳目之所覩聞無越此者童幼而習之至於長身沒齒而不得變焉其居處之所常則或於肆於市於畎畆之中其業之所治則或執規矩以利器用通貨賄以遷有無力稼穯以生榖粟能否不以相易各守其長而安其所處彼已無以相羨愧仡仡焉竭其壯老之力以由於司徒之教而不知其所以為之此舜之所以命契也然此所以為教其倫在乎君臣父子夫婦兄弟朋友其藝在於禮樂射御書數而其所以然盖有可知者而非民之所及也於是有胄子之教焉而以命䕫此所謂士而貴於民其居處必在於閒燕其業必在乎期命辯說絃歌蹈舞而其所尚在於能知其所以然也由之者雖不通於性命而不足貴而踐習服行之篤常可以寡過知之者之可貴矣少有蔽偏之弊雜於其間必至於拂經賊徳過焉而不止而徒以繆騖夫由之者之民故詖遁反側惑世誣民之害常出於士而殄行驚師之戒尤為當時之所謹患其蔽陷離逃之情之不可以驟察而遽得而明其是非之端於侯其端既明撻焉以示其儆書焉以俟其悔至其儆之而不威俟之而不變則従之以戮辱徙迸之刑盖古者於士其待之之重而教之之難又如此夫已别於執䂓矩通有無力稼穡者之所業而居處常在於閒燕矣豈有暴㐫昏黷以厪聖人之誡而煩王者之刑而其聰明才智之過出於蔽偏之弊則得罪於聖人而不免於誅如彼其嚴盖道徳之所在必出於同而學之不可以苟也由唐虞以至於周其間雖更弛壊而其道未嘗不同及周之隆而其教益明矣其見於周官司徒之所肄者曰徳曰行曰藝皆有六焉行與藝者之六盖民之所同由而徳之列於一則士者之所獨能也嗟乎由其所當為而有所不能則謂之民而不足貴而名之曰凡有能其所能矣少出於蔽偏則足以獲罪而無所辭誅卒不得謂之民而指之曰頑惟盡其同由而超然得其所獨能者而後可謂之士今之游於學博其衣裾冠峩綦斐于于然挾册而讀誦鼓瑟琴而吟謌盖古之所謂士也既已侈然自貴於利器用遷貨賄生榖粟者之民而無所愧矣其尚因余之所聞思焉而有寤求其所以為士者無辱古之所名而有以興乎今之民也由是以載林君之美於後豈有窮哉長汀縣學記學之立否果有繫於人才之成壊乎哉五臣十人而下人才之美莫春秋時為多然鄭在王畿之内學校廢弛詩人傷焉子衿之篇顯著於風子産為政輿人頌之以為能教其子弟者而毁鄉校之說獨出於其時雖其不毁姑以使好義者往游焉而非有興起教養之誼也魯最為禮義之國泮宫之作猶待於僖公其濶絶而寥簡甚矣齊晉秦楚之間又可知也周之天子未嘗以貢士中否用慶讓之典於諸侯王臣行過侯國以臺池苑囿之崇陂梁道路之茀占國之不治不聞以學校不立為議而原氏之卿士至以不恱學語於朝其上下之間怠於學校之事如此士之生於其世顧多碩大光明之才大足以用其國其次亦足以従政其臨利害死生之際而節足以有明處進退去就之㡬而智足以自決者尤不為少也西漢立太學設博士詔郡國舉孝亷而増廣學官弟子諸儒經明者得以列學官而雅樂亦盡出獻之三雍有大政事賢良文學與公卿大夫雜議彬彬之盛庶㡬乎金口而木舌矣由建武以及本初之元尤留意於斯拓立學舎益置弟子員視西漢有加焉然兩漢之士皆尚通而易渝好異而多蔽故倖得苟免之行成而不槩於名法詭訐矯拂之習勝而不致於實用而其㣲辭顯義誦習而闡發者亦未有及春秋之世能言者之一二也學之立否信於人才之成壊未有繋也歟嗚呼果其人才之成壊無所與於學之立否則吾將以先王之制為繆且愚而先王者古之聖人也先王將以道徳一天下之民而其秀而可使知者為可以用其教此士之所以貴而學之所以立也道徳之在於教者其講肄有業其辯說有數其蹈舞有節其視聴有物其導之勤則春夏秋冬有其術而旦晝向晦皆必有所為其視之詳則一年二年有其等至於九年之久猶懼其將反也其勤且詳如此非直以善其口耳之所涉安其手足之所措而已使其精於思而不惑純於氣而不亂故其知之明則通乎天地萬物之奥而無所不盡其才之充則適乎天下國家之用而無所不得其教之成至於化俗學之行至於動衆則賡緝周浹範圍鼓舞民莫知其所以然而皆一於道徳及其既衰遺俗緒訓猶足以覺寤乎有聞者之聰明感奮乎好善者之踐修盖其學廢而教猶有存也春秋之世所以成材之多其不以此與而彼兩漢之士不得預被先王之教徒以建學立師之廣而亦有以美其才其所就誠愧於春秋而後世莫過焉使春秋與兩漢之士生於先王之隆其學大備而教素明則彼所謂碩大光明者當與十人同科而亦豈有尚通而不槩於法好異而不致於用之過乎春秋之士由學之隆雖其衰且廢猶得以有聞而好修兩漢之士雖所以教者非古特以有學而其才可名於後世學之果不可以已也去古已逺而為吏者知急興學之為務信乎有志於人才而亦可謂知所以求成之者矣汀州知府汪君俅長汀知縣祝君一鑑是已長汀故有學而痺迫弗稱孔子廟亦就圮諸生来學每病其不足以時居游而聳瞻嚮羣聚而謀之久矣吏忽不省汪君以鉅才為褊郡力益有餘而吾同年友李君遂方以福建左參政行部汀州郡以謀告而意克叶因視其學地曰是其方位據向不為良也盍革而圗諸乃攻位於其地之右畚壤測臬而望之經體面勢言言噲噲不大變徙而得位之良如遷卜焉乃作文廟乃作明倫堂而祠齋廨舎庖庫廩廐咸以序為盖其據向良而規制壯矣祝君後至尤知原本大吏之意而奉其所營於是斵刻丹艧之飾煥然完富而新學之美甲於郡中士皆歡喜道說相攜而至以得學其中為樂汪君不拘其功而歸善於李君以為非其叶意而決謀則無以卒是役也而又因李居以来請記夫去古益逺之後有能因當時之法揆先生之意興學以造士如諸君之所為者長汀之士其所遭既已有過於春秋而不後兩漢矣諸士宜其来學而樂也然去古益逺先王之教益㣲將何所景仰而興於學耶先王之所教者道徳而已其具在乎講肄辯說之業蹈舞視聴之物而其本在乎精於思而純於氣此豈以逺而不傳者哉兩漢之士不能盡心乎此而使世之論者將疑乎學之無繫於成才之數此士之罪也故余為記以告之嗟乎長汀之士其尚盡心焉務使論者無以咎士而將有以明有司之功也其亦汪君来請之意也歟松溪縣改建儒學記嘉靖二十四年某月松溪縣學災其時青陽柯公喬遷之方以布政司參議分守建寧行部至郡縣以災告馳往視之度閒燕之地以居士使無失業士忘其災乃謀作治之事視其基痺陋而偪於城闉盖始徙不審士游於陋數十年而不得復因舎今所燬而舊是圗闢侵覈冒故基以得稍市四旁衍地以廣之而作治之基審始為㑹財所出徴發調集具有條理有司䝉成而已盖公好學聞道論為世師其見於政事宜與俗吏不同如此既㑹其本末以授知府錢侯嶫侯之在郡亷簡温仁其信於民也久又有所授以従事民亦不戒而来作治未㡬而學成矣柯公以書至清源山中属某為記余辭不能久之而分巡建寧僉事翁公學淵以幣来速文余益不敢當其後柯公由㕘議為副使巡海行部漳州余得質以所聞然後敢以其所質者為記盖嘉靖二十八年七月也錢侯既遷謝侯上箴来代能俢錢侯之美㕘議仁和吴公源僉事江寧張公恕並以直清寛大布宣化理尤加意於學校而以璽書督學於閩者應城周公珫也周公才學名一時條教科指有以作人松溪之士益勉所聞以稱諸大夫嘉育之盛而某之記適成記曰先王設為學校聚天下之士教於其中將以使之自覺内得於心以成其性而有以為天下國家而其教必謹於形器悉於名數自其耳目手足之所感以為視聴言動之用皆必有不可亂之節與不可易之物非其物則有禁而不得其節不苟然以徇也守之之嚴防之之密如郊闗市門之譏非常殆又甚焉一嵗之中冬夏以習禮樂春秋以治詩書無有須臾之頃閒焉以嬉耳目手足之用將舎是而為他而有所不暇所為能得於心髙㣲深眇耳目不可得而遇手足不可得而致者未嘗及焉彼存其耳目而其所不可遇者固已察矣約其手足而其所不可致者固已著矣其察其著出於服習而勤修故能深思而獨得之其得之也難則其修之也益固可以持久而不勌如是而處詖邪恠譎之時接乎姦亂之聲色淫慝之禮樂固可以不變况於其防守之嚴且密哉其教足以成人之材已成之材又足以為教姦亂淫慝之術不得出於其間一有出焉則其材之既成有以燭知其害攻距之不去不已而所設之教又得與夫所成之材交存而不喪旁皇周浹至於廣逺則荒陋遐阻四達而無所不被漸馴庚續至於悠久則厯世改物而流風遺俗可以詠思興起於不泯盖三代之治之極而學之成如此由周之衰先王教人之法相属而盡壊人之耳目手足之用自為其物而貿然莫之為節苟簡殘缺之餘猥以自恕於卑陋而便其縦弛易肆之私而才辯彊力之出於衆者始有不安之心以其物之無所遵其節之無所倣徒以妄意於髙深㣲眇以為可得而遇且致也竒哤詼詭日作於形器紛然以驁瞀當世之民如是者皆見為才而足以易於天下振矜其所不可得遇者而形之於耳目未嘗有察也道說其所不可得致者而措之於手足未嘗有著也其卒歸於卑陋而適所以為縦弛自便而已盖孔子興於洙泗與三千之徒共學其教必以文行忠信其雅言必以詩書執禮其自為學則繙十二經而不以為多三絶韋編而不以為勤聞學於他國問禮問官於人射御之卑執焉而不辭獨立而訓其子其學必在於詩禮語上而為顔子言其目必在於非禮之勿以視聴言動而其所自言則曰下學而上達此先王立學之方而教人之意也由今之道而為學誠不能一二以合先王之法既皆曉然知尊孔氏而誦其所傳則於形器名數固不能無今昔先後之差而視聴言動之用於所感出之必有其物動之必有其節閱千百載而若旦暮其曰下學云者攷於其書而可知也是將不越夫耳目手足之間而有以得其不可遇不可致者惟在夫慎守而篤行之而已可不勉哉晉江縣題名記晉江縣舊無題名而有題名者始於嘉靖二十一年邑令貴溪汪侯宗之之所為也始侯至縣属長吏久曠之餘務弛蠧棼叢沓委頓嵗又大饑侯補助收救抉剔湔滌治功滋起民用大和乃以其間申命衆史蒐獵牘書考前為令者二十九人得其名氏官里伐石鑱之立諸治堂之左以待来者而以記属余其言曰自吾為此常憂邑之繁鉅而懼其不敏問地於啚而田之以頃計者五千問民於版而男女之以萬數者餘三十問士於學於塾而弟子之以業名藝占者至數千可謂地大人衆而禮樂物軌誅罰勸賞禁戒教令行於其間則令之施為非惟民所由利害也當世之治亦將有考焉吾之為此非謂其力之足以獨決而專濟盖欲考前人之為取其効見於事愛在於民者以自勉以與人同好而共其利也故知其人則欲求其事以見其良法善政之所存得其事尤欲講其人以追其流風餘思於不泯故雖當官曠嵗儉之際勤於有事而獨不敢緩乎此且使好古之士為今之吏用今之民欲以得志於治非變禮易樂擅刑出賞宜難以得志於治又勢之所不得行也藉令處得行之勢非漸之以馴久遲之以嵗祀猶不可冀於成今制官以九嵗為任而此二十九人者在任之間或陟或罷輒以舎去無有滿制而任者其變易之數如此雖有聰明彊固之材亦且因時便事營民所急以就當身之功孰能操意悉力措無窮之慮以俟難必之時哉有誠心如古之人則遵法於今而嫓効於古亦何所不可龔黄朱召漢所稱循吏其為政刑賞禮樂豈必盡合乎古正使古之為吏亦何以加焉在職之久近非可以自斷要以盡吾誠心而止苟其一日之在而不敢以不盡此吾之志也夫樂前人之善而思與民同之又不稱其不善者其意良美所自為志乃援今以合古尤非俗吏所及是可書也昔漢髙恵文景繼體遵業循吏之盛始見於孝宣中興之世桐鄉零陵成都膠東皆吴蜀萊楚逺絶之域循吏乃在其境今上嘉恵元元敬申吏治方有意於勵精之功而晉江僻在粤徼後之傳循吏者宜有取於侯於其時事甚相類然傳於文翁佚其字王成佚其州邑而此石之存侯之傳其可以無佚矣余既述侯之言而復論之如此使来者得考焉衢州守李克齋先生生祠記豐城李君邦良予友也予始得友君時皆蚤年盛氣藻飾以文華馳驟以材力髙覽一世趯舉雄步翹然有自喜之心而際昌熙之㑹事神聖之主先後為禮樂之司頗涉清華方其得陪經綸之宏議佐制作之鉅猷志厲當塗而情睎翊聖顧謂州郡之役勤於民者卑勞於事者細目之鄙俗不足為也已而並以職事失大臣意得罪出為外郡之貳予猶偃蹇桀倨不知省循以圗改悔時或有所見於事而加於民則乖忤背馳而不適其可而李君獨能韜函芒穎磨砥圭角俯習民功以起士譽予已善君觀其所進而慨然以悟非徒貶損知過為奉譴以承嘉恵者之宜而其勤勞於卑細而能不厭者乃所以篤純固而基髙大也其後稍遷予督學山東而君為衢州守學憲於外職為近於清華不得効其力於卑細以攷其進而證其所悟君既守郡則於民益專而於事益詳矣君為之益不厭悉其意以厚於民諄諄然如拊摩乎其子瘽其身以周於事皇皇然如經營於其家而郡於其時又有不測之大警間值之異災以嘗試君之閎畧偉畫而開發震動其所為君應猝如宿慮度遥如嘗厯卒使水不為害而盜皆就執至其建學命師以率先教化嘉育士類改創而不徒沿習鼓倡而非僅因守文華之美才力之雄施於民與事雖其卑且細而昭新𢎞達超然不羣其所藻飾者乃道徳之精英而非文華之末伎馳驟者乃事業之軌蹟而非才力之小長矣君為郡滿考予以㕘知汴省行過治所見君意殊得迎謂予曰子雖不辱為郡免折腰之恥然循吏傳當無子名矣君言如此良自負也已而君擢副使以去郡之長老某等相率建祠於城北以永所思豐棟飛甍崇廣麗密巍然肖守之貌尊祀其中後七年程侯習齋来為予泉州衢人属程侯以祠記委予予觀史傳所載如枚臯東方朔司馬相如吾丘夀王終軍之流依近左右游談芬芳掞摛黼藻寵飾甚盛而文翁朱邑龔遂召信臣杜詩諸吏為民勞苦不怠除疾去煩興便開利跡麄務瑣以今觀之彼光榮飄浮彌文靡汰無足稱述而循良之績惇慤悠裕談之有足論而思之可以興髙下得失較著君向得罪而後復屈為郡誠不為不遇予雖不獲効其力於卑細然已有悟其記君祠庶謂知者君與予所共敬而友者有武進唐君順之唐君為翰林最號清華顧嘗好言民事在職時每欲乞一郡自試其才以見志而不克遂予旦夕謀訪唐君家居倘相攜過太末之里求君之祠而謁焉覩所謂豐棟飛甍而君生像巍然其中既以自慚且誇詫唐君以為君明其得意君名遂邦良其字以祠部郎中謫為湖州郡丞遷守衢州於予為同年進士故太常博士鄭君贈典制詞記皇帝嘉靖十有二年三月某甲子太常博士臣鄭一鸞滿其官之考三年以其績上吏部考功吏部覈具博士官績以聞皇帝若曰惟余欽于天地宗廟百神之祀太常實典其儀章品物厥著勞效宜有推䘏以示褒勸事下吏部司封吏部按令甲所著循令以請於是博士之父某宜贈太常博士母蔡氏宜贈孺人報曰可中書其撰制詞代余言垂寵錫焉詞未上而博士以疾卒於官中書不敢廢其事上所撰制詞尚符璽奉寳以行詞下其詞仍録副以授故鄭博士一鸞家人家人受詞告第存其副以待墓焚而博士之弟臣一鳳以材舉於鄉當計偕入京師未及焚副也比罷南官薦歸一鳳奉詞及副悲感雪泣曰惟先臣某含真蹈義抱徳弗顯以有臣兄惟臣兄一鸞率志飭躬底懋厥職揚于王庭以知有臣父明主不卑小臣録勞閔孝原本所自褒及幽逺不遺死臣用終恩命奉行之吏罔敢怠廢畀兹制詞如臣一鳳賤貧自惰不卒厥事以斁斯禮是無以光昭君賜隠兄之志而沒先人之徳也乃以二十三年八月某甲子焚其副墓上室中之主敬易新題具如儀式而臣某與覩其事一鳳懼速湮沒後人不聞再拜請曰願有述也庶詔後人使知所繇以教不忘臣不肖嘗待罪禮部祠曹掌𨽻太常知其牲醴幣玉罇鉶簠簋鐘鼓翟籥之器數凡郊廟之祀當與侍儀御史察其如禮與否常得降陟壇壝出入奥阼以觀大事備窺皇帝一徳欽明於穆維禎知祭為有益而不敢忽之意盖嘗患文吏有家室畜妻子恐不蠲潔非所以佐禋祓而賛昭格盡易置太常卿貳而以道士為之而其儀章品物有難知之義道士不能具曉故兩博士仍置文吏博士於卿貳為属道士慚不能曉其義每害其能而博士之職其難盖十倍於他日一鸞嘗為其長所中下獄㡬不免賴聖明察其無罪而有勞復其官因得滿其官之考以有兹褒典盖大小臣工有服在朝滿其官之考者於令甲皆能以資秩所宜得推及父母若常制然不為異恩而為太常博士於今日者能滿其考無罪而有功實難於他官鄭氏之後人倘有考於此蹈戴鼓舞皇帝之賜宜永永無極而博士臣一鸞効職之勤益以明白矣臣某故備而論之以授一鳳俾藏於家五美名家記予與今方伯龍雲東先生同官中州職事之外有問學之講義相好也雲東一日揖謂予曰龍氏之得姓於茶陵也舊矣茶陵言故家右門無不同聲以五世推龍氏者以不肖之䝉燾受遺馴有今日不肖遂因中丞西陂劉公總括名堂之意揭扁於中所以光昭祖考之令徳而訓示子孫於無窮也願得一言記之於以發揚既往詔告来兹甚大恵也予因請於雲東氏而得所謂五者之詳盖先生之父鑑齋公不惜百金之産割賀石之塘以息族人累世之訟至先生之身尤緝鑑齋公之意資贍孔懐賙恤同族俱播諸鄉評其遷葬師穸惠及厥子尤昭昭在人耳目冢嗣越亦克遵先矩讓地不垣先生之祖父母父母以及諸兄皆差池上夀齒髪堅好耳目聰明無不踰八十而後終其存之日以耆徳為鄉人所賔州長邑子以射禮饗老於學官則先生之祖父諸兄尊於賔席者嵗不乏人焉茶陵潭之巨郡也自先正李文正公而後郡之衣冠歸龍氏盖先世之族子誥與従子欽皆世登名於天府先生政成績懋聲聞上逮爰獲三世之褒司封撰事内史摛詞爛然寵章賁在泉壤誠人臣之極榮士者之至願而為子顯揚之孝於是乎備雲東乃因鄉人之稱曰世恩世夀世賔世科世義以名堂而西陂劉公遂總括曰五美名家此予之所聞於雲東者如此也故少師李文正公今宗伯張陽峯公司成鄒東郭公於龍氏皆有論述多為世義而作乃五者之一今斯堂之名聚先世之全美其體尤重豈鄙賤無能之文宜㕘其間且使僭出羣公總記其事尤非所當顧以従游相好之義思得託姓名於屋壁之門使龍氏之後人知予於雲東有問學之講也故不讓而記之夫天生人而與之以秉彛之性收族敘倫所以重本而和親也稱於人人厥號甚美孰不欣赴樂為者不勝其欲利之心是以雖勇發而苟沮如龍氏之先捐厚産如脫躧以成好義之實可以為美矣至於年夀之髙賔饗之榮登巍科而貤封寵是四者或係於天或係於人有難必得然非有嗇生觀養之宜飭躬踐行之修則不可以得夀亦不足尊於州里而為人之所賔為士者非有殖學懿文之能守官靖位之節鮮不淪胥庸伍而身終不齒於一命亦何以徼寵靈於天子之褒而窺史氏抽筆代言之華哉是則鄉之人雖若以四者衡置於世義之間而為五乃所以明夫雲東先生之修於己者足以致之非可以回邪奸之於天徼倖取之於人也是豈不可為美乎吾見名堂之後茶陵之尊宿稚倪登斯堂而閱其稱名之實莫不知龍氏先世累世積庸以備受天人之福非徒以喬木在門為望於一州已也龍氏之子孫族姓聚衆於斯汛掃瞻拜考習先人之美興其遹志嗣事之孝紹述不勌知天之不可以回千人之不可以倖冀其修於己者惟世徳之不違則一名堂之間所以光昭祖考訓示孫子之意豈不重哉豈不逺哉雲東先生信古好學持身奉職具有本末而承家遺後之謀又如此皆非世俗聲利之士所及予愛之慕之而不避其言之長也聚樂堂記世之所謂樂者可知矣粉白黛緑雜進迭侍衿襦璫珮交於几席觴俎之間而不知夜之將旦則恱色者之所樂而夸者訾其内極意六博叫梟呼盧揶手交臂之頃車馬乗徒離合於一枰之上百萬為擲曾不足以盈其一睨則博奕者之所樂而豪者嫉其辟擊槊試劍砉然雷奮渢然風靡始陽卒隂術殫於角而勇力泰至乎多變其樂進於技而以豪自喜不虚也有嗜圗畫鑒古玩物者過而哂之曰是何麄猛而近鬭也則發秘塚壊壁之藏旁搜而善購一珍一異聚徒縦觀以炫博而長價自以其樂在乎藝與能也又有譏其側者風騷自命之士矜才於形容盡態於藻繢此唱彼和騁竒競巧當其元本之㝠思模寫之妍狀可以廢食寢而忘昏旭彼鑒古者之所好蹴然退舎而知其不足稱矣儒者猶且非之則樂之所至豈有涯哉西亭君築室以居業貯書數千巻百家衆技稗諧小說佛老異曲莫不畢具其要在於六藝詩書之文晝誦夜諷矻矻焉竭其心思之所極恍焉而前疑窒焉而中悱意挫形頓而不敢休客非有事於斯文者不得闖其戸非但歌舞博塞技撃之以内辟麄猛見誚者無所干於斯室而玩物好事之間適與夫絺繪章句才人一技之工且以為壯夫所悔而不足為也當其覃精於一息之近而妙契乎千載之逺若古人之在而與之為酬酢客之以斯文至者攷證辯說窮浩蕩之倪而析抄忽之端自以為舉世之可樂者莫斯若也名其堂曰聚樂以書至清源山中乞記夫生於宗室貴富之家則醟於歌舞放於博塞技撃而不患乎内辟麄猛之誚以其居養所致然也有能鑒古自適琢句為工則可以自抜倫輩而為學士大夫之所道君所為樂乃在此而不在彼至樂之涯其果不出於斯堂之所求與嗟乎是書也吾見夫讀之者之多端而所以致其樂者不一也得之者以繕性而失之者以溺心悟之者以反本而徇之者以滅質方其悅於博而耽於文則心愈溺質愈滅而愈足以為樂吾又安知是書之不為聲色之娱博塞技擊之靡而何以賢夫鑒古琢句者之所好耶君誠以吾說而自究焉則今日之讀固向者之書也今日之樂有非向者之所樂矣客之来者有逌然而忘其所知亦有矍然而惑於所見者矣然後謂之能窮至樂之涯而不復為過者之所譏如是則請西亭君終日讀書於斯堂而勿輟南安縣重修秩祀壇廟記南安唐侯為政之期年補助興發既有以佐民之急使樂其生然後教之以相親睦收恤之義服習戒令蚤避而鮮犯邑以靜治乃始用其力於所可勞而社稷山川城隍之祀以次修舉棲主之壇安像之廟繚壇之壝翼廟之室木堅石密崇碩麗壯與夫齋舎庖匽各得其所如新作然而器服之有事於祀者攷之法式無有不備其財之所出則民相勸以多寡期以集事而止數入不待㑹而足各執其役以赴所事嚴侯之命如嚴於神訖事之集侯未嘗少見聲色既成相與鼓舞謌詠以樂之莫有以為病己者方未事之初侯以朔望之謁春秋之祠有事壇廟肅恭蠲潔介神之聴顧其傾壊剥蝕盖慨然有意矣益究度其所以勤於民者至於期年而後知其時之可也兹役之舉果以不勞而成侯復有事於神牲肥酒清苾芬通徹登降奠獻始卒有容肅潔之誠有加於初神益顧享靈貺昭答民来瞻視歎慕恱喜祥氣休鬯疵癘不作侯懼後之廢其事而卒無以相民也乃来請記夫祭之為義深且逺矣其最著而易知者以為民而已有水旱之過則社稷可得而變順成之年蜡始通焉此其易知較然者也民之所求乎上不越憂樂欲惡之端而憂樂欲惡生於安危得失之際先王圗民之所以安為之聚其所必得其始必在於居與食彼有欲惡之情起於㣲則祝慕驩嚮以迓其来嘻嗟咈蹙以送其去亦理之必然者也而彼不可使明者民也故立之祭焉使其望之於不能知之表而常冀之於可有獲之間而祝慕驩嚮嘻嗟咈蹙之情有所寄而無淫越壅閼之患此其明之之術而所謂鼓之舞之之教也天子以命諸侯諸侯以自建其國未有廢此者然君之所以致力於民則有政矣取予斂散勸董誅賞所以與民従事皆殽於社竅於山川以為降其施設出於仁義之盡而感通動於精誠之極玉帛之沈燎血毛之割瘞猶其文之所為享而非義之所存也至於風霆霜露迭出而有節暘雨寒燠之行不失其時以相民出作入息寒衣饑食之求無弗得所樂而不逢其殃則以為神之所為而不知其政之出於仁義有以導播嘉和攘却乖㐫其始殽之而降者終執其權以助其能彼不可明者徒以為神之所為也民之所以與神交有祈有報以奉嵗事之常滿其祝慕驩嚮之所欲而雩禜禳禬之禮雖設其名具其儀以待將以宣其嘻嗟咈蹙之情為之求去其所惡而卒無所用之是政之所為貴上之所以得尊於民而君子之所以藏身者也昔之學於孔子之門者盖講之矣曰有民人焉有社稷焉他日復以事鬼神為問嗟夫是猶未免貳於幽明舎其所以治人而謂有可事之鬼神則所事者將在乎玉帛血毛之物齋沐薦徹之節而取予斂散勸董誅賞之施於民以為有司之法而已果其如此則所以治人而辯且嚴盖府史之能其齋祓祇敬之接於神明何以異乎祝巫之所執盖其義失而教存則賢者不免於惑而况於禮樂廢缺其數既失之後吏不學道而有土與民是以卒無善治而民亦不可得而使而唐侯獨能奮於今日其出於政者未嘗不貫乎禮而著於祀者未嘗不通於事侯其學道者與故予樂為之記且使繼侯而来者有寤而不感勤民而不為府史之政敬鬼神而不為祝巫之禮而民之永有相也其亦侯之意也與安平鎮新建四門記晉江所治之鄉惟安平為最鉅宋所置石井鎮而設塲以𣙜是其地也阻山襟海民既以是蕃其生而亦多盜患其生既蕃益柔碩膚靡無扞禦格鬭之固盜至則相攜以逃而已嘉靖乙巳秋值餘姚宋仲石公来尹兹邑好問民之所苦而安平之民以是告曰惟即鄉之隘處扼而為門則盜至不得突民有固心而知所以備守矣侯履其鄉度宜為門者四擇民之良使相與勸分庀役而四門成矣門成又為民畫所以聨保伍科丁壯訓材勇而除戎器以待盜至自是民知盜之不至也樂其利之逺而生之可以無患相與言曰受其賜而忘其報吾其為艮民耶乃即民之秀者邑諸生某輩謀曰其將何以報侯哉惟得能言之君子論其意以美之其㡬乎且因以紀實示逺而詔弗壊君子宜以為可於是諸生来請文某敬諾而為之記曰古稱興事就功好一切有為於世如術數名法之學其說深峭踔厲有絶可喜者學者鮮不誤焉法家之說以為可與䝉成而不可與慮始者民也故其所語至徳大功必不諧俗而謀衆術家之說以民之智為不足師用為政而期適民者亂之端而不可以語治也至其所引前事以明其說以為禹決江濬河而老稚聚瓦石子産開畆樹桑則閭井謗詈何其異於吾儒所云也民之所甚不欲而難驟使者宜莫如勞與死儒者之云以佚道使民雖勞不怨以生道殺民雖死不怨殺者方其勞而殺之也無有以上為怨者非其初之不可語至其既處佚而後安其勞之之非厲既得生而後恱其殺之之非毒也嗟乎儒者之道不行而術法之學方為彊毅開敏喜事功者所道而咈常圮族之材宜其多出於世而民之不見君子之澤其已久矣夫今觀宋侯所為何其有古君子之風也謀其民之所以生而不至於殺之圗所以佚民者而勞之非徒不怨而且以為譽於吾儒所云盖亦合矣且夫四門之建所糜者民之金侯非能捐以予之所勤者民之力侯非能躬以佐之是莅政之體而不違道以千百姓者之所為也然民之欲歸美於上以為侯功不敢安有其賜者一唱而羣和不戒而若赴其始民以為可舉而侯従之是侯之政適乎民而已侯以為必舉而民應之是侯之功謀於衆而已烏睹夫慮始之難而豈有不足用之民智哉侯愛身潔已不以非禮自汚凛凛乎如處子之在閨前圗史而後保姆其與民接瀝腸披腎語盡而情忠惟恐民之不諭於我而我之不悉於民也其善政甚多四門之建若不足頌而今之有位力得以為民稍有建置以立永利而便庶情則喜事功而有才者皆能之况於侯哉故余諾諸生之請特置侯之能順民以舉事有古君子之風者以為侯頌而慰民之思且以告夫後之為政者信儒學之果可用於治而術數名法之家之果不足學也府學修造記孔子之道其大莫能為之外而為其内者之物盖亦詳矣宫室服器所以為吉凶之用等殺品節不可僭踰而菲窶廢缺又謂之不備筵常伸縮章就少多觚圜弇哆之薄厚濁清猶必有法而形象名貌於以體撰二儀類倣百物則顯道章教尤於是乎在孔子歿而斯人賴以長存其義之難知或明或否而可陳之數如此其詳猶足以生養斯世之人於無窮故後之報孔子者亦以其所詳之物施於崇奉衎饗之間極美綦多而不為踰思以盈其報而有所不足也盖今之學宫棟宇之制擬帝王之居而服器之有事於廟者以天子之禮樂無以復加其盛矣然其事領在有司嵗月傳承之久而或由於菲窶以苟具甚或缺而不完廢而不舉則一物之細而亦謂之未備也泉州儒學其地據郡之兌方最勝而廣袤先師之廟明倫之堂巍棟華宇甲於閩中途闢四軌牆髙數仞則磩圮圬剥往往有之修廊穹門或櫺疏漶朽扄鑰蠧脫而唐除澶衍潦之所鍾暑雨盛集頖水上濫侵階及序則褰齊濡足以升堂士者病之罇罍彛洗簠簋俎豆具善而丹幕棜禁房跗有隳敝不全者編懸之簴有筍刓牡甘設而不固者是皆出於菲與缺而不得謂之備也顧官於斯者曾莫以為意華亭唐君堯賔来為教授瞿然謀之士者以告有司之難為患也君獨任以已覽觀禮器周視廟堂門途得其漶脫圮剥與夫隳刓不全不固者以次治之攻工攷式菲窶者豐而廢缺者具矣髙頖水之梁以出痺洳而攔其四旁表門外之樹塞以起入學者鼓篋之喜心墐竇窒徑無使得邪側蹊學而行堂上丹黝煥乎明新盡改昔觀日課月試舊嘗待諸生集始索几於衢路今惟攜巻以入則坐憑之具不移而俱足凡有事於學中之物可謂詳矣因閱郡志有宋名守梅溪王公夫子泉詠詩訪而得之碣於泉隅以存先烈之風跡而刻詩於其石約其費為不少矣而皆出於君之禄可謂知急當務之所急而為人之所不能為矣君不自以為功而諸生必欲記之學官之職知教人而已此非職之所有事也君其為踰職而過有所為乎夫語其費之所出君誠過其職矣語其事則職之所宜為而非過也將以習士者於道徳之實則禮樂之用為先矣而宫室服器聖人所以詳為其物者道之物也陟降出入作其對越游居聚處毓於藏修濯溉奉持而肅敬萌生考擊蹈舞而和樂交暢則一形象一名貌莫非道徳之實苟小有不備非獨有事於廟中堂上之所急而士者將缺其所以為學也君不憚損己而孳孳謀之智固有以及此與是可記也兵㑹館記泉州之有兵㑹館始於三衢程侯秀民之議而皖城方侯克之至首以徳教開導其民使知嚮方斷獄理財治軍之政亦以次舉覽程侯之所圗而功緒未竟檄知事周揚使董其役而館成矣規模條畫具克如議而修治戰艦募置水卒與夫教習訓練之法始密可以待非常之警而垂於無窮其時郡丞廬陵胡君文宗通守武進吴君嶽節推山隂羅君椿晉江尹曹縣朱君綱並以一時之賢為佐属於此侯尤虚明光大集衆賢之長不欲獨出於已故能不泯前人之議以卒其緒功朱君謂予侯於此役所以保有四境填衛七邑之民非獨吾邑專享其賜綱實與効其力而知其成之不易其可不有以告来者使知議之所由始且詔勿廢予曰可哉盖孔子不言軍旅之事而惡夫以不教之民戰者古之所以教民其具雖詳其要可得而知已明其禮分等殺於君臣長幼之間而厚其恩愛於所以為父子兄弟夫婦者是已其為教如此豈為欲用之於戰而戰有時而不可已則非素教之民不可得而用故以善人為邦不至於七年猶未可以其民即戎也是雖君臣長幼父子兄弟夫婦之道得而五兵之器六伐七伐之法不使耳目手足素閑而習操之而輒用之於戰亦何以異於棄是民哉先王之治修其本而不弛其防享其至安而常備其有患以其習操兵器素閑戰陣之法又知其所以為君臣長幼父子兄弟夫婦之道居常無事有勇而不為技其好義知方可以待一日之變而無喜鬭樂攻之心四境之内晏然不戒而鄰敵外侮亦不敢至其境盖其民雖可以戰而不用也雖其不用而必使之可以戰此其道所以易行而得與民相收捄生存於無弊者以此也王道缺教民之本壊亂而不修而澤竭政熄盜敓攘竊之禍滋起用民之戰亦益多民之死於不教之戰徇習以為固然而不知為上之棄我也盖變故興於倉卒則瞿顧勃色而思可用之民召發訓齊之未暇既已得志而去常見為後事而不及至於苟安而暫息上下相偷訓齊召發又謂無事而徒勞也壊亂玩靡循環於無窮盜敓攘竊之行將相誨而起而無有任其咎者嗟乎後世之民之多棄也程侯既不以後事自輕議由此作侯又不以無事自娱當境土既輯官府閒暇之時留意於此而所為導之以徳教者尤拳拳焉可以與戰而無所用之將近於王者之民所謂修於几席尊俎之上而消弭奸宄於千里之外其此役也夫侯字惟力起家丙戌進士好學知道澹於榮進為御史每請告家居仕二十四年猶為郡云余柏坡公平寇興學記國家承平久隆浹阜康之盛莫如今日雖嶺限海帶越在遐徼如吾泉州之為郡亦且生齒蕃殷地力竭作谷深山阻﨑嶇而曲折皆有保聚之民墾闢之壤而玩忽涵養之過巨奸大憝往往伏於其間如果蓏大熟則蠧藏焉安溪故名邑也其治境之窮處為白葉坂交乎漳汀諸州牙犬相入箐薄溪磵繚繞回複既去治所逺而勢險可憑民之桀黠暴悍者穴而據之為四逺逋逃之藪時出抄旁近村落吏漫不省以為細故日増月長所聚既多旁近所抄不足滿其貪嗜則出剽旁邑南安永春之間而同安之剽尤劇至曵兵行城市閭巷中若踐無人之地俘民男女以為質而邀贖賂兵革久弛不逞之警起於非意游徼虞候之將卒掉眩相目視其得志而去而已是時柏坡余公新以按察僉事来巡此邦慨然嘆曰是非民之不逞惟吏之不戒以養釁萌而滋悖蘖使驕横如是非盡伐其本民其何賴乃察文武吏之惰濫不恭者懲之而選其可用使各募壯勇従行公率以往迫賊所穴而舎焉自賊憑險為穴無一兵敢邇峒而竊睨不虞公之忽至也急不擇死糾其黨以與將吏鬬而公所授策具合機宜又威令信必激賞優厚人莫不自奮遂探穴俘之林櫛而壑薙不失一賊公則行視其穴度所以絶其源而圗為久安之計置壘設戍増守禦之兵而安溪與旁近諸邑之民不復以盜為憂其功伐卓偉計慮周盡如此公猶不慊於意曰是徒致武民未知義將若何維詩書絃歌馴習其口耳以善其心庶其鼓動者速而變化之易乃投戈休馬即學之宫進諸子弟於堂問以所業攷其得失加勸董焉而教之以為父子兄弟者使歸相告語諭勉力於従善以相收養而無狎於不義顧惟教之所出必在於學適有議改剏而工久不就公覈其媮冒旬月而諸役皆起又為拓地以廣面勢而學之成完美矣民莫不于于来觀其秀者思游其中以講學進徳其凡者亦歡喜誇說見所未有安溪之民幸脫於鋒鏑枹鼓之警而且得講誦游歌之樂謂公之實有大造於我也父兄以戒子弟公之徳我如是其何以報子弟以告其官師相與謀曰惟得世之能言者論其事而載之以永公之蹟庶乎其可夫世未嘗無事而常待夫濟事之才方同安之警憂者固未敢處其勢之所終之如何公獨以身任責為民去患數年不誅之逋冦靖於一旦使當時少憚勞險不自深入則不可以得吏士之死力徒奮於一入而無決勝之機戒令二三賞罰殽雜則吏士雖致死而不可以成功功成矣而無分别安輯之畧則賊雖得而不免玉與石焚之慘人徒見公成功之敏而不知其所以致之者盖其才有以待事之變而然也才之兼者可以制事功而未必可以興教化公之用意復出於是究其施將使文教昭明禮義興起以為畜衆銷萌之㡬而向者卓然之勞烈可以永措而不復設又非獨其才之過人而已是可記也公本以名進士起家為行人拜給事中以抗直忤權力謫為邑令郡丞皆有亷操恵政盖其所養者正而備嘗閱厯之益深矣宜其過人如此也請文者安溪學教諭李鑰訓導孫統實率一邑之學官弟子以来而某為之記海上平寇記守備汀漳俞君志輔被服進趨退然儒生也瞻視在鞞芾之間言若不能出口温慈款慤望之知其有仁義之容然而桴鼓鳴於側矢石交乎前疾雷飄風迅急而倐忽大之有勝敗之數而小之有死生之形士皆掉魂揺魄前却而沮喪君顧意喜色壯張揚矜奮重英之矛七注之甲鷙鳥舉而􅀈虎怒殺人如麻目睫曽不為之一瞬是何其猛厲孔武也是時漳州海寇張甚有司以為憂督府檄君捕之君提兵不數百航海索賊旬日遇焉與戰海上敗之獲六十艘俘百八十餘人其自投於水者稱是賊行海上數十年無此衂矣由有此海所為開寨置帥以彈制非常者費鉅而員多然提兵逐賊成數十年未有之捷乃獨在君而君又非有責於海者也亦可謂難矣余觀昔之善為將而能多取勝者皆用素治之兵訓練齊而約束明非徒其志意信而已其耳目亦且習於旗旐之色而揮之使進退則不亂熟於鐘鼓之節而奏之使作止則不惑又當有以豐給而厚享之椎牛擊豕釃酒成池饜其口腹之所取慾遂氣閒而思自決於一鬭以為効如馬飽於櫪嘶鳴騰踏而欲奮然後可用君所提數百之兵率召募新集形貌不相識寧獨訓練不夙約束不預而已其於服属之分猶未明也君又窮空家無餘財所為市牛酒買梁粟以恣士之所嗜不能具也徒以一身率先士卒共食糗糒觸犯炎風衝冒巨浪日或不再食以與賊格而竟以取勝君誠何術而得人之易致効之速如此予知之矣用未早教之兵而能盡其力者以義氣作之而已用未厚養之兵而能鼓其勇者以誠心結之而已予方欲以是問君而𤣥鍾所千尸某等来乞文勒君之伐輒書此以與之君其毋以予為儒者而好揣言兵意云君之功在瀕海數郡而𤣥鍾所獨欲書之者君所獲賊在𤣥鍾境内其調發舟兵諸費多出其境而君清亷不擾以故其人尤徳之爾君名大猷志輔其字以武舉推用為今官鹽政刻石記𣙜天下之鹽以資財計其法至本朝周盡簡便矣而閩中之法尤為便閩中有八郡耳下四郡皆瀕海鹽所従産其得以法行鹽於其地者上四郡也行法之地法不行則鹽不售鹽不售則商不通商不通則課為之虧而財計匱乏之病必及於國故必有禁戒之令偵捕之科以絶民間之私行者而以法行鬻之鹽始得不滯而其所従産之方非法之所行也於令甲未嘗設為禁戒而偵捕吏兵自以徼候非常不為鹺政置也今乃不用於徼候而每以其偵捕之威施於鬻鹽者舟車之任載匹夫匹婦之負擔往往皆見執拘民愚不習於法不知其所鬻之不當得執而駭於吏兵輒出財賂之而後得免其不能具賂則棄其所任載負擔以去而以鹽與吏兵耳夫所謂縁法為虐者猶有禁戒之令直於輕重多寡之間託倚以為低昻如於法不得以舟載者而譏及乎牛任不得以牛任者而譏及乎人荷雖其作奸起暴尚寄於可援之條是也今鹽之所轉徙水浮則用舟楫陸行則引牛馬而匹婦匹夫之負擔不能以幾於此乎産於此乎鬻第轉之於漳漉荒滷之濵而致之市落山谷亦何以異乎蔬果榖粟之行於民間而鬻此者空以鹺名横被譏求是下自為法也民苦此久矣比者余柏坡公以按察僉事分巡是邦戢横刷奸聰明旁燭而司徒新山顧公以重徳髙年為一方蓍蔡部使者至郡必禮其廬以咨政俗之得失顧公乃以民之苦為告余公為慨然出禁於是載任負販之家曉然知其所鬻之物之不當得執無畏於譏求偵捕吏兵亦洒然濯去昔日為暴之心而無所覬於此也已而方西川公来為郡晉江邑侯朱肅菴君亦繼至敬事愛民推行尤慎於是鹽之鬻於民間無異果蔬榖粟之通行流布而無所害此鹽轉徙必集於新橋浯溪之渡近渡居民常資以為生其黨王憲遶羅徳靜甚私司徒公之徳羣来涕泣以請曰顧公已矣吾等不忍忘相與尸祝之於家而尤願一言以記於石政俗安玩之久事之不出於法而為民病者盖多矣為使者有如余公為士夫者有如顧公告焉必以忠聴焉而決行推此以及於他民猶有病者鮮矣兹事之細不足記而使者與士夫相與盡心於民有可書者日改月新兹禁將有不復知者暴行又作則此石之記尚若司徒公之存而諄諄乎其言之也予鄙不敢任政俗得失之論問而不對者有矣其可以不問而告乎其為此記盖嫌於為不問之告而鄉人思司徒公之情不可但已也於是乎書劉公樹記劉公者廣東按察使僉事分巡嶺西鄱陽劉公洵也公行嶺西憫道路之阻艱而亭嶂隳圮郵堠濶疎人無所舎息以為已病發教属邑使度里作亭鑿井亭間縁道列植嘉木未㡬亭成而井冽木繁行者歌舞以為劉公之賜我也相與名其樹曰劉公樹是役也作亭鑿井其力尤鉅而人目其樹者舉其一而且従其多者也嶺西所轄故春新恩康竇辨諸州地也谿谷昩深壠坻仄阨蠱癘之瘧交加蛇蟲蜚蜮之所窟穴沮洳薈蔚芟夷剪刜之不給行旅之出於是途者少自昔然矣有明受祚聲教所訖百粤之開明㡬比迹於内壤疆連境属行者不絶於途而公以是功為賜於嶺西是以知方隅之廣而承平之際久矣然行者之多而亭隳堠濶至使數舍之間休䕃無所待公之功而後人得以有賜盖太平久而法制弛目漏於網為吏者忽焉莫之圗也弛甚而壊則教令政刑所以威懐逺人者皆失其具蠻夷靡憺来猾之警往往而有其為蛇蟲蜚蜮不又多哉嶺西之民之不得有賜於行又非特法制弛而已俶擾之蠻撓其間雖以喜事之吏思以為行者功而有所不得用其力也公以璽書臨鎮是方文告之脩武衛之嚴寛猛之施各適而威懐之道兩崇属城按堵輯和而通吏得其職民樂其生然後行者之圗盖有先乎其本者矣振已甚之壊舉其教令政刑以立事本而法制之末亦不廢此公之見於用也今之歌舞於是途者徒知憩亭以休汲井而泉甘䕃木而隂茂忘煩倦之苦而免暍曀之虞以為公功而孰知其威徳之加於所治大為猷而蚤有具至於既和且通而後得以及乎此也公文學風節為一時名流宜在館閣臺省任左右近密之寄以直諫謫出轉徙外僚越數十年方且領憲一方在山窮水絶之地論者莫不為公鞅然公無㡬微不自得孜孜焉盡其心於事而施為之效可見如此信非人所及也新興尹莊君如愚以属吏承教於公於樹之役實展力焉故来請記夀祉堂記侍御馮君子仁作堂三泖之上奉其母太孺人居焉名其堂曰夀祉堂之始作侍御君新以恩放還南海上天下士大夫莫不喜諫臣全身過嶺存以光天子仁聖之顯名雲間之長幼相與慶於路曰吾鄉直臣還矣以為其邦之榮而推其美之所由曰有太孺人之教焉交欲謀所以為太孺人夀者以貺嘉馮君之直君亦自以譴徙流離牾於嚴錮而久不得養其母也思竭其力為太孺人懽選地最勝處治堂為安老之所而雲間之人不愛出財與力以佐侍御君之費於是堂成而崇麗甲於郡中是時太孺人年八十餘矣耳目聰明齒髪堅好順棟宇隂陽之制以節宣冬夏之凉温庭柯砌卉繁茂幽馥四時代變而皆有可玩臧獲給敏器服完好稱其所趨而無不得適動息之所宜愉懌而恬朝夕之飲食加進而雲間舟楫之便足以集四方水土之産物君必致其珍以羞朝夕之享旦暮率其婦子以寧堂上左右無方嵗時之吉族姻士女㑹慶於堂則輿馬填咽裾佩襜鏘郁如也君歸慶髙堂謂非母氏之懿徳令善則胡以介斯祉也太孺人跽君堂下詔之曰吾始教汝以直汝好直而不得其方徒以狂戅忤雷霆罪在不赦賴上聖寛仁畀汝以身又終使汝得有此堂殆將示天下好直者始獲罪而終受賜以勸在位意在斯乎上之賜汝厚矣君􅌶然以思朝夕起居太孺人於斯堂有明發之懐而又不敢忘匪懈之忠也郡邑大夫與四方賔客慕君之風者登其堂知其恭養之隆可以興斯人之孝及其聞太孺人之誨言也又知所以有堂者之賜而勸忠之義由斯以存天下之母孰不欲享子之豐腆今而後知教直者所以積豐享之基人子亦孰不欲極親之康悅今而後知直節者所以得為悅之具斯堂之可觀豈直木堅石密華鉅翬革之間而倡動感發之所係有不在馮氏一門之美者矣某與君同賜第於朝有通家之誼恨不得登堂稱一觴為太孺人夀敬為之記以寄慕祝且以風世之人云科目題名記鄉試題名刻石學宫自洪武至嘉靖癸夘而石之下方盡矣上海唐君堯賔以經明行脩擢為教授於斯學乃訪堅珉題丙午己酉與今壬子凡三科虚其下以俟方来是嵗所取士盛有得人之譽侍御臨川曽公佩寔監臨之公以公明莅選舉故取不失士士所以成才之多則督學憲使萬安朱公衡所造也唐君謁予乞記予徳業無所稱不足以光前者之石而胡以副君之所託也揆維國家取士之典損益前世不獨法意明備疏數之期多寡之數亦折其中閩以蕞然嶺表之土其盛甲於中州泉在閩遂與晉安莆陽鼎立為三而亞其盛盖列聖道化涵濡之深而山川之光英醇秀所發育厚矣自此法損益既定以来士無不由科目而得進用於世而有司所收之士亦無不出於學而得與於是科者夫修其身以為天下國家者士之事而學之所教出於此也養之使可用而後用之以其所素養則士之出而任天下國家之事宜無不能為者此斂才選賢之方而道徳之一治化之隆其術亦由乎是是其為法亦何以異於成周賔興之良惟其所以教而取之視夫司徒之所掌閭胥族師之所書大司馬之所論古今同不同可知已故今之士其得為天下國家而有述者或行誼之篤或才能之長或氣節之髙而粹然出於道徳之用未易見其人焉亦其教之取之之具未能合乎古故也然其教之取之如此而士之有行誼氣節才能者不絶於世則建學設科養用相待於無窮其效豈為小哉道徳之為天下國家守之必本於行誼行之必濟於才能立之必厲於氣節是三者皆所以為道徳之用惟其純乎性而明於心斯不為專長而小成果其純乎性而明於心則講習讀誦之用於詁訓而詞章之拘於格法體製者亦不病於陋且俗而皆可以謂之道徳之文學以是教之以是取之自可以得為天下國家之成材而古今之同不同又未可知也今日之訓宜不為有志者所病而欲有為於天下國家者宜其皆必由是科以進也若其性之純心之明固可以自力而必至使行誼才能氣節之偉然者時出而兼濟不為専且小此豈繫乎時世而囿於法制者哉夫不繫於時者有開闔造化之機不囿於世者有變通人物之權此豪傑之士而吾黨之所能為也某既弱不能自振有負賢科而樂為吾黨誦之以俟方来者勉焉是為記翕樂孚萃堂記翕樂堂者皖城方氏之居而益以孚萃二言則今郡伯西川公合而得之而見其義於斯名也堂作於天順初載兄弟七人居之七人者二父而一祖倫序既邇情好尤敦故得以翕樂顔其所居之堂而竹巖學士所為記詳矣七十餘年間七人者之子若孫若曾𤣥其出彌多其序彌逺非徒其情義忻戚不能盡同而其生事作業之惰勤豐約尤有不得而均者故不獨和聚驩愛之實於名堂之義有所未顧汛掃塗茨之細亦因以呰窳而棟宇且就圯矣若諸子孫之居於是者皆知病之顧其勢既不得合而力又不足以振之也於是西川公以修身盡倫善亢其宗情義素孚於同姓之親同姓亦莫不孚於公而無所怨恫也因舉是居以属之揆公之志雖竭其力以新是居復與七人者之後共之亦無所愛而七人之後長少殆千指處而謀之曰派既分矣析㸑裂食於一門之内若接比鄰而視行道然今雖新能保不速弊且於翕樂之名終不能顧其何萃之有於是售直於公而畀以身居公不能違也謀者咸喜曰使若新是居以光其祖之搆吾千有餘指徙而他居得其所安各従其倫序之邇者以為親合吾數人之和㑹其邇以相耽樂顧不為大翕樂乎是翕樂之義顧由斯舉而長存也公喜斯舉出於衆志之孚彼無所難吾無所强亦得與其長兄東溪翁従其倫之邇者以相樂而克顧堂顔之名也故益之孚萃之二言所以明其得之之義又以垂訓後人使知劬身勤行仰承燾冒之徳期保守於無窮也余惟君子小人之澤皆五世而盡盖傳數閱世義有所止惟君子為能以禮義恩意篤其宗使久而弗替故澤雖有所止而講序聨属初不以世而殫至於居處之宫室則未嘗不變革従宜以適其所安惟不當使異姓者有之以墮其祖之遺耳今之君子合族人將渙之居而萃之於我往往有之不為傷於同姓之義也然考其所以得之乃有隂伺陽攘迫其子而後有其宫是安得謂之萃或有同姓不難以與之推其用意不過偷為畜妻子之計非重先祖之遺恐其有墜也如是亦安得謂之孚惟公之所處無㡬㣲急已後族之私出於族人之所共與勉為光祖嗣前之令圗而其禮義恩意之敦於平日常周乎千餘指之間信非今之君子所能及故予樂為之記使世之人知欲有同姓之居者必如公之所處然後謂之不傷於義而此堂孚萃之名非但可以貽孫子固足昭諸人人而無所愧也城東樓鐘記凡都畿藩省郡縣所治皆必有鐘鼓以戒昏夙與漏表並設其義取於别時節事警生人以作止動息之宜而聲聞及逺衆聴齊一使人不待下漏測表而知蚤暮其用視植圭挈壺之制簡徑而速故今官府治所未有廢此其有廢者非訕則慢泉州故有譙樓蚤暮伐鼓以戒衆而鐘缺不具厥廢已久而今東城樓有鐘百年之廢具於一日由郡侯方西川公始也公為郡政成思暇而議周諗于僚曰夫治有備物禮有具文非必有益於政化而官府莫之廢謂猶為是治與禮之物文也故崇牙交㦸樹屏反坫畫軾朱轓負弩櫜鞬諸所以為官府宫室輿騶擁衛躋處之物文莫不備具廢則無以為治與禮况是鐘之用於以戒衆警聴定天行之周而授人事之則非徒取治物備而禮文具已也郡力非不足而詘於一鐘乎殆為吏者慢焉而勿之省耳矣方尋範冶之役通守孫公節推袁公復於公曰有鐘籍於郡其巨盈千石棲而不懸將待公而為具鐘乎於是城東樓有鐘用二公之議也是時郡方告旱民有嵗憂公責躬請禱徧於羣望隨禱得雨嵗以不饑既而蠻舶擾海郊郛相驚公選吏簡徒以属袁公往遏狂謀島夷憺威斂颿遁去郡以無恐民用是得飽食安居循動息之常以修生人之業而斯鐘適具考擊震越鏗鍧鞺鞳之音達於四境若有所呼號戒命而使之作止斯為有益於政之具物矣不然民方苦饑患盜苛褊危迫以愁其生勞不得息病不得興忘旦夜之限度而為無憀不節之人雖撞千石之鐘有耳而若不聞亦烏為有益於興廢之數哉夫為劇郡能有暇思以舉慢政又因有而用不費而物具是可書也而三公協衷勤事使舉不失時而物有益於政尤不可以不書修天妃宮記所謂神者果有物哉焄蒿肹蠁飛揚浮游昭明在上充塞擊觸於四旁非無物也危困之所籲號疾札之所請禱忽然有接於人其精爽翕霍而狀象彿彷莫不神之以為是有物焉拯危困為安樂化疾札為生全而崇事報享之儀由之焉起嗚呼此民之所以為不可使知也其有接乎彼者固其籲號迫切之專請禱誠信之篤自為其神感於其心忽然有動乎耳目而以為有物焉則過矣方其專且篤也其人之所自為與或為其父母兄弟妻子惟其所為者之存乎心而他不存焉昔日之所膠擾抹鍛滑撓其神者一旦蕩然不存乎心而神為之告豈有異物哉然世之人固舉謂之為有物矣於是搏土斵木為其形容寵之名號原本氏族廣衍景蹟以附是物而穹堂奥室大庭髙閎以居之患其不稱也刲羊椎牛沈玉瘞帛為其饗侑伐鼓撞鐘祓巫紛史為其歌舞奔走竭蹷天下之人惟神之歸嗚呼斯民之不可使知其亦久矣故先王為之著其教善其報事之文使之鼓舞而不勌以勿陷於淫諂誕罔之邪盖始之所以有神者本生於其人之誠而教之既設則人莫不歸是神也而後能勉於為誠使其崇事之嚴報享之厚一出於忠利憚畏之本心則去非逺罪無即於㓙亹亹趨往以赴疇祉恵迪之㑹若有為之掖導閉止是莫不起於斯人之所自為而由於歸是神之所為勉則土木形容亦聰明正直之所憑而何邪之有泉州之有天妃宫其来已久海上尤神之故宫於吴越閩廣之間尤多成祖文皇帝時嘗遺内臣齎大賚譯賜島外諸蠻隨以重兵便宜討其不庭蠻酋讋悚受賜奉約束使節所指遂窮日􅙡之域神最有光恠靈變使者奉之謹故泉州之宫内使張謙修建也閱嵗積壊前廊後室圯而為墟惟門堂存耳而梲剥榱傾支朽楹茨頽垣以禦風雨殆不蔽也其不至於毁無㡬矣報享不䖍民咸知病之神獨見夢於邑人徐槩乃以民之病告以神意民樂率錢以佐役堂宇聿新殿寢崇成顧役鉅費繁率錢猥㣲門廊猶不能興也郡侯童南衡公始捐俸以充其費免民率錢俄頃之間髙門將將廊序有列而宫完矣郡民懽喜忭叫爭走睇瞻願記其事則相與謀因徐槩来請於予予謂極治之國其神不靈盖政之所以得民者為之興便布利除攘患害民不祈而得其所欲不禳而違其所惡籲號請禱之誠無所用之而烏有冀於神然先王猶存其教所謂鼓之舞之使之不倦順其不可使知之情而誘之於勿邪焉耳侯為郡既久災癘不生寇賊銷逃遺四境以安樂生全之福神將無以為靈則斯宫之完修殆予所謂存其教誘之勿邪之義歟斯義也固非民之所知不可不著以告後之為政者故記之如此泉州府修萬安橋記出迎恩門東二十里長江限之有石跨江蜿若卧波之虹其修踰數千尺名曰萬安之橋有宋蔡忠恵公守泉時所造由皇祐以来五百餘年間東西行者履砥視矢凌風濤於趾踵之下而若不知苟有昔人臨河以望思禹而興嘆者之意想夫營度架結之所由豈不喟然有嘆於斯人哉橋之鉅與萬安埒與亞之者在泉州可以三四數民皆由焉而不言而獨好言萬安其言往往多異以謂撰時揆日畫基所向鍥趾所立皆預檄江水之神而得其吉告至於鑿石伐木激浪以漲舟懸機以弦繂每有危險神則来相址石所絫蠣輙封之而公自為記無是也豈其駕長江之洪流憑虛以搆實其役有足駭人者昩者驚焉而言之異抑以賢者之所為興事起利人樂其成而賴其功故託於神以美之耶今其言雖不為縉紳所道然賢士大夫之至泉者莫不臨江顧望慨然思當時之風烈而壯其所為亦以其人之故也由是言之賢者之所為非獨其為利博而風之所貽者逺矣嘉靖辛亥之秋憲使濟南王公以事過泉盖臨江而慨然者既想其人尤訪其為橋之詳益知其成之不易思所以久之使勿少壊而永為吾民之濟於是翼欄之欹缺者纍址之陁拆者途坂柱亭之鏬折者目揣心量靡有漏失授意於郡守方俟㑹財計工覈上其議復乃檄晉江主簿陳冕往訖修橋之役議定檄下是為壬子仲夏役且及半王公去為浙江右布政使今四明范公来代公風裁獨持神明旁周不出堂序八郡之逺如實身到斯役之有㑹於官有賦於民一一察知而督之加嚴焉於是以秋訖役公馳幣郡中属方侯来請記王公於斯役其出費庀徒已為盡心而尤属意於取蠣之禁盖蠣附址石則塗泥聚而石得相膠蟠以固故忠惠公於橋之南北表石為臺以識其界禁敢取蠣界内者嵗久禁弛則界内有竊者而附址之蠣亦且為竊者所剥人莫不慮此而亦莫為告王公一日而得其利害之大端可謂難矣觀其檄下所司之文亹亹可記也夫天下事有當顯行盛存之際蠧宄竄於隠伏之中至㣲也故易以忽而小媮窳於其間莫不玩焉謂不為妨於大也非獨一橋之利害然也今之事類此者宜不少矣公望實崇著行且立於朝以為是橋者推之天下事其尚可以免於玩且忽之弊乎某野人也其為記宜不越於言橋范公名欽字堯卿鄞縣人起家壬辰進士閱數官而為憲使於閩所至皆有異績其直清敦大尤有大臣之風王公名昺字承晦章丘人方侯名克字惟力桐城人今為陜西苑馬少卿修橋之役始壬子五月畢於八月二十日記之日為癸丑夏六月既望適錢塘童公漢臣来為郡公由橋入境未見吏民已慕忠恵之風慨然有踵盛繩美之想故於斯石之役属意焉亦可書也漳州府重修虎渡橋記漳州之有虎渡橋宋紹熙郡守趙伯逷為之而代木以石則始於待制莊夏假守之時而集英脩撰李韶復修之是為嘉熙改元之年宋於是時境土彌蹙疆塲兵事日滋出財用竭於内為郡者顧能興此於空匱擾攘之中雖其事為勤乎民然猶謂之未知所急也我明有天下嘗安輯閒暇矣有司宜有餘力以及乎民政百八十餘年之間盖修者數焉予固恠夫宋人當時之詘能舉大役成鉅績以俟千百年之逺入我明而諸公先後為郡以一方全盛之力修前人之所已成至於屢修屢圮不及二百年修者八舉而猶有今日之圮以待賢守丞協謀為之而後民得以不病於往来豈非作者之人發謀審而致法詳果於以身任責取財㑹費必出於羨足以盈其始慮之所營度而期於有成而因舊舉事者務在便文養譽計用常不足耶然洪武正統間之舉固已聞於朝而其後亦嘗以請於部使者監司其取財㑹費宜亦不為少矣亦其習於安輯閒暇戒徒庀工之際有以容其苟且之政而然與如龍南岡之為此第因民之以事至庭者揆其情猶可以勿致其罪乃戒之使出財以役於官又勉使自視其役朴抶呼召之苛無所用而苟且亦不得容利興於下而取財㑹費之議不及於上可謂作事簡而成功速矣閩於幅員之數最為遐阻漳州又當閩之窮處方漢開郡閩中徙其衆江淮一時之俗猶安陋守儉不樂通中國及唐而聲名物采未大起山斷水絶而艱於行由亦其勢然也至宋而文明繁富之風視中州有加焉軌蹟達於四方若輻輳川赴橋梁之功繼斷接絶於斯為盛然宋之有國南北分裂紹興以後世已季矣軌蹟所至以淮鄧之間為邠翔橋之利於人其功尤近而狹彼其竭力於空匱擾攘之中而為此者若以俟夫今日之盛固有數存焉而非偶然也橋之作修祇為有司守境急民之政而因國勢之尊盛以博其利而著廣逺之功橋固莫之能為而亦非勤於職事者謀之所及龍君之舉適遭乎斯時誠非偶然也是時盧玉田君為守能執大體以先有司不沮其僚之謀咨計決議而喜其成功龍君以諫臣出丞郡不為蹇傲自抗以媮便養髙而盡心於事如此皆非今日所能為於是郡倅陸君體仁謝君尚志節推李君日森樂觀其長之賢克叶於政僉来乞文故為之書使歸刻石而立諸橋亭以詔来者永春縣修二橋記異時長吏能勤民者常得用其力於文法之外優暇展盡不以督責譏謗為虞而措意久逺所謂興造之役出於費民之財與力尤宜其舉之難而諸郡邑之建置營設不獨有司之制皆具其餘每有以及民近世文密法詳長吏始有不自得之心而多以避言畏事為良策則關於有司之制或有弛廢猶莫能興况於橋梁之役非為政者之所責者哉民於是時不得賴吏政以起當興之利不一其事而病於涉者尤其衆矣永春為邑在山谷之間攅峯疊嶂蹙沓不已於其斷處始得少衍㣲平以為聚落畎畆而磵水行其間橋之為濟尤多而不可緩雲龍東嶽二橋在邑治之衝於邑中諸橋為通道而往来者衆雲龍之盛接比闠闤其觀尤壯近嵗積圮過者弗省值東筦羅侯来為令慎法近情與民為便政以是簡而衆為之附居之再朞恩洽而信足矣乃聚民而謀之曰是橋不修其如何咸曰不一二稔將害於行曰今修之與待一二稔費孰為鉅曰後將大費曰請於上則緩且邑儉官無羨資未有以為請請而不得則沮吾與若共為之侯先出俸民喜爭繼以財曰是民之財吾其勿問使自推擇各執其職工之良苦役之合散曾不預知餽勞時至以相其喜侯顧坐縣中治文書折獄結課視事如他日而二橋之役以畢来告基堅址隆有加於初翼以連檻覆以飛甍言言將將如實新作肩摩踵属不絶於其上民得所濟以為侯功侯以酒往落之以功與民不肯自有邑人恱是舉也以為宜書而来請記孰謂文密法詳吏不得與民有為莫如今日者視永春二橋事當悔其言有追歎異時隆寛舒簡之風長吏得以自盡想見而若不可得者觀侯所為可以灑然而喜毋厚羨在昔而過忽目前也永定縣知縣許君生祠記永定東鄉盧九經作祠以祀其令木石方具而南北西三鄉之民皆起而爭之曰吾賢父母也孰不得祀之亦孰不欲祠之而獨於斯鄉而其費獨具於斯族耶邑中之民聞之亦曰吾賢父母也非汝四鄉之民所可偏祀尤非盧之一姓所宜獨費耄倪聚訟各持所是不能相奪者久之始定祠於邑中而盧九經必欲徙所自具之木石以成之邑民終不能奪也然民猶以不得盡力於所費為怨則躬埏瓦畚土負木曳石各竭其勞以為慊或競造酒饌以食役人不旬日而祠成盖一邑之人之情如此邑之秀民為學官弟子者具書許君善政介吾友人張君以来乞記邑之鄉先生張君僖舉人賴君希道亦以書偕来予約其書所言許君為政首以惜民財力為急務視民出一錢役一日如膏血手足之在其躬朘之則痛勞之則苦凡向之所為館遇賔客供帳使者揆其溢侈妄費而斷不可為禮者一切罷之其禮所宜有而過於為具者則裁之或謂將廢禮矣君曰如是乃稍近於禮而猶非古所謂禮也顧以為廢乎一意行之不顧議獄緩死辨寃去苛不以嫌忌自為疑沮必伸其言竟其事而後止至其毒民之魁法所必不貸者去之惟恐不盡且速而不苟為姑息也發倉救饑便宜従事蹈文法之所禁而不以為難給授有方予粟皆餓者而餓者無不得粟其稍有食而將餓者予之金使有以續其食亦不使有餘食者得冒毫分之予此其得民之政之大者諸所行事無一不出於為民而不暇詳也然君之在邑盖亦艱且危矣失賔客之色詞而于其恚怒每詆之曰是矯焉以沽恵於百姓而不近人情者耳其爭獄之出入與夫便宜救饑之策觸忤上官卒以理奪其忿懥寵辱之形變於前旁人皆為君驚上官或察或終不察曰戅焉以犯上取名而不審於量已其斯人與盖君之自處純心精慮以圗民之所便絶無鬻恩要譽之私奸於中心其違上官過賔之所好亦以心必如是而後盡非為峻其迹難其合而可以著於聴聞也民之所以不可忘邑長之徳者皆以君為不愛一身之利害而為吾地故其思之彌深而譽之也彌顯矣嗟乎置一身之利害而悉意以圗民居下位者之所甚難平一心之喜怒以伸為吏者之守在上者之所易也而世往往不相遇何哉有思於民而亦有譽於上仕者之所同欲然有不能兼得者有志之士正不能以此之重易彼之輕此許君之知所擇也予為之記不獨以副邑人之情將以風在上之君子庶有感於斯言其尚能以已之所易而興起為吏者之所難乎企潁亭記潁陽東溪相傳巢父洗耳處而箕山之上盖有許由冡疑於有其人矣彼其惡於以天下累己而逃堯之見求宜其去之幽昧荒逺使不可即而其生且死不離乎箕潁之間豈堯之仁不屈一夫之所守不待去逺自不患於見奪抑其善於自泯能使堯終不得而累之以天下而無事於逺去是亦髙矣吾又有病焉夫其求之而逃逃之而不逺而能使其終見舎孰若無使為其所知而莫我求也髙世之士天子有不得臣諸侯有不得友非謂其爵之而不降禮之而不就偃蹇傲倨抗其迹於巍巍揭日月以行其灼灼之名而以為髙也湛乎與俗同波芚芚兮其與衆人皆愚覿面有不見其躬同席有不覩其形而臣且友之故不可得耳今將待其詞命之至而後以為已汙艴然作於容氣顯與黄屋絶烏睹所謂髙哉好竒之士猶侈然道之何也康衢之老人樂其食飲歌聲發於腸肺使堯聴其歌而不知其聲得其聲而不知其人是吾所謂髙也當堯之時環康衢而處者皆可以為巢許而泯不見稱二子者以不能為髙而来堯之見求反以辭而逃之見名為髙而傳於後不亦異哉縉紳先生方且原帝堯重禪之指決其事之無有以闢傳者之妄予以為正使如好事所談以為實有尤不得侈以為髙耳西亭君作亭以自休名之曰企潁君其猶眩於莊生之誇說以為甚髙而慕之耶而聞君之名亭者乃始莞然以笑曰彼二子者與之以天下之大而不受西亭方以宗室之胄爵秩命數出於有司之所議噐服宫輿皆自上予之也而奚以慕二子者之風夫匹夫之㣲長於貧賤而不能侈於富貴盖多有之生於富貴之中超然獨離而不溺於其習是可以為難耳矯焉辭千乗之國或不能不見色於豆羮一介不受之誼至為細淺而可以不愧於千駟萬鍾不顧之大節西亭君者予及與之游而知之其於富貴盖生焉而不溺其好學自敏知慎於分義之際可以不苟取於一介如是而作亭曰企潁奚不可者笑者尤恠之曰異哉所聞康衢之民皆過於巢許而宗室之貴富乃可得而企之也嗟乎非聞者之不知則何以記企潁之亭駕雲亭記徳化令緒君東山為政之期年作亭於其縣之龍潯山之頂而名之曰駕雲之亭亭之所以作非君以勞而思自休以為遊觀娱嘯之地也其說具於縣之人士所為来請記之書云徳化為邑封域固儉然亦具有司應令典職貢賦藝不後他縣而人材之生獨為寥簡或綿都越井無絃誦聲每三嵗比士縣之士濶焉不預登選之數至閱數十嵗而不得一焉縣固已為恥而君尤以是為病於是有言者曰縣之負此恥固云人事抑亦有地理也縣之山磅礴蟠際不知其幾百里峯巒岡巘回互蹙沓殆不可數而龍潯一山巍然膺縣治之南蜿蜒夭矯其来若翔其止若蟄厥名為龍惟亭於其上以増益此山之勢如龍之昻然驤首而思奮其於文事之興必有助矣盖其說習傳已久縣之人力既不足以自為而為令者又漫然莫之省也君獨心喜其說而力能敏於事而龍潯之山於是有亭亭所為名則君取其意以符所以作亭之本㫖盖雲之於龍類也予既受書而不得辭乃為之記夫度工相原視景望氣敦琢勝美而㑹集休祥古之作室建國者盖多有其法若夫為亭於山以起龍而致雲謂將有補於舉賢選材之數古無有也豈亦沿前之說支其方術而屢變以巧耶天地之髙逺鬼神之幽㣲質之而無端叩之莫得其朕而卜筮瞽史讖祝之教先王皆存而用之其兆證於事而占效於物盖精誠所極非卜筴瞽史讖祝之能為神然而知之者以為精誠而愚者以為神故卜筮瞽史讖祝常行於世而其教為民之所由而不可廢何也以其亦有益於人之勉功而作事也彼其術雖屢變而巧盖亦近於卜筮瞽史祝讖之言以其傳之久而信之深距而攻之未足以解惑祛蔽而因而修之使士者恱於耳目之新相率去其有所諉而怠以止之錮興起其志於懽忭鼓舞之中而亹亹以進雖户諭家誘未有若斯之速也嗟乎孰知夫伐石斬木以營構於此所以為授經挾册而課督於彼乎或者顧以其鄰於誣與恠而誚之其亦過矣以予所聞徳化之士多聰明茂美之材又知向學以自増益人文之興必在於斯時而亭方作盖士之聰明而好學其材必成而為世之所擇取以施於用當昌碩光顯矣予知此亭之作無預於選材之數而人材之興㑹逢其時將終有以名此亭也姑記以為俟曉江漁者記江潭大澤之畔緇帷杏壇之林皆有人焉顛白眉龎杖拏鼓枻而見為業漁三閭大夫之貞尼丘孔子之聖僅足以發其人之一盼而問之躊躇髙視迫而後答若以一賢一聖者為未足與語其放且傲如彼彼所謂頽曠淳野沒於眇莾遙蕩之遊惟其鈎餌之知而鱣魴之索倫類不可得而拘詩書不可得而詔者耶然而出而見於澤畔林中盖非大夫之所訪孔子之所求而彼㣲示其迹以啟其端又非其偶然過而相遭者說之既竟而其意見矣乃始泯形收聲而去欲質其姓名與其居舎之所止而卒不可得吾又不敢逆處其為治鈎餌而謀鱣魴之獲者之人也嗚呼彼且被髪龜手而老於風波之上荻葦之間其果何為者耶吾既不得見其人而見所謂曉江漁者吾之於漁者盖往訪而求之而後得見也於是有可傳道之姓名而有可蹤跡之居舍矣漁者之於漁足未嘗履舟手未嘗操犗而終日未嘗得魚也吾以有罪黜於時猶不能忘其憤常抱直被廢而正見疑之懟不知所以自釋然後進而求於孔子之道誦說詩書蹈習禮樂以自苦勵而休其不平之怨以此其陋使其逢澤畔林中之人當不足以辱其一盼而何問之可得漁者方且以詩書禮樂之言强聒而博喻之惟恐吾誦說之不勤蹈習之不固而其感於廢興之由理亂之故往往扣舷蹙歌聲薄林莾有餘悲者使吾始恱而中疑焉漁者其猶未足以方於澤畔林中之人歟胡為使吾得求其姓名訪其居舎而與吾言之多且盡如此嗟乎此漁者之所以為漁者也歟無方之為有方者語無當焉則驚過焉則惑漁者之為吾言固當如是而止爾他日吾又訪焉而其室已虛倀倀焉不可得見悵然如有望忽然值於非意之頃禮之而不答叩之而不應刺船而逝使吾倘然若失而卒不得所聞則吾其㡬矣吾未可以行乎江潭之濵坐乎緇帷之林而反以疑漁者不足與澤畔林間之見者比吾猶如此而何恠乎昏昏著之舉以漁者為漁是則雖不舟楫之事罟網之為而以漁自著其號盖有所存矣彼其姓名非徒後將不得傳而世且莫之為意而吾獨得而知之故為之記遊清源山記登髙望逺攬山水之竒變娱耳目於清曠寥廓之表而窅然失一世之混濁天下之樂宜無此踰者牛山之遊美矣而景公以之涕泣沾襟不能自止羊叔子登峴山以臨漢水至與參佐相語悲咽憮然而罷何情之反也以景公之愚睠然覽齊國之富恐其一旦忽然去之而死而不得免其意之卑而晏子笑其不仁宜矣叔子慨然顧其一時之功愛而難忘慮他日之易泯撫當身之懽而不足以自慰可謂賢者其當樂而哀以身為累而不得盡恱生之性亦何以異於不仁者之悲嗟乎富貴之君侯功名之卿士窮天下之欲無所不足志滿氣盛其多取於物而備享之以為快何所不得宜其兼得於山水而牛山峴首之勝反以出涕而興嗟彼其念富貴之可懐而傷其不得久有喜功名之甚冀於垂永而患其無聞則雖左山右江履􅍶崒而俯濤瀾而不能有其樂寧獨不樂而已且為之感慨而哀孰知夫蒼厓翠壁發舒氣象而凌薄光景亦導憂增戚之物也當其戒具往遊固以酣乎奢佚之驕羨倦乎勲伐之勞勤思取樂於山水之間以適耳目之娱卒之求須臾之樂而不可得豈非以其所都者厚與所挾之髙起於濡戀矜顧而然耶富貴功名者之於山水其果不得以兼取也清源山者泉州之名山也余嘗以暇日往遊於其間好事者往往撰肴酒躋山之顛就予而飲食之因輙相命為遊攀援險絶探討幽窈極意所止有従有否不為恡也顧視其踽踽寂寥﨑嶇而盤桓何足以望牛山之儐従峴首之賔僚然吾未嘗不樂而客之従者未嘗不與吾同其樂也以吾之早廢於時習於富貴之日淺而頑拙不適用曾無秋毫之長可以挾而待後欲為濡戀而無所可懐欲為矜顧而無所可喜而山水之樂卒為吾有吾雖困於世於物無所多取而獨得之於此彼富貴功名者於天下之欲窮矣而於天下之樂猶有所憾然則吾之困非徒不以易千駟之君而烜赫震耀聲烈被於江漢魁乎為一代之元卿者猶將藐乎其小如拳石寸木之在於兹山也吾之所取其亦不為少歟既以語客復記之如此遊筍江記郡侯程習齋公治泉之八月政既通矣天答之嵗而民恱其生公乃得與客遊於筍江之滸夫其浩溔澄涵之水流日夜之不息演洋洄洑放乎大海浮於曲折迤邐之逺不知其幾百里而空曠寥廓際乎目之所極若在几席之外膏原漫隰彌望逶靡畫什伍而理縦横巒驤峯踴迅勢驟形凛乎其不可控臨兩涯而四眺則若逗若拱徊翔停峙睠留而不去各獻妍態映燭乎玲瓏泓澈之間而光晶新爽飛散下上媚雲氣而麗烟霏盖亦竒矣若夫髙帆疾艣出沒於霧濤風浪相銜首尾而離離漁篷釣艇謳嬉逓發前唱後和擊楫空明魚沈而鳥起川虛山蕩於㣲茫晻靄之中灌木菀栁之駢羅鸛鵠棲止鳬鶩還集輕簷細梠隨曲成搆延亘仄複鑒晴波而漾倒景斯則民事之動因乎山水而公與客得以為瓌傑詼恠之觀者也至於靚粧袨服㑹一州之士女沿隈循涘而不可選分㪚互合莫窮其来往之所従文蓼芳荃之繽郁遺履舄而罣袿裳激豪吹之清越哀繁絲之要眇淋漓顛倒徙倚雜遝忘其岐道之所向而忽乎日之將夕斯則生人之娱感乎物節而公與客又得以同其歡適吾洽之意者也公飲酒樂甚顧謂客曰吾所得以為觀者彼方勞於有所營役役而不得休而豈知是之為美而吾獨得之以為遊娱於物節者之以為遊矣徒徇乎耳目之好而甘於漿炙之味而烏知吾之所樂惟我能與之同其意而彼豈誠能同於我哉今日之遊盖亦云樂矣然而此江常在泛日月之無窮前乎遊此者不知㡬何人而聲磨跡滅與水俱逝皆已化為浮漚游泳而不可尋矣不有文字以托於不泯則後之人孰知吾與公等之樂於是也乃舉酒属予曰子宜圗之予復於公曰昔叔子峴江山公習池與夫栁惲之具區蘇子瞻之西湖其光景物象備極一時之美文雅照耀意氣雄俊既擅絶於當日而流風餘韻於今猶可稱思至其従吏鄒湛侍兵葛疆以及方外恵勤參寥之徒皆因以不沒於後世然則客方有託於公而此江雖常在其名或當由是以顯公顧謬意鄙陋無能之文為足以圗不泯之盛事豈不過哉言已酒罷公揖客别而予退為之記金溪遊記一畆之宫環堵之室墐隂而牖明畜妻子其中而身與為處出戸而行前有擊轂之車而後有連帷之袵驟而之乎空曠之野寂寞之濵蒼山崒嵂而髙起緑波澹蕩而長浮則為之忽然而喜如出幽窒脫縛束耳目為之加明手足為之改適此何異乎飫粱肉者恱蔬茹之食酗醇醴者暍清冷之漿其舍醇釀而即疏泊而不得謂之知味也由其無所得於此徒以迫刼於喧湫嗸雜之甚意煩氣倦急於有所投而自解峙者知其為山逝者知其為水而豈為有遇於已哉嘗試登髙丘汎長川見夫樵夫牧豎罟師估人爭道而捷馳疾榜而撃汰以家為赴望望然不及如其去山水之不速而恐其或後以彼觀之則醇釀之可舍固在山水而城郭室家其疏泊而思即者矣物之美惡無常態而有定形山水之為佳而城郭家室之為垢濁亦美惡之大齊也由樵夫牧豎罟師估人觀之則所謂佳與垢濁者舉易方而傎處世之偶得放於山水輙自謂絶去喧湫嗸雜之患方多其所遊之適以傲乎城郭聚而室家居者之人吾亦未知其美惡之所常也飲漿冷者暫快而非甘嘗蔬食者少蘇而不美其甘美之常固在酒肉也彼驟之而忽喜者意豁於久煩之餘氣舒於積倦之後喜且未幾厭已生矣何必不為樵夫牧豎罟師估人而何以笑彼之望望凡物之美惡無恒而人情之欣厭有向昧者挈情以徇物中之厭欣變於外之美惡迭欣迭厭而不知自主惟明者為能以情御物物變於外而不足以易其中之所樂樂之取於物未嘗無所寄而皆其自足於中者之所取則惡者未嘗不美而况於其美然後美惡者卒歸於有恒而皆吾之所御欣且不得而有而何有於厭苟其無所厭則遇物皆適無之而不喜而奚待於忽然盖吾泉州之江自諸山發源而下建瓴而急瀉至於金谿而始演洋渟潏山起於兩涘髙深之景相得草樹互映雲烟相鮮兹亦山水之勝處也之焉而忽喜者不知其何人而吾獨與黄應初洪舜臣二君往遊而樂焉當其舉杯相属唱咏方希而諧笑間作計彼驟之而喜者亦必有以同乎此而山之坱然而靜止水之沛然而流行接於吾目著於吾心形器都遺而情神獨遇信有彼所不能同而吾三人者亦可以目擊而交存而不可以口說喻也然而其樂可以忘言而其遊不可以無述故予為記其意如此使世之遊者知吾三人者之遊而能樂盖有以御乎物而談山水之美者必出於吾而後為山水之美常也遊之日為嘉靖戊申八月七日應初名淑清南安人舜臣名朝選同安人而予晉江遵巖居士王慎中也寳陽精室記寳陽精室鴻臚丘吴亭君所築也吴亭年少壯時抱傑才竒氣不能屈首塲屋繩尺為拘士腐生滯固之學故不得志於有司則以其力出入古今觀史傳興亡得失之變執古以御今而知海内當世之故謂事功可為顧未習國家制度耳因従其兄中丞公往遊四方翺翔兩都之間覽觀鉅麗明盛以壯其氣而增益其才愈有意於當世矣又因其兄時與京師達官顯人相見聴其談議察其施為頗不愜於意侍中丞公私語曰吾謂據要津都膴仕者皆公忠憂國有忘身徇世大節其規為注措足以任大圗艱使人望之如麟鳳龍虎慕恱震竦不敢狎也顧碌碌若此耶中丞公笑曰孺子妄語耶然心益竒之而諸公與中丞雅者莫不知吴亭君非凡人矣稍欲羅致之使入世網以挫其氣而用其才授以鴻臚寺序班試職四夷館君亦自喜留京師久之忽有所感於時政飄然辭其兄歸曰吾不能留矣中丞公不問亦不復强之也君至家整齊門内之政力行孝弟勤其四體竭朝夕之力孜孜焉修弟子之職而不倦至於墾闢田畆堂構屋宇百務具舉勞而不自為功豐而不私其財世所稱賢子弟而有才者莫君若也晩取道家書玩其澹泊無為以自然為宗之㫖愛而信焉築室以自休名之曰寳陽所以寄其意焉予謂道家者流主於存心事外忘一世之物而獨守其真如君之懐才負氣無所合於仕退而終老斂其英華銳躁以反於澹泊有可信者至其孝弟之行篤乎人倫而周於日用實君之性之隆也予每接君見其語及父兄之際輒嗚咽不勝或泣下使傍人為之感動詳察其行於家者今雖彊且艾矣事嫂如母愛姪如子不以一毫利其躬而辛苦毖劼以膺世故盈虚變化之態其用心之㣲極義理之條貫而巽入乎人情物感之委曲盖有終其身而不得釋者輙欲附於外世之說其能灰心槁形棄民彛而絶人事如道家之所言者乎予不信也予知君所為者乃吾之所謂道於道家之言乃不欲以其不足於外者干其中澹焉泊焉融智去故窅然而託於彼也龍巖書屋記貴州天下之徼也天下之山莫雄於貴陽貴陽之山之秀莫秀於永寧唐帽之山於永寧為尤秀龍巖者唐帽之最竒峯也今方伯趙伯師君永寧産也愛唐帽之秀而得其竒峯作室於峯之陽題曰龍巖書屋其愛之甚也取以為號君既以文學顯於朝而暴揚其事功於數路之藩臬天下之人莫不知君則皆稱曰龍巖先生而永寧之龍巖遂為天下所仰貴陽徼地視中州有加矣夫出丰秀於龎雄之餘而特露其竒儲精藴異以厚斯人之生是君之有得於兹山也若其强立振曜始於戸庭脩明而發聞於四方之逺非山之能為而君之所自成也龍列於鱗蟲而為之長以其有形而蟲之也要其伸縮藏見恢恠倐忽窮變化之端倪而獨靈於天地之内非蟲之所可類而列也貴陽諸山土人往往見其上有龍之蛻骨意其髙大深逺足為靈物之所栖托龍嘗擇而蟄焉兹巖之以龍得名固宜或曰山之蜿蟺磅礴首尾鱗爪飛翔攫拏依希而髣髴為其象於龍也擬其形而名之亦宜謂其有是物也與其擬是物之形也皆非巖之所以得名之實也龍之起潛躍淵馮游氣而得便勢混坱圠薄景光觸石膚寸之雲俄而彌濩風霆受其駕鞕澒洞海江歕欬陵谷不擇下土而降其膏潤髙下之地巨細之物既皆浸灌沾渥盈其所受已而氣收勢斂還宇宙之舊觀廓然開靜萬彚欣暢不知誰之所為龍亦泯其靈迹蕩然無復生成之賜於羣有而責其報謝此其功之所可名者也惟其純剛徳之粹精乗凌二氣嘘陽吸隂絶無嗜好之欲以錮其形合而成體在體無居散而成章於章非見此龍之所為神而能有是功也始君讀書於兹巖隠而未見懐負所有固自謂伏龍今其光輝聲迹昭然於世又孰不仰君為人中之龍者行且有國家之大責而得其司柄氣至勢便固其時矣使其功業不見於當世而澤不下於民是夏蟄而田潛也於是而猶據大位享厚禄偃然坐於廟堂之上盤桓睠顧而不能釋斯為有夏之世之産受鬻於劉氏蟠屈庭户盎缶之間無異蠉蝡之生徒知食飲以有其形辱而蟲之不虗也君尚充其昔日之所以自謂者純龍之徳以顯行其功塞天下之人之望且以貽兹巖之寵毋使予得移文草堂題兹巖之龍曰豢也君其圗之環山樓記太白源於崇陽之野為佳勝處土沃而泉甘平曠廣隰彌望迤靡疆畔縦横有理如畫置也四外皆山雄據矗起卓為竒峯列為聨嶂殆不可數最巨且秀而可舉以名者曰龍頭羊角石洞烏土葛仙城岡兩山誥軸壺頭大集之山田於其源之上游築圃曰南莊而因以為號者處士劉公某也因莊之勝為樓於其中以攬取四山之美名之曰環山則處士之子封君龍溪公某也受田於南莊付授有法樹藝以時其收穫之入足以食農人烝衎祖妣而無奔走之憂經營之勞以奪其暇日此樓之所以得常止而休也田壤所鄰生聚衆而守望勤旄倪往来訢合而有禮怨斁之危搆訐之械不設於彼我此樓之所以得常保而安也南莊之田日闢以增無旱風之灾而有積倉之餘斥其所易可以具酒食召賔客此樓之所以得屢游而嬉也出作而入息絶身外之䂓覦以其有為之志託於其子詩書之業顯而功庸漸以發聞於世雖壑居川觀不為無所用而徒隠此樓之所以得享盛而樂也有名寵之榮而無機事之累冠裳車馬之命數以為倘然而不以為實有宿乎富貴之蘧廬而不繫於矯豢之柴柵此樓之所以得尊居而髙也髙人勝士之産於楚者挾能賦之才而矜好事之雅荆潭襄岳四逺而至挹竒變而凌光景因之辨析名理發舒性靈刻羽流徴之謌滋蘭藝蕙之些盈於楣牖此樓之所以得播美而名也嗟乎以鄂之為州方地且千里山之環合而可樓者不知其㡬處樓於山中者不知其㡬人得長保焉以常休而屢嬉吾意亦鮮矣其享盛而樂尊居而髙者抑又鮮矣况於美而名者又可多見耶凡土木堅好華潤之作常必選地以為勝故喜事者窮搜遴擇不厭其意不止卒之其所以勝又不在地視所以作而居之者人何如也人與地稱而不託於言與言之不工其地雖勝亦不足以廣行而久傳今劉公既以其樓勝而余復為之記其亦不為徒也玩鷗樓記李拙修先生名其所自老之樓曰玩鷗客有問先生者曰意可以有託於物而物有足以寓意其道莫著於詩故詩之為言其取於草木蟲魚鳥獸不一其物其慕恱怨怒憂悲愉佚警戒勸誘非刺歎頌其端不一莫不有取於此為其機有以相發其理可以互觀非徒引類之博永言之偕而已也今者名樓之意殆近於詩乎詩所取草木蟲魚走獸其言多矣樓取於鷗非其類也姑舉鳥以質其類可乎巻阿之鳳世不常有鷹揚喻人和鸞命車亦匪其類非所質也若夫雎鳩之關闗黄鳥之喈喈鳴鴈之雝雝雄雉之泄泄桑扈之交交鸒斯之提提飛鷺之振振鶉之奔奔鵲之疆疆鵻之翩翩鴇之肅肅鷄之膠膠差池之燕飛揚之隼鴪彼晨風題彼鶺鴒止屋之烏穿墉之雀在梁之鶖食椹之鴞桃蟲拚飛竊脂鶯領鳲鳩均一鴛鴦戢翼濡咮有鵜集林維鷮鳶之戾天鸛之鳴垤鴻飛遵渚鶴鳴九皋是數者先生一無所取而獨有取於鳬鷖意必有謂乎夫鴞之不祥鶖之非亷烏之占亂雀之似獄桃蟲警變晨風棄捐鶺鴒急難桑扈失性鴇羽以况苦役竊脂以譬無禮弁鸒可樂而興於親過鷄鳴有度而比於世亂隼設離散之狀鵻形勞瘁之容垤鸛起期逺之感梁鵜表尸食之貪宜其不為斯樓之所取鳴鴈鷕雉平林之鷮河洲之雎桑梅之鳲頡頏之燕皆為后妃夫人女婦得失樂怨之諭鶉之有匹鵲之不淫物非不美而作者所指乃以刺失道之行熠耀其羽睍睆其音或諷於當婚或譏乎巧言均宜無取於所託也然而振鷺之有容並乎嘉客戾鳶之得性顯乎作人鴻之有序鶴之象徳其與浮沈之鷗度美而論議則有間矣先生其何以命之豈其自佚太平之世羣萬物之衆多悠然安樂如雅人之所賦耶先生莞然曰烏有是哉盖嘗誦詩以博吾趣而適其性情之所得其於名物且未數數然也况乃綜詩人所詠羽毛之族擇其為此與其為彼睢盱比擬顓顓然取之以為一樓之號哉吾樓成於此而湖出於樓下鷗集於湖朝夕泛焉而不去目之所見無他物者樓固不為羣鷗設而鷗亦非為斯樓来然以是名樓亦奚不可且其對之之久觀之之狎見其容與於風波之𣺌茫唼唼乎蘋藻之㣲細無求而已足不爭而常閒若有恱於吾意者雖作樓以玩之亦吾好也故樓之名不易彼有容之鷺上察之鳶可儀之鴻靡爵之鶴既非樓之所見亦何羨於形容而鶖鴞鴇隼諸如吾子所稱又烏以其取喻指事之不淑而廢之耶若夫大雅詩人之義固非吾之竊取然世方太平吾以無用之才生其間亦可自比於衆多之物之一而與鳬鷖小鳥同其安樂之性吾子之所謂雖非吾之所取而亦豈非其所為取乎異日嘗有稱騷人之詞以質吾者其欲為汎汎之鳬乎而吾非失政憤邪不得志於國者也有稱南華之篇以質吾者其為忘機之遊乎而吾非誕慢𦕈莾遊方之外之人也今子博吾以風雅正吾以比興進於二客之所質吾之所取其將處於三者之間耶抑將出於三者之外耶吾無以復子矣先生書所與客語者寄予予未嘗登其樓也次其語以為玩鷗樓記洞泉記尚書戸部郎中鎮逺錢君圖其所居之山條為六景表以嘉號而約之曰洞泉盖鎮逺之山最多兹為最勝君愛其勝擇而居之泌泉峙石嵌巖裂磵立壁谺谷懸瀑滮池紛形異趣各極其美靈草竒木佳卉繁葩散被巔崖林麓之上下山下之田鱗塍綺阡善播而多穫宜居與遊君之攬挹吸咀於是山之勝皆盡其所有而尤有取於齒洞之泉故析其景而總之以斯名君既仕行遊四方耳目日廣其攬挹吸咀乎天下之勝又多矣顧未嘗忘洞泉圗以為册挾與偕行一日出以示予曰始吾藏修於洞泉之居自顧其荒遐深阻無以冀上國之盛明所謂嵩華岱恒衡霍河濟江漢淮海名山大川雄據華夏岳宗鎮止而經流宇宙為源為委南紀北戎此焉稱義每側身思望意未嘗一日不在中土今耳目之所及幸徧於四方昔日之所竦企而心勞者奄得於睹聞博觀而約取之則吾洞泉之逺且小其與岳鎮之巍巍源委之浩浩度髙絜深未始有讓焉盖形勢氣象之不可强齊者誠大有别至其真粹神情獨立而常行遇於耳目超乎睹聞則吾未别其為此為彼也故洞泉之樂無以復踰異日休於四方之事將終老於斯無所羨乎彼而斯名且不易焉甚哉錢君之賢也夫守乎故而不能即乎新斯挾陋者之卒以自蔽駭於新而奪其故又夸毘者之無以為本故嵁巖之下寂寞之濵出而用之有不可而廟廊之崇嚴都邑之鉅麗巻而懐之亦非其所能丘壑泉石之載形於天地非獨舎而去之者之不有其樂而終身栖息徘徊戀顧而不忍釋者猶為不知其趣也君之所得如此胡必異日歸休老於其中始為有得於洞泉方綰章紆綬従經營之務而縻禄爵之榮固灑然其常在齒洞之曲寒泉之涘也於是予每呼錢君洞泉山人君輒應曰諾潛源記新安汪君號潛源間謁予欲記之而其所自言曰新安萬山之㑹也吾所居據其髙且奥常好行於其野以舒吾目而寓意焉當其雲雷始霽雨潦方集水發於列岫之間挾盛氣而賈餘勇奔恣横放汩瀄滭湃驚而為波決而為瀾木驟石轉洶其可畏至於滂溢濫肆或迫蹙於隒厓之犯據或觝觸乎􅯲崿之突唐潰亂激射衝蕩凌嘯不能自平而快於為傷敗可喜可愕之形須臾百變何其壯也旦夜方改已消盡無餘向之所見今忽失之如是者雖見為大水而患於無源又嘗觀於其江經流滔滔閱寒暑晝夜而不息舟楫乗載浮於其上首尾相属不患於涸竭槁滯而有涉濟之利原陸園田資灌溉於其涯大酌小挹而無所不足而其涵光浴景納吐日月映燭羣象清瑩澄徹可以數毫髪而鑑形貌如是者可謂之源而不得為之潛惟吾所居數里而近有泉出於山中榛莾薈薉之所䝉翳沙礫沮洳之所淆雜涓涓而㣲行皜皜而自潔䝉翳之所不能塞淆雜之所不能汚迫而取之若無所有徐而俟之又已有餘驟而迎之殆不可見隨而將之未始有窮吾以謂是源也而潛故愛而玩焉久之而樂樂而不能舎此吾所以獨得於此而不能以告人而與吾處者知吾之樂此也久遂名吾為潛源居士而忘吾之名雖吾亦自忘其名而但知其為潛源之主人也嗟乎汪君之取於物者可謂卓而其命乎名者可謂約矣夫材力驅駕意氣鼓舞之士可以恱目前快當身而不可以持久卒於摧蹷虧喪而無成而蹟效出於所養之厚明哲發乎所識之著興事及物可謂有成未免乎動於用而離其本汪君所以觀於其野之大水與夫長江之經流皆有所不遇而獨有契於斯泉嗚呼其知之矣如是而取於物良有益乎志而命乎名者盖精於義矣請以是為君記陟屺增慕記觸於外而動於中其人之至情乎形象生色盈乎天地之間錯峙而林立淆陳而坌出跡之所履身之所到何往而不值於目而或一形一色偶接而驟撃若有摟之而使従激之而使奮怵心驚慮恍焉而不自知其所以然而平日之所憂思欝積跂想慨慕者勃然而起浩乎其不可制則凡岡巒林麓原埜墟井水泉土石草木蟲鳥有鉅有細惟其一值於目而忽有以動於其中至其反究而徐觀之則非岡巒林麓原埜墟井水泉土石草木蟲鳥之能生人之情也然非岡巒林麓原埜墟井水泉土石草木蟲鳥之值於目則情亦莫適為感而生也兹其所以為情之至乎人情之尤至者莫如母子之間而善道人之情者風人之言也魏風之詩曰陟彼屺兮瞻望母兮何陟不可望母而望母必以屺何屺不可以望而必以望母兹其所謂觸於外而動於中勃然而起浩乎其不可制者耶且夫髙土多石崔嵬而嵁巖䝉茸之所蔽翳喬灌之所衣被升危而睇逺亦何與於母而目之所視無他見者其人固有不得自知而亦不能自為言者彼不能言而詩人為之言此詩之所以為通於人情而為風人之作也今使世之有母而不得事者必於屺焉陟而望之又非得屺而陟之則必無以望其母也如是而以學詩豈不為謬且愚哉苟有善學詩者篤於親而不忘飲食寢興居作行止無非親之為思則庭戸几閤莫非屺也雖不升髙而睇逺固與陟屺之風所詠其人者均其孝矣嶺南歸善葉生某蚤失母念之而不能忘也游學四方經行燕趙齊魯吴楚閩越故墟以與其賢士大夫游挾册講誦至於陟屺之詩蹙然而動泫然而出涕曰是詩也其先為吾言之與因取其意題其所寓之舎曰陟屺增慕曰使吾無忘是詩以知不忘吾母也嗚呼如葉生之於親可謂篤矣其於詩可謂有合矣非所謂謬且愚者也葉生過泉因介謁予乞文其詞甚悲嗚呼人有母而不得養而能不忘其思予顧靳於文也其無愧於風人乎故為之記竹軒册記上杭余生仁夫性好竹所居之軒種竹皆滿雪晨風宵森然其玉立琤然其金鳴以為世之耳目之愛皆無足以易此也生又好遊顧以為不能常處於是軒而與其自所種竹者朝夕對也則命畫工圗所謂竹軒者於册東西南北挾册以行晝馳夜宿輒披册而玩則若其身之在於故軒而森然者常拂於其目琤然者常盈於其耳也嗟乎是亦可為篤於好而巧於計矣余謂之曰昔王子猷好竹遇人家有竹則命駕往觀不問主人識否在不在也如此則固不必其家有竹而後快其所好况於圗其家之竹哉生行四方園囿林麓青青猗猗孰非竹者必惟册之為見而後若處於其軒雖其巧於計而無乃狹於見乎且畫竹之似孰與生竹之真也生所為說以反余者則云徽之遇有竹輒造固誠好竹然何其不憚僕僕也又人家之竹有無無常而主人之戸開閉不定吾恐其雖不憚僕僕猶未得常常而見也至於欲去被邀雖意不為忤足名髙致亦涉生迹固不如吾之取於方尺之素而好已足且所謂好於物者豈獨在聲色形貌之間亦貴得其意耳苟得其意則竹之森然立而琤然鳴者誠不出吾方尺之素奚必其根幹枝葉沐雪擺風蒼然而出土者乃為可好於耳目哉予恱其語不復置難因相與披册對玩十月寒風草堂如洗鬢髪䬃然欲疎此君箇箇生面相㸔脩質竒姿呼之不應忽然如命子猷之駕徑造生軒中坐於竹下久之乃知其在予室閱生册也遵巖集巻八

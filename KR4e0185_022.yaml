body:
  text: 遵巖集巻二十二明王慎中撰書與鄭海亭吾子所與于蕙川人書因後書見示始往取而得之向遣人候于時未見此書故不及唁䘮子之戚也人生遭此直是東門吳乃能不悲吾輩自有性情焉有頑然不痛者耶要當以理命自勝勿為所累乃不失正此際最是工夫勿云常情細事也向聞應常州已考績入都曾因朝覲人便寓書問之如子所示則書莫由致矣有歐巡撫便新識應常州士之相得固非苟然取人與取於人皆必有道今人但言受知于人者之難而不知知人者之尤為不易且如吾子為政受毁固多然使彼毁者數輩盡變而譽子亦不足為子重吾輩須認得此意端的始能不奪所守而滛于俗喜怒哀樂中節為達道而又有聞譽不喜聞毁不懼之説無乃近于木石其心而非情耶彼以為其毁我者固不足懼而譽我者固不足喜如使賢者譽之毁之亦豈有不喜不懼者哉善者好之不善者惡之非但觀人君子自考良亦若此吾子以為何如予近来讀易補見聖人之用追念昔者所處所履何以免於災戾大抵乾震之卦必多危辭雖乾六爻亦不言吉至於用九言其所以用剛之法然後稱吉徳已龍矣亢則有悔乾徤知險坤順知阻此何等作用而其歸只在吉人躁人之詞多寡此與老子知雄守雌大辨若訥之㫖何異但聖人無私心而老氏一意自私其身所以為不同耳易之告人未有不正而得吉亨者而亦多貞凶貞厲之詞是凶厲亦正之所不免也夫過剛則不吉多言不免於險阻而守正亦有凶且厲此所以為易之道一也吾輩處世固不宜必有亨且吉之心而亦自有免於凶厲之道每每以此意自檢括頗能不以世故累心但恐信道不篤舊習未除終不免於補耳子去無錫想亦不久時過必行亦易之道也李生黼者僕未詳其行然能潜心講究有稽古之長與虛誕浮薄之士作字寫畫者大不同也今之所謂富貴貧賤者何必其人之材徳足以當之直有幸不幸豈為士夫者皆足以致富貴而此生獨以不肖宜貧賤哉不必深議之也應常州為此生刻二禮集觧向曾許以作序未就也應君見寄一部已為人取去子到毘陵能為予寄一二部来尤望僕病尚纒綿不能脱然去體第為薄祿羈此不貲之軀豈有行志及物之效哉子居彼中頗與人接宜詳得僕過失以相告曉而第以二三好言見慰何也子以為此便足以塞朋游之責乎非予之所望於子也相見未審何時臨書耿耿與歐陽南野自公晉位列卿同朝為學者始有主盟天下方想見此道大明而公復以憂去位不知少湖與雙江松谿三公在朝倡明和集尚能不替公之盛否也竊見一時士風吏治多封已而病民先身而後君豈彛性使然亦由學問道缺本心不明故處義不精而易為放失也覺民救時其道在公或處或出皆有以係天下之重此海内之公言非吾黨之私頌也某閒居以來雖不敢自荒于嬉少有所用其心然夾雜姑息其為不明不精又有甚者無由置身公側日聞開發以去蔽警懦恐卒無所成矣公亦有以憫而教之與向往之誠非書可盡與李克齋俞都閫人来得聞廣中有交州之警度其事埶不過叛將釁臣不得志於其國逃在海中未有所附而剽掠為冦耳想無大志異謀廣中兵力未為單弱既有諸公籌之在上而俞子為將臨敵制變自有所長當即就底平也每觀當今時勢極為明盛安平之候而閩浙有海上之師湖蜀有平苗之役廣中又有此警亦似紛紛然者平陂往復亦世界大分限常使小有戒畏不為無益於盛平而諸公往往有可仗之才自是世道之隆即如武臣中有俞志輔其人何但一障一陴之用其勇略不在近時西南名將何卿沈希儀之下而潔已拊下則有古名將之風矣以此推之何得便謂今時無人也此中海上成功頗為竒偉柯遷之君碩畫妙策有此績效信吾輩之美談然夷人深怨未保永憺華威不萌報復之念否此亦有可慮也弟春来病意稍疎若從此以後益無病則精力尚有可勉學問之事又更妄有所冀於修明之益也老母病已全復得以娛侍想通家之契欲知也余不能一一亮之而已與朱鎮山自鄒魯以後天下言道徳學問所出而以其地之盛為名者曰濓洛闗閩蓋千百年之間能以地係於學問以名者僅四而已而吾閩與焉豈不盛哉近日此道寖微士者以學為諱乃有一二大賢間世挺出倡明斯道在江浙交廣吳㑹之間皆彬彬然盛而閩中未有興者僕輩忝先一日之達少有所聞而誠心實行不足以發之其愧負不假言而司化民成俗之柄之君子亦豈能無責乎賴公之来身任此責閩士其必有興矣若濓水出道州周元公實終定居於匡廬遂以道州之濓名其所居蓮花峰下之溪則道徳學問之倡固在江西也公江西人也来為閩督學使者衍元公之傳以與閩士共學教學相長師弟子交與以有成濓閩之盛今日再見之公豈能無樂諸生安得不勉哉僕以此言講於朋友之間信者固寡而公所覈取諸生之中亦多有不疑僕之言者至於吾弟敬中尤知領略然觀其家庭請益之頃語以文字之要則色喜而心喻其於性命之微言猶未能篤信而勇為豈末藝可悦而淡乎至道無味可嗜耶茲往侍得聞公大道之要吾知其所悦必有在此而不在彼者他日將諸生與吾弟之歸從而扣其所聞於門下者以私淑焉實大幸也臨楮向往不盡與應儆菴昔人論朝廷方隅之緩急比於腹心手足如公之重不使居中宰制崇護腹心而膺方隅手足之寄宜天下所垂望也然手足有疾未聞腹心得以晏然無事則公今日所受之託豈可謂非天下之急哉自嶺南開府設大臣經略以来名臣相望而事業俊偉勲名可紀莫如韓蘇州王陽明公變化運用之妙固在精神難以按圖求駿然規畫措置亦必有跡或可講求見之施行未必無所助於經略之一二也近聞鄭韶州有不得於職拂衣去郡此公最為不欺其心能自信其所守者官雖蹭蹬而其人品固同年中之賢者公在彼而不能伸一老同年之志竊以為公有責矣不獨同年之私也嶺南為郡才力或有出韶州上者自守不變未必有加之者公在彼而使賢守不得終其治又恐天下有以歸責于公也今時耳目重官位忽人品便謂一僻郡老守欲去則去何足深置論不知古人重事體往往有一小吏賤僚之去就而係於政俗之得失者亦不敢輕豈可随時耳目不以為意也弟廢人也不宜妄言唯於公可一發其妄耳非公亦不能諒其愚也冬来嶺外氣候彌佳伏審道躬有相餘不一與羅念菴别久雖不及相望問何嘗一日不仰下風友人沈子来自安成得兄所寄手教留都毘陵侍游丰神宛然若睹浣慰無任柬中相望之意尤切至不肖苟簡自恕以為此心少有所明便倚此小明随䖏把照如兄視之乃是昏昏耳明者視之見其昏昏而自以為昭昭此乃昏昏之尤者也此事非脱出鄉井網罟與兄相從掊擊刮洗使塵腸膩臟蕩滌無餘庶得真氣再生丹元復返不然此昏昏之體終日為主何由得見大明中天也悠悠空度不自發心恐終於此而已臨書悔吝如何可言與李中溪書一庚子嵗在汴臺獲通荆川之問方圗繼續相聞辛丑之變雲翻雨散今思之如夢追談之亦何異説夢也棄置不復云如弟之陋廢而閒居談道著書尚有用力處而不以區區名勢得失者動其意況如兄之髙明竒偉者乎所恨者各生遼絶遐阻之鄉嶺限海帶如各一天不獨兄飬性綴文之益僕無由請而僕之䇿駑磨鈍黽勉一得之愚亦無由為兄盡之也如何如何明倫堂記曾錄寄武進唐應徳兄并與書云此文乃明道之文非徒詞章而已其義則有宋大儒所未及發其文則曾南豐筠州宜黄二學記文也唐君復書盛有所契不以予言為妄也然世之名能為文詞者舉不足以知此亦可以歎近世文弊而有志之士不得有明也周户部誌銘李尚寳行狀不獨其文而已其是非不敢苟者乃吾所以為文之道也兄如信其道則可以因此文而知二人之為人矣家居治心講學之餘不免為人牽挽作酬應文字亦不敢苟而必有法以無刻本不得相寄然未嘗不坐此取謗方用世時好行驚衆之事以召怨嫉今不用而退于家復為驚衆之言以取譏議是無所往而不得謗也然吾亦何暇恤哉非敢不恤也道本如是而不可變恤則非吾所學之道矣兄以為何如久思欲與兄相聞絶無便者兹舍親往佐嵩明州嵩明不知去大理若干里然托黄君以必達也有便幸無忘報我其二想念無已而絶無滇行之便向曾因舍親佐州于嵩明者有所記于兄託以必達竟不得一回信不知達否去嵗正月伍鴻山行可以寄矣而值弟新有内子之䘮才數日耳正坐摧楚中豈復記此故不及寄也此心惓惓度兄與我同耳百粤南詔本遼絶遐阻之地而吾與兄偶生其間勢固難以常相聞惟此心不相棄足矣雖是如此而勢猶可圖以相聞又不宜付之為難都漫然不省也故弟亦不能無望兄之見答也不審兄比来所得何如閩雖逺地然據泉州今已為聲名繁盛之區故弟所處頗苦應接不給如兄所居恐終是簡静也簡静中所得自當與處煩擾者不同況兄才力詣絶又十倍於吾乎故弟尤欲得兄見荅以知其所得因以自朂而求進不獨契分之厚欲聞動止以為慰爾也弟自辛丑罷歸以来八年之間一遭先君大變之後視息苟存勉營葬事已薾然非人矣塟未久而連有母家妻家父母䘮葬之事又族人大小功之服亦相繼而有且多有貧者至殯殮之費皆當出於吾手又其子皆愚并當為之調護指授吾以為此皆學者經綸大經之條件節目不敢不用其誠了此未給而吾室人又亡神損于情傷而力匱於禮至故不得肆志於學問然此事亦未嘗一日廢特其工不専其心不一為可恨耳今士夫居家者田舍戚戚之外則以聲色博奕酒食為娛弟今者惟絶去此數者故亦有為學之功至於田舍雖藉先人之餘不為不厚亦稍有區畫使一二力治之而已不以煩我也獨不幸室人化去上侍老母下撫弱子無相助者此一苦事終無處法故今雖日月已除而感物觸事悲便到心有可念者柰何久不寄兄而此一紙都叙苦楚無一嘉話亦以示家庭無飾之言見吾與兄之好有同骨肉也紙盡不復云云情則無限也其三頃曾託伍鴻山以寄兄今因王賔竹之便再此具候然伍氏子實與王㕘知同行則此二簡當一時至也吾鄉有洪芳洲先生文詞直得韓歐曾王家法與唐荆川君最相知其所作視荆川不啻王深甫之於南豐張文潜之於東坡充其所極當為本朝名家今行年才踰三十耳其文學如此而其為人峻潔忠信卓然有古獨行之操不以世俗之味錙髪亂志尤為荆川所敬吾輩駁雜視之真有愧也與僕亦相知故錄吾所作偶有與此君来往者數篇以寄兄亦欲兄知吾閩中近有此人也其人之文想海内漸當傳之或流播至遐逺兄將得見之既有言存胸中見其文因論其人雖不相面亦自樂矣閩楚相去有若異天偶值伍王兩公宦彼中此吾兩人者相聞之一大郵便宜加意有以示我勿孤區區之望與華鴻山僣叙佳稿極知不揆然於往日㳺世浮跡盛衰用舍之際言之有可感者雖文不為工而其意獨至矣至其所以致推慕感憤於兄者亦非苟然也僕常愛歐陽六一所作釋唯儼秘演梅聖俞詩集内制集數序感慨曲折極有司馬子長之致昌黎無之也常有意學之而才力況趣終不相近此序亦頗有其風矣蓋因兄之雅以稍發吾文而非吾之文能有加於兄也文中徑書尊字他人觀之疑其不恭然此雅道也不可以俗格亂之非兄不能知也僕為文其不售於俗人耳目有大於此者而區區自明其細者又可笑也風便賜教使知可否如何與翁東厓去嵗之事草野所聞已不忍言況公親見其惨又膺其責其為痛心疾首又可知也正當仗公英略碩畫一剪此醜以雪畿輔數萬生靈之憤而遽有所罷天也非人之所能為也方公起時僕聞之慷慨增氣為賦十詩未及尋便寄公不久而聞罷報矣然詩在篋中他日小集載之自是一題目不但稍有佳句為可存也既存稿於家亦不免使公見之想憂國赤忠一日不能晏然自休而覧吾此詩又當增一感慨也何日再見公之出為國家立大功而果為生靈雪必報之憤也鄙人日夜望之臨書惘惘何由得盡與陳虞山郡幕陳君未來傳者已知為公之猶子日夜望其至欲一問公起居及其至乃獲領公手教下懐仰慰如何可言且知公春初體中不康久之而後復既懼且喜今海内耆舊淪䘮殆盡獨公巋然如靈光之存雖不用於世然以一身存當世之典刑起後生之瞻嚮其所係為不少而其功亦不為無所禆於斯世者矣故某尤祝公之筭於無窮以久為世道係也奏議序已竭區區之思所以發明推仰之意竊為獨至此非敢以為報賜之效蓋此道自當如此有前修先達則必有後進晩學能言之人為之形容盛美以行於無窮此道甚雅而今將亡矣故僕偶得託公之奏議以為此文而明此道於將亡之時亦自以為幸也惟公鑒之與李三洲書一頃從淨峰公處見所屬吏士所為此公紀述大征之文皆意義猥陋詞采謬劣真不足以鋪張盛美揚厲壯鉅文字之學不講於世其誤不淺揚雄賛趙充國韓愈紀平淮西猶云近世詞章之事如𦙍侯征羲和伯禽平徐戎僖公服淮夷與夫宣王中興而申甫樊謝諸卿之功使不見於詩書孔子雖欲存之以為後世法亦何所考據而傳之耶僕謂淨峰公之功烈既已不减吉甫方叔而作者無人何以嫓隆周雅載之無窮也不獨如此也周人有雅而宣王之興始有考於後今作者無人何但人臣之美不著而已且無以昭聳有明之功徳於漢唐之表尤可憾耳今此公又當與公共底平蠻之績楚多才士宜必有能著其美者僕竊願見之幸無惜一示及也僕之文極不為今時所好常欲存之以示後不意公獨好之故聊及之以資經武之暇之一談不然此言也其不為妄且易與晉人之言善為師者好以整又好以暇度公之整且必有暇也故論之如此幸有以教我僕將因以知公之暇也其二公在邉有征誅之謀籌兵筭敵諸務方棘在他人處之宜嚴戒􅀈􅀈不遑朝夕公獨能論文觀理窮眇造微有講習之益如在氊茵燕息之間信可慕也僕前唘有能整而暇之説以今觀之公之整也甚能暇矣僕嘗言爼豆之中有軍旅蓋其精神嚴固志意堅卓可以周乎經曲千百之中而不亂則所以三軍敵千萬人者是此事也衛靈自以陣法為問殆謂王孫賈輩之所治此豈孔門之學而所謂聞爼豆之事者自以正對非婉辭以為拒也當時衛公既不悟後世儒者亦復謬解於是軍旅爼豆判為二事而雍容細謹為文儒之習暴厲悍忮為武人之長蓋道之不明如此何意於公一明兹惑淨峰蓋已進於此道公與共事尤為竒特湖南之功知非二公難事所示文評足欽髙識僕為此文實不期有能好者之出於今要以待於天耳何意有公與我同好也其敢不為公盡方欲詳論而使者立於庭不能少留半日故未引其端俟専錄拙稿訪便寄去併為一論之也其三仰間適得唐博士所持公見貽書教欣慰無量急發緘莊誦仰見大賢之度直以國家天下事為心而不以一己得失自撓既深歎服亦自喜能知君子之心而彼區區以小人之腹相量度者果失之也然公以今日所處為辱恐猶有少介然於此矣公事功進為身心修益昭然在中外至於當事任責卓有所見與共事者不合不肯少改以相狥坐是異同失位而去此亦俊偉明白事也而於公豈有辱哉公於僕所喻無間故僕輙盡其愚如此若夫一書之中首尾反覆惻怛洞達誠有古大臣之風他日任天下之重開誠布公忘已用人以共為天下之事非公而誰竊為天下望之嗣此尚再布其四兩賢同時而不相知者自古有之或學術講明源流逈别或事功建立䂓模絶殊然要兩不失為賢耳又有兩賢相知而偶以共事意氣論議一氷一炭至於事已論罷輙若金蘭此皆古人之所有果其為賢正不在於事事牽合言言勦應也僕於公與淨峰公幸辱一日相與之雅竊知二公之皆為賢者也湖中征苗之役一氷一炭僕不以為恠蓋古人有如此者然不知二公意中能絶無所介而懽若平時否嘗有客過我草堂談湖湘之事云淨峰之功且成者客曰此大非李三洲所喜吾艴然不恱以為何待賢者之淺大抵俗士無識往往以己心度君子真可笑也僕既斥客復舉以似公夫異同起於國事而平生契誼不為之損非公之賢其孰能之僕非知公之深亦不以及也客又有談公與張公一在官中一在家中各絶口不談及前事此雖氣象深厚體段凝逺然又近於有意者僕亦以為不必如此也不知公亦以為何如平生惓惓仰慕之心欲公即出以膺當世之責而見吾道之行實如饑渇臨紙殊不得盡伏惟有以教之不宣與李嵩渚汴上宦游無他所得惟幸與公相見因屢欵芳論揚榷於風騷之塲此為有得耳嶺外中州相去甚逺無由與公相聞惓惓之意想彼此不異也居閒或追數踐厯事跡輙有感歎蓬池之上阮公長嘯杜甫與髙李登吹臺悲歌酣謔皆傳為後人美談久而不泯吾雖逰汴豈復能使其跡有記於後耶然諸君子當時皆旅游寄寓其跡為竒吾方擁旄乗傳從事於文法體埶之間固不能為竒如髙適持節彭門今人亦不復道説而瀼西䕫門杜甫融顯之與漂泊其得失固如此夫吾今已廢宜可以為竒方圖出游自計已悔少日所作而仰希聖門狂簡之學果其逺出又不能為竒且將被逐見譏糧不繼而樹遭伐矣以此疑而未决敬舉以似公夫往者既失之而今又度未可得幸有以釋其疑而决其計也數年不通書又不作寒温之語而獨質以吾所疑者盖望公之至請勿忘見荅也願言之懐殊不一一遊記二篇聊復請教與汪直齋學記久稽復命至煩特使逺至罪負何可言其所以遲遲而負稽逋之罪者亦欲竭其鄙陋之意冀有以言之可觀者以不重孤執事之托與吾克齋之意今其文成而鄙陋不足觀如此抵重自愧耳自有序記文字以來諸名家之文為記學而作者唐人皆有愧詞雖韓昌黎夫子廟一篇亦為劣盖唐制立學不廣不但諸家無名文而諸家之文為學而作者亦少惟采慶厯詔天下立學制始盛於郡縣而古文之興亦自慶厯以後故宋人之記學者其文甚多然惟李旴江袁州歐陽六一吉州二記盛為一代所傳二文要為差疆人意在二公亦非其至者至曽南豐宜黄筠州二記王荆公䖍州慈溪二記文詞義理並勝當為千古絶筆而王公視曽猶為差貶焉學問文章如宋諸名公皆已原本六經軼絶兩漢而記學之文其難為工如此况鄙陋無能如不肖者而敢妄希有一言之可觀以副執事之請耶惟望改削使不甚紕繆然後入石庶不辱盛舉也碑成之日得搨數十本見寄尤所望也與紀山侍御乞集序書竊謂文之在於世乃天地所具設民物所露呈而聖賢者獨能觀取而類撰之故雖聖賢不常出而此文未嘗泯絶以天地常存而人物生成於其間如一日故也不然以某之愚何能有知而敢與此文於大晦幾絶耶以其不明之久弛壊殆盡而得與於此文者乃偶出於某之至愚其名姓事行官位年輩不足以驚動人之耳目信之者必不篤從之者必不衆固知無所益於此文之明且行也然所謂明且行者非人人皆信而從之之謂有一二大賢者學通於今古之得失而其言足以定是非而曰是文也聖賢之文之遺也則可謂之明矣執事之言足以定是非者也不肖願乞一言序而存之以俟同好者共論之非期不肖之文行也將有望於聖賢之遺之傳之有明也惟執事嘉惠之非不肖之幸也古之序人之文者皆不必其既亡而其人之文之刻又不必其人之尚在故不肖敢力辭執事付梓之舉而僣妄而為之序惟許其辭而副其所乞則予文之行自有同好公論矣與陳少岳無所因緣而相知此特達之誼古人有之而非世俗所宜有也公於鄙人一見而有辱交之意且其意已存於未見之前神情契合有不在接遇談説之頃者豈非無因緣而相知者耶公才學徳業擅名一時人方有望於我而我無所資於人顧獨惓惓於鄙人如此信古誼也第愧頑拙謭陋行能學術無所比數有負特達之知耳頃者談及鄙文有欲見其所作而教之之盛心僕既無他長惟於兹事有少用力處方願為公一出以求鑒正而況其有意欲見之乎謹錄數篇褫為二冊蓋家居之作此亦十之六七矣倘蒙覽觀定其可否而特賜一言之是非使知所向實大幸也僕於文字固有用力而文字之外不為無所用其心者惟公觀其所為言而又求其所以為言者則僕之用心為不孤矣然非公亦孰能觀之瞻溯下風敬俟鐫誨與沈古林頃見書院中所刻雙江論學四劄切磋講明吾道之幸竊見劄中往反之意惟南野公之義為精而雙江公所駁反不足以易之者倘得二公之劄並觀之因以究其往反可否之詳則於至當歸一之義雖暗劣如不肖亦或得以有省矣惜不及見也公以為何如舍弟輩還敬領尊教仰知惓惓相誘之至續於葉生處収得見寄試錄葉生於後進中最為佻㒓既見公之後氣質自覺有變信乎人之不可不聞此學而賢愚大小皆必從此得益也王武陽在莆朱圌泉又繼來漳州二君皆卓然有見意究竟此學欲與同志之士共為之今武陽蹔以試事離莆而朱輙擢他官以去真可惜也今公且投此種在閩中待後來有人相與灌壅耘鋤則必有豐年矣使吾閩有粒異日當思誕降嘉種有相之功也僕已是下得荑稗種子雖逢農師亦徒覺費造化為之柰何來教猶且退然自引以為勉我之地此意之厚真何可當龍谿公㑹言似覺誘掖意向之詞太多而直截指示處微欠豈接引之法當然耶然使學者人人得見熟讀深味自不為無益公嘉惠盛心亦可見於是矣憲節何日離閩便中示及當圖領教也與黄洛村使至得領仁兄手教深慰懐仰且知官中有獨賢之役而仁兄之意不以為病僕於此竊窺學力所在夫獲上治民乃誠身之功是知唯諾進趨皆非鄙迹鞭撻追呼不為俗事今之君子不知為學其於事使之際無非畔援歆羡之私就其最材且智者於上未嘗不獲於民亦能有以治之而非誠身君子之上獲下治矣由其不明乎善也仁兄之學驗於實際宜有以自樂僕亦能與知其樂若乃當道倚託之重詢謀之信與夫歌頌趨赴之出於民者豈所以語仁兄之治獲哉僕索居獨學極知寡陋常懼所得偏蔽不足以合乎大方偶因復教妄論及此非以揄揚盛美實欲質其所見以求是正如其契合與猶為乖謬均乞賜之一言使知可否則為益不少矣病中未能請正於問學襍詩十首錄稿呈教此亦欲知可否者也與傅錦泉南宫奏名為天下第一吾黨之喜可知也然不敢馳書修賀問之儀已於家問中屬吾弟道原為述此意不圖執事者不罪僕以自外而辱賜之書仰知執事所處之雅矣書中詞㫖見待尤至鄙人何足以承之此誠執事不得自諉雖海内一時魁宏傑出之才猶不敢越執事而當此也況以責之極疎至陋之鄙人乎皇恐不敢聞命人之才力賦受各有所至不可疆致亦難以相易以韓昌黎之好古而經訓不敢賛啖陸輩之詞史法不能與劉知幾之論雖晩作論語解及為順宗實錄實錄非工筆論語解不能行也有宋蘇曾之賢而窮經訂史亦自為人二公不能兼也是則執事所論乃唐宋二三名家所未能及僕又何足議於其間而猥以見待耶此僕所以皇恐不敢聞也抑所謂憂勤惕厲使天理常存人心不死者僕亦竊有所聞焉而非如執事見命之謂也未由奉質書不盡言與尤思所伏審尊眷至任亦且多時琴瑟在御蘭玉滿前其樂可知又望大椿於雲山之外輕繫遥思而家人能言其居起之安志意之適亦足樂也即吾所以致思於父母嘉育乎妻子者以盡心乎民則所以老一邑之髙年而慈其幼者只在心誠求之之間必不至於逺而不中矣思所以為何如遵巖集巻二十二

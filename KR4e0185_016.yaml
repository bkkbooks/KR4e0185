body:
  text: 遵巖集巻十六明王慎中撰傳陳紫峰先生傳嗚呼士敝於塲屋之業而固陋浮淺牿其心腑專一經以自業茫然皓首尚不能通其義以傳於繩尺之文又烏知所謂聖人之學哉宿輩末生相尋以敝自虚齋蔡先生出乃始融釋羣疑張王新意推明理性於字析句議之間以與前儒相統承夫所謂聖人之學者其駢拇於條畫枝指於解訓要以詳夫塲屋之業而其意則進乎此矣虚齋之學方顯士猶鮮能習其傳而紫峰陳先生生稍後自以其意為前儒文公朱氏之學未嘗聞虚齋之說也一日虚齋得其文於故長史李木齋公所嗟異久之李曰此吾徒也虚齋瞿然曰吾乃得此人為友足矣不敢為之師也於是先生乃介李公禀學於虚齋虚齋曰吾所謂發憤沈潛辛苦而僅得者以語人常不解不意子皆已自得之今且盡以付子矣於是講為師弟子虚齋得先生而其學益尊蓋虚齋有託於先生而先生無所待於虚齋也先生之書布於四方家而有之學者治經求通於朱氏微先生之書如瞽者失相從禽無虞倀倀然不知所如往士之專精自名所業以授生徒者往往焉書其卑者望先生之外藩而不見其門其髙者不能以有加也故其為書矜名立號何啻千百皆滅没蔽塞小行而不廣暫誦而輒廢惟先生之書焯乎昭布大行而久存雖與世相敝可也今書肆所板四書淺說易經通典是也嗚呼可謂盛矣先生姓陳名琛字思獻别號紫峰學生稱為紫峰先生正德丁丑進士始授刑部主事乞為南京户部以便養轉南京吏部考功請告家居就家起為貴州按察僉事調江西僉事皆督學政並辭不赴考功督學皆美官假令徊翔不去與牽挽而出又當有美於是者穹階峻秩當世有用人之柄者急欲得先生畀之以自詭得賢之名先生乃勇退而堅卧無㡬微遲回顧望意世竟不得而榮之蓋為母太安人之養也篤於天性而不見有可懐之爵祿由其大以推其細則先生之學著於書者非苟能為言而已也家居却掃一室俯仰其間察見消長於草木葩卉榮悴開落之際景象委蛇與物共得一枝一葉照映闌檻人所同視而先生茂對之趣獨逺矣時放於山砠水涯漁樵相問或寅緣原隰農圃滯談彼各自為話言先生觀取感倡黙有所樂不問其解否也絶跡公門監司郡邑諸大夫冀睹其面為快注意傾下先生拆簡相報或報以一詠而已亦不盡報也其有報不報惟意所到不視名勢崇劣禮數隆汙為度量也由先生之大推之既無可懐之爵祿又烏有可羨之勢利可畏之毁譽而舒心綽形以遊於世宜其浩然自適而一無所累也先生在仕不久事功無所表見為刑部好在生人不喜於得情為户部謹於利邈不以自汙此皆砥行植節之士所能不足以論先生之大也昔由求言志千乗之國方六七十里之邦自課其用所以使民有勇而能足者可計嵗而見效何其確也若夫及春而制袷與六七童子五六成人為侣望沂而浴見雩而風此何為者然孔子喟然而深與者乃不在彼而在此其意可知也以先生之髙使與曾㸃並時而生同門而學則鏗然舍瑟之對曾㸃必不異撰於先生而喟然之歎先生宜越由求而見賞矣始丁丑榜得士吾郡最有名給事史筍江公於光今僉事林次崖公希元中丞張淨峰公岳與先生並以經學為海内巨公張公尤號為閎博而傑於文給事公淡於仕進與先生同趨好滯一官以卒僉事公喜事功齟齬於世迭起迭仆卒無所就中丞公方據融顯事功為一時絶出然林公悔其顛躓張公亦以酬俗成務為多憂而恨道之難行未嘗不髙先生之決而慕其清也某生最晩猶及侍言於給事公林公張公皆辱俯與為友忘其年輩之後也謬學乖駁與二公有所往反二公不以為是予猶謬自信且不揣而思有以易二公也獨不及事先生而請其說然以二公推之知其不予是而予亦宜無以易先生也然而知先生之心而能言之者某則不敢讓也先生之書其天趣極詣神機妙契在於言語文義之外而已至於言語文義之所存字謹其訓句詳其義顓名一門粥粥然如恐涉他足而誤塗徑固與治塲屋者設為如是耳其超然心㑹離去形跡而遺忘物累庶㡬所謂不枝葉於道而全其真者由是以推先生之大然則論先生者不徒有考於其書而讀其書者尚當以有求先生也與如是則小子雖不及請於先生而傳先生之學以明於人固其宜也丘中丞傳嗚呼功之難立名之難成豈獨生才之難哉時變之隆汙而趨背異其得失人情之好惡而忤合乖於愛憎因時者其事便而見為尚通矯之則足以尊已而鮮濟於時忤衆者其名髙而見為寡偶徇之則足以同物而不嚴於衆夫其愛財之禀既專致用之宜各適亦足以事副其功業載其名而時變人情之難一如彼故有智力足以因時而固矯之以求濟趨好足以同物而不忍徇焉以取嚴宜其收兩得之功博兼獲之名而猶不免於違時之咎憎衆之謗此魁磊閎達之士所以常悼恨於功名之難也中丞丘集齋公名養浩字以義由易經起家為進士值今天子新即位盡更正德以來弊政士大夫興慕風采爭欲為材公於其時自視不獨在同輩上直以古人為不足為也賜第未久即授牒知浙之餘姚縣餘姚於浙東西為最劇公為之績業奮起日升月長賢名四出無足而馳疆聞壤望或愧恚不及或傳講以相師勵不知丘餘姚為何如人大江以南部使者撫臣相語炙口至倡以激其部邑士大夫行過浙東西訪為吏之美者於其土必聞餘姚之名他令森立踊企非不見為賢皆掩於公聲翔於朝遟以為法從考滿召為試御史閱數月真拜方廷中清明侍從皆極一時之選公居其間如楚之在薪同臺多自以為不如令下當議事倚待決公必得聞雖入臺後而預政與宿舊臺僚等大夫中丞咨訪有加焉公卿多欲致公與相締投雅公汎如也不適為好與雅者尤愛而憚之時方清明而當柄大臣進退危疑繋國是得失士心趨向已潛有移奪化蘭為蕭㡬在忽焉公獨早覺不失足他徙羣公中有憂國捄世持衡於消長之際冀以負為勝倚助臺中明於得失如公曉然不移者可一二數凛凛乎有寡助之嘆公亦以母喪去職比起服入臺枋臣改置國更其是公瞿然内憂端居深念未有所發而公未憂去時嘗首論議禮大臣再論宦侍又論戚畹當事者忌其然不欲令久處臺中公故有文名㑹南畿督學憲臣缺即奏以公往公亦樂得其事謹條教考藝文專意於作人興學自是不復與臺論矣及終父喪再入臺臺僚多變易宿舊少存者因黙自悲欲乞外而臺資已髙於格不得外授上方蒐討古文建典禮於成周之上營立九廟務極曼碩以稱嚴祀制璽書畀公董視其役久之資益髙遷拜南京大理寺丞蓋公在臺其去來逺近之跡淹十五年通其入仕之日殆二十餘年人旦暮望以為公卿公尤雅意本朝以天下善類消長為計其口誦心存未嘗一日不注於海内排擯放廢之名流唯恐其老死而不叙收甚於己之失位而咋舌決齒於怙權妨賢之夫如不欲與共立每一縱言目光横射意氣捷出傍聴激竦頗以此取嫉特以前後所領職皆有制書專事視學董役有以黽竭自效得不以極言充責意氣雖過而怨怒未集知之者則信其果有志於世也為中丞巡撫西蜀則以權當其力欲變一時偷晏之風官司相蔽給以具文而慮不及職持三尺法為市苟娛大室要津交以自肥而瘠民公惡之若仇又能窮其微瞹穴竇關節探窒解剥無毫髪遁失汚吏猾豪營搆巧秘狙伏鬼倐見摘皆驚謂神山谷遐深砦碉昧阻寃苦疾痛舉在目前户行家到未喻其悉其所長如是諸司既已逆為公折詘公尤思震動恐聳之警其視聽而新其氣以作起功庸然後與為寛碩以樂其成非專以察斷為嚴而愛不濟者也蜀人已害其不可動而公在西未久功名迅發精采先於諸路時江西撫臣張淨峰公擢總制兩廣朝論以張公名臣難其繼移公往代於是忌者始側目思中公而害者以流語乗間潛行公亦抗章求退以避之蓋公在蜀其意未究其治未終而徒見為多威以宋張乖厓田元均之賢治蜀寛猛不同未聞論者優田劣張然張易嚴以寛必在民信之後而比民之信非前後八年不可雖其自言亦曰只一信字五年方得成公為蜀未期日月淺其所能變動者精采氣勢之間耳然以武侯論治次第求之則法行在恩加之首而知榮乃限定之餘公所施為正不為悖而獨執未究之意以訾偏據不終之治以疵猛是使仲尼子産未終三年而且用以得殺也習苟且養交私上下相玩之時不愛出力一矯之疾雷破蟄享􅀈蘇之快自是瑰偉絶特不愧道說又不當論其究不究也公濶達恢廓如無所擇而簡别精審細入曲折具有條理憂時憤事殆不可堪而器貌敦博無小丈夫悻悻之意為文不規規古法才馳氣駕姿態俊發有以踰人晚善為詩歌藻澤腴贍聲韻平妥篇出皆可詠也其最長在奏對移駁之文指畫利病摘抉情偽元本法令緣飭以典訓使躬受者讋服側聆者省畏張公誡民集王公異斷令不得見度公所移駁當不慚也天性篤至内行甚修事父孝謹有對則立有諫則跪不以既貴少有所懈事兄如父撫弟如子一門之内肅敬而和雍如也入室燕笑有則與夫人相敬不為嫚䙝無飭容侍御之人其不邇於色非情溺焉而矯為制者於族姻厚有用情之過至以䝉謗而人知其仁之所存也今仕者往往毁其土之惡以自明所難公在餘姚深言其君子達理可與慮善其小人明法而易以去非比入朝縣之士民至京師者必見公問起居安否何如曰吾賢父母也久而益篤其在土者飲食必尸祝公彌嚴於為縣時後令至未有所為民輒相語曰得如丘公無按山海闗所薦士皆由伍中拔起為名將而論留馬永一疏尤有烈士之風在蜀以薦何卿被言者所衊然天下皆知公之言當也其在臺大獄起故相永嘉張公來視臺事巧者皆曲意媚之以求進用公與張公同年才名又張公所欲收嘗語公得君與我閱稿獄事濟矣公遜謝不能而已張公滋不恱公卒以憂去免已而附麗之者多至大官公還臺視之漠如公嘗以言事一謫推官旋䝉召復一下詔獄未㡬得釋而意氣不少挫嗚呼可謂明於大義尚風節偉丈夫也始公受命赴蜀寓書於余有不俎豆張忠定之側非夫之語觀其詞㫖感淬將在前修林見素彭幸菴胡靜菴諸名卿頡頏之列單車入棧志意慷慨有叱馭過坂之心何其壯也今其風烈雖著而緒業不竟談頌方顯而謗懟過半又可悲夫公歿余哭之哀其子維楨出公篋中故書予檢數十札皆京師貴人所與公札中亹亹皆美詞余謂維楨曰此皆不足為尊公重獨趙太史貞吉一札寂寞數語有云僕嘗揚言于人人使蜀中得借留集齋三年百姓瘳矣斯言僕與公皆可無愧也此札所言宜使當世知言之君子共記之耳維楨謹藏而錄之公葬太史孫季泉公狀其事而半洲蔡司馬公銘其藏余於公最雅故獨論其意而傳之而狀銘所載皆不複出也黃梅源翁傳梅源翁姓黃名以盛字大宗徽州休寧人也以季子方伯君福之貴贈為兵部職方司員外郎然人追敬翁者不以贈官故而猶以其所贈未足以償其所積也方伯君以直道清節顯於當世然人追誦公者不以其子之賢故而以為翁之隠德乃能有是子也休寧之俗善賈水航陸輦山負海涵轉貿而行四方名都㑹衢浩穰鉅麗下至絶陬遐聚險昧幽阻足殆遍焉要以射贏牟息美服食輿馬僕妾營良田好宅或盛燕遨廣結附以明得意相矜為賢翁生其鄉故亦為賈然其意不為相矜以利獨為二親故行賈以為養也言信情忠遊江湖間人莫不以為誠而任之其規時合變損盈益虚巧而不賊雖不矜於利而賈大進家用益富以有餘貲足以娛其親矣乃棄而歸專意以養父存耕公母周氏存致其愛病致其憂喪致其哀皆出至性有好禮慕學之士所不能勉而到也事二叔甚敬每食必先之曰吾父之所愛也其妹之子孫家落矣翁資以貲使其長子雷挾之以賈家落乃起曰吾父母之所愛也鄉人有乏輒貸之薄其息而緩其入終不能入者捐之焚其券以絶其後曰吾父之所教也教其子必以循禮好善於諸子中察其季子獨賢而勵之學曰吾祖先父母之所望也晚嵗卜居霞闗闢裹由之田數百畝以耕焉廟寢堂室搆之必合其度隴畦溝塗墾之必盡其力子弟僮僕用之必悉其情雞犬羊豕食之必得其性樹木蔬蓏藝之必遂其宜不奢不儉具適儀節用天因地智術刋除前亢後遺情事完安翁蓋自是老矣裹田之最勝者曰梅坑泉出石中溢而為塘環塘古梅數本根礧砢而枝輪囷幽姿異馨與水相映其清瀰澈公尤樂之行吟坐嘯婆娑其下忘其時之邁也因以梅源自號亦以見志云翁之迹賈也而其意非賈也惟其意不在於賈而迹姑託焉故其行特不類於賈非獨賈不類也有為士之賢者所不能至焉予懼世之知公者以為因其子之貴而尊因其子之賢而傳且溷以賈之跡疑翁也故特為之傳以行焉庶休寧之俗有所慕而勉哉柯母傳教必始於閨門而婦人之言行不記於世則何以教焉疑古者於女有史當與士也偕重而兼行而婦人之忽不見記殆史之失與左氏於書尤為取多而志繁而所記婦人之言蓋介之推叔向公甫文伯三母而止爾歜也之母著之為特簡其二者猶因子推羊舌肹之事以得併著不專為婦人記也其寡且略如此所記者特其言耳豈其時教化尚存禮之在於内而可則者婦人習行之猶多惟其言之深切事情原本名理為有士也之德所以貴於婦人而可記也然則所謂女不言外而内言不出者固以女之好哲而攸遂而其所言必其不可以出而亦有所不得而言者耳至其切事本理而有益於教固其所可言而亦未始不可以出也以其言之獨為可貴記者不得以多則知其能為言而失於傳者為有憾也而彼左氏之博取猶失之寡如此則知其有可傳者之聞於人而人不能傳之以待史氏之取亦為有失也惟其衆聞之而公傳之則婦人之不泯於世為有可冀教之所起其必由此夫吾所為傳者今憲副青陽柯遷之君之母羅孺人也孺人既歿而其言存於今由遷之之向道篤學克存其言其以道為可信而學之可為以發遷之之智而果其志由孺人也正德間餘姚王陽明先生倡學東南其以御史中丞靖宸庶人之亂至池州孺人為其子曰是以道鳴東南者盍往從之如因斯人卒得有聞汝其不為今人矣富貴何物徒仡仡章句記誦間與庸衆人同趨好也遷之君既見王先生盡得其言今以學鳴於時王先生之舊遊髙第多以遷之君為畏也始王先生倡學士大夫之不知者聚為􅀈嫉其賢者亦以異見相攻蓋今雖盛行而譁之者猶不為少孺人獨於其始倡之時使其子往學焉而其言如此豈不賢而可傳哉孺人於事舅姑孝相夫子敬而能敏接内外族婣之屬親疎等殺有節尤厚於恩馭僮婢有法而不虐皆有列女之行予特著其言之可貴者以附於左氏之義以為世教予觀左氏所記三母介推之母獨能與子偕隠不為援怨非有以發其子也歜與肸均為有賴於母之教而一取備官之歎一蹈尤物之禍卒不足以副其教而叔向之母反以料子之凶見名為智又其有不幸者孺人能教而遷之君義成之不獨其賢過於左氏之所記而所享報其所貽有可貴者是亦不可以無傳故為之傳易翁傳易翁無一命之爵百鍾之藏以為人福威處地不廣言之所加在於族黨閭井之間耳而所以加諸其人者言而已美言之動人若受粟帛之賜其以為戒則恥甚於箠撻族黨閭井之人少於翁者舉以為父兄翁亦父兄其長者至其言之有益於人之勸沮雖為所父兄事者不敢以齒自老故少翁為不足聽也出入作息貌笑飲食無異人者其所自為業舉廢居積取贏自給世所謂求財利之事也族黨閭井感愧於翁言者其人私相問語云翁何所異使吾與若能為勸沮如是翁所自言則曰吾無他異惟於事心所可則為之其以為不可不敢為也於人所為心以為然則口云然其不為然不謾曰然吾果何以異人也且所為勸戒於人者以為與鄉人之道當然耳固敢導其所為禁其所不為哉翁沒既久人之及事翁者猶曰吾父兄云俗趨益降敬讓敦朴之風微少者凌長卑者藐尊視勢財腆瘠涼熖為隆殺而機數權力相長雄傾危者得志則榮樂失志則慚縮雖福以粟帛威以箠撻猶無益於勸沮有云聞善人之言而知勸沮如推舟於陸其說必不行矣則翁之風其可使遽泯泯不存於世顧以所處卑約行事忽焉而不記耶於是為作易翁傳翁名某字某鄒宜人傳無錫華子潛君之母鄒宜人卒來哭甚多無不哀盡者宜人以其夫奉政大夫公之富其子學士君之貴享年至於七十有七所治家事廣體鉅厯年且久恩愛所慈䘏禮際所遇接無失其宜故其卒得哭於人多且盡也奉政公富矣而子潛能以才學自顯於時不以財掩其名子潛既顯能以脩潔謹厚自立遇讒而蚤退不以巧容其身由宜人教之然也宜人於其家所躬執常在紉紃績緝烹割調胹之物而廪庾庫府精稻兼金文錦良器之居畜度籍出入貿徙無漏籍賦僮婢以職常以微言感諷不役以威鞭朴弛於閨庭其所任者職莫敢不自督智者効計力者用勞嚴於課責貸人每薄其息收利逾厚售物當直矣復少益之輒得欲售者來歸槩度所予直卒不為損其寛而不急德禀良然而終以有獲於予之為取之權固有合者又其才也易設家人之卦其辭告人以為家而繫富家之吉家人之義歸於正家而富家之道存乎辭則所以為富蓋有正焉夫其用時因利以索天地之所出分事起功當物適節生庶品而洽百禮而婦人能之豈苟然哉家人之義初以為子間其法於下上以為父制其威於上而後四之為妻與母於内者得以治其間而富焉宜人於夫與子之間有以教且相之使學士君察與其兄典簿君宇得以閒其政奉政公得以制其義而偕享富家之吉其所成所助如此不獨能以其家富而已是可傳也石淙貞夫小傳石淙子中年亡其妻不更娶或有問於石淙子曰而之不室其為思乎曰哀有數而情有極日逺日忘吾豈能無與人同哉且夫思其亡而不室以副之是躭而不士也使吾思之不忘雖有室猶思也已忘之矣雖不室猶無益於思也吾豈為是哉然則其惡敗乎曰配匹之倫人道之大也制義而能别士之事也豈以有室而斁德哉吾少也有室苟能不敗豈其彊且艾而惡之且人將於是觀行道而考刑家焉若之何惡之然則其慮患乎曰世之以繼内禍家者有矣而以福其家者亦不絶於世吾安得獨疑人之女之不能為福而過料其身之不能與人之女共福也而先為慮以絶之非所聞也然則其養生乎曰吾養備而動時則六氣不能病之矣且夫交接有節而和樂不淫祍席之上固所以安身而定命也必欲絶倫偶配合以養其生是異教之所云吾不謂然也或者不得問曰異哉夫夫也吾見世之不更室者少矣其或有不更室未有不居一於此者矣夫夫也皆不謂是也不亦異乎於是退而偵其實曰是必其人微而名家莫之與女也則石淙子之門獨名於州州之巨室慕其德而願以女侍巾帚者皆是也是必其家貧而力不足以具財也則其家故饒於貲粟之積於塲足以振四境之乏而無不給鰥夫曠女待其資贍以有家室者不知㡬何人也是必其子頑而持其父使不得娶也則其子長而且賢日夜以請於其父欲有母以共朝夕至不得請則屬其族人父兄外姻子弟交游長老以為請而石淙子不變也是必憋懯侗蒙麋鹿性而山谷姿好去人倫而專娛窮處者也則石淙子方以恩禮敦叙一家以及其鄉之人其祭祀時而婣睦厚賓際不倦而望守相親非所謂好獨而離羣者也或者渙然以悟曰夫夫也其抱貞而處載和而游行乎其心之所安不以物累貿其樂率乎其性之所可不以名跡滑其天故未嘗不重思亡故行古之所未有而不以峻自矜為人之所難能而不以怪自異吾不知所以命之彊而名之曰貞遵巖集巻十六

body:
  text: 遵巖集巻二十明王慎中撰雜著哀新寧文吁嗟乎莽㳫迴互峭崖千里隂風振壑黯霧擁坻亂崖峭寂浩潦何涘惨繚戻兮摧石未平燼草猶靡鳥驚下而還飛獸狂顧而不止凄風曀其蔽天朝暾矇兮無際僕夫怳以告予云新寧之舊壘爾其攅壁嵣嵑峻嶺岝峉谷隠林亘列峒晝黒交壤猺獠接路獞貉險控新恩潜襟梧桂漰湍洄溪於焉縈滙虎豹之所窟穴􅚦猨之所蹻跇乃有逋主憝夫逃遁王誅據害乗危徼竊傾狙斬木搴柵夷石鞏郛矯靈竄命肆其毒痡朘人脂血劖人肢膚於是轅門戒變分閫稱師大將憑怒元戎致期直天狼而比戈拂攙搶而建旗則有邕卒儂兵材官募手勢壯虹霓聲揺海岫組練江明輜軿雲凑騎躪躒而龍驤笳嘹亮以兕吼截水合圍羅山離陣懸賞先登誓僇後進帥争取弧之庸士賈投石之慬將計馘而叙勞懼俘剚之弗厪遌徒奮鏑觸形投刃委骨成邱流血為浸腐胔野腥崇尸蜂隠鯨鯢遯兮鱨鯋危狻犴藏兮㕙猲悲㣲命哀兮誰别抉天綱兮裂地維信事危而器凶胡玉石之云持吁嗟哀哉兮生為㕓良死為國凶賊也可避兵兮孰容耒耜棄兮身首離弋綱廢兮肌體戕舉腰膏兮齊斧束腕約兮檻車魂結寃兮日薄氣搆憤兮雲長鬼嗚嗚兮夜嘯慟妻寡兮子孤吾聞夫姒禹宅岳矢謨敶德干羽舞階有苗來格方叔元老新田興師厥猶克壯荆醜于威亦有良吏易劍市犢弛捕伐渠以靖方國赫赫張侯一言降嬰應㨗風偃附靡角崩顯允虞公寇殱于縫境屏凶孽以奏膚功德文罔逮武略乖張衆不見牧棄良于殃中林求馬河上抽矛軍行甿睊命賤勲豪萬夫旋凱四野悽號砦帳所臨夭棘繁蒿隂陽遘戾天乎髙髙於是壯夫慷慨游子惋傷瞻涇紆軫撫陴綴襄嗟宇宙兮寥廓嘆時命之所當淚瑟瑟而縻綆憑愁氛而託章江午坡先生哀辭午坡先生江姓名以達字于順信州貴溪人也先生年四十九歲而終將以稱於修短之間猶未離乎夭也而得專先生之稱其文學風節髙一世不係乎齒也先生以刑部郎主閩省戊子試事士之受知而選者以為先生也以僉事督學于閩士之㳺於庠業於塾者皆以為先生矣復以副使督學於楚而楚之士皆以為先生矣江氏故貴溪仕族代有聞人父斗峰公與諸父昆弟並以才學為貴仕先生内得諸其家出則盡友四方之賢豪視碌碌者千萬輩如無也慧敏既絶人逺甚尤自振厲焯發不欲與流俗伍一時譽者雖盛要以才名相目先生雅不自喜益務矜重以簡倨自持而亦以䋲人不為權力者屈當言翕訿交煽易疑且奪之際尤能操飭不變其始人未遽信也久之駭者定惑者解謗者隨以譽而先生之名亦成矣先生最慕李獻吉之為人其詩文獨宗之其豪毅敢决臨以威武刑禍而益峻大略相類而先生無獻吉之病也獻吉督學江西忤宸庶人被其搆陷力起大獄為出廷臣以涖獄事卒以失官而不悔先生亦忤楚藩至誣以大不敬逮繫詔獄濵於不測而後得放還田里豈其所為有以近禍者然宸庶人以逆謀覆而楚藩亦以内行不道見殺於其子禮義法度之君子宜不為叛逆斁亂之夫所容先生之所處果為有以異於流俗其所以得禍亦足以警習偷竦羣懦而不為無補於世也惜其年不永其學未究其志未行而遽亡矣嗚呼是可悼也夫詞曰先生嘗為予評李空同先生之文以為近世絶出謂其人已死闕為詩哭之其末云乾坤雙病眼終日闕一代文人之不幸其推慕之至而亦其悼歎之深也予哀先生不能復為言惟以先生哭空同者為先生哭今日照臨薌溪之間固亦當時汴水之上之靈爽耶憂思之歌痛於涕泣世之哀先生者其有哀於此也夫其無哀於此也夫存悼篇亡室恭人淑敬陳氏將葬欲自為志悼甚不能撰次也念恭人平生最敬吾弟道原君之賢而知恭人之修於内者莫若吾弟詳吾平生宦游取友於海内為不少然彼此室人棗脩之問相及者亦不數人於數人之中吾所最敬惟毘陵唐荆川太史故屬道原為狀將以乞太史銘而日月有期吾弟之文不可卒致第書恭人所出系世生卒歲月受恩命數男女嫁聘之實與壙兆負向阡原名號授兒同康刻石納壙中情事忽忽如有所忘相友二十二年之間形音情性忽若在前方其若在忽已相失静神寧思欲冩一二悼復奪之真如忘矣吾嘗謂恭人平生有不可曉者早起宴寢兢兢不惰而未嘗勤事菲弊淡苦近於鄙嗇而不曉營財對人面冷無美好口語而不能矜重遇下嫗煦易見情欵而非掠恩施見女紅麗巧窮力模效不能不止而未嘗以自飾被服有客在堂輙撰具恐不及若奉長者而實不知為誰不多識字而好攤書吟諷不善飲啖而好精治酒食無甚疾病而每親藥餌不尚禱祠而屢誦佛語談諧尤短而多記里諺舊讔猜防絶踈而喜知小言細故又有可恨者居常自言入室為婦便出門從宦事舅姑之日少吾罷宦來歸輙與吾服舅之衰惟得盡力於太宜人之養耳今乃使姑哭之其母殁淺殯久日夜不忘安厝之歸方與其父謀比父殁其兄弟治塟而自嬰劇疾卧床徒淚吾有二子意頗少之知自難育兾妾再育也而臨逝數日顧聞妾舉女吾撫幼弟愷中與長子同教之每謂吾必使二子皆才而同康之才逺出叔下貴為命朝列大夫之妻男聘女嫁受女子之子之呼宜有大母夫人尊隆之道而壓於吾為子卑約自將終身未離女婦之節每月朔旦三七日茹蔬為吾禳疾而未見予疾之减一生謹節飲食專防瘍痤之災而以足疽之毒斃小有不康攻治焫爇無所䕶忌而患疽在體顧䕶灼忌砭以是不療吾於恭人有可追嘆者平日嬉閑不少而觀書覔句之須屢有相問便屏不答恐落吾事不惜與人衍談謾語而一入室中悄然閉口不省手胠囊箧而非時有索須臾必得先代諱辰尊長誕日自不能記專倚内人相報而常譙不蚤不問生事而倉卒有營常苛責辦好召客而不先戒期往往匆廹出使行部曠歲閲月書問不絶於常所游處而未嘗一言寄内無時不與客食而一歲之中對案執箸無幾日喜近書冊而居止靡恒臨飡每忘内人非吾食己未敢食常惄然思飢好接人及以夜聚談出入來往無期門不得閉臧獲困踣僵卧而妄誚扃鑰不謹訶責不嚴又有終負愧者譏吾好與人逰廢事而今來往加廣憂吾以多思致疾而受人文請日多恠吾聚徒召謗而戸外之履彌進咎吾夜深作書損目而秉燭事筆研益酷戒吾易恚動氣而遇事猶發未能自制勉吾静寢安身而反增納側室勸吾强近酒肉以輔充元氣而减損口味甚於勸時賛吾督課兒子勿吝箠撻而今漸事姑息又有可悔者恭人生前不喜華飾而以盛服加稱襚斂特閔宰殺而刲牲為奠具太侈本不信異教而用兒女子之言飯僧為佛事以圖冥薦素習簡静而多致有司監司賢士大夫臨奠居常談塟法宜髙大其壙使後人得啓視撫哭為慰而自以意作法錮以膠漆壙不容微罅况得復入視乎知其願在同穴而兩地穿壙百年之後當永永相望嗚呼悲夫抆淚投筆止於此矣非言止此筆不忍復泚矣恭人之恨終長矣追歎何及與永悔矣惟所負愧未有時弭矣納石幽宫遂别吾友矣瞶亂無次非志非誄名其篇曰存悼以示兒女子云爾矣純節善道列女呉氏謚議純節善道呉氏者刑部主事何君琚之繼室也何君為主事已滿考以録辟使江南末及上其考故呉氏未請命於司封然於典已得封為安人矣不舉其封而稱以諡重其德也呉氏已嫁克盡妻道又以烈死而云列女者古人傳列女者以其德性才識儀則心術修教合道可以傳述載紀垂諸後世為家人法而謂之曰列如今令甲所著婦人得在旌典曰烈曰貞烈則以義殉死貞則守節終身以二者婦人所難而有益於世道故得旌焉而不必其人之平生心跡能修教合道何如也列之於烈貞固大有别矣然傳之所載非處室不字者而總以女目之何也女子之於人倫所處異位而殊名故於夫為妻於舅姑為婦於子為母於兄為妹於弟為姊於姪為姑其名不同惟修教合道之女則隨所處之位無不能盡其倫故不得以其位舉之而謂之女蓋與男子對舉之稱猶云天地隂陽剛柔内外大凡之名也故惟列女之所處為能備隂教全柔道正内之位而立天地之大義而可列於後世非止一行一節之長而已呉氏稟資英悟而開以講習之學賦質挺特而濟以涵養之功自其處室治家隠微幽獨不得見之地彌入於教委曲纎細人不致詳之事亦循乎道人所不得見者其夫知之人所不致詳者夫有不知而惟其臧獲知之其見知於夫者則或談説於朋友之間而學士大夫之所得聞其臧獲知之者則學士大夫有不得聞而閭巷凡人媪婦傭叟之所能言約其平生之實則於德性才識儀則心術四者卓然峻潔粹乎完備雖古列女無以加也故誦詩閱史鑑古訂今能斷往事而揆世變其談辨詞采與何君往復論議裁正有互為得失是才識之優也而斂飭莊一嫌以文華自炫儆戒諄切靡朝伊夕室暗突奥曾無惰容不以䙝宴之氣干於動静雖以輔攝何君之疾其摯而有别出於自然德性可謂正矣甘貧樂澹好引古人狷苦髙潔行以壯何君所守故居官僅足自給殆至無以為殮絶無咨歎不安之感自累其趣何心術之偉也而黽勉有無勤身嗇生佐何君賔祭未嘗陋媥劌情菲惡廢禮督厲臧獲無使浮食而拊視恩䘏猶以亦人之子畜之疾遽詬譴不作於言色是其儀則之閑也今者不愛一死從何君地下昭然掲日月以自著行路之人所共嗟慕至其處死之從容非知德者不能言也几筵之奠亨熟饋酳一觴一匕竭舉案之敬如平日哭泣擗踊傷而不過悉其遺箧書冊衣履與夫儉瑣之物推何君之意尊卑少長為獻與給曲中厚薄之宜治塟未贍之力銘幽不朽之託再拜使者屬其夫友雖知死者所欲亦由靈襟慧識所自及也勉夫之妾使勿去為之處其可以居松楸勿剪之謀烝嘗可繼之計量力之所及為之測經費存危誠誨諭夫兄之子兾其有立責以有子續夫之嗣詞㫖酸楚情誼懇篤見於哭奠之章付授之囑一言一話聽者莫不動心而一二嚚嫗昏童不可理諭宜在以義斥絶念非夫之所忍含容顧待俟其自媿自製殮具曰此既不宜以累夫之朋友亦不可以憂吾父兄也自處其死日時前期之夕取舊所觀書及與夫往返之札秉燭讀之達旦而罷沐浴被服徧拜尊者而命卑者拜之能使父兄不以為哀婢僕不以為諌皎日正寢十目所視炯然長逝合於成仁取義之要由順正以行果確豈所謂慷慨憤激伸不忘喪元之志而蹈自經之小諒者哉予故僣諡為純節善道列女而著其議如此某既僣定此諡將以質之蔡可泉而值何小洛與蔡君皆在皆以予諡為不僣於是往告之郭白峰黄東石易愧虚先生斯吾鄉之耆望也亦如何蔡二君之所可於是不及遍告諸鄉先生輙題其銘旌予猶不敢自書而以勤李介石翁之筆翁年將百歲矣喜而書焉顧弔拜者相屬日日益多讀其旌則欲聞其義不能一一告也故著議以代告觀者當不與前四五君子者異意又得無致惜於呉不得寤寐英皇任姒於千古之上享和平之福而徒以死自善與共姜伯姫杞殖之妻者比也嗚呼悲夫李竹坡先生請祀鄉賢呈文伏以先輩乃後生之所瞻非名德無以勵民俗大學乃公論之所出惟大同可以見人心苟衆情之未允豈私好之能干若羣議之共推宜采風之樂取謹協同志特颺僉言竊見已故鄉先生尚寶司少鄉李公源天與孝資夙成至性早脱躧於争名之路專奉庭闈晩懸輿於得謝之門永瞻松梓生竭晨昏之懽没謹禫祥之禮愛身以敬無樂春之所憂愉色為悦有卜夏之所難帷百行之有本厥衆美之咸敦明取與之大節不見匭包慎耳目之細娱終逺絲竹世方競侈而獨勵清修俗尚飭威而專明退讓室無衣帛之妾家惟應門之僮郡邑承風禮勤於下榻而語不謀私藩臺仰止情表於式閭而議不及政攀望令色士有登龍之榮而不為矜峻接引靡怠乞假話言人有贈衮之貴而不為譏彈誨誘開誠朝衣以坐塗炭足喻守身之嚴而平心率物有前賢之雅植杖而荷簣篠可儗忘世之泰而愛君憂國有古人之忠至於左圗右史蕭然一室之間晝誦夜思慨然千載之上寒士有難於苦刻書生尚媿其專攻肆筆為文傳者因之紙貴隨材發論聽者渙然冰融昔董子下帷猶居未遇之日孫公閉戸正及方盛之年未有處顯而業加修踐老而學益篤為之有得故無外物之可移好不在他用能終身而不倦若夫入仕之蹟雖以不久而所用未宏然其履官之方亦且有徵而因事可紀督賦嶺南秉禮却兼金之餽視馬畿内據法戢權璫之横轉十萬之餉於遼陽果邁先期而三軍有哺監寄留之儲於東郡大祛宿蠧而千舶無淹固小試之所施亦大略之可見使其幡然改心肆矣陳力崇階固偉望之所宜茂業必令德之攸出制作金石可被郊廟修飾圭璋足儀朝著而堅於不事浩然獨樂羣公臨門而勸駕莫回賁趾之懐臺史交剡以薦聞徒髙于逵之跡選部初起尚寳繼遷循墻而俯看拜命之益恭踰垣而逃竟遺榮以若棄堯舜而有巢由於兹見之曾閔不為宰季卓乎難哉即其高尚之一端已足厲俗况於平生之具美尤宜表民掇其制行之巨凡蓋孝廉之獨盛揆其立身之大致實德學之並隆宫墻有侑食之典其舍斯人黌序有旌淑之文厥在吾黨留意世風久共沐賢大夫之政垂訪輿論庶無疑諸士子之言顧新山先生請祀鄉賢呈文伏見故戸部侍郎顧公一代名賢千齡間氣修為勤恪操履醇完㫁意浮華講明常存乎世用專力本實行業每貫於民彜積庸累功致官位之隆而無速化之術息交杜請來譽聞之集而無名勝之慚禮文飭周其所嚴者尤在祭祀喪紀之節嗜欲輕淺其所謹者尤在男女飲食之恒闕子之所既忘而出於至誠無好異偶忽之闕齋而室絶裸侍有前人之所未蹈而安若闕無勉為矯制之難以進退為居世之大閑於退常勇而於進常怯以義利為立身之岐路見利若染而見義若貪由其無邪之思澹乎方寸故有可見之蹟施於百為節用愛人兩宰畿縣而既去見懷碑碣特瞻於行道慎刑簡賦一守和州而所為有考俎豆已躋於宫墻晉秩郎官久司武庫司馬深資乎碩畫揆啚邦政常兼他署之謨猷中貴側目於堅持洗刷弊源預銷反門之覬伺方遭正德頽綱之始獨為當時執法之尤楚岳往叅民功克叙燭乾沒朘削之蠧穴盡駭身探計縮伸盈絀之費經有同口授宸濠之變荆土以騷督饋餫於蘄黄仍以軍旅之事恊籌算於池皖不徒疆埸之防艱大初遺靡色辭之憚險妥平卒濟絶心口之恃勞惟松茂之崇屏乃維州之故域砦磵伊阻羌落不賔綏輯與震耀並行夷皆効順持摩將訓齊偕作士始知方至首方岳於江西及正僕臣於留寺皆以望資之重不踰歲月之淹而練識之所察稽得數郡隠逋之財以捄大沴清心之所節省裁積年游宴之費以禆小蠲爰拜奉常遂貳戸部抱深憂於根本之地而以忠藎倡列卿振古誼於形勢之途而以純慤勵諸署審於國計固其餘長未膺典選之要津而舉朝滌心化毛公之儉非據持衡之台序而豪貴斂袵畏楊綰之清凡此敷陳具昭睹記猶彰施於政務或有可能厥討論其衷藏益知弗及謙謙自牧不萌先人之機慥慥内敷實絶炫已之偽蓋古人之髙致與君子之用心流行於撫世酬俗之中畜積乎趨時辨事之表若愚之貌繄盛德之形容無他之技信个臣之襟量宜位百工之上或綂六官之尊而守甘於不狥節勵乎難進一辭而退累薦莫援既貴而貧鼎臣有同於韋布益勤在老小物不懈於耄期風降類江河之趨一身以挽情偽譬秦越之背衆志咸孚息彼此之争以懿言代鈇鉞諭長少於善以和色當醴醪為不義者舉忌公知而因以自止殆不可數見不獲者輙若已責而未能使平則不敢安故常發慮以佐當路平冦之謀盡言以開有司賑饑之䇿憂勤何啻於任職憔悴幾至於傷生惟知憫窮䘏隠之切身坐忘勞力費財之在我蓋自少迄老孳孳為善而無一日之或偷由外及中惓惓好修而無一言之不顧昔王文正之澹而晩有溺色之昏冦忠愍之剛而生有使酒之病曽魯公之敏達而以末暮不立貽議趙伯叔之敦龎而以臨治無能見少欲求全美信為難逢惟公始終克免瑕玷人之無祿天不憗遺庶士大夫遽亾典則比閭庠序均繫嗟思顧平頌之孔明悼儀型之將逺王廷有易名之典非迂賤之宜聞黌宫有侑食之文乃僉同之所請如䝉博訪輿情叅稽故實列上於朝以極榮哀之錫寵崇祭於社以副景仰之恂忱非但禮制為之有光其於世風實非小補讀埤雅陸農師於名物可謂多識矣然其為書有自亂其法所引雖博而非其著書本指不足相証而反以自病者亦多矣釋翬雉而釋后服釋馬而釋車釋騏而釋服釋龍而釋占釋蓍而釋重卦皆非其著書本指釋竹而釋衛武公之德已去之遠而又及於明器釋倉庚摘引月令可耳而全錄其文釋艾則因五十曰艾之文而錄禮文全篇釋螽斯甘棠既不當釋詩而復旁引莊子華封之祝劉歆宗廟之議釋雲漢其説尤迂緩謂之詩箋義可也苹之為藾蕭知其為在野之草而鹿之所食也顧不從箋而從毛與爾雅則水萍豈野生而亦豈鹿之所食耶白華之為菅菅其名而白華其詞也乃立白華一名而釋之由箋有白華於野之文而誤不思毛傳已明也蒲蘆之為野蜂則不當為草乃兩立其名而兩引中庸之文羊之始生曰達小曰羔未成羊曰羜既成曰羊則羔與羜乃羊之小與未成之通名不當各立以為名也木之自斃者曰椔蓋斃木之通名而非一木之名也而乃有釋椔豕豬之通名彘其牝豚其牡牡之去勢曰豚而其牡者豭今乃釋豕與豚不為明也豝豵􅀈並見於詩毛鄭皆以為小豕惟毛以歲紀數鄭以生紀數為異要之皆野豬也若為豢獸則豈狩獵之所射且虞人致獸亦不當驅家畜以待田雖有一歲豵二歲豝三歲特四歲豜與豕生三豵二師一特之異釋知其當為野獸者以詩之文義推之當然也今乃釋豝而遺其他而與豕聨釋疑於為豢畜歟大扺所識者多而所取者博固不能無失與至其釋貓引畫譜小言釋芍藥全録花譜此無異童兒之識農師之學不宜其陋至此或其家子弟或他人誤增入之也再書埤雅後予讀荆國王文公集見其進字説表與其為書序其義奥深以為由書契以來未有也恨不得見其書其後於楊龜山集中見其摘數十字駁之龜山所駁皆是然要以為未足以病其書也及觀埤雅往往多用字説雖非龜山所摘其義亦往往可駁蓋文公於學才藝既多尤能刻意精思故杜撰立説而以經傳文詞附㑹之雖不為無義理而於天地自然之文何啻千里陸最以善言名物有説詩之名於熈寧間亦以此為王文公所重新經之義陸多與焉故陸亦用文公以廣其書也由是推之則字説全書雖不見亦未足恨而陸所為以説詩得名正不免於穿鑿附㑹之病而以文害辭以辭害意者宜必多矣因閲埤雅漫志之示劉生應昌凡人有所感而嘆未嘗不喟惟顔子一喟非夫人之所為喟也弟子有所聽於師而應未嘗不唯惟曾子一唯非弟子之所謂唯也此豈在聲氣之動言語之窽之間哉非有曾子之唯孰知顔子之喟非有顔子之喟何以得曾子之唯哉講之於詞義信不免守株刻舟之蔽想之於意象將不為捕風捉影之虛乎疾雷破山不及掩耳失路忽反恍若有獲學者試以是觀之劉生應昌奉軸以請於予乞書為大學㫖因舉數語以示之以發其端劉生思之有得可以見告如其未得當復來問也示王生國振仁者人也軀殻形骸不名血肉純然天地之心目視耳聽手持足行莫非生理不自夭閼不自滯礙浩然流行目視自明耳聽自聰言自作乂貌自作肅是一人之身即千萬人之身是謂不獲其身是謂克己若粘滯形骸執自軀殻則有其身有其身則於人為對便有彼己既認為已生理便不流行終日視聽言動皆不中節故不曰仁者身也而曰仁者人也以此身公之於人乃名為人故謂之仁見為我身即名曰已而不仁矣只是此身只是此視聽言動自我作用而不可自我起意故曰人也又曰取人以身曰克己又曰為人由己嗚呼知仁之非身又知取人以身知克己為仁又知為仁由己可與語仁矣題張月洲像贊草澤而有廟廊之情韋布而有鐘鼎之氣目瑩然以澄神足謖然若將跂有時眉顰額蹙似殷憂深念而愁思不在乎膚體有時袪掀袂舉若詡揚色喜而矜泰非關乎苑藝不知者以謂老驥繫櫪不忘乎千里之志其知者以為鳯凰翔於千仭猶未得覧輝可下之時耶陳沅潮小像賛視不下帶歩不踰咫峩巾方履士其業而儒其衣者我不能殊乎人而載德蹈禮稱其服而文其容者彼不得以預乎此其取舍好惡不隨俗之是非而求諸古人之同異憂思愉樂不主已之通塞而存乎造化之泰否蓋居今時而有尚友千載之心處一室而有經綸四海之志非予之知君亦孰能睹眉目而知心鑒神情於色理題寄劉白川詩巻後七言四句樂府最盛於唐予所尤愛者王昌齡王建張籍劉禹錫數家時效其意輙有所作始謂似之頗用自喜時運而往詩藏箧中偶取諷之乃知與前數家大不相及欲毁去以其亦有可喜者不自忍欲復作以似之而好事不及少時故聊存之而同志或欲取觀亦不為隠今書數首以寄白川劉先生白川俊才博學方横行於制作之囿視此何有而予猶謬謂有可喜者信可愧也題寄盛子木詩巻後中歲為詩極慕王韋然不近也顧其澹泊幽閑之意可以自諷而不可與髙才麗藻之士同其好吾子木材志方盛詞采溢發如川至泉湧烏能與予共此好耶巻紙粗惡書復不工尤可醜也請閒寂上人來泉結夏疏據砌磨磚何由作鏡臨槽碓米只為待篩長連床上帶刀須㸃檢鼻頭眉下香積厨中洗鉢莫孤負一粒半顆頓爾發心方資接引瞥然貶眼正好承當恭惟芝山南院閒寂首座得來峭俊用處縱横立雪叅少室之機無臂可㫁指旛悟曹溪之句非風自翻兩隻草鞋何處不逢山水一條榔栗有縁便下鉗鎚伏請逺降雲蹤大施雨法龍象蹴踏荆棘成蘭桂之塲旃檀薰修酸􅀈化醍醐之味但看木上座提倡諸方不負陸大夫賛揚此事偈頌半嶺開堂結夏為具諸齋供因取十物各為之頌米頌空鍋熾火難成飯有米無薪枉覓糜水火米三者和合厨人辛苦竈前炊大桶盛來分小杓有人對飯却稱饑錢頌輪郭中邉團轉隂陽面背分明嗔者目曰銅臭愛則呼之孔兄我佛門中無彼此一索齊穿撒手行道次半文曾不少説餘萬貫亦非贏菜頌冬𤓰直儱侗匏子曲彎彎揉向油鐺一爝爛更添鹽酢太多端看取舌尖能到鼻自分甜辣與醎酸蓆頌馬祖升堂百丈却巻此是古人死案休再挨眉傍眼一條攤向䋲床上正好髙眠雙足展香頌禮足百懴悔合掌十𢎞願心念普皈依永誓不退轉各求大解脱粘縛一時遣憑兹一捻香稽首瞿曇面心香相繼續立地觀音現花頌釋迦座上㣲笑猶是心迷顛倒優鉢羅花火裏開開在千年堆糞掃燭頌膏火相傳燄幽室光四達燃是噴開花灺處倐見䟦試問室中人光從何方發初燃答云光現灺後更言光㓕大家白日瞑坐只道盲人眼瞎草履頌汝脚何似驢脚也用人間雙屩一任水泥拖帶歩歩何曾踏著扇頌十枝八枝削竹垜一片兩片合紙裹本然握扇引凉風引得風來添作火自心清凉㓕煩熱立月端向爐邉坐笤箒頌微塵合盡大千界折界各各成微塵畐塞虚塵總是鐵箒掃穿無淨因一朝欛柄真入手界塵瞥眼何曾有此是半嶺常住箒諸善知識開堂于半嶺㑹澄坐普叅之外勤誦經典為作此頌燒香頌認取鼻識香不在鼻認取意識香不知意作虚空取虚空無氣何如剗却鼻頭聞與不聞無二釋迦賺却阿難阿難枉垂悲淚誦經頌㑹念經人滿口讃佛不㑹念經人滿口謗佛是㑹念經人一字不記不是㑹念經人以腹為笥是不是㑹不㑹且置且道經中是有字無字反嘅遇賦反嘅遇賦者為中丞胡可泉公作也中丞建節豫州實受上簡移濟上之節以來士之受知公者皆以為將遇于上矣未㡬火焚其臺用是失位呉郡皇甫子安作嘅遇賦以寄意焉蓋反覆於公之將遇而復厄以為非人之所為其詞有曰諒匪人而實天兮侯離合之無端夫才髙招尤名盛叢妬自昔而然况如公之卓卓者哉予獨咎公之以材名自災而無所怨於天也作兹賦以反之驟百里之修路兮厥車攻而馬良節鳴和以應鸞兮柔六轡之服襄眡阨陿而弗即兮閑二軌於康莊行九十其猶半兮忽摧轅而臭載伊行路之心惻兮壹憤憊其永嘅嘅長號而大聲兮籲蓋髙而委罪余覧詞而美之兮揆所論而中槩繄燔木之為災兮顧彼哉之所云弗執名而詞實兮有近取於此身被文采之煒煜兮播修名之赫喧既煌煌其外炳兮復耿耿其中昕光旁燭之四遐兮輝彌散而方暾世黮闇之妒明兮紛狂狺而好搆彼明者之見妒兮覆逢殃而䝉垢辟燥薪之在兹兮固始然之所就戞兩木而終燔兮宜星星而焚究彼燎甍與燬棟兮豈斯烈之為咎既斯咎之莫執兮何藴懟而謂天苟改行與易意兮孰世遇之為難𢎞曲學以阿時兮躋平津而開邸廣中庸以容身兮紆朱紱而殫齒原好修而被放兮徂江介之悄悄胥盡忠而殞身兮從怒濤之極徼歴前事而證之兮何禍福之弗自人直何往而不黜兮枉何往而不信維此性之有植兮豈窮阨而捐旃孰知所福之非禍兮珍厥好而逾肩溯黄河而西上兮指朱圉之外郊自伏羲之舊都兮請端䇿以問爻識用晦於明夷兮與晉德之自昭騁𤣥志以觀妙兮從吾心之所要遵巖集巻二十

body:
  text: 遵巖集巻二十四明王慎中撰書與蔡鶴峯十餘年景慕髙風一旦得見顔色其為慰幸何可喻云惜相見不多其見時又皆有他客未及詳扣微言以領精意然薰炙容氣猶足以袪躁吝也承使至賜之教言伏讀其中有云今人好説心云云此等言語僕每見一二前輩好道之其意若欲為儆切不知實是太為鶻突學者於道貴在著察正如此言不但於人無以致其喫緊且於其身正坐顢頇也來教云顧存心力行何如僕正欲反詰公如何存心力行也且夫説心而不知存説知行合一而不能行固非學者今有自謂存心而實強制自謂力行而實𡨕趨公亦有以辨之否又如來教所舉理㑹氣象之語竊謂此語亦須善體乃不誤人夫箕踞夷蹲足驗不恭跣走噭呼可知非静氣象徳性實非兩事所當理㑹然實際用工處正當有辨如前賢之意不免防之於外檢之於動以致餙為善飬以矯揉為操持正使終日之間頭目手足之容皆直端重恭而已隳於色莊令色之學其視正顔色而斯近信動容貌而斯逺暴慢者何啻霄壤也此學不明為日已久非不學者之不明正由名為學者而皆牽纒文義拘滯形器天載之神未嘗一時呈露於出王㳺衍之間故終日習行而卒謂之不知道也公充飬積累醇備至到至於幾希毫厘而千里攸繫此等辨之不精便為非道道一而已同則是異則非安得置此勿論而自謂為存心謂為力行吾恐其所存者非其本心行其所行而非吾之所謂行也區區之意願公於此精之又精盡濯舊見以開新益則向日之所充飬者皆為實得而此道不孤矣草次所荅不詳與廖梅南以伯夷之清而不足於和故君子語其徳則謂之聖而舉其弊猶得以隘名之行之至者猶難於全如是惟公有伯夷之清而兼有展禽之和前賢所論居身之珎公實得之而又非所謂處於可否之間者也不肖平生向慕之心偶因與令弟相見而後得附通然竊自惟頑懦之氣當不為清者所容重以鄙薄雖和者亦未必肯與之偕故雖因令弟附通而尚未敢冀賢者之不拒我也令弟之來輙䝉手教奬與之過極非所當於此益見公之清而能和其風正可以興於百世之下況不肖在數舍之近同時而生能無感奮從兹稍知亷立勉為敦寛之行猶有可期所謂知向慕是人非徒誘奬引接必深有以董戒督責之而後為愛之之至不肖既知慕公尚望公有以愛我也與俞虛江海上消息久不聞真殊用惓惓使至得讀尊札及詳觀前後文移與平夷圖説躍然以喜堂堂正正之聲震疊島外使蟲蛇沮洳之國知有中朝天威則所誅者一范子儀逋㓂而其功乃可使莫氏有國之臣民畏憚馴服益堅其效順之心此為有勞於時矣烈丈夫出身兵間將以勞定國則事有大於此者什百想在虛江不以此勝自喜聞即日移兵珠厓此一種落依慿阻險蕃育醜類根固穴深恐難卒勝不比海上之戰可否易决也願益加慎重以副軍門之託彼中有總兵沈希儀誠一時名將其勇毅智畧有特過人者僕在仕日好問廣中事知有此人久矣近又從友人唐荆川太史先生處寄至所為沈公戰功傳益慕其人唐先生徳學重海内又有古法不輕為人作以此知沈公信名將也既與同事必易成功渠老於廣中視虛江新涉其地生熟决不同凢事可以咨之耳僕於文不敢讓唐先生待虛江益多吾亦當為作一文字可與沈公並行以有明於世也惟勉之吾已泚筆以俟臨紙及此令人氣壯寄蔡松莊近見行取報於學職中所取甚狹然三人之中不見兄名以余之意使盡天下所取學職惟一人宜未能舍兄而彼三人者乃能越兄見取豈世誠多材如兄之賢尚有出其上者三人耶抑當路者自以其意好取人彼三人者未必能賢於兄也取不取於兄未有損益而兄之可取者固在也次年春當勸駕上春官且以其學荐南宫對明廷豈以一取為兄之遇哉知兄之不汲汲扵此也聊以私懐當時所擬議者述之於此以為逺道相問之語且以見余之知兄不以世所取舍為重輕又以堅兄之志云耳余家居不忍獨善時以其所得於心合乎聖人而不同於世儒家詳為後生講説而無志之士大以為驚無識之士反以為笑既於人世無所變化開益而其身復為譏誚之標的雖然此亦足以自考其學之未至而道之未成以勉益而進焉又足以自信其不諧於俗者同理之證不悦於衆者好古之招而斷乎不以自悔而輟其趨好也何日見兄為兄一論然恐兄亦未能信惟當不為驚笑耳大抵此學無兩可並是之機不信則必驚且笑兄不知當審擇何向耳臨紙極有不盡之情徐君行得一相講亦客中之樂也荅李拙修饑渇之思無由縮地忽辱使至領手教其為感慰真不可以言語喻也伏審别後備有骨肉之戚此在他人尚難堪處況拙修天性篤至人倫惇厚其情抱惨苦又可知也吾輩學問用情中節第一難事而七情之感其於哀者尤難中節故佛家欲一切斷去以免害性而吾輩又不可以為此故於此際尤宜審察勿令為傷不然雖可為天常之厚而未得為學問之功也新居既定樓名玩鷗度拙修處此亦必有以自節不至為哀所傷矣甚善甚善擬為作玩鷗樓記就欲以稿畀使持去連日病脾未敢苦思今日正屬筆又值逺郡佳客來訪不得不輟以從之使者先遣歸文俟後寄矣僕别後殊無新功徒靠冊子過日真可鄙也其作為文字往往造微諧至與古人法合然亦枝葉之靡豈足以與聞拙修敦本尚實之餘意哉臨紙咎訟益思賢者而恨不得見也如何如何與吳泉濵僕為此文以授佩甫君使刻石納壙中佩甫讀之未畢涕數行下哽咽不能出聲幾於自絶為廢其讀讀之三四而後能畢毎讀皆飲泣欲絶以謂道其情事如探其肺腸腎膽而所以寫其親者不獨神志如存形貌亦宛然在目矣夫孝子不忘其親者思其居處思其笑語思其所樂所嗜思之之極其精誠之専而猶不得見而一讀吾文則其人忽然在前而居處笑語樂嗜皆是盖文之妙如此昔少君致李夫人於帷帳燈燭之間使武帝真以李夫人為生也文亦有是與然非佩甫君之孝亦安能於吾文中輟見其親之悲之至於如此極也公既深愛佩甫而尤好吾文故聊往覧而併道佩甫之所感於斯文者使知吾文未足好而佩甫之孝為可重也答李克齋伏誦尊教有感於時事之難而致悔於出處之際今日之難當不待出而後知若以難而竟不出則世何所頼矣公疑此出非鄙所聞也觀尊㫖所謂難似介介於晩淺者之言夫今之最難者朝不信道工不信度舉道揆法守而盡棄之志士仁人欲有為於外上則苛責儀物而不考其功庸下則應以貌文而不勉於職守敗壊流放山隤河決矣故實意難孚實事難立惟有苟且與欺蔽二端罔上狥下可以無患若使上下之間道法未廢事功建立如其意之所欲雖百千言者益足以自得而明彼之不知量耳此非鄙之所謂難也今日劇病為宜急治者惟多兵一害使多兵足以制賊雖廣費可也自南方用兵以來竭民膏血以給軍實幾剥膚及髓矣曾有操一戈向賊者乎今日之兵盖為置將設戍事勢不得不有之其應募而來本無敵愾死義之心官亦姑具之以威形壯容未嘗敢倚以執訊捐軀之用也知其不可用又不可不有則必無務多慎汰而精練之已矣汰之慎練之精未必有一戰之用要以省費為利則吾雖未能除賊以安民亦不用兵以朘民矣彼言者固激若其兵多費廣之云似不可不探其意而善行之也吾不見浙直用兵之如何以閩中所見推之殆相類也兵之不向賊者既不殺之以示法猶曰吾一金之給本不足以得其死命若軍職自百戸以上至指揮等官固國家二百年飬之而責以死者逡愞逃潰不誅之撻之而復為之掩䕶匿罪而偽功其將謂何甚所不解以目所見民迫於征輸皆思為賊且知官府法度紀律如此將相勸為賊矣不肖兄弟私相謀議未知一安居之地大事未襄襄事尚欲他徙今日四郊又告急夏間景象又至恐此冬伎倆復有醜於夏來所見者其將若何不得公開府於閩閩人真無福然公在彼僅保全一路何日入朝謀謨國議有以保四方則吾亦在一物生全之數矣悲歎之衷非面何由悉真無可開口處惟願公自重以濟明時天忽寒紙筆不莊草率望亮與陸北城臨漳多士重以晦菴先儒曾為郡於此芝山祟祀廟貌儼然執事為師於大同臨漳皆先儒過化之地其所遭亦非偶然惟望端已率人倡明正學與臨漳之士共勉於道斯文之光也鶴峯蔡先生誦法晦菴動有矩法雖其已老不可致至郡中為後生表式執事尚當屢造其廬考徳問業以為教人之助也與黄雪峯積仰之久忽奉翰教何啻從天墮下也古調希聲不入俚耳公所自喻僕獨知之然髙山流水要必有能聴者何必破琴而後為髙也鄙人素抱弱疾今年迫五十遽爾衰憊精神智慮逺不逮前書冊且難屢親況筆硯營搆之勞哉承松滋候問不能從之㳺矣與張秀才二生來傳示尊意託於他事不欲屬筆如此則孰能代此筆者是執事之意不欲為此而託以辭耳竊謂此等事雖是好事然實無所利於其父母舅姑之家故出力以為之發明者少而此烈婦之父母舅姑皆常人守陋安舊非能出力求為此婦發明者吾輩正不當以其不求而怠也盖發明節義以禆風教乃吾輩有識者所能而不宜責之守陋安舊之常人在執事不當以其不知託重而忽其婦也若以為其婦事未可發明則此婦自䘮夫以來立志堅定必踐其言卓然昭明如掲日月不可誣亦不可掩執事亦必問之審訪之真更無可疑矣若以郡博士駁語為疑則此乃文移當然且其覈之嚴乃所以使其事跡之著也無疑駁之復乃所以使其文牘之行也有據不獨事體當然而且尤為有意於發明也執事亦何用疑焉如不以為然請面質之博士必以僕為先得其心也幸毋忽與王杏里臺省衮衮皆徤翮捷足横飛直上公獨徊翔蹭蹬欝其台鼎公輔之望而踐厯數省之藩臬直道方守之不宜於時良可慨也風靡瀾倒之時得公支撑其間雖未大用而挺然為風中勁草瀾際底柱其闗係世道亦不淺淺也少石公往共一堂之治可謂臭味之同者然以公之髙明在皇極之中之學必克之以柔則與少石為僚朝夕磋切觀感之助宜不少盖此公沈潛者也二賢共治楚岳之政可躋於平康矣敬為公誦之鄙人年迫五十多病積憂之餘薾然一無用之躬聰明不及前時而道徳終負初心矣何足為公言也洛陽萬安橋記不知有搨至公處者否兹錄一通徃覧向許為老母作夀詩携吾軸以去公豈忘之耶抑不欲作耶然鄙人則甚欲之而未嘗一日忘也與程習齋鄙稿成之倉卒意義疎淺而詞采凡近知不足以與吾黨共訂千古之微言也然區區一得之見則非苟同前人踵故習傳為耳食之說者而未知與四方同志之士有合與否若公鍳評以為不謬則僕亦可託以自信矣俗學漸漬耳目之深且久難以人人有合惟有識者同之斯為不孤耳聞公有生男之喜二惠競爽便為盛事豈以中年以後育子為遲哉竊為公慶之未能遣力謹因盧部閫之便寓致鄙悰耿耿之𠂻終不得盡與劉白川閒居日久於世日忘雖心所記注如公亦且半如夢中忽唐舍親至収得翰教何啻從天堕也喜慰曷踰唐君固可人然公所以誘奬之者過其涯分雖唐君自知感而推不肖之故以及之僕亦不敢不知也承惠妙杯年來飲水蔬食與麴生聖友訂絶交之書此器無所用之惟襲藏櫃中時取以為玩永故人之好耳附唐君人便草此告謝何由晤侍徒切瞻注寄葛紫山傳遭夷冦焚燬之惨非所忍聞甚為芝山懐憂而無由知其安問也客嵗逰武夷逢大梅於建州首以芝山為問而知其安也甚慰賢孝令徳固天所佑而藏書名樓亦有神物呵䕶之耶執事膺有司勸駕之典而不肯上春官樂道遺世令人欽歎髙風名樓珎藏想益增羨鄴侯揷駕難以擅富游居其間手披口諷樓中所藏皆在腹中矣何樂如之瞻侍無由徒有馳情寄華鴻山聞岩居集已入梓想續詠皆在焉甚欲一見之而未得也孟韋風格本自難追而時人學之者尤鮮獨吾丈之作為有其風固岩居深詣篤造之功亦沖情遐思有黙契者而非顓顓摸傚之所及也非佞非佞連嵗地變天災厯古所未見彼昊者蒼誠威怒之極而亦仁愛之至矣第不知廟堂之間何以敬此威怒慰此仁愛也凢在吾黨孰能無憂吾丈猶有世道之責者尤宜軫念冦賊稍㝎想安居有暇著作彌工末由叩請聊欲聞之寄曾廓齋前嵗往訪鶴峯先生於靈洞擬遂造廓齋之居欵請教益屬以賤體舊痾復作不能久留輙促還擔此意未遂其為向往如何可言伏惟廓齋任道甚卓造道甚精躬行在談説之先感動出聲色之外吾閩一時學術最為凋䘮頼廓齋主張發明何啻朝陽之鳯僕才質本下工夫又不専一雜以詞章役於耳目雖知景向而不能共進悠悠虚度卒與無所知者均其荒落耳興言及此良自驚悼所以於門下彌用馳積也門人沈希周往見持此附候起居畧䟽所愧尚望一體之愛有以鐫誘之末由晤領不盡所言寄何黙甫審惟廷試之文直閱宸覧厪當宁甲乙之題而裒然為天下多士之冠此學者之至榮也乞官選部而得安城亦當路為多才名邑擇明師儒而銓註之與尋常填除固别矣執事經學博而能精安城雖多才必資指授開發之益抗顔師席可無怍也然東廓先生修明正學方家居正便於執贄請益不可不知所師以求進於性命之傳無徒自珎其所得而偃然為多士師而已則安成之行不苟然而區區所望於執事者慰矣與張新江鄙人閒居不敢自廢於無用聊寄於方冊以用其心亦庶以不虛過此白日耳豈誠能有得於古人之言耶既與古人相對久亦時有所契又未知果與古人合否故欲質諸同㳺以定其是非盖古人此心本可以上考下質者合於當今則其合於古人尤可以無疑矣故樂與同輩之聰明者講盖將以自决是非而非敢云有孟於人也然以吾之志不切力不足無以來衆人之益於是同游之是非亦不足以自决而姑信吾之所知以自附於古人而豈可謂真能與古人合耶吾之孤陋専僻而不能有進也亦可知矣辱兄見問猶若以聚徒講學之事相望吾豈敢任此哉如兄為此官乃其事矣非但其事也又有責焉而不任其事則為不副其責此兄之所當自力者也願努力為之與黄曉江兄遣語竒崛險刻自有一段出塵之氣成其為隱者之言若文從字順聲比律諧自難以一一論也故予於兄之請但取其過人者而不復置論其間兹示聮句尤制作中之末事更勿用詳評況又最短於此亦何以相正耶必欲不虚見命則亦有可論者大抵對聮只是品題形容某山水某臺寺之風物景象不合把自家意思來用惟自題齋舍室廬則有之上洞對云濯足未成星海去振衣間嘯閬風來此純是説自家矣當易無疑如愛其句佳不忍棄則足成一絶留題壁間可耳贈吳道士聮以玉屑對庚申非徒不得道家經典元無玉屑之文乃妄杜撰三彭對一洞尤不得妄意欲易之日甲子欲言雙樹知盖云欲問吾嵗若干請觀雙樹耳盖樹古則嵗閱多也但雙樹是佛家事莫若雙鶴知似為無憾令威化鶴本仙家事鶴固夀屬可以諭年也南臺一聮如封閣住甚生地中日月意雖未嘗不可㑹而語已難通不如人間日月字面平正且不諭也然到山髙則無味山本是髙何須着此模寫若云人間日月此中間則語不迫而味可想如此當盡換却母句不審於尊意云何耳細故閒費此評論病中未敢有作聊以解煩頓故不覺刺刺盈紙矣可否見示不妨也與歐陽明府往日相與於濟上情誼意氣亦云至矣第惜其時學未有聞徒守形器誦查滓以自煩勞而執事所以教我者尚未悟也惟其不悟故尚偃然以其所誦守督責諸生而妄以為有以教執事也以今追思之乃覺其未聞而執事真可以師我也既無由相見質以吾今所悟者而盡叩執事之所得以為吾助徒追記往時相與之義而增惓惓耳久廢林泉絶不知士夫除拜動静比因送吾友人柯雷州之别於其袖中出書一編所謂縉紳一覧者閲之終編而見執事之名實在髙州又知雷州之道必出於茂名而向日惓惓之意益用憮然遂作附柯君往致吾意臨楮慨慕無限方欲言然何由得盡也柯君雖久宦於外今調官還家已數月不肖居家信道不篤講學不精身心根本之地極多疎闕放過而徒以文字招趨向之名以言語致浮偽之訕柯君亦略知之倘官守有聮相談頗洽柯君當能為執事言我之實惟願執事猶以舊愛之義盡以向日之所欲教我而未得悉者一一為我言之因風見惠僕今能領略不至頑然悍然如向日也贈章劉二尹序文稍見僕之所得謹錄以往餘稿不及多錄惟有刻者數本併徃此乃妄招趨向罪過本予故不敢隠於執事也千萬教之與紀郡博此郭生仲實之文也僕方食時得此文為之輟筯而讀讀之愈喜因而忘食人報食寒者數四不自覺也卒為讀此文竟廢食矣好文字不覺令人目饜亦令人腹饜信竒事也僕閱此生之文五嵗之間一嵗一進兹又將益進而不已耶凢後生小子僕見其進者有之未有老成之士猛進如此者惟在京師時見黄三峰公老而益進然三峰不過於文進耳不如此生之進於理而兼於文此事尤可以勵後生不獨其義理純明經學精到可為後生法式而已然今浮誇之習方盛剽竊之工熾行不但見此生之文未知何物且將併詬不肖之評以為腐語矣惟公深於經學而論文又具上乘眼故以呈覧庶與我同好自可快矣凢今人為文而無明者賞之則為文者不樂有明者能賞而無同者則賞者亦不樂故僕求與公同而非以重此生也倘有不合亦希示及貴庠諸生之文想已収齊得一借觀尤望與王武陽不肖荒惰如舊且有加焉雖䝉誘激切至而自安於力之不及知負賢者相責相勉之盛心矣今之士難與言學非獨泉之陋然也恐莆之多材亦未見人人皆可與語上也然越雞所不能伏之夘必魯雞而後能之如武陽充飬之盛造詣之真開導感發必有夫不同者恨僕之陋不得裹糧攝衣一從諸君之末徒承風慕願而已惓惓之懐與日俱積而相聞殊疎想在心照寄方晦叔舉人以吾子之才而久困於一第論者皆咎有司之不明區區之心竊恐吾子才髙之過於舉業程度家法或以髙失之如此則不得獨委責於有司也學者固喜於多能而尤患雜用其心意吾子之能頗多而心不免於雜也往日相語於衛水之上言猶在耳如未之忘則所以修歛精神玩索理趣必有日進之益而吾不及叩之如其未是忘吾言矣輙因風便相聞而以此言相勉以見區區之愛吾子雖别數十年而心如一日也區區閒居士之從逰者不少而他方來謁亦時時有之然鄙心常歎無朋盖逰謁之多皆是有資於我而未見有能為我助者所以歎其孤也惟時時為諸人㸃檢舉業因吾言而有進者頗多有之使吾子得常朝夕略為㸃檢必有所益而今無由以此毎注心於逺道也區區徳薄受譴於神連嵗遭手足之䘮長兄幼弟癸丑甲寅夏冬相繼不幸哀悼之餘視息苟存而精神凋耗日間忽忽若有所遺恐不能復有立矣悲哭未平臨柬種種不盡寄徐鳯竹側聞量移佐郡而得建州豈碧水丹山仙人所宅之窟天借謫籍以寵光之而賢者於胡劉朱蔡諸儒先寤寐有日由此得一入于境問其故居訪其遺書而増益所業焉非偶然也僕未由識公而得舍弟為詳向往殊切顧公於鄙人亦辱有意其何以當願言之懐尚俟他日第恐僕㳺建州而公得環入朝則向往之切終莫能慰耳矣與李克齋莊生與賢郎皆以嫌例不待試春官如賢郎之才戍榜求賢兄弟同登不得豫卜可决也但未知莊生能附驥並馳終講通家之好否也公在淮閫雖未久而讋憬島醜綏定海疆功已不細況崇望盈四海巍資閱三紀臺省正卿多起後塵末寮者顧公尚已中丞居外殊不愜天下之願也閩中連嵗驛騷生靈荼毒某幸在邑居苟免竄徙而勞費於公私之間均此憂苦也晩年屯蹇横遭謗誣出於物情人理之外初遭之漠若無有付之一笑而已不謂仇口之言流行而傷善媢正之徒轉相傳扇上下交疑觀其氣燄駸駸然有張弧之威殊可畏也㷀疚危坐遭此毒痛亦命矣今惟有任理恃天以俟有司之明他無可以為謀然古人急難頼友朋之力以紓解拯援者非一平生交誼無如公篤不控于公將誰控哉望留意憫惻凢海内交逰道誼意氣能為吾軰善類地者貽書曉譬不至為訛言所感實生死之感也僕雖自知學非曾參徳非叔子然不殺不鴆敢以自保公亦可以身保之也别具仇詞請一覧之亦足以燭其無情之甚矣臨柬不勝懇迫之至寄道原弟書一得李抑齋傳來大選報知是武選此司中事體頗闗係條例甚多往時諸曹郎只以談文賦詩為髙致其下者以圍棋飲酒為樂鮮有留心國事以致吏人作弊賄賂公行大抵京官固貴以文學潤身至於職事所掌尤宜加意今日登仕之初便宜立定主意以明習國家事體為要我舊日為曹官亦只是以作文賦詩為第一義故於本朝事體諸司職事不甚通曉後來雖稍聞知亦只是獵涉泛濫不為精切也當時若知此意就使練習典故亦自不妨作文賦詩之功只緣無人提破此端説話因循過日及為吏部驗封自掌司事始知典故不可不習稍稍留意而即以權臣之怒謫出矣真可悔也兵部經火之後人籍無存只有李遜廬尚書在部日彚集兵部條例一部甚詳我向日已抄得數本但未完而有常州之行今此數本亦不復存可抄得一本寄我又京中有好書無印本及有印本而我所無者時時収得寄來此至切務也李蒲汀家好書甚多其子若相識可時與之借錄不必求好只以有此書為貴又要抄字不訛須着吏查考参對大抵蒲汀家書好者第一是板好此不足喜但是宋儒經義及查考制度樂律水利兵刑等項名數之書為上文集次之至於雜家小説又次之此一事須着意如飲食然乃可得若悠悠泛泛决不可得也二大兄囬正值嵗暮除夕元日相聚之樂倍於他時獨念吾子耳然所謂有離憂而志樂者故亦不以吾子不在左右之故而其樂有减也初四日正有家集忽得龔家寄來書又知子有得男之喜謁告祖先拜賀慈母叔姪兄弟妹夫一日皆在堂中予雖不喜酒亦不覺引滿數爵也髙堂身體强徤更無他憂大兄出門之志甚决再不可沮想二月間行也子書中所云一二名公及諸名流相賛云云此正是予平生喫虧處子乃以為美何也韓文公所謂動而得謗名亦随之此正不知便宜大抵吉凶並門凶常勝吉謗得名随要終謗重於名矣平日頗不喜而人乃不我置何也今已與世絶名已不入於心況謗乎惟有晩來進修之得舉世尚以舊日南江相待只以才華意氣見譽大是失人如有一二果欲知我者稍以此語之則庶乎不同席而若接談不對面而可論心矣大兄言子多作詩此亦學者所不可廢要當使治經之功多於詞華之事乃為不俗予舊亦誤此至二十七八而始知反今吾子視予又為晩矣不可不知輕重之等也墓所左畔之工予未嘗亡嵗荒用不給亦當勉營只是工程已歇今若有動作須擇嵗利耳今又欲督令道皆讀書已俟秋試此工恐當待冬來矣予體弱本從禀受比頗完固冬來雖着衣不减而全不近火又舊極不能早起今能見星梳頭也文三篇别有論紙偶短不復再幅三翁熈采何佩甫皆是好友既與汝相知故於我亦不薄我亦待之如汝之心但情跡不能數數然耳翁子臨行時曾以一本舉業文字投我此君我意極以生禀體貌及神情志氣中取之决其為我軰人今觀其文殊未為佳雖有新美精爽處然大約氣不厚力不昌少明目張膽之言而多裝綴支吾之態豈文章亦難論耶本欲與言但此日乃其發程萬里吉辰而直言其文字不好太不近情故説與汝到京日可與論之還須飬得氣厚些方成一有力量文字大抵氣厚要神完神完要心純諸子之病總是心不専精故精神散越而氣不得厚中間有厚者又屬之所禀矣今既禀不及人便當存心飬性以充之耳家中事體及汝官中情況俱使翁何二君知之盖二君已知意趣不獨情誼無間而已到京亦可略當吾面談也四習齋公為政之美與相知之誼想備聞之渠亦甚慕汝此畨相見便可定交盖此公超邁特絶出流軰真可以前軰事之不徒以一日為官於吾土之故也向時紛紛之妄語萬不足信有可以盡心盡力於此公處决當盡之亦以稍見我相報之意也此公在漳州曾以我立論於當塗處頗不見信大抵其人見卑趣淺本不足以知我姑付之於不必問可也汝亦勿用以此太戚戚汝兄已拚作林下太平民但得精力完徤把學問制作兩事結局成家視功名何啻霄壤況區區名寵間哉汝亦當知此意不然徒以此為盡心於兄以為極為弟之道恐於理未極而於情反屬私矣此非汝兄迂濶髙論學者常須有此意方不随塲悲喜也平冦詩四首為此公作又士夫文是新山名而我代筆皆我所欲為者汝觀之亦可知此公之美矣五邵武舉寄來復套疏議刻本覧之未終已見其一團孟浪之氣今聞此議中沮如其果為之恐更有可憂者耳中沮之議猶見廟謨然因而譴逐輔臣械繫總督則又不得為盛徳事柰何柰何至於聖諭一紙傳播逺邇闗涉尤不細惜乎當事者之計失也吾平生常説近時幹事主功之才不為不多能議論為文字者直是絶少且如曾公疏内起語外裔之叛服靡常中國之馭制有道此二句就不是請復套事内話頭此如向時天方土魯諸畨乞貢題本可用作話頭耳至接二句云圖難於易防漸杜微尤不相闗中間文字滔滔二三千言無一語是着實經制事功之文不過一庸舉子荅策塲信可醜也至於其中誓不與此賊共戴天之句大為失言此語只東晉南宋人奏中用得如何妄謬至此所用事實如成湯征葛裴度討蔡晁錯削七國之類無一事是當此自有漢唐人經略西北事跡可援何故空疎乃爾至如復河朔之故疆一句兵部覆議亦不察而循用之豈不太潦草耶此偶因談及文字細故若其間方畧尤為苟簡輕率今既不用其策亦不必及之矣汝毎書以成一家之言見勉恐卒無以副汝之望是可憂也吾於此若不副意猶頼汝之才志可託以此事然觀汝今日居官其得用力於學又似逺不及我為郎之日吾未暇自憂而且為汝憂之不可不及時努力若度此事不能成家即須棄此不顧絶筆不為如先軰魏莊渠近賢潘樸溪並不作詩文直一意正學豈不尤為斬截超脫不至兩失乎貴在早計勿悠汎自誤也六目下既為郎事事要有根據而要事不妄須精神聚應接周旋照顧多極分精神便於臨正經事體無力故今日尤當斷交㳺而此時只以作郎中一節就變局面未為不可以為郎便有事有事便有形跡便當闗防乗此多閉門少騎馬出街則所省亦七八矣為郎官與做外官要通敏活變随時随事斟酌人情荅應發遣而為郎只要記得職掌事例熟守得條格定便是好郎官而題稿與行稿貴有好文字今須日日取舊稿及他時諸公奏牘䟽議等集閲之亦有可相資益且或可採用者就是近時夏桂洲奏議此已是欠學力根據之文然猶為綜練詳贍亦可觀也若林雙臺陞早汝調早則儀部無日不是稿又須於典章名物禮樂器數有些查考一部文獻通考通志畧杜預通典常要在目矣留心留心七來書所問詩作豈容易談第一要有學問次亦要才力不弱每見世所稱才子所作不但去古人逺雖何李二公尚隔多少層數然今人易足又眼不明或已有輕視兩公之心而自謂所作者乃初唐也不知初唐本未是詩之佳者故唐人極推陳子昂以其能變初為盛而李杜繼出此道遂振同時髙岑王孟乃其大家今只取此六家詩讀之便知其妙而見今人之所為者皆陋淺無足觀矣故為詩於今之時者使真做出初唐詩已為擇術不髙況又不如初唐今且勿説到骨髓處只説箇大槩初唐之詩千篇一律數家之集皆若一人而一人之作亦若一首其聲調雖俊美體格雖涵厚而變化終不足盛唐之詩則人人有眼目篇篇有風骨即此以觀亦畧見不同大致矣吾向贈宋仲石詩如起句洛陽橋外路萬里指長安今贈唐婁江如帝心嘉勞來户口不虚増結句如相送情無已寧因感遺肝莫倚鸞鳯志今當作鷙鷹皆不容易得然知之者少矣舊嵗與方洲逰山詩句句俱是風不涉陳套不守言筌然方洲亦未甚解其妙也信是知之者難如取路非髙足入山力復餘畏景在城市聊兹息茂陰此等起語如堪嗟二畆半促促邑中居明歸應復望惆悵使顔衰此等結句總是唐人中翻來然何嘗涉他成套也意之論是如此然遣字造語亦須知其不同如我所舉此數語都是史漢文氣一字一字都徤若一時諸作惟荆川時時能出此妙意然句語遣得亦有未到雅徤古老處今只㸔髙岑王孟杜甫之詩便能知之李太白猶不免輕浮而失倫次也但天才勝人超絶千古不得而肆譏彈耳吾詩自覺於古人合處不如文文則有全篇合或有過之者詩則不能如此然今人窺我門户則猶未耳只自黙黙存記此言日讀古人又参㸔時人所作久之自透露見識出來則雖做不得古人之詩亦論得古人之詩矣但論得就是學力更勝於作得也論得者或不做得不妨為名家做得而見不得終是偶合且亦無不明而能作之事也故凢事先須從識上起因汝來問偶及之恐汝亦未得開曉也八留子行來領書無甚欲言者矣文一篇正今日作者遂以封去有欲見者可出與觀如非欲見吾文者不必自出盖文之學不明於今甚矣驟見使之迷惑驚怪無益也方洲嘗述交㳺中語云總是學人與其學歐曽不若學馬遷班固不知學馬遷莫如歐學班莫如曾今我此文正是學馬班豈謂學歐曾哉但其所學非今人所謂學今人何嘗學馬班只是毎篇中抄得三五句史漢全文其餘文句皆舉子對策與冩柬寒温之套如是而謂之學馬班亦可笑也此話無處説起惟汝不可不曉他人不必為之强聒徒取其譏訕耳屬有客草草九前得汝書復我所諭俞虛江之未可得志於北云云極得今日之弊若汝不言我亦不覺得一說破便躍然矣據今日内宦壅蔽與權勲相倚為奸欺豈容一赤忠智勇之士成大功而不忌者乎若使功得成而後遭忌則虛江馬革裹屍之志已快而吾與汝亦不甚深為之憾正恐功不得成而身已受大禍如汝前書之所云者耳世道如此時事如此可不痛心疾首耶所以一向不將此意通之虛江近得虛江來書慨然以王愾國憤為已憂有鳴劍沙漠馳槊朔野之志此誠烈丈夫之風無雙國士非此人而誰但我已先以汝之所云復之欲其且盡心於南夷之經畧而勿輙以北事為念想虛江得吾言自能喻矣其弟承乃兄逺指欲得我一書與汝留意推轂致之北邉盖虛江信我兄弟相知之深又知汝之有志於世而當事一二大臣松溪雙江皆於汝有道誼之講契故欲汝為之盡力非為虛江盡力乃是為國家盡力求將也我已復之虛江云不待我以兄之分相囑汝自已為世道留心矣適方為汝嫂治墳在龍頭山次而虛江人明日行故特來山中取書筆硯荒潦信筆具此家事無可及也遵巖集巻二十四

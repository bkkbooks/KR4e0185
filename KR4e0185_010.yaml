body:
  text: 遵巖集巻十明王慎中撰序送尊師易愧虚之任夏津序古之為師弟子者其為學易明而為名易成也其固有不苟然者乎其業門也專其守論也篤轉相誦述不敢改其師說及乎臨位從政惟師之知崇臨位而不可受曰吾師之未達也吾何庸先焉從政而不敢廢曰吾師之所教也吾何宜變焉是故其師之傳益以焯烈推衍而著於人因以貴其身此其學之明而名之成也豈不易哉漢施讐之於易也可謂深矣不有張禹魯伯之徒為之推明位必不至於愽士業必不得立於學官丁恭治春秋雖寖已進用然得承宫樊鯈以為弟子而其位始尊至於鍾興之受爵曰吾師丁恭也而恭卒以侯桓榮﨑嶇草澤之間名不聞於州里身不齒於庠序何湯一言卒為天子師是三儒者窮經懐道卓為世表皆以其徒顯身榮當朝名列載籍可謂盛矣葢昔者孔子之欲仕也既以子夏先之又以冉有申之聖人之盛也其急於得位也則有所用於其徒况其下者乎然則漢之諸儒所以事師亦不謬於仲尼之教哉嗚呼如吾師易愧虛先生者豈有讓於古之為師者乎先生學必尊乎聖人論必考之前經孔孟之誦不絶於口宓姬之文日惟於心晝坐宵興不知日之出入星之殷正也微之乎圖書之奥著之乎筮占之法賾之乎物宜之象深之乎性命之情老儒皓首而未通後生拱手而不議莫不尋繹敷暢辭瑩義精虛而來者實而歸葢虛齋蔡氏之易盡在是矣以先生所就當漢之盛髙可以取師傅侯相次亦不失補郎吏立愽士今乃沉晦棲遲所遭如此嗟乎先生之學既以不愧於長卿子然矣而其徒乃無有能為禹伯宫鯈之事者則是門人之罪也某頑鈍鄙樸學不足以取容於世心有餘而力不逮徒知守其章句不背師門覩先生之在下位碌碌無以自效於先生之行愧發于面莫知所言復忍恥而述此者將以貽於同門之士庶有聞予言而奮者他日或侍經帝前從容為上言曰臣師誰也先生必得大行其所學亦如桓春卿之歎曰何仲弓之力也小子亦可以釋愧也夫小子亦可以釋愧也夫方伯楊方城先生考績序古之君子出而有為於世者雖其負兼人之材擅出世之寵必宜之以天下之功然後可以大行於時不疑於衆其作而任大臣之事也論有發天下之至難而辨愽健敏之士不能傲之以所不知事有變天下之至安而耉老遲重之臣不能侮之以其未試非材寵之盛燀赫耳目功之所積誠白於衆志而當其心也功之所積非一日一職之為也盤桓之久踐更之多勞有不可勝而精有所不能習而挾材者忽於俗務有不屑之心居寵者憚於苛文有不安之志故功不得成而衆無所見葢亦有作而任大臣之事者矣議出於廷而訟聚於表著之位政加乎民而毁盈於道路之言豈非傲之以其不更之知侮之以其未嘗之為乎今山東方伯楊君子所謂負材擅寵而宜之以天下之功者其人哉始君釋布衣離巖穴濡墨操筆於天子之前天人之學儒墨之辨王伯之略横馳旁擊浩若江河今皇帝親為覽嘉賜第第一一日而屈四方之士舊學失色同進闗口屈㐲斂避以推髙天下莫不聞其名優游親近侍金門而上玉堂材寵之盛無與為伍及乎懐印去國周游諸路投煩畀冗無有不屑不安之意介於其中出不窮之道以應物教興於陳宋鄭衞之墟而政達於三晉之境其最鉅且久者則在山東以地計其廣狹則吏之專城而處在所裁督而臨長者以數十百以人計其多寡則户之食土而育在所收拊而蕃養者以數千萬莫不禀政受事畏義涵仁於陽開隂闔之下而委曲纎悉幽詰細綜極其勞有細人之所不勝而居之以不倦致其精有小史之所難習而察之以無遺宜人之功較然暴著作而任大臣之事固有日矣異時聞有發論行政於朝人莫不得其心而無間於口者非楊君也耶昔董仲舒賈誼有其材矣然不獲其寵公孫季有寵且有材而不有其功故南越設難䇿屈於買臣弓弩創禁議駁於吾丘鹽鐡興事言黜於桑孔所謂智受不更之傲而為蒙未試之侮者也宣帝之於望之方其談經獻議之日已識為東海蕭生以其問學議論持重有餘屬以為相然且馮翊之行再於平原所以嘗於事而見功也明主所以用人既微之又章之其道如此而交楊君者乃以居外之久為不遇於上豈非惑歟望之在平原自疏求入其為馮翊也意不自得復以疾引至勤非有所聞之諭而後達是臣主猶未相得也楊君受上之知以其身為天子使無左右而不宜不為幾微自失之意作於中而見於外臣主之間兩喻不惑何其盛也君其竢哉上方圖君之功矣賀山東右使劉南泉公拜左使序有殊世之才而器不足以受則不可以大施才之用也有地器之受也無方以無方運有地則無施而不可一謂之毛羽有決起及搶榆枋而控於地而有培風負天而圖南溟一謂之蹄足有敝䇿傷吻日不踰一駕而有頓轡踠足移晷而馳千里人之智力有察幽眇於須臾而或時日之久不能見明觕有應艱大於倉卒而或安常之居不能綜細易才之相去若是遼也智足以察幽眇力足以應艱大如是而謂才矣然其始接之也鮮或不疑其猝值之也鮮或不驚不疑不驚而應且察之矣其既成也或鮮不矜見人莫予若也或鮮不伐乃能不驚疑於始而無所矜伐於後如是則謂之器其定也不可易其虚也足以容所以用才咸適乎張弛之宜而中乎闔闢之度故無不成之功遡往以觀久矣中人之多而殊才之寡其果有殊才也則必有殊用官不以資叙禄不以勞進葢天之與之者甚難世之須之也甚急豈宜與中人者計資而叙程勞而進也往予立朝則知有西河劉南泉矣始公舉於司馬之屬出謀發慮佐尚書之政議於堂皇之上而得乎邊圉形勢之便將帥用舍之宜人不知其出於郎中之畫而見為尚書之功其為郡於開封也寛猛之施若水濟火宗藩之重不能狎亦無所致其怒豪猾屏於市肆而細民自得於蹊谷田井之間監司部使者頌薦交馳未嘗小見施施之色劬劬終日㤀其太守之為尊所謂殊才而器足以受宜莫若公然且周旋中外盤桓蹈履資之所積勞之所效與中人權量其錙銖尺寸鴈序而進以身勤職二十有一年矣而始為左使於東藩其用之不謂殊也予謂雖有殊才大器而使御未信之民理不習之政亦未可以遽得志當左使之方虛而新命之未聞也數十百城之佐使長吏莫不思得以為長百千萬人之衆莫不思得以為牧其信於民也如是財賦之計邦鄙之籍水泉土田之政師旅徒役之事則右之與左一堂而治者也以無方運有地而治既信之民已習之政吾知公之功德將益明光於東方而殊用之且旦夕至也夫左之與右固耦置而敵任之官也右之為左特去此之彼之間非有晉秩之寵增禄之富也而諸公僉以為公賀其固為斯乎贈憲使陳中川先生之任汴藩序余讀虞書至於九徳咸事俊乂在官百僚師師之文想慕其肅讓和穆之美竊見古人仕不㤀學而進德於在官也夫六德之多固三德者之所少三德之有或六德者之所無彼以其多寡有無相師而日益焉則古之君子葢未有不全於德者矣然猶於服采在僚之日得之其職事之交勉踐行之相觀精神之感而心術之示急乎治已而幸於近人樂得於所事而憂其所不至莫不忘其身之所有審乎位之可居和穆播而爭戾不生肅讓之興而妒媢之去亦其固然也今之士者多儀宻節趨走揖拜之度之所驅束苛文峻體簿牒程課之責之所侵加其繁難習而其變難遵也則夫職事之所勸率踐行之所切摩固已淺矣而利害得喪愛憎毁譽足以䧟溺易誘之心攻奪未定之見者又不勝其至前傾危之俗成嫉妬之機長所謂精神心術之相感示者不復可見故入官之途為喪已之階名位逾極而形軀志慮棄壞方盡嗟乎今之所以進人而用之於邦家以責其亮采浚明之効者固非夙有日宣祗敬之實者也所以損之使不得成又若此宜乎成材之難而有志之士深病而欲迯之也余少未有聞而早從宦方圖進其所學又恐恐然有今之憂其來赴齊臬也幸而得從諸君之後諸君皆今之賢者而陳君獨為之長其賢尤為諸君之所事陳君之德余不能列而稱之其積之也厚其發之也時和平中正視虞書所陳之目其不備者亦鮮矣余朝夕事之扣其所積察其所發求所謂和平中正者擾其偏駁拂戾之氣矯其背馳沮迕之行德之多寡雖不敢庶㡬亦將自是寡過以免於戾蓋不越夫儀節文體之間而所以勸率切摩者不為無助至於精神心術不暴而可喻無間而易知足使傾危嫉妬之夫聞之而愧雖以余之愚君亦辱有取焉顧相從之日淺遽去而不可留也不能不致恨於奪余所師而介然於懐諸君之事陳君皆為已久其情益篤其趣亦不異於余也於陳君之行咸謀所以贈之以泄其不㤀之思余於諸君齒最後宜任執筆之勞也故述其趣之所存以明諸君之意其所眷眷不能釋然於兹别者非昵繫之私因以告夫豫州諸君子使知所事且勉夫有志之士欲求學於仕者知今之為僚者猶有可相師以有成如余之所遭無所用於病而迯之也贈别王在菴先生拜官去齊序學之不明而道之不行也非夫蔽焉而不講置焉而不為者之為患而講之而不篤為之而不力者之為患嗚呼彼於聖人之道既曰講之為之矣夫亦不篤而不力焉耳而卒以患道者何哉負之以莫大之名而莫掩夫不繼之實則叛者之所從生誘人以其異趨之景而自見乎不能至之形則怠者之所以益固士之矜車薪之火之功而富於荑稗之用者反足以自安而不遷率天下之人樂他技之攻甘背大道者非由此也夫今之為士者少而誦聖人之言資之以文其身而得志於時効當世之務從有司之政復治聖人之言不舍焉葢鮮矣而講之為之者又以不篤不力為道患聖人之學其終不明於今乎非卓然有志確信不惑者何望焉吾友王君在叔生於絶學之後流俗之中慨然以聖人之道為己責行足以信其言故講之也篤識足以致其勇故為之也力章章乎有可繼之實必至莫禦之勢不為崇峻乖異立已之名而示人以景是非卓然有志確信不惑者歟破叛者之口作怠者之心相與舍他岐而遵大道豈不在吾在叔予以是知正學之可興而賀吾黨之將盛也聖人之學曰不易乎世不成乎名世之不易非惡而棄之也在我者有不可變焉耳名之不成非辭而避之也在人者無得而稱焉耳七十子之徒若由賜求赤游夏諸賢各以果藝敏達禮樂文學成名斐然日章而仲尼獨許如愚之回曰未見其止如以其可稱也則是諸子之進而顔子之退也嗚呼孰知夫諸子之所謂進乃顔子之所謂退也哉耳不可塞目不可揜口不可閉手足不可格接而縶維也四者之非禮而皆曰勿之視聽言動焉天下之物固有不能干吾之聰明而亂吾之聲氣者矣道之可以跡述而言効者乃形氣之末而非精微之用也而欲一二守焉恃以無變於世鮮不為所㧞矣道之在天下非一二人而有之也在叔其烏得獨講而獨為之乎然則予亦安能妄言之而諸君亦安肯妄聽之乎故書以贈王君因以自勉且質同官諸君以為何如也贈雍里顧先生視學河南序古者天子諸侯自國以至州里莫不有學自司徒以至比黨之正族酇之長莫不為師愽置而嚴選事尊而任恒其立之為師而以道得民者皆其父兄長老所與同溝遂川涂之人也耳目便於相接之親志意發於時觀之素其術則别之以詩書禮樂其德其行則一之以智仁聖義中和孝友睦婣任恤習於口而被於躬皆先王之法言徳行淫詖之言竒衺之行無由出於其間凡可以為天下國家之具必在於學士之由學而出者皆可以為天下國家非必上智大賢苟不至於下愚不肖於道皆可能而知也雖設為不率之刑有嘉石之坐以起愧逺方之屏以見辱然蹈之者鮮矣由今之道則里鄰之長以至都邑之吏有得民之任者其職不主於教而詩書之業獨領在學官畀之甚易遇之甚卑天子所遣視學之臣特憲而臨督之者分道而處屬城滿百則古者公侯伯子列爵而守之國者數十也學者之多則司徒國子秀選之士不逮其什一也色貌不詳於目聲音不接於耳其所為教不得不倚於期命章條而去古已逺無復有先生之教法禮制自拜揖坐興絃歌誦舞盡出於簡陋之習歲試月校不越乎方尺之簡十百千言之篇道徳典常之大脩身以為天下國家者棄而不治邪説詖行淫於耳而詭於目無畏於見距而方盛於有述其為苟且繆悠如此而望士之志道豈不難哉悼世君子徃徃議於更制定法然法終不可定而制終不可更所謂教與學者又未嘗一日廢於世法與制之不可復而教與學之未嘗廢則苟且繆悠者徒相循於無窮嗚呼先王之道行於教法禮制而其本出於人心非能作其所本無揉其所弗順也不反求其所由生而致咎於不可必復抱空志而㤀實功是使豪傑之士無由興於文王不作之世也今之君子有化民之志者可以反其本矣吾友雍里顧君中介而外溫行峻而氣和志於拔俗追古見可而後言擇地而措足與之居久不渝乎其始而外無有飾於其内予雖欲求其間以致忠告効他石之攻卒莫能得其疵也奮乎百世之下而興於文王之教若顧君非所謂豪傑之士歟其往視學於河南也汝鄧鄢謝則文王所化汝墳江漢之域也河朔黎水瀍澗之間則周公所營以定殷之遺孽庶頑也方當盛時德之所刑足以變淫女頑夫故閭巷之游女有不可求之思逋播之衆式化于訓以有可彰之善及其衰也則征于鄉而羣庠序目為秀選之士者反不能有成豈其性然耶嶽神河靈厥産維良必有豪傑之士克成顧君之美而興者顧君既以所履之素暴於人之覩聞起言前之信乃始為之闡明正學開其不慮之知使各得其本葢有者未嘗可亡順者不假於彊則先王之道其行且明也必由中土始予於顧君之行卜之矣夫樂見斯道之興而致願於吾黨者是予之心也其身之不能而以口勗人是予之罪也夫送中丞王石岡公還朝序昔周道衰而宣王中起雄南征北伐之威其興衰撥亂之蹟見於詩之所詠者於北則有六月於南則有采芑江漢之詩曰四方既平王國庶定時靡有爭王心載寧夫一隅之地凴居之族深谷長流之所限其服其叛何足以動王國而勤王心之勞而詩之言如此尹吉甫固以江漢之平為宣王之美張大而歸之仲尼删詩使與常武相次列於宣王之雅之末以明中興之功至是而成也豈非江漢之間地大人衆形阻而俗雜介錯於京周之阬而近不一於夏而非純於夷未能以為内而不可以為外先王固欲梁圉其山川井邑其人民以固威嚴之勢而立長久之安非若玁狁之匪茹勿用窮追氐𦍑之荒忽惟其來享而已也而召公之所以經營江漢之滸者不以其叛而疾之不以其鄙而忽之井其田畆正其疆畔以定其生業而平其貢賦使之弭去爭心而取正於中國豈其狃於戰伐之謀恃夫暴猛之用而以兵革取威哉故其告成之詩曰矢其文德洽此四國言虎之能不以武力服人而宣王仁義之化陳於江漢則四方無有不和者矣今天子方隆周宣之德建中興之業順乎内而威乎外當宁懐思睠焉於四方之未寧而尤有意江漢之間葢樊鄧房随褒沔相錯之墟其民尤為難畜而易動嘗煩朝廷之議而開設方略遣大臣以臨制之開府於鄖而以撫治為名者將百年於此矣然其化未洽而民未和而中丞王石岡公實受簡命來制兹土是宣王所以屬穆公之意也公出嚴於寛用武以文馴之以德義漸之以禮教雖不廢乎征誅之律刑殺之科而其意常不在於此故其易動之氣銷靡而帖柔難畜之心斂置而悅安布宣天子明明之德徧於南土以為四方之極持之以匪安匪舒之心而行之以不疚不棘之政告成于上而寧當宁未寧之心天子以為其化既洽其民既和則不宜久勞於外而逺於左右公自是去南土而還矣南土樂公經營之政憮然於其將去又知公之居中制柄所以施於用而行其志者宜益廣大昌明而南人之永永有被也相與釋其憮然而願之亦欲如召公之於王同其萬年之休而垂不已之令聞也後有欲考今中興之盛者必在於斯矣江漢之詩多召穆公之績宣王之美於是乎在臣之能有成功君之明也夫受君之命克終其事以有功又以其功載君之美於無窮而有考於後是人臣之大義也故某屬同僚陸君輩之請欲以有贈公之歸不以寵厚崇巍為祝而獨以是為公願焉送河南左方伯范瀋溪公入覲序今河南分省奄有豫州兼履徐荆并冀之餘封有土與民比古諸侯之國在於所履之内者以百十左使皆統而治之古所謂九州之長得以君稱於其國入天子之國曰牧者也所統既廣地大人衆衣履冠帶甲於四方藁秸粟米貨賄筐篚之輸以充備太府填給邊圉者旁羨溢出置藩棊錯固磐石之宗孫子不億如螽斯繩繩之盛而當食於其土計口受禄斂入之途益以多端又亘河被山盜敓鼔鑄椎埋攻剽之奸往往而有宛丘之婆娑溱洧之相謔河上之翺翔林下之喪馬妹邦之崇飲城闕之佻闥猶有未殄之風獄因以繁士皆亡伍而人材濶於學校若是者皆有責於政教而左使者政教之所出也豈不亦居勢之難者乎而瀋溪范公之來為左使於河南也屬屢饑之餘嵗流離餓餒人不相保多救死之心榮辱不知而禮節之所難御居勢之難而兼遭其時公仁心為質誠發於中若疾傷之在胸腹肢體惟須臾之不能安朝論夕省矻矻不倦求民之所好惡思其取舍之方不越堂階而四遐之陬山居谷聚怨咨願欲之情畢得出慮布條授意羣吏使推明而行之孰就餒而待哺孰思還而無宅孰有田而不耕孰嬰疢而未藥招徠休煦賑發補助開示科指本於篤生之心躬行素約以導人之所嚮則壤之賦非可罷減嘗使征督後於綏輯度其輕重用一緩二民既懐和寧其幹止樂生之氣還於區内論士之秀者於鄉以三物賔而禮之以貢於上居勢如彼遭時若此為之未久而政教之大者皆已具舉葢公之為長於是州亦可以稱於國曰君而不慙於其號矣而當入天子之國述其所職以修常典公宜以其為河南者告於天子曰自臣之至河南也民有枵腹孑立而困於供役者今也病者起而飢者食膚革充盈復完為人也有棄屋廬井竈而他徙舍耒耜而竊者而今也荷擔而還築投戈鋋而縁南畆者不絶於里閭也有官師啼飢子弟改所業以狥一飽而奪其志者而今也挾册而誦鼓篋而來游父兄長老知以為榮也臣不佞不敢為謾其隐賢而自蔽又非臣所以來朝之實也天子方隆虞帝之德闢四門以詢四方之治忽其察聽於中州為詳必信公所自言之不謬於其功也且有以命公矣昔漢龔遂自渤海召入其客教以無自言功歸美於上遂以此䝉賞而世亦以客為好謀此特後世佞媚之術非先王君臣相與以誠之道也虞廷之典敷奏以言明試以功其所言也乃其功也惟其功言之不相謬耳公之往也其毋以自言功為嫌哉贈河南參政胡爻峰公拜河南按察使序國家分省置使衆建參僚以輔之凡以施政出教長治其民也最後乃離次省中郡邑州軍度其逺邇列於諸道參僚分而有之著於制令曰分守則共所長彌專而於所治彌察矣予來參河南之政不得有分道特持空文末議以佐於省故不及知其土之性與民之情而常從胡爻峰公問之公專長大梁而間攝汝南大梁視諸道最鉅汝南於省為逺公政教所及其在河南分省所統之域己十八矣公之言曰夫因俗為政豈不然哉汝南畫有申謝鄧唐蔡息之墟皆故楚之遺常患於憑阻而險健大梁兼舉宋鄭陳許韓魏諸國所以羣相推羡闕樂生重法之心吾所為拊循斷闕以違其患害從其好欲所以精於心設於事者纎巨曲折不能具詳其大致則汝南之民難以智馭而可以理勝大梁之民難以威服而可以信發此吾所以行於上者未嘗違道以中其私彼雖於私深有所拂而自知屈於理之為是其諭乎下者踈目簡節語言不煩無不以情來謁而舍其欺昧隱疾之弊故民之於我勢若甚判莫不望而能知來愬而去者愉愉然悦也惟其長民之吏職業墮壊亷檢放失連數十城之間徃徃而有驟而求其大罪則不可以勝誅細過之責微文之議則小懲而不足以誡之故吾之為此常樂於民之易諭而病於吏之難教由是中州之人情與其土性予因竊有所聞且知公所以為政之大者存之於心及公以使事入賀余攝治大梁又得盡觀公之條令科指推明而承守之雖其材之迂時之近獨以有所前授免於廢官敗事之謗每退而自考輒爽然自失而信公善於為政盖人之知公者衆其接於談議者洽觀於行與事者詳宜莫如余也已而公有按察河南之命予惟公之政教既已及於河南者十八矣持之以久漸之以深將有不待來謁而各得其情去其私心以安上之所為無俟反而屈於理然後消其非上之心其所謂十二者亦且乗風慕義如大梁汝南之民自制於理而交動於誠公之樂乎易諭之民宜有甚於異日矣長民之吏奉令承教其講之益明其尊之益篤起壊收放以自免於誅刺而希察舉之華將無可求之罪可議之過由是有大罪焉而求之深不可以為驟有細過焉而議之宻不可以為苛吾於是喜公之志益明而治之可以成也凡在同官皆知公而好之者欲有以贈之左使范瀋溪公以余為聽於公者洽而觀於公者詳也故使為序贈郡伯金鑑濵公入覲序人臣之功嫌於自列故有曲詞以隠賢貶己以晦美其義所以居謙處巽而為長者盛德之事也義有不出於此者敷陳所以明職論述所以闡猷則質言直已而不得謂之伐此古誼也唐虞之書所載君臣問對之詞葢可觀矣命之以位則遜勉之以職與事則或詳叙其勞勤或丕揚其風休而未嘗有自列之嫌故禹叙治水之勤而夔揚作樂之休使悉其勤者知其為之之難歆其休者繹其致之之自所以存誡儆示奮作安焉而不㤀享之而不怠雖謂之質言直已以明所職其於熙亮天工翊襄至治之道廣逺而精微矣彼所謂大臣也交脩黙化於一堂之上獨斡陶鈞坐論道本其功不在於職與事而義猶出於此况於處下僚守逺地獨以職事自靖為獻者哉國家裂土為郡縣置之守宰而寄以元元之政責成託重視他所置吏其意獨隆故守宰之職與他所司不侔制為朝覲之禮以親之使三嵗而一來同將以考其在職之任與不任以為幽明之實而加黜陟焉嘉靖三十二年適當其期而惠州郡侯金鑑濵公當行郡守之職兼有禮樂刑獄水土稼穡虞衡之政侯之學既素明而才又能兼惠州之政無不備舉實能推明天子安民之惠致於海隅其功之恊於職厥有可言者矣今入覲之制考論職守以揆叙幽明之意雖近於古其親諸侯㑹羣后之體則實不類其以職來同者皆聚於考功執簿書課騖集而旅謁鴈序而前行功過決於泯黙不可測之中對揚敷述之美藐乎未之有聞今天子蒞阼之久化成而不倦方且闢門四達覽察遐逺竭索天下之情以作臣庶之勲庸來同之僚不患無難乗之㑹而惟患無可述之績金侯兹行親逢盛㑹在郡之功又厥甚彰著宜以職自獻使明目達聰之所聽聞窮盡海隅幽隠而不蔽於近則存兢兢之念而起勉勉之思道久化成益綱紀而靡怠荒未必不在乎此其義主於獨明所職遵逺地小臣自獻之誠而其道與古之大臣熙亮翊贊者合然後退受考功之牒還赴治所以終安民之惠豈不偉哉晦美隠賢託於善謙能巽欲以庶㡬長者之風非吾所期於金侯也海豐尹王君一貫族子也以職事事侯奉令承教得以寡過嘗謂於侯有臨長之分而又有師保之益數千里寓書委予序贈予既久在下風竊有所慕重為族子私德故為此文寓王君使持以為侯贈送郡侯方西川公入覲序欲天下之治奚繇哉治郡與邑而已裂天下之地以為郡邑而與之以民郡邑治而天下治矣分土與民既多置吏亦廣而人之材足以為治者每病於不足舉天下之大而材足以治一郡一邑者錯居於其間盈十而一二得焉亦可以為之治彼所謂一二者錯見於郡邑則郡理者有邑弊之憂邑良者有郡否之患邑良而郡否固其勢之所不能及而非其責之所任也名為理郡而治效不著則所謂理者猶苟然耳郡理而邑弊者導之則可諭威之則可儆其不然者去之爾未見良邑之能易否郡也且彼良於邑而不獲理郡者寧獨不能易其否也形阻勢奪文苛而體撓將有不得其為良者使其為邑於理郡之屬充乎其有可恃之志沛乎其有得肆之能而郡之理内以益明是欲天下之治治郡而足耳舉天下之大裂千里之地以環境者殆百數而以其郡理者錯於其間則天下固亦稱治矣今天下守令每以三年朝於京師使各以其所為郡邑者自列於上因核其治否而廢置焉蓋將以責天下之治於斯人而考之之法宜如此也是嵗泉州郡守方西川公當入朝吾所謂理郡者泉州是也公於為郡先之以德而職業事功嘗使其屬交勉以自見不沮其氣而回易其所守邑於其下者莫不皆為良蓋其志充然其能沛然惟恐不為郡自力而不知其足以為長以自見也導之而已矣無所俟威也郡所統七邑得自達於天子而與郡俱入朝者四邑耳其不得專達附郡以通者公固不掩其所長且將為列其所以治邑者以告於上此公之心也邑良而獲理郡無阻奪苛撓得為其良者葢已幸矣又將因郡以達而其功得為上之所考其又幸也方今守郡能以其才自為理者不為少也成其邑之才以共為理且不掩其功而務使有聞焉惟公能之他人不能也德化邑令緒東山安溪汪瑀永春羅汝涇皆不得專達者請文於予以送公故喜而序之送朱肅菴明府大人入覲序古今之變而禮為之不同亦各從其宜與先王將親天下之建國而賔之以朝覲㑹同之禮使謹其時効其物以修上下之交而五服之地三等之爵各以其職如王所而玉帛車馬良器好賄選國之所有以貳繅藉備庭實非獨致其嘉美腆重於上人而已退而與王朝之公卿大夫士以享覿之禮相接則束錦總乗介儐之所振有司之所左右牽以告其私而充其發氣盈容之所薦雖不至於傷德没禮其於貨幣固已盛矣揆此義以施之今其可行乎哉國家之職業事守勵天下之有司照臨之以德而昭示百官以輕財之指尤嚴於先王之所以賔其臣者每三嵗藩臬郡邑小大之吏以職入覲一出於綜核功叙辨論官材以明為民置吏之意而物土之獻不干其間其義固已少異於古之所以親諸侯者則享覿之私自非其時之所宜之禮而豈有司之所得行哉仕者往往有溺於俗而不知自審顧欲行其所不得行者上之人常患其然至重為法以禁禦之葢古者以百里千里之國而所以待朝聘之齎用皆有所具可以籍於天子而以私為覿故貌足以稱其物而不為怍而能愉乎於其色蹌乎於其容而為君子之交際而其禮又上之所設以待其有事也故可得而行也今之有司所以具其物者當何取哉則有蔽毁所職之守以具此物而已其陳之而色慙奉將之而容沮屈豈其少也又上之所禦也而仕者欲行之何哉是嵗吾邑大夫朱肅菴君當入覲不持一物以行而獨以職業事守之可告於上者撰次其實以待考論君清脩謹重潔己以立本而忠信明決施於求民之惡欲為之違去聚而與之無不用其情吾知其功叙熙亮官才備修足以自充而無怍若圭璋之可以告明信也君猶以不能行今之所行者為歉曰非敢有惑志於斯然不知者其毋以吾為好異而尚簡也予因為述古之誼與今之制序焉以送之以決君之志曉夫溺於俗者使知朱君之所守亦猶行古之道非誠有意於求異而務為簡者也於是朱君遂垂槖而行送明府宋仲石先生赴召序可以施於其民而後可以行於其君此議道之方而君子之常守也將有以動之而示之以無可惑將有以禁之而率之以無可間此其施於民而可者也上焉以行於其君其亦可矣不可明也姑狥其習而誘之而使向方不可强也勉因其情而導之而使從事此亦其施於民而可者也以是而行於其君其亦可乎吾不知其可也有可以施於民而不可以行於其君此制用之宜而君子之所當辨也今之仕者其得施於民而最便者莫如縣令其得行於君而最著者莫如言官始仕為縣令而善於其官者召而試之而以為言官葢信其施於民者之可而將責以行於其君也是嵗召推官知縣於天下郡邑得四十人閩中獨得吾宋侯一人焉噫可謂精矣侯之為縣能不以法勢逼制其民欲以心諭意寤使其訢然自勸而惡色疾聲不以出已故尤樂與民傾盡不為匿械畜機以深備而巧摘凡有所為諄諄曉語不厭煩復惟恐其心腹之不暴於民而民之不共見之也其苦於自奉憚以利見汙常謹於絲粟一芥之末一服食之細不以苟費一力役之微不以輕用探之無不可見之端而質之無不可告之跡此所以施於民者也持是以事君吾知其有可行矣葢聞之君子之欲有為於上下者皆先取必於其身其身之可必而其所以為之者下焉而為治則不敢取必於其民上焉而為諫則不敢不取必於其君何也民有不可使知而君不可謂之不能也然而下焉者易陵而上焉者難犯世之君子固有力足以咈民之好而快於必遂而守難於矯君之慾而至於為狥誠使易地而施之豈不交適其可哉然彼力遂於咈民而守失於矯君者非其辨之不明而不知其不可也敢於咈民者其動之必有可惑而禁之必有可間以其可間者禁民而民不敢非以其可惑者動民而民不敢倍由其無可守之道而徒有必遂之力也而豈為可以施於民者哉如是而行於其君宜其無必伸之守也然則非有其可者亦烏足以辨其不可信有其可矣則於其不可者果不宜以無辨也不虐於下者斯無所畏於上不見矜寡孤獨之可侮則亦不見崇髙富貴之可懼恂然嫗煦如恐傷匹夫匹婦之心然後能嬰雷霆震擊之威而抗萬鈞覆壓之勢吾所謂不可者非得斯人亦烏能辨之宋侯是也送史大梅君應召序今之仕者所謂政事之勤勩可知已俛首朱墨之間日出坐堂上左律右牒群吏環擁鳫行以進旰不得食勞不得休日決獄㡬何嵗徴賦㡬何牘有可書之功庭有可紀之蹟顧其塵容俗狀拘迫齷齪而中乾外强翰墨之游適不知為何物雖時去其四境而宿棼餘垢猶縈帶於輿馬之下峰巒之竒秀泉石之怪幽過焉而漠無所覩吁亦俗矣間有一二好事之士矯其為彼而以吟詠之藻繢為工登覽之意况自足然情髙韻逺而疎於臨聽非惟不能免於苛譏峻督而滯獄逋賦亦何以自酬其職也所謂不俗者其失若此而彼又不免於俗豈不難哉以吾所聞松溪尹史大梅君葢能異乎今之仕者矣君以竒才起東南藻妙擢發出於靈秀而維揚故東南一名都㑹也古文異書家而有之君皆得繙閱其間六經之元本莊列之𤣥虚屈宋之悲悼史漢之雄深宋齊梁陳之艶靡泛涉而該獵之東南一時綴文之士鼓行竹素之塲倡和推挽必有君在焉未登第而文名已盛行於中朝竟授松溪人莫不謂非君所處且恐君之未有以宜之也君在松溪百廢具舉廩有餘粟圄無淹人以政最獨冠於諸縣而時出其芳標逸致於山水佳勝之頃一觴一詠絶去俗吏之懸其才之兼美如此頃者璽書下徴葢以風憲需之者也夫文章之士如漢嚴助枚臯司馬相如吾丘夀王登金門直玉堂優游親近陪後車之乗出入芬華可謂榮遇然羣臣面折廷諍只稱汲黯漢武亦憚之與諸狎昵晏遊者不同君之才視嚴枚輩不知何如然不得預於文詞親近之列今以諫為職其得為汲黯時也君尚以拾遺補過為忠務為朝廷之所憚而無羨於嚴枚輩之寵也哉送韋室唐公應召序有民而治之而民治以治民之職事上而上獲此士之在下位者之所欲而亦非其所難也而明善之學在於是夫善之明而可以誠身其學至矣天精天粹之盡而神鬼神帝之微言之所不能致思之所不可强通而可陳之法有述之跡皆其麄且外也其實顧在乎治民獲上之間然則政教戒令儀章軌物誠性命大始之物鬼神見象之器至於最卑且細如金榖之權量桎梏之用脱以及唯諾之恭跪拜俯仰之勞莫非精粹之所在夫士之能治民獲上者馳騖以才力淬礪以意氣謹名檢以立操詳文法以逭責則可以為賢矣其離性為用舍學以言政弊非一日也子思得孔子之傳者也其言凝道之學道其中庸盡其精微以致廣大極髙明洋洋乎通於天地蕃乎萬物而細入於經曲千百之中大哉道也而其實乃在乎語黙之節其語足以興於有道之朝而其黙足以容於不可有言之世此所謂君子尊德性之實學也昔之學者講焉而不明有辨之明者而非實有諸已也華亭唐韋室君為將樂期而政通三嵗而民和輿人作誦賢聲四達以職臨其上者莫不推誠相與倚以事功莫有疑且沮上獲民治士者之盛也吾未知其於性明否如何已卓乎稱賢於今矣今召而入試於銓司將以諫職與之也語黙之用於人酬酢講習無適而非是其用之大者為謨謀而著者為諫諍唐君進而立乎本朝以諫諍為職君子之事是君也必有美惡焉而將順匡救之不敢後不得黙焉而居其職也夫能為語黙者君子之學而使之為語為黙則有係乎時而非君子之所能自為也使君子以黙為容豈時之所宜有哉大臣之從事於尊德性之問學而毅然以凝道為責者吾知其為華亭徐少湖公也公進用尊顯方有輔理成化之任必能使天下有道而仕者不以黙自免矣君行矣其將何所言以興於斯朝哉送江西憲伯汪西潭之任序衆人之望與賢者之疑孰得哉其位未至可以有賢者之疑而不可以無衆人之望其位已至可以無衆人之望而不可以有賢者之疑方其備庶僚充外臣有不可易之職與不可踰之法一毫之不取一介之不受而人服其為潔矣一發言之不輕一舉事之不苟而人信其為謹矣然而賢者疑之曰職有所不必守而可以行道法有所不必存而可以濟變何皎皎而為潔也其為避謗而養名耳矣何諰諰而為謹也其為逺罪而寡怨耳矣及其都巖廊據具瞻有所宏濶以泛應則取焉而不為貪而人訾其跡矣有所籠駕以旁行則權焉而不為譎而人駭其形矣然而賢者知之曰苟可以行道而非有愛於其利則謗有所不恤而胡為是皎皎也苟可以濟變而非有便於其私則罪有所不辭而胡為是諰諰也二者果孰得哉無衆人之望則賢者何所用其疑賢者疑焉而後衆人之望彌重惟其積衆人之望而後為賢者所不疑之為則其為之也固為賢者之所知而亦可以無駭且訾於衆人今之位已至而能為賢者所不疑之為其誰歟其亦道無可行變不能應徒為私與利而已烏得謂之泛應而旁行也哉然則非其有皎皎諰諰之素亦未可以泛應而旁行也新安西潭汪公葢吾所謂其人矣不取不受以明潔而人信之矣不輕不苟以致謹而人服之矣由前之位積衆之望吾不敢以疑汪公也今為廉使於江西其去巖廊亦近耳職有不必守法有不必存吾將有望於公矣狥衆人之所望而守前之為吾且以疑汪公矣其為潔也果以逭譏其為謹也果以逃罪耳矣有可行之道當難應之變不務信己之志圖當世之大功為賢者之所共知而好避衆人之所訾駭是為皎皎然而已諰諰然而已豈吾所望於汪公哉送郡伯俞蒲山擢河南憲副序秩真二千石九筵之堂施黄以表觀熊設於軾隼建於旟畫野履封囿其民於内者殆方百里聘享賔祭禬脤之具皆備慶賞利休刑誅譙馘以飾喜怒明威德無所不得充乎體而溢於氣此非卑官也非獨如此而已有所善而求之朝令之而民夕以從有所不善而非之夕禁之而民朝以止政足以適乎其心而功足以恊於其效畜世用而急民憂之君子使得擇官而任之宜必此乎處矣今之仕者不得自擇官誠使得擇而處之未有肯樂乎為守者也其為之者葢天子命之也命之而得其賢政足以適其心功足以恊其效矣則有叙遷之寵陟拜之階謂所以揆其政而異其功為賢者勸也果其賢也其仕也以行志也其志也以為民也如使政不能適其心功不能恊其效一旦而去之矣政足以適其心功足以恊其效是有以及於民而達其志也終其身焉處之可也今一有賢焉則汲汲而遷之以替其政而易其功其果足以勸賢者耶其行之已久其見之已熟一有賢焉而遷之不亟則失賢之誚必逮其上矣非獨然也一有賢焉而遷之不亟則賢者亦且自疑以為不得於上矣夫命之以為守者非必人人賢也幸有一賢焉而當遷之亟是不賢者常久於民上也為民置官者固當若此耶何其久而不思變也吾郡伯平湖俞蒲山公拜為河南按察副使公賢者也然其遷之亦不亟矣公未嘗以此自疑而失賢之誚已流及乎上葢至是而誚上者方沮公當行矣民之從善者將怠而不力逺不善者將玩而不革矣適心之政輟而不圖恊功之效遺以待思公其勸之新政而輕釋舊邦乎抑猶有不然也公其行矣予故論賢者所以擇仕之本心而今之勸賢者其制未得以諗於公惟不忽而存之他日在天子左右預於更制圖治之事其必有以變此矣又儒者之道與俗吏異非其材不同其量異也守官奉職則必有其事矣財賦之計是理之而已訟獄之造是聽之而已俗吏之所為儒者亦烏能有以變替改革反事以施材哉然俗吏之於儒者於以相譬如措石玉間匹鳯鳥以雀鷃也亦繫其器而已矣且夫澄之而遽清撓之而遽濁者其所畜者淺而遇物易變也故其清濁反覆應於澄撓之間如是者其加乎人也其好也必有溢喜之形其惡也必有綦怒之跡其受於人也其順也必有驟中之入其逆也必有莫制之出其材之所及雖足以興事起功肴然而雜陳皭然而多炫然乃乾强而寡味竭索而無餘光何也其器小也公儀休與李離石奢同列於循吏然李離石奢法理之長也黄霸與趙廣漢張敞同以治郡有聲然趙廣漢張敞幹局之任也李石趙張之所能亦公儀休黄霸之所能也而公儀休黄霸之所能則四子者有不能矣是其所以為異者也發憤思古之心覽古人行事有合意者輙低囬歎息恨不出於其時而講服感慕於無窮如公儀休黄霸其人是也况於身接之乎况於為其民與被其政而親見其道之行乎此余所以不能無言於郡侯蒲山俞公之行也公之為政其据法守職為李離石奢而約身循理則公儀休也應物馭務為趙廣漢張敞而崇德教敦禮化則黄霸也渾涵包并沖汩淵邃如長江大河吐納元氣而歸容萬類注焉而不盈勺焉而不竭烏可得而澄撓之哉彼其無矜色而亦無倦容無詡言而亦無詬語立乎不倚之地而行乎無躅之塗動於靡出之門而藏於非閉之鄂此其為器豈長於為吏者可俄度而遽數耶儒者之用濶焉不著於世久矣公行矣行且躋崇據要用其道於天下非徒專於一州而已也公行矣新山顧公諗於諸士大夫曰吾郡有守未有若公賢者也今行矣不可以無贈而以其事委予曰爾宜為文予惟公之為政美善多矣欲一以述之非所謂識其大者也竊論其器以為合於儒者之道庶乎窺公之大也既次其語以復於新山公公曰然新山公以謂諸士大夫皆曰然遂書以為送行序送明府朱肅菴大人序古之交以道義者神融氣合無間於形迹惟其相輔以成美而已故有一善焉崇長而勸之惟恐其不力也有一失焉指斥而規之惟恐其不聞也年殊而志同故先後之叙不存焉位别而情至故亨塞之處不與焉其於臨治之際有事分之嫌而寄屬之私狥聽之惠不奸其間此雖其守有在於道與義而語其數則眇乎其為鋭且末矣友人曹縣朱肅菴君宰晉江而予為邑之人自予間居為邑之長於斯者未嘗不得見也以邑人役於其邑之長無有所謂交者此無所詘彼無所狥漠然而已救過諫失既非吾所有事而誘善納益亦不得誣焉而彊為之忱予之為邑人葢亦易矣以是道為朱君交其可乎哉失焉不規是匿其心而無所用戚也善焉不勸是外其愛而無所用喜也故由朱君之來予未嘗不竭智畢誠思自託於古人之交欲求君之失而規之而君為邑粹然整密完美無缺寧獨施設注措無害理以病民者而聲色言笑未見偶妄而少放萬目睽睽環矚仰視曾無吝悔可為視者之所摘吾雖欲為忠而無所用其戚惟有崇長其善用喜以致情而所善者多不勝其勸君又純心為之非勤初而弛終大勉而小忽亦不待於勸焉而後力則予之情亦近於淡然如向日之邑人役於邑長者爾徒以少知義分之介銳為謹而末為辨無一寄屬之猥賤煩君施惠以是自詭於道義他人良以為難予誠知眇乎其為數矣予性好士往往能致邑子之才者與之游問學講承之樂既非惑者之所知而分誼周旋之跡亦時有出於急病謀困之所為故來學尤多君固未嘗不好士士悅君之德教未嘗不景附而加親然君所以待士專於道義之雅世俗小恩近利曲相濟以苟為賜曽不一出焉士之景附者亦絶其羨援覬望之鄙而無所溷於居近世有司接士禮洽意孚而指目譏訕不得行莫君若也予用是自悟舍己為人之弊宜其至於來毁而㤀其身之賤欲有益於朋友之所為如昔人所稱者皆未合乎義而要謂之不知命也予之缺失君雖不予規然因君所以得士而無弊者有悟焉由是知為已之重日且損其為人之勞是君之於予不肯以言為規而直以身為勸也君行矣予將選清源山佳處築室自休鼔琴讀書樂焉而㤀老雖士之賢者亦將漸裁其所好勤吾所有事而未暇與之游也諸士之附君者多與予游故羣來乞言以為君别予故惓惓述古人之交以志予愧且為君贈又因以釋諸士不能别之思送郡推葉素峰序有吏於此有號於都縣郊鄙之民曰之吏也賢莫不從而賢之曰吾樂得以為君以號於國邑鄉遂之士則莫之應也之吏也其施舍法戒足以為政矣然而未及作人也有號於國邑鄉遂之士曰之吏也賢莫不從而賢之曰吾樂得以為長以號於都縣郊鄙之民則莫之應也之吏也其聲光意氣足以厲俗矣然而未及附衆也鄉遂之士專而陋故常逖聽而從風國邑之士則能覩形而見意矣都邑之民辨而廣故能順事而㨗赴郊鄙之民則常守愿而待孚矣故吏之得民也常易於都縣而難於郊鄙其得士也常易於鄉遂而難於國邑其於得士與得民也又有不能兼者焉彼其不應者半葢有應之者半矣然而不應者之半猶不勝其從者之半也是亦足以為賢矣今有吏於此號於民曰賢而國邑鄉遂之士應之猶於民也號於士曰賢而都縣郊鄙之民應之猶於士也是可不謂之尤賢乎之吏也士民咸賢之矣有問於民曰若之君誠賢矣其將峻陟而大用矣則民莫不以為然如有問於士曰若之長誠賢矣其將峻陟而大用矣則士未敢於為然也夫其賢也所以可峻陟而大用也而為士者莫之然何也夫其賢也豈能舍職而狥時違道而媚上營已之私圖躬之便哉必且秉禮以事貴然而樂諛好卑者嗛之矣必且明憲以禦彊然而亂法暴禁者害之矣貴者之所嗛然而民愉其生矣彊者之所害然而民利其業矣民愉其生民利其業然而躬失其便矣如是則可以峻陟而未必陟可以大用而未必用也此為士之所知而民之所不知也葉素峰公之為推官於吾郡也三年矣有問於予者予應之曰峻陟大用舍公將孰與哉以其得士得民之賢信之也竟枉受知州以去都縣之民相與駭於市郊鄙之民相與駭於野曰吾之君誠賢者也何不峻陟大用也士相與語於學於塾曰吾固疑吾長之將以介蒙謗以直獲罪也今果然耶予聞民之駭也固與之共駭矣聞士之云云也嘆曰予之前識乃不士若也雖然謗以介得又何愧矣罪以直招又何悔矣不悔不愧雖不峻陟大用又何憾矣况未必不峻陟大用也耶公行矣能無慨然於余言哉郡邑師儒程君敏庸黄君紹文輩皆賢公而駭之者也故次予言以歸之使書以為公贈送邑侯羅夢樵公榮擢之任序羅侯夢樵為永春之三年政成譽起方以考績之請請於監司部使者邑人留羅侯甚切不忍其去當路廉知民情檄侯勿行將踰一嵗而侯之政譽聞於朝久矣吏部陟侯為上石思州知州報至民猶以侯之留請於當路而竟不得留也則戚戚以怨州亞郡也知州尊官也品秩章服之貴中大夫也是明陟之典而膴仕之階也民之欲留侯者但知適已之情國家用才進賢有不得為一邑之人私也邑之士知侯之行之宜也交以為侯賀復請於其師求乞文以送焉民之怨非不樂其陟也欲私其惠也士之喜非速其去也知公其用也均之為愛羅侯者也然侯之才明贍敏肅以之當繁冗應劇難無不辨者而永春山中之邑也事簡務稀不足以盡侯之用今之陟宜得繁劇要鉅之地使益展布其未盡之力而又得上石思州也其逺且僻殆甚於永春豈用人者未盡知侯之才也抑必有意焉今天子端拱無為而心周乎八荒之徼域方嚮意親民之吏倚以共理之功比日申敕訓警之嚴不絶於制詞其意可知也百粤之徼雖古荒侯之域而天子視逺如邇以萬里為一席之地非但心思周之而耳目聰明所照燭不異堂皇階序之間也周其地則愛其民愛其民則尤重共理之吏故雖逺僻之州如上石者而吏部猶必擇侯以往也君其可以逺且僻忽之而不深加之意哉且上心之周則於陟明之典尤不吝侯之往益展其才積勞累勤有功德於民不患譽之不起也繼此有陟必有明於此者而膴仕日躋非但今日所蒙之典而已侯其懋哉送朱鎮山先生序樂之係於性者果何物哉中天下以立四海之上庶民由之以定猶以為於性不存所謂天下之英才者求之生民千萬之中宜可以一二數誠使其勢得盡合而與之處猶且寥兮希乎其未足以羣也而不以易廣土衆民之欲何哉道之融合彼已不以形骸牾其同體之真由君子所以定庶民育英才者觀之亦何有不同至其通於君子之志黽勉至教循焉而能明其端悟焉而有益於得斯英才之所以為可樂而彼得君子以定者徒使之由焉而已如是則雖其心之樂猶為形乎其所欲而不足以係乎性也今夫得四海之民而定之豈無英才出於其間而教育之樂亦奚必窮居隠約獨與其徒處者而後有之也樂也者寓乎所性所欲之際而每難於兼得故誦詩讀書修於畎畆之中出而阿衡有商盡覺天生之民俾之有知當其時由以定焉者之衆宜不勝乎賢智之在於教育之下者之多前乎此為契後乎此為周公皆由是也三君子者之樂謂之周乎欲而通於性而孔孟之窮雖其樂可以足乎性而不得兼於所欲今之仕者以位為通苟以得志於有土與民之上已非古人之所謂欲其不遇而處倫類講習不離乎俗學之卑雖有教而不見其所樂又烏足以議於所性之存不存耶道學喪絶之久近世餘姚王陽明氏始倡不傳之學而吉安諸名家能廣其學以繼其傳萬安朱鎮山先生獨禀夙知之性妙解懿衷敏若神誘早嵗開悟卓出流輩中復講正於諸名家交發互證日修月裕孔孟之學煥然有聞使其不遇猶將有以聚儔合朋為窮居之樂而仕既顯矣觀其斂集英華銳迅以約飭乎性情應感之間粹乎其穆而不可犯截然其厲而有足嘉以斯所養而與英才相懋勉乎道德之要理義之歸等分相臨而切偲觀摩之益混同貫徹非徒學於我者得以進其不足我之教乎彼也亦因以有助與起而後知其不困是亦可謂樂矣先生之位將益崇處勢將益便大行乎天下固有日矣其為契為伊尹周公宜豫引以為已責而不得避之葢事業之出於學術者宰割羣品役使萬彚功用變化昭天漏泉俄息千古馳驟六合於一宫晏處之間揮霍運斡不可究極其存神醇固操慮兢業凝精於獨而合志於㝠孜孜然常若畎畆誦讀之專故曰以覺知乎當世之民而皆所以自明君子之於學葢没身而不足非謂修於畎畆而行於君民如後世所稱學而後入官之云也先生欲引乎古人之所以自任者則宜終身於學而日見其不足非謂昔日所職者學則與諸生相勉今日以政為職又當勞乎民物之務首尾衡決前後􅏠離役其身以狥所居之位而忽乎吾之所以自明則豈其素所聞者耶某窮居無用獨賴二三子之可與有明者相講於斯悠然有以自樂於寂寞之鄉尤願先生之樂達於所欲以充乎所性之全而大見斯道之行也先生發閩將入蜀妄述其所講者以為先生别送呉黙泉先生序君子之德何其多而難全也洪範列所以乂人者沉潜髙明之不可兼則克之以剛柔必有待於剛柔之克而後沉潜髙明者得歸於平康其始葢亦偏矣后夔典胄子之教悉數其目有直寛剛簡之繁而直寛者懼其溫栗之不足剛簡者憂其傲虐之為害彼皆學於上而且有承之庸之之望其所以教猶當誘其未備而防其不及如此然猶謂治教之法待之詳而設之豫云爾臯陶矢謨言人之德其多至於有九當虞之盛宣明其三嚴敬其六者皆可以為家國之用爵莫尊於諸侯事莫重於大夫其為諸侯大夫而熙浚明亮采之載者亦言其人之有德至於三六而已德之難全厥已久矣以予觀於呉黙泉先生之德何其全也方乎其外未嘗止而不行也介乎其中未嘗劌而難邇也動乎其不可禦而若有約而留之者而動出於有恒矣藏乎其無所有而若有拓而發之者而藏藴乎善應矣其德之詳不可以遽列其於臯陶所序葢不具者鮮矣道德之一莫盛於有虞之世克全於德者禹益臯陶之外其為諸侯大夫者已相為多寡其不能至夫三六而僅有其一二者宜多奮於治世之庸如是亦烏得謂之一彼皆昭乎其宣明肅乎其祇敬有者無所棄於無而無者不以忌乎有多者不敢病乎少而少者無所愧於多雖有三六之未備與於一二之僅有而卒謂之咸事於時然則所謂九者何嘗不全而又烏有不一者哉有虞之君子所以為盛皋陶所以得悉其德而目之執其目而知之靜言而壬色者不得厠於其間今之君子則異於是有者以傲無而無者以嫉有多者以之病人而少者以為人愧偏黨反乎皇極惡斁泪其彛性志不通乎天下而俗不同於斯世其患非一日之積也無者既已嫉矣少者既已愧矣非夫有者之能致無多者之能容少吾又何望焉今之君子有而且多者既莫如先生且將有大位於朝也必有所治也必有所教也以平康者治以中和者教㤀所有以矜無而無者將日進於有舍所多以從少而少者將日勉於多然後其進而勉者愛之可得而知施之可得而事也融釋偏黨杜絶惡斁叙常倫以還大中而君子之德不為徒全矣非先生其孰為之余竊為先生望之矣郡愽士紀君其賢能知先生之德者欲有以贈先生而余為之序送大中丞汪洲潭先生致政序士君子通塞之分當何所節量以為齊也齊於才與德而已位也者所設以待代天之工之人也語德之數有三六之多寡稱才之目俊傑别焉大賢期於尊位小賢期於卑官此其齊也仕於有虞之世者使稷契臯夔之德而不至於相猶謂之塞而殳斨之儔已不失為通在於孔庭仲尼以為司㓂攝相為塞而冉季游夏以得邑為通通塞之齊辨於是矣葢世當隆平則士君子之通塞適其齊故宣嚴濟濟之僚熙其所以浚明亮采之績於家邦而庭無具位野無伏賢治衰世降大小之論不明尊卑之授失叙而通塞傎其常分於是時命之權敵於才德反偏勝焉而邪正之用舍善惡之消長又不在是也是可慨已才德之節量則各有齊矣以才視德其尊卑之大齊也葢賢與能之辨也予所知今士君子之以賢能著於世而得顯仕者良不少矣皆謂莫如汪洲潭公之賢由其德勝也持養其器度以膺劇簡暇遽之物感若淵靜水止不可得測挹而澄撓也臨辭受取予之域畛畔明而防範嚴不以錙銖苟焉自爽而溷其介也喜慍無所動於中而聲色不少見於外玉質瑩然絶去瑕累而雕琢磨礲之功至矣其所閱歴之跡為曹郎為郡守為藩臬監司之長貳所至可紀去而有述才用章徹而不以能見名勝以德也然公以光禄卿拜中丞開府章貢兩水之間綏馭江廣閩楚四遐之履威望方暢事功日起而報罷之命下矣中丞非卑官也吾獨謂之未究於通以公之所宜得者為之齊也公年未五十潜心精慮好學不怠本原有保任之微聞見具雜撰之愽操修為艱而講習至賾歸居里第孜孜朝夕必以未致於學為窮而未暇恤位之通塞也夫君子志於修己則雖不得位而退向道之勤惟恐窮於學而患日之不足其所自為然也有用人之責者使君子窮於所宜得之位而以得盡力於學為通豈不負譴於當世哉公歸矣其為稍休暫逸而卒將大用之耶其為投間置散而使之終老於家也自有任其責者公何與焉送程侯習齋歸養序人子之欲養其親者厥有可陳之數矣几杖席袵槃巾敦匜楎韜之撰之詳而奉之必適其節滫瀡㫖甘香腥炮蒸爼醢之味之悉而調之必得其物鷄鳴而起及乎日入而未可即安敬其四體以親於事雖咳嚏欠伸噦噎而有所不敢寒暑甚矣而不得襲厚裼袒以自便至於思其可繼之志常迎之於微眇而恐其不合求其不得之欲常察之於聲色而冀其中葢其煩密而動勤如此世之君子乃有不難去其君舍其國事與其民功而退自託於事親者曰以休其倦而息其瘁也不亦異乎性之至者無所待於外而不得淫於物有土與人之盛廣施兼濟之得志而其樂有所不存堂闈之上室户之間寢膳服御之瑣細顔怡而體穆躬其動勤而總其煩密而不知其為勞其必有所樂乎此也烏謂有所倦瘁於彼而求以休息於此乎詩人之詠也董於征行而歎啓處之不暇敦於任使而憫從事之獨勞然則其念而欲歸毋乃以為休倦而息悴歟果其倦於事瘁於政而思託於事親以求休息其於將父母也其數亦已疎矣獨怪夫先王之隆以道德役天下之賢為之探其意而代之言如四牡之詩徒及於其情而不以其性之至者形之歌將其望之而恐不副為之述而慮其不踐耶彼北山之大夫雖其賢於風人之仕者至使父母懐之為志其所陟之岵屺啓其瞻望而患其不來然汲汲於劬勞燕息之不敵以致咎而發詬何其微於性也葢予陳古之義以正今之俗而知吾郡侯程習齋公於是為不可及矣且夫上有可得之君下有可治之民功業之美盈於前而爵福之休趣於後其樂宜無以踰而卒不以此易彼推其義可以愧北山之大夫而魏風之仕者當為赬面而泚顙使出於上古之隆而逢小雅之作歌者猶將悔其所以探乎下者淺而待在仕之君子為不厚也世變俗革化外物而泯彛常既已流放而不反今乃及見於公士之好德者徒思古而不獲顧居今而有見也豈不盛哉公之僚問所以贈公者於予而予為之言其義如此公行遂書以為序别程侯習齋公還西安序古者公卿大夫與士相求之急上焉者不知有其勢下焉者不知有人之勢惟其相遇而已求之既遇而相與以樂崇髙不見於上卑賤不見於下所樂者道而上下之形不得存焉内以明其心外以治其身勉焉孳孳而不能自己相與以有成而要以足其在我者豈以相為賜哉世與道交喪上亢下讇士之躁中而巧於詞者乃始為矜誕髙詡之說以謂上之人才力氣勢足以振士之窮阨下之人言語文章足以顯公卿大夫之名聞持以相易如售物於市而其權常使卑賤者勝將使公卿大夫不可一日而不求士也其亦誇矣然而言語文章士之能此者常間值而偶獲才力氣勢之在於上者足以濟其所好之施充其所及之餘而無所不得而上之人未嘗一求焉則亦公卿大夫之過矣一有求之者士亦且侈然張大推說以為瑰偉絶特希濶不可見之盛事嗟夫果其求之出於上而干之不出於下視古者以道相樂之風蓋已逺矣而士猶侈然頌之况其干之而未嘗求之耶其將益亢且讇而斯道之行於上下之交以相勉明者終不見於世與是可慨也西安程習齋公為泉州公魁磊竒傑受材特異事至迎見觸解人有累嵗月淹旬時覃慮殫力而不能辨者公頃刻為之曽不措意而人卒不能易也所長過人如此士雖有賢者宜無以佐下風裨末議而其為郡治功興起民以詠思吟誦歌舞溢流翔行亦何所待於能為言語文章也方且擇士之才者教之以學公亦因以有取焉當其講於理之微眇而發揮乎神情性術之奥密見解訢暢彼已混合靡形骸之為蔽而何有於勢之在已故使士亦㤀其身之卑而得盡其意以悉其所聞於往反滋益之間蓋公所以起之也予鄙無能竊獨有志於古人之道見公與士相得如此古誼之復將必由兹而彼市道之薄宜為慚沮悔縮而何足以道說於其前不自知其鄙而欲與共進於斯道上焉有可事之大夫下焉有可友之士周旋於其間雖欲藏光匿聲伏其身而不見而有所不能公亦舍己之所有餘而過有以禮之予誠愧其不可而固有不得辭也葢古之公卿大夫之相與雖以各足其在我者要為公卿大夫之能得士而非士之能致公卿大夫也士之於公烏得而㤀哉公處顯踐亨功名方盛獨念母不置累疏求歸天子為覽而憫焉不得已而許之士皆悵然若有失而不可留也慎中於是為本其意而見於文以為别送張節推纓泉先生序騏驥之力勝重任引巨輻行千里於一日之頃若滅没以之服鹽車之軛則不踰駑跅之駕函牛之鼎實以千鈞和薑桂者數石而始適其烹熟之能以用之饔飱曽不如數錢之鐺豪傑魁磊之士宜於大施而不可以小用其喻如此夫其不能於小而可以大固足以名為竒豈能無以不兼於小為憾可以大矣而亦不失乎小則豈不為兼而無憾者哉且士之用於世豈能遽取其大者而為之以稱其才之所宜而無以其小者屈折齟齬而試之耶而曰吾能為其大者是小者區區吾不能則大者亦奚由至矣如是其為有憾又豈止於不兼之病哉吾見其以大自累而卒不得施於世也葢士之用於今之世尤不可以遽得乎其大其始而有事於政常使之服習乎勞苦細瑣之間而循守乎法格體勢之内夫謹循守勤服習以能無失是區區者可謂小矣故士之好為大者往往失焉而猥齪樸遫之材常見謂無敗而多以得志吾嘗以是有憾於當世之士葢晩而得張纓泉君語君之才於今信所為豪傑魁磊者也其始仕為興化府推官觀君所以治其職其精於鞫讞慎於稽比不敢忽乎輕重之倫若手權而游移乎一衡之上不爽錙銖以謬低昂也嚴取與於爾我之交窒邪竇墐私罅以自約飭雖有吹毛之智而不得舉其疵服習之勤循守之謹又莫能有踰於君者而君實非小才之用也兼而無憾非在乎君其將孰在今方去興化而以其績入告於朝葢將得其大者而為之矣其為洪鼎而實禁臠薦禋享充大烹升聞馨香而流溢膏飫必張君也其為騏驥而行康逵駑馬萬輩仰視喘汗而不得前亦必張君也贈别董容山先生序天地之貞觀不已而宇宙之往來無窮貞觀者理也往來者時也理不易而時靡定踐不易之理以乗無窮之時通古今為旦暮而無先後之可言人之能也不竭其才以盡人之所能尊古卑今謂聖人果不可學則理雖常存而或息時固屢降而不留矣由唐虞歴夏商以至周之末造可謂甚逺仲尼俯仰凝合乎天地之所幬持而闔闢屈伸乎四時日月之代錯並育萬物而與之為一體則去堯舜千嵗而如一日故名之曰祖述其精神血脉貫通聨屬若傳氣畀質而生何也天地萬物固堯舜不往之形神也如是則孰謂堯舜之時為古而仲尼之時為今乎去之千嵗而天地一也合德乎天地則同神於堯舜天地之所以為大此其所以為祖述也由仲尼至於今猶是天地也安得以周之末造為古而今之時為今乎天地無異於古今而人之才有盡不盡於是古者若洪荒之為邃而今者若江河之趨之為變混然處於其中者所宜深思而寘力也士之善也一也在鄉曰鄉在國曰國合鄉與國而天下之名立焉友盡乎鄉國之善斯為天下之善矣善而曰鄉國雖未能通乎天地而是善固天地之善也合天下之善而天地之性有存焉前乎上古而是善無不同故尚論乎古之人而天下之善友是矣與一鄉一國之人居問之曰知其人乎必曰知也謂其形貌接於目聲音接於耳而言行之可睹聞也執古之人問之必曰不知也杳乎形聲之不接而曰知其人不謂之誣且誕與且夫與鄉國之人居而不知其人者豈少哉日與其人居目見耳聞而吾謂之不知其人又孰不以吾為誣且誕與吾所謂知非目見其貌耳聞其聲之謂也精神之不貫血脉之不屬雖比肩而行偶膝而坐而謂之不知故真為尚論之學者讀誦於方册之上而若見且聞其言語行事琴中之得文王羮墻之見堯舜是也參乎天地者祖乎堯舜祖述其人則知之又不足言矣尚論古人者乃為盡友天下之士讀誦論世固求乎參天地之實學也委於時之不相及而恨其才之所不能至非士之所以自待也絶學不講久矣近時君子講之益明悅者亦益衆而江西為盛樂安董君兆時其篤信而慎修者也予淺陋不敢附於一鄉之善士君未嘗與予交而謬友之葢真為友天下之善之學者君也夫所謂善者何必賢人君子哉匹夫匹婦有可擇而取矣君之友進於是則仲尼孟軻之學也而予何敢以見友為幸也君宰枝江廉仁有善政以程元公晉寧上元之治為師其丞建州猶宰邑也州人歌舞其德而服習其政教予嘗至武夷山中過君治所得之州人之口為詳雖恨於不及見而竊自謂知君之為人不知君許之否君去建州而之朝予圖所以為益者而不能也遂見於序寄贈徐澗濵先生序甌寧尹澗濵徐君奉其親以如官邸出則治民入則事親學道之效達於四境而誠身之實著於一宫之内其著於内者所以速其民之信而達於四境者有以得其親之懽君子之仕而有以自樂莫徐君若也君顧以為大奪於政不得專一親之左右以竭其養戚戚然若有所負而不得釋其欲致是官以去也汲汲焉若有所求而未獲士之出君門下者疑乎君之用心而莫知所以為君解也予為之言曰學者誦法往昔舍孔子何適矣孔子教門人必就其不足與其所長為之進退不為空言門人之問亦必不舍己所得用力而泛為問辨徒滋辭說也方游夏二子以孝為問孔子皆有以告之後之讀者能言其意葢各救其失而示以要也二子之有親在而後為是問也可以推見然子夏去西河為莒父越韓鄭曹濮不逺千里之路以從政武城在魯由呉而往葢逾江濟淮浹旬閱月而後得至而子游安為之宰意其不得御親以從也未聞孔子非之使子華於齊非不知其有母也而不憚於使之攜顔淵以遊於陳蔡而見止於匡亦知其父之在也朝夕於親之側以力養為孝孔門之所稱也孔子所以教人皆其所自行葢亦有母在矣而車轍周游㡬環於中國門人最以孝名莫如閔損曽參參也以薄仕而親及祿為幸其志又可悲矣惟閔損拒季氏之使不及於仕必其擇於大夫之家自有義焉而非為不忍離親以行也然與顔氏子從其師車轍與於陳蔡之厄豈其得常於親之左右耶舉此數者而孔門之法在焉游夏諸子之仕與顔閔之不仕也均未聞以朝夕於親之側為孝也徐君之意知法孔子而卓然必為聖賢之學無疑矣其仕其不仕自有學焉其學之至不至而孝隆汚存其間矣顧君所以自力者如何而謂以政奪養汲汲焉欲釋而不得至於戚戚而不能自解則可謂惑也已吾故為是言寓君之門下士許大正輩以復於君以解君之惑志則仕與不仕君自有以擇而處之爾别章君美中之齊河序往余督視山東學政好以名檢禮法摩礪其下其所為教尤謹訓典而範物軌誠之不至本之不治是以詳末而多文人之性習劑量不可强齊其視余教常若閑之在地過之則踰不得直行而坦蹈余乃㤀其德之不足而急於必行也而求助於郡邑之學官其求助之急故其待之厚待之厚故其責之也密然而頑鈍慆慢者皆患其厲已而有所不安見謂迂濶煩苦而倍違怨疾之害作蓋一路數州之廣學官以數百人而肯於助我者數人而已章君美中其一也君於時為兖州泗水教諭其束身飭已奮然以師儒自命不為苟得雖交際之好耳目常習以為固然而名之曰禮者猶有别擇而慎於所受不為濡利以害禮至於夙夜敦敏離經敬業率其弟子以修上之教者盡應於期命無所遺失雖有操切鈎考之密而不得舉其缺也余於是㤀其不足以為使皆助我若此亦何患教之不行哉未㡬余稍遷去山東天誘其衷日以有聞悔前之為而知其德之不足也葢非惟謹典訓而範物軌無以諭人於精微使之敏功起行而悅於向道而其諟名矜跡依憑之勞而假託之似尤非所以為學也既以自愧因以疑章君之為人意其矯强蹈厲苦心刻意企當世之名而殉驚衆之行是以其求之急而應之無難責之密而守之不失也去年春章君以服除來為晉江教諭余已罷歸晉江吾邑也得以脫去名位之拘綴而修游講之雅君淡然禔簡有以自足常處於間静寡營之地猝然迫之而有不動囂然誘之而有不逐非所謂企名殉行如余之所意者也嗟乎余之陋也彼其後之所以意君者既失之而其時之所以嘉君者亦豈為能知君哉君方有齊河之授旦夕且行余其能無眷然於兹别乎齊河故余視學之縣也今其自悔者固難以追改而偶有聞者又不得與之共為也君行矣出政發慮與民布利而去害宜有餘間以詔諸士其尚相與講焉求進其所聞以逭余之愧也哉贈蔡月川令尹序政之所為貴乎學者為其誦習之傳而聞識多與依據之嚴而彊力富與物物察知一不知則併失其所知事事矯强一不能則所能皆喪由其恃乎外而中未有以自得也千乗之國六七十里之邦以仲由冉求公西赤得而治之使民勇義贍足而禮樂有興鑿鑿乎其日可見非不揆已徒以謬迷其師者也方其寫衷肅對鼓瑟之友在側漠若不聞鏗然之餘韻方稀異撰之詞遂脫於口童冠在前沂水不逺暮春之候既届祓清泉風和風偕詠於途非後事之期而預設之圖也天機流衍無所壅閼真體静正不涉冀願此其所學在誦習依據之外矣聞識已㤀而彊力都泯非遺外事物而不欲為政者也一無所知觸物而知自顯一無所能遇事而能常行不迫則不起而我者常静其有國有家非不使民好義勤生學禮惟其天機之所鼓動真體之所貫徹民自萌作由為而已不勞矣四子之言皆師聖所許而有感於末對獨至者非仕隠異志其得於學之本趣深淺殊也必以㸃為非仕者豈不以童冠鮮統輔之衆沂雩非臨聽之區而風詠無宰制之術不知一國之人皆童冠也有司官府之次皆沂雩也徴調蒐訓㑹計斂發之事皆風詠也何政非學何使非羣斷斷然以輯卒乗為治賦籌財榖為足民非獨昧㸃之趣而且失由求之所為言矣孔門之徒固未可輙擬於今之士而語其近者猶可比方其形似月川蔡君為龍溪吾謂其有得於曽㸃之風非耶龍溪鉅縣也為令者愁苦其心鞅掌其四體而苦於日之不給君為之意常若有餘修飾學宫作五經書院表章先賢之墓建前修之祠日與士者相見當其横經講難於精廬荒寂之塲銜盃讌笑於山水佳勝之頃目之所睇流者為沂跡之所駐快者為雩而侍談摳請之邑子擁從趨走之僕徒亦孰非童冠也哉冗棼填委撓焉而不雜倉卒造次蹙之而不遽神情暇豫而風致悠逺非誠有足於中不可以聲音笑貌而為之也由君之風以觀同時之仕者營衆口之毁譽騖形勢之寵辱其為拘攣齪遫戚戚以廢旦夜信隳於疏屬之山梏而不得脫鞠乎其可憫也吾未嘗以人之知我與否為意而當路相臨者雖有知不知皆以君為好學君子也諸生得君之教者知君之心不以在位之知不知為寵辱而以在野之君子一言為信也羣至山中謁言以為君贈予誠野人矣烏足竊君子之言然嘗學於君子則言君之學而直伸君於孔庭微傳妙㫖之間非過也送唐次梁先生之任上猶序資格之法久矣論治者皆病其不足以甄汰庸鄙而反以阻格竒俊絶特之才然卒未有能變者謂其法猶有可據守以免於㨗出蹊行之患而可用之才亦未嘗不因之以序進故久而莫之變耳世豈有其法而無其利者要為不足以盡天下之才則法之用窮於是矣雖不可遽取而更張之而小小通變化裁以為異才地胡不可者葢士之以貢發身者始上於春官薦之天子臨校其業然後分試之於諸曹久之就銓部之籍而從政焉其不入銓而輙乞為郡邑弟子員之師謂之教職則不得通乎銓叙之籍而以教終其所閱之官此之謂資格也其格既久為師者畫於道途之所至而局乎畛域之不可越銷銳挫精日復一日可用之才遂不復出於其間而資格之守益錮而不可解孰知夫人之才不可盡其竒俊絶特超乎其類者千百而一二有之如華亭唐次梁君是也於是之時唐君雖不以儔伍自命而世之人固以其類命之矣予方竊為君嘆有是才也豈可終葢而閡是格也亦終何所表見哉一旦吏部以異才薦君擢令南安之上猶予於是慨然有感於心知世尚有差彊人意之事雖小而可以占其大也資格之法非特用於貢也上而科目甲第下而書佐小吏皆有格焉而尊冗清濁要散佚勞之殊各以品目流限取之於上與之者不得不與而居之者以為無所不宜居苟以掄材度德之義揆之則宜尊而冗宜冗而尊傎其正叙而清濁要散勞佚之所取莫不皆然豈所以盡天下之材之術而猶守之以為不易之法耶由今日所以處唐君者推之則化裁於未能遽改是法之中必有大可觀者予不及知而可以類求也天下之才將㧞滯振幽揚翹舒英次第以出受上之爵禄而興起民物之事功矣故予於唐君之擢有感焉唐君教泉州能於其職其美善多見於予之他文矣故贈君之行不叙君之美而特為資格之說君尚懋明其美自盡其才之所用建立事功而益取上之髙爵厚禄以伸予說為天下之士倡焉豈不休哉送陳南郭先生擢古田學諭序先王之制詳於為民立師而重乎其立之也故於家有塾於黨有庠於術有序於國有學莫不有師可謂詳矣然所立以為師者皆嘗以賢能為民所興倦於仕而不敢勤以政者乃使為之大夫為太師士為少師閭里之細猶以國之老成為之師其立之如此其重也故於其時苟其德足尊其道足樂者莫不為人師德未足尊道未足樂者莫不師於人夫其師之重也非有可樂之道可尊之德則不得立乎其位無有侈然自好而求為人師者矣王制失師職廢士始自以學相師於是有㤀其不足而好為人師者記曰不聞往教葢謂夫人莫之師而欲師乎人者也是所謂好為人師者彼其好為之也亦不知其職耳誠知夫師也者師其道也師其德也道德之不足而敢侈然立於其位也哉今世凡官於學而以教為職者皆謂之師而上之所立也然則立於其位者苟其道不足樂德不足尊亦有所托以自解而免於求為人師之責矣乎君子之仕也雖其任之以事猶必量能而後入今將隆之以道德而命之曰師顧不量其能曰是上之立我也而冒焉據之其可乎甚哉世之失也有任人以事者必度其人焉曰可乎其任事者猶恐而畏焉曰其將不勝乎苟有以師立人者則無所不可也為師者亦無所恐且畏以為皆可以勝之也何其異於余所聞耶余見今之為師者多矣其不為冒焉據之者少矣此余所以深有慕於南郭陳先生也始余未見先生而知諸士之尊且樂之也曰是必有道德者也及其見之也其退然藏者不可得而侮也其澹然守者不可得而厭也信乎今之有道德者也是可為人師者也非所謂冒焉據之者也宜乎諸士之尊且樂之也先生方且益修其德益進其道常恐而畏曰吾何以為人師也嗟乎余見夫不足以據之而冒焉不恐且畏者矣未見夫道德足以據之猶恐且畏如先生者也先生由泉州訓導擢為古田教諭其僚皆為先生賀而請贈言於予如先生者奚往而不可為人師哉奚士而不尊且樂之哉予何以贈先生哉送林龍湖先生之任河池州學正序事不得乎其職實不愜乎其名君子愧諸終日處乎其所愧而不怍於心非其懵然悍然安行而彊拒也未嘗以其職者恊其事以其名者隠其實事常匿於其職實常遁於其名誠以為足以據其職而無不効之恐即其名而無不符之憂則何愧之有如是者世之君子筮仕入官者之通患而吾以為尤甚者學官也學官之名師也其職教人者也學之不知道德之不立冒焉而處之者皆是也問其官之名師也問其職教人也問其人則學之不知道德之不立也直冒焉處之而已方且偃然當之以為彼無所不足於是官也方且苟然就之以為彼猶有所不屑於是官也吾將舉其職而稽之狥其名而責之使脩其事而後得居其職充其實而後得有其名彼且瞿然四顧惕然内歉走避之不暇而敢以偃然苟然乎哉嗚呼事實之不著而名與職不足以愧夫處之者之心於是今之學官始為士之困於進而倦於學者偃休之蘧廬其置其廢殆無損益於得失之數而不為世之冗員猥品葢無㡬矣人材之不得成世道之不得隆其不以此哉以予所感於世如此苟有不愧之君子出乎其間雖不及見猶將聞而慕之况於得友其人相遊之歡而相講之篤哉今龍湖林先生是也先生學乎孔子孟子之學其道既明其德既成如是而為人師吾信其無愧矣人材之成世道之隆葢深有冀於先生而先生其亦嘗以自覈耶士之講於學者鮮通乎道而成其德者未有聞也豈其職分而不專其於事之脩猶有不副乎其意哉然則先生之於是官充其實以有其名則可以無愧而修其事以居其職亦不能以無憾耶今去而為河池其職專矣有先生之實而又得修其事人材之盛而世道之隆其必自河池始而諸生之事先生者方且悵然其師之去悼前日之怠而作其今日之勇先生之講猶存則於明道成德不為無助不必在先生之側而先生其終可以無憾乎故余為諸生述其意以贈先生併以為諸生告云送陳員溪先生之任永定序潮之學自二楊先生首聞王陽明公之說於虔臺薛中離先生繼之開端倡始發新論於久蔽之餘伸特見於羣駭之中風傳嚮應講者日多當時東南楚越之交盛為王學者莫如紹興吉安獨潮之風不下於二郡可謂盛矣林龍湖愽士顧數數為予言海涯陳先生之學不在楊薛下第久失於有司以章縫自老言論風㫖不能傳逺海内士大夫鮮有知者龍湖真得海涯之傳者也龍湖由泉州學訓導去為河池州學正予方以諸生失明師為恨龍湖曰代者揭陽陳員溪吾友也向學敦行吾夙所敬也二三子何患乎無師員溪至果如龍湖所稱而員溪亦言海涯之學如龍湖乃知潮學之盛非獨由賢科通仕籍如楊薛以後風承響接諸君之彬彬而老於庠序終不一遇如陳海涯由庠序積累僅升於禮部為貢士如龍湖員溪者皆聞道知學君子也可不謂盛哉員溪嚮意斯學孜孜一念匪朝伊夕精存神注未嘗斯須舍是而他有所為顧處駭蔽之時隤然居上下之間不欲以學自名如莊生所稱古之真人不雄成不謩事惟其狀義而不明而已故其與諸生言惟吾信者則與之諄諄講切其不信者不强以聒之也方龍湖教泉時毅然以學自任諸生之不信者猶為之諄諄竭盡不以其藐於聽而倦也員溪之所處自必有道抑其時遇之不同耶然諸生之不信其古者亦未嘗不慕悅其師之行誼篤而恩禮洽退而無敢有間也居久而譽隆永定之命固吏部嘉其賢而用之也均之為教而所得之職所往之地視今異矣其職之專可以無嫌與遜而偃然當之員溪又將何所諉也其地之陋人方為員溪憂其乏材吾不謂然士之富於浩愽之耳目而侈乎繁郁之文華者往往外騖他分而難與言至其聞見狹而材藻不足以自飾則本實不斵誘知淺而習染輕與之言也常易予將見員溪之學之明於永定也諸生宜無不信者其有不信員溪亦諄諄然强以語之務使皆喻於吾之言而後已庶不孤斯往也哉送邑愽胡北丘先生之任序山谿川谷之限封疆遼絶劑尚乖分至於舟車之力有所不及聲音言語不可以通而卒能聨貫混融逺邇若一者學之道行乎其間也經術之為學者事其亦著矣治經之學由漢始盛專門名家殆且數十誦說講論各有其書而諸經之師遂以國自名徒衆傳習不能相為尚齊義者則擯魯訓念張文者則斥趙解中原數州之大政事謡俗猶東西隣而經學所治背馳剌謬若持秦矛以攻越人之盾惟恐不相勝也於是朝廷為立其學以官肄之而詰難掊擊方起於膠庠廱泮之上力匱息竭斃而不肯已吾不意典册之為干戈狴獄講究之為矯虔諍訟而紛爭之起於經術顧若此也今天下同軌學校之政命於一人而行於四方士者雖各得以其聰明用之於經而不敢為異說以誣人聚徒成黨之事不出於經術亦可謂一矣顧其說雖不敢為異而能精其說者往往連十數郡之廣百餘年之間而僅有其人焉吾晉江之為周易學者最名虛齋先生諸生既有所宗以傳其説而吏部所除來為師於是者常愧其學之無所成多為諸生逆詘其說而北丘胡先生以安成名家講於周易得其先世諸父之學粹乎與虛齋相表裏諸生獲聞師說盡喪所挾退然自知不足得先生一義一訓懐以相寳如新有聞閩楚阻格嶺海之所限帶而先生合并通徹不徒深領舊傳而特有以發其新知予於是嘆當世文教之一經術之同先生之能專其業而不為爭端異乎漢之以經自名者先生分教泉州久之吏部知其賢授德化縣教諭德化蓋所謂僻陋之邑舟車之力艱而後通吾知其邑之士不以封疆劑尚之乖絶而能聨貫渾融以趨於經始於今日由先生往為之師也送程龍峰郡愽致仕序嘉靖二十三年制當黜陟天下百司庶職報罷者凡若干人而吾泉州儒學教授程君龍峰名在有疾之籍當致其事以去程君在學方修廢起墜蒐遺網失以興學成材為任早作晏休不少惰怠耳聰目明智長力給非獨其精爽有餘意氣未衰至於耳目之所營注手足之所蹈持該涉器數而周旋儀等纎煩勞憊莫不究殫勝舉不知司功者奚所考而名其為疾也黜陟之典固將論賢不肖以馭廢置人之有疾與否則有命焉賢不肖之論非可倚此以為斷也况於名其為疾者乃非疾乎人之賢不肖藏於心術効於治行其隠微難見而形似易惑故其論常至於失實非若有疾與否可以形決而體定也今所謂疾者其失若此則於賢不肖之論又可知矣此余所以深有感也又有異焉古者憲老而不乞言師也者所事也非事人也所謂以道得民者是也責其筋力之彊束課其骸骨之武健是所以待猥局冗司之末也古之事師者其飲食於飯患其噎於胾患其哽而祝之也其居處於坐則有几於行則有杖皆所以事師而修其輔羸攝痾之具未聞以疾而罷之也古之道其不可行於今乎程君之僚與其所教諸生皆恨程君之去謂其非疾也余故論今之失而及古之誼使知程君雖誠有疾亦不可使去也君去矣斂其所學以教鄉之子弟徜徉山水之間步履輕翔放飯決肉矍鑠自喜客倘有訝而問者君胡無疾也聊應之曰昔者疾而今愈矣不亦可乎贈邑愽劉宦塘先生序壯而好學命之曰日出之明老而好學命之曰秉燭之光葢言時之難得而學之不可以後時也人方壯時視聽之聰明足以極其所知蹈舞之敏鋭足以赴其所往及其既老聰明衰矣蹈舞倦矣欲有所知而思不足發乎其志欲有所往而力不足逮乎其心如是而用之於學其有難易也命之曰日出之明秉燭之光豈非然哉然壯者往往熒惑其視聽而入於邪淫辟其蹈舞而動於惡葢其聰明之盛而易流敏鋭之過而多放然也彼其衰且倦者其思雖不足以發然耽溺日損而視聽常專其力雖有所不逮然躁決日寧而蹈舞有制是則壯者之於學固有所難其於既老亦有所易也余早誤於俗學㡬不能反行年三十而如有聞退而家居以講於同游之間而劉宦塘先生辱以講於予先生行年且六十矣粹乎其神其耽溺損矣而非衰也肅乎其容其躁決寧矣而非倦也余固疑其素講而豫養非晩而後學者也粹乎其神其一於視聽若因余言而欲進於所知也肅乎其容其作於蹈舞若因余言而欲果於所徃也余於是爽然自失昔之流放其耳目手足而近於邪惡者既已㡬堕而僅免而自有聞以來所以一其視聽作其蹈舞者常患其智之昏而不足以發其質之弱而不能以有逮也使其侵尋荏苒以至於老也又安可以庶㡬乎哉以余處人之所易而其患如此知先生處人之所難而不自以為難為可壯也先生在職九年當課績於吏部且有加職而復為人師也諸生樂其教而安其師不能釋然於其將去謀余贈之嗟乎余學之不進也而何以贈先生惟無忽其時之暮也而不息秉燭之勤則四方之士其有求於闇室之中如余者皆將就先生而乞明矣别虞清溪先生序世之盛也髙才之士顯融無能之人滯槁而有道者在其間居於才不才之際使進不得染於華膴退亦不為長往而不返才不才之際最難居也居於其際則人多不見其為才蹇晦沉固之跡無以異於無能者之所處故雖不為往而不返其所得於世必微位下而名卑髙才之士據顯融之勢以治之輕重之形則有分矣其所自處固有重乎内者而不可易也人視其形而不見其内則有道之君子往往見為無能之人今之學官亦當世所謂位下名卑而可以待無能者也待無能以是官固世之失而非立官之初之所云也其失已久髙才之士不復出於其間顧有道君子嘗擇而處焉虞清溪先生葢有道者也方其講習理義敦篤踐履自修於庠序烱然内觀於胸腑之靈而闇然外順乎耳目之感其才可以為顯融而不有也循年以叙遲而不躁徐謁籍於銓司來為泉州訓導諸生悅其愷悌而不敢狎嚴其凝正而不敢疏德義之尊不峻而益崇信乎能充其立官之初之所云矣然余固以是為無能者所居之位也既以自斂其可致顯融之才而不自有徐就是官使世果有知先生亦無由拔之使染於華膴先生卓然充其官之所由立又非求以為才也重乎内者不可易其居位雖卑自有以别於無能之人之所處道固然也先生以資擢為榮陽王府教授將歸牒有司退而自樂於其家也始修於家而徐為是官兹謝官而反其故居仕止之致若一去來之跡兩㤀其觀乎胸腑者將日以恢大順乎耳目者將日以密緻方與田夫野老為伍鹿豕木石皆可居遊芚然成其為無能之人而先生之道成矣予之陋烏足以知之而妄為之言祗所以見其陋也與别周惕齋序苦行偏節世之所貴而無取於君子之教謂其事之難繼而不通乎恒人之所同能也其果然乎哉恒人之所能而無害於事則固可與之共能矣恒人之能善其事者鮮矣今將逆為之慮其可繼而設與之同能吾恐無驚於俗而已病乎道矣與魯人獵較孔子之所能亦恒人之所能也接淅而去不脫冕而行非恒人之所能矣受宋薛餽金孟子之所能亦恒人之所能也辭十萬之禄拒萬鍾之養非恒人之所能矣孔孟者教之所出天下萬世之所從學為中庸者也而不使人皆能其所能則世之言修行立節而期於同乎恒人者果非然矣節行不必期於人同顧有不免於偏苦之名者何哉通乎天下之志而謂之可繼非使人人能之之謂也踰垣閉門之風且見謂髙於接淅蓋禄萬鍾之粟有不食何必不潔於辭中國授室之富然而孔孟以為中庸而泄柳叚干木陳仲子以為迫且小則所謂可繼與不可繼其義可知矣此猶人之所不能者也人之所能者猶有辨焉獵較魯人所為而謂魯人皆可為孔子乎哉蘇秦張儀公孫衍之徒莫不受諸侯之金亦將自託於孟子之事耶惟其天機性體之流行動於心之所安而中乎事物經曲之宜則人有所不能而謂之中庸而况其同乎人之所能者乎中庸者固非學者之所易及講之辨之以庶㡬從事焉其亦可也今之為師而受子弟之餽恒人之所為也為有司而費民之供億亦恒人之所為也臨江周惕齋君為惠安教諭獨不受餽其賢名著矣德化令缺部使者檄君攝之君辭不能得則從一僮入縣邸自治爨給朝夕不以蔬米之微費邑人也邑人皆異之趨下流濕之時乃有不狥乎俗特制以己如君之所為良足貴哉吾為講古之學辨夫中庸之所為可繼之道者以證君之明其為心之所安與抑猶不免鉥慮刻意出於投世人耳目之好而苟為斯難也夫欲以貴於世則世已大貴君矣苟欲有合於教君尚因吾之說而加體究焉其不為偏與苦而由乎中庸之徒孰禦諸苟謂吾欲君與恒人同能其亦未審於斯之所講已矣送孫古山愽士失官還家序凡有職於官者皆必有事居其職而為其事則勝與不勝之跡著考其事以覈其職則去與不去之辨詳由監司之重郡邑之專下迨筦庫狴庾郵傳亭徼坊庸之卑𤨏巨細冗要不同均為有事於其職云爾惟其以師儒命官設之於學以教郡縣之子弟亦為有職於時而實無可考之事其義在於以道得民授業解惑長善救失以淑學者之心開發其聰明而陶養其徳性葢其化之成至於微而不可知其功之所積則古人之所謂夀考必世而後可冀也今將使與百司之有事者同與於三載之考勝與不勝之跡既不得而著而欲辨其去與不去其為不詳亦可知矣然而考之者不任以為責徒諉之於法曰是固當然論者亦復不以責考者曰是不得不然如是亦何以服去者之心而能使其無介然於胸中哉是嵗考天下百司吾郡愽士孫古山先生報至當去子弟相語以失其師為恨室於歎途於議歸咎於考者而無所致其責乃謀所以釋先生之去羣就吾廬而乞言焉觀先生得士之深如此則其功化之所及雖至微者不可遽知待久者難以驟冀而其道有以得士亦可考矣徒以無所効於事使猥與百司之不勝者同去宜乎諸士之以為先生恨也先生方且從容自安泯失得之憂以順去留之變束書册褚裘葛實以來時之篋曽不得盈浩然出舍而無閔貧悔廉之色葢其所養有過人者其得士之深非苟然也嗟乎與先生同籍而去葢有監司之重郡邑之專與夫筦庫狴庾郵傳亭徼坊庸之卑𤨏其當去之辨固不可知其為詳與否然專且重者以其在事之勢苟有所蔽害理法以違其心比其既歸追數前過鮮不悼艾慚忸而自失其卑𤨏者以處勢之下屈辱其形體愁苦其骸骨釋勞而去不能無怨於向者之僕僕而無得先生之歸豈復有是兩者之累哉然則諸士亦何必甚為先生恨而先生得吾之說以歸信其可以無憾也夫送李拙修先生序有問其師於其諸生曰舍是師而去汝則如何諸生譁然而戚曰吾不可以去吾師也其師之賢可知也有問其官於其長吏曰汰是官而罷之則如何長吏勃然而變曰吾不知其可罷也其官之賢可知也官之為師者今之學職是也欲知學職之賢者上之有考於長吏之評下之有徴於諸生之心葢亦無以易此矣今有一人焉下之有德於諸生之心而上之無貶於長吏之評三嵗而一弊吏而不免於考功之黜長吏之評其卑而不及察諸生之心其逺而不得聞耶嗟乎弊吏之典所以黜不肖而賢者與焉亦何以弊吏為哉當事者方且不任其責以為是微官散職簡忽而議苟且而行其賢其不肖若無所係於幽明之論其去其存若無所闗於廢置之舉若是乎學職之罷否無所與於斯世重輕之數也然則長吏之評亦何足察諸生之心亦何足聞乎予於拙修李君之去也其亦不必恨矣君而無以得乎諸生之心而有貶於長吏之評雖不黜於考功猶不足以為師也今雖黜於考功其可以為師者固在也而又何恨焉予獨有所恨者學職之無與於斯世重輕之數也自其官之之時而已然矣簡忽而取之苟且而置之未嘗倚之以化人成材之事也賢者無以自著而不肖者得容於其間苟有一賢者使其得伸於長吏之推擇而樂乎諸生之信從觀者猶知所勸而化人成材之効或有可冀今而議之以簡忽行之以苟且使賢者猥與不肖同去觀者亦何所勸而師道果不可立俗化之隆人材之盛其卒不可冀矣此予所以深恨於李君之去而不能不為之言也嗟乎雖予之言其亦安能使李君重輕於斯世也哉李君學愽而知方行介而能羣沖然有儒者不爭之風而確乎有節士自勵之操予所友士於此世為不少矣未見有如李君之深且厚者也其退而居鄉必為子弟所從孝弟忠信之俗將由君出君之所以自養者必有當乎斯世之重而予之言亦其不為無與於斯世重輕之數歟送黄南池先生致仕還家序士大夫游宦而以致仕去者為終始完善謂其以禮去也然而有異焉由其身乞而得之則自以為榮其出於人以法格之者則自以為辱其名未變而榮辱異情謂惡其實也吾所謂實者不然凡樂與不樂去者之實而出乎已與出乎人者非吾所謂實也今以乞而得致仕者誠能無所介於心而浩然不嬰於物耶或志不得力不逮事勢局促日途窮暮不得已而乞其乞而得之至無以自聊鬱鬱不能釋甚乃追悔顧望悼失前圖其愁苦若此烏睹所謂榮哉名實之失而世之人不知所以自處其情也蔽已久矣非夫愽碩明雅之君子胡以矯蔽而寤世也天長黄南池君為晉江教諭諸生悅而從之監司部使者器之縉紳士大夫交重之非有不得之志不逮之力又非勢迫而時暮也然而欲去者屢矣諸生士大夫相與挽而留之先生不能違也君乞身之意講於諸生士大夫之間雖其請未上而監司部使者葢有聞也是嵗當天下百司黜陟之期吏部優君致仕之名以狥其意君未嘗惡其不出於已而追過夫挽而留者之計恬淡安閒色詞不改解職而行若所求而有獲也吾所謂有其實者君其人哉審乎名實而不惑於久蔽之俗吾所謂寤世之君子君其人哉嗟乎名實之失又有甚者師者教人者也教人者必以道與德有道與德者必知自重知自重然後不失實自卑其官以輕其身者紛如也吾見為是官而知自重莫如黄君君之審於名實而有以自充也在乎此今其去也顧有蔽於名實而無以自樂乎吾以君為寤世之君子其益不誣也夫君去諸生羣然以戚吾為是說以表君之所以為榮者異乎世之云以解諸生欲别之戚而增君歸之光明送程習齋公之任序武夷越在嶺外衡山當五服之南皆去中州最逺然祝融巋然稱嶽列於四海五望之一而幔亭之秀亦甲於宇内祀典所秩圖志所記與夫髙流偉人之所賦詠僊釋幽怪之所棲託可謂盛且竒矣至於嶽麓之有書院雲谷滄洲之有精舍而後二山之靈崇重炳煥視昔異觀天下之士所為側望馳向冀一寓目其間而未能者有賢哲之思而非特山川之慕矣其得逰焉者亦多慨然興起感悟性靈而磨淬意氣不特以耳目之適自足為快也以其勝且逺如此士者雖願焉而鮮能自致惟仕於其地者為適其所願而不患於往從之勞視政不能自致而必欲一至者審問途之謀營聚糧之費辛苦跋涉而後至良亦樂哉然彼勞而後至者息焉游焉可以朝夕玩而嵗月脩仕者往往限於官守之次牽乎文法之役忽來忽往而不可久且常也於是顧有咨嗟喟歎以為無以愈於側望馳向者之艱而情亦有所不樂矣葢予嘗與荆川唐君為武夷之游而程侯習齋方守建州侯以不能相攜而往為不樂也夫學者所為有願於名山本欲遊且居而若不及者豈為嶔巖峻壁飛瀑廽谿之異於闠闉珍草竒卉駭鳥瓌鱗滮泉竇石接乎耳目與處室出户之所睹聞者不同耶動靜恊性術之室而樂夀應脩詣之效反身切已與夫元氣鴻茫之所融結成質時流之所形見通體效法混同若一而其發於事業暢為文章俊偉昭明挺特流衍且與山水精靈光華度髙絜深克對不怍如是則雖不離官守日治文書視程課勤於民物之務固超乎其常在山水之間觀侯之所自立與其施於有政既已妙合乎髙深巍然對武夷之靈而無恧德何必躡屐登巔鼓枻乗流極狎玩縱探之適而後樂哉以予之陋雖日從唐君游而頑心猶故亦何以自多於侯且不能分一壑於山中遽以糧盡而返其愧於侯又甚矣侯轉官湖臬乃當領璽書臨制衡桂列郡而南嶽實在其境内侯得郡分臬皆以名山為所治之望寧獨蹤跡偶值亦其脩詣所至冥契黙召有不苟然者予疾有間尚思一遊衡岳於侯之往益用勃然衡岳千峰無不勝絶而天柱回鳫芙蓉石廩岣嶁數峰猶稱雄傑侯倘為我度方丈之地與岣嶁最髙頂待予刈茅結屋而老焉予誠陋尚能濯滌舊日宿負積愆補黥息劓以承有道之下風不至如前之為侯愧也哉侯之行方欲述所懐為别而董蓉山君與呉君沈君以言見屬遂因以致予之所願云爾贈趙眉溪君署縣代還序有道之君子尊已而卑官將擇其大且顯者而後為之耶抑遯其身而終不為耶終於不為與擇而後為非有道之所處也如是則奚以尊其身由其貴乎已者有道焉爾下位何必非君子所居居焉而不以憂且援亂其中斯謂之君子矣其位卑其道尊其所貴者有在也誠内有以自貴雖居其官而卑也尤不敢卑之以為不足有事形體之勞志慮之專仡仡焉殫其力於所事不敢少忽故士有傲然睨王侯公相如九牛之毫不足屑其一盼而殫力於一職之細不啻持玉寳龜之重如將不勝道固然也嗟乎髙矚盈視眇然置王侯公相之尊不介於目人知為君子之尊其身甚白也劬形憊思於一職不恥猥冗而君子以為我固尊其身非有道者莫能知也泉州府檢校趙眉溪君南海人也南海五嶺之表而君脩於庠序發聞乎有司文章之光華節義之意氣宣暢在躬交之者益衆未通仕籍而四方之士已知南海有趙君也以籍就銓則當事有力之人莫不欲致君出其門下君泛然不可致而得户部司務於留都其在户部諸郎官之治曹事者莫不咨政質疑於君君一為之盡或愧於不知而待君為助陽諱其助而隂害其長君不為防彌以是出為檢校於泉州君徐就貶所貌斂而不詘意下而無怍不為謟凟於上下之交而無所羨援乎爾我之際他人觀者亦知其能睨王侯公相而不入於心也然上之人勞之以事則東西南北無適而不之於中無忤其外不怒一日德化之民以乏令請於上得君攝之君往為其民袪患興利民大愜所欲以為百年來無有仁我如攝公者也而君所以劬形憊思脩一邑之政者若其甚重是官也而不惜為勤吾所謂君能卑當世之官以自尊者尤以是觀之始予謂君聲華之駿茂氣誼之膚愽信嶺表之才也及觀其所以居謫者而知君殆近於有道者矣是可敬也德化之士請於愽士張東豐先生曰邑之民謂攝公仁我諸生則交謂能以問學德誼教我惟攝公也兹其代諸生未知後果能有立終當益思顧今無以為别安得善言者為攝公贈副吾黨之情於是愽士率其徒求序故序遵巖集巻十

body:
  text: 遵巖集卷六明王慎中撰七言律詩萬壽節侍班奉天殿柬丘集齋侍御二首風生露掌集祥烏雲耀紫清五色殊宫扇徐開蟠雉尾爐煙髙裊繞龍樞燎移百辟珮環列星落千門簇伏俱虛薄自慙違補衮瞻依叨從效嵩呼雞籌魚鑰漏聲催鳯闕龍樓拂曙開五色祥雲扶北極萬年天子在中台仙人樂奏鈞天上王母桃從瓊水來獨進千秋金鑑録侍臣不愧九齡材元日侍班奉天殿王正元日新堯厯天子明堂拱舜衣仙樂同鈞諧鳯奏文星合璧抱龍旗雲間閶闔鳴珂入風轉爐香惹袖歸三載郎曹淹赤紱尚慙補衮寸心違三日偕容臺諸僚友遊大慈恩寺登鏡光閣即席賦鷲峯飛宇孤逾麗鳯甸晴煙翠欲重北海霜氷虛暖氣西山雲樹散春容殊方天地愁目盡此日登臨新歲逢况是携遊俱俊逸但教得醉任萍蹤四日陪夏桂洲學士南郊觀牲皇州風轉翠雲遊光湧南端璧月流珠樹靈壇春漠漠尚芻御廩夜幽幽天回淑氣蕃羵犢苑靜繁星散斾騶視滌逡巡移劍履明禋優渥動宸旒送鄭滁州與子避居潞水上憶在東曹詩興多二月風煙辭省闥三吳書劍阻關河花明江驛下帆影棹入滁陽近楚歌此去琅瑘堪吏隱醉翁亭古發煙蘿同郭水部子愚東郊相土因遊邵氏莊郊行不廢觀遊興戚里園中事事幽變幻羣峰開華嶽霏微五月動清秋風來繡户聞啼鳥雨溢金塘聚浴鷗杖䇿况隨滄水使解纓長羡白蘋洲寄贈寇體朝進士尹廣平羡爾獨隨飛舄去邑人遙望雙鳴騶郎星天近輝昴野薊闕雲生接冀州潞水署香曽對酒朔塵官况復經秋少年作宰定嘉績千里相思罷倚樓送黃後溪守贛州仙郎粉署有聲華五馬鳴珂出帝家漢室淮陽還去國王尊蜀郡並驅車煙塵畫靜天邊癘霜雪春行江上花此去何須愁道險薄逰今已困風沙至昌平有感逺郊風葉點人衣近郭危樓敞暮輝山回龍虎皇輿壯馬放騊駼戍鼓稀日月行藏玄鳥逝關河感慨白雲歸時平守帥休空喜莫使燕雲羽檄飛朔日昌平城登覽二首上谷孤城對水濆滿城冬旭裊煙氛天開秦塞饒黃草路入皇畿長白雲萬里烽煙代野至五陵佳色壽山分四夷自古明王守勒邊誰數李將軍宿雨山城淨曉暉髙樓臨眺思依依仙人掌上雲初散白馬關西雁自飛古木寒鴉啼朔霧荒陴遲日上征衣天山直北誰傳箭目斷秦兵未解圍望居庸天山九塞有居庸設險功誇六郡雄山連白馬懸邊月寨壓黃花多朔風未報捷書飛大內尚聞獵火照雲中北平飛將今誰是東南芻挽已無供悼陵陪祀絶壁丹流萬葉紅秋峰長鎖翠華宫愁雲玉坐松楸裏落日金鋪霜露中鳯葆虛留栖漢月雞鳴無復賦齊風聖情追逺遙悽惻冠舄趨陪百職同泰陵敬帝垂裳上造日遐荒扶杖中興時宵衣午坐蒼生繫國論邊愁大老知四海未消虞陟淚千官尚想漢宫儀鼎湖惆悵空龍馭瀚海風生萬壑悲望陵本朝陵墓枕天山􅏭嵲護靈虎豹間入夜梧楸時淅瀝飛泉澗壑晚潺湲龍藏萬里蟠王氣象衛千秋控帝關瞻望不勝埃滴意嚴趨神路珮珊珊功德寺觀三官感懷二首丹梯翠壁鬱煙霄宣帝行宫鎖泬漻牧馬池荒殘白草釣魚臺古長青苕宸遊夢到華胥上仙仗巡非汾水遙曉向危樓瞻氣象雲端佳色護岧嶤憶昔宣皇遊幸初時看水艦戲西湖江花海石藏秋浦雜珮華裾駐玉輿天地百年殊感慨日月三殿自虛無登臨欲下牛山泪檜柏吟風夕照孤望湖亭望湖亭倚碧山隈不盡長天萬里來水濶槎從雲際泛波涵仙是鏡中開霏霏曙靄芙蕖落宛宛晴沙鷖鶩回垂釣解纓本吾事臨風把酒興悠哉龍潭卧龍潭在碧山岑噴沫蟠渦自古今隱隱蛟蜃逃靈氣時時風雨激髙吟青天日月懸相映白晝雲雷黯自隂會見九霄噓黑霧即看四海望佳霖吕公洞髙頂可憐吕公洞礧砢危石相住撑根豁一門山欲斷泉流四壁晝常清險絶故須秉燭入蒼茫祇怪傍雲行藏虹蟠蠖理或有冥搜恐觸神物驚碧雲寺晚飯近郊蹙踏已塵迹抱郭清切復禪樞斜陽古殿鴉亂集積水短蒲鶴並呼客病正宜依梵寂情超直擬仍仙都憐爾風松故相戞倚此煙茅絶可誅出碧雲寺道中望香山回馬已失碧雲寺舉目還望香山陲峰巒近日秀可結樓閣棲雲深不移靈帝翠旗颯欲下仙人玄鶴飛相隨瑶花璚草如可得青藜白􅝍任所之登圓靜寺後山攜張子汝思䇿馬清隨滄水吏捫蘿幽到碧山岑最憐絶壁流霞氣况有澄湖清客心落木蕭疏明逺近行雲縹眇靜髙深靈芝紫蕨亦吾分石髓丹砂與爾尋宿碧雲寺杖藜日晚尋丹壑解騎霜晴宿碧雲十月懸泉飛玉瀑三天現鏡轉金輪雕梁曲檻蒸霞氣翠瓦朱甍墜露紋石槨牛山俱有恨長留涼月照瞿曇宿混元靈應宫玄宫東瞰皇畿迥碧水西瀠漢甸斜初月清懸仙子洞歸雲深擁羽人家珠林招近千年鶴瑶篋分探九鍊砂未駕青牛凌紫氣且乘白鹿住丹霞鎮國寺與張子對酌夜談松栝枝團廣岫隂仲冬涼月靜蕭森青山白水隨生事髙榻芳尊共解襟畫省香煙空入夢逺公白社許相尋依栖擬問三天法長嘯真懸萬里心贈王仁和邑博廣文先生笑索居越中勝事定何如雲峰對席惟耽酒芳草閉門足著書觀海秋濤天地浴彈歌夜鋏斗牛虛旅山寂寞梅花晚遲爾六橋白鹿車病中吕從野水部邀不赴賦謝宫雲曉度濕晴沙退食煙齊省樹鴉燕闕春回催玉羽鳯墀日暖映金花文園不起茂陵卧朔雪虛回剡曲槎綺席瑶觴違命賞露蘭風草惜年華病中謝鳯儀過訪一春卧病長安裏伏枕荒齋嘆索居風動蓬窗依玉樹雲傳仙侣駐瓊琚宣城鄰並違下榻司馬窮愁錯著書四海兄弟吾與爾霞冠月舄未應疏送阮仁化邑博庾嶺雲深君獨往曲江風逺故遺思風流苦憶青氊在身世難忘白髮欺阮籍沉淪元嗜酒鄭虔樗散亦能詩行歌莫近啼猿樹宦隱真堪采藻池送黃長興尹葵峰兩年見子開青眼萬里共依帝闕雲剖竹新分鄣子國攜琴遙向越江濆青春黑綬光堪拂落日離歌調忍聞霅水峴山多勝事風塵愁望正思君金山雜詩八首崔嵬樓殿俯金山窈窕亭臺引玉泉羽獵連屯萬虎士水嬉齊奏六龍船徴歌樂選燕秦伎聽法筵參摩遁禪宣帝巡遊甘脫屣侍臣扈從總登仙武帝乘輿駐翠微西山重見五雲輝羌兒掣馬行營疾校士射蛟水檄圍霞氣如臨仙醴㵼泉聲故近御筵飛至今草木遺光寵日暮遙瞻冉冉暉沓嶂回巒莽不分紫煙蒼靄晚氛氲樓臺拔地千層起鐘鼓中天四野聞畫棟雕甍回日月曲池伏竇定風雲髙僧盡住黃金宇護敕並鐫睿藻文康定陵前栖夜烏盤林鬱鬱鎖松梧總聞再造開邊境不見千官拜鼎湖內使司香開寢殿祠臣常祀掃金鋪翠華縹眇空中度絳節靈應羣帝俱珠奩玉碗扈繁芳遺令千秋祗自傷落月恍聞環珮響隂風猶散綺羅香蘭蘅湖上疑湘浦雲雨峯頭似巫陽寂厯羣山花自發為看當日倚新妝纍纍青塜碧山隈銀海銅泉中映回百歲吳閶寶劔出一朝茂苑玉魚來牛羊晝下新樵徑牧竪夜窺舊鎖臺又道東阡營石槨路人徒有雍門哀青郊迤邐接城闉湖水西來繞御津錦里豪華紛轉日芳原池館錯圍春金堆石谷朝專寵玉濬盧塘帝近親三輔選遷元此地五陵俠貴定何人西山􅏭嶫奠金方白帝精躔龍走藏水學澗伊縈洛邑原開􅀈杜壯咸陽雲霞氣結青蓮宇粳􅀈脂流碧玉光恆鎮滹濤天地險湯池金郭帝王邦春日和夏桂洲尚書韻仙蓂二葉耀春明御栁含煙拂錦城北海鮫氷衝氣動西山霞樹入看平旗迎周甸輝龍藻樂下堯庭雜鳯聲獻歲栽花光聖壽晞暘歌舞應時清附見夏尚書作二月逢春春日明鮮雲旭日冠髙城千官表拜當華歲萬國朝元賀太平水岸煙濃將栁色花林風暖欲鶯聲承恩未獻椒盤頌佩玉瞻星下紫清春日東郊二首仲春郊畤望春來待鳯城東旭日開錦里恩輝多邸第青陽氣色滿樓臺遷鶯出谷風徐應變栁分林霧暗催熙澤幸逢羣物泰全生竊荷大鈞裁花外雲煙接禁長東郊風日麗新芳飛峰冒靄全低樹繞澗分流半入塘角戲遊塵遙辨陌探丸俠騎競趨場逮時行樂須華盛碧草萋萋不可忘東郊朝日壇扈扈崇壇冠景岡翔梧灌梓鬱分行金鋪翼鳯層壝列玉磴疏龍四陛張雲氣承暉皆赤色靈坻郊位正青方欲觀聖製光宸極為識羣心奉太陽奉祈於朝天門迎詞漢主齋居太乙壇方春修祀表祈年祥虬扶籙交仙葆青鳥銜書近法筵尚璽親承蒼玉案羽師跪授紫泥編長奉光天神道教登釐無謝福為田春日觀南城同禮曹諸子三首城南林囿窈逶迤雲裏樓臺互蔽虧半綴朱欄千品實全交繡户萬年枝河流倒接星潢注峰起如將日觀移在昔躍龍餘聖迹於今試馬耀乾詞離宫往往像神仙誰擬甘泉起漢年復道橫看連象緯曲房深轉貯雲煙穠花齊發粧靈囿雜樹分榮蔭御川但覺觀遊皆出世不知劍舄已升天朱曦禁苑盡芳菲傳道神遊轉翠旗製拱雕金丹鳳絢疏橋纍玉素虹飛風泉數處歌絃合花蕚千名錦繡圍正覩乾行行幸處修恩無地不光輝東昌題任元朴御史園選地幽棲近水湄野人爭席鳥忘機垂栁裊裊供書帶蔓薜青青取製衣不學蔣園延客少却嫌鄭谷受名非任公本擅投綸術可以方壺作釣磯謫毗陵發都下臨岐南北垂雙淚誰識楊朱失路嗟在野自疑非虎兕此身已解作龍蛇壯圖中失逢時感俟罪南遷拜惠嘉恩豫晉陵猶不逺其如卑濕類長沙至晉陵本因懷璧自招尤覆水成泥豈再收行澤却防漁父問入山恐負晉君求束書長嘯辭京邑捧檄逡巡到本州入境棲棲誰解者傍人應謂一官謀在郡作憶從束髮通朝籍才薄遭時報效賖直木孤生先得伐明圭太潔易成瑕朝天路絶辭風葉去國身輕失水查竄逐元非明主意銜恩不忍赴懷沙月夜同姚在明濟上觀水盈科流水濫湯湯映月涵空更可望泌沸千淙珠比色澄泓一曲鑑為光遙遙銀漢微分景宛宛金隄與障狂取適有同蒙吏傲兼擕惠子在濠梁贈郭水部郎中治河河出崑崙決孟津司空治水智如神下楗欲濯淇園竹荷鍤皆徴韓國人玉堰七星遙證斗金堤千里不飛塵若逢漢帝來沉璧應免從官助負薪彭城送謝道安舉人應試少年挾䇿趨上京俊美多才衆所榮稷下雕龍參辨駕郢中白雪擅詩名他鄉不料逢論舊臨水那堪復送行旅竄慚豫非狗監聞君已賦子虛成江上送毛太守入覲因寄舊遊三山諸友念别須臾已歲餘忽逢江上意何如心悲不語傷時事眼看雙分畏簡書逺水片帆天際沒晴忩古木岸邊疏故人相見倘相問芳草間門是謫居留都二首徒然往日矜佳麗地作天開祇在斯吳楚荒郊奄作苑江淮流水即為池人誇才藻稱三傑家應星文置百司太息六朝詞賦客芳徽空想盛全時帝京歌舞盛歡娛表裏河山樂事俱金埒藉茵遙出郭朱樓照水蔭通衢妖氛洗後江長靜王氣生來地盡蘇若使墨卿稱主客不論漢室有西都恭覩留都大內作二首壯麗誰言漢未央鈎陳華蓋翼明堂千門旭日光分映雙闕中天勢欲翔前殿曾聞臨遣帥離宫屢是從諸王微臣已恨生時晚拜手徒思頌太康欲知開造與天侔聖迹難尋帝業留苑外河山紛錦錯城中樓闕若雲浮深宫紅樹春長閉髙掌金盤露不流常現瑶空雲五彩曾隨仙仗奉宸旒春日行觀禁中髙皇帝舊苑二首千門臺殿碧波流咽盡寒聲出御溝天上橋山仙馭逺人間圓嶠禁城幽花狂不記當筵舞魚巨曾經聽樂遊垂栁依微春不展為思恩幸半含愁芳菲御輦屢經過寂寞於今歲月多草色猶如思望幸鶯聲尚解囀當歌更衣帳冷空瑶殿窺鏡臺荒咽玉河太液宫前舊池水年年春雨長新波寄贈黃宗獻守璚州兼柬顧與新憲使主恩懷逺托分憂萬里乘空并是遊百室日南開北户孤城海上俯中流津橋喧處為珠市郡國晴時見蜃樓持斧風流賢使者政成觴詠接諸侯送郭世重出守南寧朗寧荒絶不堪栖遊客思鄉轉路迷千嶺驟昏如瘴起四時不斷有猿啼編氓半是居蠻洞行路相言避毒溪千載播遷仍置逺好憑鬼卜問南雞幽居玩雪柬人二首肅肅玄隂冬布令紛紛白雪晝凝華明姿敵日堆難散弱質凌風舞易斜楚地有田皆種玉寒空不樹自飄花此時正憶離居者贈把瓊英比折麻江城雨雪及春歸三白呈祥表應祈時禮部祈雪雪降皓素凝華因地積輕盈弄出鬬風飛千峰掩翠皆同色四野垂隂倍有輝獨羡仙郎操妙曲聲髙真使和人稀移居栖栖微祿豈謀身擾擾移家學避人髙栁欲栽當外户青山依舊借東鄰門無車馬何須僻窗映圖書不為貧籍繫中朝心在野誰知陸地有沉淪髙祠部子逑訪豫告中值豫出遊不在見投贈章聊用奉酬因病相侵却得間一官方在是非間身同雲出無留處住近城隂獨掩關髙士已題鳯字去野人空共鳥飛還間窗寂寂春光早惆悵清揚不可攀出遊城南山寺一官常懶愛僧間來往禪機每扣關緑栁閉門空自長白雲出岫不知還欲牽簮紱奈微力豈少鶯花非故山那似匡廬為社者投師不逺栗林間遊朝天宫蓬萊元自道家山簾户隂隂珠樹間乞向朝中除仕版却來方外著仙班花間犬吠知人至空裏鶴飛為客還一扣玄關回念想因悲擾擾在塵寰登江東城樓花片飛飛栁色深登樓一倍攪鄉心長隄煙草迷人去逺寺夕陽帶磬沉江水無風時起浪春雲不雨每成隂躊躇滿日時相會惆悵前林倦翼禽春日懷歸東風送暖雨晴春栁色鶯聲滿四鄰道勝自然千慮捨身間何戀一官貧朝來廢櫛看山色日裏扃扉避世人豈有微才逢聖代空令失計遠嚴親遊天界寺逢蔣南冷子雲留贈香林新雨四無塵緑樹初齊古寺春病起獨尋芳草路林中偶接放歌人未酬談笑形相得稍問姓名意已親落日還歸城闕去愧君雲水一間身請告弗允赴省作腰章束帶不勝羸還顧自身却自疑田畝難忘平子賦雲山也笑尚書期出門騎馬逢人懶曵組升堂畏鶴知舍裏青青春草待若為留色慰幽思請告弗允後寄蔡比部道卿無才豈料乞身難強學城東且閉關世事浮雲機久息故園芳草夢空還春栽藥品因多病日理圖書轉覺間不得自矜年少壯相思一夕損紅顔省中古木隂多鶯亂移白雲不去伴留司侵階草長間終日拂印塵深鎖幾時散地菲才容吏傲低頭寸祿令人悲頗耽恬曠頻欹枕僕從翻嫌出省遲哭梁宅之天道蒼茫不可知重泉寂寞所從誰祇餘蘭氣芳華省獨有螢光識敝帷無使求書忘舊草何人脫劍贈枯枝蕭條落日聞鄰笛淚盡無由世上期和李司業懋欽登廬山石耳峰讀空同先生之詩作同聲殊世易懷思惆悵風流不在茲真迹愛從苔刻認舊題多是野僧持張衡不負揚雲待屈子能令宋玉悲流落當年何足恨斯文今見後賢知李詩有誰令流落明時去之句題箬溪草堂贈顧中丞箬溪溪上箬隂繁主人葺箬卜溪源近市荒惟三畝宅負城幽是一丘樊雨滋蘭蕙看成畹徑長蓬蒿漸塞門大德如今俱小隱壯懷相對欲何言夾浦舟中别李湖州邦良􅮵篁夾岸似湘隂一夕孤舟千里心地逺誰憐臣道枉官貧轉使故交深幽蘭自馥皆同臭折羽卑棲各異林臨路殷勤何所贈匣琴珍重少知音遊茆山贈兩道士二首厭世歸心大洞天玉皇按籍許為仙身飛金䇿朝元去手捧瑶篇拜闕旋白日雞鳴霄漢裏古時杏拂羽幢邉自言棄迹方成道枉誦從前內外篇尊師得道貌如童追躡岑崟但使風毋道姓名千古上時聞笑語五雲中開山指顧逢秦禪行洞應知與蜀通憂患相仍兼疾病願祈一粒發凡蒙宿茅山栖霞道院涼月髙松翠影長石壇隂洞映蒼蒼山煙發氣鄰丹竈澗水流芬潄藥牀靜見道心生白室間披仙籙檢青囊投身未卜他年計明禱茅君一瓣香遊茆山柬唐太史應德本與唐期往而豫不能待因以嘲之聞有人間不死庭遂歌招隱浩長征巢鶴青松年共老經泉白石色兼清神君迹化名空在幽洞花深客自行為語稽康仙分薄縱逢石髓也難成寄題吳興吳太僕園亭吳興本是佳山水况復名園選勝開曲引苕溪來漲沼平分峴石作層臺琴書數處無塵事花鳥三春有酒杯他日南尋天目頂因君清暇得徘徊餘干李春江先生致魯國左相而歸先生昔二泉郡豫方髫年在諸生中最荷奬識展拜感舊情見乎辭登堂歡宴挹沖襟為問先生邇在林晚愛溪山輕相印日邀里族費家金門前流水心俱逺市裏囂塵迹自深却憶受知童子日徒然長大祇如今寄陸憲使選之李提學雅大田參知叔于三君昔同禮曹今居官嶺外端居離索嘆盈襟却記當年寵遇深抽筆每參原廟對橫經曾侍辟雍臨恩私難恃看孤迹職事無稱抱寸心嶺鴈江魚俱寂寞相思何處寄同音送陳中川之汴藩雪中作衣冠出餞曉匆匆白雪紛紛灑應空皓素明姿偏敵日輕盈弱舞不因風裛塵故為迎新隼飛片猶如點舊驄獨把瑶華當别贈清輝瑩質與君同題將軍遊騎卷青青細草滿平原故將飄零馬足間春日朱樓垂首過暮雲赤坂獨身還偏裨各散他門下歌舞盡銷舊帳間明月雕弓間在臂不忘挂箭出天山送宋龍門行甘州太僕磧路蕭蕭關樹微君行萬里事戎機忽到河源知地盡試登隴首見人稀時平塞下降羌靜野曠秋餘牧馬肥却笑漢家求大宛二師再出只空歸論文示門人方元煥晦叔琴名録綺舊曾攜柱是連城明月輝曲裏其人如得見彈來於世肯聽希終身已分長拋擲拭目聊為一取揮傳得廣陵真散後莫令手指與絃違樂平道中暮宿田家風雨蕭蕭僕馬煩客身寂寞託空村深聞夜杵應傍舍靜對寒燈獨掩門難竟孤眠尸吏愧猶慙一飯野人恩晨興欲問田家樂官騎催程不得言德興道中柬陸毅齋憲使陸君昔同在禮部客意悠悠忽自悲客臺憶共奉恩暉春城栁色趨朝入天路香煙扈祀歸官冗方知思昔遇途危猶未覺今非舊遊零落俱何處職事逢君得暫依臨川郡樓張都閫招飲樓閣崔嵬俯一州當樓置酒楚天秋參差梅栁軍中樂髙下溪山城上遊席照滿輪宜取醉林飄一葉正關愁銀瓶頗怪傾難盡曾換將軍舊紫騮中州道院夜宴孤舟宛在水中央仙洞深深草木香林下鶴行隨得路徑邊蘿蔓過罥裳興來斟酌瓊漿㵼吟罷參差玉樹蒼白露滿天河漢淺還城燈火一川長逢鄭廣文先生童年釋菜及門墻在泮常依芹藻芳座上談經分半席齋中鳴鼓接餘行徒持章句貪干祿獨守簿書愧省方十五年來音問濶何期今日復升堂贈郭僉事以亨起復入京風塵淪落故交忘水上相逢益自傷持牘空慙勞吏道操觚終念戲詞場須臾握手王程迫牽引離心江路長此去帝鄉應似客除書不省出何方江千春評事使南昌豫適以事行部豐城走筆寄贈江雅善鼓琴因以琴為賦古琴宛轉作龍形絲白桐堅各有名桐出嶧山孤幹植絲從天漢七襄成何言異質元同調不是知音豈發聲水緑山空清夜裏如聞别鶴兩方情豫行部豐城建安李君時言往提督滇南道出茲邑相見甚歡君出髙文見示稍為論訂遂及性術之辨最多往返一從為别苦無歡汩汩交遊意不存此道常遭下士笑將心懶向世人言斜陽萍水逢㩦手深夜蘭燈惠討論不悟當筵忘肉味含情相對似窮源廬山衣袂翩翩接鳥翰營回磴道出千盤峰巒拔地紛殊態樓閣中天起壯觀斜日色開三楚秀微雲隂散九江寒將同名嶽期終老且向匆匆客裏看春雪同省長諸公宴集絳燭燃霄深院闌廣庭積雪不生寒春聲笛裏梅花落夜色杯中竹葉乾坐上拂衣先起舞燈前改席更留歡人生分合兼衰健今夕須知一醉難宿天池寺示同逰薛仲常在世多憂坐自拘微官未得惜馳驅因尋絶頂逃人迹偶滯髙齋減病軀理髮晨光窺石鏡焚椒夜氣對香爐一心生滅元無取不語但應爾與吾石鏡香爐俱峰名宿天池寺明日下山寺僧相留豫愧其意爰題西壁隂隂松竹覆層巒蘭若深開曲徑寒樹裏燈緣傳法現林間花是講經殘窗臨石鏡天長曉門掩珠簾夜欲闌釋子相期無以答未除妄想為微官登佛手巗屋角嶺諸山緣崖百轉幾經休回復千峰晚氣浮路絶見僧行樹杪猿鳴呼客入林幽平看珠斗懸燈影俯瞰明河激澗流頗似謝公髙簡性領州不自廢山遊由大林寺尋講經臺因循香爐側下山十尺飛蘿手自援鳴泉數處弄潺湲半峰栖霧逢僧濕絶徑穿雲見虎間岸幘正宜巗石上褰衣時傍竹林間夕陽翠巘看尤好去路心知是下山暮雨投圓通寺宿野色蒼蒼逺寺微因聞鐘梵起歸依僧間正伴溪雲返客倦偏逢夕鳥飛一院燃燈通暗路滿空香雨沐塵衣齋心願學無生理漢綬嬰身嘆迹非得舍弟道原書欲來豫章久而未至報書省我喜終朝日日相望正寂寥尺素翻疑魚腹幻寸心真惜雁行遙夜長綘蠟花空艷秋色芳池草已凋愁極欲將荆樹植連枝照室免蕭條除夕示原弟卧病深夜殘爐火剩紅如灰一念懶書空欲歸舊里時難決未遂初心歲又窮寒色暗消燈焰裏春光細入漏聲中客居寂寞真憐汝骨肉情親病亦同元日於藩省祝賀述懷東徐少湖太史蒼蒼寒色滿嚴城霜露樓中刻漏清煙雜燎光看曉淺風搖燭影覺春生壯心已謝鵷鴻侣病齒空餘狗馬情才薄本宜長逺斥問君何事厭承明送袁生應樞攜室入京覲省嚴介溪宗伯袁生宗伯之壻青青春色起平蕪客路㩦家正可娛雪映船窗開卷用風吹江水挂帆須丈人已立中朝嶽愛子真還合浦珠借問南宫趨侍處何如片玉在氷壺送孫豐山參知入賀明堂大享禮成孫與豫先後為禮部送君南浦思翻飛前後為郎入禮闈直以遊談參制作更持文史答恩暉周南迹滯臣心逺汶上圖興帝道輝舊賦甘泉還有筆好將再染奏垂衣送方􅴓莊僉憲入賀明堂禮成豫章解纜雪晴消計及長安淑景遙垂栁新隂看向苑啼鶯初曉喚趨朝心同江水知歸海身在鈞天喜聽韶左個春開應有問何如衢室帝為堯月令春居明堂左個遣興生平不省緣何病日夜憧憧抱百憂自向心中除害馬便將身外等虛舟好間幸爾遭無事寡援寧須請絶遊竊比前人為祿隱不妨世上且沉浮再至德安公署為官懶拙本無稱樂業田閭寡訟爭間署簿書終日靜孤城草木及春榮行庭最愛蒼松色隱几翻嫌鳴鳥聲屢向此中民不厭年來自哂近人情錢侍御出遊東林豫留江州城中阻於陪從作此奉柬達人瀟灑樂煙霞自向東林問楞伽脫却繡衣挂貝樹更騎驄馬踐香花坐中山色夕陽亂門外溪聲春水加城郭匆匆多事者愁看遙巘片雲遮錢侍御宿天池寺疾作召醫豫屬有事不及往問以詩代柬聞君耽卧南山阿為戀繩牀起病魔法鼓揚聲生寂滅香池涵照洗煩疴翻經半與方書雜飛靄偏從枕席多問訊有懷難自往空令示寂作維摩送趙教授志貞居藩寂寞久無歡聊為伊人一解顔嗒然語合形骸外去此交存神氣間共指馳驅循大道更期著作副名山一尊臨路情難盡原草含黃暮雨間移官河南報至作赤雀翩然銜尺書書中忽報有新除世榮已付浮雲外生意翻為腐草餘悔把青黃災斷木却教鐘鼓饗爰居一官虛謬頻遭調寂寞揚雲愧不如過劉實夫墓下作斜陽片景水潺潺堪歎先生永閉關寂寞一壞埋白骨蕭條幾樹掩青山不懸寶鋏枯枝上空灑瓊珠宿草間人世相期那得見千年應作鶴飛還弔李空同先生空同先生之風豫慕之久矣無由一見比以謫官稍遷汴省獲訪故廬而先生冡子伯材亦辱過從之雅故末句及之大梁竣罪異長沙託賦河流比汨羅明月投人遭按劍陽春驚衆寡賡歌幽扃路閉黃鐘絶副寫書藏玉屋多論次舊聞應有泣史談舊業竟如何蘇門山性愛名山恣懶頑每逢佳巘便開顔岑崟忽躡蘇門頂清淺兼臨泉水間地勝絃觴寧為賞心間魚鳥却相關坐思善嘯巖栖者不得神遊接往還百泉名泉千𣲖繞共山匯作共池碧樹環外物都從泉上淡中心獨向樹邊間鷗鳬羣戲翻珠碎荇藻叢生點鏡斑此地真宜投袂隱堪悲朝往夕來還送胡中丞可泉西歸廣野微塵栁眼青衣冠飲餞一城傾還家且有藏書富解組真同脫屣輕路出崤陵桐樹盡旌飛灞岸嶽蓮迎歸田賦就身猶繫因送將歸客念盈時某方有乞歸之疏故末句云送竇憲長入覲離亭杯酒日初曛征馬長嘶首北雲為畏簡書三載覲自陳功伐四聰聞試言定拜綸音重錫宴應沾御醴芬欲問風裁清海岱但看滿路雪隨君送正郎之留都秦淮緑水石頭城此去遙知愜宦情望國定瞻龍虎氣登臺試覩鳯凰名風流却值山川壯形勝應逢賦頌成憑君莫自傷留滯漢室由來重二京承西亭惠梅愛其香色賦詩一枝疏淡在銀瓶虗實蕭條冷氣生近嗅幾回憑小几貪看數起繞空楹支離形影元相得寂寞心魂轉自清却想前人東閣裏孤花同賞不同情詠折梅用前韻月挂疏簾水滿瓶一枝誰折報春生肯辭帝子分瑶圃來與幽人伴素楹香雜藏藝飄帙細色侵囊雪入幃清漫唱巴歌投郢客引啇流徴也同情雲東次前詩用韻再呈盈盈素質映銀瓶誰識仙葩此寄生初滿室時風入户正宜人處月窺楹况逢髙韻能同好未許幽襟抱獨清共指羅浮山上約便堪脫屣世中情李少泉見投折梅之詠用韻奉答紛紛百卉盡為臣讓却花王占斷春對雪間吟巴里客折枝相贈大梁人微香偏觸觀書夕疏影宜看置酒晨異室同心投秀句獨憐如玉不能親荷亭宴集用龍雲東臬長韻南薰扇物夏初深久廢歡娛為客心共得池臺開逺賞時將絲竹間清音微風淡蕩輕炎暑竟日淹留到夕隂此是梁園歌舞處因抽兔管命同襟壽王間齋不好為官早乞身翛然平世作間人林中築室知山性窗裏焚香養谷神綘老六身推甲子椿年千歲是秋春清泉白石長無改應與先生結德鄰贈李介石徴君廉似於陵不灌園形骸都喪我偏存機當自適宵為蝶樂少人知曉負暄笑却龎眉謀漢二嫌將清耳汚堯言獨嗟太白非愚質願事陽居學食豚同陳瑞山蔡可泉遊覺海諸山吾生寡好獨耽竒更接良儔汗漫期嘯向空山成節奏行窺止水鑑鬚眉坐茵每藉林中草解珮時懸石上枝顧謂同心髙蹈者便堪脫屣視妻兒由覺海寺訪龜石巖路中作回環疊嶂欲迷方來往微通一徑長怪鳥啼多山更寂間花落盡樹還香鳴泉數處褰衣屢側石千盤策杖妨沉病嬰身形已廢獨於遊踐力能強訪何默甫文學讀書山房何兼授徒一室間開向翠微獨諧幽意託垂帷手中編絶緣披慣舍後園荒為懶窺林木栖雲隂講席山泉帶雨漲書池帳前弟子無休暇共説身親樂事師訪王間齋山居賦贈新晴巖壑翠成圍多暇丘原草木肥坦卧空林花墮腹行穿曲澗水濺衣簷楹半著煙霞氣雞犬都忘世俗機一欵幽居生靜逸因思家在市㕓非寄黃小竹遂昌聞君領縣括蒼東瀟灑為官有道風每夜猿聲如舍裏四時山色在城中薤間置水姦皆息花下鳴琴訟自空遙憶潘生多暇興欲將佳句覓來鴻聘魏山人卜先大夫葬地同行山中作此呈之苦披喪禮不能終行抱深憂路若窮地上菁莪皆是蔚林間髙樹易多風肖柴病骨擔難弛絶線愁腸火更攻居倚前廬何日反欲憑仙術禱楊公得東山吉地志喜呈魏山人芳名表地記東山佳氣氛氲曉夕攢水學之流成九曲岡如龍躍自千盤天地應為今日待神竒寧許世人看不緣抱痛祈靈術誰識明師一遇難送江山人山人資術恣浮沉妙得山髙與水深地理直從分野辨河源真笑鑿空尋折枝林裏成穿杖舉袂人前表合襟已學蒙莊儲葬具明師相遇若為心寄贈王秀才客逰括州猿􅀈千山易惹愁嗟君聘轍為誰留貂裘已敝書難上狗監未逢賦枉投為客應多迎解榻此身且作泛虛舟髙林豈恨行逰滯侯貴如今重谷樓送陳西巖山人兼寄蔡鶴山徴士自將形質混塵煩獨有風神衆所尊託意偶談山水事好遊不謁貴奢門道存已解遺身世客倦猶思返故園遙憶一丘歸老處惟應禽尚晚相敦贈魏山人人人道是郭先生測隴窮攴到窈𡨕流水去來無遁性諸山向背盡分形手中青杖標千法袖裏囊金著一經願禮明師求片語愚蒙何以假仙靈挽蘇秀才少年詞學盛朋逰賦命乖違與事仇抱志竟同川水逝生才偏使玉樓收托孤內友猶玄髮哭子慈親正白頭每把竒文思似玉泉臺𡨕漠見何由送陳司訓奔喪還嚴州搖搖心曲似旌懸望市過城益黯然力盡重趼行嶺外眼摧雙涕灑江邊猿啼於越千峯雨星帶嚴灘獨夜船舊日門人來卒業經中應廢蓼莪篇送何參議分守承天當年白雪流歌地此日黃圖啓籙基代卜共瞻龍起處紛逰猶記鴈飛時離宮草樹豐馳道原廟衣冠閟奉祠最是聖情勤逺念榆鄉節使選材移翁以時新移所借育泉里莊氏之宅移居寥僻逺城隈自説近人易染埃愛物還將雞犬去恱生好取菊松栽却笑非公家是寄毋庸謝客戶任開白衣教令知來徑欲遣清酤就緑杯嵗首與道卿偶集月臺寺同道原舍弟間行曾不記春芳忍草當階忽已長緑茗煙中消病力紅蓮熖裏惜年光求聲鳴鳥知聽法承蕚開花好近香懴悔便從今歲始相期禮足奉空王春日登城同舍弟道原春城曙色曉蔥蔥步屣危墻已好風萬井遙分初日下羣山微見逺煙中歌鐘乍動髙門閉車馬相從大路通不恱紛華惟小謝愛余涼踽本來同城樓與舍弟書事城中多事厭招隨獨上髙樓愛弟擕林果垂枝攀讓實檻藤布葉取賡題朱旗日閃青原靜畫角風生暮野低最是忘歸心會處桃花新吐草催齊精舍與原弟夜坐論詩家貧春日獨無營虛館相看兩弟兄窗外方池知雨罷城頭片月帶雲行情諧語笑忘年長興入篇章覺夜深還就空齋成窹寐池塘春草夢中生元夕獨坐幽居猶惜歲崢嶸獨坐迢迢匆二更遙夜紛華千品動空堂寂寞一燈明魂消舍北笙歌發心靜門前車馬行頗被時人譏寂寞胡然閉户古先生論學示友人雜詩十首充塞乾坤惟此理更無古往更無今一腔子是隂陽會七尺身為天地心本是完成寧用補元來無失不須尋此語驟聞如未信但將此語細沉吟中立亭亭四不偏何人識是靜時專此形而上方名道未畫之先自有天尋逐必然終入俗虛堂寧免誤淪禪莫向其間求可執前人訶破謂無權俗學牽纒醉不醒而今指破與君聽沉迷傳注何殊蠧依倣科條即是伶過轍却來尋軌道辭家翻去傍門庭宣尼若曉今人學應悔當時著六經天付於人有此身此身用處是元神眼底自能分黑白舌端也會别鹹辛求添一物偏多事巧出千般總離真但信本來渾具足先生何用太諄諄汩沒近儒文義教一生機枉速飄風却行翻訝身居後兩聽虛疑耳不聰神化何曾離日用經綸元只在淵𠂻從今遊衍髙明地始免徽纒與棘叢至道之精豈著言聊將言語訂迷頑心思起處先離位聲色大時更沒關昭氏鼓琴成毁際輪人斫木苦甘間此語諸君如善聽清源山即是尼山埋沒精神鑽故紙世儒拘陋信堪羞專從事業尊堯舜直以能多識孔丘懸想一生思出位勞心終日困旁求沉綿此疾真成痼苦口良方誰為投好徑人多道本夷自為煩苦自支離省存判截靜和動先後分開行與知敬義夾持寧免二誠明兩進已成岐當時呼得曾參唯一貫之餘費甚詞筌以求魚蹄取兔兔魚初不在筌蹄畫舟訪劍將何得買櫝還珠亦太迷牝馬健行知作用潛龍不拔識端倪古聖我思心實獲美人遙在一方西充盈象器極髙深要識惟微是道心何處天明非出王未形神鬼已昭森尸居寂寂偏龍見暗室𡨕𡨕有日臨請驗此時真太宇豈容一物妄相侵送俞志輔赴闕自效漢家征虜羽書飛壯士貪恩覺命微手拂龍泉生勇氣胸藏豹略暢兵機將屠吐谷收蒲類願逐輕車出武威侯印纍纍酬死戰莫愁少婦泣羅幃文上人房餞徐山人久耽幽獨類名緇送客還同惠逺期繫勒好嘶香草地垂楊偏拂法筵枝杯行寂性生飛動袂惹空腸怨别離從此看君分手去更無人復到茅茨參知筆峯宗兄將入京道出吾邑枉訪林居賦此為别已無迎送絶人羣猶復杖藜出候君耳洗嫌因聞世事頭風喜得誦新文山中偃息慙龍卧陌上差池惜鴈分莫怪臨岐頻悵望有誰人肯訪間雲哭朱徴君斫木已逃斧鑿災又隨流水逝無回每看佳句牧詩卷猶憶清言接酒杯蟲汚殘編塵几暗猿吟空帳石林哀可憐幽徑荒松菊獨向黃泉歸去來送俞郡入覲聖堯為帝正垂衣髙闢四門納九闈鸞珮冉陪鵷簉入隼旟却向鳯城飛筵開白玉傾心醉賜出黃金拜手歸講德著書名樂職應看歌頌徹彤闈送汪大尹入覲作吏如仙有道機雙鳬遙向玉京飛爐煙繞處瞻天表綵仗開時就日暉理却橫琴調舜曲持將製錦補堯衣繁花滿縣含芳待好帶天邊雨露歸題畫扇小景贈顧濱洛齊䊵裁扇月形同點染丹青出化工雲氣淋漓疑帶雨水波搖漾不關風髙低萬樹毫芒見逺近千山咫尺通却怪主人多好事置身長在畫圖中挽黃一崖嗟來桑扈返於真笑寄人間八十春相鶴經間窗映月刻鳩杖倚壁生塵獨遺一世同蟬蛻深入重泉治鳥伸從此江邊鷗不下祗緣失却忘機人贈章三洲髙才早戴惠文冠驄馬瑶珂白玉鞍袖裏諌書人不見朝端簮筆衆爭看一封承譴君門逺萬里投荒嶺路難折趐雕鷹仍養翮清秋霜漢待髙摶訪陳舟峯秀才讀書處賦贈閉門開卷日何長草木萎黃又見蒼坐榻幾穿當膝處飛螢多入照書囊荒庭鳥迹翻朝几古寺鐘聲到夜床攬鏡莫須愁鬢髮凌雲終自達明光薛南塘移居走筆奉柬頗怪日來來往疏因知迫歲始移居徑闢三條同蔣詡家存四壁類相如飛螢入夜疑新案巢燕春還訝換除借問儲物何所有圖書滿篋麯專車寄施文山問君何日滯明時直似朱顔節素絲逺謫長違天北極量移猶向海南涯猿聲到舍初休吏榔葉飄庭正寫詩玉體清羸應近藥朝餐努力慰相思唐翠軒見過蒙密城西仲蔚園雞鳴樹杪類荒村已無竒迹驚斯世猶有髙人到此門蕉葉聲中欣對雨莎茵藉處愛移尊與君且盡今宵興莫聽階前蟋蟀喧紫峰先生祠于鄉賢謁拜作閲嵗如川寧免逝惟應名迹不同泯獨行身後興吾黨沒祭社中是此人桶刻施丹嚴設像池形類璧奉遊神自慙未死頑粗質兀守殘經愧後塵訪郭白峯山莊不值留題二首東郭先生真好靜柴扉聊寄碧林間青山舍後經秋老流水門前盡日間禾廩不茨禽共食松巢無擾鶴知還一㕓欲買相從隱此地由來可閉關髙人好尚在田廬物物幽竒事亦疏雲護籬中曾採藥風吹牀上未收書草間遺籍農談處石畔殘樽蠟飲餘徘徊欲去還題尸凡鳥深慙我不如小身巖白雲何意忽相招轉盡蒼崖更渡橋怪石似將凌傲岸凋林偏與對蕭條獨行幽谷惟聞鳥欲問前峰偶值樵疑隱此身須早計莫令桂樹葉先飄慈雲院新裁巧製成雙屐試選名山故一登遙聼鐘鳴翠微半直看花到最髙層眠鹿決起驚人語飛鴿來窺證佛乘不覺塵心銷釋盡空林晏寂只如僧送張月洲往南雄訪陳雙山陳時謫為南雄郡丞萬山深抱始興城問子胡為欲逺行逐客未蒙環玉賜故人偏繫綈袍情豈學臨卭因邑令也嗤監里重侯生論文樽酒相逢地上郡應傳有聚星送星士李子益竒談巧中似君無却把靈占過野居久縱間心遺失得寧憑閟術問盈虛夕陽正值青尊盡秋氣漸看錦樹疏莫向他人道名姓草萊今已掩荒廬崇陽樓陪汪明府觀燈二首交衢如髮敞髙臺萬戶懸燈向夜開身出半天星倒映人行下地漢翻回粧邊窈窕疑雲雨曲裏參差辨栁梅鳬舄駐時陽艷發共言明府是仙才千家門戶誇燈勝綴葉分枝巧剪裁霜氣暗侵煙更暖風光微扇熖偏催歌隨遊騎將塵去人似飛蟲撲火來為問河陽花滿縣何如此地夜中開胡雙華公以春興髙詠見示漫賦奉答二首芳草萋萋著處生風煙客裏倍關情髙迹自看軒冕細道心却向簿書精荒城過雨青春暮畫寢凝香白日清最是玄暉多雅興窗含碧岫句偏成知君百物不關身也復題詩惜去春總為吏情嗟事迫更緣鄉思惹愁新坐對禽言聊共語見飄花片亦傷神疏頑敢謂能同調却枉瑶緘示我頻約齋劉公作壽藏戲柬超然髙識有誰儔不諱生前作死謀百事都忘長脫屣一丘預築待藏舟親題幽石因山表選植名材繞隧留只把兩間充葬具嘆君曾未似蒙周送史西崖守沅州髙材領郡武溪濆莫畏蠻荒盛毒氛好變侏􅍣歸雅俗更將清暇訪竒聞苞茅曽致齊人問銅柱欲窺漢將勳小酉山中藏逸典探幽應得覽玄文送陳秀才附驛往沅州下帷兀兀不窺園躡屫匆匆驟出門獨向五溪馳驛騎欲過二酉聽雞猿携書偏與賓遊别仗劍曾無妻子言溆浦最悲騷客賦憑君一為訪幽源吳默泉張鄮西二公遊清源山有作投示輒用奉酬二首鞅掌何人解好逰髙才擁傳擅風流幽花帶雨紅初潤密樹含煙翠更稠境勝况兼賓友美心間正值海天秋掞摛華藻流宫徴散入無諸古郡州秋中佳色絶微埃身在髙髙氣象開縹眇海門蟠貝闕氛氲天路出香臺支離邑戍紛如點破碎陂湖漂若杯最是登髙難作賦諸公賸有大夫才題九溪書屋贈姚生體乾髙才也有絶塵心獨傍含漪闢逺林竹屋數椽容偃仰溪流九𣲖匯清深水光蕩几初開卷漁唱過門正鼓琴莫謾掩扉矜遁迹未忘作賦羡知音贈雙竹君看種竹滿江南獨在君家世所談特植太孤偏有偶叢生非貴又無三色搖兩翠祥煙裊影拂交隂淑景含若取為筒清廟奏共言律品並裁堪題寒泉精舍贈羅希周并柬其弟希陽君精廬巧搆事全幽最是才人解息遊滿室吐藝千卷積當階鳴玉一泉浮含毫每玩霏霏灑行樂常通㶁㶁流更向池塘滋細草春來佳句夢中求贈姚體諧秀才翩翩佳士氣翻飛蹴踏千羣血汗揮善説尚書宗伏勝早攻文賦似陸機虛名枉辱藏懷刺形穢真慙側玉輝但看才調如君者豈是衡門一布衣送黃葵峰廣東巡海憲副黃舊為給事中緩帶輕裘欲立勳書生獨領伏波軍隂符祕演五兵略寶劍光懸七曜文日照樓船銷海怪霜含節鉞淨炎氛西掖聲華人盡識功成早入事明君送程太守歸養喜動心顔決棄官寧論皂蓋與朱幡功名薄是微臣分乞請俞知聖主恩出入扶持蠲疾癢晨昏甘旨奉溫存君家白日偏長永為有金花堂北萱寄大梁髙大極目雲天間阻修懷人日月易悠悠蓬池靜處堪舒嘯梅蕚開時每惹愁一日相思腸九折尺書應想見千憂莫言行鯉難過嶺自有黃河入海流宿萬石山道院暮赴松門非為倦欲依妙境息奔波燈前鳴磬山中靜石上流泉雨後多秋氣漸深聞木葉天機忽長在巖阿躊躇未決投身計荏苒其如老至何送洪克晦尹淳安銅章綰綬墨華明百里堪言作宰榮江出新安流過縣山從建德繞為城烹魚比政苛應免帶犢喻人化自行興革初然民吏笑漢庭終説子康名寄睦􆆨西亭最愛梁園修竹館風流帝子獨翩翩豪華却盡攻文苦寵數偏能養性全馬過繁臺誰可記鴈飛蓬沼信難傳山中桂樹偏翻甚寂寞柴扉養暮年送賔山大士還錢塘祇説身同雲片間南遊何事亦思還禪心已寄生滅外浮迹寧存來往間竪佛誰能酬一偈持燈行且照千山莫將空性呵難别師去吾今又閉關錢塘縉上人來泉見訪值豫卧疾不能見作此投之窗中伏枕蓬蒿長城舍荒蕪只似村消盡形容神獨壯都無寢食息空存往時賓友全辭社結夏髙僧忽扣門莫倚文殊能問疾此中欲答已忘言往日客錢塘住西湖頗久湖上山水藂林之勝至今猶形夢寐因縉上人來喜而問之二首客居久住西湖水水上諸峰已若家别後心情長欲往夢中光景每多差蘇隄小栁成隂未逋塜枯梅坼枿耶知爾新從湖上至故憑問訊莫相詿昭慶法壇經幾戒淨慈禪院若為參藕居花發何年盛虎跑泉分孰處甘多少僧存靈隱寺有無人到紫陽菴兩髙峰頂誰常住擬欲從師一一談山中書情寄孫毅齋學士二首田園嵗入課蹲鴟手裏間持一釣絲閉口免教名月旦縱形堪擬號天隨柴門留鎖逢僧至蘿徑彈琴候客遲滿腹飲河􅀈鼠樂翻思人在鳯凰池本無髙志謝囂煩拙疾居然近懶頑將母且堪耕負郭聚徒因得訪名山春來道侣看花至日入家僮買藥還黃鵠摩天掀羽翮白鷗江上意間間間居即事奉懷徐少湖學士二首流泉回曲樹扶疏頗有人嘲尚白廬傍舍名山看不足滿庭芳草懶教除談禪已别根三乘郤疾新傳髮百梳當路追攀今念滅何須不作故交書悠然舒卷片雲孤寬褐偏增四體癯本為聞鐘驚海鳥亦知在木即山樗閉門自著終堯問行路人猜效舜趨致主唐虞公等在愛潛一谷更名愚寄張淨司馬兩足將窮五嶽春祇牽男女未成人求田清世宜遭笑看竹間鄰每被嗔郡縣猶煩知姓字妻孥稍已近甘珍同塵頗惹俗流毁不是髙賢豈識真寄曾前川斬杙伐杗竭壑岸却容大木卧江隈道路過逢徒駭睨朝昏變怪競睚咍九成何日當營觀百尺通天未起臺但保龍鱗蟠鐡幹輪囷終是萬乘栽得鄒東郭書歲月峥嶸何易除相看已是十年餘鹿麋銜草思呼侣鴻鴈衝霜忽得書百遍諷吟開匕筯八行珍重比瓊琚魯雞善伏人爭赴鵠邜深慙我不如得羅念菴書欲使行蹤滿四方不知吳越定衡湘樹隂陳禮寧遭伐旅次絃歌有負糧疲曵已非希驥乘殷勤猶費記魚腸未由躡屩追遊轍門下將誰最簡狂寄郭淺齋侍郎大賢小隱卧山阿海內蒼生其奈何脫屣未應忘世事懸車聊且養天和躍馬場邉看險地輕鷗江上狎晴波鄙夫間放能髙論獨有年來漸覺多吳雲泉見寄為携者中路失之尺素春貽坐閲秋復言中路有沉浮祇應郢客疑燕説不是殷侯懶置郵氣合形骸都已外神交文字亦何留崇山表嶺限閩楚岊水瀟灘空自流得陳明水書客有談陳明水遭鄉人之侮者初聞已駭妄相傳談久令人一悵然忠孝空聞行貊貉安便猶不在林泉讒譏欲點偏為濯事變侵磨亦試堅始識道心能自勝豈容小腹料髙賢寄吳默泉行部漳州看君纓紱是柴羈行部瀟然何所為白雨乍飛休吏頃青山每對按人時道心閉閣真如水秋興登樓偶得詩恬泊應言無與共幽懷却有野夫知答劉梅園侍郎見寄劉公大庾人因以梅為詠豈少閩山梅萬樹不如庾嶺一枝春風霜郵寄香猶昔琴册伴栖賞更新愛玩何曾離座久清孤長自想丰神胡為鼎食虛調味徒使餘芳及鄙人寄江午坡傳道薌溪肥汝遁經年門外可施羅溷塗置筆將成賦巖谷生芝故作歌世事不知流澗水嵗華空見老庭柯山中蕙帳人長在夜夜應聞鶴唳和答周成山見寄可嘆當年賢吏部不防讒間失髙名危機駭發曽誰料抗節獨行已自明棄置堪憐終白首沉淪無復念蒼生欲知吾道今何在坐席從教野老爭寄顧左山年來漸喜世情微發嘆浮生未有歸鋉石猶知餐訣誤雕龍偏悔著文非遂令白日難空遣坐恐華顛欲就腓愛爾陶然東海上一竿無羡據苔磯寄唐荆川二首倐然於世有何心共説丈人似漢隂把釣行臨芳芷岸採樵時諷紫芝吟暑時暴麥常忘雨園裏鋤蔬不見金四體長勤多鄙事道情寂寞自知深銅官山下一溪橫知爾獨多山水情最喜爰題蕉葉盛不憂長餓蕨苖榮節垂日月嫌髙甚思抉煙雲苦瘦生間倚稿梧應自笑本逃名却近時名寄留都勳部洪芳洲秣陵留滯一郎官終日趨曹亦閉關善補凋羸惟簡帙勉娛涼踽有江山宦情聊寄鼓琴裏詩句常刪騎馬間都説林泉宜散逸野人知不似君間寄顧洞陽水繞緑蘿莊似畫釣臺間著木蘭船琴聲初歇月挂樹蓮唱微聞風滿川掩卷看山心不繫題詩示客意難傳聞著新文名應美亦知胡老已華顛寄陸北城芳草春風處處吹相看數舍起勞思人過戶外常盈屨士向談間盡解頥且樂青芹香冉冉莫教白雪鬢垂垂有文不遇工何益知子良非一卷師送康盤峰廣西參議握符制逺分藩重露冕臨人列郡欽節下州官多卉服嵗中牧貢有蠻金九疑曉望煙如畫八桂冬榮雪滿林銅柱標南猶奉朔漢家雨露本來深和程郡侯遊清源山作二首山城春半煙光好為政風流解眺登盤辟偏尋泉畔石攀援每值古時藤名花踐遍香沾吏法偈吟成寫與僧誰言朱紱能相繞即此丹梯已可凌使君清興在髙樓滿目浮雲向暮收天逺滄溟孤嶼出日斜極浦片帆投藤蘿半壁垂依隼鐃吹中筵驟起鷗正是心和多暇豫當杯莫惹離鄉愁九月十五日黃東石招逰北山石室陪西川郡伯用韻九日忽然過六日好逰可不惜流光最憐賢主能開宴賴有佳賓肯愛狂怪石解衣塵氣淨名山對酒野情長便拚登覽窮茲月豈必重陽茰菊芳和月中即席之作用韻望在秋時惟此夕月於勝地更能孤諸山環寂微生籟大海浮光駭弄珠噉逺纎毫形色盡憑虛半點祲氛無願從太守娛清夜五馬騶人莫遽呼中秋夕東樓宴集用韻關山鴈過晴天逈涼氣偏成鼓角哀岑寂欲尋娛目處風流相命上樓來井參浸漢金波漾雉堞窺湖玉鏡開滿席瑶華依錦綺相看忍負手中杯明月中天處處同清輝無似此樓中賓僚盡倚蘭將玉烹炙真兼魚與熊爽逼冠衣森浩窅影涵闉郭動沖融一聲笛呌光零亂更借燈前舞袖紅酬西川郡侯惜别之作用韻二首達識如公今謝傅中年作别亦情哀且題藻句寬離索莫問萍蹤漫去來老大勳名雙劍在疏狂林壑一扉開臨歡預惜逢難再坐覺愁容照緑杯題名猶記曲江同世事浮雲一槩中階墀衮衮榮軒鶴郡廨棲棲老試熊賦政賸將寬大布達觀坐使速淹融有酒莫令杯裏淺無丹能駐臉間紅奉和方西川公中秋夕與黃東石郡齋對飲之作用韻二首美夜清輝宜妙賞華筵選客有誰同悲秋忽見樓過鴈愛月何妨軾畫熊玉鏡挂城看漏永金波倒海與天融尊前自墜山如玉不用扶擕舞袖紅佳期三五仍秋半月色中天自不同舉酒聊將酬顧兔當歌寧復羡非熊郡齋下榻緣徐孺客座芳尊接孔融皎皎銀盤懸綺席華顔照見兩殷紅得陳華山書柴門曲巷迹如何車轍時時碾雀羅薾疾自宜形貌惡匿瑕易使垢疵多己無心想交人事豈有文章致客過何為汀洲賢太守猶題緘贈到雲蘿送朱鎮山參知蜀藩雄藩奄履三分土風物聊將訪蜀都旟建新文明鳥隼國談初姓記蠶鳬江名濯錦流偏麗山比修肩秀獨孤劍閣雙門如外戶旬宣彌覺盛王圖寄錢洞泉以使事在嶺南輶軒更為逺遊輕原隰光華阻使程莫遣衣當犀瘴減遙知句向蜃樓成間探仙籍朱明洞弔訪圖經趙尉城共説交南多寶玉飲氷心膽自孤清贈廖雲溪聲如金石出謳吟肘見時因手捉襟被褐誰知懷裏玉揮鋤不顧土中金流溪清處宜垂釣山月偏來勸獨斟榮達紛紛輕老醜莫將臺笠愧華簮送袁莪溪應召飲氷髙節有誰倫海郡祥刑自不寃折獄片言寧用費守官三尺欲何恩立身會見登朝早好諫還看致主尊事業峥嶸闈闥上可能有意寄丘樊贈章心壺名醫年來多病交遊簡半是名僧半是醫本訪緇流參佛乘忽逢國士話黃岐隔膚見膽神觀異刳腹浣腸法術竒獨賴值豫未反走此身料得尚堪為投贈沈青門二首今上好文如漢帝多才似爾正同時賦藏篋裏無人達身老江干只自知落魄撡撾輕貴勢流傳樂府恱名姬婁卿唇舌何須掉且向東臬守故籬荏苒流光鬢已翁詩名少日滿江東過秦著論才何忝入蜀論文命不同劍術徒看塵裏暗築歌猶自酒邊雄黃金臺圮時輕士慎莫潛身燕市中兵會館赴靜泉公招陪南衡涵泉二公夜宴二首誰云州郡有纒牽自是髙情接勝筵選地張油宜望海建瓶瀉酒勝如川層城未闔娛遙夜列宿初稀美碧天政務從容能好客一時良牧最稱賢髙館張筵壓海堧平臨極浦俯濤瀾洪流挹入黃金盞清漢孤懸白玉盤席上鳴笳聊起舞風前秉燭更留歡振衣漸覺襟裾重忘却蕭蕭霜露寒艾靜泉督造水艦初成獲縱觀其盛賦此奉獻兼呈南衡涵泉二公二首雄略􅀈􅀈美郡丞英資真稱佐專城坐看整暇臨樽俎自有威稜領甲兵海戍天清煙不起樓船風靜水微平故引簮裾觀控險共知制勝在銷萌百尺髙桅碧漢間蒙衝樓櫓靜如山真將餘氣凌窮髮坐使馳聲憺島蠻濤日吐吞增艦勢干旜閃蔽壯軍顔兼資文武人安堵海上孤城晝自間寄贈陳汀州覲還治所聞君新領璽書還車上雙幡似渥丹共理親題天語寵借年重慰嶺民歡嵐霏入郭衙常冷木索栖庭政自寬最是光輝人所羡為邦元季兩稱難詠詹晴溪小隱聊買一園成小隱髙齋事事愜幽情臨池終日知魚樂啓戶侵晨愛鳥聲新笋漸抽勝釣竹垂藤因製挂衣桁一塵不起心長靜門外何妨人自行贈劉雪湖善畫梅橫揮急掃豈無神巧奪天然了不分清影踈疏渾欲動幽姿的的逈難羣一枝時出臨山水萬樹爭看亂雪雲别後相思休驛寄開圖長得對夫君夏日憶泮池芙蓉柬唐慱士方池藂葉碧攢文秀出鮮紅數朵雲緑水含漪相映淨微風還度與揚芬幽姿冉冉偏難狎挺立亭亭自不羣在泮歌逰宜對此誰知寂寞正思君贈艾靜泉去官送逺郊門若為心停雲黯黯起層隂讒言熒惑堪銷骨宦業峥嶸竟陸沉解印仍留新字犢還家惟有舊擕琴如弦昔嘆路隅置直道難行豈獨今同吳泉濵逰靈源山紫雲室訪靜上人千峰髙處一峰深未到遙聞鐘磬音徑路漸通難進步山門忽覩已生心色空矗矗迎窗岫禪寂嚶嚶在樹禽願與爾投廬逺社莫憑陶令傲東林泉濱先生為縣令棄歸有陶靖節之趣而所居在靈源山下大與柴桑匡廬相類也宿紫雲室同泉濱中年頗苦病相侵聊倚繩牀卧碧岑枕席亦是人間物寤寐自無世上心孤月中天風不起明星出海霧初沉此夕擕君同一覺更無在昔與如今龍南岡久謫不召詩以為嘆怪爾謫居猶漢吏欲將孫子長官中地幽應隔陽光照天逺宜無雨露通聽厭舶齎喧鵙市看頻島氣起蜃宫已知直道非今好莫向時人嘆路窮贈黃少泉書屋精廬小搆北山下三十六峰在眼前松桂翩翻留晚色雲煙開斂發春妍鳥聲求友遷喬木魚藻行風舞翠漣期爾一經能自致豈將短檠負芳年題少濱書屋贈金生何處清輝最悅人若耶溪上鑑湖濵髙齋結搆氛都逺才子風流意自親靜夜琴心山水在芳春調興物華新鳳毛會向靈池宿莫戀鷗羣狎渚濱哭黃應初山人二首碧山長在人何處豪氣杯中恍可尋靈魄應隨遼海鶴遺風猶寄廣陵琴同盟猿􅀈驚多夢舊撫松筠怨獨隂佳句卷中時把玩堪嗟已是古人吟舉尊酬汝知何用涓滴曾流地下無星象還天仍是酒姓名著谷定稱愚解酲誓婦留今語藏畫誇神守故厨返幾桑扈真長已雙淚空垂楊子朱酬詹晴溪疾愈見貽之作抱疴忽自長天機四體新除去日非牀上方書間未掩爐間藥火撥猶微著衣始覺腰圍減覽鏡偏驚鬢髮稀應笑拘拘今尚爾不如桑扈返於幾得家兄病後手書半年尺紙抵千金細認緘題手迹真字裏諄純論離别毫端揮灑識精神沉冥起後情思迫憂患經餘意氣新誦與兒曺相解曉起居堂上慰慈親訪吳泉濱先生山居賦此投贈家在深山非避秦相尋正及桃花春迎看道氣眉間異暗接心期語下親草木欣時同我恍雞豚得性與人馴好栽五栁垂門外雪棹重來免問津生日自述二首早脫風波難料迹尚存溝壑未填身朝昏賦芋憐狙輩寥廓翔鴻笑弋人出戶漸看栽栁大行園最愛藥苖新欲知晚歲棲遲意海上鷗羣已可馴歲月悠悠不自驚徒然長大有何稱讀餘舊册須頻閲悟後微言却忘譍載酒偏多尋字客翻經每枉住山僧從今雙眼看人世倐忽浮雲幾變更章三洲見寄清朝述遇圖册作此奉答虛室齋心無一物猶然懷逺念伊人正攤竹簡翻羣蠧忽枉瑶緘躍尺鱗事迹瑰竒圖繪設生平感激染毫新鄙夫久斷浮華夢今日看題畏蕩神寄贈周澱山太守莆陽大守何淹滯獨把一麾老嶺陲不慣逢迎遭客謗耐消皮肉救民飢中堂空設懸魚索內舍曽無問絹兒與爾固然殊出處論交此日最相知遵巖集卷六

body:
  text: 遵巖集卷十九明王慎中撰祭文外祖李尚寶公發引祭文嘉靖二十一年二月十八日我外祖竹玻公發引之前一日也主人設朝奠將以遷柩告其外孫某等免小功之服矣不幸有父之喪因服其重者入會哭于堂而特設饌羞牲醴以為奠而告焉嗚呼公其行矣東門之野玉枕山之麓一抔之築嶐其如堂窈其如房公將託魂於彼永歸而不反矣人之死也其魄則降其魂則升惟其備道全德完其所受于天而無害者魂升而靈為神以昭于上而與天者遊則公與兄人之死魄同其降而魂之為神非人所得而同者矣其神既靈而升于天雖魄降在地不可復化其所託而藏者亦必休祥所集孔固且安則玉枕山之築公其可以永歸而無患矣公其行矣嘉言篤行所以垂不朽而詒無窮者某已序次為狀以行于世言不浮於事文足載其實宜公不死之神所臨照也公之存以備道全德為時所尊信悅慕蓋千萬人而不殊然以私忌而毁之者亦一二焉公其行矣其神照臨在上其尊信恱慕者之衆非公之所喜乃天之所與也其一二忌而毁之者非公之所憎乃天之所奪也彼不畏獲罪於公而知為天之所奪必且自沮而知改矣嗚呼人之生死於世如行迹之去留惟其不朽而存與泯泯而滅者不繫於生死之間公之存於世者昭昭若是公其行矣可以永歸而不反矣某等所以告公止於此矣攀慕悲痛如何可言祭司徒顧新山公文窮人力之知巧以造作而矯拂震耀世之耳目峻迹奇功豈不見為離類而絶匹惟枝葉不由於根本情狀常露其心術雖彌縫藩飭終至於敗缺而遁屈故小節細事或盡失其平生而衰年末路輒沮喪於昔日誠舉此而究論前世之名公其不蹈此者蓋亦甚鮮而況於近世之人物惟公性資之篤厚器度之龎碩粹美殊稟已精氣之間值濟以修為之敦恪踐履之完密故其行業之載於世隨施輒效俊偉明白焯星月之昭揭而舍其昭昭之地求之於毫末之為隱昧之隙曾無懈惰苟且可以竊窺而潛索其退而家居日月云邁約束筋體於禮度繁敇之中保合精神於嗜好攖接之外臨深履薄未喻孜孜與栗栗故謂公之剛勇以百里之邑宰列署之郎官當逆瑾權寧原闕一職其祿易酬無浮於事以貽惡羞止不為矯亦免摧撓曰倦於勞筋力云老舍而自休一邱是保官雖卑冗亦曰仕止二纍不嬰善其終始斯為無憾可以沒齒某辱與令子講學同方敘契於公伯叔之行何以薦之牲肥酒芳謂為平生能飲與嘗顧瞻帷堂其人已亡不我能即慨焉永傷侑以此詞以告不忘哭王武陽文王武陽先生之柩將以甲寅正月十一日發莆陽歸於泰和其壻陳生實扶護以行莆之大夫士祖奠相屬皆哭盡哀晉江王某病不能赴弔遣門人沈大易往會哭於莆陽學舍是月八日謹馳瓣香屬友人莊繼炳走候柩發之日送於道周而告以文曰嗚呼先生之學修身立命形有夭壽不二者性既知其生自善其死太和孰家莆陽孰旅魂合於天遊浮清揚全返知覺昭哉不亡維是友生斯道之悼攀送輤車何以為告祭林雲衢先生文嗚呼被褐而玉在懷尚絅而錦為衣含真藴以內足胡外物之可希彼力制而矯慕終自鮮夫天機杳漸逵之鴻羽瞻肅肅其可儀鶴長鳴乎九皋聲逺揚而天飛偉哲人之髙尚豈世網之能羈垂皇路以途泥安駟駕之驂騑茨桑樞以甕牖美數仞之堂榱懷絮不易乎狐溫甘藜藿其如飴藏道德以遁世厥心亨而志違抱遺經以俯仰每朝哦而夕披攻雖堅而必入探無賾之不窺時發揮於口頰亹玉屑而泉霏愚入由之智出虛往莫不實歸維井泄之不食厪行道之惻悲虞氏久不為政歌在野之式微邁年齡猶不倦獨懷此其何之嗟及門之吾黨辱刮視而誘携尊所聞之不及力歲冉冉以遒馳悵儀刑之一失將日逺而日非灑掬淚而跪薦愧醑薄而肴稀祭黃曉江文嗚呼木之有癭石之有峰皆不中材適器匠者無所施其繩削礱琢之功棄捐於深山大澤汩沒泥沙穿穴蟲蟻沮洳薈薉之所蔽蒙而其奇形怪質輪囷碨壘突兀玲瓏往往呈露變怪嘯夔魅而怒雨風至其置之耳目之須摩挲瞻暏則足使人愛玩駭嘆而繁卉溫珉退然自失其可悅之容故好事有力者竭意搜取不忍其長捐山澤而二物者雖其無所用而亦不悲於所遇之窮惟有力與好事所處殊勢故二物之所遇或珍重寶惜於廣囿華軒雕闌瑤砌之上亦或與畸人勝士朝夕徘徊娛遁獨而媚幽忡在物如此人亦有然宜乎兄之懷靈含秀怪怪奇奇非有力者所得而使豫之寡陋鄙朴竊取以自快而成乎好事之髙蹤惟此形之難久既終歸於澌盡則遇與不遇曾何足介得失於胸中嗚呼曉江今其亡矣奇形怪質既不復存於山澤精魄靈氣猶將升天入地飛揚光景而變滅幻嚨豫顧噭噭然於生死之際哀悼歔欷而不能已其為拘拘吝固之人而不足以語造化之大終祭陳南津文環鰲之滸而居者殆數千家而以氏族望於其土數姓而已生於望姓者不知幾何人而詩禮有所承傳産業可以貽籍者不能數人也於其間有詩禮之承傳者或薄於生有産業之貽籍者或陋於文若南津所謂兼之者也人生事情如此亦可自慰然以令子之抱奇好學將旦夕奮迹發身及其父之見也而今不可得見矣南津之沒豈能無遺憾令子之悲宜有不可解者嗟乎使死而無知則吾於南津父子之間將交為恨之使死而有知則令子之才之敏而志之苦必能有以自顯其身南津有知之靈當如及身之存而見之也其又何憾而令子欲塞其無已之悲亦在乎有以自力耳嗚呼載此觴酒非旨而清南津來舉此觴吾果以死者為尚有知也祭洪質齋文大宗惟洪有望於英山既英只川亦斯名發祥鍾和伊人攸興其人孔多孰最有聲曰公實最長宗之盟厥德之美篤自天委日功月行勤以積纍既富且壽又多男子多而且才以顯公祉仲剖麟符季維柱史以仁牧人公曰移理其黜以直亦惟公喜伯也晚薦教吳之士其末二生翔譽泮水皆公之訓振振書禮語福之隆其尤在此乘化而歸更何憾悔某等辱公相好亦與子遊存亡之間厥有綢繆刲牲縮酒既碩而柔公不可即曷寫此憂爰寫於詞以侑薄羞哭賁園兄文兄孝於父母人也然父早喪而不得養其生徒有刻苦欲繼其立家之志而力又未及也得養其母矣而天奪兄年使不得終其事是兄之情事卒未及伸而懷無窮之恨以歿也天乎胡於孝者不厚其與而靳之如此既不可知則有推而付之於命而已雖其如此而兄不泯之魂其能以自弛乎兄臨歿之言以老母與諸子託我我不敢忘養母之事兄有弟能執之朝夕之奉我不與知知其大者而已諸子教育之大者我當任之其細者有兄之內子在我亦不與知也以此告兄兄魂其少慰以弛否酒溫饌芳敬持以進兄如不泯當來舉一觴筯也祭洪月樓親家文嗚呼自昔有言卜壽以德或以貌徴少失多得德貌兼稽鮮有漏忒惟公之稟祥慎溫克不躁不誕願而能飭居臨卑暬不厲呵叱造次之頃弗形遽色世機抵􅐵每退而匿家庭之內靜嘉可則惇厥宗黨爰及姻戚情禮具宜不學亦式富之與仁常罔並獲公於治生日滋月殖人皆願之曾靡怨噴農氓舞歌樂藝其穡役者欣赴為殫其力厥以德卜儔公之匹暨其生貌實偉且碩何意堂堂忽焉摧踣閲齡幾何踰艾之七雖非不夀於德未塞天乎茫茫孰訊其極吾之季妹歸於公室中道夭歿豫哭之亟併為公弔相向悼惻見公雙鬢蒼然班白微怪其早繄容甚澤豫頃抱痾聞公遘疾不遣視省勿藥可必屬有逺遊匪朝伊夕豈謂須臾遂成今昔俯仰平生悲攪於臆來登公堂邈不可即愧乏豐饌酒陳淚浥抒忱寫哀靈其來格祭户部何他山文嗚呼造化生材厥甚不易既其生之曷曰無意俾升於名俾達於位斯意所屬才克有試宜永以年勿折勿替令德茂業終底厥至先生之生獨鍾醇懿早齡秀發文采炳蔚沖厚內朗近道之器日修月益漸臻明邃比揚於朝嵗鄰強仕敬爾由獄為國法士持身之廉與人之義好學自虛彌遜其志充積涵摩將閎以肆胡為一疾遽爾長逝鄉失仁賢國殱俊乂令人懵懵視天斯為胡然生之胡使早棄兹所嘆悼蓋閔斯世至其一家俯仰之計旁無近親下絶息嗣行路心惻澘然隕涕惟其達觀超舉洞視修短吉凶蕩然齊致舍是之云何能為慰祭侍御陳見吾文會奠嗚呼維公英資天挺絶出輩倫充之問學益邃以醇春秋指授集者如鱗三傳異同譬彼絲棼理之有緒曲暢區分晚甲其科聞於有閩匪直也閩海內有聞聽讞之明誦在越氓執刑秋肅實溫以春持經飭律民之司均峩峩風節入正臺紳在鳥有鷙萬目眴眴鏗鍧巍論羣耳為震破柱取姦如漢虎臣直指奉使亦埋其輪權幸側晲百忌集身叢輕折軸於古有云議祔一疏瀝腹以陳覆為我狂可畏壬人竭忠賈害殆即鬼磷完軀還里荷帝之仁帝仁且明鑒下孔殷暫斥將召豈終棄淪蔽賢有責鞅望未伸宜養以俟誰曰不信胡意遘疾不弔維旻忽然形化氣應不泯乘雲騎星精喪尚真祭陳見吾先生文某生十一歲實從先生授春秋讀先生不及終館而某往即他師竟以易起家使某不得聞聖人筆削之旨蓋有數存焉然終身事先生以師而先生亦友某以問學自在仕至間居相追隨二十年間講究談討前人學術之是非當今時務之得失人材邪正用舍風俗之汙隆升降言之多矣雖合不一要為不離於學問流俗無用不急之辨察未常有焉中間某以葬父哀苦瘁蹙之頃而先生亦為掩其子彼此異同必竭所見蓋亦師弟朋友相與折衷可否直而無隱之義他人不免以為疑而吾二人者未始少有間也日惟望先生之出振發奇氣施設壯猷使春秋之讀見諸行事何意一旦淹然以逝也嗚呼痛哉先生於鄉所敬事者莫如故竹坡公所嚴交者莫如張淨峰公而某之不肖直以一日及門之雅遂辱從逰之厚竹坡公吾外祖也淨峰公於某尤不淺不揆哭先生未幾而淨峰之訃至自楚嗚呼數日之間豈堪此兩哭耶縉紳奠先生之章某既執筆而復述其私以致門下之慟肴芳酒清先生豈復能飲食之祭長史徐語溪文嗚呼公果止於此耶公果止於此耶公以恢𢎞肅給之材和易寬博之度溫粹沖挹之容磊落開敏之辨其於酬世揆物應變成務足以上下皆宜彼此無斁時所謂美職顯位隆秩穹階以宅名才而償異績者乃公所宜據而齟齬仕路跋疐艱阻久淹百里僅起留曹未涉敘遷輒遭左授聞趙國拜相之命縉紳交駭不曉何以畀公然公方且不以顯晦榮瘁嬰懷雍容笑傲携牒紆紱歡然就道是雖不得效其材於世而輔導賢王守藩謹度共享榮寵以終其身亦足以自同古之不得志而隱於祿者而忽遘疢疾之官未幾溘然不起嗟乎豈惟世之容公者狹不使得達於仕而天之奪公又迫竟不得永其年吁可恨也某自童稚辱教有同子弟而重以令子與先人連姻之雅情好彌敦聞公之訃實深傷悼念惟尊甫暮年哭子之悲令子終天永慕之痛九泉有知應不瞑目然尊甫受稟獨厚疆健堅決眉夀無疆而令子賢孝能於大故摧楚之中忍情竭力持家治事以奉其祖而力學好修發聞於時以繼公欲為之志而泄其未盡之用蓋必有日公亦可以瞑目矣觴酒豆肉謹薦几筵而侑之以此文既以告公而且以塞公父子之悲公其享之祭侍御林沙溪公文嗚呼惟公德宇之懿甘雨祥風踐履之醇精金良玉襟懷之曠汪波恬海心事之正白日青天宜保不資之身介無疆之算永為縉紳之楷範鄉黨之典刑而今已矣吾徒何所依向凡在同遊與及接後塵者孰不嗟悼嘆息於公之云亡然公得夀已髙諸福備有令善終始曾靡遺憾某等雖公為士夫鄉人痛而於公之所享無所可致其不足之恨旨酒在樽芳肴在俎猶庶幾平生侍談共遊之倣佛而公不復來舉此觴筯矣悲慕之情如何能已祭李筠溪先生文嗚呼清溝之里峰映澤滙奇秀誕鍾氣數攸會樹之菉竹如簀斯薈猗猗青青鳳兮來萃乃鳴乃飛翩翩噦噦篤生賢碩應時之泰竹坡騫騰蔚為人瑞公乃繼起接其翔翽肆公之學鈎深探賾孔孟微言羲文奧畫宿師積疑渙然氷釋虛齋先正教人以易公蚤入門遂參所得師承原本文有法式師所著書公廣其刻傳於西人施及遐側後生講習開蒙發惑肆公之政善斷能聽始評棘寺讞審衡鏡色詞有稽徴以法令陟為蜀臬風裁獨正繩姦摘隱節剝穴罄吏有苛賕解綬逸迸豪有暴武􅋏膽改行秉憲持體與御史諍坐此失官既嘯乃詠如公之藴不究其施人莫不憤公善自怡葆光頥和林泉娛熙老而益康介此純禧從以孫子實教書詩桑榆之景宴樂且冝夀豈令終靡有憾遺芳肴在俎清酒在巵薦此侑文公乎有知祭外祖叔李筠溪翁先生文鳴呼公與竹坡公以昆弟相繼登朝海內之人莫不知有晉江李氏之賢而清溝之山川靈異遂為泉人所談竹坡公以乞養父母自謝而歸公又以忤臺臣見罷何天生斯人而不使之大有用也憶某稚時公嘗課以童子句對應聲而答公頗以為奇也公歸自西蜀某方遊庠序總角丱耳公閲其文嘉許而期之及叨第歸婚屢得見公凡與某語者皆居官應事之大端細目某幸得有聞因嘆公之才宜大用而不用為深恨也竹坡公既棄斯世賴公巋然夀康靈光獨存猶慰瞻侍而今已矣嗚呼悲哉鄉士夫之奠某為文述公政學之盛以侑薦告而此特敘始終之感以致攀慕之悲云耳公如不亡猶鑒于斯祭司徒鄒一山公文歲在乙卯地震之變連山陜數十州縣崩山塞河摧壓以數百萬家民之死者不可為數上震痌省躬思所以救恤其民而修禋告之望祭於華嶽西河疇咨廷臣曰惟户部侍郎鄒守愚克稱任使於是公輟司徒之任以往公所為布宣天子憂民德意多方振護以還定安集未死之民而精心恭事以蠲罪祈祐之誠告於名山大川勞瘁備至竟沒於其事蓋以死勤之也訃聞上為悼歎錫之恤典加贈易名恩禮特異遣使護其喪以歸人孰不死如公之死可謂得其所終無憾而有賴矣友人王某抱疾不能往哭謹遣奠於几筵而為文以告曰自世降才難而士者患於致用之偏此重彼輕寸長尺短如物之在衡與合十指而度方圎浮白大臠巨刃粗噉見謂不能於幹濟而罥罣吏議抵捂苛文無以逭於立監佐史之愆委蛇襜翔步盈咫而趨引繩可以賈醇學之芳譽使之舍其兩手之端拱而馳驟於荆棘厄狹則息竭力匱而卒仆於躓顛以宋滕元發蔣堂薛向王韶之兵謀吏事終身不免於口語孫泰山石徂徠顔復焦伯強之儔幸其不試於劇囏而徂徠之小露其所為己疐後而跋前在今日之甚患由昔賢而已然此漢武所以得殺狄山以一障之乘守而田文與吳起論功及夫主少國疑之頃起亦俯焉自失內恧其不足而不敢復言也惟公稟材之異受氣之全圎規方矩不能困之以周折之難而應事綜物時出於側徑旁蹊要以濟變成務而返歸於周道雖有出入終不踰乎大間流清渭之湜湜朗然自映而不以形物而羣汚衆疾并納涵藏辟藪澤與山川柯葉廣蔭疲暍者莫不望隂思芘而亭亭挺立絶蘿蔓之縈援固修為之備至繄靈瑩之昭宣豫嘗謂道世交喪至於今日淪趨愈下之勢何啻建瓴水於髙屋而走九折峻坂之丸陳前人之成法厄儒者之髙議惟有決此世而逃之不復靡祿爵而嬰事任之權使賢者皆如是以為潔世亦何賴於仁賢隂陽消長之會必有人焉斡回於其間在大易之垂訓尤諄復於人事而不徒諉之於天閉塞莫若否傷害莫若剝而得輿之載疇祉之離當夫窮極築底之際彌見聖心之拳拳苟有意於斯用非公其人而孰能為之先營私之窟宅巧於穴兔蔽主之洚汜橫於懷山於斯之時而欲誘以徇公之急哀民之􅂒亡馬匹而渙有邱引彚征之吉俾若茅拔而茹連持銎鑿以納枘戞戞乎其難入甚撼石而攻堅非夫和平足以調胹邪曲之論忠信足以消釋猜媢之情勉扶掖於左右復後推而前牽不觸藩而遽退善包瓜以俟潰豈悻悻淺識小言詹詹者之所能辦而胡遽奪公而去旃嗟豫與公束髮入仕投誼托契積有歲年臨風寓奠眷焉涕漣抒心為詞不覺戔戔厥獨論其大致以明云亡之有繫於邦國而平昔交遊之好寧足縷細而繾綣祭知府郭白峰文某生於鄉也晚輩行去公先後不相及比叨第得請還家而公以御史直諫譴斥間居自此始得從士夫之後謁公公辱以長者奬引後進之誼見接其時年雖少已知公為鄉之偉人入仕久之知公為浦江亷能之迹卓絶一時在臺以風裁名節自矯厲丰采動於朝端出按滇南黜貪去殘發伏摘姦威明足以自振其職猶不以萬里之逺忘九重之憂慷慨一疏有古之直者所不能言非獨今人不能而已既而再起為崑山廣信南寧世道日下而時政亦愈變矣公終不少改舊操以法自繩而亦以此繩人視世之媕婀脂韋取通顯躋崇要者如無也故竟以齟齬不容公亦浩然謝去矣嗚呼直道正氣天地所賴以立一日不可泯於世公獨躬有之故雖不達於仕而歸安於家巋然為鄉黨之望者數十年非偶然也吾弟惟中性中與公之仲子為同業友性中又與公之伯子締兒女之盟自是遂為通家公年髙德邵孫子衆多皆才且賢備人生福履之盛鄉黨莫不道之然公臨化之頃仲子忽以疾逝吾兄弟不能不為公致憾於斯叔弟係官留都聞公子之訃宜深痛悼同度其子也故預於兹奠惟公不泯之靈其鑒之祭易愧虛先生文嗚呼國崇儒術造士以經辨傳注之同異稽先民之作程懼雜典之誣惑謹源流之師承患兼泛之不篤俾專一籍而致精緬六籍之宏博莫大易之難明孰沿意而忘象尚文義之倀倀偉虛齋之先正溯一𣲖於考亭不沱沿而汜涉直濟岸而先登美及門之多彥獨晚器乎先生竭閫奧以相授果墜緒之能繩昌師説以開誘遂襟透而踵仍循途軌而得轍守一家之門庭寧執陋以蒙誚不旁誤而毗矜惟所學之専一肆百為之有徴明水方淡而梅鹽可知良玉不琢而虹氣光熒無枝詞與奇行絶智巧於中扃言未出而已信色不厲而內貞鄙吝為之消釋辟飲漿以析醒洞肝腑以昭晰乍底露而奧傾久斟酌於溫粹又千頃之涵泓惟中心之不彼詐亦他人之我誠隆天親之至性藐浮雲之外榮挂東門之龎冕遁嘉肥而不憎侍膝下之歡笑老婉戀其孺嬰視朝夕之甘旨暇日及乎桑耕友因心而懇到髙堂恱而增齡菲一身之服食豐遊從之肴蒸客不知其常匱淡求忮之不形入微細而周悉表盛德之無稱惟孝敬與亷靖庶倣佛其所名繄所施之不廣因位下而處輕出千百之一二亦逺絶乎凡恆彼東流之寡鮮幸得師而奮興知本末之所存敏學文而敦行泛浙水而應聘握評文之鏡衡貴本實而賤華爰樹立於風聲古東平之鄃邑賦斂重而滋刑撫煢嫠而有怙漸招散以懷獰不期月而報政底四境於敉寧餘澤及於鄰邑曰胡不終於我乎父兄紛京師之浩攘雜五方而混并惜趙張之悍健猶姦宄之不勝比佐刑於京兆民不犯而獄清裁朘削之誅求屢逢怒而不驚固隨職而有效曾何足以語一二於生平嚴俎豆之崇報貌生像之崢嶸厥春秋與伏臘躬官師而走羣氓溯單父之善政在孔門之才已稱英持今兹以方昔孰倫擬之失憑逮維桑之恭止久鄉黨之範型心居德而栗栗容逾老而兢兢不貌慢與言疾掬冬日之暾晶俗彌薄以難挽賴典型於老成胡昊天之不慗遺忽乘雲而上征某愚暗年及成童稟命先子負篋趨風謂夏楚之不任豈堅木之能攻遽器奬之踰溢越同輩而見蒙知向道而不力顛垂白而倥侗慨滅質以溺心誤師傅之正宗尚靈爽之照臨誘遲暮之天衷倘此志其不昧終後死以靡恫祭洪蓮浦公文是歲三月封户部郎洪蓮浦翁終于寢其子金華郡守號呼跣踊棄郡人以南奔一邦之人悲不得留其守而恨天之不慗遺一老相與哭于水滸之舟次郡守君稽顙再拜以受邦人之吊乃以五月至家某辱郡守君之交既哭之於郵館復效昔人隻雞絮酒遣力走致生芻之意就几筵而奠焉而侑以文曰修道盡倫絶不以人情參天性莫如聖賢之論然猶以有父子為可以無憂也古人之作述固非後世所可妄擬而臆度要以為有承戴於前後俯仰之際而情事可以不纍則關百聖閲千載而無異心耳然聖賢於此猶存其教焉所謂無憂者豈誠泰然居乎其間而無所修明於經傳之義哉夫誠有為吾之父子者矣而吾亦為其父之子與其子之父也前者作之非有述焉作將安付後者述之非有作焉述何所受雖居於其間而受遺履盛固亦無有述作之事焉不然則祖孫相與為作述而居其間者漫無所事不亦虛人道之一世而三十年之間為缺陷鹵莽之人耶古之所為無憂者亦異乎後世之云矣翁以碧潭公為父而以郡守君為子世俗稱無憂者宜莫若翁所處之盛豫獨謂翁所以為碧潭公之子與為郡守君之父固必有善繼而可傳者豈徒逸豫晏侈如世俗耳目所誇詫榮華腆厚之享而以為無憂云乎哉某不及拜翁然辱以令子之故遣使往來忘年輩之尊而與之為訊問交際一觴之奠不能躬致託於知生之誼而為此文翁其鑒之祭林龍峰先生祀鄉賢文鄉先生林龍峰公之沒士民上其行事於郡邑大夫郡邑移檄於兩學得其行事如所上不謬遂上於部使者督學使者並下其議祀先生於學宫於是戊子歲七月朔行禮鄉後進河南參政王某敬從諸公後拜先生之位於郡學之鄉賢祠而為文以告曰孰是瞻仰穹宇巍墻曰宣父在其神洋洋侐兹一室實宅其傍仁義禮樂周浹旁皇照臨在上曷敢侑康不誅而嚴凜於刃鋩其嚴伊何論有否臧有異有同有約有詳一匕一俎一豆一觴重於廟蒸從享太常儼然在位正席偕嘗有以正業有以文章先生來處在位有光先生之仕蹶而不揚直道行志斯業之昌先生於文好所未遑有物之言匪文自彰惟忠惟信惟德不爽踐之甚邇道阻且長孔門所教世逺將亡率是素履不倍不忘以侑其側對越昭明先生妥哉豫言無荒哭愷中弟文嗟乎痛哉吾待汝以佚吾老以蒞吾終而乃使吾主汝之喪耶吾待汝以校吾集以傳吾書而乃使吾料檢汝之遺文耶吾兒之長者待汝友之幼者待汝教之而乃使吾育汝之孤嬰耶汝之學問未足以自成而見於朝夕課習之業行誼未得以自充而見於家庭從事之倫材能未可以自效而見於朋友之交敬樂聨合之益謂天無意於汝耶不宜畀汝之才之志謂天有意於汝耶不宜速汝之年謂天無造於吾家耶不宜使汝生於吾母之懷謂天有造於吾家耶不宜使吾母哭汝之死以汝為有咎耶則汝於事親從兄朋友之交之間無負於神明不知其所為罪也以汝為有過耶則汝出入起居男女交接之際有合於繩檢無所歸汝之責也嗟乎汝之無罪也無所歸汝之責也而遽奪以去是吾之不德獲譴於天無以見才弟之成且立使其割心摧肝痛苦而不得即死以重罰之也嗟乎吾不死而速汝之死吾其愧於汝矣汝知吾之未可以死而遽死以傷吾之生汝其為負於吾乎吾今雖哭汝猶不敢不愛吾生以吾之未可以死也汝知吾之生之有係於世冥冥之中猶欲相吾之存也雖然吾雖欲自愛而汝之摧割於吾者在於肝腑心膂之微恐其銷鑠迸迫薾然之軀而不得以久存也汝其果負於吾哉嗟夫汝之事吾之嚴也使吾朝夕視匕筯於几筵之供汝而有知其尤有不安於中也兹辰之奠吾使妻妾手治之而使兒子敬進之汝其安然來享以慰豫悲也嗚呼痛哉祭邱集齋夫人文於惟夫人作配中丞非徒配之朂敬其刑中丞之功夫人有庸中丞之德夫人是力中丞之節夫人實劼中丞之業夫人攸攝中丞之文夫人與聞中丞孝友夫人左右中丞之志夫人暨之中丞之名夫人成之赫赫中丞人仰其外亹亹偲偲孰知其內斯皆甫士嘗職所畀非婦人能參其投遺或有相之得一缺二孰如夫人克備厥勩婦所能者全美具懿譽夫人能繄其眇細中丞之存人詫其盛夫人不矜不侈不競中丞之歿光榮去矣夫人不戚不餒不菲持其常度以令初終家法儼然不替有隆慈其二子教克於愛勵以先公必肖無怠雖學未立亦日於邁仲也之顯可翹而待豫與中丞結契同朝神志之合不紹而交申以婚好百世永要中丞比歿為世長慨曾不及家有夫人在下見中丞其色靡悔夫人今歿瞑不可知留其餘貴為二子詒二子善承其忍忘之吾兒之弱何足云託負公遴擇貽我以怍告誠薦奠匪他人若祭許母邱孺人文某之友許子天琦門下佳士也乙卯歲應清江張西吳翰林館賔之聘實其母邱孺人遣之行既終館上春官丙辰不中第還未至家而孺人以疾卒天琦行至三山聞訃跣足號哭幾絶某既就孺人之夫厚齋翁所為位弔焉至是乃釃酒刲羊為奠而告以文曰維靈淑德宜享遐夀相夫晚娛視子用究胡遽棄去使夫抱疚子業方將而名未就子材且賢天性克孝終天之閔訣不面受殮不扶尸殯不馮匶彼旻伊酷不畀斯佑川逝無回泉昏靡晝嗚嗚烏烏血迸孤咮肝腑摧裂屢絶以仆吾勉令子生不可又上有嚴親俯有孤幼中有問學得之師友圗存爾生大事是歷子如不惰斯言可復以報終天庶有藉手清醅瘠牲匪豐俎豆告以此詞以為奠侑祭郭生父母文嘉靖戊午二月初十日郭母慈肅柯孺人卒其子𢎞業君與其二昆殮殯以禮已而二十七日尊甫一林翁亦卒不越兩旬之間連有大故嗚呼哀哉某與𢎞業君最雅誼當走弔而煢然在疚不能捐几筵以相赴謹具清酒瓣香束帛屬𢎞業之甥鄭望嶽代致於靈几而告之以文曰嗚呼一林翁之隱德慈肅氏之聖善嫓德偕老循理樂生優遊殆八十年以正考終無惡斁於鄉黨無誅責於鬼神生既齊年死亦並月人命有極天年奄盡雖為子之所痛而在人有不能免某不為翁與孺人悼之也惟翁義方之教而孺人相以丸膽之勤使𢎞業君親師取友績學攻文既以拔出倫輩升名俊造尚以未登大對咫尺天路謂天命可俟而遽有今日父母誨子之心人子顯親之願幽明之間遂謂永憾此某所為翁與孺人恨且重為𢎞業君悲者也一樽之酹弗躬弗親告詞不文聊見通家惇實之情庶其鑒哉祭丘室洪孺人文維靈生於望族歸於名門所事伊何省菴之尊嚴而有法難得其欣舅曰婦賢靡間其言所儀伊何維吳亭君其家之起如涌如騫夫曰能然內有妻存吳亭於家匪直也勤克順克孝敬共二昆暨其睦任具有彌綸為家令子於鄉有聞維其相之其力孔殷云何不淑去如川奔豫厚吳亭欲慰何論爰此作文以侑酹樽祭蔡母楊太孺人文是歲安平冦警蔡北塢次塢兄弟奉其母慈嚴楊太孺人至郡城寓於陳氏之館閲三月而太孺人以疾終於是年八十四矣某等於太孺人表姪孫行也北塢次塢異姓世父也走哭於寓館二君哀不自勝泣涕交頥如孺之慕哺母者蓋痛其終非家寢云某謂古有寓禮徙而之他境今由鄉入邑一舍而近問醫擇藥食飲旨甘畢得所求歲制日制之具宿治而致美斯寢也已其又何憾兹以八月之朔率弟姪刲牲釃酒致一酬之忱於太孺人之几筵而詞以告曰嗚呼維孺人事木齋公植家厚生有鵲巢之功約用索出有葛覃之儉肅祀躬事有采蘩之敬執勞兼猥有卷耳之勤斂已逮媵有樛木之惠育子均愛有鳲鳩之一揆其儀德不愧卿大夫之母北塢君宜顯仕而困於一經梅嶼君仕矣顧滯於下僚故珈副之飾茀藋之章未能及其母然有待也況諸孫繼起猶未艾也孺人雖不及身享之沒者有知尚與木齋公歆華寵於九原哉瘠俎樽酒維以告誠祭丘母黃氏文是歲九月二十五日丘母慈懿孺人之喪其子維棟以訃吾太宜人為之涕出蓋孺人之婦吾太宜人女也孺人之存與吾太宜人以婚姻二母相問聘勞接甚歡情愛尤篤其來訃吾太冝人既涕出特悲而遣某與兄弟輩相繼往視殯且哭焉越十一月之望孺人之喪浹五十日矣吾太宜人悲之不置乃具碩牲清酒而自為飲食之物以命某曰汝其往奠以塞吾悲且以明吾之愛其女而於其姑篤也某奉命就其子維棟几筵之位而奠焉而侑之以文曰古者男女各有位敘吉凶之問不相及也則不相為禮然孺人吾妹之姑而於吾母又篤也薌肉在豆清酒在杯吾母所治也某敢不奉而薦諸且吾妹哭之在房令子維棟哭而告之在旁孺人其來舉一匕勺以副吾母之意也非某之敢薦也祭建安楊母謝太孺人文於乎建安之楊之姓著於天下非一日矣自文敏公歷相三朝相業為當代第一不獨其施於天下者盛也其家法尤為天下所宗故楊氏稱著姓非徒以富貴有名而已太孺人歸於上虞公乃故相之嫡後家法儼然如一日太孺人能守其法閫儀闈則完懿備善傳誦為一姓女範自始逮終六十餘年為婦為妻為母兼三者之責皆有其道婦順而敬妻佐而弼母慈而教全懿善以介景福人生之嘉事畢集於躬勞之而見其成致之而久於享合天人之理而和同之雖曰內美蓋亦斯世之所難也吾弟道原與令子華山先生有道誼問學之契遂申以婚姻以益締兄弟之好實奉太孺人之命以敦斯盟也某因吾弟得聞太孺人令德未由登堂展拜講子弟之儀心固以為華山先生祝其眉夀於無疆教其子以臣道為名卿大夫於一時而太孺人遽以考終未及見其子之仕也豈非萬分有一之憾哉華山奉母教稔矣他日終當以功業顯光潛賁幽為太孺人慰蓋終未嘗有憾也孫曾振振之彥將與華山相繼榮顯永故相之澤於不替而莫非太孺人遺祉錫羡之無已也於乎盛矣某卧病山扃從吾弟家問中得太孺人之訃竊用驚悼緘帛寓奠愧不能躬致几筵而侑之以此文靈其鑒諸祭史母太安人慈肅吳氏文嗚呼婦德不稱於梱外而積纍勤之久則或為族戚之所嘆譽或為鄰黨之所傳説而徽懿令善章著不可掩及其閲日之多行年之邁則歎譽者以為事迹傳説者以為式範可與有四方之事者均其有聞如太安人之善事舅姑克相夫子和娣姒以禮接姻婭以姻拊卑幼有愛馭臧獲有法形為歎譽傳説見稱於人非一善矣至其慈不弛教督二子以詩書之業德義之方竟見其成而方享其榮尤以母道有稱二子異日問學風節將為眉山之蘇清江之劉功業名位將為許昌之韓滎陽之吕皆未可量太安人之教將彌久而益有聞所可憾者方享子榮而遽以天年終然長子宜之拜官之便省覲於家稱觴之慶甫伸視藥之勞加謹而含襲殮殯之重乃躬乃親必誠必信使其弟節之亦可以逭於繫官承訃不及終訣之恨豈非德善所積無責於冥冥故顯以自報太安人母子之間而昭白其賢孝之實耶某等忝在縉紳禮有會奠特撰此詞以侑酹樽祭新興尹莊玉泉文嗚呼玉泉溫恭之度忠信之資謹身飭行靜默自持擇地而陷周折矩規為義甚勇好德如飴友于至性和若塤箎敦睦族姻處厚安卑喧呶逆耳不激不隨早歲明經文聲四馳苦心刻志靡怠昏􅀈旁窺百氏寤寐宓姬敏修趠詣邁越倫夷沖飛鴻翮宜漸於逵數奇屢躓矯翅而垂黌宫選士以君應之抑情就列委命俟時晚從一官匪才之宜孰隆其與而嗇其施始佐永嘉愷悌惠慈以儒飭吏政肅事治民曰父母士以為師晉尹新興夙志不移禁姦止暴罔敢恣睢調柔和良厥民實禆信已獨行不求人知竟以此黜柄者行私人咸惋歎君獨自怡謂彼譛人造物其尸行使止尼曷辨成虧徜徉十畝論文談詩手不廢卷篝燈夜披君素多疾羸然蚤衰不即嗜好薄味淡滋形薾神王謂當未期詎意大命竟止於斯室有內友善視家兒有德之後既篤其遺如彼藨蓘報以豐茨發祥鍾美孰測其涯君其瞑矣慰此哀詞祭曾祖叔母伍孺人文孺人享年將百歲子孫曾滿前皆賢且才為春官選士學官弟子彬彬然文華堂靚室美衣甘食之奉晚而益豐人生之福備矣此族黨姻戚所共嘆以為盛者也而孺人之福有尤盛者二子相惇以友悌如一人之身左右手足合為一體塤萀和聲奏於一門厨不殊㸑篋無異衣化訓諸孫遵行其教皆如一體而分孝友敦睦之美為一鄉之望孺人所以處靚室而安服美衣而溫嘗甘食而旨怡然於頽齡無一皺眉蹙額之戚干於胸中其福之所享超乎外物而重在於天性人彛之間此其所為尤盛也委化而去含笑入地真可謂無憾矣某等以卑幼從主人之後哭於几筵不能不哀而撰為此文以侑奠觴不敢為孺人悲而且以為主人慰云祭同年蔡西坡文嗚呼君仕宰百里未為不達年踰六十未為不夀有子與孫能讀其家書人生如此亦可以無大憾而豫獨為君有憾者君虛齋先生之子也先生之書四方之士共讀之則先生之子四方之士宜共愛之而先生之事有待於其子者亦宜與先生之子共為之然君之弟思毅君以英才登第入仕方淺未有大過當事者遽不能容使其早廢以死君偶不得志於一第受命宰邑亦可以保護憫惜使之漸發聞於時少顯先生之後而當事者復不能容之遽以罷歸何世之待君者狹而所以厚先生之後者太無意也君既不得志歸家益疏於事與世自絶而先生之事有所待於後人者君力不能自為而人亦無復與君共為者尤可悲也先生之廬燬於火而不能葺墓疑於水而不能決其徙與否而丁夫人之殯以卜域之故久而未厝先生之像託於環堵之間而尸祝之祠不嚴此皆君之所欲為而不能無待於共為者而君遽歿矣其存如是其沒也又尚可冀乎是豫所為君有憾者也豫生也晚亦嘗讀先生之書又辱與君兄弟為同年抱慚無以自釋徒托於此文以為君悲然君之子孫必有顯者其猶能畢君之志而豫之文有可以告人者當有讀先生之書者與君之孫子共為之君亦無憾其不得自為也歟嗚呼悲哉觴酒俎牲非足以薦尚饗遵巖集卷十九
